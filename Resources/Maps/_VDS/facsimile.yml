    - type: Paper
      content: "\rCall me Ishmael. Some years ago—never mind how long precisely—having\rlittle or no money in my purse, and nothing particular to interest me\ron shore, I thought I would sail about a little and see the watery part\rof the world. It is a way I have of driving off the spleen and\rregulating the circulation. Whenever I find myself growing grim about\rthe mouth; whenever it is a damp, drizzly November in my soul; whenever\rI find myself involuntarily pausing before coffin warehouses, and\rbringing up the rear of every funeral I meet; and especially whenever\rmy hypos get such an upper hand of me, that it requires a strong moral\rprinciple to prevent me from deliberately stepping into the street, and\rmethodically knocking people’s hats off—then, I account it high time to\rget to sea as soon as I can. This is my substitute for pistol and ball.\rWith a philosophical flourish Cato throws himself upon his sword; I\rquietly take to the ship. There is nothing surprising in this. If they\rbut knew it, almost all men in their degree, some time or other,\rcherish very nearly the same feelings towards the ocean with me.\r\rThere now is your insular city of the Manhattoes, belted round by\rwharves as Indian isles by coral reefs—commerce surrounds it with her\rsurf. Right and left, the streets take you waterward. Its extreme\rdowntown is the battery, where that noble mole is washed by waves, and\rcooled by breezes, which a few hours previous were out of sight of\rland. Look at the crowds of water-gazers there.\r\rCircumambulate the city of a dreamy Sabbath afternoon. Go from Corlears\rHook to Coenties Slip, and from thence, by Whitehall, northward. What\rdo you see?—Posted like silent sentinels all around the town, stand\rthousands upon thousands of mortal men fixed in ocean reveries. Some\rleaning against the spiles; some seated upon the pier-heads; some\rlooking over the bulwarks of ships from China; some high aloft in the\rrigging, as if striving to get a still better seaward peep. But these\rare all landsmen; of week days pent up in lath and plaster—tied to\rcounters, nailed to benches, clinched to desks. How then is this? Are\rthe green fields gone? What do they here?\r\rBut look! here come more crowds, pacing straight for the water, and\rseemingly bound for a dive. Strange! Nothing will content them but the\rextremest limit of the land; loitering under the shady lee of yonder\rwarehouses will not suffice. No. They must get just as nigh the water\ras they possibly can without falling in. And there they stand—miles of\rthem—leagues. Inlanders all, they come from lanes and alleys, streets\rand avenues—north, east, south, and west. Yet here they all unite. Tell\rme, does the magnetic virtue of the needles of the compasses of all\rthose ships attract them thither?\r\rOnce more. Say you are in the country; in some high land of lakes. Take\ralmost any path you please, and ten to one it carries you down in a\rdale, and leaves you there by a pool in the stream. There is magic in\rit. Let the most absent-minded of men be plunged in his deepest\rreveries—stand that man on his legs, set his feet a-going, and he will\rinfallibly lead you to water, if water there be in all that region.\rShould you ever be athirst in the great American desert, try this\rexperiment, if your caravan happen to be supplied with a metaphysical\rprofessor. Yes, as every one knows, meditation and water are wedded for\rever.\r\rBut here is an artist. He desires to paint you the dreamiest, shadiest,\rquietest, most enchanting bit of romantic landscape in all the valley\rof the Saco. What is the chief element he employs? There stand his\rtrees, each with a hollow trunk, as if a hermit and a crucifix were\rwithin; and here sleeps his meadow, and there sleep his cattle; and up\rfrom yonder cottage goes a sleepy smoke. Deep into distant woodlands\rwinds a mazy way, reaching to overlapping spurs of mountains bathed in\rtheir hill-side blue. But though the picture lies thus tranced, and\rthough this pine-tree shakes down its sighs like leaves upon this\rshepherd’s head, yet all were vain, unless the shepherd’s eye were\rfixed upon the magic stream before him. Go visit the Prairies in June,\rwhen for scores on scores of miles you wade knee-deep among\rTiger-lilies—what is the one charm wanting?—Water—there is not a drop\rof water there! Were Niagara but a cataract of sand, would you travel\ryour thousand miles to see it? Why did the poor poet of Tennessee, upon\rsuddenly receiving two handfuls of silver, deliberate whether to buy\rhim a coat, which he sadly needed, or invest his money in a pedestrian\rtrip to Rockaway Beach? Why is almost every robust healthy boy with a\rrobust healthy soul in him, at some time or other crazy to go to sea?\rWhy upon your first voyage as a passenger, did you yourself feel such a\rmystical vibration, when first told that you and your ship were now out\rof sight of land? Why did the old Persians hold the sea holy? Why did\rthe Greeks give it a separate deity, and own brother of Jove? Surely\rall this is not without meaning. And still deeper the meaning of that\rstory of Narcissus, who because he could not grasp the tormenting, mild\rimage he saw in the fountain, plunged into it and was drowned. But that\rsame image, we ourselves see in all rivers and oceans. It is the image\rof the ungraspable phantom of life; and this is the key to it all.\r\rNow, when I say that I am in the habit of going to sea whenever I begin\rto grow hazy about the eyes, and begin to be over conscious of my\rlungs, I do not mean to have it inferred that I ever go to sea as a\rpassenger. For to go as a passenger you must needs have a purse, and a\rpurse is but a rag unless you have something in it. Besides, passengers\rget sea-sick—grow quarrelsome—don’t sleep of nights—do not enjoy\rthemselves much, as a general thing;—no, I never go as a passenger;\rnor, though I am something of a salt, do I ever go to sea as a\rCommodore, or a Captain, or a Cook. I abandon the glory and distinction\rof such offices to those who like them. For my part, I abominate all\rhonorable respectable toils, trials, and tribulations of every kind\rwhatsoever. It is quite as much as I can do to take care of myself,\rwithout taking care of ships, barques, brigs, schooners, and what not.\rAnd as for going as cook,—though I confess there is considerable glory\rin that, a cook being a sort of officer on ship-board—yet, somehow, I\rnever fancied broiling fowls;—though once broiled, judiciously\rbuttered, and judgmatically salted and peppered, there is no one who\rwill speak more respectfully, not to say reverentially, of a broiled\rfowl than I will. It is out of the idolatrous dotings of the old\rEgyptians upon broiled ibis and roasted river horse, that you see the\rmummies of those creatures in their huge bake-houses the pyramids.\r\rNo, when I go to sea, I go as a simple sailor, right before the mast,\rplumb down into the forecastle, aloft there to the royal mast-head.\rTrue, they rather order me about some, and make me jump from spar to\rspar, like a grasshopper in a May meadow. And at first, this sort of\rthing is unpleasant enough. It touches one’s sense of honor,\rparticularly if you come of an old established family in the land, the\rVan Rensselaers, or Randolphs, or Hardicanutes. And more than all, if\rjust previous to putting your hand into the tar-pot, you have been\rlording it as a country schoolmaster, making the tallest boys stand in\rawe of you. The transition is a keen one, I assure you, from a\rschoolmaster to a sailor, and requires a strong decoction of Seneca and\rthe Stoics to enable you to grin and bear it. But even this wears off\rin time.\r\rWhat of it, if some old hunks of a sea-captain orders me to get a broom\rand sweep down the decks? What does that indignity amount to, weighed,\rI mean, in the scales of the New Testament? Do you think the archangel\rGabriel thinks anything the less of me, because I promptly and\rrespectfully obey that old hunks in that particular instance? Who ain’t\ra slave? Tell me that. Well, then, however the old sea-captains may\rorder me about—however they may thump and punch me about, I have the\rsatisfaction of knowing that it is all right; that everybody else is\rone way or other served in much the same way—either in a physical or\rmetaphysical point of view, that is; and so the universal thump is\rpassed round, and all hands should rub each other’s shoulder-blades,\rand be content.\r\rAgain, I always go to sea as a sailor, because they make a point of\rpaying me for my trouble, whereas they never pay passengers a single\rpenny that I ever heard of. On the contrary, passengers themselves must\rpay. And there is all the difference in the world between paying and\rbeing paid. The act of paying is perhaps the most uncomfortable\rinfliction that the two orchard thieves entailed upon us. But _being\rpaid_,—what will compare with it? The urbane activity with which a man\rreceives money is really marvellous, considering that we so earnestly\rbelieve money to be the root of all earthly ills, and that on no\raccount can a monied man enter heaven. Ah! how cheerfully we consign\rourselves to perdition!\r\rFinally, I always go to sea as a sailor, because of the wholesome\rexercise and pure air of the fore-castle deck. For as in this world,\rhead winds are far more prevalent than winds from astern (that is, if\ryou never violate the Pythagorean maxim), so for the most part the\rCommodore on the quarter-deck gets his atmosphere at second hand from\rthe sailors on the forecastle. He thinks he breathes it first; but not\rso. In much the same way do the commonalty lead their leaders in many\rother things, at the same time that the leaders little suspect it. But\rwherefore it was that after having repeatedly smelt the sea as a\rmerchant sailor, I should now take it into my head to go on a whaling\rvoyage; this the invisible police officer of the Fates, who has the\rconstant surveillance of me, and secretly dogs me, and influences me in\rsome unaccountable way—he can better answer than any one else. And,\rdoubtless, my going on this whaling voyage, formed part of the grand\rprogramme of Providence that was drawn up a long time ago. It came in\ras a sort of brief interlude and solo between more extensive\rperformances. I take it that this part of the bill must have run\rsomething like this:\r\r“_Grand Contested Election for the Presidency of the United States._\r“WHALING VOYAGE BY ONE ISHMAEL. “BLOODY BATTLE IN AFFGHANISTAN.”\r\rThough I cannot tell why it was exactly that those stage managers, the\rFates, put me down for this shabby part of a whaling voyage, when\rothers were set down for magnificent parts in high tragedies, and short\rand easy parts in genteel comedies, and jolly parts in farces—though I\rcannot tell why this was exactly; yet, now that I recall all the\rcircumstances, I think I can see a little into the springs and motives\rwhich being cunningly presented to me under various disguises, induced\rme to set about performing the part I did, besides cajoling me into the\rdelusion that it was a choice resulting from my own unbiased freewill\rand discriminating judgment.\r\rChief among these motives was the overwhelming idea of the great whale\rhimself. Such a portentous and mysterious monster roused all my\rcuriosity. Then the wild and distant seas where he rolled his island\rbulk; the undeliverable, nameless perils of the whale; these, with all\rthe attending marvels of a thousand Patagonian sights and sounds,\rhelped to sway me to my wish. With other men, perhaps, such things\rwould not have been inducements; but as for me, I am tormented with an\reverlasting itch for things remote. I love to sail forbidden seas, and\rland on barbarous coasts. Not ignoring what is good, I am quick to\rperceive a horror, and could still be social with it—would they let\rme—since it is but well to be on friendly terms with all the inmates of\rthe place one lodges in.\r\rBy reason of these things, then, the whaling voyage was welcome; the\rgreat flood-gates of the wonder-world swung open, and in the wild\rconceits that swayed me to my purpose, two and two there floated into\rmy inmost soul, endless processions of the whale, and, mid most of them\rall, one grand hooded phantom, like a snow hill in the air.\r\r\rCHAPTER 2. The Carpet-Bag.\r\rI stuffed a shirt or two into my old carpet-bag, tucked it under my\rarm, and started for Cape Horn and the Pacific. Quitting the good city\rof old Manhatto, I duly arrived in New Bedford. It was a Saturday night\rin December. Much was I disappointed upon learning that the little\rpacket for Nantucket had already sailed, and that no way of reaching\rthat place would offer, till the following Monday.\r\rAs most young candidates for the pains and penalties of whaling stop at\rthis same New Bedford, thence to embark on their voyage, it may as well\rbe related that I, for one, had no idea of so doing. For my mind was\rmade up to sail in no other than a Nantucket craft, because there was a\rfine, boisterous something about everything connected with that famous\rold island, which amazingly pleased me. Besides though New Bedford has\rof late been gradually monopolising the business of whaling, and though\rin this matter poor old Nantucket is now much behind her, yet Nantucket\rwas her great original—the Tyre of this Carthage;—the place where the\rfirst dead American whale was stranded. Where else but from Nantucket\rdid those aboriginal whalemen, the Red-Men, first sally out in canoes\rto give chase to the Leviathan? And where but from Nantucket, too, did\rthat first adventurous little sloop put forth, partly laden with\rimported cobblestones—so goes the story—to throw at the whales, in\rorder to discover when they were nigh enough to risk a harpoon from the\rbowsprit?\r\rNow having a night, a day, and still another night following before me\rin New Bedford, ere I could embark for my destined port, it became a\rmatter of concernment where I was to eat and sleep meanwhile. It was a\rvery dubious-looking, nay, a very dark and dismal night, bitingly cold\rand cheerless. I knew no one in the place. With anxious grapnels I had\rsounded my pocket, and only brought up a few pieces of silver,—So,\rwherever you go, Ishmael, said I to myself, as I stood in the middle of\ra dreary street shouldering my bag, and comparing the gloom towards the\rnorth with the darkness towards the south—wherever in your wisdom you\rmay conclude to lodge for the night, my dear Ishmael, be sure to\rinquire the price, and don’t be too particular.\r\rWith halting steps I paced the streets, and passed the sign of “The\rCrossed Harpoons”—but it looked too expensive and jolly there. Further\ron, from the bright red windows of the “Sword-Fish Inn,” there came\rsuch fervent rays, that it seemed to have melted the packed snow and\rice from before the house, for everywhere else the congealed frost lay\rten inches thick in a hard, asphaltic pavement,—rather weary for me,\rwhen I struck my foot against the flinty projections, because from\rhard, remorseless service the soles of my boots were in a most\rmiserable plight. Too expensive and jolly, again thought I, pausing one\rmoment to watch the broad glare in the street, and hear the sounds of\rthe tinkling glasses within. But go on, Ishmael, said I at last; don’t\ryou hear? get away from before the door; your patched boots are\rstopping the way. So on I went. I now by instinct followed the streets\rthat took me waterward, for there, doubtless, were the cheapest, if not\rthe cheeriest inns.\r\rSuch dreary streets! blocks of blackness, not houses, on either hand,\rand here and there a candle, like a candle moving about in a tomb. At\rthis hour of the night, of the last day of the week, that quarter of\rthe town proved all but deserted. But presently I came to a smoky light\rproceeding from a low, wide building, the door of which stood\rinvitingly open. It had a careless look, as if it were meant for the\ruses of the public; so, entering, the first thing I did was to stumble\rover an ash-box in the porch. Ha! thought I, ha, as the flying\rparticles almost choked me, are these ashes from that destroyed city,\rGomorrah? But “The Crossed Harpoons,” and “The Sword-Fish?”—this, then\rmust needs be the sign of “The Trap.” However, I picked myself up and\rhearing a loud voice within, pushed on and opened a second, interior\rdoor.\r\rIt seemed the great Black Parliament sitting in Tophet. A hundred black\rfaces turned round in their rows to peer; and beyond, a black Angel of\rDoom was beating a book in a pulpit. It was a negro church; and the\rpreacher’s text was about the blackness of darkness, and the weeping\rand wailing and teeth-gnashing there. Ha, Ishmael, muttered I, backing\rout, Wretched entertainment at the sign of ‘The Trap!’\r\rMoving on, I at last came to a dim sort of light not far from the\rdocks, and heard a forlorn creaking in the air; and looking up, saw a\rswinging sign over the door with a white painting upon it, faintly\rrepresenting a tall straight jet of misty spray, and these words\runderneath—“The Spouter Inn:—Peter Coffin.”\r\rCoffin?—Spouter?—Rather ominous in that particular connexion, thought\rI. But it is a common name in Nantucket, they say, and I suppose this\rPeter here is an emigrant from there. As the light looked so dim, and\rthe place, for the time, looked quiet enough, and the dilapidated\rlittle wooden house itself looked as if it might have been carted here\rfrom the ruins of some burnt district, and as the swinging sign had a\rpoverty-stricken sort of creak to it, I thought that here was the very\rspot for cheap lodgings, and the best of pea coffee.\r\rIt was a queer sort of place—a gable-ended old house, one side palsied\ras it were, and leaning over sadly. It stood on a sharp bleak corner,\rwhere that tempestuous wind Euroclydon kept up a worse howling than\rever it did about poor Paul’s tossed craft. Euroclydon, nevertheless,\ris a mighty pleasant zephyr to any one in-doors, with his feet on the\rhob quietly toasting for bed. “In judging of that tempestuous wind\rcalled Euroclydon,” says an old writer—of whose works I possess the\ronly copy extant—“it maketh a marvellous difference, whether thou\rlookest out at it from a glass window where the frost is all on the\routside, or whether thou observest it from that sashless window, where\rthe frost is on both sides, and of which the wight Death is the only\rglazier.” True enough, thought I, as this passage occurred to my\rmind—old black-letter, thou reasonest well. Yes, these eyes are\rwindows, and this body of mine is the house. What a pity they didn’t\rstop up the chinks and the crannies though, and thrust in a little lint\rhere and there. But it’s too late to make any improvements now. The\runiverse is finished; the copestone is on, and the chips were carted\roff a million years ago. Poor Lazarus there, chattering his teeth\ragainst the curbstone for his pillow, and shaking off his tatters with\rhis shiverings, he might plug up both ears with rags, and put a\rcorn-cob into his mouth, and yet that would not keep out the\rtempestuous Euroclydon. Euroclydon! says old Dives, in his red silken\rwrapper—(he had a redder one afterwards) pooh, pooh! What a fine frosty\rnight; how Orion glitters; what northern lights! Let them talk of their\roriental summer climes of everlasting conservatories; give me the\rprivilege of making my own summer with my own coals.\r\rBut what thinks Lazarus? Can he warm his blue hands by holding them up\rto the grand northern lights? Would not Lazarus rather be in Sumatra\rthan here? Would he not far rather lay him down lengthwise along the\rline of the equator; yea, ye gods! go down to the fiery pit itself, in\rorder to keep out this frost?\r\rNow, that Lazarus should lie stranded there on the curbstone before the\rdoor of Dives, this is more wonderful than that an iceberg should be\rmoored to one of the Moluccas. Yet Dives himself, he too lives like a\rCzar in an ice palace made of frozen sighs, and being a president of a\rtemperance society, he only drinks the tepid tears of orphans.\r\rBut no more of this blubbering now, we are going a-whaling, and there\ris plenty of that yet to come. Let us scrape the ice from our frosted\rfeet, and see what sort of a place this “Spouter” may be.\r\r\rCHAPTER 3. The Spouter-Inn.\r\rEntering that gable-ended Spouter-Inn, you found yourself in a wide,\rlow, straggling entry with old-fashioned wainscots, reminding one of\rthe bulwarks of some condemned old craft. On one side hung a very large\roilpainting so thoroughly besmoked, and every way defaced, that in the\runequal crosslights by which you viewed it, it was only by diligent\rstudy and a series of systematic visits to it, and careful inquiry of\rthe neighbors, that you could any way arrive at an understanding of its\rpurpose. Such unaccountable masses of shades and shadows, that at first\ryou almost thought some ambitious young artist, in the time of the New\rEngland hags, had endeavored to delineate chaos bewitched. But by dint\rof much and earnest contemplation, and oft repeated ponderings, and\respecially by throwing open the little window towards the back of the\rentry, you at last come to the conclusion that such an idea, however\rwild, might not be altogether unwarranted.\r\rBut what most puzzled and confounded you was a long, limber,\rportentous, black mass of something hovering in the centre of the\rpicture over three blue, dim, perpendicular lines floating in a\rnameless yeast. A boggy, soggy, squitchy picture truly, enough to drive\ra nervous man distracted. Yet was there a sort of indefinite,\rhalf-attained, unimaginable sublimity about it that fairly froze you to\rit, till you involuntarily took an oath with yourself to find out what\rthat marvellous painting meant. Ever and anon a bright, but, alas,\rdeceptive idea would dart you through.—It’s the Black Sea in a midnight\rgale.—It’s the unnatural combat of the four primal elements.—It’s a\rblasted heath.—It’s a Hyperborean winter scene.—It’s the breaking-up of\rthe icebound stream of Time. But at last all these fancies yielded to\rthat one portentous something in the picture’s midst. _That_ once found\rout, and all the rest were plain. But stop; does it not bear a faint\rresemblance to a gigantic fish? even the great leviathan himself?\r\rIn fact, the artist’s design seemed this: a final theory of my own,\rpartly based upon the aggregated opinions of many aged persons with\rwhom I conversed upon the subject. The picture represents a Cape-Horner\rin a great hurricane; the half-foundered ship weltering there with its\rthree dismantled masts alone visible; and an exasperated whale,\rpurposing to spring clean over the craft, is in the enormous act of\rimpaling himself upon the three mast-heads.\r\rThe opposite wall of this entry was hung all over with a heathenish\rarray of monstrous clubs and spears. Some were thickly set with\rglittering teeth resembling ivory saws; others were tufted with knots\rof human hair; and one was sickle-shaped, with a vast handle sweeping\rround like the segment made in the new-mown grass by a long-armed\rmower. You shuddered as you gazed, and wondered what monstrous cannibal\rand savage could ever have gone a death-harvesting with such a hacking,\rhorrifying implement. Mixed with these were rusty old whaling lances\rand harpoons all broken and deformed. Some were storied weapons. With\rthis once long lance, now wildly elbowed, fifty years ago did Nathan\rSwain kill fifteen whales between a sunrise and a sunset. And that\rharpoon—so like a corkscrew now—was flung in Javan seas, and run away\rwith by a whale, years afterwards slain off the Cape of Blanco. The\roriginal iron entered nigh the tail, and, like a restless needle\rsojourning in the body of a man, travelled full forty feet, and at last\rwas found imbedded in the hump.\r\rCrossing this dusky entry, and on through yon low-arched way—cut\rthrough what in old times must have been a great central chimney with\rfireplaces all round—you enter the public room. A still duskier place\ris this, with such low ponderous beams above, and such old wrinkled\rplanks beneath, that you would almost fancy you trod some old craft’s\rcockpits, especially of such a howling night, when this corner-anchored\rold ark rocked so furiously. On one side stood a long, low, shelf-like\rtable covered with cracked glass cases, filled with dusty rarities\rgathered from this wide world’s remotest nooks. Projecting from the\rfurther angle of the room stands a dark-looking den—the bar—a rude\rattempt at a right whale’s head. Be that how it may, there stands the\rvast arched bone of the whale’s jaw, so wide, a coach might almost\rdrive beneath it. Within are shabby shelves, ranged round with old\rdecanters, bottles, flasks; and in those jaws of swift destruction,\rlike another cursed Jonah (by which name indeed they called him),\rbustles a little withered old man, who, for their money, dearly sells\rthe sailors deliriums and death.\r\rAbominable are the tumblers into which he pours his poison. Though true\rcylinders without—within, the villanous green goggling glasses\rdeceitfully tapered downwards to a cheating bottom. Parallel meridians\rrudely pecked into the glass, surround these footpads’ goblets. Fill to\r_this_ mark, and your charge is but a penny; to _this_ a penny more;\rand so on to the full glass—the Cape Horn measure, which you may gulp\rdown for a shilling.\r\rUpon entering the place I found a number of young seamen gathered about\ra table, examining by a dim light divers specimens of _skrimshander_. I\rsought the landlord, and telling him I desired to be accommodated with\ra room, received for answer that his house was full—not a bed\runoccupied. “But avast,” he added, tapping his forehead, “you haint no\robjections to sharing a harpooneer’s blanket, have ye? I s’pose you are\rgoin’ a-whalin’, so you’d better get used to that sort of thing.”\r\rI told him that I never liked to sleep two in a bed; that if I should\rever do so, it would depend upon who the harpooneer might be, and that\rif he (the landlord) really had no other place for me, and the\rharpooneer was not decidedly objectionable, why rather than wander\rfurther about a strange town on so bitter a night, I would put up with\rthe half of any decent man’s blanket.\r\r“I thought so. All right; take a seat. Supper?—you want supper?\rSupper’ll be ready directly.”\r\rI sat down on an old wooden settle, carved all over like a bench on the\rBattery. At one end a ruminating tar was still further adorning it with\rhis jack-knife, stooping over and diligently working away at the space\rbetween his legs. He was trying his hand at a ship under full sail, but\rhe didn’t make much headway, I thought.\r\rAt last some four or five of us were summoned to our meal in an\radjoining room. It was cold as Iceland—no fire at all—the landlord said\rhe couldn’t afford it. Nothing but two dismal tallow candles, each in a\rwinding sheet. We were fain to button up our monkey jackets, and hold\rto our lips cups of scalding tea with our half frozen fingers. But the\rfare was of the most substantial kind—not only meat and potatoes, but\rdumplings; good heavens! dumplings for supper! One young fellow in a\rgreen box coat, addressed himself to these dumplings in a most direful\rmanner.\r\r“My boy,” said the landlord, “you’ll have the nightmare to a dead\rsartainty.”\r\r“Landlord,” I whispered, “that aint the harpooneer is it?”\r\r“Oh, no,” said he, looking a sort of diabolically funny, “the\rharpooneer is a dark complexioned chap. He never eats dumplings, he\rdon’t—he eats nothing but steaks, and he likes ’em rare.”\r\r“The devil he does,” says I. “Where is that harpooneer? Is he here?”\r\r“He’ll be here afore long,” was the answer.\r\rI could not help it, but I began to feel suspicious of this “dark\rcomplexioned” harpooneer. At any rate, I made up my mind that if it so\rturned out that we should sleep together, he must undress and get into\rbed before I did.\r\rSupper over, the company went back to the bar-room, when, knowing not\rwhat else to do with myself, I resolved to spend the rest of the\revening as a looker on.\r\rPresently a rioting noise was heard without. Starting up, the landlord\rcried, “That’s the Grampus’s crew. I seed her reported in the offing\rthis morning; a three years’ voyage, and a full ship. Hurrah, boys; now\rwe’ll have the latest news from the Feegees.”\r\rA tramping of sea boots was heard in the entry; the door was flung\ropen, and in rolled a wild set of mariners enough. Enveloped in their\rshaggy watch coats, and with their heads muffled in woollen comforters,\rall bedarned and ragged, and their beards stiff with icicles, they\rseemed an eruption of bears from Labrador. They had just landed from\rtheir boat, and this was the first house they entered. No wonder, then,\rthat they made a straight wake for the whale’s mouth—the bar—when the\rwrinkled little old Jonah, there officiating, soon poured them out\rbrimmers all round. One complained of a bad cold in his head, upon\rwhich Jonah mixed him a pitch-like potion of gin and molasses, which he\rswore was a sovereign cure for all colds and catarrhs whatsoever, never\rmind of how long standing, or whether caught off the coast of Labrador,\ror on the weather side of an ice-island.\r\rThe liquor soon mounted into their heads, as it generally does even\rwith the arrantest topers newly landed from sea, and they began\rcapering about most obstreperously.\r\rI observed, however, that one of them held somewhat aloof, and though\rhe seemed desirous not to spoil the hilarity of his shipmates by his\rown sober face, yet upon the whole he refrained from making as much\rnoise as the rest. This man interested me at once; and since the\rsea-gods had ordained that he should soon become my shipmate (though\rbut a sleeping-partner one, so far as this narrative is concerned), I\rwill here venture upon a little description of him. He stood full six\rfeet in height, with noble shoulders, and a chest like a coffer-dam. I\rhave seldom seen such brawn in a man. His face was deeply brown and\rburnt, making his white teeth dazzling by the contrast; while in the\rdeep shadows of his eyes floated some reminiscences that did not seem\rto give him much joy. His voice at once announced that he was a\rSoutherner, and from his fine stature, I thought he must be one of\rthose tall mountaineers from the Alleghanian Ridge in Virginia. When\rthe revelry of his companions had mounted to its height, this man\rslipped away unobserved, and I saw no more of him till he became my\rcomrade on the sea. In a few minutes, however, he was missed by his\rshipmates, and being, it seems, for some reason a huge favourite with\rthem, they raised a cry of “Bulkington! Bulkington! where’s\rBulkington?” and darted out of the house in pursuit of him.\r\rIt was now about nine o’clock, and the room seeming almost\rsupernaturally quiet after these orgies, I began to congratulate myself\rupon a little plan that had occurred to me just previous to the\rentrance of the seamen.\r\rNo man prefers to sleep two in a bed. In fact, you would a good deal\rrather not sleep with your own brother. I don’t know how it is, but\rpeople like to be private when they are sleeping. And when it comes to\rsleeping with an unknown stranger, in a strange inn, in a strange town,\rand that stranger a harpooneer, then your objections indefinitely\rmultiply. Nor was there any earthly reason why I as a sailor should\rsleep two in a bed, more than anybody else; for sailors no more sleep\rtwo in a bed at sea, than bachelor Kings do ashore. To be sure they all\rsleep together in one apartment, but you have your own hammock, and\rcover yourself with your own blanket, and sleep in your own skin.\r\rThe more I pondered over this harpooneer, the more I abominated the\rthought of sleeping with him. It was fair to presume that being a\rharpooneer, his linen or woollen, as the case might be, would not be of\rthe tidiest, certainly none of the finest. I began to twitch all over.\rBesides, it was getting late, and my decent harpooneer ought to be home\rand going bedwards. Suppose now, he should tumble in upon me at\rmidnight—how could I tell from what vile hole he had been coming?\r\r“Landlord! I’ve changed my mind about that harpooneer.—I shan’t sleep\rwith him. I’ll try the bench here.”\r\r“Just as you please; I’m sorry I can’t spare ye a tablecloth for a\rmattress, and it’s a plaguy rough board here”—feeling of the knots and\rnotches. “But wait a bit, Skrimshander; I’ve got a carpenter’s plane\rthere in the bar—wait, I say, and I’ll make ye snug enough.” So saying\rhe procured the plane; and with his old silk handkerchief first dusting\rthe bench, vigorously set to planing away at my bed, the while grinning\rlike an ape. The shavings flew right and left; till at last the\rplane-iron came bump against an indestructible knot. The landlord was\rnear spraining his wrist, and I told him for heaven’s sake to quit—the\rbed was soft enough to suit me, and I did not know how all the planing\rin the world could make eider down of a pine plank. So gathering up the\rshavings with another grin, and throwing them into the great stove in\rthe middle of the room, he went about his business, and left me in a\rbrown study.\r\rI now took the measure of the bench, and found that it was a foot too\rshort; but that could be mended with a chair. But it was a foot too\rnarrow, and the other bench in the room was about four inches higher\rthan the planed one—so there was no yoking them. I then placed the\rfirst bench lengthwise along the only clear space against the wall,\rleaving a little interval between, for my back to settle down in. But I\rsoon found that there came such a draught of cold air over me from\runder the sill of the window, that this plan would never do at all,\respecially as another current from the rickety door met the one from\rthe window, and both together formed a series of small whirlwinds in\rthe immediate vicinity of the spot where I had thought to spend the\rnight.\r\rThe devil fetch that harpooneer, thought I, but stop, couldn’t I steal\ra march on him—bolt his door inside, and jump into his bed, not to be\rwakened by the most violent knockings? It seemed no bad idea; but upon\rsecond thoughts I dismissed it. For who could tell but what the next\rmorning, so soon as I popped out of the room, the harpooneer might be\rstanding in the entry, all ready to knock me down!\r\rStill, looking round me again, and seeing no possible chance of\rspending a sufferable night unless in some other person’s bed, I began\rto think that after all I might be cherishing unwarrantable prejudices\ragainst this unknown harpooneer. Thinks I, I’ll wait awhile; he must be\rdropping in before long. I’ll have a good look at him then, and perhaps\rwe may become jolly good bedfellows after all—there’s no telling.\r\rBut though the other boarders kept coming in by ones, twos, and threes,\rand going to bed, yet no sign of my harpooneer.\r\r“Landlord!” said I, “what sort of a chap is he—does he always keep such\rlate hours?” It was now hard upon twelve o’clock.\r\rThe landlord chuckled again with his lean chuckle, and seemed to be\rmightily tickled at something beyond my comprehension. “No,” he\ranswered, “generally he’s an early bird—airley to bed and airley to\rrise—yes, he’s the bird what catches the worm. But to-night he went out\ra peddling, you see, and I don’t see what on airth keeps him so late,\runless, may be, he can’t sell his head.”\r\r“Can’t sell his head?—What sort of a bamboozingly story is this you are\rtelling me?” getting into a towering rage. “Do you pretend to say,\rlandlord, that this harpooneer is actually engaged this blessed\rSaturday night, or rather Sunday morning, in peddling his head around\rthis town?”\r\r“That’s precisely it,” said the landlord, “and I told him he couldn’t\rsell it here, the market’s overstocked.”\r\r“With what?” shouted I.\r\r“With heads to be sure; ain’t there too many heads in the world?”\r\r“I tell you what it is, landlord,” said I quite calmly, “you’d better\rstop spinning that yarn to me—I’m not green.”\r\r“May be not,” taking out a stick and whittling a toothpick, “but I\rrayther guess you’ll be done _brown_ if that ere harpooneer hears you a\rslanderin’ his head.”\r\r“I’ll break it for him,” said I, now flying into a passion again at\rthis unaccountable farrago of the landlord’s.\r\r“It’s broke a’ready,” said he.\r\r“Broke,” said I—“_broke_, do you mean?”\r\r“Sartain, and that’s the very reason he can’t sell it, I guess.”\r\r“Landlord,” said I, going up to him as cool as Mt. Hecla in a\rsnow-storm—“landlord, stop whittling. You and I must understand one\ranother, and that too without delay. I come to your house and want a\rbed; you tell me you can only give me half a one; that the other half\rbelongs to a certain harpooneer. And about this harpooneer, whom I have\rnot yet seen, you persist in telling me the most mystifying and\rexasperating stories tending to beget in me an uncomfortable feeling\rtowards the man whom you design for my bedfellow—a sort of connexion,\rlandlord, which is an intimate and confidential one in the highest\rdegree. I now demand of you to speak out and tell me who and what this\rharpooneer is, and whether I shall be in all respects safe to spend the\rnight with him. And in the first place, you will be so good as to unsay\rthat story about selling his head, which if true I take to be good\revidence that this harpooneer is stark mad, and I’ve no idea of\rsleeping with a madman; and you, sir, _you_ I mean, landlord, _you_,\rsir, by trying to induce me to do so knowingly, would thereby render\ryourself liable to a criminal prosecution.”\r\r“Wall,” said the landlord, fetching a long breath, “that’s a purty long\rsarmon for a chap that rips a little now and then. But be easy, be\reasy, this here harpooneer I have been tellin’ you of has just arrived\rfrom the south seas, where he bought up a lot of ’balmed New Zealand\rheads (great curios, you know), and he’s sold all on ’em but one, and\rthat one he’s trying to sell to-night, cause to-morrow’s Sunday, and it\rwould not do to be sellin’ human heads about the streets when folks is\rgoin’ to churches. He wanted to, last Sunday, but I stopped him just as\rhe was goin’ out of the door with four heads strung on a string, for\rall the airth like a string of inions.”\r\rThis account cleared up the otherwise unaccountable mystery, and showed\rthat the landlord, after all, had had no idea of fooling me—but at the\rsame time what could I think of a harpooneer who stayed out of a\rSaturday night clean into the holy Sabbath, engaged in such a cannibal\rbusiness as selling the heads of dead idolators?\r\r“Depend upon it, landlord, that harpooneer is a dangerous man.”\r\r“He pays reg’lar,” was the rejoinder. “But come, it’s getting dreadful\rlate, you had better be turning flukes—it’s a nice bed; Sal and me\rslept in that ere bed the night we were spliced. There’s plenty of room\rfor two to kick about in that bed; it’s an almighty big bed that. Why,\rafore we give it up, Sal used to put our Sam and little Johnny in the\rfoot of it. But I got a dreaming and sprawling about one night, and\rsomehow, Sam got pitched on the floor, and came near breaking his arm.\rArter that, Sal said it wouldn’t do. Come along here, I’ll give ye a\rglim in a jiffy;” and so saying he lighted a candle and held it towards\rme, offering to lead the way. But I stood irresolute; when looking at a\rclock in the corner, he exclaimed “I vum it’s Sunday—you won’t see that\rharpooneer to-night; he’s come to anchor somewhere—come along then;\r_do_ come; _won’t_ ye come?”\r\rI considered the matter a moment, and then up stairs we went, and I was\rushered into a small room, cold as a clam, and furnished, sure enough,\rwith a prodigious bed, almost big enough indeed for any four\rharpooneers to sleep abreast.\r\r“There,” said the landlord, placing the candle on a crazy old sea chest\rthat did double duty as a wash-stand and centre table; “there, make\ryourself comfortable now, and good night to ye.” I turned round from\reyeing the bed, but he had disappeared.\r\rFolding back the counterpane, I stooped over the bed. Though none of\rthe most elegant, it yet stood the scrutiny tolerably well. I then\rglanced round the room; and besides the bedstead and centre table,\rcould see no other furniture belonging to the place, but a rude shelf,\rthe four walls, and a papered fireboard representing a man striking a\rwhale. Of things not properly belonging to the room, there was a\rhammock lashed up, and thrown upon the floor in one corner; also a\rlarge seaman’s bag, containing the harpooneer’s wardrobe, no doubt in\rlieu of a land trunk. Likewise, there was a parcel of outlandish bone\rfish hooks on the shelf over the fire-place, and a tall harpoon\rstanding at the head of the bed.\r\rBut what is this on the chest? I took it up, and held it close to the\rlight, and felt it, and smelt it, and tried every way possible to\rarrive at some satisfactory conclusion concerning it. I can compare it\rto nothing but a large door mat, ornamented at the edges with little\rtinkling tags something like the stained porcupine quills round an\rIndian moccasin. There was a hole or slit in the middle of this mat, as\ryou see the same in South American ponchos. But could it be possible\rthat any sober harpooneer would get into a door mat, and parade the\rstreets of any Christian town in that sort of guise? I put it on, to\rtry it, and it weighed me down like a hamper, being uncommonly shaggy\rand thick, and I thought a little damp, as though this mysterious\rharpooneer had been wearing it of a rainy day. I went up in it to a bit\rof glass stuck against the wall, and I never saw such a sight in my\rlife. I tore myself out of it in such a hurry that I gave myself a kink\rin the neck.\r\rI sat down on the side of the bed, and commenced thinking about this\rhead-peddling harpooneer, and his door mat. After thinking some time on\rthe bed-side, I got up and took off my monkey jacket, and then stood in\rthe middle of the room thinking. I then took off my coat, and thought a\rlittle more in my shirt sleeves. But beginning to feel very cold now,\rhalf undressed as I was, and remembering what the landlord said about\rthe harpooneer’s not coming home at all that night, it being so very\rlate, I made no more ado, but jumped out of my pantaloons and boots,\rand then blowing out the light tumbled into bed, and commended myself\rto the care of heaven.\r\rWhether that mattress was stuffed with corn-cobs or broken crockery,\rthere is no telling, but I rolled about a good deal, and could not\rsleep for a long time. At last I slid off into a light doze, and had\rpretty nearly made a good offing towards the land of Nod, when I heard\ra heavy footfall in the passage, and saw a glimmer of light come into\rthe room from under the door.\r\rLord save me, thinks I, that must be the harpooneer, the infernal\rhead-peddler. But I lay perfectly still, and resolved not to say a word\rtill spoken to. Holding a light in one hand, and that identical New\rZealand head in the other, the stranger entered the room, and without\rlooking towards the bed, placed his candle a good way off from me on\rthe floor in one corner, and then began working away at the knotted\rcords of the large bag I before spoke of as being in the room. I was\rall eagerness to see his face, but he kept it averted for some time\rwhile employed in unlacing the bag’s mouth. This accomplished, however,\rhe turned round—when, good heavens! what a sight! Such a face! It was\rof a dark, purplish, yellow colour, here and there stuck over with\rlarge blackish looking squares. Yes, it’s just as I thought, he’s a\rterrible bedfellow; he’s been in a fight, got dreadfully cut, and here\rhe is, just from the surgeon. But at that moment he chanced to turn his\rface so towards the light, that I plainly saw they could not be\rsticking-plasters at all, those black squares on his cheeks. They were\rstains of some sort or other. At first I knew not what to make of this;\rbut soon an inkling of the truth occurred to me. I remembered a story\rof a white man—a whaleman too—who, falling among the cannibals, had\rbeen tattooed by them. I concluded that this harpooneer, in the course\rof his distant voyages, must have met with a similar adventure. And\rwhat is it, thought I, after all! It’s only his outside; a man can be\rhonest in any sort of skin. But then, what to make of his unearthly\rcomplexion, that part of it, I mean, lying round about, and completely\rindependent of the squares of tattooing. To be sure, it might be\rnothing but a good coat of tropical tanning; but I never heard of a hot\rsun’s tanning a white man into a purplish yellow one. However, I had\rnever been in the South Seas; and perhaps the sun there produced these\rextraordinary effects upon the skin. Now, while all these ideas were\rpassing through me like lightning, this harpooneer never noticed me at\rall. But, after some difficulty having opened his bag, he commenced\rfumbling in it, and presently pulled out a sort of tomahawk, and a\rseal-skin wallet with the hair on. Placing these on the old chest in\rthe middle of the room, he then took the New Zealand head—a ghastly\rthing enough—and crammed it down into the bag. He now took off his\rhat—a new beaver hat—when I came nigh singing out with fresh surprise.\rThere was no hair on his head—none to speak of at least—nothing but a\rsmall scalp-knot twisted up on his forehead. His bald purplish head now\rlooked for all the world like a mildewed skull. Had not the stranger\rstood between me and the door, I would have bolted out of it quicker\rthan ever I bolted a dinner.\r\rEven as it was, I thought something of slipping out of the window, but\rit was the second floor back. I am no coward, but what to make of this\rhead-peddling purple rascal altogether passed my comprehension.\rIgnorance is the parent of fear, and being completely nonplussed and\rconfounded about the stranger, I confess I was now as much afraid of\rhim as if it was the devil himself who had thus broken into my room at\rthe dead of night. In fact, I was so afraid of him that I was not game\renough just then to address him, and demand a satisfactory answer\rconcerning what seemed inexplicable in him.\r\rMeanwhile, he continued the business of undressing, and at last showed\rhis chest and arms. As I live, these covered parts of him were\rcheckered with the same squares as his face; his back, too, was all\rover the same dark squares; he seemed to have been in a Thirty Years’\rWar, and just escaped from it with a sticking-plaster shirt. Still\rmore, his very legs were marked, as if a parcel of dark green frogs\rwere running up the trunks of young palms. It was now quite plain that\rhe must be some abominable savage or other shipped aboard of a whaleman\rin the South Seas, and so landed in this Christian country. I quaked to\rthink of it. A peddler of heads too—perhaps the heads of his own\rbrothers. He might take a fancy to mine—heavens! look at that tomahawk!\r\rBut there was no time for shuddering, for now the savage went about\rsomething that completely fascinated my attention, and convinced me\rthat he must indeed be a heathen. Going to his heavy grego, or wrapall,\ror dreadnaught, which he had previously hung on a chair, he fumbled in\rthe pockets, and produced at length a curious little deformed image\rwith a hunch on its back, and exactly the colour of a three days’ old\rCongo baby. Remembering the embalmed head, at first I almost thought\rthat this black manikin was a real baby preserved in some similar\rmanner. But seeing that it was not at all limber, and that it glistened\ra good deal like polished ebony, I concluded that it must be nothing\rbut a wooden idol, which indeed it proved to be. For now the savage\rgoes up to the empty fire-place, and removing the papered fire-board,\rsets up this little hunch-backed image, like a tenpin, between the\randirons. The chimney jambs and all the bricks inside were very sooty,\rso that I thought this fire-place made a very appropriate little shrine\ror chapel for his Congo idol.\r\rI now screwed my eyes hard towards the half hidden image, feeling but\rill at ease meantime—to see what was next to follow. First he takes\rabout a double handful of shavings out of his grego pocket, and places\rthem carefully before the idol; then laying a bit of ship biscuit on\rtop and applying the flame from the lamp, he kindled the shavings into\ra sacrificial blaze. Presently, after many hasty snatches into the\rfire, and still hastier withdrawals of his fingers (whereby he seemed\rto be scorching them badly), he at last succeeded in drawing out the\rbiscuit; then blowing off the heat and ashes a little, he made a polite\roffer of it to the little negro. But the little devil did not seem to\rfancy such dry sort of fare at all; he never moved his lips. All these\rstrange antics were accompanied by still stranger guttural noises from\rthe devotee, who seemed to be praying in a sing-song or else singing\rsome pagan psalmody or other, during which his face twitched about in\rthe most unnatural manner. At last extinguishing the fire, he took the\ridol up very unceremoniously, and bagged it again in his grego pocket\ras carelessly as if he were a sportsman bagging a dead woodcock.\r\rAll these queer proceedings increased my uncomfortableness, and seeing\rhim now exhibiting strong symptoms of concluding his business\roperations, and jumping into bed with me, I thought it was high time,\rnow or never, before the light was put out, to break the spell in which\rI had so long been bound.\r\rBut the interval I spent in deliberating what to say, was a fatal one.\rTaking up his tomahawk from the table, he examined the head of it for\ran instant, and then holding it to the light, with his mouth at the\rhandle, he puffed out great clouds of tobacco smoke. The next moment\rthe light was extinguished, and this wild cannibal, tomahawk between\rhis teeth, sprang into bed with me. I sang out, I could not help it\rnow; and giving a sudden grunt of astonishment he began feeling me.\r\rStammering out something, I knew not what, I rolled away from him\ragainst the wall, and then conjured him, whoever or whatever he might\rbe, to keep quiet, and let me get up and light the lamp again. But his\rguttural responses satisfied me at once that he but ill comprehended my\rmeaning.\r\r“Who-e debel you?”—he at last said—“you no speak-e, dam-me, I kill-e.”\rAnd so saying the lighted tomahawk began flourishing about me in the\rdark.\r\r“Landlord, for God’s sake, Peter Coffin!” shouted I. “Landlord! Watch!\rCoffin! Angels! save me!”\r\r“Speak-e! tell-ee me who-ee be, or dam-me, I kill-e!” again growled the\rcannibal, while his horrid flourishings of the tomahawk scattered the\rhot tobacco ashes about me till I thought my linen would get on fire.\rBut thank heaven, at that moment the landlord came into the room light\rin hand, and leaping from the bed I ran up to him.\r\r“Don’t be afraid now,” said he, grinning again, “Queequeg here wouldn’t\rharm a hair of your head.”\r\r“Stop your grinning,” shouted I, “and why didn’t you tell me that that\rinfernal harpooneer was a cannibal?”\r\r“I thought ye know’d it;—didn’t I tell ye, he was a peddlin’ heads\raround town?—but turn flukes again and go to sleep. Queequeg, look\rhere—you sabbee me, I sabbee—you this man sleepe you—you sabbee?”\r\r“Me sabbee plenty”—grunted Queequeg, puffing away at his pipe and\rsitting up in bed.\r\r“You gettee in,” he added, motioning to me with his tomahawk, and\rthrowing the clothes to one side. He really did this in not only a\rcivil but a really kind and charitable way. I stood looking at him a\rmoment. For all his tattooings he was on the whole a clean, comely\rlooking cannibal. What’s all this fuss I have been making about,\rthought I to myself—the man’s a human being just as I am: he has just\ras much reason to fear me, as I have to be afraid of him. Better sleep\rwith a sober cannibal than a drunken Christian.\r\r“Landlord,” said I, “tell him to stash his tomahawk there, or pipe, or\rwhatever you call it; tell him to stop smoking, in short, and I will\rturn in with him. But I don’t fancy having a man smoking in bed with\rme. It’s dangerous. Besides, I ain’t insured.”\r\rThis being told to Queequeg, he at once complied, and again politely\rmotioned me to get into bed—rolling over to one side as much as to\rsay—“I won’t touch a leg of ye.”\r\r“Good night, landlord,” said I, “you may go.”\r\rI turned in, and never slept better in my life.\r\r\rCHAPTER 4. The Counterpane.\r\rUpon waking next morning about daylight, I found Queequeg’s arm thrown\rover me in the most loving and affectionate manner. You had almost\rthought I had been his wife. The counterpane was of patchwork, full of\rodd little parti-coloured squares and triangles; and this arm of his\rtattooed all over with an interminable Cretan labyrinth of a figure, no\rtwo parts of which were of one precise shade—owing I suppose to his\rkeeping his arm at sea unmethodically in sun and shade, his shirt\rsleeves irregularly rolled up at various times—this same arm of his, I\rsay, looked for all the world like a strip of that same patchwork\rquilt. Indeed, partly lying on it as the arm did when I first awoke, I\rcould hardly tell it from the quilt, they so blended their hues\rtogether; and it was only by the sense of weight and pressure that I\rcould tell that Queequeg was hugging me.\r\rMy sensations were strange. Let me try to explain them. When I was a\rchild, I well remember a somewhat similar circumstance that befell me;\rwhether it was a reality or a dream, I never could entirely settle. The\rcircumstance was this. I had been cutting up some caper or other—I\rthink it was trying to crawl up the chimney, as I had seen a little\rsweep do a few days previous; and my stepmother who, somehow or other,\rwas all the time whipping me, or sending me to bed supperless,—my\rmother dragged me by the legs out of the chimney and packed me off to\rbed, though it was only two o’clock in the afternoon of the 21st June,\rthe longest day in the year in our hemisphere. I felt dreadfully. But\rthere was no help for it, so up stairs I went to my little room in the\rthird floor, undressed myself as slowly as possible so as to kill time,\rand with a bitter sigh got between the sheets.\r\rI lay there dismally calculating that sixteen entire hours must elapse\rbefore I could hope for a resurrection. Sixteen hours in bed! the small\rof my back ached to think of it. And it was so light too; the sun\rshining in at the window, and a great rattling of coaches in the\rstreets, and the sound of gay voices all over the house. I felt worse\rand worse—at last I got up, dressed, and softly going down in my\rstockinged feet, sought out my stepmother, and suddenly threw myself at\rher feet, beseeching her as a particular favour to give me a good\rslippering for my misbehaviour; anything indeed but condemning me to\rlie abed such an unendurable length of time. But she was the best and\rmost conscientious of stepmothers, and back I had to go to my room. For\rseveral hours I lay there broad awake, feeling a great deal worse than\rI have ever done since, even from the greatest subsequent misfortunes.\rAt last I must have fallen into a troubled nightmare of a doze; and\rslowly waking from it—half steeped in dreams—I opened my eyes, and the\rbefore sun-lit room was now wrapped in outer darkness. Instantly I felt\ra shock running through all my frame; nothing was to be seen, and\rnothing was to be heard; but a supernatural hand seemed placed in mine.\rMy arm hung over the counterpane, and the nameless, unimaginable,\rsilent form or phantom, to which the hand belonged, seemed closely\rseated by my bed-side. For what seemed ages piled on ages, I lay there,\rfrozen with the most awful fears, not daring to drag away my hand; yet\rever thinking that if I could but stir it one single inch, the horrid\rspell would be broken. I knew not how this consciousness at last glided\raway from me; but waking in the morning, I shudderingly remembered it\rall, and for days and weeks and months afterwards I lost myself in\rconfounding attempts to explain the mystery. Nay, to this very hour, I\roften puzzle myself with it.\r\rNow, take away the awful fear, and my sensations at feeling the\rsupernatural hand in mine were very similar, in their strangeness, to\rthose which I experienced on waking up and seeing Queequeg’s pagan arm\rthrown round me. But at length all the past night’s events soberly\rrecurred, one by one, in fixed reality, and then I lay only alive to\rthe comical predicament. For though I tried to move his arm—unlock his\rbridegroom clasp—yet, sleeping as he was, he still hugged me tightly,\ras though naught but death should part us twain. I now strove to rouse\rhim—“Queequeg!”—but his only answer was a snore. I then rolled over, my\rneck feeling as if it were in a horse-collar; and suddenly felt a\rslight scratch. Throwing aside the counterpane, there lay the tomahawk\rsleeping by the savage’s side, as if it were a hatchet-faced baby. A\rpretty pickle, truly, thought I; abed here in a strange house in the\rbroad day, with a cannibal and a tomahawk! “Queequeg!—in the name of\rgoodness, Queequeg, wake!” At length, by dint of much wriggling, and\rloud and incessant expostulations upon the unbecomingness of his\rhugging a fellow male in that matrimonial sort of style, I succeeded in\rextracting a grunt; and presently, he drew back his arm, shook himself\rall over like a Newfoundland dog just from the water, and sat up in\rbed, stiff as a pike-staff, looking at me, and rubbing his eyes as if\rhe did not altogether remember how I came to be there, though a dim\rconsciousness of knowing something about me seemed slowly dawning over\rhim. Meanwhile, I lay quietly eyeing him, having no serious misgivings\rnow, and bent upon narrowly observing so curious a creature. When, at\rlast, his mind seemed made up touching the character of his bedfellow,\rand he became, as it were, reconciled to the fact; he jumped out upon\rthe floor, and by certain signs and sounds gave me to understand that,\rif it pleased me, he would dress first and then leave me to dress\rafterwards, leaving the whole apartment to myself. Thinks I, Queequeg,\runder the circumstances, this is a very civilized overture; but, the\rtruth is, these savages have an innate sense of delicacy, say what you\rwill; it is marvellous how essentially polite they are. I pay this\rparticular compliment to Queequeg, because he treated me with so much\rcivility and consideration, while I was guilty of great rudeness;\rstaring at him from the bed, and watching all his toilette motions; for\rthe time my curiosity getting the better of my breeding. Nevertheless,\ra man like Queequeg you don’t see every day, he and his ways were well\rworth unusual regarding.\r\rHe commenced dressing at top by donning his beaver hat, a very tall\rone, by the by, and then—still minus his trowsers—he hunted up his\rboots. What under the heavens he did it for, I cannot tell, but his\rnext movement was to crush himself—boots in hand, and hat on—under the\rbed; when, from sundry violent gaspings and strainings, I inferred he\rwas hard at work booting himself; though by no law of propriety that I\rever heard of, is any man required to be private when putting on his\rboots. But Queequeg, do you see, was a creature in the transition\rstage—neither caterpillar nor butterfly. He was just enough civilized\rto show off his outlandishness in the strangest possible manners. His\reducation was not yet completed. He was an undergraduate. If he had not\rbeen a small degree civilized, he very probably would not have troubled\rhimself with boots at all; but then, if he had not been still a savage,\rhe never would have dreamt of getting under the bed to put them on. At\rlast, he emerged with his hat very much dented and crushed down over\rhis eyes, and began creaking and limping about the room, as if, not\rbeing much accustomed to boots, his pair of damp, wrinkled cowhide\rones—probably not made to order either—rather pinched and tormented him\rat the first go off of a bitter cold morning.\r\rSeeing, now, that there were no curtains to the window, and that the\rstreet being very narrow, the house opposite commanded a plain view\rinto the room, and observing more and more the indecorous figure that\rQueequeg made, staving about with little else but his hat and boots on;\rI begged him as well as I could, to accelerate his toilet somewhat, and\rparticularly to get into his pantaloons as soon as possible. He\rcomplied, and then proceeded to wash himself. At that time in the\rmorning any Christian would have washed his face; but Queequeg, to my\ramazement, contented himself with restricting his ablutions to his\rchest, arms, and hands. He then donned his waistcoat, and taking up a\rpiece of hard soap on the wash-stand centre table, dipped it into water\rand commenced lathering his face. I was watching to see where he kept\rhis razor, when lo and behold, he takes the harpoon from the bed\rcorner, slips out the long wooden stock, unsheathes the head, whets it\ra little on his boot, and striding up to the bit of mirror against the\rwall, begins a vigorous scraping, or rather harpooning of his cheeks.\rThinks I, Queequeg, this is using Rogers’s best cutlery with a\rvengeance. Afterwards I wondered the less at this operation when I came\rto know of what fine steel the head of a harpoon is made, and how\rexceedingly sharp the long straight edges are always kept.\r\rThe rest of his toilet was soon achieved, and he proudly marched out of\rthe room, wrapped up in his great pilot monkey jacket, and sporting his\rharpoon like a marshal’s baton.\r\r\rCHAPTER 5. Breakfast.\r\rI quickly followed suit, and descending into the bar-room accosted the\rgrinning landlord very pleasantly. I cherished no malice towards him,\rthough he had been skylarking with me not a little in the matter of my\rbedfellow.\r\rHowever, a good laugh is a mighty good thing, and rather too scarce a\rgood thing; the more’s the pity. So, if any one man, in his own proper\rperson, afford stuff for a good joke to anybody, let him not be\rbackward, but let him cheerfully allow himself to spend and be spent in\rthat way. And the man that has anything bountifully laughable about\rhim, be sure there is more in that man than you perhaps think for.\r\rThe bar-room was now full of the boarders who had been dropping in the\rnight previous, and whom I had not as yet had a good look at. They were\rnearly all whalemen; chief mates, and second mates, and third mates,\rand sea carpenters, and sea coopers, and sea blacksmiths, and\rharpooneers, and ship keepers; a brown and brawny company, with bosky\rbeards; an unshorn, shaggy set, all wearing monkey jackets for morning\rgowns.\r\rYou could pretty plainly tell how long each one had been ashore. This\ryoung fellow’s healthy cheek is like a sun-toasted pear in hue, and\rwould seem to smell almost as musky; he cannot have been three days\rlanded from his Indian voyage. That man next him looks a few shades\rlighter; you might say a touch of satin wood is in him. In the\rcomplexion of a third still lingers a tropic tawn, but slightly\rbleached withal; _he_ doubtless has tarried whole weeks ashore. But who\rcould show a cheek like Queequeg? which, barred with various tints,\rseemed like the Andes’ western slope, to show forth in one array,\rcontrasting climates, zone by zone.\r\r“Grub, ho!” now cried the landlord, flinging open a door, and in we\rwent to breakfast.\r\rThey say that men who have seen the world, thereby become quite at ease\rin manner, quite self-possessed in company. Not always, though:\rLedyard, the great New England traveller, and Mungo Park, the Scotch\rone; of all men, they possessed the least assurance in the parlor. But\rperhaps the mere crossing of Siberia in a sledge drawn by dogs as\rLedyard did, or the taking a long solitary walk on an empty stomach, in\rthe negro heart of Africa, which was the sum of poor Mungo’s\rperformances—this kind of travel, I say, may not be the very best mode\rof attaining a high social polish. Still, for the most part, that sort\rof thing is to be had anywhere.\r\rThese reflections just here are occasioned by the circumstance that\rafter we were all seated at the table, and I was preparing to hear some\rgood stories about whaling; to my no small surprise, nearly every man\rmaintained a profound silence. And not only that, but they looked\rembarrassed. Yes, here were a set of sea-dogs, many of whom without the\rslightest bashfulness had boarded great whales on the high seas—entire\rstrangers to them—and duelled them dead without winking; and yet, here\rthey sat at a social breakfast table—all of the same calling, all of\rkindred tastes—looking round as sheepishly at each other as though they\rhad never been out of sight of some sheepfold among the Green\rMountains. A curious sight; these bashful bears, these timid warrior\rwhalemen!\r\rBut as for Queequeg—why, Queequeg sat there among them—at the head of\rthe table, too, it so chanced; as cool as an icicle. To be sure I\rcannot say much for his breeding. His greatest admirer could not have\rcordially justified his bringing his harpoon into breakfast with him,\rand using it there without ceremony; reaching over the table with it,\rto the imminent jeopardy of many heads, and grappling the beefsteaks\rtowards him. But _that_ was certainly very coolly done by him, and\revery one knows that in most people’s estimation, to do anything coolly\ris to do it genteelly.\r\rWe will not speak of all Queequeg’s peculiarities here; how he eschewed\rcoffee and hot rolls, and applied his undivided attention to\rbeefsteaks, done rare. Enough, that when breakfast was over he withdrew\rlike the rest into the public room, lighted his tomahawk-pipe, and was\rsitting there quietly digesting and smoking with his inseparable hat\ron, when I sallied out for a stroll.\r\r\rCHAPTER 6. The Street.\r\rIf I had been astonished at first catching a glimpse of so outlandish\ran individual as Queequeg circulating among the polite society of a\rcivilized town, that astonishment soon departed upon taking my first\rdaylight stroll through the streets of New Bedford.\r\rIn thoroughfares nigh the docks, any considerable seaport will\rfrequently offer to view the queerest looking nondescripts from foreign\rparts. Even in Broadway and Chestnut streets, Mediterranean mariners\rwill sometimes jostle the affrighted ladies. Regent Street is not\runknown to Lascars and Malays; and at Bombay, in the Apollo Green, live\rYankees have often scared the natives. But New Bedford beats all Water\rStreet and Wapping. In these last-mentioned haunts you see only\rsailors; but in New Bedford, actual cannibals stand chatting at street\rcorners; savages outright; many of whom yet carry on their bones unholy\rflesh. It makes a stranger stare.\r\rBut, besides the Feegeeans, Tongatobooarrs, Erromanggoans, Pannangians,\rand Brighggians, and, besides the wild specimens of the whaling-craft\rwhich unheeded reel about the streets, you will see other sights still\rmore curious, certainly more comical. There weekly arrive in this town\rscores of green Vermonters and New Hampshire men, all athirst for gain\rand glory in the fishery. They are mostly young, of stalwart frames;\rfellows who have felled forests, and now seek to drop the axe and\rsnatch the whale-lance. Many are as green as the Green Mountains whence\rthey came. In some things you would think them but a few hours old.\rLook there! that chap strutting round the corner. He wears a beaver hat\rand swallow-tailed coat, girdled with a sailor-belt and sheath-knife.\rHere comes another with a sou’-wester and a bombazine cloak.\r\rNo town-bred dandy will compare with a country-bred one—I mean a\rdownright bumpkin dandy—a fellow that, in the dog-days, will mow his\rtwo acres in buckskin gloves for fear of tanning his hands. Now when a\rcountry dandy like this takes it into his head to make a distinguished\rreputation, and joins the great whale-fishery, you should see the\rcomical things he does upon reaching the seaport. In bespeaking his\rsea-outfit, he orders bell-buttons to his waistcoats; straps to his\rcanvas trowsers. Ah, poor Hay-Seed! how bitterly will burst those\rstraps in the first howling gale, when thou art driven, straps,\rbuttons, and all, down the throat of the tempest.\r\rBut think not that this famous town has only harpooneers, cannibals,\rand bumpkins to show her visitors. Not at all. Still New Bedford is a\rqueer place. Had it not been for us whalemen, that tract of land would\rthis day perhaps have been in as howling condition as the coast of\rLabrador. As it is, parts of her back country are enough to frighten\rone, they look so bony. The town itself is perhaps the dearest place to\rlive in, in all New England. It is a land of oil, true enough: but not\rlike Canaan; a land, also, of corn and wine. The streets do not run\rwith milk; nor in the spring-time do they pave them with fresh eggs.\rYet, in spite of this, nowhere in all America will you find more\rpatrician-like houses; parks and gardens more opulent, than in New\rBedford. Whence came they? how planted upon this once scraggy scoria of\ra country?\r\rGo and gaze upon the iron emblematical harpoons round yonder lofty\rmansion, and your question will be answered. Yes; all these brave\rhouses and flowery gardens came from the Atlantic, Pacific, and Indian\roceans. One and all, they were harpooned and dragged up hither from the\rbottom of the sea. Can Herr Alexander perform a feat like that?\r\rIn New Bedford, fathers, they say, give whales for dowers to their\rdaughters, and portion off their nieces with a few porpoises a-piece.\rYou must go to New Bedford to see a brilliant wedding; for, they say,\rthey have reservoirs of oil in every house, and every night recklessly\rburn their lengths in spermaceti candles.\r\rIn summer time, the town is sweet to see; full of fine maples—long\ravenues of green and gold. And in August, high in air, the beautiful\rand bountiful horse-chestnuts, candelabra-wise, proffer the passer-by\rtheir tapering upright cones of congregated blossoms. So omnipotent is\rart; which in many a district of New Bedford has superinduced bright\rterraces of flowers upon the barren refuse rocks thrown aside at\rcreation’s final day.\r\rAnd the women of New Bedford, they bloom like their own red roses. But\rroses only bloom in summer; whereas the fine carnation of their cheeks\ris perennial as sunlight in the seventh heavens. Elsewhere match that\rbloom of theirs, ye cannot, save in Salem, where they tell me the young\rgirls breathe such musk, their sailor sweethearts smell them miles off\rshore, as though they were drawing nigh the odorous Moluccas instead of\rthe Puritanic sands.\r\r\rCHAPTER 7. The Chapel.\r\rIn this same New Bedford there stands a Whaleman’s Chapel, and few are\rthe moody fishermen, shortly bound for the Indian Ocean or Pacific, who\rfail to make a Sunday visit to the spot. I am sure that I did not.\r\rReturning from my first morning stroll, I again sallied out upon this\rspecial errand. The sky had changed from clear, sunny cold, to driving\rsleet and mist. Wrapping myself in my shaggy jacket of the cloth called\rbearskin, I fought my way against the stubborn storm. Entering, I found\ra small scattered congregation of sailors, and sailors’ wives and\rwidows. A muffled silence reigned, only broken at times by the shrieks\rof the storm. Each silent worshipper seemed purposely sitting apart\rfrom the other, as if each silent grief were insular and\rincommunicable. The chaplain had not yet arrived; and there these\rsilent islands of men and women sat steadfastly eyeing several marble\rtablets, with black borders, masoned into the wall on either side the\rpulpit. Three of them ran something like the following, but I do not\rpretend to quote:—\r\rSACRED TO THE MEMORY OF JOHN TALBOT, Who, at the age of eighteen, was\rlost overboard, Near the Isle of Desolation, off Patagonia, _November_\r1_st_, 1836. THIS TABLET Is erected to his Memory BY HIS SISTER.\r\rSACRED TO THE MEMORY OF ROBERT LONG, WILLIS ELLERY, NATHAN COLEMAN,\rWALTER CANNY, SETH MACY, AND SAMUEL GLEIG, Forming one of the boats’\rcrews OF THE SHIP ELIZA Who were towed out of sight by a Whale, On the\rOff-shore Ground in the PACIFIC, _December_ 31_st_, 1839. THIS MARBLE\rIs here placed by their surviving SHIPMATES.\r\rSACRED TO THE MEMORY OF The late CAPTAIN EZEKIEL HARDY, Who in the bows\rof his boat was killed by a Sperm Whale on the coast of Japan, _August_\r3_d_, 1833. THIS TABLET Is erected to his Memory BY HIS WIDOW.\r\rShaking off the sleet from my ice-glazed hat and jacket, I seated\rmyself near the door, and turning sideways was surprised to see\rQueequeg near me. Affected by the solemnity of the scene, there was a\rwondering gaze of incredulous curiosity in his countenance. This savage\rwas the only person present who seemed to notice my entrance; because\rhe was the only one who could not read, and, therefore, was not reading\rthose frigid inscriptions on the wall. Whether any of the relatives of\rthe seamen whose names appeared there were now among the congregation,\rI knew not; but so many are the unrecorded accidents in the fishery,\rand so plainly did several women present wear the countenance if not\rthe trappings of some unceasing grief, that I feel sure that here\rbefore me were assembled those, in whose unhealing hearts the sight of\rthose bleak tablets sympathetically caused the old wounds to bleed\rafresh.\r\rOh! ye whose dead lie buried beneath the green grass; who standing\ramong flowers can say—here, _here_ lies my beloved; ye know not the\rdesolation that broods in bosoms like these. What bitter blanks in\rthose black-bordered marbles which cover no ashes! What despair in\rthose immovable inscriptions! What deadly voids and unbidden\rinfidelities in the lines that seem to gnaw upon all Faith, and refuse\rresurrections to the beings who have placelessly perished without a\rgrave. As well might those tablets stand in the cave of Elephanta as\rhere.\r\rIn what census of living creatures, the dead of mankind are included;\rwhy it is that a universal proverb says of them, that they tell no\rtales, though containing more secrets than the Goodwin Sands; how it is\rthat to his name who yesterday departed for the other world, we prefix\rso significant and infidel a word, and yet do not thus entitle him, if\rhe but embarks for the remotest Indies of this living earth; why the\rLife Insurance Companies pay death-forfeitures upon immortals; in what\reternal, unstirring paralysis, and deadly, hopeless trance, yet lies\rantique Adam who died sixty round centuries ago; how it is that we\rstill refuse to be comforted for those who we nevertheless maintain are\rdwelling in unspeakable bliss; why all the living so strive to hush all\rthe dead; wherefore but the rumor of a knocking in a tomb will terrify\ra whole city. All these things are not without their meanings.\r\rBut Faith, like a jackal, feeds among the tombs, and even from these\rdead doubts she gathers her most vital hope.\r\rIt needs scarcely to be told, with what feelings, on the eve of a\rNantucket voyage, I regarded those marble tablets, and by the murky\rlight of that darkened, doleful day read the fate of the whalemen who\rhad gone before me. Yes, Ishmael, the same fate may be thine. But\rsomehow I grew merry again. Delightful inducements to embark, fine\rchance for promotion, it seems—aye, a stove boat will make me an\rimmortal by brevet. Yes, there is death in this business of whaling—a\rspeechlessly quick chaotic bundling of a man into Eternity. But what\rthen? Methinks we have hugely mistaken this matter of Life and Death.\rMethinks that what they call my shadow here on earth is my true\rsubstance. Methinks that in looking at things spiritual, we are too\rmuch like oysters observing the sun through the water, and thinking\rthat thick water the thinnest of air. Methinks my body is but the lees\rof my better being. In fact take my body who will, take it I say, it is\rnot me. And therefore three cheers for Nantucket; and come a stove boat\rand stove body when they will, for stave my soul, Jove himself cannot.\r\r\rCHAPTER 8. The Pulpit.\r\rI had not been seated very long ere a man of a certain venerable\rrobustness entered; immediately as the storm-pelted door flew back upon\radmitting him, a quick regardful eyeing of him by all the congregation,\rsufficiently attested that this fine old man was the chaplain. Yes, it\rwas the famous Father Mapple, so called by the whalemen, among whom he\rwas a very great favourite. He had been a sailor and a harpooneer in\rhis youth, but for many years past had dedicated his life to the\rministry. At the time I now write of, Father Mapple was in the hardy\rwinter of a healthy old age; that sort of old age which seems merging\rinto a second flowering youth, for among all the fissures of his\rwrinkles, there shone certain mild gleams of a newly developing\rbloom—the spring verdure peeping forth even beneath February’s snow. No\rone having previously heard his history, could for the first time\rbehold Father Mapple without the utmost interest, because there were\rcertain engrafted clerical peculiarities about him, imputable to that\radventurous maritime life he had led. When he entered I observed that\rhe carried no umbrella, and certainly had not come in his carriage, for\rhis tarpaulin hat ran down with melting sleet, and his great pilot\rcloth jacket seemed almost to drag him to the floor with the weight of\rthe water it had absorbed. However, hat and coat and overshoes were one\rby one removed, and hung up in a little space in an adjacent corner;\rwhen, arrayed in a decent suit, he quietly approached the pulpit.\r\rLike most old fashioned pulpits, it was a very lofty one, and since a\rregular stairs to such a height would, by its long angle with the\rfloor, seriously contract the already small area of the chapel, the\rarchitect, it seemed, had acted upon the hint of Father Mapple, and\rfinished the pulpit without a stairs, substituting a perpendicular side\rladder, like those used in mounting a ship from a boat at sea. The wife\rof a whaling captain had provided the chapel with a handsome pair of\rred worsted man-ropes for this ladder, which, being itself nicely\rheaded, and stained with a mahogany colour, the whole contrivance,\rconsidering what manner of chapel it was, seemed by no means in bad\rtaste. Halting for an instant at the foot of the ladder, and with both\rhands grasping the ornamental knobs of the man-ropes, Father Mapple\rcast a look upwards, and then with a truly sailor-like but still\rreverential dexterity, hand over hand, mounted the steps as if\rascending the main-top of his vessel.\r\rThe perpendicular parts of this side ladder, as is usually the case\rwith swinging ones, were of cloth-covered rope, only the rounds were of\rwood, so that at every step there was a joint. At my first glimpse of\rthe pulpit, it had not escaped me that however convenient for a ship,\rthese joints in the present instance seemed unnecessary. For I was not\rprepared to see Father Mapple after gaining the height, slowly turn\rround, and stooping over the pulpit, deliberately drag up the ladder\rstep by step, till the whole was deposited within, leaving him\rimpregnable in his little Quebec.\r\rI pondered some time without fully comprehending the reason for this.\rFather Mapple enjoyed such a wide reputation for sincerity and\rsanctity, that I could not suspect him of courting notoriety by any\rmere tricks of the stage. No, thought I, there must be some sober\rreason for this thing; furthermore, it must symbolize something unseen.\rCan it be, then, that by that act of physical isolation, he signifies\rhis spiritual withdrawal for the time, from all outward worldly ties\rand connexions? Yes, for replenished with the meat and wine of the\rword, to the faithful man of God, this pulpit, I see, is a\rself-containing stronghold—a lofty Ehrenbreitstein, with a perennial\rwell of water within the walls.\r\rBut the side ladder was not the only strange feature of the place,\rborrowed from the chaplain’s former sea-farings. Between the marble\rcenotaphs on either hand of the pulpit, the wall which formed its back\rwas adorned with a large painting representing a gallant ship beating\ragainst a terrible storm off a lee coast of black rocks and snowy\rbreakers. But high above the flying scud and dark-rolling clouds, there\rfloated a little isle of sunlight, from which beamed forth an angel’s\rface; and this bright face shed a distinct spot of radiance upon the\rship’s tossed deck, something like that silver plate now inserted into\rthe Victory’s plank where Nelson fell. “Ah, noble ship,” the angel\rseemed to say, “beat on, beat on, thou noble ship, and bear a hardy\rhelm; for lo! the sun is breaking through; the clouds are rolling\roff—serenest azure is at hand.”\r\rNor was the pulpit itself without a trace of the same sea-taste that\rhad achieved the ladder and the picture. Its panelled front was in the\rlikeness of a ship’s bluff bows, and the Holy Bible rested on a\rprojecting piece of scroll work, fashioned after a ship’s fiddle-headed\rbeak.\r\rWhat could be more full of meaning?—for the pulpit is ever this earth’s\rforemost part; all the rest comes in its rear; the pulpit leads the\rworld. From thence it is the storm of God’s quick wrath is first\rdescried, and the bow must bear the earliest brunt. From thence it is\rthe God of breezes fair or foul is first invoked for favourable winds.\rYes, the world’s a ship on its passage out, and not a voyage complete;\rand the pulpit is its prow.\r\r\rCHAPTER 9. The Sermon.\r\rFather Mapple rose, and in a mild voice of unassuming authority ordered\rthe scattered people to condense. “Starboard gangway, there! side away\rto larboard—larboard gangway to starboard! Midships! midships!”\r\rThere was a low rumbling of heavy sea-boots among the benches, and a\rstill slighter shuffling of women’s shoes, and all was quiet again, and\revery eye on the preacher.\r\rHe paused a little; then kneeling in the pulpit’s bows, folded his\rlarge brown hands across his chest, uplifted his closed eyes, and\roffered a prayer so deeply devout that he seemed kneeling and praying\rat the bottom of the sea.\r\rThis ended, in prolonged solemn tones, like the continual tolling of a\rbell in a ship that is foundering at sea in a fog—in such tones he\rcommenced reading the following hymn; but changing his manner towards\rthe concluding stanzas, burst forth with a pealing exultation and joy—\r\r\r  “The ribs and terrors in the whale, Arched over me a dismal gloom,\r  While all God’s sun-lit waves rolled by, And lift me deepening down\r  to doom.\r\r  “I saw the opening maw of hell, With endless pains and sorrows there;\r  Which none but they that feel can tell— Oh, I was plunging to\r  despair.\r\r  “In black distress, I called my God, When I could scarce believe him\r  mine, He bowed his ear to my complaints— No more the whale did me\r  confine.\r\r  “With speed he flew to my relief, As on a radiant dolphin borne;\r  Awful, yet bright, as lightning shone The face of my Deliverer God.\r\r  “My song for ever shall record That terrible, that joyful hour; I\r  give the glory to my God, His all the mercy and the power.”\r\r\r\r\rNearly all joined in singing this hymn, which swelled high above the\rhowling of the storm. A brief pause ensued; the preacher slowly turned\rover the leaves of the Bible, and at last, folding his hand down upon\rthe proper page, said: “Beloved shipmates, clinch the last verse of the\rfirst chapter of Jonah—‘And God had prepared a great fish to swallow up\rJonah.’”\r\r“Shipmates, this book, containing only four chapters—four yarns—is one\rof the smallest strands in the mighty cable of the Scriptures. Yet what\rdepths of the soul does Jonah’s deep sealine sound! what a pregnant\rlesson to us is this prophet! What a noble thing is that canticle in\rthe fish’s belly! How billow-like and boisterously grand! We feel the\rfloods surging over us; we sound with him to the kelpy bottom of the\rwaters; sea-weed and all the slime of the sea is about us! But _what_\ris this lesson that the book of Jonah teaches? Shipmates, it is a\rtwo-stranded lesson; a lesson to us all as sinful men, and a lesson to\rme as a pilot of the living God. As sinful men, it is a lesson to us\rall, because it is a story of the sin, hard-heartedness, suddenly\rawakened fears, the swift punishment, repentance, prayers, and finally\rthe deliverance and joy of Jonah. As with all sinners among men, the\rsin of this son of Amittai was in his wilful disobedience of the\rcommand of God—never mind now what that command was, or how\rconveyed—which he found a hard command. But all the things that God\rwould have us do are hard for us to do—remember that—and hence, he\roftener commands us than endeavors to persuade. And if we obey God, we\rmust disobey ourselves; and it is in this disobeying ourselves, wherein\rthe hardness of obeying God consists.\r\r“With this sin of disobedience in him, Jonah still further flouts at\rGod, by seeking to flee from Him. He thinks that a ship made by men\rwill carry him into countries where God does not reign, but only the\rCaptains of this earth. He skulks about the wharves of Joppa, and seeks\ra ship that’s bound for Tarshish. There lurks, perhaps, a hitherto\runheeded meaning here. By all accounts Tarshish could have been no\rother city than the modern Cadiz. That’s the opinion of learned men.\rAnd where is Cadiz, shipmates? Cadiz is in Spain; as far by water, from\rJoppa, as Jonah could possibly have sailed in those ancient days, when\rthe Atlantic was an almost unknown sea. Because Joppa, the modern\rJaffa, shipmates, is on the most easterly coast of the Mediterranean,\rthe Syrian; and Tarshish or Cadiz more than two thousand miles to the\rwestward from that, just outside the Straits of Gibraltar. See ye not\rthen, shipmates, that Jonah sought to flee world-wide from God?\rMiserable man! Oh! most contemptible and worthy of all scorn; with\rslouched hat and guilty eye, skulking from his God; prowling among the\rshipping like a vile burglar hastening to cross the seas. So\rdisordered, self-condemning is his look, that had there been policemen\rin those days, Jonah, on the mere suspicion of something wrong, had\rbeen arrested ere he touched a deck. How plainly he’s a fugitive! no\rbaggage, not a hat-box, valise, or carpet-bag,—no friends accompany him\rto the wharf with their adieux. At last, after much dodging search, he\rfinds the Tarshish ship receiving the last items of her cargo; and as\rhe steps on board to see its Captain in the cabin, all the sailors for\rthe moment desist from hoisting in the goods, to mark the stranger’s\revil eye. Jonah sees this; but in vain he tries to look all ease and\rconfidence; in vain essays his wretched smile. Strong intuitions of the\rman assure the mariners he can be no innocent. In their gamesome but\rstill serious way, one whispers to the other—“Jack, he’s robbed a\rwidow;” or, “Joe, do you mark him; he’s a bigamist;” or, “Harry lad, I\rguess he’s the adulterer that broke jail in old Gomorrah, or belike,\rone of the missing murderers from Sodom.” Another runs to read the bill\rthat’s stuck against the spile upon the wharf to which the ship is\rmoored, offering five hundred gold coins for the apprehension of a\rparricide, and containing a description of his person. He reads, and\rlooks from Jonah to the bill; while all his sympathetic shipmates now\rcrowd round Jonah, prepared to lay their hands upon him. Frighted Jonah\rtrembles, and summoning all his boldness to his face, only looks so\rmuch the more a coward. He will not confess himself suspected; but that\ritself is strong suspicion. So he makes the best of it; and when the\rsailors find him not to be the man that is advertised, they let him\rpass, and he descends into the cabin.\r\r“‘Who’s there?’ cries the Captain at his busy desk, hurriedly making\rout his papers for the Customs—‘Who’s there?’ Oh! how that harmless\rquestion mangles Jonah! For the instant he almost turns to flee again.\rBut he rallies. ‘I seek a passage in this ship to Tarshish; how soon\rsail ye, sir?’ Thus far the busy Captain had not looked up to Jonah,\rthough the man now stands before him; but no sooner does he hear that\rhollow voice, than he darts a scrutinizing glance. ‘We sail with the\rnext coming tide,’ at last he slowly answered, still intently eyeing\rhim. ‘No sooner, sir?’—‘Soon enough for any honest man that goes a\rpassenger.’ Ha! Jonah, that’s another stab. But he swiftly calls away\rthe Captain from that scent. ‘I’ll sail with ye,’—he says,—‘the passage\rmoney how much is that?—I’ll pay now.’ For it is particularly written,\rshipmates, as if it were a thing not to be overlooked in this history,\r‘that he paid the fare thereof’ ere the craft did sail. And taken with\rthe context, this is full of meaning.\r\r“Now Jonah’s Captain, shipmates, was one whose discernment detects\rcrime in any, but whose cupidity exposes it only in the penniless. In\rthis world, shipmates, sin that pays its way can travel freely, and\rwithout a passport; whereas Virtue, if a pauper, is stopped at all\rfrontiers. So Jonah’s Captain prepares to test the length of Jonah’s\rpurse, ere he judge him openly. He charges him thrice the usual sum;\rand it’s assented to. Then the Captain knows that Jonah is a fugitive;\rbut at the same time resolves to help a flight that paves its rear with\rgold. Yet when Jonah fairly takes out his purse, prudent suspicions\rstill molest the Captain. He rings every coin to find a counterfeit.\rNot a forger, any way, he mutters; and Jonah is put down for his\rpassage. ‘Point out my state-room, Sir,’ says Jonah now, ‘I’m\rtravel-weary; I need sleep.’ ‘Thou lookest like it,’ says the Captain,\r‘there’s thy room.’ Jonah enters, and would lock the door, but the lock\rcontains no key. Hearing him foolishly fumbling there, the Captain\rlaughs lowly to himself, and mutters something about the doors of\rconvicts’ cells being never allowed to be locked within. All dressed\rand dusty as he is, Jonah throws himself into his berth, and finds the\rlittle state-room ceiling almost resting on his forehead. The air is\rclose, and Jonah gasps. Then, in that contracted hole, sunk, too,\rbeneath the ship’s water-line, Jonah feels the heralding presentiment\rof that stifling hour, when the whale shall hold him in the smallest of\rhis bowels’ wards.\r\r“Screwed at its axis against the side, a swinging lamp slightly\roscillates in Jonah’s room; and the ship, heeling over towards the\rwharf with the weight of the last bales received, the lamp, flame and\rall, though in slight motion, still maintains a permanent obliquity\rwith reference to the room; though, in truth, infallibly straight\ritself, it but made obvious the false, lying levels among which it\rhung. The lamp alarms and frightens Jonah; as lying in his berth his\rtormented eyes roll round the place, and this thus far successful\rfugitive finds no refuge for his restless glance. But that\rcontradiction in the lamp more and more appals him. The floor, the\rceiling, and the side, are all awry. ‘Oh! so my conscience hangs in\rme!’ he groans, ‘straight upwards, so it burns; but the chambers of my\rsoul are all in crookedness!’\r\r“Like one who after a night of drunken revelry hies to his bed, still\rreeling, but with conscience yet pricking him, as the plungings of the\rRoman race-horse but so much the more strike his steel tags into him;\ras one who in that miserable plight still turns and turns in giddy\ranguish, praying God for annihilation until the fit be passed; and at\rlast amid the whirl of woe he feels, a deep stupor steals over him, as\rover the man who bleeds to death, for conscience is the wound, and\rthere’s naught to staunch it; so, after sore wrestlings in his berth,\rJonah’s prodigy of ponderous misery drags him drowning down to sleep.\r\r“And now the time of tide has come; the ship casts off her cables; and\rfrom the deserted wharf the uncheered ship for Tarshish, all careening,\rglides to sea. That ship, my friends, was the first of recorded\rsmugglers! the contraband was Jonah. But the sea rebels; he will not\rbear the wicked burden. A dreadful storm comes on, the ship is like to\rbreak. But now when the boatswain calls all hands to lighten her; when\rboxes, bales, and jars are clattering overboard; when the wind is\rshrieking, and the men are yelling, and every plank thunders with\rtrampling feet right over Jonah’s head; in all this raging tumult,\rJonah sleeps his hideous sleep. He sees no black sky and raging sea,\rfeels not the reeling timbers, and little hears he or heeds he the far\rrush of the mighty whale, which even now with open mouth is cleaving\rthe seas after him. Aye, shipmates, Jonah was gone down into the sides\rof the ship—a berth in the cabin as I have taken it, and was fast\rasleep. But the frightened master comes to him, and shrieks in his dead\rear, ‘What meanest thou, O, sleeper! arise!’ Startled from his lethargy\rby that direful cry, Jonah staggers to his feet, and stumbling to the\rdeck, grasps a shroud, to look out upon the sea. But at that moment he\ris sprung upon by a panther billow leaping over the bulwarks. Wave\rafter wave thus leaps into the ship, and finding no speedy vent runs\rroaring fore and aft, till the mariners come nigh to drowning while yet\rafloat. And ever, as the white moon shows her affrighted face from the\rsteep gullies in the blackness overhead, aghast Jonah sees the rearing\rbowsprit pointing high upward, but soon beat downward again towards the\rtormented deep.\r\r“Terrors upon terrors run shouting through his soul. In all his\rcringing attitudes, the God-fugitive is now too plainly known. The\rsailors mark him; more and more certain grow their suspicions of him,\rand at last, fully to test the truth, by referring the whole matter to\rhigh Heaven, they fall to casting lots, to see for whose cause this\rgreat tempest was upon them. The lot is Jonah’s; that discovered, then\rhow furiously they mob him with their questions. ‘What is thine\roccupation? Whence comest thou? Thy country? What people? But mark now,\rmy shipmates, the behavior of poor Jonah. The eager mariners but ask\rhim who he is, and where from; whereas, they not only receive an answer\rto those questions, but likewise another answer to a question not put\rby them, but the unsolicited answer is forced from Jonah by the hard\rhand of God that is upon him.\r\r“‘I am a Hebrew,’ he cries—and then—‘I fear the Lord the God of Heaven\rwho hath made the sea and the dry land!’ Fear him, O Jonah? Aye, well\rmightest thou fear the Lord God _then!_ Straightway, he now goes on to\rmake a full confession; whereupon the mariners became more and more\rappalled, but still are pitiful. For when Jonah, not yet supplicating\rGod for mercy, since he but too well knew the darkness of his\rdeserts,—when wretched Jonah cries out to them to take him and cast him\rforth into the sea, for he knew that for _his_ sake this great tempest\rwas upon them; they mercifully turn from him, and seek by other means\rto save the ship. But all in vain; the indignant gale howls louder;\rthen, with one hand raised invokingly to God, with the other they not\runreluctantly lay hold of Jonah.\r\r“And now behold Jonah taken up as an anchor and dropped into the sea;\rwhen instantly an oily calmness floats out from the east, and the sea\ris still, as Jonah carries down the gale with him, leaving smooth water\rbehind. He goes down in the whirling heart of such a masterless\rcommotion that he scarce heeds the moment when he drops seething into\rthe yawning jaws awaiting him; and the whale shoots-to all his ivory\rteeth, like so many white bolts, upon his prison. Then Jonah prayed\runto the Lord out of the fish’s belly. But observe his prayer, and\rlearn a weighty lesson. For sinful as he is, Jonah does not weep and\rwail for direct deliverance. He feels that his dreadful punishment is\rjust. He leaves all his deliverance to God, contenting himself with\rthis, that spite of all his pains and pangs, he will still look towards\rHis holy temple. And here, shipmates, is true and faithful repentance;\rnot clamorous for pardon, but grateful for punishment. And how pleasing\rto God was this conduct in Jonah, is shown in the eventual deliverance\rof him from the sea and the whale. Shipmates, I do not place Jonah\rbefore you to be copied for his sin but I do place him before you as a\rmodel for repentance. Sin not; but if you do, take heed to repent of it\rlike Jonah.”\r\rWhile he was speaking these words, the howling of the shrieking,\rslanting storm without seemed to add new power to the preacher, who,\rwhen describing Jonah’s sea-storm, seemed tossed by a storm himself.\rHis deep chest heaved as with a ground-swell; his tossed arms seemed\rthe warring elements at work; and the thunders that rolled away from\roff his swarthy brow, and the light leaping from his eye, made all his\rsimple hearers look on him with a quick fear that was strange to them.\r\rThere now came a lull in his look, as he silently turned over the\rleaves of the Book once more; and, at last, standing motionless, with\rclosed eyes, for the moment, seemed communing with God and himself.\r\rBut again he leaned over towards the people, and bowing his head lowly,\rwith an aspect of the deepest yet manliest humility, he spake these\rwords:\r\r“Shipmates, God has laid but one hand upon you; both his hands press\rupon me. I have read ye by what murky light may be mine the lesson that\rJonah teaches to all sinners; and therefore to ye, and still more to\rme, for I am a greater sinner than ye. And now how gladly would I come\rdown from this mast-head and sit on the hatches there where you sit,\rand listen as you listen, while some one of you reads _me_ that other\rand more awful lesson which Jonah teaches to _me_, as a pilot of the\rliving God. How being an anointed pilot-prophet, or speaker of true\rthings, and bidden by the Lord to sound those unwelcome truths in the\rears of a wicked Nineveh, Jonah, appalled at the hostility he should\rraise, fled from his mission, and sought to escape his duty and his God\rby taking ship at Joppa. But God is everywhere; Tarshish he never\rreached. As we have seen, God came upon him in the whale, and swallowed\rhim down to living gulfs of doom, and with swift slantings tore him\ralong ‘into the midst of the seas,’ where the eddying depths sucked him\rten thousand fathoms down, and ‘the weeds were wrapped about his head,’\rand all the watery world of woe bowled over him. Yet even then beyond\rthe reach of any plummet—‘out of the belly of hell’—when the whale\rgrounded upon the ocean’s utmost bones, even then, God heard the\rengulphed, repenting prophet when he cried. Then God spake unto the\rfish; and from the shuddering cold and blackness of the sea, the whale\rcame breeching up towards the warm and pleasant sun, and all the\rdelights of air and earth; and ‘vomited out Jonah upon the dry land;’\rwhen the word of the Lord came a second time; and Jonah, bruised and\rbeaten—his ears, like two sea-shells, still multitudinously murmuring\rof the ocean—Jonah did the Almighty’s bidding. And what was that,\rshipmates? To preach the Truth to the face of Falsehood! That was it!\r\r“This, shipmates, this is that other lesson; and woe to that pilot of\rthe living God who slights it. Woe to him whom this world charms from\rGospel duty! Woe to him who seeks to pour oil upon the waters when God\rhas brewed them into a gale! Woe to him who seeks to please rather than\rto appal! Woe to him whose good name is more to him than goodness! Woe\rto him who, in this world, courts not dishonor! Woe to him who would\rnot be true, even though to be false were salvation! Yea, woe to him\rwho, as the great Pilot Paul has it, while preaching to others is\rhimself a castaway!”\r\rHe dropped and fell away from himself for a moment; then lifting his\rface to them again, showed a deep joy in his eyes, as he cried out with\ra heavenly enthusiasm,—“But oh! shipmates! on the starboard hand of\revery woe, there is a sure delight; and higher the top of that delight,\rthan the bottom of the woe is deep. Is not the main-truck higher than\rthe kelson is low? Delight is to him—a far, far upward, and inward\rdelight—who against the proud gods and commodores of this earth, ever\rstands forth his own inexorable self. Delight is to him whose strong\rarms yet support him, when the ship of this base treacherous world has\rgone down beneath him. Delight is to him, who gives no quarter in the\rtruth, and kills, burns, and destroys all sin though he pluck it out\rfrom under the robes of Senators and Judges. Delight,—top-gallant\rdelight is to him, who acknowledges no law or lord, but the Lord his\rGod, and is only a patriot to heaven. Delight is to him, whom all the\rwaves of the billows of the seas of the boisterous mob can never shake\rfrom this sure Keel of the Ages. And eternal delight and deliciousness\rwill be his, who coming to lay him down, can say with his final\rbreath—O Father!—chiefly known to me by Thy rod—mortal or immortal,\rhere I die. I have striven to be Thine, more than to be this world’s,\ror mine own. Yet this is nothing: I leave eternity to Thee; for what is\rman that he should live out the lifetime of his God?”\r\rHe said no more, but slowly waving a benediction, covered his face with\rhis hands, and so remained kneeling, till all the people had departed,\rand he was left alone in the place.\r\r\rCHAPTER 10. A Bosom Friend.\r\rReturning to the Spouter-Inn from the Chapel, I found Queequeg there\rquite alone; he having left the Chapel before the benediction some\rtime. He was sitting on a bench before the fire, with his feet on the\rstove hearth, and in one hand was holding close up to his face that\rlittle negro idol of his; peering hard into its face, and with a\rjack-knife gently whittling away at its nose, meanwhile humming to\rhimself in his heathenish way.\r\rBut being now interrupted, he put up the image; and pretty soon, going\rto the table, took up a large book there, and placing it on his lap\rbegan counting the pages with deliberate regularity; at every fiftieth\rpage—as I fancied—stopping a moment, looking vacantly around him, and\rgiving utterance to a long-drawn gurgling whistle of astonishment. He\rwould then begin again at the next fifty; seeming to commence at number\rone each time, as though he could not count more than fifty, and it was\ronly by such a large number of fifties being found together, that his\rastonishment at the multitude of pages was excited.\r\rWith much interest I sat watching him. Savage though he was, and\rhideously marred about the face—at least to my taste—his countenance\ryet had a something in it which was by no means disagreeable. You\rcannot hide the soul. Through all his unearthly tattooings, I thought I\rsaw the traces of a simple honest heart; and in his large, deep eyes,\rfiery black and bold, there seemed tokens of a spirit that would dare a\rthousand devils. And besides all this, there was a certain lofty\rbearing about the Pagan, which even his uncouthness could not\raltogether maim. He looked like a man who had never cringed and never\rhad had a creditor. Whether it was, too, that his head being shaved,\rhis forehead was drawn out in freer and brighter relief, and looked\rmore expansive than it otherwise would, this I will not venture to\rdecide; but certain it was his head was phrenologically an excellent\rone. It may seem ridiculous, but it reminded me of General Washington’s\rhead, as seen in the popular busts of him. It had the same long\rregularly graded retreating slope from above the brows, which were\rlikewise very projecting, like two long promontories thickly wooded on\rtop. Queequeg was George Washington cannibalistically developed.\r\rWhilst I was thus closely scanning him, half-pretending meanwhile to be\rlooking out at the storm from the casement, he never heeded my\rpresence, never troubled himself with so much as a single glance; but\rappeared wholly occupied with counting the pages of the marvellous\rbook. Considering how sociably we had been sleeping together the night\rprevious, and especially considering the affectionate arm I had found\rthrown over me upon waking in the morning, I thought this indifference\rof his very strange. But savages are strange beings; at times you do\rnot know exactly how to take them. At first they are overawing; their\rcalm self-collectedness of simplicity seems a Socratic wisdom. I had\rnoticed also that Queequeg never consorted at all, or but very little,\rwith the other seamen in the inn. He made no advances whatever;\rappeared to have no desire to enlarge the circle of his acquaintances.\rAll this struck me as mighty singular; yet, upon second thoughts, there\rwas something almost sublime in it. Here was a man some twenty thousand\rmiles from home, by the way of Cape Horn, that is—which was the only\rway he could get there—thrown among people as strange to him as though\rhe were in the planet Jupiter; and yet he seemed entirely at his ease;\rpreserving the utmost serenity; content with his own companionship;\ralways equal to himself. Surely this was a touch of fine philosophy;\rthough no doubt he had never heard there was such a thing as that. But,\rperhaps, to be true philosophers, we mortals should not be conscious of\rso living or so striving. So soon as I hear that such or such a man\rgives himself out for a philosopher, I conclude that, like the\rdyspeptic old woman, he must have “broken his digester.”\r\rAs I sat there in that now lonely room; the fire burning low, in that\rmild stage when, after its first intensity has warmed the air, it then\ronly glows to be looked at; the evening shades and phantoms gathering\rround the casements, and peering in upon us silent, solitary twain; the\rstorm booming without in solemn swells; I began to be sensible of\rstrange feelings. I felt a melting in me. No more my splintered heart\rand maddened hand were turned against the wolfish world. This soothing\rsavage had redeemed it. There he sat, his very indifference speaking a\rnature in which there lurked no civilized hypocrisies and bland\rdeceits. Wild he was; a very sight of sights to see; yet I began to\rfeel myself mysteriously drawn towards him. And those same things that\rwould have repelled most others, they were the very magnets that thus\rdrew me. I’ll try a pagan friend, thought I, since Christian kindness\rhas proved but hollow courtesy. I drew my bench near him, and made some\rfriendly signs and hints, doing my best to talk with him meanwhile. At\rfirst he little noticed these advances; but presently, upon my\rreferring to his last night’s hospitalities, he made out to ask me\rwhether we were again to be bedfellows. I told him yes; whereat I\rthought he looked pleased, perhaps a little complimented.\r\rWe then turned over the book together, and I endeavored to explain to\rhim the purpose of the printing, and the meaning of the few pictures\rthat were in it. Thus I soon engaged his interest; and from that we\rwent to jabbering the best we could about the various outer sights to\rbe seen in this famous town. Soon I proposed a social smoke; and,\rproducing his pouch and tomahawk, he quietly offered me a puff. And\rthen we sat exchanging puffs from that wild pipe of his, and keeping it\rregularly passing between us.\r\rIf there yet lurked any ice of indifference towards me in the Pagan’s\rbreast, this pleasant, genial smoke we had, soon thawed it out, and\rleft us cronies. He seemed to take to me quite as naturally and\runbiddenly as I to him; and when our smoke was over, he pressed his\rforehead against mine, clasped me round the waist, and said that\rhenceforth we were married; meaning, in his country’s phrase, that we\rwere bosom friends; he would gladly die for me, if need should be. In a\rcountryman, this sudden flame of friendship would have seemed far too\rpremature, a thing to be much distrusted; but in this simple savage\rthose old rules would not apply.\r\rAfter supper, and another social chat and smoke, we went to our room\rtogether. He made me a present of his embalmed head; took out his\renormous tobacco wallet, and groping under the tobacco, drew out some\rthirty dollars in silver; then spreading them on the table, and\rmechanically dividing them into two equal portions, pushed one of them\rtowards me, and said it was mine. I was going to remonstrate; but he\rsilenced me by pouring them into my trowsers’ pockets. I let them stay.\rHe then went about his evening prayers, took out his idol, and removed\rthe paper fireboard. By certain signs and symptoms, I thought he seemed\ranxious for me to join him; but well knowing what was to follow, I\rdeliberated a moment whether, in case he invited me, I would comply or\rotherwise.\r\rI was a good Christian; born and bred in the bosom of the infallible\rPresbyterian Church. How then could I unite with this wild idolator in\rworshipping his piece of wood? But what is worship? thought I. Do you\rsuppose now, Ishmael, that the magnanimous God of heaven and\rearth—pagans and all included—can possibly be jealous of an\rinsignificant bit of black wood? Impossible! But what is worship?—to do\rthe will of God—_that_ is worship. And what is the will of God?—to do\rto my fellow man what I would have my fellow man to do to me—_that_ is\rthe will of God. Now, Queequeg is my fellow man. And what do I wish\rthat this Queequeg would do to me? Why, unite with me in my particular\rPresbyterian form of worship. Consequently, I must then unite with him\rin his; ergo, I must turn idolator. So I kindled the shavings; helped\rprop up the innocent little idol; offered him burnt biscuit with\rQueequeg; salamed before him twice or thrice; kissed his nose; and that\rdone, we undressed and went to bed, at peace with our own consciences\rand all the world. But we did not go to sleep without some little chat.\r\rHow it is I know not; but there is no place like a bed for confidential\rdisclosures between friends. Man and wife, they say, there open the\rvery bottom of their souls to each other; and some old couples often\rlie and chat over old times till nearly morning. Thus, then, in our\rhearts’ honeymoon, lay I and Queequeg—a cosy, loving pair.\r\r\rCHAPTER 11. Nightgown.\r\rWe had lain thus in bed, chatting and napping at short intervals, and\rQueequeg now and then affectionately throwing his brown tattooed legs\rover mine, and then drawing them back; so entirely sociable and free\rand easy were we; when, at last, by reason of our confabulations, what\rlittle nappishness remained in us altogether departed, and we felt like\rgetting up again, though day-break was yet some way down the future.\r\rYes, we became very wakeful; so much so that our recumbent position\rbegan to grow wearisome, and by little and little we found ourselves\rsitting up; the clothes well tucked around us, leaning against the\rhead-board with our four knees drawn up close together, and our two\rnoses bending over them, as if our kneepans were warming-pans. We felt\rvery nice and snug, the more so since it was so chilly out of doors;\rindeed out of bed-clothes too, seeing that there was no fire in the\rroom. The more so, I say, because truly to enjoy bodily warmth, some\rsmall part of you must be cold, for there is no quality in this world\rthat is not what it is merely by contrast. Nothing exists in itself. If\ryou flatter yourself that you are all over comfortable, and have been\rso a long time, then you cannot be said to be comfortable any more. But\rif, like Queequeg and me in the bed, the tip of your nose or the crown\rof your head be slightly chilled, why then, indeed, in the general\rconsciousness you feel most delightfully and unmistakably warm. For\rthis reason a sleeping apartment should never be furnished with a fire,\rwhich is one of the luxurious discomforts of the rich. For the height\rof this sort of deliciousness is to have nothing but the blanket\rbetween you and your snugness and the cold of the outer air. Then there\ryou lie like the one warm spark in the heart of an arctic crystal.\r\rWe had been sitting in this crouching manner for some time, when all at\ronce I thought I would open my eyes; for when between sheets, whether\rby day or by night, and whether asleep or awake, I have a way of always\rkeeping my eyes shut, in order the more to concentrate the snugness of\rbeing in bed. Because no man can ever feel his own identity aright\rexcept his eyes be closed; as if darkness were indeed the proper\relement of our essences, though light be more congenial to our clayey\rpart. Upon opening my eyes then, and coming out of my own pleasant and\rself-created darkness into the imposed and coarse outer gloom of the\runilluminated twelve-o’clock-at-night, I experienced a disagreeable\rrevulsion. Nor did I at all object to the hint from Queequeg that\rperhaps it were best to strike a light, seeing that we were so wide\rawake; and besides he felt a strong desire to have a few quiet puffs\rfrom his Tomahawk. Be it said, that though I had felt such a strong\rrepugnance to his smoking in the bed the night before, yet see how\relastic our stiff prejudices grow when love once comes to bend them.\rFor now I liked nothing better than to have Queequeg smoking by me,\reven in bed, because he seemed to be full of such serene household joy\rthen. I no more felt unduly concerned for the landlord’s policy of\rinsurance. I was only alive to the condensed confidential\rcomfortableness of sharing a pipe and a blanket with a real friend.\rWith our shaggy jackets drawn about our shoulders, we now passed the\rTomahawk from one to the other, till slowly there grew over us a blue\rhanging tester of smoke, illuminated by the flame of the new-lit lamp.\r\rWhether it was that this undulating tester rolled the savage away to\rfar distant scenes, I know not, but he now spoke of his native island;\rand, eager to hear his history, I begged him to go on and tell it. He\rgladly complied. Though at the time I but ill comprehended not a few of\rhis words, yet subsequent disclosures, when I had become more familiar\rwith his broken phraseology, now enable me to present the whole story\rsuch as it may prove in the mere skeleton I give.\r\r\rCHAPTER 12. Biographical.\r\rQueequeg was a native of Rokovoko, an island far away to the West and\rSouth. It is not down in any map; true places never are.\r\rWhen a new-hatched savage running wild about his native woodlands in a\rgrass clout, followed by the nibbling goats, as if he were a green\rsapling; even then, in Queequeg’s ambitious soul, lurked a strong\rdesire to see something more of Christendom than a specimen whaler or\rtwo. His father was a High Chief, a King; his uncle a High Priest; and\ron the maternal side he boasted aunts who were the wives of\runconquerable warriors. There was excellent blood in his veins—royal\rstuff; though sadly vitiated, I fear, by the cannibal propensity he\rnourished in his untutored youth.\r\rA Sag Harbor ship visited his father’s bay, and Queequeg sought a\rpassage to Christian lands. But the ship, having her full complement of\rseamen, spurned his suit; and not all the King his father’s influence\rcould prevail. But Queequeg vowed a vow. Alone in his canoe, he paddled\roff to a distant strait, which he knew the ship must pass through when\rshe quitted the island. On one side was a coral reef; on the other a\rlow tongue of land, covered with mangrove thickets that grew out into\rthe water. Hiding his canoe, still afloat, among these thickets, with\rits prow seaward, he sat down in the stern, paddle low in hand; and\rwhen the ship was gliding by, like a flash he darted out; gained her\rside; with one backward dash of his foot capsized and sank his canoe;\rclimbed up the chains; and throwing himself at full length upon the\rdeck, grappled a ring-bolt there, and swore not to let it go, though\rhacked in pieces.\r\rIn vain the captain threatened to throw him overboard; suspended a\rcutlass over his naked wrists; Queequeg was the son of a King, and\rQueequeg budged not. Struck by his desperate dauntlessness, and his\rwild desire to visit Christendom, the captain at last relented, and\rtold him he might make himself at home. But this fine young savage—this\rsea Prince of Wales, never saw the Captain’s cabin. They put him down\ramong the sailors, and made a whaleman of him. But like Czar Peter\rcontent to toil in the shipyards of foreign cities, Queequeg disdained\rno seeming ignominy, if thereby he might happily gain the power of\renlightening his untutored countrymen. For at bottom—so he told me—he\rwas actuated by a profound desire to learn among the Christians, the\rarts whereby to make his people still happier than they were; and more\rthan that, still better than they were. But, alas! the practices of\rwhalemen soon convinced him that even Christians could be both\rmiserable and wicked; infinitely more so, than all his father’s\rheathens. Arrived at last in old Sag Harbor; and seeing what the\rsailors did there; and then going on to Nantucket, and seeing how they\rspent their wages in _that_ place also, poor Queequeg gave it up for\rlost. Thought he, it’s a wicked world in all meridians; I’ll die a\rpagan.\r\rAnd thus an old idolator at heart, he yet lived among these Christians,\rwore their clothes, and tried to talk their gibberish. Hence the queer\rways about him, though now some time from home.\r\rBy hints, I asked him whether he did not propose going back, and having\ra coronation; since he might now consider his father dead and gone, he\rbeing very old and feeble at the last accounts. He answered no, not\ryet; and added that he was fearful Christianity, or rather Christians,\rhad unfitted him for ascending the pure and undefiled throne of thirty\rpagan Kings before him. But by and by, he said, he would return,—as\rsoon as he felt himself baptized again. For the nonce, however, he\rproposed to sail about, and sow his wild oats in all four oceans. They\rhad made a harpooneer of him, and that barbed iron was in lieu of a\rsceptre now.\r\rI asked him what might be his immediate purpose, touching his future\rmovements. He answered, to go to sea again, in his old vocation. Upon\rthis, I told him that whaling was my own design, and informed him of my\rintention to sail out of Nantucket, as being the most promising port\rfor an adventurous whaleman to embark from. He at once resolved to\raccompany me to that island, ship aboard the same vessel, get into the\rsame watch, the same boat, the same mess with me, in short to share my\revery hap; with both my hands in his, boldly dip into the Potluck of\rboth worlds. To all this I joyously assented; for besides the affection\rI now felt for Queequeg, he was an experienced harpooneer, and as such,\rcould not fail to be of great usefulness to one, who, like me, was\rwholly ignorant of the mysteries of whaling, though well acquainted\rwith the sea, as known to merchant seamen.\r\rHis story being ended with his pipe’s last dying puff, Queequeg\rembraced me, pressed his forehead against mine, and blowing out the\rlight, we rolled over from each other, this way and that, and very soon\rwere sleeping.\r\r\rCHAPTER 13. Wheelbarrow.\r\rNext morning, Monday, after disposing of the embalmed head to a barber,\rfor a block, I settled my own and comrade’s bill; using, however, my\rcomrade’s money. The grinning landlord, as well as the boarders, seemed\ramazingly tickled at the sudden friendship which had sprung up between\rme and Queequeg—especially as Peter Coffin’s cock and bull stories\rabout him had previously so much alarmed me concerning the very person\rwhom I now companied with.\r\rWe borrowed a wheelbarrow, and embarking our things, including my own\rpoor carpet-bag, and Queequeg’s canvas sack and hammock, away we went\rdown to “the Moss,” the little Nantucket packet schooner moored at the\rwharf. As we were going along the people stared; not at Queequeg so\rmuch—for they were used to seeing cannibals like him in their\rstreets,—but at seeing him and me upon such confidential terms. But we\rheeded them not, going along wheeling the barrow by turns, and Queequeg\rnow and then stopping to adjust the sheath on his harpoon barbs. I\rasked him why he carried such a troublesome thing with him ashore, and\rwhether all whaling ships did not find their own harpoons. To this, in\rsubstance, he replied, that though what I hinted was true enough, yet\rhe had a particular affection for his own harpoon, because it was of\rassured stuff, well tried in many a mortal combat, and deeply intimate\rwith the hearts of whales. In short, like many inland reapers and\rmowers, who go into the farmers’ meadows armed with their own\rscythes—though in no wise obliged to furnish them—even so, Queequeg,\rfor his own private reasons, preferred his own harpoon.\r\rShifting the barrow from my hand to his, he told me a funny story about\rthe first wheelbarrow he had ever seen. It was in Sag Harbor. The\rowners of his ship, it seems, had lent him one, in which to carry his\rheavy chest to his boarding house. Not to seem ignorant about the\rthing—though in truth he was entirely so, concerning the precise way in\rwhich to manage the barrow—Queequeg puts his chest upon it; lashes it\rfast; and then shoulders the barrow and marches up the wharf. “Why,”\rsaid I, “Queequeg, you might have known better than that, one would\rthink. Didn’t the people laugh?”\r\rUpon this, he told me another story. The people of his island of\rRokovoko, it seems, at their wedding feasts express the fragrant water\rof young cocoanuts into a large stained calabash like a punchbowl; and\rthis punchbowl always forms the great central ornament on the braided\rmat where the feast is held. Now a certain grand merchant ship once\rtouched at Rokovoko, and its commander—from all accounts, a very\rstately punctilious gentleman, at least for a sea captain—this\rcommander was invited to the wedding feast of Queequeg’s sister, a\rpretty young princess just turned of ten. Well; when all the wedding\rguests were assembled at the bride’s bamboo cottage, this Captain\rmarches in, and being assigned the post of honor, placed himself over\ragainst the punchbowl, and between the High Priest and his majesty the\rKing, Queequeg’s father. Grace being said,—for those people have their\rgrace as well as we—though Queequeg told me that unlike us, who at such\rtimes look downwards to our platters, they, on the contrary, copying\rthe ducks, glance upwards to the great Giver of all feasts—Grace, I\rsay, being said, the High Priest opens the banquet by the immemorial\rceremony of the island; that is, dipping his consecrated and\rconsecrating fingers into the bowl before the blessed beverage\rcirculates. Seeing himself placed next the Priest, and noting the\rceremony, and thinking himself—being Captain of a ship—as having plain\rprecedence over a mere island King, especially in the King’s own\rhouse—the Captain coolly proceeds to wash his hands in the\rpunchbowl;—taking it I suppose for a huge finger-glass. “Now,” said\rQueequeg, “what you tink now?—Didn’t our people laugh?”\r\rAt last, passage paid, and luggage safe, we stood on board the\rschooner. Hoisting sail, it glided down the Acushnet river. On one\rside, New Bedford rose in terraces of streets, their ice-covered trees\rall glittering in the clear, cold air. Huge hills and mountains of\rcasks on casks were piled upon her wharves, and side by side the\rworld-wandering whale ships lay silent and safely moored at last; while\rfrom others came a sound of carpenters and coopers, with blended noises\rof fires and forges to melt the pitch, all betokening that new cruises\rwere on the start; that one most perilous and long voyage ended, only\rbegins a second; and a second ended, only begins a third, and so on,\rfor ever and for aye. Such is the endlessness, yea, the intolerableness\rof all earthly effort.\r\rGaining the more open water, the bracing breeze waxed fresh; the little\rMoss tossed the quick foam from her bows, as a young colt his\rsnortings. How I snuffed that Tartar air!—how I spurned that turnpike\rearth!—that common highway all over dented with the marks of slavish\rheels and hoofs; and turned me to admire the magnanimity of the sea\rwhich will permit no records.\r\rAt the same foam-fountain, Queequeg seemed to drink and reel with me.\rHis dusky nostrils swelled apart; he showed his filed and pointed\rteeth. On, on we flew; and our offing gained, the Moss did homage to\rthe blast; ducked and dived her bows as a slave before the Sultan.\rSideways leaning, we sideways darted; every ropeyarn tingling like a\rwire; the two tall masts buckling like Indian canes in land tornadoes.\rSo full of this reeling scene were we, as we stood by the plunging\rbowsprit, that for some time we did not notice the jeering glances of\rthe passengers, a lubber-like assembly, who marvelled that two fellow\rbeings should be so companionable; as though a white man were anything\rmore dignified than a whitewashed negro. But there were some boobies\rand bumpkins there, who, by their intense greenness, must have come\rfrom the heart and centre of all verdure. Queequeg caught one of these\ryoung saplings mimicking him behind his back. I thought the bumpkin’s\rhour of doom was come. Dropping his harpoon, the brawny savage caught\rhim in his arms, and by an almost miraculous dexterity and strength,\rsent him high up bodily into the air; then slightly tapping his stern\rin mid-somerset, the fellow landed with bursting lungs upon his feet,\rwhile Queequeg, turning his back upon him, lighted his tomahawk pipe\rand passed it to me for a puff.\r\r“Capting! Capting!” yelled the bumpkin, running towards that officer;\r“Capting, Capting, here’s the devil.”\r\r“Hallo, _you_ sir,” cried the Captain, a gaunt rib of the sea, stalking\rup to Queequeg, “what in thunder do you mean by that? Don’t you know\ryou might have killed that chap?”\r\r“What him say?” said Queequeg, as he mildly turned to me.\r\r“He say,” said I, “that you came near kill-e that man there,” pointing\rto the still shivering greenhorn.\r\r“Kill-e,” cried Queequeg, twisting his tattooed face into an unearthly\rexpression of disdain, “ah! him bevy small-e fish-e; Queequeg no kill-e\rso small-e fish-e; Queequeg kill-e big whale!”\r\r“Look you,” roared the Captain, “I’ll kill-e _you_, you cannibal, if\ryou try any more of your tricks aboard here; so mind your eye.”\r\rBut it so happened just then, that it was high time for the Captain to\rmind his own eye. The prodigious strain upon the main-sail had parted\rthe weather-sheet, and the tremendous boom was now flying from side to\rside, completely sweeping the entire after part of the deck. The poor\rfellow whom Queequeg had handled so roughly, was swept overboard; all\rhands were in a panic; and to attempt snatching at the boom to stay it,\rseemed madness. It flew from right to left, and back again, almost in\rone ticking of a watch, and every instant seemed on the point of\rsnapping into splinters. Nothing was done, and nothing seemed capable\rof being done; those on deck rushed towards the bows, and stood eyeing\rthe boom as if it were the lower jaw of an exasperated whale. In the\rmidst of this consternation, Queequeg dropped deftly to his knees, and\rcrawling under the path of the boom, whipped hold of a rope, secured\rone end to the bulwarks, and then flinging the other like a lasso,\rcaught it round the boom as it swept over his head, and at the next\rjerk, the spar was that way trapped, and all was safe. The schooner was\rrun into the wind, and while the hands were clearing away the stern\rboat, Queequeg, stripped to the waist, darted from the side with a long\rliving arc of a leap. For three minutes or more he was seen swimming\rlike a dog, throwing his long arms straight out before him, and by\rturns revealing his brawny shoulders through the freezing foam. I\rlooked at the grand and glorious fellow, but saw no one to be saved.\rThe greenhorn had gone down. Shooting himself perpendicularly from the\rwater, Queequeg, now took an instant’s glance around him, and seeming\rto see just how matters were, dived down and disappeared. A few minutes\rmore, and he rose again, one arm still striking out, and with the other\rdragging a lifeless form. The boat soon picked them up. The poor\rbumpkin was restored. All hands voted Queequeg a noble trump; the\rcaptain begged his pardon. From that hour I clove to Queequeg like a\rbarnacle; yea, till poor Queequeg took his last long dive.\r\rWas there ever such unconsciousness? He did not seem to think that he\rat all deserved a medal from the Humane and Magnanimous Societies. He\ronly asked for water—fresh water—something to wipe the brine off; that\rdone, he put on dry clothes, lighted his pipe, and leaning against the\rbulwarks, and mildly eyeing those around him, seemed to be saying to\rhimself—“It’s a mutual, joint-stock world, in all meridians. We\rcannibals must help these Christians.”\r\r\rCHAPTER 14. Nantucket.\r\rNothing more happened on the passage worthy the mentioning; so, after a\rfine run, we safely arrived in Nantucket.\r\rNantucket! Take out your map and look at it. See what a real corner of\rthe world it occupies; how it stands there, away off shore, more lonely\rthan the Eddystone lighthouse. Look at it—a mere hillock, and elbow of\rsand; all beach, without a background. There is more sand there than\ryou would use in twenty years as a substitute for blotting paper. Some\rgamesome wights will tell you that they have to plant weeds there, they\rdon’t grow naturally; that they import Canada thistles; that they have\rto send beyond seas for a spile to stop a leak in an oil cask; that\rpieces of wood in Nantucket are carried about like bits of the true\rcross in Rome; that people there plant toadstools before their houses,\rto get under the shade in summer time; that one blade of grass makes an\roasis, three blades in a day’s walk a prairie; that they wear quicksand\rshoes, something like Laplander snow-shoes; that they are so shut up,\rbelted about, every way inclosed, surrounded, and made an utter island\rof by the ocean, that to their very chairs and tables small clams will\rsometimes be found adhering, as to the backs of sea turtles. But these\rextravaganzas only show that Nantucket is no Illinois.\r\rLook now at the wondrous traditional story of how this island was\rsettled by the red-men. Thus goes the legend. In olden times an eagle\rswooped down upon the New England coast, and carried off an infant\rIndian in his talons. With loud lament the parents saw their child\rborne out of sight over the wide waters. They resolved to follow in the\rsame direction. Setting out in their canoes, after a perilous passage\rthey discovered the island, and there they found an empty ivory\rcasket,—the poor little Indian’s skeleton.\r\rWhat wonder, then, that these Nantucketers, born on a beach, should\rtake to the sea for a livelihood! They first caught crabs and quohogs\rin the sand; grown bolder, they waded out with nets for mackerel; more\rexperienced, they pushed off in boats and captured cod; and at last,\rlaunching a navy of great ships on the sea, explored this watery world;\rput an incessant belt of circumnavigations round it; peeped in at\rBehring’s Straits; and in all seasons and all oceans declared\reverlasting war with the mightiest animated mass that has survived the\rflood; most monstrous and most mountainous! That Himmalehan, salt-sea\rMastodon, clothed with such portentousness of unconscious power, that\rhis very panics are more to be dreaded than his most fearless and\rmalicious assaults!\r\rAnd thus have these naked Nantucketers, these sea hermits, issuing from\rtheir ant-hill in the sea, overrun and conquered the watery world like\rso many Alexanders; parcelling out among them the Atlantic, Pacific,\rand Indian oceans, as the three pirate powers did Poland. Let America\radd Mexico to Texas, and pile Cuba upon Canada; let the English\roverswarm all India, and hang out their blazing banner from the sun;\rtwo thirds of this terraqueous globe are the Nantucketer’s. For the sea\ris his; he owns it, as Emperors own empires; other seamen having but a\rright of way through it. Merchant ships are but extension bridges;\rarmed ones but floating forts; even pirates and privateers, though\rfollowing the sea as highwaymen the road, they but plunder other ships,\rother fragments of the land like themselves, without seeking to draw\rtheir living from the bottomless deep itself. The Nantucketer, he alone\rresides and riots on the sea; he alone, in Bible language, goes down to\rit in ships; to and fro ploughing it as his own special plantation.\r_There_ is his home; _there_ lies his business, which a Noah’s flood\rwould not interrupt, though it overwhelmed all the millions in China.\rHe lives on the sea, as prairie cocks in the prairie; he hides among\rthe waves, he climbs them as chamois hunters climb the Alps. For years\rhe knows not the land; so that when he comes to it at last, it smells\rlike another world, more strangely than the moon would to an Earthsman.\rWith the landless gull, that at sunset folds her wings and is rocked to\rsleep between billows; so at nightfall, the Nantucketer, out of sight\rof land, furls his sails, and lays him to his rest, while under his\rvery pillow rush herds of walruses and whales.\r\r\rCHAPTER 15. Chowder.\r\rIt was quite late in the evening when the little Moss came snugly to\ranchor, and Queequeg and I went ashore; so we could attend to no\rbusiness that day, at least none but a supper and a bed. The landlord\rof the Spouter-Inn had recommended us to his cousin Hosea Hussey of the\rTry Pots, whom he asserted to be the proprietor of one of the best kept\rhotels in all Nantucket, and moreover he had assured us that Cousin\rHosea, as he called him, was famous for his chowders. In short, he\rplainly hinted that we could not possibly do better than try pot-luck\rat the Try Pots. But the directions he had given us about keeping a\ryellow warehouse on our starboard hand till we opened a white church to\rthe larboard, and then keeping that on the larboard hand till we made a\rcorner three points to the starboard, and that done, then ask the first\rman we met where the place was: these crooked directions of his very\rmuch puzzled us at first, especially as, at the outset, Queequeg\rinsisted that the yellow warehouse—our first point of departure—must be\rleft on the larboard hand, whereas I had understood Peter Coffin to say\rit was on the starboard. However, by dint of beating about a little in\rthe dark, and now and then knocking up a peaceable inhabitant to\rinquire the way, we at last came to something which there was no\rmistaking.\r\rTwo enormous wooden pots painted black, and suspended by asses’ ears,\rswung from the cross-trees of an old top-mast, planted in front of an\rold doorway. The horns of the cross-trees were sawed off on the other\rside, so that this old top-mast looked not a little like a gallows.\rPerhaps I was over sensitive to such impressions at the time, but I\rcould not help staring at this gallows with a vague misgiving. A sort\rof crick was in my neck as I gazed up to the two remaining horns; yes,\r_two_ of them, one for Queequeg, and one for me. It’s ominous, thinks\rI. A Coffin my Innkeeper upon landing in my first whaling port;\rtombstones staring at me in the whalemen’s chapel; and here a gallows!\rand a pair of prodigious black pots too! Are these last throwing out\roblique hints touching Tophet?\r\rI was called from these reflections by the sight of a freckled woman\rwith yellow hair and a yellow gown, standing in the porch of the inn,\runder a dull red lamp swinging there, that looked much like an injured\reye, and carrying on a brisk scolding with a man in a purple woollen\rshirt.\r\r“Get along with ye,” said she to the man, “or I’ll be combing ye!”\r\r“Come on, Queequeg,” said I, “all right. There’s Mrs. Hussey.”\r\rAnd so it turned out; Mr. Hosea Hussey being from home, but leaving\rMrs. Hussey entirely competent to attend to all his affairs. Upon\rmaking known our desires for a supper and a bed, Mrs. Hussey,\rpostponing further scolding for the present, ushered us into a little\rroom, and seating us at a table spread with the relics of a recently\rconcluded repast, turned round to us and said—“Clam or Cod?”\r\r“What’s that about Cods, ma’am?” said I, with much politeness.\r\r“Clam or Cod?” she repeated.\r\r“A clam for supper? a cold clam; is _that_ what you mean, Mrs. Hussey?”\rsays I, “but that’s a rather cold and clammy reception in the winter\rtime, ain’t it, Mrs. Hussey?”\r\rBut being in a great hurry to resume scolding the man in the purple\rShirt, who was waiting for it in the entry, and seeming to hear nothing\rbut the word “clam,” Mrs. Hussey hurried towards an open door leading\rto the kitchen, and bawling out “clam for two,” disappeared.\r\r“Queequeg,” said I, “do you think that we can make out a supper for us\rboth on one clam?”\r\rHowever, a warm savory steam from the kitchen served to belie the\rapparently cheerless prospect before us. But when that smoking chowder\rcame in, the mystery was delightfully explained. Oh, sweet friends!\rhearken to me. It was made of small juicy clams, scarcely bigger than\rhazel nuts, mixed with pounded ship biscuit, and salted pork cut up\rinto little flakes; the whole enriched with butter, and plentifully\rseasoned with pepper and salt. Our appetites being sharpened by the\rfrosty voyage, and in particular, Queequeg seeing his favourite fishing\rfood before him, and the chowder being surpassingly excellent, we\rdespatched it with great expedition: when leaning back a moment and\rbethinking me of Mrs. Hussey’s clam and cod announcement, I thought I\rwould try a little experiment. Stepping to the kitchen door, I uttered\rthe word “cod” with great emphasis, and resumed my seat. In a few\rmoments the savoury steam came forth again, but with a different\rflavor, and in good time a fine cod-chowder was placed before us.\r\rWe resumed business; and while plying our spoons in the bowl, thinks I\rto myself, I wonder now if this here has any effect on the head? What’s\rthat stultifying saying about chowder-headed people? “But look,\rQueequeg, ain’t that a live eel in your bowl? Where’s your harpoon?”\r\rFishiest of all fishy places was the Try Pots, which well deserved its\rname; for the pots there were always boiling chowders. Chowder for\rbreakfast, and chowder for dinner, and chowder for supper, till you\rbegan to look for fish-bones coming through your clothes. The area\rbefore the house was paved with clam-shells. Mrs. Hussey wore a\rpolished necklace of codfish vertebra; and Hosea Hussey had his account\rbooks bound in superior old shark-skin. There was a fishy flavor to the\rmilk, too, which I could not at all account for, till one morning\rhappening to take a stroll along the beach among some fishermen’s\rboats, I saw Hosea’s brindled cow feeding on fish remnants, and\rmarching along the sand with each foot in a cod’s decapitated head,\rlooking very slip-shod, I assure ye.\r\rSupper concluded, we received a lamp, and directions from Mrs. Hussey\rconcerning the nearest way to bed; but, as Queequeg was about to\rprecede me up the stairs, the lady reached forth her arm, and demanded\rhis harpoon; she allowed no harpoon in her chambers. “Why not?” said I;\r“every true whaleman sleeps with his harpoon—but why not?” “Because\rit’s dangerous,” says she. “Ever since young Stiggs coming from that\runfort’nt v’y’ge of his, when he was gone four years and a half, with\ronly three barrels of _ile_, was found dead in my first floor back,\rwith his harpoon in his side; ever since then I allow no boarders to\rtake sich dangerous weepons in their rooms at night. So, Mr. Queequeg”\r(for she had learned his name), “I will just take this here iron, and\rkeep it for you till morning. But the chowder; clam or cod to-morrow\rfor breakfast, men?”\r\r“Both,” says I; “and let’s have a couple of smoked herring by way of\rvariety.”\r\r\rCHAPTER 16. The Ship.\r\rIn bed we concocted our plans for the morrow. But to my surprise and no\rsmall concern, Queequeg now gave me to understand, that he had been\rdiligently consulting Yojo—the name of his black little god—and Yojo\rhad told him two or three times over, and strongly insisted upon it\reveryway, that instead of our going together among the whaling-fleet in\rharbor, and in concert selecting our craft; instead of this, I say,\rYojo earnestly enjoined that the selection of the ship should rest\rwholly with me, inasmuch as Yojo purposed befriending us; and, in order\rto do so, had already pitched upon a vessel, which, if left to myself,\rI, Ishmael, should infallibly light upon, for all the world as though\rit had turned out by chance; and in that vessel I must immediately ship\rmyself, for the present irrespective of Queequeg.\r\rI have forgotten to mention that, in many things, Queequeg placed great\rconfidence in the excellence of Yojo’s judgment and surprising forecast\rof things; and cherished Yojo with considerable esteem, as a rather\rgood sort of god, who perhaps meant well enough upon the whole, but in\rall cases did not succeed in his benevolent designs.\r\rNow, this plan of Queequeg’s, or rather Yojo’s, touching the selection\rof our craft; I did not like that plan at all. I had not a little\rrelied upon Queequeg’s sagacity to point out the whaler best fitted to\rcarry us and our fortunes securely. But as all my remonstrances\rproduced no effect upon Queequeg, I was obliged to acquiesce; and\raccordingly prepared to set about this business with a determined\rrushing sort of energy and vigor, that should quickly settle that\rtrifling little affair. Next morning early, leaving Queequeg shut up\rwith Yojo in our little bedroom—for it seemed that it was some sort of\rLent or Ramadan, or day of fasting, humiliation, and prayer with\rQueequeg and Yojo that day; _how_ it was I never could find out, for,\rthough I applied myself to it several times, I never could master his\rliturgies and XXXIX Articles—leaving Queequeg, then, fasting on his\rtomahawk pipe, and Yojo warming himself at his sacrificial fire of\rshavings, I sallied out among the shipping. After much prolonged\rsauntering and many random inquiries, I learnt that there were three\rships up for three-years’ voyages—The Devil-dam, the Tit-bit, and the\rPequod. _Devil-Dam_, I do not know the origin of; _Tit-bit_ is obvious;\r_Pequod_, you will no doubt remember, was the name of a celebrated\rtribe of Massachusetts Indians; now extinct as the ancient Medes. I\rpeered and pryed about the Devil-dam; from her, hopped over to the\rTit-bit; and finally, going on board the Pequod, looked around her for\ra moment, and then decided that this was the very ship for us.\r\rYou may have seen many a quaint craft in your day, for aught I\rknow;—square-toed luggers; mountainous Japanese junks; butter-box\rgalliots, and what not; but take my word for it, you never saw such a\rrare old craft as this same rare old Pequod. She was a ship of the old\rschool, rather small if anything; with an old-fashioned claw-footed\rlook about her. Long seasoned and weather-stained in the typhoons and\rcalms of all four oceans, her old hull’s complexion was darkened like a\rFrench grenadier’s, who has alike fought in Egypt and Siberia. Her\rvenerable bows looked bearded. Her masts—cut somewhere on the coast of\rJapan, where her original ones were lost overboard in a gale—her masts\rstood stiffly up like the spines of the three old kings of Cologne. Her\rancient decks were worn and wrinkled, like the pilgrim-worshipped\rflag-stone in Canterbury Cathedral where Becket bled. But to all these\rher old antiquities, were added new and marvellous features, pertaining\rto the wild business that for more than half a century she had\rfollowed. Old Captain Peleg, many years her chief-mate, before he\rcommanded another vessel of his own, and now a retired seaman, and one\rof the principal owners of the Pequod,—this old Peleg, during the term\rof his chief-mateship, had built upon her original grotesqueness, and\rinlaid it, all over, with a quaintness both of material and device,\runmatched by anything except it be Thorkill-Hake’s carved buckler or\rbedstead. She was apparelled like any barbaric Ethiopian emperor, his\rneck heavy with pendants of polished ivory. She was a thing of\rtrophies. A cannibal of a craft, tricking herself forth in the chased\rbones of her enemies. All round, her unpanelled, open bulwarks were\rgarnished like one continuous jaw, with the long sharp teeth of the\rsperm whale, inserted there for pins, to fasten her old hempen thews\rand tendons to. Those thews ran not through base blocks of land wood,\rbut deftly travelled over sheaves of sea-ivory. Scorning a turnstile\rwheel at her reverend helm, she sported there a tiller; and that tiller\rwas in one mass, curiously carved from the long narrow lower jaw of her\rhereditary foe. The helmsman who steered by that tiller in a tempest,\rfelt like the Tartar, when he holds back his fiery steed by clutching\rits jaw. A noble craft, but somehow a most melancholy! All noble things\rare touched with that.\r\rNow when I looked about the quarter-deck, for some one having\rauthority, in order to propose myself as a candidate for the voyage, at\rfirst I saw nobody; but I could not well overlook a strange sort of\rtent, or rather wigwam, pitched a little behind the main-mast. It\rseemed only a temporary erection used in port. It was of a conical\rshape, some ten feet high; consisting of the long, huge slabs of limber\rblack bone taken from the middle and highest part of the jaws of the\rright-whale. Planted with their broad ends on the deck, a circle of\rthese slabs laced together, mutually sloped towards each other, and at\rthe apex united in a tufted point, where the loose hairy fibres waved\rto and fro like the top-knot on some old Pottowottamie Sachem’s head. A\rtriangular opening faced towards the bows of the ship, so that the\rinsider commanded a complete view forward.\r\rAnd half concealed in this queer tenement, I at length found one who by\rhis aspect seemed to have authority; and who, it being noon, and the\rship’s work suspended, was now enjoying respite from the burden of\rcommand. He was seated on an old-fashioned oaken chair, wriggling all\rover with curious carving; and the bottom of which was formed of a\rstout interlacing of the same elastic stuff of which the wigwam was\rconstructed.\r\rThere was nothing so very particular, perhaps, about the appearance of\rthe elderly man I saw; he was brown and brawny, like most old seamen,\rand heavily rolled up in blue pilot-cloth, cut in the Quaker style;\ronly there was a fine and almost microscopic net-work of the minutest\rwrinkles interlacing round his eyes, which must have arisen from his\rcontinual sailings in many hard gales, and always looking to\rwindward;—for this causes the muscles about the eyes to become pursed\rtogether. Such eye-wrinkles are very effectual in a scowl.\r\r“Is this the Captain of the Pequod?” said I, advancing to the door of\rthe tent.\r\r“Supposing it be the captain of the Pequod, what dost thou want of\rhim?” he demanded.\r\r“I was thinking of shipping.”\r\r“Thou wast, wast thou? I see thou art no Nantucketer—ever been in a\rstove boat?”\r\r“No, Sir, I never have.”\r\r“Dost know nothing at all about whaling, I dare say—eh?\r\r“Nothing, Sir; but I have no doubt I shall soon learn. I’ve been\rseveral voyages in the merchant service, and I think that—”\r\r“Merchant service be damned. Talk not that lingo to me. Dost see that\rleg?—I’ll take that leg away from thy stern, if ever thou talkest of\rthe marchant service to me again. Marchant service indeed! I suppose\rnow ye feel considerable proud of having served in those marchant\rships. But flukes! man, what makes thee want to go a whaling, eh?—it\rlooks a little suspicious, don’t it, eh?—Hast not been a pirate, hast\rthou?—Didst not rob thy last Captain, didst thou?—Dost not think of\rmurdering the officers when thou gettest to sea?”\r\rI protested my innocence of these things. I saw that under the mask of\rthese half humorous innuendoes, this old seaman, as an insulated\rQuakerish Nantucketer, was full of his insular prejudices, and rather\rdistrustful of all aliens, unless they hailed from Cape Cod or the\rVineyard.\r\r“But what takes thee a-whaling? I want to know that before I think of\rshipping ye.”\r\r“Well, sir, I want to see what whaling is. I want to see the world.”\r\r“Want to see what whaling is, eh? Have ye clapped eye on Captain Ahab?”\r\r“Who is Captain Ahab, sir?”\r\r“Aye, aye, I thought so. Captain Ahab is the Captain of this ship.”\r\r“I am mistaken then. I thought I was speaking to the Captain himself.”\r\r“Thou art speaking to Captain Peleg—that’s who ye are speaking to,\ryoung man. It belongs to me and Captain Bildad to see the Pequod fitted\rout for the voyage, and supplied with all her needs, including crew. We\rare part owners and agents. But as I was going to say, if thou wantest\rto know what whaling is, as thou tellest ye do, I can put ye in a way\rof finding it out before ye bind yourself to it, past backing out. Clap\reye on Captain Ahab, young man, and thou wilt find that he has only one\rleg.”\r\r“What do you mean, sir? Was the other one lost by a whale?”\r\r“Lost by a whale! Young man, come nearer to me: it was devoured, chewed\rup, crunched by the monstrousest parmacetty that ever chipped a\rboat!—ah, ah!”\r\rI was a little alarmed by his energy, perhaps also a little touched at\rthe hearty grief in his concluding exclamation, but said as calmly as I\rcould, “What you say is no doubt true enough, sir; but how could I know\rthere was any peculiar ferocity in that particular whale, though indeed\rI might have inferred as much from the simple fact of the accident.”\r\r“Look ye now, young man, thy lungs are a sort of soft, d’ye see; thou\rdost not talk shark a bit. _Sure_, ye’ve been to sea before now; sure\rof that?”\r\r“Sir,” said I, “I thought I told you that I had been four voyages in\rthe merchant—”\r\r“Hard down out of that! Mind what I said about the marchant\rservice—don’t aggravate me—I won’t have it. But let us understand each\rother. I have given thee a hint about what whaling is; do ye yet feel\rinclined for it?”\r\r“I do, sir.”\r\r“Very good. Now, art thou the man to pitch a harpoon down a live\rwhale’s throat, and then jump after it? Answer, quick!”\r\r“I am, sir, if it should be positively indispensable to do so; not to\rbe got rid of, that is; which I don’t take to be the fact.”\r\r“Good again. Now then, thou not only wantest to go a-whaling, to find\rout by experience what whaling is, but ye also want to go in order to\rsee the world? Was not that what ye said? I thought so. Well then, just\rstep forward there, and take a peep over the weather-bow, and then back\rto me and tell me what ye see there.”\r\rFor a moment I stood a little puzzled by this curious request, not\rknowing exactly how to take it, whether humorously or in earnest. But\rconcentrating all his crow’s feet into one scowl, Captain Peleg started\rme on the errand.\r\rGoing forward and glancing over the weather bow, I perceived that the\rship swinging to her anchor with the flood-tide, was now obliquely\rpointing towards the open ocean. The prospect was unlimited, but\rexceedingly monotonous and forbidding; not the slightest variety that I\rcould see.\r\r“Well, what’s the report?” said Peleg when I came back; “what did ye\rsee?”\r\r“Not much,” I replied—“nothing but water; considerable horizon though,\rand there’s a squall coming up, I think.”\r\r“Well, what does thou think then of seeing the world? Do ye wish to go\rround Cape Horn to see any more of it, eh? Can’t ye see the world where\ryou stand?”\r\rI was a little staggered, but go a-whaling I must, and I would; and the\rPequod was as good a ship as any—I thought the best—and all this I now\rrepeated to Peleg. Seeing me so determined, he expressed his\rwillingness to ship me.\r\r“And thou mayest as well sign the papers right off,” he added—“come\ralong with ye.” And so saying, he led the way below deck into the\rcabin.\r\rSeated on the transom was what seemed to me a most uncommon and\rsurprising figure. It turned out to be Captain Bildad, who along with\rCaptain Peleg was one of the largest owners of the vessel; the other\rshares, as is sometimes the case in these ports, being held by a crowd\rof old annuitants; widows, fatherless children, and chancery wards;\reach owning about the value of a timber head, or a foot of plank, or a\rnail or two in the ship. People in Nantucket invest their money in\rwhaling vessels, the same way that you do yours in approved state\rstocks bringing in good interest.\r\rNow, Bildad, like Peleg, and indeed many other Nantucketers, was a\rQuaker, the island having been originally settled by that sect; and to\rthis day its inhabitants in general retain in an uncommon measure the\rpeculiarities of the Quaker, only variously and anomalously modified by\rthings altogether alien and heterogeneous. For some of these same\rQuakers are the most sanguinary of all sailors and whale-hunters. They\rare fighting Quakers; they are Quakers with a vengeance.\r\rSo that there are instances among them of men, who, named with\rScripture names—a singularly common fashion on the island—and in\rchildhood naturally imbibing the stately dramatic thee and thou of the\rQuaker idiom; still, from the audacious, daring, and boundless\radventure of their subsequent lives, strangely blend with these\runoutgrown peculiarities, a thousand bold dashes of character, not\runworthy a Scandinavian sea-king, or a poetical Pagan Roman. And when\rthese things unite in a man of greatly superior natural force, with a\rglobular brain and a ponderous heart; who has also by the stillness and\rseclusion of many long night-watches in the remotest waters, and\rbeneath constellations never seen here at the north, been led to think\runtraditionally and independently; receiving all nature’s sweet or\rsavage impressions fresh from her own virgin voluntary and confiding\rbreast, and thereby chiefly, but with some help from accidental\radvantages, to learn a bold and nervous lofty language—that man makes\rone in a whole nation’s census—a mighty pageant creature, formed for\rnoble tragedies. Nor will it at all detract from him, dramatically\rregarded, if either by birth or other circumstances, he have what seems\ra half wilful overruling morbidness at the bottom of his nature. For\rall men tragically great are made so through a certain morbidness. Be\rsure of this, O young ambition, all mortal greatness is but disease.\rBut, as yet we have not to do with such an one, but with quite another;\rand still a man, who, if indeed peculiar, it only results again from\ranother phase of the Quaker, modified by individual circumstances.\r\rLike Captain Peleg, Captain Bildad was a well-to-do, retired whaleman.\rBut unlike Captain Peleg—who cared not a rush for what are called\rserious things, and indeed deemed those self-same serious things the\rveriest of all trifles—Captain Bildad had not only been originally\reducated according to the strictest sect of Nantucket Quakerism, but\rall his subsequent ocean life, and the sight of many unclad, lovely\risland creatures, round the Horn—all that had not moved this native\rborn Quaker one single jot, had not so much as altered one angle of his\rvest. Still, for all this immutableness, was there some lack of common\rconsistency about worthy Captain Bildad. Though refusing, from\rconscientious scruples, to bear arms against land invaders, yet himself\rhad illimitably invaded the Atlantic and Pacific; and though a sworn\rfoe to human bloodshed, yet had he in his straight-bodied coat, spilled\rtuns upon tuns of leviathan gore. How now in the contemplative evening\rof his days, the pious Bildad reconciled these things in the\rreminiscence, I do not know; but it did not seem to concern him much,\rand very probably he had long since come to the sage and sensible\rconclusion that a man’s religion is one thing, and this practical world\rquite another. This world pays dividends. Rising from a little\rcabin-boy in short clothes of the drabbest drab, to a harpooneer in a\rbroad shad-bellied waistcoat; from that becoming boat-header,\rchief-mate, and captain, and finally a ship owner; Bildad, as I hinted\rbefore, had concluded his adventurous career by wholly retiring from\ractive life at the goodly age of sixty, and dedicating his remaining\rdays to the quiet receiving of his well-earned income.\r\rNow, Bildad, I am sorry to say, had the reputation of being an\rincorrigible old hunks, and in his sea-going days, a bitter, hard\rtask-master. They told me in Nantucket, though it certainly seems a\rcurious story, that when he sailed the old Categut whaleman, his crew,\rupon arriving home, were mostly all carried ashore to the hospital,\rsore exhausted and worn out. For a pious man, especially for a Quaker,\rhe was certainly rather hard-hearted, to say the least. He never used\rto swear, though, at his men, they said; but somehow he got an\rinordinate quantity of cruel, unmitigated hard work out of them. When\rBildad was a chief-mate, to have his drab-coloured eye intently looking\rat you, made you feel completely nervous, till you could clutch\rsomething—a hammer or a marling-spike, and go to work like mad, at\rsomething or other, never mind what. Indolence and idleness perished\rbefore him. His own person was the exact embodiment of his utilitarian\rcharacter. On his long, gaunt body, he carried no spare flesh, no\rsuperfluous beard, his chin having a soft, economical nap to it, like\rthe worn nap of his broad-brimmed hat.\r\rSuch, then, was the person that I saw seated on the transom when I\rfollowed Captain Peleg down into the cabin. The space between the decks\rwas small; and there, bolt-upright, sat old Bildad, who always sat so,\rand never leaned, and this to save his coat tails. His broad-brim was\rplaced beside him; his legs were stiffly crossed; his drab vesture was\rbuttoned up to his chin; and spectacles on nose, he seemed absorbed in\rreading from a ponderous volume.\r\r“Bildad,” cried Captain Peleg, “at it again, Bildad, eh? Ye have been\rstudying those Scriptures, now, for the last thirty years, to my\rcertain knowledge. How far ye got, Bildad?”\r\rAs if long habituated to such profane talk from his old shipmate,\rBildad, without noticing his present irreverence, quietly looked up,\rand seeing me, glanced again inquiringly towards Peleg.\r\r“He says he’s our man, Bildad,” said Peleg, “he wants to ship.”\r\r“Dost thee?” said Bildad, in a hollow tone, and turning round to me.\r\r“I _dost_,” said I unconsciously, he was so intense a Quaker.\r\r“What do ye think of him, Bildad?” said Peleg.\r\r“He’ll do,” said Bildad, eyeing me, and then went on spelling away at\rhis book in a mumbling tone quite audible.\r\rI thought him the queerest old Quaker I ever saw, especially as Peleg,\rhis friend and old shipmate, seemed such a blusterer. But I said\rnothing, only looking round me sharply. Peleg now threw open a chest,\rand drawing forth the ship’s articles, placed pen and ink before him,\rand seated himself at a little table. I began to think it was high time\rto settle with myself at what terms I would be willing to engage for\rthe voyage. I was already aware that in the whaling business they paid\rno wages; but all hands, including the captain, received certain shares\rof the profits called _lays_, and that these lays were proportioned to\rthe degree of importance pertaining to the respective duties of the\rship’s company. I was also aware that being a green hand at whaling, my\rown lay would not be very large; but considering that I was used to the\rsea, could steer a ship, splice a rope, and all that, I made no doubt\rthat from all I had heard I should be offered at least the 275th\rlay—that is, the 275th part of the clear net proceeds of the voyage,\rwhatever that might eventually amount to. And though the 275th lay was\rwhat they call a rather _long lay_, yet it was better than nothing; and\rif we had a lucky voyage, might pretty nearly pay for the clothing I\rwould wear out on it, not to speak of my three years’ beef and board,\rfor which I would not have to pay one stiver.\r\rIt might be thought that this was a poor way to accumulate a princely\rfortune—and so it was, a very poor way indeed. But I am one of those\rthat never take on about princely fortunes, and am quite content if the\rworld is ready to board and lodge me, while I am putting up at this\rgrim sign of the Thunder Cloud. Upon the whole, I thought that the\r275th lay would be about the fair thing, but would not have been\rsurprised had I been offered the 200th, considering I was of a\rbroad-shouldered make.\r\rBut one thing, nevertheless, that made me a little distrustful about\rreceiving a generous share of the profits was this: Ashore, I had heard\rsomething of both Captain Peleg and his unaccountable old crony Bildad;\rhow that they being the principal proprietors of the Pequod, therefore\rthe other and more inconsiderable and scattered owners, left nearly the\rwhole management of the ship’s affairs to these two. And I did not know\rbut what the stingy old Bildad might have a mighty deal to say about\rshipping hands, especially as I now found him on board the Pequod,\rquite at home there in the cabin, and reading his Bible as if at his\rown fireside. Now while Peleg was vainly trying to mend a pen with his\rjack-knife, old Bildad, to my no small surprise, considering that he\rwas such an interested party in these proceedings; Bildad never heeded\rus, but went on mumbling to himself out of his book, “_Lay_ not up for\ryourselves treasures upon earth, where moth—”\r\r“Well, Captain Bildad,” interrupted Peleg, “what d’ye say, what lay\rshall we give this young man?”\r\r“Thou knowest best,” was the sepulchral reply, “the seven hundred and\rseventy-seventh wouldn’t be too much, would it?—‘where moth and rust do\rcorrupt, but _lay_—’”\r\r_Lay_, indeed, thought I, and such a lay! the seven hundred and\rseventy-seventh! Well, old Bildad, you are determined that I, for one,\rshall not _lay_ up many _lays_ here below, where moth and rust do\rcorrupt. It was an exceedingly _long lay_ that, indeed; and though from\rthe magnitude of the figure it might at first deceive a landsman, yet\rthe slightest consideration will show that though seven hundred and\rseventy-seven is a pretty large number, yet, when you come to make a\r_teenth_ of it, you will then see, I say, that the seven hundred and\rseventy-seventh part of a farthing is a good deal less than seven\rhundred and seventy-seven gold doubloons; and so I thought at the time.\r\r“Why, blast your eyes, Bildad,” cried Peleg, “thou dost not want to\rswindle this young man! he must have more than that.”\r\r“Seven hundred and seventy-seventh,” again said Bildad, without lifting\rhis eyes; and then went on mumbling—“for where your treasure is, there\rwill your heart be also.”\r\r“I am going to put him down for the three hundredth,” said Peleg, “do\rye hear that, Bildad! The three hundredth lay, I say.”\r\rBildad laid down his book, and turning solemnly towards him said,\r“Captain Peleg, thou hast a generous heart; but thou must consider the\rduty thou owest to the other owners of this ship—widows and orphans,\rmany of them—and that if we too abundantly reward the labors of this\ryoung man, we may be taking the bread from those widows and those\rorphans. The seven hundred and seventy-seventh lay, Captain Peleg.”\r\r“Thou Bildad!” roared Peleg, starting up and clattering about the\rcabin. “Blast ye, Captain Bildad, if I had followed thy advice in these\rmatters, I would afore now had a conscience to lug about that would be\rheavy enough to founder the largest ship that ever sailed round Cape\rHorn.”\r\r“Captain Peleg,” said Bildad steadily, “thy conscience may be drawing\rten inches of water, or ten fathoms, I can’t tell; but as thou art\rstill an impenitent man, Captain Peleg, I greatly fear lest thy\rconscience be but a leaky one; and will in the end sink thee foundering\rdown to the fiery pit, Captain Peleg.”\r\r“Fiery pit! fiery pit! ye insult me, man; past all natural bearing, ye\rinsult me. It’s an all-fired outrage to tell any human creature that\rhe’s bound to hell. Flukes and flames! Bildad, say that again to me,\rand start my soul-bolts, but I’ll—I’ll—yes, I’ll swallow a live goat\rwith all his hair and horns on. Out of the cabin, ye canting,\rdrab-coloured son of a wooden gun—a straight wake with ye!”\r\rAs he thundered out this he made a rush at Bildad, but with a\rmarvellous oblique, sliding celerity, Bildad for that time eluded him.\r\rAlarmed at this terrible outburst between the two principal and\rresponsible owners of the ship, and feeling half a mind to give up all\ridea of sailing in a vessel so questionably owned and temporarily\rcommanded, I stepped aside from the door to give egress to Bildad, who,\rI made no doubt, was all eagerness to vanish from before the awakened\rwrath of Peleg. But to my astonishment, he sat down again on the\rtransom very quietly, and seemed to have not the slightest intention of\rwithdrawing. He seemed quite used to impenitent Peleg and his ways. As\rfor Peleg, after letting off his rage as he had, there seemed no more\rleft in him, and he, too, sat down like a lamb, though he twitched a\rlittle as if still nervously agitated. “Whew!” he whistled at last—“the\rsquall’s gone off to leeward, I think. Bildad, thou used to be good at\rsharpening a lance, mend that pen, will ye. My jack-knife here needs\rthe grindstone. That’s he; thank ye, Bildad. Now then, my young man,\rIshmael’s thy name, didn’t ye say? Well then, down ye go here, Ishmael,\rfor the three hundredth lay.”\r\r“Captain Peleg,” said I, “I have a friend with me who wants to ship\rtoo—shall I bring him down to-morrow?”\r\r“To be sure,” said Peleg. “Fetch him along, and we’ll look at him.”\r\r“What lay does he want?” groaned Bildad, glancing up from the book in\rwhich he had again been burying himself.\r\r“Oh! never thee mind about that, Bildad,” said Peleg. “Has he ever\rwhaled it any?” turning to me.\r\r“Killed more whales than I can count, Captain Peleg.”\r\r“Well, bring him along then.”\r\rAnd, after signing the papers, off I went; nothing doubting but that I\rhad done a good morning’s work, and that the Pequod was the identical\rship that Yojo had provided to carry Queequeg and me round the Cape.\r\rBut I had not proceeded far, when I began to bethink me that the\rCaptain with whom I was to sail yet remained unseen by me; though,\rindeed, in many cases, a whale-ship will be completely fitted out, and\rreceive all her crew on board, ere the captain makes himself visible by\rarriving to take command; for sometimes these voyages are so prolonged,\rand the shore intervals at home so exceedingly brief, that if the\rcaptain have a family, or any absorbing concernment of that sort, he\rdoes not trouble himself much about his ship in port, but leaves her to\rthe owners till all is ready for sea. However, it is always as well to\rhave a look at him before irrevocably committing yourself into his\rhands. Turning back I accosted Captain Peleg, inquiring where Captain\rAhab was to be found.\r\r“And what dost thou want of Captain Ahab? It’s all right enough; thou\rart shipped.”\r\r“Yes, but I should like to see him.”\r\r“But I don’t think thou wilt be able to at present. I don’t know\rexactly what’s the matter with him; but he keeps close inside the\rhouse; a sort of sick, and yet he don’t look so. In fact, he ain’t\rsick; but no, he isn’t well either. Any how, young man, he won’t always\rsee me, so I don’t suppose he will thee. He’s a queer man, Captain\rAhab—so some think—but a good one. Oh, thou’lt like him well enough; no\rfear, no fear. He’s a grand, ungodly, god-like man, Captain Ahab;\rdoesn’t speak much; but, when he does speak, then you may well listen.\rMark ye, be forewarned; Ahab’s above the common; Ahab’s been in\rcolleges, as well as ’mong the cannibals; been used to deeper wonders\rthan the waves; fixed his fiery lance in mightier, stranger foes than\rwhales. His lance! aye, the keenest and the surest that out of all our\risle! Oh! he ain’t Captain Bildad; no, and he ain’t Captain Peleg;\r_he’s Ahab_, boy; and Ahab of old, thou knowest, was a crowned king!”\r\r“And a very vile one. When that wicked king was slain, the dogs, did\rthey not lick his blood?”\r\r“Come hither to me—hither, hither,” said Peleg, with a significance in\rhis eye that almost startled me. “Look ye, lad; never say that on board\rthe Pequod. Never say it anywhere. Captain Ahab did not name himself.\r’Twas a foolish, ignorant whim of his crazy, widowed mother, who died\rwhen he was only a twelvemonth old. And yet the old squaw Tistig, at\rGayhead, said that the name would somehow prove prophetic. And,\rperhaps, other fools like her may tell thee the same. I wish to warn\rthee. It’s a lie. I know Captain Ahab well; I’ve sailed with him as\rmate years ago; I know what he is—a good man—not a pious, good man,\rlike Bildad, but a swearing good man—something like me—only there’s a\rgood deal more of him. Aye, aye, I know that he was never very jolly;\rand I know that on the passage home, he was a little out of his mind\rfor a spell; but it was the sharp shooting pains in his bleeding stump\rthat brought that about, as any one might see. I know, too, that ever\rsince he lost his leg last voyage by that accursed whale, he’s been a\rkind of moody—desperate moody, and savage sometimes; but that will all\rpass off. And once for all, let me tell thee and assure thee, young\rman, it’s better to sail with a moody good captain than a laughing bad\rone. So good-bye to thee—and wrong not Captain Ahab, because he happens\rto have a wicked name. Besides, my boy, he has a wife—not three voyages\rwedded—a sweet, resigned girl. Think of that; by that sweet girl that\rold man has a child: hold ye then there can be any utter, hopeless harm\rin Ahab? No, no, my lad; stricken, blasted, if he be, Ahab has his\rhumanities!”\r\rAs I walked away, I was full of thoughtfulness; what had been\rincidentally revealed to me of Captain Ahab, filled me with a certain\rwild vagueness of painfulness concerning him. And somehow, at the time,\rI felt a sympathy and a sorrow for him, but for I don’t know what,\runless it was the cruel loss of his leg. And yet I also felt a strange\rawe of him; but that sort of awe, which I cannot at all describe, was\rnot exactly awe; I do not know what it was. But I felt it; and it did\rnot disincline me towards him; though I felt impatience at what seemed\rlike mystery in him, so imperfectly as he was known to me then.\rHowever, my thoughts were at length carried in other directions, so\rthat for the present dark Ahab slipped my mind.\r\r\rCHAPTER 17. The Ramadan.\r\rAs Queequeg’s Ramadan, or Fasting and Humiliation, was to continue all\rday, I did not choose to disturb him till towards night-fall; for I\rcherish the greatest respect towards everybody’s religious obligations,\rnever mind how comical, and could not find it in my heart to undervalue\reven a congregation of ants worshipping a toad-stool; or those other\rcreatures in certain parts of our earth, who with a degree of\rfootmanism quite unprecedented in other planets, bow down before the\rtorso of a deceased landed proprietor merely on account of the\rinordinate possessions yet owned and rented in his name.\r\rI say, we good Presbyterian Christians should be charitable in these\rthings, and not fancy ourselves so vastly superior to other mortals,\rpagans and what not, because of their half-crazy conceits on these\rsubjects. There was Queequeg, now, certainly entertaining the most\rabsurd notions about Yojo and his Ramadan;—but what of that? Queequeg\rthought he knew what he was about, I suppose; he seemed to be content;\rand there let him rest. All our arguing with him would not avail; let\rhim be, I say: and Heaven have mercy on us all—Presbyterians and Pagans\ralike—for we are all somehow dreadfully cracked about the head, and\rsadly need mending.\r\rTowards evening, when I felt assured that all his performances and\rrituals must be over, I went up to his room and knocked at the door;\rbut no answer. I tried to open it, but it was fastened inside.\r“Queequeg,” said I softly through the key-hole:—all silent. “I say,\rQueequeg! why don’t you speak? It’s I—Ishmael.” But all remained still\ras before. I began to grow alarmed. I had allowed him such abundant\rtime; I thought he might have had an apoplectic fit. I looked through\rthe key-hole; but the door opening into an odd corner of the room, the\rkey-hole prospect was but a crooked and sinister one. I could only see\rpart of the foot-board of the bed and a line of the wall, but nothing\rmore. I was surprised to behold resting against the wall the wooden\rshaft of Queequeg’s harpoon, which the landlady the evening previous\rhad taken from him, before our mounting to the chamber. That’s strange,\rthought I; but at any rate, since the harpoon stands yonder, and he\rseldom or never goes abroad without it, therefore he must be inside\rhere, and no possible mistake.\r\r“Queequeg!—Queequeg!”—all still. Something must have happened.\rApoplexy! I tried to burst open the door; but it stubbornly resisted.\rRunning down stairs, I quickly stated my suspicions to the first person\rI met—the chamber-maid. “La! la!” she cried, “I thought something must\rbe the matter. I went to make the bed after breakfast, and the door was\rlocked; and not a mouse to be heard; and it’s been just so silent ever\rsince. But I thought, may be, you had both gone off and locked your\rbaggage in for safe keeping. La! la, ma’am!—Mistress! murder! Mrs.\rHussey! apoplexy!”—and with these cries, she ran towards the kitchen, I\rfollowing.\r\rMrs. Hussey soon appeared, with a mustard-pot in one hand and a\rvinegar-cruet in the other, having just broken away from the occupation\rof attending to the castors, and scolding her little black boy\rmeantime.\r\r“Wood-house!” cried I, “which way to it? Run for God’s sake, and fetch\rsomething to pry open the door—the axe!—the axe! he’s had a stroke;\rdepend upon it!”—and so saying I was unmethodically rushing up stairs\ragain empty-handed, when Mrs. Hussey interposed the mustard-pot and\rvinegar-cruet, and the entire castor of her countenance.\r\r“What’s the matter with you, young man?”\r\r“Get the axe! For God’s sake, run for the doctor, some one, while I pry\rit open!”\r\r“Look here,” said the landlady, quickly putting down the vinegar-cruet,\rso as to have one hand free; “look here; are you talking about prying\ropen any of my doors?”—and with that she seized my arm. “What’s the\rmatter with you? What’s the matter with you, shipmate?”\r\rIn as calm, but rapid a manner as possible, I gave her to understand\rthe whole case. Unconsciously clapping the vinegar-cruet to one side of\rher nose, she ruminated for an instant; then exclaimed—“No! I haven’t\rseen it since I put it there.” Running to a little closet under the\rlanding of the stairs, she glanced in, and returning, told me that\rQueequeg’s harpoon was missing. “He’s killed himself,” she cried. “It’s\runfort’nate Stiggs done over again—there goes another counterpane—God\rpity his poor mother!—it will be the ruin of my house. Has the poor lad\ra sister? Where’s that girl?—there, Betty, go to Snarles the Painter,\rand tell him to paint me a sign, with—“no suicides permitted here, and\rno smoking in the parlor;”—might as well kill both birds at once. Kill?\rThe Lord be merciful to his ghost! What’s that noise there? You, young\rman, avast there!”\r\rAnd running up after me, she caught me as I was again trying to force\ropen the door.\r\r“I don’t allow it; I won’t have my premises spoiled. Go for the\rlocksmith, there’s one about a mile from here. But avast!” putting her\rhand in her side-pocket, “here’s a key that’ll fit, I guess; let’s\rsee.” And with that, she turned it in the lock; but, alas! Queequeg’s\rsupplemental bolt remained unwithdrawn within.\r\r“Have to burst it open,” said I, and was running down the entry a\rlittle, for a good start, when the landlady caught at me, again vowing\rI should not break down her premises; but I tore from her, and with a\rsudden bodily rush dashed myself full against the mark.\r\rWith a prodigious noise the door flew open, and the knob slamming\ragainst the wall, sent the plaster to the ceiling; and there, good\rheavens! there sat Queequeg, altogether cool and self-collected; right\rin the middle of the room; squatting on his hams, and holding Yojo on\rtop of his head. He looked neither one way nor the other way, but sat\rlike a carved image with scarce a sign of active life.\r\r“Queequeg,” said I, going up to him, “Queequeg, what’s the matter with\ryou?”\r\r“He hain’t been a sittin’ so all day, has he?” said the landlady.\r\rBut all we said, not a word could we drag out of him; I almost felt\rlike pushing him over, so as to change his position, for it was almost\rintolerable, it seemed so painfully and unnaturally constrained;\respecially, as in all probability he had been sitting so for upwards of\reight or ten hours, going too without his regular meals.\r\r“Mrs. Hussey,” said I, “he’s _alive_ at all events; so leave us, if you\rplease, and I will see to this strange affair myself.”\r\rClosing the door upon the landlady, I endeavored to prevail upon\rQueequeg to take a chair; but in vain. There he sat; and all he could\rdo—for all my polite arts and blandishments—he would not move a peg,\rnor say a single word, nor even look at me, nor notice my presence in\rthe slightest way.\r\rI wonder, thought I, if this can possibly be a part of his Ramadan; do\rthey fast on their hams that way in his native island. It must be so;\ryes, it’s part of his creed, I suppose; well, then, let him rest; he’ll\rget up sooner or later, no doubt. It can’t last for ever, thank God,\rand his Ramadan only comes once a year; and I don’t believe it’s very\rpunctual then.\r\rI went down to supper. After sitting a long time listening to the long\rstories of some sailors who had just come from a plum-pudding voyage,\ras they called it (that is, a short whaling-voyage in a schooner or\rbrig, confined to the north of the line, in the Atlantic Ocean only);\rafter listening to these plum-puddingers till nearly eleven o’clock, I\rwent up stairs to go to bed, feeling quite sure by this time Queequeg\rmust certainly have brought his Ramadan to a termination. But no; there\rhe was just where I had left him; he had not stirred an inch. I began\rto grow vexed with him; it seemed so downright senseless and insane to\rbe sitting there all day and half the night on his hams in a cold room,\rholding a piece of wood on his head.\r\r“For heaven’s sake, Queequeg, get up and shake yourself; get up and\rhave some supper. You’ll starve; you’ll kill yourself, Queequeg.” But\rnot a word did he reply.\r\rDespairing of him, therefore, I determined to go to bed and to sleep;\rand no doubt, before a great while, he would follow me. But previous to\rturning in, I took my heavy bearskin jacket, and threw it over him, as\rit promised to be a very cold night; and he had nothing but his\rordinary round jacket on. For some time, do all I would, I could not\rget into the faintest doze. I had blown out the candle; and the mere\rthought of Queequeg—not four feet off—sitting there in that uneasy\rposition, stark alone in the cold and dark; this made me really\rwretched. Think of it; sleeping all night in the same room with a wide\rawake pagan on his hams in this dreary, unaccountable Ramadan!\r\rBut somehow I dropped off at last, and knew nothing more till break of\rday; when, looking over the bedside, there squatted Queequeg, as if he\rhad been screwed down to the floor. But as soon as the first glimpse of\rsun entered the window, up he got, with stiff and grating joints, but\rwith a cheerful look; limped towards me where I lay; pressed his\rforehead again against mine; and said his Ramadan was over.\r\rNow, as I before hinted, I have no objection to any person’s religion,\rbe it what it may, so long as that person does not kill or insult any\rother person, because that other person don’t believe it also. But when\ra man’s religion becomes really frantic; when it is a positive torment\rto him; and, in fine, makes this earth of ours an uncomfortable inn to\rlodge in; then I think it high time to take that individual aside and\rargue the point with him.\r\rAnd just so I now did with Queequeg. “Queequeg,” said I, “get into bed\rnow, and lie and listen to me.” I then went on, beginning with the rise\rand progress of the primitive religions, and coming down to the various\rreligions of the present time, during which time I labored to show\rQueequeg that all these Lents, Ramadans, and prolonged ham-squattings\rin cold, cheerless rooms were stark nonsense; bad for the health;\ruseless for the soul; opposed, in short, to the obvious laws of Hygiene\rand common sense. I told him, too, that he being in other things such\ran extremely sensible and sagacious savage, it pained me, very badly\rpained me, to see him now so deplorably foolish about this ridiculous\rRamadan of his. Besides, argued I, fasting makes the body cave in;\rhence the spirit caves in; and all thoughts born of a fast must\rnecessarily be half-starved. This is the reason why most dyspeptic\rreligionists cherish such melancholy notions about their hereafters. In\rone word, Queequeg, said I, rather digressively; hell is an idea first\rborn on an undigested apple-dumpling; and since then perpetuated\rthrough the hereditary dyspepsias nurtured by Ramadans.\r\rI then asked Queequeg whether he himself was ever troubled with\rdyspepsia; expressing the idea very plainly, so that he could take it\rin. He said no; only upon one memorable occasion. It was after a great\rfeast given by his father the king, on the gaining of a great battle\rwherein fifty of the enemy had been killed by about two o’clock in the\rafternoon, and all cooked and eaten that very evening.\r\r“No more, Queequeg,” said I, shuddering; “that will do;” for I knew the\rinferences without his further hinting them. I had seen a sailor who\rhad visited that very island, and he told me that it was the custom,\rwhen a great battle had been gained there, to barbecue all the slain in\rthe yard or garden of the victor; and then, one by one, they were\rplaced in great wooden trenchers, and garnished round like a pilau,\rwith breadfruit and cocoanuts; and with some parsley in their mouths,\rwere sent round with the victor’s compliments to all his friends, just\ras though these presents were so many Christmas turkeys.\r\rAfter all, I do not think that my remarks about religion made much\rimpression upon Queequeg. Because, in the first place, he somehow\rseemed dull of hearing on that important subject, unless considered\rfrom his own point of view; and, in the second place, he did not more\rthan one third understand me, couch my ideas simply as I would; and,\rfinally, he no doubt thought he knew a good deal more about the true\rreligion than I did. He looked at me with a sort of condescending\rconcern and compassion, as though he thought it a great pity that such\ra sensible young man should be so hopelessly lost to evangelical pagan\rpiety.\r\rAt last we rose and dressed; and Queequeg, taking a prodigiously hearty\rbreakfast of chowders of all sorts, so that the landlady should not\rmake much profit by reason of his Ramadan, we sallied out to board the\rPequod, sauntering along, and picking our teeth with halibut bones.\r\r\rCHAPTER 18. His Mark.\r\rAs we were walking down the end of the wharf towards the ship, Queequeg\rcarrying his harpoon, Captain Peleg in his gruff voice loudly hailed us\rfrom his wigwam, saying he had not suspected my friend was a cannibal,\rand furthermore announcing that he let no cannibals on board that\rcraft, unless they previously produced their papers.\r\r“What do you mean by that, Captain Peleg?” said I, now jumping on the\rbulwarks, and leaving my comrade standing on the wharf.\r\r“I mean,” he replied, “he must show his papers.”\r\r“Yes,” said Captain Bildad in his hollow voice, sticking his head from\rbehind Peleg’s, out of the wigwam. “He must show that he’s converted.\rSon of darkness,” he added, turning to Queequeg, “art thou at present\rin communion with any Christian church?”\r\r“Why,” said I, “he’s a member of the first Congregational Church.” Here\rbe it said, that many tattooed savages sailing in Nantucket ships at\rlast come to be converted into the churches.\r\r“First Congregational Church,” cried Bildad, “what! that worships in\rDeacon Deuteronomy Coleman’s meeting-house?” and so saying, taking out\rhis spectacles, he rubbed them with his great yellow bandana\rhandkerchief, and putting them on very carefully, came out of the\rwigwam, and leaning stiffly over the bulwarks, took a good long look at\rQueequeg.\r\r“How long hath he been a member?” he then said, turning to me; “not\rvery long, I rather guess, young man.”\r\r“No,” said Peleg, “and he hasn’t been baptized right either, or it\rwould have washed some of that devil’s blue off his face.”\r\r“Do tell, now,” cried Bildad, “is this Philistine a regular member of\rDeacon Deuteronomy’s meeting? I never saw him going there, and I pass\rit every Lord’s day.”\r\r“I don’t know anything about Deacon Deuteronomy or his meeting,” said\rI; “all I know is, that Queequeg here is a born member of the First\rCongregational Church. He is a deacon himself, Queequeg is.”\r\r“Young man,” said Bildad sternly, “thou art skylarking with me—explain\rthyself, thou young Hittite. What church dost thee mean? answer me.”\r\rFinding myself thus hard pushed, I replied. “I mean, sir, the same\rancient Catholic Church to which you and I, and Captain Peleg there,\rand Queequeg here, and all of us, and every mother’s son and soul of us\rbelong; the great and everlasting First Congregation of this whole\rworshipping world; we all belong to that; only some of us cherish some\rqueer crotchets no ways touching the grand belief; in _that_ we all\rjoin hands.”\r\r“Splice, thou mean’st _splice_ hands,” cried Peleg, drawing nearer.\r“Young man, you’d better ship for a missionary, instead of a fore-mast\rhand; I never heard a better sermon. Deacon Deuteronomy—why Father\rMapple himself couldn’t beat it, and he’s reckoned something. Come\raboard, come aboard; never mind about the papers. I say, tell Quohog\rthere—what’s that you call him? tell Quohog to step along. By the great\ranchor, what a harpoon he’s got there! looks like good stuff that; and\rhe handles it about right. I say, Quohog, or whatever your name is, did\ryou ever stand in the head of a whale-boat? did you ever strike a\rfish?”\r\rWithout saying a word, Queequeg, in his wild sort of way, jumped upon\rthe bulwarks, from thence into the bows of one of the whale-boats\rhanging to the side; and then bracing his left knee, and poising his\rharpoon, cried out in some such way as this:—\r\r“Cap’ain, you see him small drop tar on water dere? You see him? well,\rspose him one whale eye, well, den!” and taking sharp aim at it, he\rdarted the iron right over old Bildad’s broad brim, clean across the\rship’s decks, and struck the glistening tar spot out of sight.\r\r“Now,” said Queequeg, quietly hauling in the line, “spos-ee him whale-e\reye; why, dad whale dead.”\r\r“Quick, Bildad,” said Peleg, his partner, who, aghast at the close\rvicinity of the flying harpoon, had retreated towards the cabin\rgangway. “Quick, I say, you Bildad, and get the ship’s papers. We must\rhave Hedgehog there, I mean Quohog, in one of our boats. Look ye,\rQuohog, we’ll give ye the ninetieth lay, and that’s more than ever was\rgiven a harpooneer yet out of Nantucket.”\r\rSo down we went into the cabin, and to my great joy Queequeg was soon\renrolled among the same ship’s company to which I myself belonged.\r\rWhen all preliminaries were over and Peleg had got everything ready for\rsigning, he turned to me and said, “I guess, Quohog there don’t know\rhow to write, does he? I say, Quohog, blast ye! dost thou sign thy name\ror make thy mark?”\r\rBut at this question, Queequeg, who had twice or thrice before taken\rpart in similar ceremonies, looked no ways abashed; but taking the\roffered pen, copied upon the paper, in the proper place, an exact\rcounterpart of a queer round figure which was tattooed upon his arm; so\rthat through Captain Peleg’s obstinate mistake touching his\rappellative, it stood something like this:—\r\rQuohog. his X mark.\r\rMeanwhile Captain Bildad sat earnestly and steadfastly eyeing Queequeg,\rand at last rising solemnly and fumbling in the huge pockets of his\rbroad-skirted drab coat, took out a bundle of tracts, and selecting one\rentitled “The Latter Day Coming; or No Time to Lose,” placed it in\rQueequeg’s hands, and then grasping them and the book with both his,\rlooked earnestly into his eyes, and said, “Son of darkness, I must do\rmy duty by thee; I am part owner of this ship, and feel concerned for\rthe souls of all its crew; if thou still clingest to thy Pagan ways,\rwhich I sadly fear, I beseech thee, remain not for aye a Belial\rbondsman. Spurn the idol Bell, and the hideous dragon; turn from the\rwrath to come; mind thine eye, I say; oh! goodness gracious! steer\rclear of the fiery pit!”\r\rSomething of the salt sea yet lingered in old Bildad’s language,\rheterogeneously mixed with Scriptural and domestic phrases.\r\r“Avast there, avast there, Bildad, avast now spoiling our harpooneer,”\rcried Peleg. “Pious harpooneers never make good voyagers—it takes the\rshark out of ’em; no harpooneer is worth a straw who aint pretty\rsharkish. There was young Nat Swaine, once the bravest boat-header out\rof all Nantucket and the Vineyard; he joined the meeting, and never\rcame to good. He got so frightened about his plaguy soul, that he\rshrinked and sheered away from whales, for fear of after-claps, in case\rhe got stove and went to Davy Jones.”\r\r“Peleg! Peleg!” said Bildad, lifting his eyes and hands, “thou thyself,\ras I myself, hast seen many a perilous time; thou knowest, Peleg, what\rit is to have the fear of death; how, then, can’st thou prate in this\rungodly guise. Thou beliest thine own heart, Peleg. Tell me, when this\rsame Pequod here had her three masts overboard in that typhoon on\rJapan, that same voyage when thou went mate with Captain Ahab, did’st\rthou not think of Death and the Judgment then?”\r\r“Hear him, hear him now,” cried Peleg, marching across the cabin, and\rthrusting his hands far down into his pockets,—“hear him, all of ye.\rThink of that! When every moment we thought the ship would sink! Death\rand the Judgment then? What? With all three masts making such an\reverlasting thundering against the side; and every sea breaking over\rus, fore and aft. Think of Death and the Judgment then? No! no time to\rthink about Death then. Life was what Captain Ahab and I was thinking\rof; and how to save all hands—how to rig jury-masts—how to get into the\rnearest port; that was what I was thinking of.”\r\rBildad said no more, but buttoning up his coat, stalked on deck, where\rwe followed him. There he stood, very quietly overlooking some\rsailmakers who were mending a top-sail in the waist. Now and then he\rstooped to pick up a patch, or save an end of tarred twine, which\rotherwise might have been wasted.\r\r\rCHAPTER 19. The Prophet.\r\r“Shipmates, have ye shipped in that ship?”\r\rQueequeg and I had just left the Pequod, and were sauntering away from\rthe water, for the moment each occupied with his own thoughts, when the\rabove words were put to us by a stranger, who, pausing before us,\rlevelled his massive forefinger at the vessel in question. He was but\rshabbily apparelled in faded jacket and patched trowsers; a rag of a\rblack handkerchief investing his neck. A confluent small-pox had in all\rdirections flowed over his face, and left it like the complicated\rribbed bed of a torrent, when the rushing waters have been dried up.\r\r“Have ye shipped in her?” he repeated.\r\r“You mean the ship Pequod, I suppose,” said I, trying to gain a little\rmore time for an uninterrupted look at him.\r\r“Aye, the Pequod—that ship there,” he said, drawing back his whole arm,\rand then rapidly shoving it straight out from him, with the fixed\rbayonet of his pointed finger darted full at the object.\r\r“Yes,” said I, “we have just signed the articles.”\r\r“Anything down there about your souls?”\r\r“About what?”\r\r“Oh, perhaps you hav’n’t got any,” he said quickly. “No matter though,\rI know many chaps that hav’n’t got any,—good luck to ’em; and they are\rall the better off for it. A soul’s a sort of a fifth wheel to a\rwagon.”\r\r“What are you jabbering about, shipmate?” said I.\r\r“_He’s_ got enough, though, to make up for all deficiencies of that\rsort in other chaps,” abruptly said the stranger, placing a nervous\remphasis upon the word _he_.\r\r“Queequeg,” said I, “let’s go; this fellow has broken loose from\rsomewhere; he’s talking about something and somebody we don’t know.”\r\r“Stop!” cried the stranger. “Ye said true—ye hav’n’t seen Old Thunder\ryet, have ye?”\r\r“Who’s Old Thunder?” said I, again riveted with the insane earnestness\rof his manner.\r\r“Captain Ahab.”\r\r“What! the captain of our ship, the Pequod?”\r\r“Aye, among some of us old sailor chaps, he goes by that name. Ye\rhav’n’t seen him yet, have ye?”\r\r“No, we hav’n’t. He’s sick they say, but is getting better, and will be\rall right again before long.”\r\r“All right again before long!” laughed the stranger, with a solemnly\rderisive sort of laugh. “Look ye; when Captain Ahab is all right, then\rthis left arm of mine will be all right; not before.”\r\r“What do you know about him?”\r\r“What did they _tell_ you about him? Say that!”\r\r“They didn’t tell much of anything about him; only I’ve heard that he’s\ra good whale-hunter, and a good captain to his crew.”\r\r“That’s true, that’s true—yes, both true enough. But you must jump when\rhe gives an order. Step and growl; growl and go—that’s the word with\rCaptain Ahab. But nothing about that thing that happened to him off\rCape Horn, long ago, when he lay like dead for three days and nights;\rnothing about that deadly skrimmage with the Spaniard afore the altar\rin Santa?—heard nothing about that, eh? Nothing about the silver\rcalabash he spat into? And nothing about his losing his leg last\rvoyage, according to the prophecy. Didn’t ye hear a word about them\rmatters and something more, eh? No, I don’t think ye did; how could ye?\rWho knows it? Not all Nantucket, I guess. But hows’ever, mayhap, ye’ve\rheard tell about the leg, and how he lost it; aye, ye have heard of\rthat, I dare say. Oh yes, _that_ every one knows a’most—I mean they\rknow he’s only one leg; and that a parmacetti took the other off.”\r\r“My friend,” said I, “what all this gibberish of yours is about, I\rdon’t know, and I don’t much care; for it seems to me that you must be\ra little damaged in the head. But if you are speaking of Captain Ahab,\rof that ship there, the Pequod, then let me tell you, that I know all\rabout the loss of his leg.”\r\r“_All_ about it, eh—sure you do?—all?”\r\r“Pretty sure.”\r\rWith finger pointed and eye levelled at the Pequod, the beggar-like\rstranger stood a moment, as if in a troubled reverie; then starting a\rlittle, turned and said:—“Ye’ve shipped, have ye? Names down on the\rpapers? Well, well, what’s signed, is signed; and what’s to be, will\rbe; and then again, perhaps it won’t be, after all. Anyhow, it’s all\rfixed and arranged a’ready; and some sailors or other must go with him,\rI suppose; as well these as any other men, God pity ’em! Morning to ye,\rshipmates, morning; the ineffable heavens bless ye; I’m sorry I stopped\rye.”\r\r“Look here, friend,” said I, “if you have anything important to tell\rus, out with it; but if you are only trying to bamboozle us, you are\rmistaken in your game; that’s all I have to say.”\r\r“And it’s said very well, and I like to hear a chap talk up that way;\ryou are just the man for him—the likes of ye. Morning to ye, shipmates,\rmorning! Oh! when ye get there, tell ’em I’ve concluded not to make one\rof ’em.”\r\r“Ah, my dear fellow, you can’t fool us that way—you can’t fool us. It\ris the easiest thing in the world for a man to look as if he had a\rgreat secret in him.”\r\r“Morning to ye, shipmates, morning.”\r\r“Morning it is,” said I. “Come along, Queequeg, let’s leave this crazy\rman. But stop, tell me your name, will you?”\r\r“Elijah.”\r\rElijah! thought I, and we walked away, both commenting, after each\rother’s fashion, upon this ragged old sailor; and agreed that he was\rnothing but a humbug, trying to be a bugbear. But we had not gone\rperhaps above a hundred yards, when chancing to turn a corner, and\rlooking back as I did so, who should be seen but Elijah following us,\rthough at a distance. Somehow, the sight of him struck me so, that I\rsaid nothing to Queequeg of his being behind, but passed on with my\rcomrade, anxious to see whether the stranger would turn the same corner\rthat we did. He did; and then it seemed to me that he was dogging us,\rbut with what intent I could not for the life of me imagine. This\rcircumstance, coupled with his ambiguous, half-hinting, half-revealing,\rshrouded sort of talk, now begat in me all kinds of vague wonderments\rand half-apprehensions, and all connected with the Pequod; and Captain\rAhab; and the leg he had lost; and the Cape Horn fit; and the silver\rcalabash; and what Captain Peleg had said of him, when I left the ship\rthe day previous; and the prediction of the squaw Tistig; and the\rvoyage we had bound ourselves to sail; and a hundred other shadowy\rthings.\r\rI was resolved to satisfy myself whether this ragged Elijah was really\rdogging us or not, and with that intent crossed the way with Queequeg,\rand on that side of it retraced our steps. But Elijah passed on,\rwithout seeming to notice us. This relieved me; and once more, and\rfinally as it seemed to me, I pronounced him in my heart, a humbug.\r\r\rCHAPTER 20. All Astir.\r\rA day or two passed, and there was great activity aboard the Pequod.\rNot only were the old sails being mended, but new sails were coming on\rboard, and bolts of canvas, and coils of rigging; in short, everything\rbetokened that the ship’s preparations were hurrying to a close.\rCaptain Peleg seldom or never went ashore, but sat in his wigwam\rkeeping a sharp look-out upon the hands: Bildad did all the purchasing\rand providing at the stores; and the men employed in the hold and on\rthe rigging were working till long after night-fall.\r\rOn the day following Queequeg’s signing the articles, word was given at\rall the inns where the ship’s company were stopping, that their chests\rmust be on board before night, for there was no telling how soon the\rvessel might be sailing. So Queequeg and I got down our traps,\rresolving, however, to sleep ashore till the last. But it seems they\ralways give very long notice in these cases, and the ship did not sail\rfor several days. But no wonder; there was a good deal to be done, and\rthere is no telling how many things to be thought of, before the Pequod\rwas fully equipped.\r\rEvery one knows what a multitude of things—beds, sauce-pans, knives and\rforks, shovels and tongs, napkins, nut-crackers, and what not, are\rindispensable to the business of housekeeping. Just so with whaling,\rwhich necessitates a three-years’ housekeeping upon the wide ocean, far\rfrom all grocers, costermongers, doctors, bakers, and bankers. And\rthough this also holds true of merchant vessels, yet not by any means\rto the same extent as with whalemen. For besides the great length of\rthe whaling voyage, the numerous articles peculiar to the prosecution\rof the fishery, and the impossibility of replacing them at the remote\rharbors usually frequented, it must be remembered, that of all ships,\rwhaling vessels are the most exposed to accidents of all kinds, and\respecially to the destruction and loss of the very things upon which\rthe success of the voyage most depends. Hence, the spare boats, spare\rspars, and spare lines and harpoons, and spare everythings, almost, but\ra spare Captain and duplicate ship.\r\rAt the period of our arrival at the Island, the heaviest storage of the\rPequod had been almost completed; comprising her beef, bread, water,\rfuel, and iron hoops and staves. But, as before hinted, for some time\rthere was a continual fetching and carrying on board of divers odds and\rends of things, both large and small.\r\rChief among those who did this fetching and carrying was Captain\rBildad’s sister, a lean old lady of a most determined and indefatigable\rspirit, but withal very kindhearted, who seemed resolved that, if _she_\rcould help it, nothing should be found wanting in the Pequod, after\ronce fairly getting to sea. At one time she would come on board with a\rjar of pickles for the steward’s pantry; another time with a bunch of\rquills for the chief mate’s desk, where he kept his log; a third time\rwith a roll of flannel for the small of some one’s rheumatic back.\rNever did any woman better deserve her name, which was Charity—Aunt\rCharity, as everybody called her. And like a sister of charity did this\rcharitable Aunt Charity bustle about hither and thither, ready to turn\rher hand and heart to anything that promised to yield safety, comfort,\rand consolation to all on board a ship in which her beloved brother\rBildad was concerned, and in which she herself owned a score or two of\rwell-saved dollars.\r\rBut it was startling to see this excellent hearted Quakeress coming on\rboard, as she did the last day, with a long oil-ladle in one hand, and\ra still longer whaling lance in the other. Nor was Bildad himself nor\rCaptain Peleg at all backward. As for Bildad, he carried about with him\ra long list of the articles needed, and at every fresh arrival, down\rwent his mark opposite that article upon the paper. Every once in a\rwhile Peleg came hobbling out of his whalebone den, roaring at the men\rdown the hatchways, roaring up to the riggers at the mast-head, and\rthen concluded by roaring back into his wigwam.\r\rDuring these days of preparation, Queequeg and I often visited the\rcraft, and as often I asked about Captain Ahab, and how he was, and\rwhen he was going to come on board his ship. To these questions they\rwould answer, that he was getting better and better, and was expected\raboard every day; meantime, the two captains, Peleg and Bildad, could\rattend to everything necessary to fit the vessel for the voyage. If I\rhad been downright honest with myself, I would have seen very plainly\rin my heart that I did but half fancy being committed this way to so\rlong a voyage, without once laying my eyes on the man who was to be the\rabsolute dictator of it, so soon as the ship sailed out upon the open\rsea. But when a man suspects any wrong, it sometimes happens that if he\rbe already involved in the matter, he insensibly strives to cover up\rhis suspicions even from himself. And much this way it was with me. I\rsaid nothing, and tried to think nothing.\r\rAt last it was given out that some time next day the ship would\rcertainly sail. So next morning, Queequeg and I took a very early\rstart.\r\r\rCHAPTER 21. Going Aboard.\r\rIt was nearly six o’clock, but only grey imperfect misty dawn, when we\rdrew nigh the wharf.\r\r“There are some sailors running ahead there, if I see right,” said I to\rQueequeg, “it can’t be shadows; she’s off by sunrise, I guess; come\ron!”\r\r“Avast!” cried a voice, whose owner at the same time coming close\rbehind us, laid a hand upon both our shoulders, and then insinuating\rhimself between us, stood stooping forward a little, in the uncertain\rtwilight, strangely peering from Queequeg to me. It was Elijah.\r\r“Going aboard?”\r\r“Hands off, will you,” said I.\r\r“Lookee here,” said Queequeg, shaking himself, “go ’way!”\r\r“Ain’t going aboard, then?”\r\r“Yes, we are,” said I, “but what business is that of yours? Do you\rknow, Mr. Elijah, that I consider you a little impertinent?”\r\r“No, no, no; I wasn’t aware of that,” said Elijah, slowly and\rwonderingly looking from me to Queequeg, with the most unaccountable\rglances.\r\r“Elijah,” said I, “you will oblige my friend and me by withdrawing. We\rare going to the Indian and Pacific Oceans, and would prefer not to be\rdetained.”\r\r“Ye be, be ye? Coming back afore breakfast?”\r\r“He’s cracked, Queequeg,” said I, “come on.”\r\r“Holloa!” cried stationary Elijah, hailing us when we had removed a few\rpaces.\r\r“Never mind him,” said I, “Queequeg, come on.”\r\rBut he stole up to us again, and suddenly clapping his hand on my\rshoulder, said—“Did ye see anything looking like men going towards that\rship a while ago?”\r\rStruck by this plain matter-of-fact question, I answered, saying, “Yes,\rI thought I did see four or five men; but it was too dim to be sure.”\r\r“Very dim, very dim,” said Elijah. “Morning to ye.”\r\rOnce more we quitted him; but once more he came softly after us; and\rtouching my shoulder again, said, “See if you can find ’em now, will\rye?\r\r“Find who?”\r\r“Morning to ye! morning to ye!” he rejoined, again moving off. “Oh! I\rwas going to warn ye against—but never mind, never mind—it’s all one,\rall in the family too;—sharp frost this morning, ain’t it? Good-bye to\rye. Shan’t see ye again very soon, I guess; unless it’s before the\rGrand Jury.” And with these cracked words he finally departed, leaving\rme, for the moment, in no small wonderment at his frantic impudence.\r\rAt last, stepping on board the Pequod, we found everything in profound\rquiet, not a soul moving. The cabin entrance was locked within; the\rhatches were all on, and lumbered with coils of rigging. Going forward\rto the forecastle, we found the slide of the scuttle open. Seeing a\rlight, we went down, and found only an old rigger there, wrapped in a\rtattered pea-jacket. He was thrown at whole length upon two chests, his\rface downwards and inclosed in his folded arms. The profoundest slumber\rslept upon him.\r\r“Those sailors we saw, Queequeg, where can they have gone to?” said I,\rlooking dubiously at the sleeper. But it seemed that, when on the\rwharf, Queequeg had not at all noticed what I now alluded to; hence I\rwould have thought myself to have been optically deceived in that\rmatter, were it not for Elijah’s otherwise inexplicable question. But I\rbeat the thing down; and again marking the sleeper, jocularly hinted to\rQueequeg that perhaps we had best sit up with the body; telling him to\restablish himself accordingly. He put his hand upon the sleeper’s rear,\ras though feeling if it was soft enough; and then, without more ado,\rsat quietly down there.\r\r“Gracious! Queequeg, don’t sit there,” said I.\r\r“Oh! perry dood seat,” said Queequeg, “my country way; won’t hurt him\rface.”\r\r“Face!” said I, “call that his face? very benevolent countenance then;\rbut how hard he breathes, he’s heaving himself; get off, Queequeg, you\rare heavy, it’s grinding the face of the poor. Get off, Queequeg! Look,\rhe’ll twitch you off soon. I wonder he don’t wake.”\r\rQueequeg removed himself to just beyond the head of the sleeper, and\rlighted his tomahawk pipe. I sat at the feet. We kept the pipe passing\rover the sleeper, from one to the other. Meanwhile, upon questioning\rhim in his broken fashion, Queequeg gave me to understand that, in his\rland, owing to the absence of settees and sofas of all sorts, the king,\rchiefs, and great people generally, were in the custom of fattening\rsome of the lower orders for ottomans; and to furnish a house\rcomfortably in that respect, you had only to buy up eight or ten lazy\rfellows, and lay them round in the piers and alcoves. Besides, it was\rvery convenient on an excursion; much better than those garden-chairs\rwhich are convertible into walking-sticks; upon occasion, a chief\rcalling his attendant, and desiring him to make a settee of himself\runder a spreading tree, perhaps in some damp marshy place.\r\rWhile narrating these things, every time Queequeg received the tomahawk\rfrom me, he flourished the hatchet-side of it over the sleeper’s head.\r\r“What’s that for, Queequeg?”\r\r“Perry easy, kill-e; oh! perry easy!”\r\rHe was going on with some wild reminiscences about his tomahawk-pipe,\rwhich, it seemed, had in its two uses both brained his foes and soothed\rhis soul, when we were directly attracted to the sleeping rigger. The\rstrong vapor now completely filling the contracted hole, it began to\rtell upon him. He breathed with a sort of muffledness; then seemed\rtroubled in the nose; then revolved over once or twice; then sat up and\rrubbed his eyes.\r\r“Holloa!” he breathed at last, “who be ye smokers?”\r\r“Shipped men,” answered I, “when does she sail?”\r\r“Aye, aye, ye are going in her, be ye? She sails to-day. The Captain\rcame aboard last night.”\r\r“What Captain?—Ahab?”\r\r“Who but him indeed?”\r\rI was going to ask him some further questions concerning Ahab, when we\rheard a noise on deck.\r\r“Holloa! Starbuck’s astir,” said the rigger. “He’s a lively chief mate,\rthat; good man, and a pious; but all alive now, I must turn to.” And so\rsaying he went on deck, and we followed.\r\rIt was now clear sunrise. Soon the crew came on board in twos and\rthrees; the riggers bestirred themselves; the mates were actively\rengaged; and several of the shore people were busy in bringing various\rlast things on board. Meanwhile Captain Ahab remained invisibly\renshrined within his cabin.\r\r\rCHAPTER 22. Merry Christmas.\r\rAt length, towards noon, upon the final dismissal of the ship’s\rriggers, and after the Pequod had been hauled out from the wharf, and\rafter the ever-thoughtful Charity had come off in a whale-boat, with\rher last gift—a night-cap for Stubb, the second mate, her\rbrother-in-law, and a spare Bible for the steward—after all this, the\rtwo Captains, Peleg and Bildad, issued from the cabin, and turning to\rthe chief mate, Peleg said:\r\r“Now, Mr. Starbuck, are you sure everything is right? Captain Ahab is\rall ready—just spoke to him—nothing more to be got from shore, eh?\rWell, call all hands, then. Muster ’em aft here—blast ’em!”\r\r“No need of profane words, however great the hurry, Peleg,” said\rBildad, “but away with thee, friend Starbuck, and do our bidding.”\r\rHow now! Here upon the very point of starting for the voyage, Captain\rPeleg and Captain Bildad were going it with a high hand on the\rquarter-deck, just as if they were to be joint-commanders at sea, as\rwell as to all appearances in port. And, as for Captain Ahab, no sign\rof him was yet to be seen; only, they said he was in the cabin. But\rthen, the idea was, that his presence was by no means necessary in\rgetting the ship under weigh, and steering her well out to sea. Indeed,\ras that was not at all his proper business, but the pilot’s; and as he\rwas not yet completely recovered—so they said—therefore, Captain Ahab\rstayed below. And all this seemed natural enough; especially as in the\rmerchant service many captains never show themselves on deck for a\rconsiderable time after heaving up the anchor, but remain over the\rcabin table, having a farewell merry-making with their shore friends,\rbefore they quit the ship for good with the pilot.\r\rBut there was not much chance to think over the matter, for Captain\rPeleg was now all alive. He seemed to do most of the talking and\rcommanding, and not Bildad.\r\r“Aft here, ye sons of bachelors,” he cried, as the sailors lingered at\rthe main-mast. “Mr. Starbuck, drive ’em aft.”\r\r“Strike the tent there!”—was the next order. As I hinted before, this\rwhalebone marquee was never pitched except in port; and on board the\rPequod, for thirty years, the order to strike the tent was well known\rto be the next thing to heaving up the anchor.\r\r“Man the capstan! Blood and thunder!—jump!”—was the next command, and\rthe crew sprang for the handspikes.\r\rNow in getting under weigh, the station generally occupied by the pilot\ris the forward part of the ship. And here Bildad, who, with Peleg, be\rit known, in addition to his other officers, was one of the licensed\rpilots of the port—he being suspected to have got himself made a pilot\rin order to save the Nantucket pilot-fee to all the ships he was\rconcerned in, for he never piloted any other craft—Bildad, I say, might\rnow be seen actively engaged in looking over the bows for the\rapproaching anchor, and at intervals singing what seemed a dismal stave\rof psalmody, to cheer the hands at the windlass, who roared forth some\rsort of a chorus about the girls in Booble Alley, with hearty good\rwill. Nevertheless, not three days previous, Bildad had told them that\rno profane songs would be allowed on board the Pequod, particularly in\rgetting under weigh; and Charity, his sister, had placed a small choice\rcopy of Watts in each seaman’s berth.\r\rMeantime, overseeing the other part of the ship, Captain Peleg ripped\rand swore astern in the most frightful manner. I almost thought he\rwould sink the ship before the anchor could be got up; involuntarily I\rpaused on my handspike, and told Queequeg to do the same, thinking of\rthe perils we both ran, in starting on the voyage with such a devil for\ra pilot. I was comforting myself, however, with the thought that in\rpious Bildad might be found some salvation, spite of his seven hundred\rand seventy-seventh lay; when I felt a sudden sharp poke in my rear,\rand turning round, was horrified at the apparition of Captain Peleg in\rthe act of withdrawing his leg from my immediate vicinity. That was my\rfirst kick.\r\r“Is that the way they heave in the marchant service?” he roared.\r“Spring, thou sheep-head; spring, and break thy backbone! Why don’t ye\rspring, I say, all of ye—spring! Quohog! spring, thou chap with the red\rwhiskers; spring there, Scotch-cap; spring, thou green pants. Spring, I\rsay, all of ye, and spring your eyes out!” And so saying, he moved\ralong the windlass, here and there using his leg very freely, while\rimperturbable Bildad kept leading off with his psalmody. Thinks I,\rCaptain Peleg must have been drinking something to-day.\r\rAt last the anchor was up, the sails were set, and off we glided. It\rwas a short, cold Christmas; and as the short northern day merged into\rnight, we found ourselves almost broad upon the wintry ocean, whose\rfreezing spray cased us in ice, as in polished armor. The long rows of\rteeth on the bulwarks glistened in the moonlight; and like the white\rivory tusks of some huge elephant, vast curving icicles depended from\rthe bows.\r\rLank Bildad, as pilot, headed the first watch, and ever and anon, as\rthe old craft deep dived into the green seas, and sent the shivering\rfrost all over her, and the winds howled, and the cordage rang, his\rsteady notes were heard,—\r\r\r_“Sweet fields beyond the swelling flood, Stand dressed in living\rgreen. So to the Jews old Canaan stood, While Jordan rolled between.”_\r\r\r\rNever did those sweet words sound more sweetly to me than then. They\rwere full of hope and fruition. Spite of this frigid winter night in\rthe boisterous Atlantic, spite of my wet feet and wetter jacket, there\rwas yet, it then seemed to me, many a pleasant haven in store; and\rmeads and glades so eternally vernal, that the grass shot up by the\rspring, untrodden, unwilted, remains at midsummer.\r\rAt last we gained such an offing, that the two pilots were needed no\rlonger. The stout sail-boat that had accompanied us began ranging\ralongside.\r\rIt was curious and not unpleasing, how Peleg and Bildad were affected\rat this juncture, especially Captain Bildad. For loath to depart, yet;\rvery loath to leave, for good, a ship bound on so long and perilous a\rvoyage—beyond both stormy Capes; a ship in which some thousands of his\rhard earned dollars were invested; a ship, in which an old shipmate\rsailed as captain; a man almost as old as he, once more starting to\rencounter all the terrors of the pitiless jaw; loath to say good-bye to\ra thing so every way brimful of every interest to him,—poor old Bildad\rlingered long; paced the deck with anxious strides; ran down into the\rcabin to speak another farewell word there; again came on deck, and\rlooked to windward; looked towards the wide and endless waters, only\rbounded by the far-off unseen Eastern Continents; looked towards the\rland; looked aloft; looked right and left; looked everywhere and\rnowhere; and at last, mechanically coiling a rope upon its pin,\rconvulsively grasped stout Peleg by the hand, and holding up a lantern,\rfor a moment stood gazing heroically in his face, as much as to say,\r“Nevertheless, friend Peleg, I can stand it; yes, I can.”\r\rAs for Peleg himself, he took it more like a philosopher; but for all\rhis philosophy, there was a tear twinkling in his eye, when the lantern\rcame too near. And he, too, did not a little run from cabin to deck—now\ra word below, and now a word with Starbuck, the chief mate.\r\rBut, at last, he turned to his comrade, with a final sort of look about\rhim,—“Captain Bildad—come, old shipmate, we must go. Back the main-yard\rthere! Boat ahoy! Stand by to come close alongside, now! Careful,\rcareful!—come, Bildad, boy—say your last. Luck to ye, Starbuck—luck to\rye, Mr. Stubb—luck to ye, Mr. Flask—good-bye and good luck to ye\rall—and this day three years I’ll have a hot supper smoking for ye in\rold Nantucket. Hurrah and away!”\r\r“God bless ye, and have ye in His holy keeping, men,” murmured old\rBildad, almost incoherently. “I hope ye’ll have fine weather now, so\rthat Captain Ahab may soon be moving among ye—a pleasant sun is all he\rneeds, and ye’ll have plenty of them in the tropic voyage ye go. Be\rcareful in the hunt, ye mates. Don’t stave the boats needlessly, ye\rharpooneers; good white cedar plank is raised full three per cent.\rwithin the year. Don’t forget your prayers, either. Mr. Starbuck, mind\rthat cooper don’t waste the spare staves. Oh! the sail-needles are in\rthe green locker! Don’t whale it too much a’ Lord’s days, men; but\rdon’t miss a fair chance either, that’s rejecting Heaven’s good gifts.\rHave an eye to the molasses tierce, Mr. Stubb; it was a little leaky, I\rthought. If ye touch at the islands, Mr. Flask, beware of fornication.\rGood-bye, good-bye! Don’t keep that cheese too long down in the hold,\rMr. Starbuck; it’ll spoil. Be careful with the butter—twenty cents the\rpound it was, and mind ye, if—”\r\r“Come, come, Captain Bildad; stop palavering,—away!” and with that,\rPeleg hurried him over the side, and both dropt into the boat.\r\rShip and boat diverged; the cold, damp night breeze blew between; a\rscreaming gull flew overhead; the two hulls wildly rolled; we gave\rthree heavy-hearted cheers, and blindly plunged like fate into the lone\rAtlantic.\r\r\rCHAPTER 23. The Lee Shore.\r\rSome chapters back, one Bulkington was spoken of, a tall, newlanded\rmariner, encountered in New Bedford at the inn.\r\rWhen on that shivering winter’s night, the Pequod thrust her vindictive\rbows into the cold malicious waves, who should I see standing at her\rhelm but Bulkington! I looked with sympathetic awe and fearfulness upon\rthe man, who in mid-winter just landed from a four years’ dangerous\rvoyage, could so unrestingly push off again for still another\rtempestuous term. The land seemed scorching to his feet. Wonderfullest\rthings are ever the unmentionable; deep memories yield no epitaphs;\rthis six-inch chapter is the stoneless grave of Bulkington. Let me only\rsay that it fared with him as with the storm-tossed ship, that\rmiserably drives along the leeward land. The port would fain give\rsuccor; the port is pitiful; in the port is safety, comfort,\rhearthstone, supper, warm blankets, friends, all that’s kind to our\rmortalities. But in that gale, the port, the land, is that ship’s\rdirest jeopardy; she must fly all hospitality; one touch of land,\rthough it but graze the keel, would make her shudder through and\rthrough. With all her might she crowds all sail off shore; in so doing,\rfights ’gainst the very winds that fain would blow her homeward; seeks\rall the lashed sea’s landlessness again; for refuge’s sake forlornly\rrushing into peril; her only friend her bitterest foe!\r\rKnow ye now, Bulkington? Glimpses do ye seem to see of that mortally\rintolerable truth; that all deep, earnest thinking is but the intrepid\reffort of the soul to keep the open independence of her sea; while the\rwildest winds of heaven and earth conspire to cast her on the\rtreacherous, slavish shore?\r\rBut as in landlessness alone resides highest truth, shoreless,\rindefinite as God—so, better is it to perish in that howling infinite,\rthan be ingloriously dashed upon the lee, even if that were safety! For\rworm-like, then, oh! who would craven crawl to land! Terrors of the\rterrible! is all this agony so vain? Take heart, take heart, O\rBulkington! Bear thee grimly, demigod! Up from the spray of thy\rocean-perishing—straight up, leaps thy apotheosis!\r\r\rCHAPTER 24. The Advocate.\r\rAs Queequeg and I are now fairly embarked in this business of whaling;\rand as this business of whaling has somehow come to be regarded among\rlandsmen as a rather unpoetical and disreputable pursuit; therefore, I\ram all anxiety to convince ye, ye landsmen, of the injustice hereby\rdone to us hunters of whales.\r\rIn the first place, it may be deemed almost superfluous to establish\rthe fact, that among people at large, the business of whaling is not\raccounted on a level with what are called the liberal professions. If a\rstranger were introduced into any miscellaneous metropolitan society,\rit would but slightly advance the general opinion of his merits, were\rhe presented to the company as a harpooneer, say; and if in emulation\rof the naval officers he should append the initials S.W.F. (Sperm Whale\rFishery) to his visiting card, such a procedure would be deemed\rpre-eminently presuming and ridiculous.\r\rDoubtless one leading reason why the world declines honoring us\rwhalemen, is this: they think that, at best, our vocation amounts to a\rbutchering sort of business; and that when actively engaged therein, we\rare surrounded by all manner of defilements. Butchers we are, that is\rtrue. But butchers, also, and butchers of the bloodiest badge have been\rall Martial Commanders whom the world invariably delights to honor. And\ras for the matter of the alleged uncleanliness of our business, ye\rshall soon be initiated into certain facts hitherto pretty generally\runknown, and which, upon the whole, will triumphantly plant the sperm\rwhale-ship at least among the cleanliest things of this tidy earth. But\reven granting the charge in question to be true; what disordered\rslippery decks of a whale-ship are comparable to the unspeakable\rcarrion of those battle-fields from which so many soldiers return to\rdrink in all ladies’ plaudits? And if the idea of peril so much\renhances the popular conceit of the soldier’s profession; let me assure\rye that many a veteran who has freely marched up to a battery, would\rquickly recoil at the apparition of the sperm whale’s vast tail,\rfanning into eddies the air over his head. For what are the\rcomprehensible terrors of man compared with the interlinked terrors and\rwonders of God!\r\rBut, though the world scouts at us whale hunters, yet does it\runwittingly pay us the profoundest homage; yea, an all-abounding\radoration! for almost all the tapers, lamps, and candles that burn\rround the globe, burn, as before so many shrines, to our glory!\r\rBut look at this matter in other lights; weigh it in all sorts of\rscales; see what we whalemen are, and have been.\r\rWhy did the Dutch in De Witt’s time have admirals of their whaling\rfleets? Why did Louis XVI. of France, at his own personal expense, fit\rout whaling ships from Dunkirk, and politely invite to that town some\rscore or two of families from our own island of Nantucket? Why did\rBritain between the years 1750 and 1788 pay to her whalemen in bounties\rupwards of £1,000,000? And lastly, how comes it that we whalemen of\rAmerica now outnumber all the rest of the banded whalemen in the world;\rsail a navy of upwards of seven hundred vessels; manned by eighteen\rthousand men; yearly consuming 4,000,000 of dollars; the ships worth,\rat the time of sailing, $20,000,000! and every year importing into our\rharbors a well reaped harvest of $7,000,000. How comes all this, if\rthere be not something puissant in whaling?\r\rBut this is not the half; look again.\r\rI freely assert, that the cosmopolite philosopher cannot, for his life,\rpoint out one single peaceful influence, which within the last sixty\ryears has operated more potentially upon the whole broad world, taken\rin one aggregate, than the high and mighty business of whaling. One way\rand another, it has begotten events so remarkable in themselves, and so\rcontinuously momentous in their sequential issues, that whaling may\rwell be regarded as that Egyptian mother, who bore offspring themselves\rpregnant from her womb. It would be a hopeless, endless task to\rcatalogue all these things. Let a handful suffice. For many years past\rthe whale-ship has been the pioneer in ferreting out the remotest and\rleast known parts of the earth. She has explored seas and archipelagoes\rwhich had no chart, where no Cook or Vancouver had ever sailed. If\rAmerican and European men-of-war now peacefully ride in once savage\rharbors, let them fire salutes to the honor and glory of the\rwhale-ship, which originally showed them the way, and first interpreted\rbetween them and the savages. They may celebrate as they will the\rheroes of Exploring Expeditions, your Cooks, your Krusensterns; but I\rsay that scores of anonymous Captains have sailed out of Nantucket,\rthat were as great, and greater than your Cook and your Krusenstern.\rFor in their succourless empty-handedness, they, in the heathenish\rsharked waters, and by the beaches of unrecorded, javelin islands,\rbattled with virgin wonders and terrors that Cook with all his marines\rand muskets would not willingly have dared. All that is made such a\rflourish of in the old South Sea Voyages, those things were but the\rlife-time commonplaces of our heroic Nantucketers. Often, adventures\rwhich Vancouver dedicates three chapters to, these men accounted\runworthy of being set down in the ship’s common log. Ah, the world! Oh,\rthe world!\r\rUntil the whale fishery rounded Cape Horn, no commerce but colonial,\rscarcely any intercourse but colonial, was carried on between Europe\rand the long line of the opulent Spanish provinces on the Pacific\rcoast. It was the whaleman who first broke through the jealous policy\rof the Spanish crown, touching those colonies; and, if space permitted,\rit might be distinctly shown how from those whalemen at last eventuated\rthe liberation of Peru, Chili, and Bolivia from the yoke of Old Spain,\rand the establishment of the eternal democracy in those parts.\r\rThat great America on the other side of the sphere, Australia, was\rgiven to the enlightened world by the whaleman. After its first\rblunder-born discovery by a Dutchman, all other ships long shunned\rthose shores as pestiferously barbarous; but the whale-ship touched\rthere. The whale-ship is the true mother of that now mighty colony.\rMoreover, in the infancy of the first Australian settlement, the\remigrants were several times saved from starvation by the benevolent\rbiscuit of the whale-ship luckily dropping an anchor in their waters.\rThe uncounted isles of all Polynesia confess the same truth, and do\rcommercial homage to the whale-ship, that cleared the way for the\rmissionary and the merchant, and in many cases carried the primitive\rmissionaries to their first destinations. If that double-bolted land,\rJapan, is ever to become hospitable, it is the whale-ship alone to whom\rthe credit will be due; for already she is on the threshold.\r\rBut if, in the face of all this, you still declare that whaling has no\ræsthetically noble associations connected with it, then am I ready to\rshiver fifty lances with you there, and unhorse you with a split helmet\revery time.\r\rThe whale has no famous author, and whaling no famous chronicler, you\rwill say.\r\r_The whale no famous author, and whaling no famous chronicler?_ Who\rwrote the first account of our Leviathan? Who but mighty Job! And who\rcomposed the first narrative of a whaling-voyage? Who, but no less a\rprince than Alfred the Great, who, with his own royal pen, took down\rthe words from Other, the Norwegian whale-hunter of those times! And\rwho pronounced our glowing eulogy in Parliament? Who, but Edmund Burke!\r\rTrue enough, but then whalemen themselves are poor devils; they have no\rgood blood in their veins.\r\r_No good blood in their veins?_ They have something better than royal\rblood there. The grandmother of Benjamin Franklin was Mary Morrel;\rafterwards, by marriage, Mary Folger, one of the old settlers of\rNantucket, and the ancestress to a long line of Folgers and\rharpooneers—all kith and kin to noble Benjamin—this day darting the\rbarbed iron from one side of the world to the other.\r\rGood again; but then all confess that somehow whaling is not\rrespectable.\r\r_Whaling not respectable?_ Whaling is imperial! By old English\rstatutory law, the whale is declared “a royal fish.” *\r\rOh, that’s only nominal! The whale himself has never figured in any\rgrand imposing way.\r\r_The whale never figured in any grand imposing way?_ In one of the\rmighty triumphs given to a Roman general upon his entering the world’s\rcapital, the bones of a whale, brought all the way from the Syrian\rcoast, were the most conspicuous object in the cymballed procession.*\r\r*See subsequent chapters for something more on this head.\r\rGrant it, since you cite it; but, say what you will, there is no real\rdignity in whaling.\r\r_No dignity in whaling?_ The dignity of our calling the very heavens\rattest. Cetus is a constellation in the South! No more! Drive down your\rhat in presence of the Czar, and take it off to Queequeg! No more! I\rknow a man that, in his lifetime, has taken three hundred and fifty\rwhales. I account that man more honorable than that great captain of\rantiquity who boasted of taking as many walled towns.\r\rAnd, as for me, if, by any possibility, there be any as yet\rundiscovered prime thing in me; if I shall ever deserve any real repute\rin that small but high hushed world which I might not be unreasonably\rambitious of; if hereafter I shall do anything that, upon the whole, a\rman might rather have done than to have left undone; if, at my death,\rmy executors, or more properly my creditors, find any precious MSS. in\rmy desk, then here I prospectively ascribe all the honor and the glory\rto whaling; for a whale-ship was my Yale College and my Harvard.\r\r\rCHAPTER 25. Postscript.\r\rIn behalf of the dignity of whaling, I would fain advance naught but\rsubstantiated facts. But after embattling his facts, an advocate who\rshould wholly suppress a not unreasonable surmise, which might tell\reloquently upon his cause—such an advocate, would he not be\rblameworthy?\r\rIt is well known that at the coronation of kings and queens, even\rmodern ones, a certain curious process of seasoning them for their\rfunctions is gone through. There is a saltcellar of state, so called,\rand there may be a castor of state. How they use the salt,\rprecisely—who knows? Certain I am, however, that a king’s head is\rsolemnly oiled at his coronation, even as a head of salad. Can it be,\rthough, that they anoint it with a view of making its interior run\rwell, as they anoint machinery? Much might be ruminated here,\rconcerning the essential dignity of this regal process, because in\rcommon life we esteem but meanly and contemptibly a fellow who anoints\rhis hair, and palpably smells of that anointing. In truth, a mature man\rwho uses hair-oil, unless medicinally, that man has probably got a\rquoggy spot in him somewhere. As a general rule, he can’t amount to\rmuch in his totality.\r\rBut the only thing to be considered here, is this—what kind of oil is\rused at coronations? Certainly it cannot be olive oil, nor macassar\roil, nor castor oil, nor bear’s oil, nor train oil, nor cod-liver oil.\rWhat then can it possibly be, but sperm oil in its unmanufactured,\runpolluted state, the sweetest of all oils?\r\rThink of that, ye loyal Britons! we whalemen supply your kings and\rqueens with coronation stuff!\r\r\rCHAPTER 26. Knights and Squires.\r\rThe chief mate of the Pequod was Starbuck, a native of Nantucket, and a\rQuaker by descent. He was a long, earnest man, and though born on an\ricy coast, seemed well adapted to endure hot latitudes, his flesh being\rhard as twice-baked biscuit. Transported to the Indies, his live blood\rwould not spoil like bottled ale. He must have been born in some time\rof general drought and famine, or upon one of those fast days for which\rhis state is famous. Only some thirty arid summers had he seen; those\rsummers had dried up all his physical superfluousness. But this, his\rthinness, so to speak, seemed no more the token of wasting anxieties\rand cares, than it seemed the indication of any bodily blight. It was\rmerely the condensation of the man. He was by no means ill-looking;\rquite the contrary. His pure tight skin was an excellent fit; and\rclosely wrapped up in it, and embalmed with inner health and strength,\rlike a revivified Egyptian, this Starbuck seemed prepared to endure for\rlong ages to come, and to endure always, as now; for be it Polar snow\ror torrid sun, like a patent chronometer, his interior vitality was\rwarranted to do well in all climates. Looking into his eyes, you seemed\rto see there the yet lingering images of those thousand-fold perils he\rhad calmly confronted through life. A staid, steadfast man, whose life\rfor the most part was a telling pantomime of action, and not a tame\rchapter of sounds. Yet, for all his hardy sobriety and fortitude, there\rwere certain qualities in him which at times affected, and in some\rcases seemed well nigh to overbalance all the rest. Uncommonly\rconscientious for a seaman, and endued with a deep natural reverence,\rthe wild watery loneliness of his life did therefore strongly incline\rhim to superstition; but to that sort of superstition, which in some\rorganizations seems rather to spring, somehow, from intelligence than\rfrom ignorance. Outward portents and inward presentiments were his. And\rif at times these things bent the welded iron of his soul, much more\rdid his far-away domestic memories of his young Cape wife and child,\rtend to bend him still more from the original ruggedness of his nature,\rand open him still further to those latent influences which, in some\rhonest-hearted men, restrain the gush of dare-devil daring, so often\revinced by others in the more perilous vicissitudes of the fishery. “I\rwill have no man in my boat,” said Starbuck, “who is not afraid of a\rwhale.” By this, he seemed to mean, not only that the most reliable and\ruseful courage was that which arises from the fair estimation of the\rencountered peril, but that an utterly fearless man is a far more\rdangerous comrade than a coward.\r\r“Aye, aye,” said Stubb, the second mate, “Starbuck, there, is as\rcareful a man as you’ll find anywhere in this fishery.” But we shall\rere long see what that word “careful” precisely means when used by a\rman like Stubb, or almost any other whale hunter.\r\rStarbuck was no crusader after perils; in him courage was not a\rsentiment; but a thing simply useful to him, and always at hand upon\rall mortally practical occasions. Besides, he thought, perhaps, that in\rthis business of whaling, courage was one of the great staple outfits\rof the ship, like her beef and her bread, and not to be foolishly\rwasted. Wherefore he had no fancy for lowering for whales after\rsun-down; nor for persisting in fighting a fish that too much persisted\rin fighting him. For, thought Starbuck, I am here in this critical\rocean to kill whales for my living, and not to be killed by them for\rtheirs; and that hundreds of men had been so killed Starbuck well knew.\rWhat doom was his own father’s? Where, in the bottomless deeps, could\rhe find the torn limbs of his brother?\r\rWith memories like these in him, and, moreover, given to a certain\rsuperstitiousness, as has been said; the courage of this Starbuck which\rcould, nevertheless, still flourish, must indeed have been extreme. But\rit was not in reasonable nature that a man so organized, and with such\rterrible experiences and remembrances as he had; it was not in nature\rthat these things should fail in latently engendering an element in\rhim, which, under suitable circumstances, would break out from its\rconfinement, and burn all his courage up. And brave as he might be, it\rwas that sort of bravery chiefly, visible in some intrepid men, which,\rwhile generally abiding firm in the conflict with seas, or winds, or\rwhales, or any of the ordinary irrational horrors of the world, yet\rcannot withstand those more terrific, because more spiritual terrors,\rwhich sometimes menace you from the concentrating brow of an enraged\rand mighty man.\r\rBut were the coming narrative to reveal in any instance, the complete\rabasement of poor Starbuck’s fortitude, scarce might I have the heart\rto write it; for it is a thing most sorrowful, nay shocking, to expose\rthe fall of valour in the soul. Men may seem detestable as joint\rstock-companies and nations; knaves, fools, and murderers there may be;\rmen may have mean and meagre faces; but man, in the ideal, is so noble\rand so sparkling, such a grand and glowing creature, that over any\rignominious blemish in him all his fellows should run to throw their\rcostliest robes. That immaculate manliness we feel within ourselves, so\rfar within us, that it remains intact though all the outer character\rseem gone; bleeds with keenest anguish at the undraped spectacle of a\rvalor-ruined man. Nor can piety itself, at such a shameful sight,\rcompletely stifle her upbraidings against the permitting stars. But\rthis august dignity I treat of, is not the dignity of kings and robes,\rbut that abounding dignity which has no robed investiture. Thou shalt\rsee it shining in the arm that wields a pick or drives a spike; that\rdemocratic dignity which, on all hands, radiates without end from God;\rHimself! The great God absolute! The centre and circumference of all\rdemocracy! His omnipresence, our divine equality!\r\rIf, then, to meanest mariners, and renegades and castaways, I shall\rhereafter ascribe high qualities, though dark; weave round them tragic\rgraces; if even the most mournful, perchance the most abased, among\rthem all, shall at times lift himself to the exalted mounts; if I shall\rtouch that workman’s arm with some ethereal light; if I shall spread a\rrainbow over his disastrous set of sun; then against all mortal critics\rbear me out in it, thou just Spirit of Equality, which hast spread one\rroyal mantle of humanity over all my kind! Bear me out in it, thou\rgreat democratic God! who didst not refuse to the swart convict,\rBunyan, the pale, poetic pearl; Thou who didst clothe with doubly\rhammered leaves of finest gold, the stumped and paupered arm of old\rCervantes; Thou who didst pick up Andrew Jackson from the pebbles; who\rdidst hurl him upon a war-horse; who didst thunder him higher than a\rthrone! Thou who, in all Thy mighty, earthly marchings, ever cullest\rThy selectest champions from the kingly commons; bear me out in it, O\rGod!\r\r\rCHAPTER 27. Knights and Squires.\r\rStubb was the second mate. He was a native of Cape Cod; and hence,\raccording to local usage, was called a Cape-Cod-man. A happy-go-lucky;\rneither craven nor valiant; taking perils as they came with an\rindifferent air; and while engaged in the most imminent crisis of the\rchase, toiling away, calm and collected as a journeyman joiner engaged\rfor the year. Good-humored, easy, and careless, he presided over his\rwhale-boat as if the most deadly encounter were but a dinner, and his\rcrew all invited guests. He was as particular about the comfortable\rarrangement of his part of the boat, as an old stage-driver is about\rthe snugness of his box. When close to the whale, in the very\rdeath-lock of the fight, he handled his unpitying lance coolly and\roff-handedly, as a whistling tinker his hammer. He would hum over his\rold rigadig tunes while flank and flank with the most exasperated\rmonster. Long usage had, for this Stubb, converted the jaws of death\rinto an easy chair. What he thought of death itself, there is no\rtelling. Whether he ever thought of it at all, might be a question;\rbut, if he ever did chance to cast his mind that way after a\rcomfortable dinner, no doubt, like a good sailor, he took it to be a\rsort of call of the watch to tumble aloft, and bestir themselves there,\rabout something which he would find out when he obeyed the order, and\rnot sooner.\r\rWhat, perhaps, with other things, made Stubb such an easy-going,\runfearing man, so cheerily trudging off with the burden of life in a\rworld full of grave pedlars, all bowed to the ground with their packs;\rwhat helped to bring about that almost impious good-humor of his; that\rthing must have been his pipe. For, like his nose, his short, black\rlittle pipe was one of the regular features of his face. You would\ralmost as soon have expected him to turn out of his bunk without his\rnose as without his pipe. He kept a whole row of pipes there ready\rloaded, stuck in a rack, within easy reach of his hand; and, whenever\rhe turned in, he smoked them all out in succession, lighting one from\rthe other to the end of the chapter; then loading them again to be in\rreadiness anew. For, when Stubb dressed, instead of first putting his\rlegs into his trowsers, he put his pipe into his mouth.\r\rI say this continual smoking must have been one cause, at least, of his\rpeculiar disposition; for every one knows that this earthly air,\rwhether ashore or afloat, is terribly infected with the nameless\rmiseries of the numberless mortals who have died exhaling it; and as in\rtime of the cholera, some people go about with a camphorated\rhandkerchief to their mouths; so, likewise, against all mortal\rtribulations, Stubb’s tobacco smoke might have operated as a sort of\rdisinfecting agent.\r\rThe third mate was Flask, a native of Tisbury, in Martha’s Vineyard. A\rshort, stout, ruddy young fellow, very pugnacious concerning whales,\rwho somehow seemed to think that the great leviathans had personally\rand hereditarily affronted him; and therefore it was a sort of point of\rhonor with him, to destroy them whenever encountered. So utterly lost\rwas he to all sense of reverence for the many marvels of their majestic\rbulk and mystic ways; and so dead to anything like an apprehension of\rany possible danger from encountering them; that in his poor opinion,\rthe wondrous whale was but a species of magnified mouse, or at least\rwater-rat, requiring only a little circumvention and some small\rapplication of time and trouble in order to kill and boil. This\rignorant, unconscious fearlessness of his made him a little waggish in\rthe matter of whales; he followed these fish for the fun of it; and a\rthree years’ voyage round Cape Horn was only a jolly joke that lasted\rthat length of time. As a carpenter’s nails are divided into wrought\rnails and cut nails; so mankind may be similarly divided. Little Flask\rwas one of the wrought ones; made to clinch tight and last long. They\rcalled him King-Post on board of the Pequod; because, in form, he could\rbe well likened to the short, square timber known by that name in\rArctic whalers; and which by the means of many radiating side timbers\rinserted into it, serves to brace the ship against the icy concussions\rof those battering seas.\r\rNow these three mates—Starbuck, Stubb, and Flask, were momentous men.\rThey it was who by universal prescription commanded three of the\rPequod’s boats as headsmen. In that grand order of battle in which\rCaptain Ahab would probably marshal his forces to descend on the\rwhales, these three headsmen were as captains of companies. Or, being\rarmed with their long keen whaling spears, they were as a picked trio\rof lancers; even as the harpooneers were flingers of javelins.\r\rAnd since in this famous fishery, each mate or headsman, like a Gothic\rKnight of old, is always accompanied by his boat-steerer or harpooneer,\rwho in certain conjunctures provides him with a fresh lance, when the\rformer one has been badly twisted, or elbowed in the assault; and\rmoreover, as there generally subsists between the two, a close intimacy\rand friendliness; it is therefore but meet, that in this place we set\rdown who the Pequod’s harpooneers were, and to what headsman each of\rthem belonged.\r\rFirst of all was Queequeg, whom Starbuck, the chief mate, had selected\rfor his squire. But Queequeg is already known.\r\rNext was Tashtego, an unmixed Indian from Gay Head, the most westerly\rpromontory of Martha’s Vineyard, where there still exists the last\rremnant of a village of red men, which has long supplied the\rneighboring island of Nantucket with many of her most daring\rharpooneers. In the fishery, they usually go by the generic name of\rGay-Headers. Tashtego’s long, lean, sable hair, his high cheek bones,\rand black rounding eyes—for an Indian, Oriental in their largeness, but\rAntarctic in their glittering expression—all this sufficiently\rproclaimed him an inheritor of the unvitiated blood of those proud\rwarrior hunters, who, in quest of the great New England moose, had\rscoured, bow in hand, the aboriginal forests of the main. But no longer\rsnuffing in the trail of the wild beasts of the woodland, Tashtego now\rhunted in the wake of the great whales of the sea; the unerring harpoon\rof the son fitly replacing the infallible arrow of the sires. To look\rat the tawny brawn of his lithe snaky limbs, you would almost have\rcredited the superstitions of some of the earlier Puritans, and\rhalf-believed this wild Indian to be a son of the Prince of the Powers\rof the Air. Tashtego was Stubb the second mate’s squire.\r\rThird among the harpooneers was Daggoo, a gigantic, coal-black\rnegro-savage, with a lion-like tread—an Ahasuerus to behold. Suspended\rfrom his ears were two golden hoops, so large that the sailors called\rthem ring-bolts, and would talk of securing the top-sail halyards to\rthem. In his youth Daggoo had voluntarily shipped on board of a whaler,\rlying in a lonely bay on his native coast. And never having been\ranywhere in the world but in Africa, Nantucket, and the pagan harbors\rmost frequented by whalemen; and having now led for many years the bold\rlife of the fishery in the ships of owners uncommonly heedful of what\rmanner of men they shipped; Daggoo retained all his barbaric virtues,\rand erect as a giraffe, moved about the decks in all the pomp of six\rfeet five in his socks. There was a corporeal humility in looking up at\rhim; and a white man standing before him seemed a white flag come to\rbeg truce of a fortress. Curious to tell, this imperial negro,\rAhasuerus Daggoo, was the Squire of little Flask, who looked like a\rchess-man beside him. As for the residue of the Pequod’s company, be it\rsaid, that at the present day not one in two of the many thousand men\rbefore the mast employed in the American whale fishery, are Americans\rborn, though pretty nearly all the officers are. Herein it is the same\rwith the American whale fishery as with the American army and military\rand merchant navies, and the engineering forces employed in the\rconstruction of the American Canals and Railroads. The same, I say,\rbecause in all these cases the native American liberally provides the\rbrains, the rest of the world as generously supplying the muscles. No\rsmall number of these whaling seamen belong to the Azores, where the\routward bound Nantucket whalers frequently touch to augment their crews\rfrom the hardy peasants of those rocky shores. In like manner, the\rGreenland whalers sailing out of Hull or London, put in at the Shetland\rIslands, to receive the full complement of their crew. Upon the passage\rhomewards, they drop them there again. How it is, there is no telling,\rbut Islanders seem to make the best whalemen. They were nearly all\rIslanders in the Pequod, _Isolatoes_ too, I call such, not\racknowledging the common continent of men, but each _Isolato_ living on\ra separate continent of his own. Yet now, federated along one keel,\rwhat a set these Isolatoes were! An Anacharsis Clootz deputation from\rall the isles of the sea, and all the ends of the earth, accompanying\rOld Ahab in the Pequod to lay the world’s grievances before that bar\rfrom which not very many of them ever come back. Black Little Pip—he\rnever did—oh, no! he went before. Poor Alabama boy! On the grim\rPequod’s forecastle, ye shall ere long see him, beating his tambourine;\rprelusive of the eternal time, when sent for, to the great quarter-deck\ron high, he was bid strike in with angels, and beat his tambourine in\rglory; called a coward here, hailed a hero there!\r\r\rCHAPTER 28. Ahab.\r\rFor several days after leaving Nantucket, nothing above hatches was\rseen of Captain Ahab. The mates regularly relieved each other at the\rwatches, and for aught that could be seen to the contrary, they seemed\rto be the only commanders of the ship; only they sometimes issued from\rthe cabin with orders so sudden and peremptory, that after all it was\rplain they but commanded vicariously. Yes, their supreme lord and\rdictator was there, though hitherto unseen by any eyes not permitted to\rpenetrate into the now sacred retreat of the cabin.\r\rEvery time I ascended to the deck from my watches below, I instantly\rgazed aft to mark if any strange face were visible; for my first vague\rdisquietude touching the unknown captain, now in the seclusion of the\rsea, became almost a perturbation. This was strangely heightened at\rtimes by the ragged Elijah’s diabolical incoherences uninvitedly\rrecurring to me, with a subtle energy I could not have before conceived\rof. But poorly could I withstand them, much as in other moods I was\ralmost ready to smile at the solemn whimsicalities of that outlandish\rprophet of the wharves. But whatever it was of apprehensiveness or\runeasiness—to call it so—which I felt, yet whenever I came to look\rabout me in the ship, it seemed against all warrantry to cherish such\remotions. For though the harpooneers, with the great body of the crew,\rwere a far more barbaric, heathenish, and motley set than any of the\rtame merchant-ship companies which my previous experiences had made me\racquainted with, still I ascribed this—and rightly ascribed it—to the\rfierce uniqueness of the very nature of that wild Scandinavian vocation\rin which I had so abandonedly embarked. But it was especially the\raspect of the three chief officers of the ship, the mates, which was\rmost forcibly calculated to allay these colourless misgivings, and\rinduce confidence and cheerfulness in every presentment of the voyage.\rThree better, more likely sea-officers and men, each in his own\rdifferent way, could not readily be found, and they were every one of\rthem Americans; a Nantucketer, a Vineyarder, a Cape man. Now, it being\rChristmas when the ship shot from out her harbor, for a space we had\rbiting Polar weather, though all the time running away from it to the\rsouthward; and by every degree and minute of latitude which we sailed,\rgradually leaving that merciless winter, and all its intolerable\rweather behind us. It was one of those less lowering, but still grey\rand gloomy enough mornings of the transition, when with a fair wind the\rship was rushing through the water with a vindictive sort of leaping\rand melancholy rapidity, that as I mounted to the deck at the call of\rthe forenoon watch, so soon as I levelled my glance towards the\rtaffrail, foreboding shivers ran over me. Reality outran apprehension;\rCaptain Ahab stood upon his quarter-deck.\r\rThere seemed no sign of common bodily illness about him, nor of the\rrecovery from any. He looked like a man cut away from the stake, when\rthe fire has overrunningly wasted all the limbs without consuming them,\ror taking away one particle from their compacted aged robustness. His\rwhole high, broad form, seemed made of solid bronze, and shaped in an\runalterable mould, like Cellini’s cast Perseus. Threading its way out\rfrom among his grey hairs, and continuing right down one side of his\rtawny scorched face and neck, till it disappeared in his clothing, you\rsaw a slender rod-like mark, lividly whitish. It resembled that\rperpendicular seam sometimes made in the straight, lofty trunk of a\rgreat tree, when the upper lightning tearingly darts down it, and\rwithout wrenching a single twig, peels and grooves out the bark from\rtop to bottom, ere running off into the soil, leaving the tree still\rgreenly alive, but branded. Whether that mark was born with him, or\rwhether it was the scar left by some desperate wound, no one could\rcertainly say. By some tacit consent, throughout the voyage little or\rno allusion was made to it, especially by the mates. But once\rTashtego’s senior, an old Gay-Head Indian among the crew,\rsuperstitiously asserted that not till he was full forty years old did\rAhab become that way branded, and then it came upon him, not in the\rfury of any mortal fray, but in an elemental strife at sea. Yet, this\rwild hint seemed inferentially negatived, by what a grey Manxman\rinsinuated, an old sepulchral man, who, having never before sailed out\rof Nantucket, had never ere this laid eye upon wild Ahab. Nevertheless,\rthe old sea-traditions, the immemorial credulities, popularly invested\rthis old Manxman with preternatural powers of discernment. So that no\rwhite sailor seriously contradicted him when he said that if ever\rCaptain Ahab should be tranquilly laid out—which might hardly come to\rpass, so he muttered—then, whoever should do that last office for the\rdead, would find a birth-mark on him from crown to sole.\r\rSo powerfully did the whole grim aspect of Ahab affect me, and the\rlivid brand which streaked it, that for the first few moments I hardly\rnoted that not a little of this overbearing grimness was owing to the\rbarbaric white leg upon which he partly stood. It had previously come\rto me that this ivory leg had at sea been fashioned from the polished\rbone of the sperm whale’s jaw. “Aye, he was dismasted off Japan,” said\rthe old Gay-Head Indian once; “but like his dismasted craft, he shipped\ranother mast without coming home for it. He has a quiver of ’em.”\r\rI was struck with the singular posture he maintained. Upon each side of\rthe Pequod’s quarter deck, and pretty close to the mizzen shrouds,\rthere was an auger hole, bored about half an inch or so, into the\rplank. His bone leg steadied in that hole; one arm elevated, and\rholding by a shroud; Captain Ahab stood erect, looking straight out\rbeyond the ship’s ever-pitching prow. There was an infinity of firmest\rfortitude, a determinate, unsurrenderable wilfulness, in the fixed and\rfearless, forward dedication of that glance. Not a word he spoke; nor\rdid his officers say aught to him; though by all their minutest\rgestures and expressions, they plainly showed the uneasy, if not\rpainful, consciousness of being under a troubled master-eye. And not\ronly that, but moody stricken Ahab stood before them with a crucifixion\rin his face; in all the nameless regal overbearing dignity of some\rmighty woe.\r\rEre long, from his first visit in the air, he withdrew into his cabin.\rBut after that morning, he was every day visible to the crew; either\rstanding in his pivot-hole, or seated upon an ivory stool he had; or\rheavily walking the deck. As the sky grew less gloomy; indeed, began to\rgrow a little genial, he became still less and less a recluse; as if,\rwhen the ship had sailed from home, nothing but the dead wintry\rbleakness of the sea had then kept him so secluded. And, by and by, it\rcame to pass, that he was almost continually in the air; but, as yet,\rfor all that he said, or perceptibly did, on the at last sunny deck, he\rseemed as unnecessary there as another mast. But the Pequod was only\rmaking a passage now; not regularly cruising; nearly all whaling\rpreparatives needing supervision the mates were fully competent to, so\rthat there was little or nothing, out of himself, to employ or excite\rAhab, now; and thus chase away, for that one interval, the clouds that\rlayer upon layer were piled upon his brow, as ever all clouds choose\rthe loftiest peaks to pile themselves upon.\r\rNevertheless, ere long, the warm, warbling persuasiveness of the\rpleasant, holiday weather we came to, seemed gradually to charm him\rfrom his mood. For, as when the red-cheeked, dancing girls, April and\rMay, trip home to the wintry, misanthropic woods; even the barest,\rruggedest, most thunder-cloven old oak will at least send forth some\rfew green sprouts, to welcome such glad-hearted visitants; so Ahab did,\rin the end, a little respond to the playful allurings of that girlish\rair. More than once did he put forth the faint blossom of a look,\rwhich, in any other man, would have soon flowered out in a smile.\r\r\rCHAPTER 29. Enter Ahab; to Him, Stubb.\r\rSome days elapsed, and ice and icebergs all astern, the Pequod now went\rrolling through the bright Quito spring, which, at sea, almost\rperpetually reigns on the threshold of the eternal August of the\rTropic. The warmly cool, clear, ringing, perfumed, overflowing,\rredundant days, were as crystal goblets of Persian sherbet, heaped\rup—flaked up, with rose-water snow. The starred and stately nights\rseemed haughty dames in jewelled velvets, nursing at home in lonely\rpride, the memory of their absent conquering Earls, the golden helmeted\rsuns! For sleeping man, ’twas hard to choose between such winsome days\rand such seducing nights. But all the witcheries of that unwaning\rweather did not merely lend new spells and potencies to the outward\rworld. Inward they turned upon the soul, especially when the still mild\rhours of eve came on; then, memory shot her crystals as the clear ice\rmost forms of noiseless twilights. And all these subtle agencies, more\rand more they wrought on Ahab’s texture.\r\rOld age is always wakeful; as if, the longer linked with life, the less\rman has to do with aught that looks like death. Among sea-commanders,\rthe old greybeards will oftenest leave their berths to visit the\rnight-cloaked deck. It was so with Ahab; only that now, of late, he\rseemed so much to live in the open air, that truly speaking, his visits\rwere more to the cabin, than from the cabin to the planks. “It feels\rlike going down into one’s tomb,”—he would mutter to himself—“for an\rold captain like me to be descending this narrow scuttle, to go to my\rgrave-dug berth.”\r\rSo, almost every twenty-four hours, when the watches of the night were\rset, and the band on deck sentinelled the slumbers of the band below;\rand when if a rope was to be hauled upon the forecastle, the sailors\rflung it not rudely down, as by day, but with some cautiousness dropt\rit to its place for fear of disturbing their slumbering shipmates; when\rthis sort of steady quietude would begin to prevail, habitually, the\rsilent steersman would watch the cabin-scuttle; and ere long the old\rman would emerge, gripping at the iron banister, to help his crippled\rway. Some considering touch of humanity was in him; for at times like\rthese, he usually abstained from patrolling the quarter-deck; because\rto his wearied mates, seeking repose within six inches of his ivory\rheel, such would have been the reverberating crack and din of that bony\rstep, that their dreams would have been on the crunching teeth of\rsharks. But once, the mood was on him too deep for common regardings;\rand as with heavy, lumber-like pace he was measuring the ship from\rtaffrail to mainmast, Stubb, the old second mate, came up from below,\rwith a certain unassured, deprecating humorousness, hinted that if\rCaptain Ahab was pleased to walk the planks, then, no one could say\rnay; but there might be some way of muffling the noise; hinting\rsomething indistinctly and hesitatingly about a globe of tow, and the\rinsertion into it, of the ivory heel. Ah! Stubb, thou didst not know\rAhab then.\r\r“Am I a cannon-ball, Stubb,” said Ahab, “that thou wouldst wad me that\rfashion? But go thy ways; I had forgot. Below to thy nightly grave;\rwhere such as ye sleep between shrouds, to use ye to the filling one at\rlast.—Down, dog, and kennel!”\r\rStarting at the unforseen concluding exclamation of the so suddenly\rscornful old man, Stubb was speechless a moment; then said excitedly,\r“I am not used to be spoken to that way, sir; I do but less than half\rlike it, sir.”\r\r“Avast! gritted Ahab between his set teeth, and violently moving away,\ras if to avoid some passionate temptation.\r\r“No, sir; not yet,” said Stubb, emboldened, “I will not tamely be\rcalled a dog, sir.”\r\r“Then be called ten times a donkey, and a mule, and an ass, and begone,\ror I’ll clear the world of thee!”\r\rAs he said this, Ahab advanced upon him with such overbearing terrors\rin his aspect, that Stubb involuntarily retreated.\r\r“I was never served so before without giving a hard blow for it,”\rmuttered Stubb, as he found himself descending the cabin-scuttle. “It’s\rvery queer. Stop, Stubb; somehow, now, I don’t well know whether to go\rback and strike him, or—what’s that?—down here on my knees and pray for\rhim? Yes, that was the thought coming up in me; but it would be the\rfirst time I ever _did_ pray. It’s queer; very queer; and he’s queer\rtoo; aye, take him fore and aft, he’s about the queerest old man Stubb\rever sailed with. How he flashed at me!—his eyes like powder-pans! is\rhe mad? Anyway there’s something on his mind, as sure as there must be\rsomething on a deck when it cracks. He aint in his bed now, either,\rmore than three hours out of the twenty-four; and he don’t sleep then.\rDidn’t that Dough-Boy, the steward, tell me that of a morning he always\rfinds the old man’s hammock clothes all rumpled and tumbled, and the\rsheets down at the foot, and the coverlid almost tied into knots, and\rthe pillow a sort of frightful hot, as though a baked brick had been on\rit? A hot old man! I guess he’s got what some folks ashore call a\rconscience; it’s a kind of Tic-Dolly-row they say—worse nor a\rtoothache. Well, well; I don’t know what it is, but the Lord keep me\rfrom catching it. He’s full of riddles; I wonder what he goes into the\rafter hold for, every night, as Dough-Boy tells me he suspects; what’s\rthat for, I should like to know? Who’s made appointments with him in\rthe hold? Ain’t that queer, now? But there’s no telling, it’s the old\rgame—Here goes for a snooze. Damn me, it’s worth a fellow’s while to be\rborn into the world, if only to fall right asleep. And now that I think\rof it, that’s about the first thing babies do, and that’s a sort of\rqueer, too. Damn me, but all things are queer, come to think of ’em.\rBut that’s against my principles. Think not, is my eleventh\rcommandment; and sleep when you can, is my twelfth—So here goes again.\rBut how’s that? didn’t he call me a dog? blazes! he called me ten times\ra donkey, and piled a lot of jackasses on top of _that!_ He might as\rwell have kicked me, and done with it. Maybe he _did_ kick me, and I\rdidn’t observe it, I was so taken all aback with his brow, somehow. It\rflashed like a bleached bone. What the devil’s the matter with me? I\rdon’t stand right on my legs. Coming afoul of that old man has a sort\rof turned me wrong side out. By the Lord, I must have been dreaming,\rthough—How? how? how?—but the only way’s to stash it; so here goes to\rhammock again; and in the morning, I’ll see how this plaguey juggling\rthinks over by daylight.”\r\r\rCHAPTER 30. The Pipe.\r\rWhen Stubb had departed, Ahab stood for a while leaning over the\rbulwarks; and then, as had been usual with him of late, calling a\rsailor of the watch, he sent him below for his ivory stool, and also\rhis pipe. Lighting the pipe at the binnacle lamp and planting the stool\ron the weather side of the deck, he sat and smoked.\r\rIn old Norse times, the thrones of the sea-loving Danish kings were\rfabricated, saith tradition, of the tusks of the narwhale. How could\rone look at Ahab then, seated on that tripod of bones, without\rbethinking him of the royalty it symbolized? For a Khan of the plank,\rand a king of the sea, and a great lord of Leviathans was Ahab.\r\rSome moments passed, during which the thick vapor came from his mouth\rin quick and constant puffs, which blew back again into his face. “How\rnow,” he soliloquized at last, withdrawing the tube, “this smoking no\rlonger soothes. Oh, my pipe! hard must it go with me if thy charm be\rgone! Here have I been unconsciously toiling, not pleasuring—aye, and\rignorantly smoking to windward all the while; to windward, and with\rsuch nervous whiffs, as if, like the dying whale, my final jets were\rthe strongest and fullest of trouble. What business have I with this\rpipe? This thing that is meant for sereneness, to send up mild white\rvapors among mild white hairs, not among torn iron-grey locks like\rmine. I’ll smoke no more—”\r\rHe tossed the still lighted pipe into the sea. The fire hissed in the\rwaves; the same instant the ship shot by the bubble the sinking pipe\rmade. With slouched hat, Ahab lurchingly paced the planks.\r\r\rCHAPTER 31. Queen Mab.\r\rNext morning Stubb accosted Flask.\r\r“Such a queer dream, King-Post, I never had. You know the old man’s\rivory leg, well I dreamed he kicked me with it; and when I tried to\rkick back, upon my soul, my little man, I kicked my leg right off! And\rthen, presto! Ahab seemed a pyramid, and I, like a blazing fool, kept\rkicking at it. But what was still more curious, Flask—you know how\rcurious all dreams are—through all this rage that I was in, I somehow\rseemed to be thinking to myself, that after all, it was not much of an\rinsult, that kick from Ahab. ‘Why,’ thinks I, ‘what’s the row? It’s not\ra real leg, only a false leg.’ And there’s a mighty difference between\ra living thump and a dead thump. That’s what makes a blow from the\rhand, Flask, fifty times more savage to bear than a blow from a cane.\rThe living member—that makes the living insult, my little man. And\rthinks I to myself all the while, mind, while I was stubbing my silly\rtoes against that cursed pyramid—so confoundedly contradictory was it\rall, all the while, I say, I was thinking to myself, ‘what’s his leg\rnow, but a cane—a whalebone cane. Yes,’ thinks I, ‘it was only a\rplayful cudgelling—in fact, only a whaleboning that he gave me—not a\rbase kick. Besides,’ thinks I, ‘look at it once; why, the end of it—the\rfoot part—what a small sort of end it is; whereas, if a broad footed\rfarmer kicked me, _there’s_ a devilish broad insult. But this insult is\rwhittled down to a point only.’ But now comes the greatest joke of the\rdream, Flask. While I was battering away at the pyramid, a sort of\rbadger-haired old merman, with a hump on his back, takes me by the\rshoulders, and slews me round. ‘What are you ’bout?’ says he. Slid!\rman, but I was frightened. Such a phiz! But, somehow, next moment I was\rover the fright. ‘What am I about?’ says I at last. ‘And what business\ris that of yours, I should like to know, Mr. Humpback? Do _you_ want a\rkick?’ By the lord, Flask, I had no sooner said that, than he turned\rround his stern to me, bent over, and dragging up a lot of seaweed he\rhad for a clout—what do you think, I saw?—why thunder alive, man, his\rstern was stuck full of marlinspikes, with the points out. Says I, on\rsecond thoughts, ‘I guess I won’t kick you, old fellow.’ ‘Wise Stubb,’\rsaid he, ‘wise Stubb;’ and kept muttering it all the time, a sort of\reating of his own gums like a chimney hag. Seeing he wasn’t going to\rstop saying over his ‘wise Stubb, wise Stubb,’ I thought I might as\rwell fall to kicking the pyramid again. But I had only just lifted my\rfoot for it, when he roared out, ‘Stop that kicking!’ ‘Halloa,’ says I,\r‘what’s the matter now, old fellow?’ ‘Look ye here,’ says he; ‘let’s\rargue the insult. Captain Ahab kicked ye, didn’t he?’ ‘Yes, he did,’\rsays I—‘right _here_ it was.’ ‘Very good,’ says he—‘he used his ivory\rleg, didn’t he?’ ‘Yes, he did,’ says I. ‘Well then,’ says he, ‘wise\rStubb, what have you to complain of? Didn’t he kick with right good\rwill? it wasn’t a common pitch pine leg he kicked with, was it? No, you\rwere kicked by a great man, and with a beautiful ivory leg, Stubb. It’s\ran honor; I consider it an honor. Listen, wise Stubb. In old England\rthe greatest lords think it great glory to be slapped by a queen, and\rmade garter-knights of; but, be _your_ boast, Stubb, that ye were\rkicked by old Ahab, and made a wise man of. Remember what I say; _be_\rkicked by him; account his kicks honors; and on no account kick back;\rfor you can’t help yourself, wise Stubb. Don’t you see that pyramid?’\rWith that, he all of a sudden seemed somehow, in some queer fashion, to\rswim off into the air. I snored; rolled over; and there I was in my\rhammock! Now, what do you think of that dream, Flask?”\r\r“I don’t know; it seems a sort of foolish to me, tho.’”\r\r“May be; may be. But it’s made a wise man of me, Flask. D’ye see Ahab\rstanding there, sideways looking over the stern? Well, the best thing\ryou can do, Flask, is to let the old man alone; never speak to him,\rwhatever he says. Halloa! What’s that he shouts? Hark!”\r\r“Mast-head, there! Look sharp, all of ye! There are whales hereabouts!\r\r“If ye see a white one, split your lungs for him!\r\r“What do you think of that now, Flask? ain’t there a small drop of\rsomething queer about that, eh? A white whale—did ye mark that, man?\rLook ye—there’s something special in the wind. Stand by for it, Flask.\rAhab has that that’s bloody on his mind. But, mum; he comes this way.”\r\r\rCHAPTER 32. Cetology.\r\rAlready we are boldly launched upon the deep; but soon we shall be lost\rin its unshored, harbourless immensities. Ere that come to pass; ere\rthe Pequod’s weedy hull rolls side by side with the barnacled hulls of\rthe leviathan; at the outset it is but well to attend to a matter\ralmost indispensable to a thorough appreciative understanding of the\rmore special leviathanic revelations and allusions of all sorts which\rare to follow.\r\rIt is some systematized exhibition of the whale in his broad genera,\rthat I would now fain put before you. Yet is it no easy task. The\rclassification of the constituents of a chaos, nothing less is here\ressayed. Listen to what the best and latest authorities have laid down.\r\r“No branch of Zoology is so much involved as that which is entitled\rCetology,” says Captain Scoresby, A.D. 1820.\r\r“It is not my intention, were it in my power, to enter into the inquiry\ras to the true method of dividing the cetacea into groups and families.\r* * * Utter confusion exists among the historians of this animal”\r(sperm whale), says Surgeon Beale, A.D. 1839.\r\r“Unfitness to pursue our research in the unfathomable waters.”\r“Impenetrable veil covering our knowledge of the cetacea.” “A field\rstrewn with thorns.” “All these incomplete indications but serve to\rtorture us naturalists.”\r\rThus speak of the whale, the great Cuvier, and John Hunter, and Lesson,\rthose lights of zoology and anatomy. Nevertheless, though of real\rknowledge there be little, yet of books there are a plenty; and so in\rsome small degree, with cetology, or the science of whales. Many are\rthe men, small and great, old and new, landsmen and seamen, who have at\rlarge or in little, written of the whale. Run over a few:—The Authors\rof the Bible; Aristotle; Pliny; Aldrovandi; Sir Thomas Browne; Gesner;\rRay; Linnæus; Rondeletius; Willoughby; Green; Artedi; Sibbald; Brisson;\rMarten; Lacépède; Bonneterre; Desmarest; Baron Cuvier; Frederick\rCuvier; John Hunter; Owen; Scoresby; Beale; Bennett; J. Ross Browne;\rthe Author of Miriam Coffin; Olmstead; and the Rev. T. Cheever. But to\rwhat ultimate generalizing purpose all these have written, the above\rcited extracts will show.\r\rOf the names in this list of whale authors, only those following Owen\rever saw living whales; and but one of them was a real professional\rharpooneer and whaleman. I mean Captain Scoresby. On the separate\rsubject of the Greenland or right-whale, he is the best existing\rauthority. But Scoresby knew nothing and says nothing of the great\rsperm whale, compared with which the Greenland whale is almost unworthy\rmentioning. And here be it said, that the Greenland whale is an usurper\rupon the throne of the seas. He is not even by any means the largest of\rthe whales. Yet, owing to the long priority of his claims, and the\rprofound ignorance which, till some seventy years back, invested the\rthen fabulous or utterly unknown sperm-whale, and which ignorance to\rthis present day still reigns in all but some few scientific retreats\rand whale-ports; this usurpation has been every way complete. Reference\rto nearly all the leviathanic allusions in the great poets of past\rdays, will satisfy you that the Greenland whale, without one rival, was\rto them the monarch of the seas. But the time has at last come for a\rnew proclamation. This is Charing Cross; hear ye! good people all,—the\rGreenland whale is deposed,—the great sperm whale now reigneth!\r\rThere are only two books in being which at all pretend to put the\rliving sperm whale before you, and at the same time, in the remotest\rdegree succeed in the attempt. Those books are Beale’s and Bennett’s;\rboth in their time surgeons to English South-Sea whale-ships, and both\rexact and reliable men. The original matter touching the sperm whale to\rbe found in their volumes is necessarily small; but so far as it goes,\rit is of excellent quality, though mostly confined to scientific\rdescription. As yet, however, the sperm whale, scientific or poetic,\rlives not complete in any literature. Far above all other hunted\rwhales, his is an unwritten life.\r\rNow the various species of whales need some sort of popular\rcomprehensive classification, if only an easy outline one for the\rpresent, hereafter to be filled in all its departments by subsequent\rlaborers. As no better man advances to take this matter in hand, I\rhereupon offer my own poor endeavors. I promise nothing complete;\rbecause any human thing supposed to be complete, must for that very\rreason infallibly be faulty. I shall not pretend to a minute anatomical\rdescription of the various species, or—in this place at least—to much\rof any description. My object here is simply to project the draught of\ra systematization of cetology. I am the architect, not the builder.\r\rBut it is a ponderous task; no ordinary letter-sorter in the\rPost-Office is equal to it. To grope down into the bottom of the sea\rafter them; to have one’s hands among the unspeakable foundations,\rribs, and very pelvis of the world; this is a fearful thing. What am I\rthat I should essay to hook the nose of this leviathan! The awful\rtauntings in Job might well appal me. Will he (the leviathan) make a\rcovenant with thee? Behold the hope of him is vain! But I have swam\rthrough libraries and sailed through oceans; I have had to do with\rwhales with these visible hands; I am in earnest; and I will try. There\rare some preliminaries to settle.\r\rFirst: The uncertain, unsettled condition of this science of Cetology\ris in the very vestibule attested by the fact, that in some quarters it\rstill remains a moot point whether a whale be a fish. In his System of\rNature, A.D. 1776, Linnæus declares, “I hereby separate the whales from\rthe fish.” But of my own knowledge, I know that down to the year 1850,\rsharks and shad, alewives and herring, against Linnæus’s express edict,\rwere still found dividing the possession of the same seas with the\rLeviathan.\r\rThe grounds upon which Linnæus would fain have banished the whales from\rthe waters, he states as follows: “On account of their warm bilocular\rheart, their lungs, their movable eyelids, their hollow ears, penem\rintrantem feminam mammis lactantem,” and finally, “ex lege naturæ jure\rmeritoque.” I submitted all this to my friends Simeon Macey and Charley\rCoffin, of Nantucket, both messmates of mine in a certain voyage, and\rthey united in the opinion that the reasons set forth were altogether\rinsufficient. Charley profanely hinted they were humbug.\r\rBe it known that, waiving all argument, I take the good old fashioned\rground that the whale is a fish, and call upon holy Jonah to back me.\rThis fundamental thing settled, the next point is, in what internal\rrespect does the whale differ from other fish. Above, Linnæus has given\ryou those items. But in brief, they are these: lungs and warm blood;\rwhereas, all other fish are lungless and cold blooded.\r\rNext: how shall we define the whale, by his obvious externals, so as\rconspicuously to label him for all time to come? To be short, then, a\rwhale is _a spouting fish with a horizontal tail_. There you have him.\rHowever contracted, that definition is the result of expanded\rmeditation. A walrus spouts much like a whale, but the walrus is not a\rfish, because he is amphibious. But the last term of the definition is\rstill more cogent, as coupled with the first. Almost any one must have\rnoticed that all the fish familiar to landsmen have not a flat, but a\rvertical, or up-and-down tail. Whereas, among spouting fish the tail,\rthough it may be similarly shaped, invariably assumes a horizontal\rposition.\r\rBy the above definition of what a whale is, I do by no means exclude\rfrom the leviathanic brotherhood any sea creature hitherto identified\rwith the whale by the best informed Nantucketers; nor, on the other\rhand, link with it any fish hitherto authoritatively regarded as\ralien.* Hence, all the smaller, spouting, and horizontal tailed fish\rmust be included in this ground-plan of Cetology. Now, then, come the\rgrand divisions of the entire whale host.\r\r*I am aware that down to the present time, the fish styled Lamatins and\rDugongs (Pig-fish and Sow-fish of the Coffins of Nantucket) are\rincluded by many naturalists among the whales. But as these pig-fish\rare a noisy, contemptible set, mostly lurking in the mouths of rivers,\rand feeding on wet hay, and especially as they do not spout, I deny\rtheir credentials as whales; and have presented them with their\rpassports to quit the Kingdom of Cetology.\r\rFirst: According to magnitude I divide the whales into three primary\rBOOKS (subdivisible into CHAPTERS), and these shall comprehend them\rall, both small and large.\r\rI. THE FOLIO WHALE; II. the OCTAVO WHALE; III. the DUODECIMO WHALE.\r\rAs the type of the FOLIO I present the _Sperm Whale_; of the OCTAVO,\rthe _Grampus_; of the DUODECIMO, the _Porpoise_.\r\rFOLIOS. Among these I here include the following chapters:—I. The\r_Sperm Whale_; II. the _Right Whale_; III. the _Fin-Back Whale_; IV.\rthe _Hump-backed Whale_; V. the _Razor Back Whale_; VI. the _Sulphur\rBottom Whale_.\r\rBOOK I. (_Folio_), CHAPTER I. (_Sperm Whale_).—This whale, among the\rEnglish of old vaguely known as the Trumpa whale, and the Physeter\rwhale, and the Anvil Headed whale, is the present Cachalot of the\rFrench, and the Pottsfich of the Germans, and the Macrocephalus of the\rLong Words. He is, without doubt, the largest inhabitant of the globe;\rthe most formidable of all whales to encounter; the most majestic in\raspect; and lastly, by far the most valuable in commerce; he being the\ronly creature from which that valuable substance, spermaceti, is\robtained. All his peculiarities will, in many other places, be enlarged\rupon. It is chiefly with his name that I now have to do. Philologically\rconsidered, it is absurd. Some centuries ago, when the Sperm whale was\ralmost wholly unknown in his own proper individuality, and when his oil\rwas only accidentally obtained from the stranded fish; in those days\rspermaceti, it would seem, was popularly supposed to be derived from a\rcreature identical with the one then known in England as the Greenland\ror Right Whale. It was the idea also, that this same spermaceti was\rthat quickening humor of the Greenland Whale which the first syllable\rof the word literally expresses. In those times, also, spermaceti was\rexceedingly scarce, not being used for light, but only as an ointment\rand medicament. It was only to be had from the druggists as you\rnowadays buy an ounce of rhubarb. When, as I opine, in the course of\rtime, the true nature of spermaceti became known, its original name was\rstill retained by the dealers; no doubt to enhance its value by a\rnotion so strangely significant of its scarcity. And so the appellation\rmust at last have come to be bestowed upon the whale from which this\rspermaceti was really derived.\r\rBOOK I. (_Folio_), CHAPTER II. (_Right Whale_).—In one respect this is\rthe most venerable of the leviathans, being the one first regularly\rhunted by man. It yields the article commonly known as whalebone or\rbaleen; and the oil specially known as “whale oil,” an inferior article\rin commerce. Among the fishermen, he is indiscriminately designated by\rall the following titles: The Whale; the Greenland Whale; the Black\rWhale; the Great Whale; the True Whale; the Right Whale. There is a\rdeal of obscurity concerning the identity of the species thus\rmultitudinously baptised. What then is the whale, which I include in\rthe second species of my Folios? It is the Great Mysticetus of the\rEnglish naturalists; the Greenland Whale of the English whalemen; the\rBaleine Ordinaire of the French whalemen; the Growlands Walfish of the\rSwedes. It is the whale which for more than two centuries past has been\rhunted by the Dutch and English in the Arctic seas; it is the whale\rwhich the American fishermen have long pursued in the Indian ocean, on\rthe Brazil Banks, on the Nor’ West Coast, and various other parts of\rthe world, designated by them Right Whale Cruising Grounds.\r\rSome pretend to see a difference between the Greenland whale of the\rEnglish and the right whale of the Americans. But they precisely agree\rin all their grand features; nor has there yet been presented a single\rdeterminate fact upon which to ground a radical distinction. It is by\rendless subdivisions based upon the most inconclusive differences, that\rsome departments of natural history become so repellingly intricate.\rThe right whale will be elsewhere treated of at some length, with\rreference to elucidating the sperm whale.\r\rBOOK I. (_Folio_), CHAPTER III. (_Fin-Back_).—Under this head I reckon\ra monster which, by the various names of Fin-Back, Tall-Spout, and\rLong-John, has been seen almost in every sea and is commonly the whale\rwhose distant jet is so often descried by passengers crossing the\rAtlantic, in the New York packet-tracks. In the length he attains, and\rin his baleen, the Fin-back resembles the right whale, but is of a less\rportly girth, and a lighter colour, approaching to olive. His great\rlips present a cable-like aspect, formed by the intertwisting, slanting\rfolds of large wrinkles. His grand distinguishing feature, the fin,\rfrom which he derives his name, is often a conspicuous object. This fin\ris some three or four feet long, growing vertically from the hinder\rpart of the back, of an angular shape, and with a very sharp pointed\rend. Even if not the slightest other part of the creature be visible,\rthis isolated fin will, at times, be seen plainly projecting from the\rsurface. When the sea is moderately calm, and slightly marked with\rspherical ripples, and this gnomon-like fin stands up and casts shadows\rupon the wrinkled surface, it may well be supposed that the watery\rcircle surrounding it somewhat resembles a dial, with its style and\rwavy hour-lines graved on it. On that Ahaz-dial the shadow often goes\rback. The Fin-Back is not gregarious. He seems a whale-hater, as some\rmen are man-haters. Very shy; always going solitary; unexpectedly\rrising to the surface in the remotest and most sullen waters; his\rstraight and single lofty jet rising like a tall misanthropic spear\rupon a barren plain; gifted with such wondrous power and velocity in\rswimming, as to defy all present pursuit from man; this leviathan seems\rthe banished and unconquerable Cain of his race, bearing for his mark\rthat style upon his back. From having the baleen in his mouth, the\rFin-Back is sometimes included with the right whale, among a theoretic\rspecies denominated _Whalebone whales_, that is, whales with baleen. Of\rthese so called Whalebone whales, there would seem to be several\rvarieties, most of which, however, are little known. Broad-nosed whales\rand beaked whales; pike-headed whales; bunched whales; under-jawed\rwhales and rostrated whales, are the fishermen’s names for a few sorts.\r\rIn connection with this appellative of “Whalebone whales,” it is of\rgreat importance to mention, that however such a nomenclature may be\rconvenient in facilitating allusions to some kind of whales, yet it is\rin vain to attempt a clear classification of the Leviathan, founded\rupon either his baleen, or hump, or fin, or teeth; notwithstanding that\rthose marked parts or features very obviously seem better adapted to\rafford the basis for a regular system of Cetology than any other\rdetached bodily distinctions, which the whale, in his kinds, presents.\rHow then? The baleen, hump, back-fin, and teeth; these are things whose\rpeculiarities are indiscriminately dispersed among all sorts of whales,\rwithout any regard to what may be the nature of their structure in\rother and more essential particulars. Thus, the sperm whale and the\rhumpbacked whale, each has a hump; but there the similitude ceases.\rThen, this same humpbacked whale and the Greenland whale, each of these\rhas baleen; but there again the similitude ceases. And it is just the\rsame with the other parts above mentioned. In various sorts of whales,\rthey form such irregular combinations; or, in the case of any one of\rthem detached, such an irregular isolation; as utterly to defy all\rgeneral methodization formed upon such a basis. On this rock every one\rof the whale-naturalists has split.\r\rBut it may possibly be conceived that, in the internal parts of the\rwhale, in his anatomy—there, at least, we shall be able to hit the\rright classification. Nay; what thing, for example, is there in the\rGreenland whale’s anatomy more striking than his baleen? Yet we have\rseen that by his baleen it is impossible correctly to classify the\rGreenland whale. And if you descend into the bowels of the various\rleviathans, why there you will not find distinctions a fiftieth part as\ravailable to the systematizer as those external ones already\renumerated. What then remains? nothing but to take hold of the whales\rbodily, in their entire liberal volume, and boldly sort them that way.\rAnd this is the Bibliographical system here adopted; and it is the only\rone that can possibly succeed, for it alone is practicable. To proceed.\r\rBOOK I. (_Folio_) CHAPTER IV. (_Hump Back_).—This whale is often seen\ron the northern American coast. He has been frequently captured there,\rand towed into harbor. He has a great pack on him like a peddler; or\ryou might call him the Elephant and Castle whale. At any rate, the\rpopular name for him does not sufficiently distinguish him, since the\rsperm whale also has a hump though a smaller one. His oil is not very\rvaluable. He has baleen. He is the most gamesome and light-hearted of\rall the whales, making more gay foam and white water generally than any\rother of them.\r\rBOOK I. (_Folio_), CHAPTER V. (_Razor Back_).—Of this whale little is\rknown but his name. I have seen him at a distance off Cape Horn. Of a\rretiring nature, he eludes both hunters and philosophers. Though no\rcoward, he has never yet shown any part of him but his back, which\rrises in a long sharp ridge. Let him go. I know little more of him, nor\rdoes anybody else.\r\rBOOK I. (_Folio_), CHAPTER VI. (_Sulphur Bottom_).—Another retiring\rgentleman, with a brimstone belly, doubtless got by scraping along the\rTartarian tiles in some of his profounder divings. He is seldom seen;\rat least I have never seen him except in the remoter southern seas, and\rthen always at too great a distance to study his countenance. He is\rnever chased; he would run away with rope-walks of line. Prodigies are\rtold of him. Adieu, Sulphur Bottom! I can say nothing more that is true\rof ye, nor can the oldest Nantucketer.\r\rThus ends BOOK I. (_Folio_), and now begins BOOK II. (_Octavo_).\r\rOCTAVOES.*—These embrace the whales of middling magnitude, among which\rpresent may be numbered:—I., the _Grampus_; II., the _Black Fish_;\rIII., the _Narwhale_; IV., the _Thrasher_; V., the _Killer_.\r\r*Why this book of whales is not denominated the Quarto is very plain.\rBecause, while the whales of this order, though smaller than those of\rthe former order, nevertheless retain a proportionate likeness to them\rin figure, yet the bookbinder’s Quarto volume in its dimensioned form\rdoes not preserve the shape of the Folio volume, but the Octavo volume\rdoes.\r\rBOOK II. (_Octavo_), CHAPTER I. (_Grampus_).—Though this fish, whose\rloud sonorous breathing, or rather blowing, has furnished a proverb to\rlandsmen, is so well known a denizen of the deep, yet is he not\rpopularly classed among whales. But possessing all the grand\rdistinctive features of the leviathan, most naturalists have recognised\rhim for one. He is of moderate octavo size, varying from fifteen to\rtwenty-five feet in length, and of corresponding dimensions round the\rwaist. He swims in herds; he is never regularly hunted, though his oil\ris considerable in quantity, and pretty good for light. By some\rfishermen his approach is regarded as premonitory of the advance of the\rgreat sperm whale.\r\rBOOK II. (_Octavo_), CHAPTER II. (_Black Fish_).—I give the popular\rfishermen’s names for all these fish, for generally they are the best.\rWhere any name happens to be vague or inexpressive, I shall say so, and\rsuggest another. I do so now, touching the Black Fish, so-called,\rbecause blackness is the rule among almost all whales. So, call him the\rHyena Whale, if you please. His voracity is well known, and from the\rcircumstance that the inner angles of his lips are curved upwards, he\rcarries an everlasting Mephistophelean grin on his face. This whale\raverages some sixteen or eighteen feet in length. He is found in almost\rall latitudes. He has a peculiar way of showing his dorsal hooked fin\rin swimming, which looks something like a Roman nose. When not more\rprofitably employed, the sperm whale hunters sometimes capture the\rHyena whale, to keep up the supply of cheap oil for domestic\remployment—as some frugal housekeepers, in the absence of company, and\rquite alone by themselves, burn unsavory tallow instead of odorous wax.\rThough their blubber is very thin, some of these whales will yield you\rupwards of thirty gallons of oil.\r\rBOOK II. (_Octavo_), CHAPTER III. (_Narwhale_), that is, _Nostril\rwhale_.—Another instance of a curiously named whale, so named I suppose\rfrom his peculiar horn being originally mistaken for a peaked nose. The\rcreature is some sixteen feet in length, while its horn averages five\rfeet, though some exceed ten, and even attain to fifteen feet. Strictly\rspeaking, this horn is but a lengthened tusk, growing out from the jaw\rin a line a little depressed from the horizontal. But it is only found\ron the sinister side, which has an ill effect, giving its owner\rsomething analogous to the aspect of a clumsy left-handed man. What\rprecise purpose this ivory horn or lance answers, it would be hard to\rsay. It does not seem to be used like the blade of the sword-fish and\rbill-fish; though some sailors tell me that the Narwhale employs it for\ra rake in turning over the bottom of the sea for food. Charley Coffin\rsaid it was used for an ice-piercer; for the Narwhale, rising to the\rsurface of the Polar Sea, and finding it sheeted with ice, thrusts his\rhorn up, and so breaks through. But you cannot prove either of these\rsurmises to be correct. My own opinion is, that however this one-sided\rhorn may really be used by the Narwhale—however that may be—it would\rcertainly be very convenient to him for a folder in reading pamphlets.\rThe Narwhale I have heard called the Tusked whale, the Horned whale,\rand the Unicorn whale. He is certainly a curious example of the\rUnicornism to be found in almost every kingdom of animated nature. From\rcertain cloistered old authors I have gathered that this same\rsea-unicorn’s horn was in ancient days regarded as the great antidote\ragainst poison, and as such, preparations of it brought immense prices.\rIt was also distilled to a volatile salts for fainting ladies, the same\rway that the horns of the male deer are manufactured into hartshorn.\rOriginally it was in itself accounted an object of great curiosity.\rBlack Letter tells me that Sir Martin Frobisher on his return from that\rvoyage, when Queen Bess did gallantly wave her jewelled hand to him\rfrom a window of Greenwich Palace, as his bold ship sailed down the\rThames; “when Sir Martin returned from that voyage,” saith Black\rLetter, “on bended knees he presented to her highness a prodigious long\rhorn of the Narwhale, which for a long period after hung in the castle\rat Windsor.” An Irish author avers that the Earl of Leicester, on\rbended knees, did likewise present to her highness another horn,\rpertaining to a land beast of the unicorn nature.\r\rThe Narwhale has a very picturesque, leopard-like look, being of a\rmilk-white ground colour, dotted with round and oblong spots of black.\rHis oil is very superior, clear and fine; but there is little of it,\rand he is seldom hunted. He is mostly found in the circumpolar seas.\r\rBOOK II. (_Octavo_), CHAPTER IV. (_Killer_).—Of this whale little is\rprecisely known to the Nantucketer, and nothing at all to the professed\rnaturalist. From what I have seen of him at a distance, I should say\rthat he was about the bigness of a grampus. He is very savage—a sort of\rFeegee fish. He sometimes takes the great Folio whales by the lip, and\rhangs there like a leech, till the mighty brute is worried to death.\rThe Killer is never hunted. I never heard what sort of oil he has.\rException might be taken to the name bestowed upon this whale, on the\rground of its indistinctness. For we are all killers, on land and on\rsea; Bonapartes and Sharks included.\r\rBOOK II. (_Octavo_), CHAPTER V. (_Thrasher_).—This gentleman is famous\rfor his tail, which he uses for a ferule in thrashing his foes. He\rmounts the Folio whale’s back, and as he swims, he works his passage by\rflogging him; as some schoolmasters get along in the world by a similar\rprocess. Still less is known of the Thrasher than of the Killer. Both\rare outlaws, even in the lawless seas.\r\r Thus ends BOOK II. (_Octavo_), and begins BOOK III. (_Duodecimo_).\r\rDUODECIMOES.—These include the smaller whales. I. The Huzza Porpoise.\rII. The Algerine Porpoise. III. The Mealy-mouthed Porpoise.\r\rTo those who have not chanced specially to study the subject, it may\rpossibly seem strange, that fishes not commonly exceeding four or five\rfeet should be marshalled among WHALES—a word, which, in the popular\rsense, always conveys an idea of hugeness. But the creatures set down\rabove as Duodecimoes are infallibly whales, by the terms of my\rdefinition of what a whale is—_i.e._ a spouting fish, with a horizontal\rtail.\r\rBOOK III. (_Duodecimo_), CHAPTER 1. (_Huzza Porpoise_).—This is the\rcommon porpoise found almost all over the globe. The name is of my own\rbestowal; for there are more than one sort of porpoises, and something\rmust be done to distinguish them. I call him thus, because he always\rswims in hilarious shoals, which upon the broad sea keep tossing\rthemselves to heaven like caps in a Fourth-of-July crowd. Their\rappearance is generally hailed with delight by the mariner. Full of\rfine spirits, they invariably come from the breezy billows to windward.\rThey are the lads that always live before the wind. They are accounted\ra lucky omen. If you yourself can withstand three cheers at beholding\rthese vivacious fish, then heaven help ye; the spirit of godly\rgamesomeness is not in ye. A well-fed, plump Huzza Porpoise will yield\ryou one good gallon of good oil. But the fine and delicate fluid\rextracted from his jaws is exceedingly valuable. It is in request among\rjewellers and watchmakers. Sailors put it on their hones. Porpoise meat\ris good eating, you know. It may never have occurred to you that a\rporpoise spouts. Indeed, his spout is so small that it is not very\rreadily discernible. But the next time you have a chance, watch him;\rand you will then see the great Sperm whale himself in miniature.\r\rBOOK III. (_Duodecimo_), CHAPTER II. (_Algerine Porpoise_).—A pirate.\rVery savage. He is only found, I think, in the Pacific. He is somewhat\rlarger than the Huzza Porpoise, but much of the same general make.\rProvoke him, and he will buckle to a shark. I have lowered for him many\rtimes, but never yet saw him captured.\r\rBOOK III. (_Duodecimo_), CHAPTER III. (_Mealy-mouthed Porpoise_).—The\rlargest kind of Porpoise; and only found in the Pacific, so far as it\ris known. The only English name, by which he has hitherto been\rdesignated, is that of the fishers—Right-Whale Porpoise, from the\rcircumstance that he is chiefly found in the vicinity of that Folio. In\rshape, he differs in some degree from the Huzza Porpoise, being of a\rless rotund and jolly girth; indeed, he is of quite a neat and\rgentleman-like figure. He has no fins on his back (most other porpoises\rhave), he has a lovely tail, and sentimental Indian eyes of a hazel\rhue. But his mealy-mouth spoils all. Though his entire back down to his\rside fins is of a deep sable, yet a boundary line, distinct as the mark\rin a ship’s hull, called the “bright waist,” that line streaks him from\rstem to stern, with two separate colours, black above and white below.\rThe white comprises part of his head, and the whole of his mouth, which\rmakes him look as if he had just escaped from a felonious visit to a\rmeal-bag. A most mean and mealy aspect! His oil is much like that of\rthe common porpoise.\r\r  * * * * * *\r\rBeyond the DUODECIMO, this system does not proceed, inasmuch as the\rPorpoise is the smallest of the whales. Above, you have all the\rLeviathans of note. But there are a rabble of uncertain, fugitive,\rhalf-fabulous whales, which, as an American whaleman, I know by\rreputation, but not personally. I shall enumerate them by their\rfore-castle appellations; for possibly such a list may be valuable to\rfuture investigators, who may complete what I have here but begun. If\rany of the following whales, shall hereafter be caught and marked, then\rhe can readily be incorporated into this System, according to his\rFolio, Octavo, or Duodecimo magnitude:—The Bottle-Nose Whale; the Junk\rWhale; the Pudding-Headed Whale; the Cape Whale; the Leading Whale; the\rCannon Whale; the Scragg Whale; the Coppered Whale; the Elephant Whale;\rthe Iceberg Whale; the Quog Whale; the Blue Whale; etc. From Icelandic,\rDutch, and old English authorities, there might be quoted other lists\rof uncertain whales, blessed with all manner of uncouth names. But I\romit them as altogether obsolete; and can hardly help suspecting them\rfor mere sounds, full of Leviathanism, but signifying nothing.\r\rFinally: It was stated at the outset, that this system would not be\rhere, and at once, perfected. You cannot but plainly see that I have\rkept my word. But I now leave my cetological System standing thus\runfinished, even as the great Cathedral of Cologne was left, with the\rcrane still standing upon the top of the uncompleted tower. For small\rerections may be finished by their first architects; grand ones, true\rones, ever leave the copestone to posterity. God keep me from ever\rcompleting anything. This whole book is but a draught—nay, but the\rdraught of a draught. Oh, Time, Strength, Cash, and Patience!\r\r\rCHAPTER 33. The Specksnyder.\r\rConcerning the officers of the whale-craft, this seems as good a place\ras any to set down a little domestic peculiarity on ship-board, arising\rfrom the existence of the harpooneer class of officers, a class unknown\rof course in any other marine than the whale-fleet.\r\rThe large importance attached to the harpooneer’s vocation is evinced\rby the fact, that originally in the old Dutch Fishery, two centuries\rand more ago, the command of a whale ship was not wholly lodged in the\rperson now called the captain, but was divided between him and an\rofficer called the Specksnyder. Literally this word means Fat-Cutter;\rusage, however, in time made it equivalent to Chief Harpooneer. In\rthose days, the captain’s authority was restricted to the navigation\rand general management of the vessel; while over the whale-hunting\rdepartment and all its concerns, the Specksnyder or Chief Harpooneer\rreigned supreme. In the British Greenland Fishery, under the corrupted\rtitle of Specksioneer, this old Dutch official is still retained, but\rhis former dignity is sadly abridged. At present he ranks simply as\rsenior Harpooneer; and as such, is but one of the captain’s more\rinferior subalterns. Nevertheless, as upon the good conduct of the\rharpooneers the success of a whaling voyage largely depends, and since\rin the American Fishery he is not only an important officer in the\rboat, but under certain circumstances (night watches on a whaling\rground) the command of the ship’s deck is also his; therefore the grand\rpolitical maxim of the sea demands, that he should nominally live apart\rfrom the men before the mast, and be in some way distinguished as their\rprofessional superior; though always, by them, familiarly regarded as\rtheir social equal.\r\rNow, the grand distinction drawn between officer and man at sea, is\rthis—the first lives aft, the last forward. Hence, in whale-ships and\rmerchantmen alike, the mates have their quarters with the captain; and\rso, too, in most of the American whalers the harpooneers are lodged in\rthe after part of the ship. That is to say, they take their meals in\rthe captain’s cabin, and sleep in a place indirectly communicating with\rit.\r\rThough the long period of a Southern whaling voyage (by far the longest\rof all voyages now or ever made by man), the peculiar perils of it, and\rthe community of interest prevailing among a company, all of whom, high\ror low, depend for their profits, not upon fixed wages, but upon their\rcommon luck, together with their common vigilance, intrepidity, and\rhard work; though all these things do in some cases tend to beget a\rless rigorous discipline than in merchantmen generally; yet, never mind\rhow much like an old Mesopotamian family these whalemen may, in some\rprimitive instances, live together; for all that, the punctilious\rexternals, at least, of the quarter-deck are seldom materially relaxed,\rand in no instance done away. Indeed, many are the Nantucket ships in\rwhich you will see the skipper parading his quarter-deck with an elated\rgrandeur not surpassed in any military navy; nay, extorting almost as\rmuch outward homage as if he wore the imperial purple, and not the\rshabbiest of pilot-cloth.\r\rAnd though of all men the moody captain of the Pequod was the least\rgiven to that sort of shallowest assumption; and though the only homage\rhe ever exacted, was implicit, instantaneous obedience; though he\rrequired no man to remove the shoes from his feet ere stepping upon the\rquarter-deck; and though there were times when, owing to peculiar\rcircumstances connected with events hereafter to be detailed, he\raddressed them in unusual terms, whether of condescension or _in\rterrorem_, or otherwise; yet even Captain Ahab was by no means\runobservant of the paramount forms and usages of the sea.\r\rNor, perhaps, will it fail to be eventually perceived, that behind\rthose forms and usages, as it were, he sometimes masked himself;\rincidentally making use of them for other and more private ends than\rthey were legitimately intended to subserve. That certain sultanism of\rhis brain, which had otherwise in a good degree remained unmanifested;\rthrough those forms that same sultanism became incarnate in an\rirresistible dictatorship. For be a man’s intellectual superiority what\rit will, it can never assume the practical, available supremacy over\rother men, without the aid of some sort of external arts and\rentrenchments, always, in themselves, more or less paltry and base.\rThis it is, that for ever keeps God’s true princes of the Empire from\rthe world’s hustings; and leaves the highest honors that this air can\rgive, to those men who become famous more through their infinite\rinferiority to the choice hidden handful of the Divine Inert, than\rthrough their undoubted superiority over the dead level of the mass.\rSuch large virtue lurks in these small things when extreme political\rsuperstitions invest them, that in some royal instances even to idiot\rimbecility they have imparted potency. But when, as in the case of\rNicholas the Czar, the ringed crown of geographical empire encircles an\rimperial brain; then, the plebeian herds crouch abased before the\rtremendous centralization. Nor, will the tragic dramatist who would\rdepict mortal indomitableness in its fullest sweep and direct swing,\rever forget a hint, incidentally so important in his art, as the one\rnow alluded to.\r\rBut Ahab, my Captain, still moves before me in all his Nantucket\rgrimness and shagginess; and in this episode touching Emperors and\rKings, I must not conceal that I have only to do with a poor old\rwhale-hunter like him; and, therefore, all outward majestical trappings\rand housings are denied me. Oh, Ahab! what shall be grand in thee, it\rmust needs be plucked at from the skies, and dived for in the deep, and\rfeatured in the unbodied air!\r\r\rCHAPTER 34. The Cabin-Table.\r\rIt is noon; and Dough-Boy, the steward, thrusting his pale\rloaf-of-bread face from the cabin-scuttle, announces dinner to his lord\rand master; who, sitting in the lee quarter-boat, has just been taking\ran observation of the sun; and is now mutely reckoning the latitude on\rthe smooth, medallion-shaped tablet, reserved for that daily purpose on\rthe upper part of his ivory leg. From his complete inattention to the\rtidings, you would think that moody Ahab had not heard his menial. But\rpresently, catching hold of the mizen shrouds, he swings himself to the\rdeck, and in an even, unexhilarated voice, saying, “Dinner, Mr.\rStarbuck,” disappears into the cabin.\r\rWhen the last echo of his sultan’s step has died away, and Starbuck,\rthe first Emir, has every reason to suppose that he is seated, then\rStarbuck rouses from his quietude, takes a few turns along the planks,\rand, after a grave peep into the binnacle, says, with some touch of\rpleasantness, “Dinner, Mr. Stubb,” and descends the scuttle. The second\rEmir lounges about the rigging awhile, and then slightly shaking the\rmain brace, to see whether it will be all right with that important\rrope, he likewise takes up the old burden, and with a rapid “Dinner,\rMr. Flask,” follows after his predecessors.\r\rBut the third Emir, now seeing himself all alone on the quarter-deck,\rseems to feel relieved from some curious restraint; for, tipping all\rsorts of knowing winks in all sorts of directions, and kicking off his\rshoes, he strikes into a sharp but noiseless squall of a hornpipe right\rover the Grand Turk’s head; and then, by a dexterous sleight, pitching\rhis cap up into the mizentop for a shelf, he goes down rollicking so\rfar at least as he remains visible from the deck, reversing all other\rprocessions, by bringing up the rear with music. But ere stepping into\rthe cabin doorway below, he pauses, ships a new face altogether, and,\rthen, independent, hilarious little Flask enters King Ahab’s presence,\rin the character of Abjectus, or the Slave.\r\rIt is not the least among the strange things bred by the intense\rartificialness of sea-usages, that while in the open air of the deck\rsome officers will, upon provocation, bear themselves boldly and\rdefyingly enough towards their commander; yet, ten to one, let those\rvery officers the next moment go down to their customary dinner in that\rsame commander’s cabin, and straightway their inoffensive, not to say\rdeprecatory and humble air towards him, as he sits at the head of the\rtable; this is marvellous, sometimes most comical. Wherefore this\rdifference? A problem? Perhaps not. To have been Belshazzar, King of\rBabylon; and to have been Belshazzar, not haughtily but courteously,\rtherein certainly must have been some touch of mundane grandeur. But he\rwho in the rightly regal and intelligent spirit presides over his own\rprivate dinner-table of invited guests, that man’s unchallenged power\rand dominion of individual influence for the time; that man’s royalty\rof state transcends Belshazzar’s, for Belshazzar was not the greatest.\rWho has but once dined his friends, has tasted what it is to be Cæsar.\rIt is a witchery of social czarship which there is no withstanding.\rNow, if to this consideration you superadd the official supremacy of a\rship-master, then, by inference, you will derive the cause of that\rpeculiarity of sea-life just mentioned.\r\rOver his ivory-inlaid table, Ahab presided like a mute, maned sea-lion\ron the white coral beach, surrounded by his warlike but still\rdeferential cubs. In his own proper turn, each officer waited to be\rserved. They were as little children before Ahab; and yet, in Ahab,\rthere seemed not to lurk the smallest social arrogance. With one mind,\rtheir intent eyes all fastened upon the old man’s knife, as he carved\rthe chief dish before him. I do not suppose that for the world they\rwould have profaned that moment with the slightest observation, even\rupon so neutral a topic as the weather. No! And when reaching out his\rknife and fork, between which the slice of beef was locked, Ahab\rthereby motioned Starbuck’s plate towards him, the mate received his\rmeat as though receiving alms; and cut it tenderly; and a little\rstarted if, perchance, the knife grazed against the plate; and chewed\rit noiselessly; and swallowed it, not without circumspection. For, like\rthe Coronation banquet at Frankfort, where the German Emperor\rprofoundly dines with the seven Imperial Electors, so these cabin meals\rwere somehow solemn meals, eaten in awful silence; and yet at table old\rAhab forbade not conversation; only he himself was dumb. What a relief\rit was to choking Stubb, when a rat made a sudden racket in the hold\rbelow. And poor little Flask, he was the youngest son, and little boy\rof this weary family party. His were the shinbones of the saline beef;\rhis would have been the drumsticks. For Flask to have presumed to help\rhimself, this must have seemed to him tantamount to larceny in the\rfirst degree. Had he helped himself at that table, doubtless, never\rmore would he have been able to hold his head up in this honest world;\rnevertheless, strange to say, Ahab never forbade him. And had Flask\rhelped himself, the chances were Ahab had never so much as noticed it.\rLeast of all, did Flask presume to help himself to butter. Whether he\rthought the owners of the ship denied it to him, on account of its\rclotting his clear, sunny complexion; or whether he deemed that, on so\rlong a voyage in such marketless waters, butter was at a premium, and\rtherefore was not for him, a subaltern; however it was, Flask, alas!\rwas a butterless man!\r\rAnother thing. Flask was the last person down at the dinner, and Flask\ris the first man up. Consider! For hereby Flask’s dinner was badly\rjammed in point of time. Starbuck and Stubb both had the start of him;\rand yet they also have the privilege of lounging in the rear. If Stubb\reven, who is but a peg higher than Flask, happens to have but a small\rappetite, and soon shows symptoms of concluding his repast, then Flask\rmust bestir himself, he will not get more than three mouthfuls that\rday; for it is against holy usage for Stubb to precede Flask to the\rdeck. Therefore it was that Flask once admitted in private, that ever\rsince he had arisen to the dignity of an officer, from that moment he\rhad never known what it was to be otherwise than hungry, more or less.\rFor what he ate did not so much relieve his hunger, as keep it immortal\rin him. Peace and satisfaction, thought Flask, have for ever departed\rfrom my stomach. I am an officer; but, how I wish I could fish a bit of\rold-fashioned beef in the forecastle, as I used to when I was before\rthe mast. There’s the fruits of promotion now; there’s the vanity of\rglory: there’s the insanity of life! Besides, if it were so that any\rmere sailor of the Pequod had a grudge against Flask in Flask’s\rofficial capacity, all that sailor had to do, in order to obtain ample\rvengeance, was to go aft at dinner-time, and get a peep at Flask\rthrough the cabin sky-light, sitting silly and dumfoundered before\rawful Ahab.\r\rNow, Ahab and his three mates formed what may be called the first table\rin the Pequod’s cabin. After their departure, taking place in inverted\rorder to their arrival, the canvas cloth was cleared, or rather was\rrestored to some hurried order by the pallid steward. And then the\rthree harpooneers were bidden to the feast, they being its residuary\rlegatees. They made a sort of temporary servants’ hall of the high and\rmighty cabin.\r\rIn strange contrast to the hardly tolerable constraint and nameless\rinvisible domineerings of the captain’s table, was the entire care-free\rlicense and ease, the almost frantic democracy of those inferior\rfellows the harpooneers. While their masters, the mates, seemed afraid\rof the sound of the hinges of their own jaws, the harpooneers chewed\rtheir food with such a relish that there was a report to it. They dined\rlike lords; they filled their bellies like Indian ships all day loading\rwith spices. Such portentous appetites had Queequeg and Tashtego, that\rto fill out the vacancies made by the previous repast, often the pale\rDough-Boy was fain to bring on a great baron of salt-junk, seemingly\rquarried out of the solid ox. And if he were not lively about it, if he\rdid not go with a nimble hop-skip-and-jump, then Tashtego had an\rungentlemanly way of accelerating him by darting a fork at his back,\rharpoon-wise. And once Daggoo, seized with a sudden humor, assisted\rDough-Boy’s memory by snatching him up bodily, and thrusting his head\rinto a great empty wooden trencher, while Tashtego, knife in hand,\rbegan laying out the circle preliminary to scalping him. He was\rnaturally a very nervous, shuddering sort of little fellow, this\rbread-faced steward; the progeny of a bankrupt baker and a hospital\rnurse. And what with the standing spectacle of the black terrific Ahab,\rand the periodical tumultuous visitations of these three savages,\rDough-Boy’s whole life was one continual lip-quiver. Commonly, after\rseeing the harpooneers furnished with all things they demanded, he\rwould escape from their clutches into his little pantry adjoining, and\rfearfully peep out at them through the blinds of its door, till all was\rover.\r\rIt was a sight to see Queequeg seated over against Tashtego, opposing\rhis filed teeth to the Indian’s: crosswise to them, Daggoo seated on\rthe floor, for a bench would have brought his hearse-plumed head to the\rlow carlines; at every motion of his colossal limbs, making the low\rcabin framework to shake, as when an African elephant goes passenger in\ra ship. But for all this, the great negro was wonderfully abstemious,\rnot to say dainty. It seemed hardly possible that by such comparatively\rsmall mouthfuls he could keep up the vitality diffused through so\rbroad, baronial, and superb a person. But, doubtless, this noble savage\rfed strong and drank deep of the abounding element of air; and through\rhis dilated nostrils snuffed in the sublime life of the worlds. Not by\rbeef or by bread, are giants made or nourished. But Queequeg, he had a\rmortal, barbaric smack of the lip in eating—an ugly sound enough—so\rmuch so, that the trembling Dough-Boy almost looked to see whether any\rmarks of teeth lurked in his own lean arms. And when he would hear\rTashtego singing out for him to produce himself, that his bones might\rbe picked, the simple-witted steward all but shattered the crockery\rhanging round him in the pantry, by his sudden fits of the palsy. Nor\rdid the whetstone which the harpooneers carried in their pockets, for\rtheir lances and other weapons; and with which whetstones, at dinner,\rthey would ostentatiously sharpen their knives; that grating sound did\rnot at all tend to tranquillize poor Dough-Boy. How could he forget\rthat in his Island days, Queequeg, for one, must certainly have been\rguilty of some murderous, convivial indiscretions. Alas! Dough-Boy!\rhard fares the white waiter who waits upon cannibals. Not a napkin\rshould he carry on his arm, but a buckler. In good time, though, to his\rgreat delight, the three salt-sea warriors would rise and depart; to\rhis credulous, fable-mongering ears, all their martial bones jingling\rin them at every step, like Moorish scimetars in scabbards.\r\rBut, though these barbarians dined in the cabin, and nominally lived\rthere; still, being anything but sedentary in their habits, they were\rscarcely ever in it except at mealtimes, and just before sleeping-time,\rwhen they passed through it to their own peculiar quarters.\r\rIn this one matter, Ahab seemed no exception to most American whale\rcaptains, who, as a set, rather incline to the opinion that by rights\rthe ship’s cabin belongs to them; and that it is by courtesy alone that\ranybody else is, at any time, permitted there. So that, in real truth,\rthe mates and harpooneers of the Pequod might more properly be said to\rhave lived out of the cabin than in it. For when they did enter it, it\rwas something as a street-door enters a house; turning inwards for a\rmoment, only to be turned out the next; and, as a permanent thing,\rresiding in the open air. Nor did they lose much hereby; in the cabin\rwas no companionship; socially, Ahab was inaccessible. Though nominally\rincluded in the census of Christendom, he was still an alien to it. He\rlived in the world, as the last of the Grisly Bears lived in settled\rMissouri. And as when Spring and Summer had departed, that wild Logan\rof the woods, burying himself in the hollow of a tree, lived out the\rwinter there, sucking his own paws; so, in his inclement, howling old\rage, Ahab’s soul, shut up in the caved trunk of his body, there fed\rupon the sullen paws of its gloom!\r\r\rCHAPTER 35. The Mast-Head.\r\rIt was during the more pleasant weather, that in due rotation with the\rother seamen my first mast-head came round.\r\rIn most American whalemen the mast-heads are manned almost\rsimultaneously with the vessel’s leaving her port; even though she may\rhave fifteen thousand miles, and more, to sail ere reaching her proper\rcruising ground. And if, after a three, four, or five years’ voyage she\ris drawing nigh home with anything empty in her—say, an empty vial\reven—then, her mast-heads are kept manned to the last; and not till her\rskysail-poles sail in among the spires of the port, does she altogether\rrelinquish the hope of capturing one whale more.\r\rNow, as the business of standing mast-heads, ashore or afloat, is a\rvery ancient and interesting one, let us in some measure expatiate\rhere. I take it, that the earliest standers of mast-heads were the old\rEgyptians; because, in all my researches, I find none prior to them.\rFor though their progenitors, the builders of Babel, must doubtless, by\rtheir tower, have intended to rear the loftiest mast-head in all Asia,\ror Africa either; yet (ere the final truck was put to it) as that great\rstone mast of theirs may be said to have gone by the board, in the\rdread gale of God’s wrath; therefore, we cannot give these Babel\rbuilders priority over the Egyptians. And that the Egyptians were a\rnation of mast-head standers, is an assertion based upon the general\rbelief among archæologists, that the first pyramids were founded for\rastronomical purposes: a theory singularly supported by the peculiar\rstair-like formation of all four sides of those edifices; whereby, with\rprodigious long upliftings of their legs, those old astronomers were\rwont to mount to the apex, and sing out for new stars; even as the\rlook-outs of a modern ship sing out for a sail, or a whale just bearing\rin sight. In Saint Stylites, the famous Christian hermit of old times,\rwho built him a lofty stone pillar in the desert and spent the whole\rlatter portion of his life on its summit, hoisting his food from the\rground with a tackle; in him we have a remarkable instance of a\rdauntless stander-of-mast-heads; who was not to be driven from his\rplace by fogs or frosts, rain, hail, or sleet; but valiantly facing\reverything out to the last, literally died at his post. Of modern\rstanders-of-mast-heads we have but a lifeless set; mere stone, iron,\rand bronze men; who, though well capable of facing out a stiff gale,\rare still entirely incompetent to the business of singing out upon\rdiscovering any strange sight. There is Napoleon; who, upon the top of\rthe column of Vendome, stands with arms folded, some one hundred and\rfifty feet in the air; careless, now, who rules the decks below;\rwhether Louis Philippe, Louis Blanc, or Louis the Devil. Great\rWashington, too, stands high aloft on his towering main-mast in\rBaltimore, and like one of Hercules’ pillars, his column marks that\rpoint of human grandeur beyond which few mortals will go. Admiral\rNelson, also, on a capstan of gun-metal, stands his mast-head in\rTrafalgar Square; and ever when most obscured by that London smoke,\rtoken is yet given that a hidden hero is there; for where there is\rsmoke, must be fire. But neither great Washington, nor Napoleon, nor\rNelson, will answer a single hail from below, however madly invoked to\rbefriend by their counsels the distracted decks upon which they gaze;\rhowever it may be surmised, that their spirits penetrate through the\rthick haze of the future, and descry what shoals and what rocks must be\rshunned.\r\rIt may seem unwarrantable to couple in any respect the mast-head\rstanders of the land with those of the sea; but that in truth it is not\rso, is plainly evinced by an item for which Obed Macy, the sole\rhistorian of Nantucket, stands accountable. The worthy Obed tells us,\rthat in the early times of the whale fishery, ere ships were regularly\rlaunched in pursuit of the game, the people of that island erected\rlofty spars along the sea-coast, to which the look-outs ascended by\rmeans of nailed cleats, something as fowls go upstairs in a hen-house.\rA few years ago this same plan was adopted by the Bay whalemen of New\rZealand, who, upon descrying the game, gave notice to the ready-manned\rboats nigh the beach. But this custom has now become obsolete; turn we\rthen to the one proper mast-head, that of a whale-ship at sea. The\rthree mast-heads are kept manned from sun-rise to sun-set; the seamen\rtaking their regular turns (as at the helm), and relieving each other\revery two hours. In the serene weather of the tropics it is exceedingly\rpleasant the mast-head; nay, to a dreamy meditative man it is\rdelightful. There you stand, a hundred feet above the silent decks,\rstriding along the deep, as if the masts were gigantic stilts, while\rbeneath you and between your legs, as it were, swim the hugest monsters\rof the sea, even as ships once sailed between the boots of the famous\rColossus at old Rhodes. There you stand, lost in the infinite series of\rthe sea, with nothing ruffled but the waves. The tranced ship\rindolently rolls; the drowsy trade winds blow; everything resolves you\rinto languor. For the most part, in this tropic whaling life, a sublime\runeventfulness invests you; you hear no news; read no gazettes; extras\rwith startling accounts of commonplaces never delude you into\runnecessary excitements; you hear of no domestic afflictions; bankrupt\rsecurities; fall of stocks; are never troubled with the thought of what\ryou shall have for dinner—for all your meals for three years and more\rare snugly stowed in casks, and your bill of fare is immutable.\r\rIn one of those southern whalesmen, on a long three or four years’\rvoyage, as often happens, the sum of the various hours you spend at the\rmast-head would amount to several entire months. And it is much to be\rdeplored that the place to which you devote so considerable a portion\rof the whole term of your natural life, should be so sadly destitute of\ranything approaching to a cosy inhabitiveness, or adapted to breed a\rcomfortable localness of feeling, such as pertains to a bed, a hammock,\ra hearse, a sentry box, a pulpit, a coach, or any other of those small\rand snug contrivances in which men temporarily isolate themselves. Your\rmost usual point of perch is the head of the t’ gallant-mast, where you\rstand upon two thin parallel sticks (almost peculiar to whalemen)\rcalled the t’ gallant cross-trees. Here, tossed about by the sea, the\rbeginner feels about as cosy as he would standing on a bull’s horns. To\rbe sure, in cold weather you may carry your house aloft with you, in\rthe shape of a watch-coat; but properly speaking the thickest\rwatch-coat is no more of a house than the unclad body; for as the soul\ris glued inside of its fleshy tabernacle, and cannot freely move about\rin it, nor even move out of it, without running great risk of perishing\r(like an ignorant pilgrim crossing the snowy Alps in winter); so a\rwatch-coat is not so much of a house as it is a mere envelope, or\radditional skin encasing you. You cannot put a shelf or chest of\rdrawers in your body, and no more can you make a convenient closet of\ryour watch-coat.\r\rConcerning all this, it is much to be deplored that the mast-heads of a\rsouthern whale ship are unprovided with those enviable little tents or\rpulpits, called _crow’s-nests_, in which the look-outs of a Greenland\rwhaler are protected from the inclement weather of the frozen seas. In\rthe fireside narrative of Captain Sleet, entitled “A Voyage among the\rIcebergs, in quest of the Greenland Whale, and incidentally for the\rre-discovery of the Lost Icelandic Colonies of Old Greenland;” in this\radmirable volume, all standers of mast-heads are furnished with a\rcharmingly circumstantial account of the then recently invented\r_crow’s-nest_ of the Glacier, which was the name of Captain Sleet’s\rgood craft. He called it the _Sleet’s crow’s-nest_, in honor of\rhimself; he being the original inventor and patentee, and free from all\rridiculous false delicacy, and holding that if we call our own children\rafter our own names (we fathers being the original inventors and\rpatentees), so likewise should we denominate after ourselves any other\rapparatus we may beget. In shape, the Sleet’s crow’s-nest is something\rlike a large tierce or pipe; it is open above, however, where it is\rfurnished with a movable side-screen to keep to windward of your head\rin a hard gale. Being fixed on the summit of the mast, you ascend into\rit through a little trap-hatch in the bottom. On the after side, or\rside next the stern of the ship, is a comfortable seat, with a locker\runderneath for umbrellas, comforters, and coats. In front is a leather\rrack, in which to keep your speaking trumpet, pipe, telescope, and\rother nautical conveniences. When Captain Sleet in person stood his\rmast-head in this crow’s-nest of his, he tells us that he always had a\rrifle with him (also fixed in the rack), together with a powder flask\rand shot, for the purpose of popping off the stray narwhales, or\rvagrant sea unicorns infesting those waters; for you cannot\rsuccessfully shoot at them from the deck owing to the resistance of the\rwater, but to shoot down upon them is a very different thing. Now, it\rwas plainly a labor of love for Captain Sleet to describe, as he does,\rall the little detailed conveniences of his crow’s-nest; but though he\rso enlarges upon many of these, and though he treats us to a very\rscientific account of his experiments in this crow’s-nest, with a small\rcompass he kept there for the purpose of counteracting the errors\rresulting from what is called the “local attraction” of all binnacle\rmagnets; an error ascribable to the horizontal vicinity of the iron in\rthe ship’s planks, and in the Glacier’s case, perhaps, to there having\rbeen so many broken-down blacksmiths among her crew; I say, that though\rthe Captain is very discreet and scientific here, yet, for all his\rlearned “binnacle deviations,” “azimuth compass observations,” and\r“approximate errors,” he knows very well, Captain Sleet, that he was\rnot so much immersed in those profound magnetic meditations, as to fail\rbeing attracted occasionally towards that well replenished little\rcase-bottle, so nicely tucked in on one side of his crow’s nest, within\reasy reach of his hand. Though, upon the whole, I greatly admire and\reven love the brave, the honest, and learned Captain; yet I take it\rvery ill of him that he should so utterly ignore that case-bottle,\rseeing what a faithful friend and comforter it must have been, while\rwith mittened fingers and hooded head he was studying the mathematics\raloft there in that bird’s nest within three or four perches of the\rpole.\r\rBut if we Southern whale-fishers are not so snugly housed aloft as\rCaptain Sleet and his Greenlandmen were; yet that disadvantage is\rgreatly counter-balanced by the widely contrasting serenity of those\rseductive seas in which we South fishers mostly float. For one, I used\rto lounge up the rigging very leisurely, resting in the top to have a\rchat with Queequeg, or any one else off duty whom I might find there;\rthen ascending a little way further, and throwing a lazy leg over the\rtop-sail yard, take a preliminary view of the watery pastures, and so\rat last mount to my ultimate destination.\r\rLet me make a clean breast of it here, and frankly admit that I kept\rbut sorry guard. With the problem of the universe revolving in me, how\rcould I—being left completely to myself at such a thought-engendering\raltitude—how could I but lightly hold my obligations to observe all\rwhale-ships’ standing orders, “Keep your weather eye open, and sing out\revery time.”\r\rAnd let me in this place movingly admonish you, ye ship-owners of\rNantucket! Beware of enlisting in your vigilant fisheries any lad with\rlean brow and hollow eye; given to unseasonable meditativeness; and who\roffers to ship with the Phædon instead of Bowditch in his head. Beware\rof such an one, I say; your whales must be seen before they can be\rkilled; and this sunken-eyed young Platonist will tow you ten wakes\rround the world, and never make you one pint of sperm the richer. Nor\rare these monitions at all unneeded. For nowadays, the whale-fishery\rfurnishes an asylum for many romantic, melancholy, and absent-minded\ryoung men, disgusted with the carking cares of earth, and seeking\rsentiment in tar and blubber. Childe Harold not unfrequently perches\rhimself upon the mast-head of some luckless disappointed whale-ship,\rand in moody phrase ejaculates:—\r\r\r“Roll on, thou deep and dark blue ocean, roll! Ten thousand\rblubber-hunters sweep over thee in vain.”\r\r\r\rVery often do the captains of such ships take those absent-minded young\rphilosophers to task, upbraiding them with not feeling sufficient\r“interest” in the voyage; half-hinting that they are so hopelessly lost\rto all honorable ambition, as that in their secret souls they would\rrather not see whales than otherwise. But all in vain; those young\rPlatonists have a notion that their vision is imperfect; they are\rshort-sighted; what use, then, to strain the visual nerve? They have\rleft their opera-glasses at home.\r\r“Why, thou monkey,” said a harpooneer to one of these lads, “we’ve been\rcruising now hard upon three years, and thou hast not raised a whale\ryet. Whales are scarce as hen’s teeth whenever thou art up here.”\rPerhaps they were; or perhaps there might have been shoals of them in\rthe far horizon; but lulled into such an opium-like listlessness of\rvacant, unconscious reverie is this absent-minded youth by the blending\rcadence of waves with thoughts, that at last he loses his identity;\rtakes the mystic ocean at his feet for the visible image of that deep,\rblue, bottomless soul, pervading mankind and nature; and every strange,\rhalf-seen, gliding, beautiful thing that eludes him; every\rdimly-discovered, uprising fin of some undiscernible form, seems to him\rthe embodiment of those elusive thoughts that only people the soul by\rcontinually flitting through it. In this enchanted mood, thy spirit\rebbs away to whence it came; becomes diffused through time and space;\rlike Cranmer’s sprinkled Pantheistic ashes, forming at last a part of\revery shore the round globe over.\r\rThere is no life in thee, now, except that rocking life imparted by a\rgently rolling ship; by her, borrowed from the sea; by the sea, from\rthe inscrutable tides of God. But while this sleep, this dream is on\rye, move your foot or hand an inch; slip your hold at all; and your\ridentity comes back in horror. Over Descartian vortices you hover. And\rperhaps, at mid-day, in the fairest weather, with one half-throttled\rshriek you drop through that transparent air into the summer sea, no\rmore to rise for ever. Heed it well, ye Pantheists!\r\r\rCHAPTER 36. The Quarter-Deck.\r\r(_Enter Ahab: Then, all._)\r\rIt was not a great while after the affair of the pipe, that one morning\rshortly after breakfast, Ahab, as was his wont, ascended the\rcabin-gangway to the deck. There most sea-captains usually walk at that\rhour, as country gentlemen, after the same meal, take a few turns in\rthe garden.\r\rSoon his steady, ivory stride was heard, as to and fro he paced his old\rrounds, upon planks so familiar to his tread, that they were all over\rdented, like geological stones, with the peculiar mark of his walk. Did\ryou fixedly gaze, too, upon that ribbed and dented brow; there also,\ryou would see still stranger foot-prints—the foot-prints of his one\runsleeping, ever-pacing thought.\r\rBut on the occasion in question, those dents looked deeper, even as his\rnervous step that morning left a deeper mark. And, so full of his\rthought was Ahab, that at every uniform turn that he made, now at the\rmain-mast and now at the binnacle, you could almost see that thought\rturn in him as he turned, and pace in him as he paced; so completely\rpossessing him, indeed, that it all but seemed the inward mould of\revery outer movement.\r\r“D’ye mark him, Flask?” whispered Stubb; “the chick that’s in him pecks\rthe shell. ’Twill soon be out.”\r\rThe hours wore on;—Ahab now shut up within his cabin; anon, pacing the\rdeck, with the same intense bigotry of purpose in his aspect.\r\rIt drew near the close of day. Suddenly he came to a halt by the\rbulwarks, and inserting his bone leg into the auger-hole there, and\rwith one hand grasping a shroud, he ordered Starbuck to send everybody\raft.\r\r“Sir!” said the mate, astonished at an order seldom or never given on\rship-board except in some extraordinary case.\r\r“Send everybody aft,” repeated Ahab. “Mast-heads, there! come down!”\r\rWhen the entire ship’s company were assembled, and with curious and not\rwholly unapprehensive faces, were eyeing him, for he looked not unlike\rthe weather horizon when a storm is coming up, Ahab, after rapidly\rglancing over the bulwarks, and then darting his eyes among the crew,\rstarted from his standpoint; and as though not a soul were nigh him\rresumed his heavy turns upon the deck. With bent head and half-slouched\rhat he continued to pace, unmindful of the wondering whispering among\rthe men; till Stubb cautiously whispered to Flask, that Ahab must have\rsummoned them there for the purpose of witnessing a pedestrian feat.\rBut this did not last long. Vehemently pausing, he cried:—\r\r“What do ye do when ye see a whale, men?”\r\r“Sing out for him!” was the impulsive rejoinder from a score of clubbed\rvoices.\r\r“Good!” cried Ahab, with a wild approval in his tones; observing the\rhearty animation into which his unexpected question had so magnetically\rthrown them.\r\r“And what do ye next, men?”\r\r“Lower away, and after him!”\r\r“And what tune is it ye pull to, men?”\r\r“A dead whale or a stove boat!”\r\rMore and more strangely and fiercely glad and approving, grew the\rcountenance of the old man at every shout; while the mariners began to\rgaze curiously at each other, as if marvelling how it was that they\rthemselves became so excited at such seemingly purposeless questions.\r\rBut, they were all eagerness again, as Ahab, now half-revolving in his\rpivot-hole, with one hand reaching high up a shroud, and tightly,\ralmost convulsively grasping it, addressed them thus:—\r\r“All ye mast-headers have before now heard me give orders about a white\rwhale. Look ye! d’ye see this Spanish ounce of gold?”—holding up a\rbroad bright coin to the sun—“it is a sixteen dollar piece, men. D’ye\rsee it? Mr. Starbuck, hand me yon top-maul.”\r\rWhile the mate was getting the hammer, Ahab, without speaking, was\rslowly rubbing the gold piece against the skirts of his jacket, as if\rto heighten its lustre, and without using any words was meanwhile lowly\rhumming to himself, producing a sound so strangely muffled and\rinarticulate that it seemed the mechanical humming of the wheels of his\rvitality in him.\r\rReceiving the top-maul from Starbuck, he advanced towards the main-mast\rwith the hammer uplifted in one hand, exhibiting the gold with the\rother, and with a high raised voice exclaiming: “Whosoever of ye raises\rme a white-headed whale with a wrinkled brow and a crooked jaw;\rwhosoever of ye raises me that white-headed whale, with three holes\rpunctured in his starboard fluke—look ye, whosoever of ye raises me\rthat same white whale, he shall have this gold ounce, my boys!”\r\r“Huzza! huzza!” cried the seamen, as with swinging tarpaulins they\rhailed the act of nailing the gold to the mast.\r\r“It’s a white whale, I say,” resumed Ahab, as he threw down the\rtopmaul: “a white whale. Skin your eyes for him, men; look sharp for\rwhite water; if ye see but a bubble, sing out.”\r\rAll this while Tashtego, Daggoo, and Queequeg had looked on with even\rmore intense interest and surprise than the rest, and at the mention of\rthe wrinkled brow and crooked jaw they had started as if each was\rseparately touched by some specific recollection.\r\r“Captain Ahab,” said Tashtego, “that white whale must be the same that\rsome call Moby Dick.”\r\r“Moby Dick?” shouted Ahab. “Do ye know the white whale then, Tash?”\r\r“Does he fan-tail a little curious, sir, before he goes down?” said the\rGay-Header deliberately.\r\r“And has he a curious spout, too,” said Daggoo, “very bushy, even for a\rparmacetty, and mighty quick, Captain Ahab?”\r\r“And he have one, two, three—oh! good many iron in him hide, too,\rCaptain,” cried Queequeg disjointedly, “all twiske-tee be-twisk, like\rhim—him—” faltering hard for a word, and screwing his hand round and\rround as though uncorking a bottle—“like him—him—”\r\r“Corkscrew!” cried Ahab, “aye, Queequeg, the harpoons lie all twisted\rand wrenched in him; aye, Daggoo, his spout is a big one, like a whole\rshock of wheat, and white as a pile of our Nantucket wool after the\rgreat annual sheep-shearing; aye, Tashtego, and he fan-tails like a\rsplit jib in a squall. Death and devils! men, it is Moby Dick ye have\rseen—Moby Dick—Moby Dick!”\r\r“Captain Ahab,” said Starbuck, who, with Stubb and Flask, had thus far\rbeen eyeing his superior with increasing surprise, but at last seemed\rstruck with a thought which somewhat explained all the wonder. “Captain\rAhab, I have heard of Moby Dick—but it was not Moby Dick that took off\rthy leg?”\r\r“Who told thee that?” cried Ahab; then pausing, “Aye, Starbuck; aye, my\rhearties all round; it was Moby Dick that dismasted me; Moby Dick that\rbrought me to this dead stump I stand on now. Aye, aye,” he shouted\rwith a terrific, loud, animal sob, like that of a heart-stricken moose;\r“Aye, aye! it was that accursed white whale that razeed me; made a poor\rpegging lubber of me for ever and a day!” Then tossing both arms, with\rmeasureless imprecations he shouted out: “Aye, aye! and I’ll chase him\rround Good Hope, and round the Horn, and round the Norway Maelstrom,\rand round perdition’s flames before I give him up. And this is what ye\rhave shipped for, men! to chase that white whale on both sides of land,\rand over all sides of earth, till he spouts black blood and rolls fin\rout. What say ye, men, will ye splice hands on it, now? I think ye do\rlook brave.”\r\r“Aye, aye!” shouted the harpooneers and seamen, running closer to the\rexcited old man: “A sharp eye for the white whale; a sharp lance for\rMoby Dick!”\r\r“God bless ye,” he seemed to half sob and half shout. “God bless ye,\rmen. Steward! go draw the great measure of grog. But what’s this long\rface about, Mr. Starbuck; wilt thou not chase the white whale? art not\rgame for Moby Dick?”\r\r“I am game for his crooked jaw, and for the jaws of Death too, Captain\rAhab, if it fairly comes in the way of the business we follow; but I\rcame here to hunt whales, not my commander’s vengeance. How many\rbarrels will thy vengeance yield thee even if thou gettest it, Captain\rAhab? it will not fetch thee much in our Nantucket market.”\r\r“Nantucket market! Hoot! But come closer, Starbuck; thou requirest a\rlittle lower layer. If money’s to be the measurer, man, and the\raccountants have computed their great counting-house the globe, by\rgirdling it with guineas, one to every three parts of an inch; then,\rlet me tell thee, that my vengeance will fetch a great premium _here!_”\r\r“He smites his chest,” whispered Stubb, “what’s that for? methinks it\rrings most vast, but hollow.”\r\r“Vengeance on a dumb brute!” cried Starbuck, “that simply smote thee\rfrom blindest instinct! Madness! To be enraged with a dumb thing,\rCaptain Ahab, seems blasphemous.”\r\r“Hark ye yet again—the little lower layer. All visible objects, man,\rare but as pasteboard masks. But in each event—in the living act, the\rundoubted deed—there, some unknown but still reasoning thing puts forth\rthe mouldings of its features from behind the unreasoning mask. If man\rwill strike, strike through the mask! How can the prisoner reach\routside except by thrusting through the wall? To me, the white whale is\rthat wall, shoved near to me. Sometimes I think there’s naught beyond.\rBut ’tis enough. He tasks me; he heaps me; I see in him outrageous\rstrength, with an inscrutable malice sinewing it. That inscrutable\rthing is chiefly what I hate; and be the white whale agent, or be the\rwhite whale principal, I will wreak that hate upon him. Talk not to me\rof blasphemy, man; I’d strike the sun if it insulted me. For could the\rsun do that, then could I do the other; since there is ever a sort of\rfair play herein, jealousy presiding over all creations. But not my\rmaster, man, is even that fair play. Who’s over me? Truth hath no\rconfines. Take off thine eye! more intolerable than fiends’ glarings is\ra doltish stare! So, so; thou reddenest and palest; my heat has melted\rthee to anger-glow. But look ye, Starbuck, what is said in heat, that\rthing unsays itself. There are men from whom warm words are small\rindignity. I meant not to incense thee. Let it go. Look! see yonder\rTurkish cheeks of spotted tawn—living, breathing pictures painted by\rthe sun. The Pagan leopards—the unrecking and unworshipping things,\rthat live; and seek, and give no reasons for the torrid life they feel!\rThe crew, man, the crew! Are they not one and all with Ahab, in this\rmatter of the whale? See Stubb! he laughs! See yonder Chilian! he\rsnorts to think of it. Stand up amid the general hurricane, thy one\rtost sapling cannot, Starbuck! And what is it? Reckon it. ’Tis but to\rhelp strike a fin; no wondrous feat for Starbuck. What is it more? From\rthis one poor hunt, then, the best lance out of all Nantucket, surely\rhe will not hang back, when every foremast-hand has clutched a\rwhetstone? Ah! constrainings seize thee; I see! the billow lifts thee!\rSpeak, but speak!—Aye, aye! thy silence, then, _that_ voices thee.\r(_Aside_) Something shot from my dilated nostrils, he has inhaled it in\rhis lungs. Starbuck now is mine; cannot oppose me now, without\rrebellion.”\r\r“God keep me!—keep us all!” murmured Starbuck, lowly.\r\rBut in his joy at the enchanted, tacit acquiescence of the mate, Ahab\rdid not hear his foreboding invocation; nor yet the low laugh from the\rhold; nor yet the presaging vibrations of the winds in the cordage; nor\ryet the hollow flap of the sails against the masts, as for a moment\rtheir hearts sank in. For again Starbuck’s downcast eyes lighted up\rwith the stubbornness of life; the subterranean laugh died away; the\rwinds blew on; the sails filled out; the ship heaved and rolled as\rbefore. Ah, ye admonitions and warnings! why stay ye not when ye come?\rBut rather are ye predictions than warnings, ye shadows! Yet not so\rmuch predictions from without, as verifications of the foregoing things\rwithin. For with little external to constrain us, the innermost\rnecessities in our being, these still drive us on.\r\r“The measure! the measure!” cried Ahab.\r\rReceiving the brimming pewter, and turning to the harpooneers, he\rordered them to produce their weapons. Then ranging them before him\rnear the capstan, with their harpoons in their hands, while his three\rmates stood at his side with their lances, and the rest of the ship’s\rcompany formed a circle round the group; he stood for an instant\rsearchingly eyeing every man of his crew. But those wild eyes met his,\ras the bloodshot eyes of the prairie wolves meet the eye of their\rleader, ere he rushes on at their head in the trail of the bison; but,\ralas! only to fall into the hidden snare of the Indian.\r\r“Drink and pass!” he cried, handing the heavy charged flagon to the\rnearest seaman. “The crew alone now drink. Round with it, round! Short\rdraughts—long swallows, men; ’tis hot as Satan’s hoof. So, so; it goes\rround excellently. It spiralizes in ye; forks out at the\rserpent-snapping eye. Well done; almost drained. That way it went, this\rway it comes. Hand it me—here’s a hollow! Men, ye seem the years; so\rbrimming life is gulped and gone. Steward, refill!\r\r“Attend now, my braves. I have mustered ye all round this capstan; and\rye mates, flank me with your lances; and ye harpooneers, stand there\rwith your irons; and ye, stout mariners, ring me in, that I may in some\rsort revive a noble custom of my fisherman fathers before me. O men,\ryou will yet see that—Ha! boy, come back? bad pennies come not sooner.\rHand it me. Why, now, this pewter had run brimming again, wer’t not\rthou St. Vitus’ imp—away, thou ague!\r\r“Advance, ye mates! Cross your lances full before me. Well done! Let me\rtouch the axis.” So saying, with extended arm, he grasped the three\rlevel, radiating lances at their crossed centre; while so doing,\rsuddenly and nervously twitched them; meanwhile, glancing intently from\rStarbuck to Stubb; from Stubb to Flask. It seemed as though, by some\rnameless, interior volition, he would fain have shocked into them the\rsame fiery emotion accumulated within the Leyden jar of his own\rmagnetic life. The three mates quailed before his strong, sustained,\rand mystic aspect. Stubb and Flask looked sideways from him; the honest\reye of Starbuck fell downright.\r\r“In vain!” cried Ahab; “but, maybe, ’tis well. For did ye three but\ronce take the full-forced shock, then mine own electric thing, _that_\rhad perhaps expired from out me. Perchance, too, it would have dropped\rye dead. Perchance ye need it not. Down lances! And now, ye mates, I do\rappoint ye three cupbearers to my three pagan kinsmen there—yon three\rmost honorable gentlemen and noblemen, my valiant harpooneers. Disdain\rthe task? What, when the great Pope washes the feet of beggars, using\rhis tiara for ewer? Oh, my sweet cardinals! your own condescension,\r_that_ shall bend ye to it. I do not order ye; ye will it. Cut your\rseizings and draw the poles, ye harpooneers!”\r\rSilently obeying the order, the three harpooneers now stood with the\rdetached iron part of their harpoons, some three feet long, held, barbs\rup, before him.\r\r“Stab me not with that keen steel! Cant them; cant them over! know ye\rnot the goblet end? Turn up the socket! So, so; now, ye cup-bearers,\radvance. The irons! take them; hold them while I fill!” Forthwith,\rslowly going from one officer to the other, he brimmed the harpoon\rsockets with the fiery waters from the pewter.\r\r“Now, three to three, ye stand. Commend the murderous chalices! Bestow\rthem, ye who are now made parties to this indissoluble league. Ha!\rStarbuck! but the deed is done! Yon ratifying sun now waits to sit upon\rit. Drink, ye harpooneers! drink and swear, ye men that man the\rdeathful whaleboat’s bow—Death to Moby Dick! God hunt us all, if we do\rnot hunt Moby Dick to his death!” The long, barbed steel goblets were\rlifted; and to cries and maledictions against the white whale, the\rspirits were simultaneously quaffed down with a hiss. Starbuck paled,\rand turned, and shivered. Once more, and finally, the replenished\rpewter went the rounds among the frantic crew; when, waving his free\rhand to them, they all dispersed; and Ahab retired within his cabin.\r\r\rCHAPTER 37. Sunset.\r\r_The cabin; by the stern windows; Ahab sitting alone, and gazing out_.\r\rI leave a white and turbid wake; pale waters, paler cheeks, where’er I\rsail. The envious billows sidelong swell to whelm my track; let them;\rbut first I pass.\r\rYonder, by ever-brimming goblet’s rim, the warm waves blush like wine.\rThe gold brow plumbs the blue. The diver sun—slow dived from noon—goes\rdown; my soul mounts up! she wearies with her endless hill. Is, then,\rthe crown too heavy that I wear? this Iron Crown of Lombardy. Yet is it\rbright with many a gem; I the wearer, see not its far flashings; but\rdarkly feel that I wear that, that dazzlingly confounds. ’Tis iron—that\rI know—not gold. ’Tis split, too—that I feel; the jagged edge galls me\rso, my brain seems to beat against the solid metal; aye, steel skull,\rmine; the sort that needs no helmet in the most brain-battering fight!\r\rDry heat upon my brow? Oh! time was, when as the sunrise nobly spurred\rme, so the sunset soothed. No more. This lovely light, it lights not\rme; all loveliness is anguish to me, since I can ne’er enjoy. Gifted\rwith the high perception, I lack the low, enjoying power; damned, most\rsubtly and most malignantly! damned in the midst of Paradise! Good\rnight—good night! (_waving his hand, he moves from the window_.)\r\r’Twas not so hard a task. I thought to find one stubborn, at the least;\rbut my one cogged circle fits into all their various wheels, and they\rrevolve. Or, if you will, like so many ant-hills of powder, they all\rstand before me; and I their match. Oh, hard! that to fire others, the\rmatch itself must needs be wasting! What I’ve dared, I’ve willed; and\rwhat I’ve willed, I’ll do! They think me mad—Starbuck does; but I’m\rdemoniac, I am madness maddened! That wild madness that’s only calm to\rcomprehend itself! The prophecy was that I should be dismembered;\rand—Aye! I lost this leg. I now prophesy that I will dismember my\rdismemberer. Now, then, be the prophet and the fulfiller one. That’s\rmore than ye, ye great gods, ever were. I laugh and hoot at ye, ye\rcricket-players, ye pugilists, ye deaf Burkes and blinded Bendigoes! I\rwill not say as schoolboys do to bullies—Take some one of your own\rsize; don’t pommel _me!_ No, ye’ve knocked me down, and I am up again;\rbut _ye_ have run and hidden. Come forth from behind your cotton bags!\rI have no long gun to reach ye. Come, Ahab’s compliments to ye; come\rand see if ye can swerve me. Swerve me? ye cannot swerve me, else ye\rswerve yourselves! man has ye there. Swerve me? The path to my fixed\rpurpose is laid with iron rails, whereon my soul is grooved to run.\rOver unsounded gorges, through the rifled hearts of mountains, under\rtorrents’ beds, unerringly I rush! Naught’s an obstacle, naught’s an\rangle to the iron way!\r\r\rCHAPTER 38. Dusk.\r\r_By the Mainmast; Starbuck leaning against it_.\r\rMy soul is more than matched; she’s overmanned; and by a madman!\rInsufferable sting, that sanity should ground arms on such a field! But\rhe drilled deep down, and blasted all my reason out of me! I think I\rsee his impious end; but feel that I must help him to it. Will I, nill\rI, the ineffable thing has tied me to him; tows me with a cable I have\rno knife to cut. Horrible old man! Who’s over him, he cries;—aye, he\rwould be a democrat to all above; look, how he lords it over all below!\rOh! I plainly see my miserable office,—to obey, rebelling; and worse\ryet, to hate with touch of pity! For in his eyes I read some lurid woe\rwould shrivel me up, had I it. Yet is there hope. Time and tide flow\rwide. The hated whale has the round watery world to swim in, as the\rsmall gold-fish has its glassy globe. His heaven-insulting purpose, God\rmay wedge aside. I would up heart, were it not like lead. But my whole\rclock’s run down; my heart the all-controlling weight, I have no key to\rlift again.\r\r[_A burst of revelry from the forecastle_.]\r\rOh, God! to sail with such a heathen crew that have small touch of\rhuman mothers in them! Whelped somewhere by the sharkish sea. The white\rwhale is their demigorgon. Hark! the infernal orgies! that revelry is\rforward! mark the unfaltering silence aft! Methinks it pictures life.\rForemost through the sparkling sea shoots on the gay, embattled,\rbantering bow, but only to drag dark Ahab after it, where he broods\rwithin his sternward cabin, builded over the dead water of the wake,\rand further on, hunted by its wolfish gurglings. The long howl thrills\rme through! Peace! ye revellers, and set the watch! Oh, life! ’tis in\ran hour like this, with soul beat down and held to knowledge,—as wild,\runtutored things are forced to feed—Oh, life! ’tis now that I do feel\rthe latent horror in thee! but ’tis not me! that horror’s out of me!\rand with the soft feeling of the human in me, yet will I try to fight\rye, ye grim, phantom futures! Stand by me, hold me, bind me, O ye\rblessed influences!\r\r\rCHAPTER 39. First Night-Watch.\r\rFore-Top.\r\r(_Stubb solus, and mending a brace_.)\r\rHa! ha! ha! ha! hem! clear my throat!—I’ve been thinking over it ever\rsince, and that ha, ha’s the final consequence. Why so? Because a\rlaugh’s the wisest, easiest answer to all that’s queer; and come what\rwill, one comfort’s always left—that unfailing comfort is, it’s all\rpredestinated. I heard not all his talk with Starbuck; but to my poor\reye Starbuck then looked something as I the other evening felt. Be sure\rthe old Mogul has fixed him, too. I twigged it, knew it; had had the\rgift, might readily have prophesied it—for when I clapped my eye upon\rhis skull I saw it. Well, Stubb, _wise_ Stubb—that’s my title—well,\rStubb, what of it, Stubb? Here’s a carcase. I know not all that may be\rcoming, but be it what it will, I’ll go to it laughing. Such a waggish\rleering as lurks in all your horribles! I feel funny. Fa, la! lirra,\rskirra! What’s my juicy little pear at home doing now? Crying its eyes\rout?—Giving a party to the last arrived harpooneers, I dare say, gay as\ra frigate’s pennant, and so am I—fa, la! lirra, skirra! Oh—\r\r\rWe’ll drink to-night with hearts as light, To love, as gay and fleeting\rAs bubbles that swim, on the beaker’s brim, And break on the lips while\rmeeting.\r\r\r\rA brave stave that—who calls? Mr. Starbuck? Aye, aye, sir—(_Aside_)\rhe’s my superior, he has his too, if I’m not mistaken.—Aye, aye, sir,\rjust through with this job—coming.\r\r\rCHAPTER 40. Midnight, Forecastle.\r\rHARPOONEERS AND SAILORS.\r\r(_Foresail rises and discovers the watch standing, lounging, leaning,\rand lying in various attitudes, all singing in chorus_.)\r\r\r  Farewell and adieu to you, Spanish ladies! Farewell and adieu to you,\r  ladies of Spain! Our captain’s commanded.—\r\r\r\r1ST NANTUCKET SAILOR. Oh, boys, don’t be sentimental; it’s bad for the\rdigestion! Take a tonic, follow me!\r\r(_Sings, and all follow._)\r\r\r Our captain stood upon the deck, A spy-glass in his hand, A viewing of\r those gallant whales That blew at every strand. Oh, your tubs in your\r boats, my boys, And by your braces stand, And we’ll have one of those\r fine whales, Hand, boys, over hand! So, be cheery, my lads! may your\r hearts never fail! While the bold harpooner is striking the whale!\r\r\r\rMATE’S VOICE FROM THE QUARTER-DECK. Eight bells there, forward!\r\r2ND NANTUCKET SAILOR. Avast the chorus! Eight bells there! d’ye hear,\rbell-boy? Strike the bell eight, thou Pip! thou blackling! and let me\rcall the watch. I’ve the sort of mouth for that—the hogshead mouth. So,\rso, (_thrusts his head down the scuttle_,) Star-bo-l-e-e-n-s, a-h-o-y!\rEight bells there below! Tumble up!\r\rDUTCH SAILOR. Grand snoozing to-night, maty; fat night for that. I mark\rthis in our old Mogul’s wine; it’s quite as deadening to some as\rfilliping to others. We sing; they sleep—aye, lie down there, like\rground-tier butts. At ’em again! There, take this copper-pump, and hail\r’em through it. Tell ’em to avast dreaming of their lasses. Tell ’em\rit’s the resurrection; they must kiss their last, and come to judgment.\rThat’s the way—_that’s_ it; thy throat ain’t spoiled with eating\rAmsterdam butter.\r\rFRENCH SAILOR. Hist, boys! let’s have a jig or two before we ride to\ranchor in Blanket Bay. What say ye? There comes the other watch. Stand\rby all legs! Pip! little Pip! hurrah with your tambourine!\r\rPIP. (_Sulky and sleepy._) Don’t know where it is.\r\rFRENCH SAILOR. Beat thy belly, then, and wag thy ears. Jig it, men, I\rsay; merry’s the word; hurrah! Damn me, won’t you dance? Form, now,\rIndian-file, and gallop into the double-shuffle? Throw yourselves!\rLegs! legs!\r\rICELAND SAILOR. I don’t like your floor, maty; it’s too springy to my\rtaste. I’m used to ice-floors. I’m sorry to throw cold water on the\rsubject; but excuse me.\r\rMALTESE SAILOR. Me too; where’s your girls? Who but a fool would take\rhis left hand by his right, and say to himself, how d’ye do? Partners!\rI must have partners!\r\rSICILIAN SAILOR. Aye; girls and a green!—then I’ll hop with ye; yea,\rturn grasshopper!\r\rLONG-ISLAND SAILOR. Well, well, ye sulkies, there’s plenty more of us.\rHoe corn when you may, say I. All legs go to harvest soon. Ah! here\rcomes the music; now for it!\r\rAZORE SAILOR. (_Ascending, and pitching the tambourine up the\rscuttle_.) Here you are, Pip; and there’s the windlass-bitts; up you\rmount! Now, boys! (_The half of them dance to the tambourine; some go\rbelow; some sleep or lie among the coils of rigging. Oaths a-plenty_.)\r\rAZORE SAILOR. (_Dancing_) Go it, Pip! Bang it, bell-boy! Rig it, dig\rit, stig it, quig it, bell-boy! Make fire-flies; break the jinglers!\r\rPIP. Jinglers, you say?—there goes another, dropped off; I pound it so.\r\rCHINA SAILOR. Rattle thy teeth, then, and pound away; make a pagoda of\rthyself.\r\rFRENCH SAILOR. Merry-mad! Hold up thy hoop, Pip, till I jump through\rit! Split jibs! tear yourselves!\r\rTASHTEGO. (_Quietly smoking._) That’s a white man; he calls that fun:\rhumph! I save my sweat.\r\rOLD MANX SAILOR. I wonder whether those jolly lads bethink them of what\rthey are dancing over. I’ll dance over your grave, I will—that’s the\rbitterest threat of your night-women, that beat head-winds round\rcorners. O Christ! to think of the green navies and the green-skulled\rcrews! Well, well; belike the whole world’s a ball, as you scholars\rhave it; and so ’tis right to make one ballroom of it. Dance on, lads,\ryou’re young; I was once.\r\r3D NANTUCKET SAILOR. Spell oh!—whew! this is worse than pulling after\rwhales in a calm—give us a whiff, Tash.\r\r(_They cease dancing, and gather in clusters. Meantime the sky\rdarkens—the wind rises_.)\r\rLASCAR SAILOR. By Brahma! boys, it’ll be douse sail soon. The sky-born,\rhigh-tide Ganges turned to wind! Thou showest thy black brow, Seeva!\r\rMALTESE SAILOR. (_Reclining and shaking his cap_.) It’s the waves—the\rsnow’s caps turn to jig it now. They’ll shake their tassels soon. Now\rwould all the waves were women, then I’d go drown, and chassee with\rthem evermore! There’s naught so sweet on earth—heaven may not match\rit!—as those swift glances of warm, wild bosoms in the dance, when the\rover-arboring arms hide such ripe, bursting grapes.\r\rSICILIAN SAILOR. (_Reclining_.) Tell me not of it! Hark ye, lad—fleet\rinterlacings of the limbs—lithe swayings—coyings—flutterings! lip!\rheart! hip! all graze: unceasing touch and go! not taste, observe ye,\relse come satiety. Eh, Pagan? (_Nudging_.)\r\rTAHITAN SAILOR. (_Reclining on a mat_.) Hail, holy nakedness of our\rdancing girls!—the Heeva-Heeva! Ah! low veiled, high palmed Tahiti! I\rstill rest me on thy mat, but the soft soil has slid! I saw thee woven\rin the wood, my mat! green the first day I brought ye thence; now worn\rand wilted quite. Ah me!—not thou nor I can bear the change! How then,\rif so be transplanted to yon sky? Hear I the roaring streams from\rPirohitee’s peak of spears, when they leap down the crags and drown the\rvillages?—The blast! the blast! Up, spine, and meet it! (_Leaps to his\rfeet_.)\r\rPORTUGUESE SAILOR. How the sea rolls swashing ’gainst the side! Stand\rby for reefing, hearties! the winds are just crossing swords, pell-mell\rthey’ll go lunging presently.\r\rDANISH SAILOR. Crack, crack, old ship! so long as thou crackest, thou\rholdest! Well done! The mate there holds ye to it stiffly. He’s no more\rafraid than the isle fort at Cattegat, put there to fight the Baltic\rwith storm-lashed guns, on which the sea-salt cakes!\r\r4TH NANTUCKET SAILOR. He has his orders, mind ye that. I heard old Ahab\rtell him he must always kill a squall, something as they burst a\rwaterspout with a pistol—fire your ship right into it!\r\rENGLISH SAILOR. Blood! but that old man’s a grand old cove! We are the\rlads to hunt him up his whale!\r\rALL. Aye! aye!\r\rOLD MANX SAILOR. How the three pines shake! Pines are the hardest sort\rof tree to live when shifted to any other soil, and here there’s none\rbut the crew’s cursed clay. Steady, helmsman! steady. This is the sort\rof weather when brave hearts snap ashore, and keeled hulls split at\rsea. Our captain has his birthmark; look yonder, boys, there’s another\rin the sky—lurid-like, ye see, all else pitch black.\r\rDAGGOO. What of that? Who’s afraid of black’s afraid of me! I’m\rquarried out of it!\r\rSPANISH SAILOR. (_Aside_.) He wants to bully, ah!—the old grudge makes\rme touchy (_Advancing_.) Aye, harpooneer, thy race is the undeniable\rdark side of mankind—devilish dark at that. No offence.\r\rDAGGOO (_grimly_). None.\r\rST. JAGO’S SAILOR. That Spaniard’s mad or drunk. But that can’t be, or\relse in his one case our old Mogul’s fire-waters are somewhat long in\rworking.\r\r5TH NANTUCKET SAILOR. What’s that I saw—lightning? Yes.\r\rSPANISH SAILOR. No; Daggoo showing his teeth.\r\rDAGGOO (_springing_). Swallow thine, mannikin! White skin, white liver!\r\rSPANISH SAILOR (_meeting him_). Knife thee heartily! big frame, small\rspirit!\r\rALL. A row! a row! a row!\r\rTASHTEGO (_with a whiff_). A row a’low, and a row aloft—Gods and\rmen—both brawlers! Humph!\r\rBELFAST SAILOR. A row! arrah a row! The Virgin be blessed, a row!\rPlunge in with ye!\r\rENGLISH SAILOR. Fair play! Snatch the Spaniard’s knife! A ring, a ring!\r\rOLD MANX SAILOR. Ready formed. There! the ringed horizon. In that ring\rCain struck Abel. Sweet work, right work! No? Why then, God, mad’st\rthou the ring?\r\rMATE’S VOICE FROM THE QUARTER-DECK. Hands by the halyards! in\rtop-gallant sails! Stand by to reef topsails!\r\rALL. The squall! the squall! jump, my jollies! (_They scatter_.)\r\rPIP (_shrinking under the windlass_). Jollies? Lord help such jollies!\rCrish, crash! there goes the jib-stay! Blang-whang! God! Duck lower,\rPip, here comes the royal yard! It’s worse than being in the whirled\rwoods, the last day of the year! Who’d go climbing after chestnuts now?\rBut there they go, all cursing, and here I don’t. Fine prospects to\r’em; they’re on the road to heaven. Hold on hard! Jimmini, what a\rsquall! But those chaps there are worse yet—they are your white\rsqualls, they. White squalls? white whale, shirr! shirr! Here have I\rheard all their chat just now, and the white whale—shirr! shirr!—but\rspoken of once! and only this evening—it makes me jingle all over like\rmy tambourine—that anaconda of an old man swore ’em in to hunt him! Oh,\rthou big white God aloft there somewhere in yon darkness, have mercy on\rthis small black boy down here; preserve him from all men that have no\rbowels to feel fear!\r\r\rCHAPTER 41. Moby Dick.\r\rI, Ishmael, was one of that crew; my shouts had gone up with the rest;\rmy oath had been welded with theirs; and stronger I shouted, and more\rdid I hammer and clinch my oath, because of the dread in my soul. A\rwild, mystical, sympathetical feeling was in me; Ahab’s quenchless feud\rseemed mine. With greedy ears I learned the history of that murderous\rmonster against whom I and all the others had taken our oaths of\rviolence and revenge.\r\rFor some time past, though at intervals only, the unaccompanied,\rsecluded White Whale had haunted those uncivilized seas mostly\rfrequented by the Sperm Whale fishermen. But not all of them knew of\rhis existence; only a few of them, comparatively, had knowingly seen\rhim; while the number who as yet had actually and knowingly given\rbattle to him, was small indeed. For, owing to the large number of\rwhale-cruisers; the disorderly way they were sprinkled over the entire\rwatery circumference, many of them adventurously pushing their quest\ralong solitary latitudes, so as seldom or never for a whole twelvemonth\ror more on a stretch, to encounter a single news-telling sail of any\rsort; the inordinate length of each separate voyage; the irregularity\rof the times of sailing from home; all these, with other circumstances,\rdirect and indirect, long obstructed the spread through the whole\rworld-wide whaling-fleet of the special individualizing tidings\rconcerning Moby Dick. It was hardly to be doubted, that several vessels\rreported to have encountered, at such or such a time, or on such or\rsuch a meridian, a Sperm Whale of uncommon magnitude and malignity,\rwhich whale, after doing great mischief to his assailants, had\rcompletely escaped them; to some minds it was not an unfair\rpresumption, I say, that the whale in question must have been no other\rthan Moby Dick. Yet as of late the Sperm Whale fishery had been marked\rby various and not unfrequent instances of great ferocity, cunning, and\rmalice in the monster attacked; therefore it was, that those who by\raccident ignorantly gave battle to Moby Dick; such hunters, perhaps,\rfor the most part, were content to ascribe the peculiar terror he bred,\rmore, as it were, to the perils of the Sperm Whale fishery at large,\rthan to the individual cause. In that way, mostly, the disastrous\rencounter between Ahab and the whale had hitherto been popularly\rregarded.\r\rAnd as for those who, previously hearing of the White Whale, by chance\rcaught sight of him; in the beginning of the thing they had every one\rof them, almost, as boldly and fearlessly lowered for him, as for any\rother whale of that species. But at length, such calamities did ensue\rin these assaults—not restricted to sprained wrists and ankles, broken\rlimbs, or devouring amputations—but fatal to the last degree of\rfatality; those repeated disastrous repulses, all accumulating and\rpiling their terrors upon Moby Dick; those things had gone far to shake\rthe fortitude of many brave hunters, to whom the story of the White\rWhale had eventually come.\r\rNor did wild rumors of all sorts fail to exaggerate, and still the more\rhorrify the true histories of these deadly encounters. For not only do\rfabulous rumors naturally grow out of the very body of all surprising\rterrible events,—as the smitten tree gives birth to its fungi; but, in\rmaritime life, far more than in that of terra firma, wild rumors\rabound, wherever there is any adequate reality for them to cling to.\rAnd as the sea surpasses the land in this matter, so the whale fishery\rsurpasses every other sort of maritime life, in the wonderfulness and\rfearfulness of the rumors which sometimes circulate there. For not only\rare whalemen as a body unexempt from that ignorance and\rsuperstitiousness hereditary to all sailors; but of all sailors, they\rare by all odds the most directly brought into contact with whatever is\rappallingly astonishing in the sea; face to face they not only eye its\rgreatest marvels, but, hand to jaw, give battle to them. Alone, in such\rremotest waters, that though you sailed a thousand miles, and passed a\rthousand shores, you would not come to any chiseled hearth-stone, or\raught hospitable beneath that part of the sun; in such latitudes and\rlongitudes, pursuing too such a calling as he does, the whaleman is\rwrapped by influences all tending to make his fancy pregnant with many\ra mighty birth.\r\rNo wonder, then, that ever gathering volume from the mere transit over\rthe widest watery spaces, the outblown rumors of the White Whale did in\rthe end incorporate with themselves all manner of morbid hints, and\rhalf-formed fœtal suggestions of supernatural agencies, which\reventually invested Moby Dick with new terrors unborrowed from anything\rthat visibly appears. So that in many cases such a panic did he finally\rstrike, that few who by those rumors, at least, had heard of the White\rWhale, few of those hunters were willing to encounter the perils of his\rjaw.\r\rBut there were still other and more vital practical influences at work.\rNot even at the present day has the original prestige of the Sperm\rWhale, as fearfully distinguished from all other species of the\rleviathan, died out of the minds of the whalemen as a body. There are\rthose this day among them, who, though intelligent and courageous\renough in offering battle to the Greenland or Right whale, would\rperhaps—either from professional inexperience, or incompetency, or\rtimidity, decline a contest with the Sperm Whale; at any rate, there\rare plenty of whalemen, especially among those whaling nations not\rsailing under the American flag, who have never hostilely encountered\rthe Sperm Whale, but whose sole knowledge of the leviathan is\rrestricted to the ignoble monster primitively pursued in the North;\rseated on their hatches, these men will hearken with a childish\rfireside interest and awe, to the wild, strange tales of Southern\rwhaling. Nor is the pre-eminent tremendousness of the great Sperm Whale\ranywhere more feelingly comprehended, than on board of those prows\rwhich stem him.\r\rAnd as if the now tested reality of his might had in former legendary\rtimes thrown its shadow before it; we find some book\rnaturalists—Olassen and Povelson—declaring the Sperm Whale not only to\rbe a consternation to every other creature in the sea, but also to be\rso incredibly ferocious as continually to be athirst for human blood.\rNor even down to so late a time as Cuvier’s, were these or almost\rsimilar impressions effaced. For in his Natural History, the Baron\rhimself affirms that at sight of the Sperm Whale, all fish (sharks\rincluded) are “struck with the most lively terrors,” and “often in the\rprecipitancy of their flight dash themselves against the rocks with\rsuch violence as to cause instantaneous death.” And however the general\rexperiences in the fishery may amend such reports as these; yet in\rtheir full terribleness, even to the bloodthirsty item of Povelson, the\rsuperstitious belief in them is, in some vicissitudes of their\rvocation, revived in the minds of the hunters.\r\rSo that overawed by the rumors and portents concerning him, not a few\rof the fishermen recalled, in reference to Moby Dick, the earlier days\rof the Sperm Whale fishery, when it was oftentimes hard to induce long\rpractised Right whalemen to embark in the perils of this new and daring\rwarfare; such men protesting that although other leviathans might be\rhopefully pursued, yet to chase and point lance at such an apparition\ras the Sperm Whale was not for mortal man. That to attempt it, would be\rinevitably to be torn into a quick eternity. On this head, there are\rsome remarkable documents that may be consulted.\r\rNevertheless, some there were, who even in the face of these things\rwere ready to give chase to Moby Dick; and a still greater number who,\rchancing only to hear of him distantly and vaguely, without the\rspecific details of any certain calamity, and without superstitious\raccompaniments, were sufficiently hardy not to flee from the battle if\roffered.\r\rOne of the wild suggestions referred to, as at last coming to be linked\rwith the White Whale in the minds of the superstitiously inclined, was\rthe unearthly conceit that Moby Dick was ubiquitous; that he had\ractually been encountered in opposite latitudes at one and the same\rinstant of time.\r\rNor, credulous as such minds must have been, was this conceit\raltogether without some faint show of superstitious probability. For as\rthe secrets of the currents in the seas have never yet been divulged,\reven to the most erudite research; so the hidden ways of the Sperm\rWhale when beneath the surface remain, in great part, unaccountable to\rhis pursuers; and from time to time have originated the most curious\rand contradictory speculations regarding them, especially concerning\rthe mystic modes whereby, after sounding to a great depth, he\rtransports himself with such vast swiftness to the most widely distant\rpoints.\r\rIt is a thing well known to both American and English whale-ships, and\ras well a thing placed upon authoritative record years ago by Scoresby,\rthat some whales have been captured far north in the Pacific, in whose\rbodies have been found the barbs of harpoons darted in the Greenland\rseas. Nor is it to be gainsaid, that in some of these instances it has\rbeen declared that the interval of time between the two assaults could\rnot have exceeded very many days. Hence, by inference, it has been\rbelieved by some whalemen, that the Nor’ West Passage, so long a\rproblem to man, was never a problem to the whale. So that here, in the\rreal living experience of living men, the prodigies related in old\rtimes of the inland Strello mountain in Portugal (near whose top there\rwas said to be a lake in which the wrecks of ships floated up to the\rsurface); and that still more wonderful story of the Arethusa fountain\rnear Syracuse (whose waters were believed to have come from the Holy\rLand by an underground passage); these fabulous narrations are almost\rfully equalled by the realities of the whalemen.\r\rForced into familiarity, then, with such prodigies as these; and\rknowing that after repeated, intrepid assaults, the White Whale had\rescaped alive; it cannot be much matter of surprise that some whalemen\rshould go still further in their superstitions; declaring Moby Dick not\ronly ubiquitous, but immortal (for immortality is but ubiquity in\rtime); that though groves of spears should be planted in his flanks, he\rwould still swim away unharmed; or if indeed he should ever be made to\rspout thick blood, such a sight would be but a ghastly deception; for\ragain in unensanguined billows hundreds of leagues away, his unsullied\rjet would once more be seen.\r\rBut even stripped of these supernatural surmisings, there was enough in\rthe earthly make and incontestable character of the monster to strike\rthe imagination with unwonted power. For, it was not so much his\runcommon bulk that so much distinguished him from other sperm whales,\rbut, as was elsewhere thrown out—a peculiar snow-white wrinkled\rforehead, and a high, pyramidical white hump. These were his prominent\rfeatures; the tokens whereby, even in the limitless, uncharted seas, he\rrevealed his identity, at a long distance, to those who knew him.\r\rThe rest of his body was so streaked, and spotted, and marbled with the\rsame shrouded hue, that, in the end, he had gained his distinctive\rappellation of the White Whale; a name, indeed, literally justified by\rhis vivid aspect, when seen gliding at high noon through a dark blue\rsea, leaving a milky-way wake of creamy foam, all spangled with golden\rgleamings.\r\rNor was it his unwonted magnitude, nor his remarkable hue, nor yet his\rdeformed lower jaw, that so much invested the whale with natural\rterror, as that unexampled, intelligent malignity which, according to\rspecific accounts, he had over and over again evinced in his assaults.\rMore than all, his treacherous retreats struck more of dismay than\rperhaps aught else. For, when swimming before his exulting pursuers,\rwith every apparent symptom of alarm, he had several times been known\rto turn round suddenly, and, bearing down upon them, either stave their\rboats to splinters, or drive them back in consternation to their ship.\r\rAlready several fatalities had attended his chase. But though similar\rdisasters, however little bruited ashore, were by no means unusual in\rthe fishery; yet, in most instances, such seemed the White Whale’s\rinfernal aforethought of ferocity, that every dismembering or death\rthat he caused, was not wholly regarded as having been inflicted by an\runintelligent agent.\r\rJudge, then, to what pitches of inflamed, distracted fury the minds of\rhis more desperate hunters were impelled, when amid the chips of chewed\rboats, and the sinking limbs of torn comrades, they swam out of the\rwhite curds of the whale’s direful wrath into the serene, exasperating\rsunlight, that smiled on, as if at a birth or a bridal.\r\rHis three boats stove around him, and oars and men both whirling in the\reddies; one captain, seizing the line-knife from his broken prow, had\rdashed at the whale, as an Arkansas duellist at his foe, blindly\rseeking with a six inch blade to reach the fathom-deep life of the\rwhale. That captain was Ahab. And then it was, that suddenly sweeping\rhis sickle-shaped lower jaw beneath him, Moby Dick had reaped away\rAhab’s leg, as a mower a blade of grass in the field. No turbaned Turk,\rno hired Venetian or Malay, could have smote him with more seeming\rmalice. Small reason was there to doubt, then, that ever since that\ralmost fatal encounter, Ahab had cherished a wild vindictiveness\ragainst the whale, all the more fell for that in his frantic morbidness\rhe at last came to identify with him, not only all his bodily woes, but\rall his intellectual and spiritual exasperations. The White Whale swam\rbefore him as the monomaniac incarnation of all those malicious\ragencies which some deep men feel eating in them, till they are left\rliving on with half a heart and half a lung. That intangible malignity\rwhich has been from the beginning; to whose dominion even the modern\rChristians ascribe one-half of the worlds; which the ancient Ophites of\rthe east reverenced in their statue devil;—Ahab did not fall down and\rworship it like them; but deliriously transferring its idea to the\rabhorred white whale, he pitted himself, all mutilated, against it. All\rthat most maddens and torments; all that stirs up the lees of things;\rall truth with malice in it; all that cracks the sinews and cakes the\rbrain; all the subtle demonisms of life and thought; all evil, to crazy\rAhab, were visibly personified, and made practically assailable in Moby\rDick. He piled upon the whale’s white hump the sum of all the general\rrage and hate felt by his whole race from Adam down; and then, as if\rhis chest had been a mortar, he burst his hot heart’s shell upon it.\r\rIt is not probable that this monomania in him took its instant rise at\rthe precise time of his bodily dismemberment. Then, in darting at the\rmonster, knife in hand, he had but given loose to a sudden, passionate,\rcorporal animosity; and when he received the stroke that tore him, he\rprobably but felt the agonizing bodily laceration, but nothing more.\rYet, when by this collision forced to turn towards home, and for long\rmonths of days and weeks, Ahab and anguish lay stretched together in\rone hammock, rounding in mid winter that dreary, howling Patagonian\rCape; then it was, that his torn body and gashed soul bled into one\ranother; and so interfusing, made him mad. That it was only then, on\rthe homeward voyage, after the encounter, that the final monomania\rseized him, seems all but certain from the fact that, at intervals\rduring the passage, he was a raving lunatic; and, though unlimbed of a\rleg, yet such vital strength yet lurked in his Egyptian chest, and was\rmoreover intensified by his delirium, that his mates were forced to\rlace him fast, even there, as he sailed, raving in his hammock. In a\rstrait-jacket, he swung to the mad rockings of the gales. And, when\rrunning into more sufferable latitudes, the ship, with mild stun’sails\rspread, floated across the tranquil tropics, and, to all appearances,\rthe old man’s delirium seemed left behind him with the Cape Horn\rswells, and he came forth from his dark den into the blessed light and\rair; even then, when he bore that firm, collected front, however pale,\rand issued his calm orders once again; and his mates thanked God the\rdireful madness was now gone; even then, Ahab, in his hidden self,\rraved on. Human madness is oftentimes a cunning and most feline thing.\rWhen you think it fled, it may have but become transfigured into some\rstill subtler form. Ahab’s full lunacy subsided not, but deepeningly\rcontracted; like the unabated Hudson, when that noble Northman flows\rnarrowly, but unfathomably through the Highland gorge. But, as in his\rnarrow-flowing monomania, not one jot of Ahab’s broad madness had been\rleft behind; so in that broad madness, not one jot of his great natural\rintellect had perished. That before living agent, now became the living\rinstrument. If such a furious trope may stand, his special lunacy\rstormed his general sanity, and carried it, and turned all its\rconcentred cannon upon its own mad mark; so that far from having lost\rhis strength, Ahab, to that one end, did now possess a thousand fold\rmore potency than ever he had sanely brought to bear upon any one\rreasonable object.\r\rThis is much; yet Ahab’s larger, darker, deeper part remains unhinted.\rBut vain to popularize profundities, and all truth is profound. Winding\rfar down from within the very heart of this spiked Hotel de Cluny where\rwe here stand—however grand and wonderful, now quit it;—and take your\rway, ye nobler, sadder souls, to those vast Roman halls of Thermes;\rwhere far beneath the fantastic towers of man’s upper earth, his root\rof grandeur, his whole awful essence sits in bearded state; an antique\rburied beneath antiquities, and throned on torsoes! So with a broken\rthrone, the great gods mock that captive king; so like a Caryatid, he\rpatient sits, upholding on his frozen brow the piled entablatures of\rages. Wind ye down there, ye prouder, sadder souls! question that\rproud, sad king! A family likeness! aye, he did beget ye, ye young\rexiled royalties; and from your grim sire only will the old\rState-secret come.\r\rNow, in his heart, Ahab had some glimpse of this, namely: all my means\rare sane, my motive and my object mad. Yet without power to kill, or\rchange, or shun the fact; he likewise knew that to mankind he did long\rdissemble; in some sort, did still. But that thing of his dissembling\rwas only subject to his perceptibility, not to his will determinate.\rNevertheless, so well did he succeed in that dissembling, that when\rwith ivory leg he stepped ashore at last, no Nantucketer thought him\rotherwise than but naturally grieved, and that to the quick, with the\rterrible casualty which had overtaken him.\r\rThe report of his undeniable delirium at sea was likewise popularly\rascribed to a kindred cause. And so too, all the added moodiness which\ralways afterwards, to the very day of sailing in the Pequod on the\rpresent voyage, sat brooding on his brow. Nor is it so very unlikely,\rthat far from distrusting his fitness for another whaling voyage, on\raccount of such dark symptoms, the calculating people of that prudent\risle were inclined to harbor the conceit, that for those very reasons\rhe was all the better qualified and set on edge, for a pursuit so full\rof rage and wildness as the bloody hunt of whales. Gnawed within and\rscorched without, with the infixed, unrelenting fangs of some incurable\ridea; such an one, could he be found, would seem the very man to dart\rhis iron and lift his lance against the most appalling of all brutes.\rOr, if for any reason thought to be corporeally incapacitated for that,\ryet such an one would seem superlatively competent to cheer and howl on\rhis underlings to the attack. But be all this as it may, certain it is,\rthat with the mad secret of his unabated rage bolted up and keyed in\rhim, Ahab had purposely sailed upon the present voyage with the one\ronly and all-engrossing object of hunting the White Whale. Had any one\rof his old acquaintances on shore but half dreamed of what was lurking\rin him then, how soon would their aghast and righteous souls have\rwrenched the ship from such a fiendish man! They were bent on\rprofitable cruises, the profit to be counted down in dollars from the\rmint. He was intent on an audacious, immitigable, and supernatural\rrevenge.\r\rHere, then, was this grey-headed, ungodly old man, chasing with curses\ra Job’s whale round the world, at the head of a crew, too, chiefly made\rup of mongrel renegades, and castaways, and cannibals—morally enfeebled\ralso, by the incompetence of mere unaided virtue or right-mindedness in\rStarbuck, the invulnerable jollity of indifference and recklessness in\rStubb, and the pervading mediocrity in Flask. Such a crew, so\rofficered, seemed specially picked and packed by some infernal fatality\rto help him to his monomaniac revenge. How it was that they so\raboundingly responded to the old man’s ire—by what evil magic their\rsouls were possessed, that at times his hate seemed almost theirs; the\rWhite Whale as much their insufferable foe as his; how all this came to\rbe—what the White Whale was to them, or how to their unconscious\runderstandings, also, in some dim, unsuspected way, he might have\rseemed the gliding great demon of the seas of life,—all this to\rexplain, would be to dive deeper than Ishmael can go. The subterranean\rminer that works in us all, how can one tell whither leads his shaft by\rthe ever shifting, muffled sound of his pick? Who does not feel the\rirresistible arm drag? What skiff in tow of a seventy-four can stand\rstill? For one, I gave myself up to the abandonment of the time and the\rplace; but while yet all a-rush to encounter the whale, could see\rnaught in that brute but the deadliest ill.\r\r\rCHAPTER 42. The Whiteness of the Whale.\r\rWhat the white whale was to Ahab, has been hinted; what, at times, he\rwas to me, as yet remains unsaid.\r\rAside from those more obvious considerations touching Moby Dick, which\rcould not but occasionally awaken in any man’s soul some alarm, there\rwas another thought, or rather vague, nameless horror concerning him,\rwhich at times by its intensity completely overpowered all the rest;\rand yet so mystical and well nigh ineffable was it, that I almost\rdespair of putting it in a comprehensible form. It was the whiteness of\rthe whale that above all things appalled me. But how can I hope to\rexplain myself here; and yet, in some dim, random way, explain myself I\rmust, else all these chapters might be naught.\r\rThough in many natural objects, whiteness refiningly enhances beauty,\ras if imparting some special virtue of its own, as in marbles,\rjaponicas, and pearls; and though various nations have in some way\rrecognised a certain royal preeminence in this hue; even the barbaric,\rgrand old kings of Pegu placing the title “Lord of the White Elephants”\rabove all their other magniloquent ascriptions of dominion; and the\rmodern kings of Siam unfurling the same snow-white quadruped in the\rroyal standard; and the Hanoverian flag bearing the one figure of a\rsnow-white charger; and the great Austrian Empire, Cæsarian, heir to\roverlording Rome, having for the imperial colour the same imperial hue;\rand though this pre-eminence in it applies to the human race itself,\rgiving the white man ideal mastership over every dusky tribe; and\rthough, besides, all this, whiteness has been even made significant of\rgladness, for among the Romans a white stone marked a joyful day; and\rthough in other mortal sympathies and symbolizings, this same hue is\rmade the emblem of many touching, noble things—the innocence of brides,\rthe benignity of age; though among the Red Men of America the giving of\rthe white belt of wampum was the deepest pledge of honor; though in\rmany climes, whiteness typifies the majesty of Justice in the ermine of\rthe Judge, and contributes to the daily state of kings and queens drawn\rby milk-white steeds; though even in the higher mysteries of the most\raugust religions it has been made the symbol of the divine spotlessness\rand power; by the Persian fire worshippers, the white forked flame\rbeing held the holiest on the altar; and in the Greek mythologies,\rGreat Jove himself being made incarnate in a snow-white bull; and\rthough to the noble Iroquois, the midwinter sacrifice of the sacred\rWhite Dog was by far the holiest festival of their theology, that\rspotless, faithful creature being held the purest envoy they could send\rto the Great Spirit with the annual tidings of their own fidelity; and\rthough directly from the Latin word for white, all Christian priests\rderive the name of one part of their sacred vesture, the alb or tunic,\rworn beneath the cassock; and though among the holy pomps of the Romish\rfaith, white is specially employed in the celebration of the Passion of\rour Lord; though in the Vision of St. John, white robes are given to\rthe redeemed, and the four-and-twenty elders stand clothed in white\rbefore the great white throne, and the Holy One that sitteth there\rwhite like wool; yet for all these accumulated associations, with\rwhatever is sweet, and honorable, and sublime, there yet lurks an\relusive something in the innermost idea of this hue, which strikes more\rof panic to the soul than that redness which affrights in blood.\r\rThis elusive quality it is, which causes the thought of whiteness, when\rdivorced from more kindly associations, and coupled with any object\rterrible in itself, to heighten that terror to the furthest bounds.\rWitness the white bear of the poles, and the white shark of the\rtropics; what but their smooth, flaky whiteness makes them the\rtranscendent horrors they are? That ghastly whiteness it is which\rimparts such an abhorrent mildness, even more loathsome than terrific,\rto the dumb gloating of their aspect. So that not the fierce-fanged\rtiger in his heraldic coat can so stagger courage as the white-shrouded\rbear or shark.*\r\r*With reference to the Polar bear, it may possibly be urged by him who\rwould fain go still deeper into this matter, that it is not the\rwhiteness, separately regarded, which heightens the intolerable\rhideousness of that brute; for, analysed, that heightened hideousness,\rit might be said, only rises from the circumstance, that the\rirresponsible ferociousness of the creature stands invested in the\rfleece of celestial innocence and love; and hence, by bringing together\rtwo such opposite emotions in our minds, the Polar bear frightens us\rwith so unnatural a contrast. But even assuming all this to be true;\ryet, were it not for the whiteness, you would not have that intensified\rterror.\r\rAs for the white shark, the white gliding ghostliness of repose in that\rcreature, when beheld in his ordinary moods, strangely tallies with the\rsame quality in the Polar quadruped. This peculiarity is most vividly\rhit by the French in the name they bestow upon that fish. The Romish\rmass for the dead begins with “Requiem eternam” (eternal rest), whence\r_Requiem_ denominating the mass itself, and any other funeral music.\rNow, in allusion to the white, silent stillness of death in this shark,\rand the mild deadliness of his habits, the French call him _Requin_.\r\rBethink thee of the albatross, whence come those clouds of spiritual\rwonderment and pale dread, in which that white phantom sails in all\rimaginations? Not Coleridge first threw that spell; but God’s great,\runflattering laureate, Nature.*\r\r*I remember the first albatross I ever saw. It was during a prolonged\rgale, in waters hard upon the Antarctic seas. From my forenoon watch\rbelow, I ascended to the overclouded deck; and there, dashed upon the\rmain hatches, I saw a regal, feathery thing of unspotted whiteness, and\rwith a hooked, Roman bill sublime. At intervals, it arched forth its\rvast archangel wings, as if to embrace some holy ark. Wondrous\rflutterings and throbbings shook it. Though bodily unharmed, it uttered\rcries, as some king’s ghost in supernatural distress. Through its\rinexpressible, strange eyes, methought I peeped to secrets which took\rhold of God. As Abraham before the angels, I bowed myself; the white\rthing was so white, its wings so wide, and in those for ever exiled\rwaters, I had lost the miserable warping memories of traditions and of\rtowns. Long I gazed at that prodigy of plumage. I cannot tell, can only\rhint, the things that darted through me then. But at last I awoke; and\rturning, asked a sailor what bird was this. A goney, he replied. Goney!\rnever had heard that name before; is it conceivable that this glorious\rthing is utterly unknown to men ashore! never! But some time after, I\rlearned that goney was some seaman’s name for albatross. So that by no\rpossibility could Coleridge’s wild Rhyme have had aught to do with\rthose mystical impressions which were mine, when I saw that bird upon\rour deck. For neither had I then read the Rhyme, nor knew the bird to\rbe an albatross. Yet, in saying this, I do but indirectly burnish a\rlittle brighter the noble merit of the poem and the poet.\r\rI assert, then, that in the wondrous bodily whiteness of the bird\rchiefly lurks the secret of the spell; a truth the more evinced in\rthis, that by a solecism of terms there are birds called grey\ralbatrosses; and these I have frequently seen, but never with such\remotions as when I beheld the Antarctic fowl.\r\rBut how had the mystic thing been caught? Whisper it not, and I will\rtell; with a treacherous hook and line, as the fowl floated on the sea.\rAt last the Captain made a postman of it; tying a lettered, leathern\rtally round its neck, with the ship’s time and place; and then letting\rit escape. But I doubt not, that leathern tally, meant for man, was\rtaken off in Heaven, when the white fowl flew to join the wing-folding,\rthe invoking, and adoring cherubim!\r\rMost famous in our Western annals and Indian traditions is that of the\rWhite Steed of the Prairies; a magnificent milk-white charger,\rlarge-eyed, small-headed, bluff-chested, and with the dignity of a\rthousand monarchs in his lofty, overscorning carriage. He was the\relected Xerxes of vast herds of wild horses, whose pastures in those\rdays were only fenced by the Rocky Mountains and the Alleghanies. At\rtheir flaming head he westward trooped it like that chosen star which\revery evening leads on the hosts of light. The flashing cascade of his\rmane, the curving comet of his tail, invested him with housings more\rresplendent than gold and silver-beaters could have furnished him. A\rmost imperial and archangelical apparition of that unfallen, western\rworld, which to the eyes of the old trappers and hunters revived the\rglories of those primeval times when Adam walked majestic as a god,\rbluff-browed and fearless as this mighty steed. Whether marching amid\rhis aides and marshals in the van of countless cohorts that endlessly\rstreamed it over the plains, like an Ohio; or whether with his\rcircumambient subjects browsing all around at the horizon, the White\rSteed gallopingly reviewed them with warm nostrils reddening through\rhis cool milkiness; in whatever aspect he presented himself, always to\rthe bravest Indians he was the object of trembling reverence and awe.\rNor can it be questioned from what stands on legendary record of this\rnoble horse, that it was his spiritual whiteness chiefly, which so\rclothed him with divineness; and that this divineness had that in it\rwhich, though commanding worship, at the same time enforced a certain\rnameless terror.\r\rBut there are other instances where this whiteness loses all that\raccessory and strange glory which invests it in the White Steed and\rAlbatross.\r\rWhat is it that in the Albino man so peculiarly repels and often shocks\rthe eye, as that sometimes he is loathed by his own kith and kin! It is\rthat whiteness which invests him, a thing expressed by the name he\rbears. The Albino is as well made as other men—has no substantive\rdeformity—and yet this mere aspect of all-pervading whiteness makes him\rmore strangely hideous than the ugliest abortion. Why should this be\rso?\r\rNor, in quite other aspects, does Nature in her least palpable but not\rthe less malicious agencies, fail to enlist among her forces this\rcrowning attribute of the terrible. From its snowy aspect, the\rgauntleted ghost of the Southern Seas has been denominated the White\rSquall. Nor, in some historic instances, has the art of human malice\romitted so potent an auxiliary. How wildly it heightens the effect of\rthat passage in Froissart, when, masked in the snowy symbol of their\rfaction, the desperate White Hoods of Ghent murder their bailiff in the\rmarket-place!\r\rNor, in some things, does the common, hereditary experience of all\rmankind fail to bear witness to the supernaturalism of this hue. It\rcannot well be doubted, that the one visible quality in the aspect of\rthe dead which most appals the gazer, is the marble pallor lingering\rthere; as if indeed that pallor were as much like the badge of\rconsternation in the other world, as of mortal trepidation here. And\rfrom that pallor of the dead, we borrow the expressive hue of the\rshroud in which we wrap them. Nor even in our superstitions do we fail\rto throw the same snowy mantle round our phantoms; all ghosts rising in\ra milk-white fog—Yea, while these terrors seize us, let us add, that\reven the king of terrors, when personified by the evangelist, rides on\rhis pallid horse.\r\rTherefore, in his other moods, symbolize whatever grand or gracious\rthing he will by whiteness, no man can deny that in its profoundest\ridealized significance it calls up a peculiar apparition to the soul.\r\rBut though without dissent this point be fixed, how is mortal man to\raccount for it? To analyse it, would seem impossible. Can we, then, by\rthe citation of some of those instances wherein this thing of\rwhiteness—though for the time either wholly or in great part stripped\rof all direct associations calculated to impart to it aught fearful,\rbut nevertheless, is found to exert over us the same sorcery, however\rmodified;—can we thus hope to light upon some chance clue to conduct us\rto the hidden cause we seek?\r\rLet us try. But in a matter like this, subtlety appeals to subtlety,\rand without imagination no man can follow another into these halls. And\rthough, doubtless, some at least of the imaginative impressions about\rto be presented may have been shared by most men, yet few perhaps were\rentirely conscious of them at the time, and therefore may not be able\rto recall them now.\r\rWhy to the man of untutored ideality, who happens to be but loosely\racquainted with the peculiar character of the day, does the bare\rmention of Whitsuntide marshal in the fancy such long, dreary,\rspeechless processions of slow-pacing pilgrims, down-cast and hooded\rwith new-fallen snow? Or, to the unread, unsophisticated Protestant of\rthe Middle American States, why does the passing mention of a White\rFriar or a White Nun, evoke such an eyeless statue in the soul?\r\rOr what is there apart from the traditions of dungeoned warriors and\rkings (which will not wholly account for it) that makes the White Tower\rof London tell so much more strongly on the imagination of an\runtravelled American, than those other storied structures, its\rneighbors—the Byward Tower, or even the Bloody? And those sublimer\rtowers, the White Mountains of New Hampshire, whence, in peculiar\rmoods, comes that gigantic ghostliness over the soul at the bare\rmention of that name, while the thought of Virginia’s Blue Ridge is\rfull of a soft, dewy, distant dreaminess? Or why, irrespective of all\rlatitudes and longitudes, does the name of the White Sea exert such a\rspectralness over the fancy, while that of the Yellow Sea lulls us with\rmortal thoughts of long lacquered mild afternoons on the waves,\rfollowed by the gaudiest and yet sleepiest of sunsets? Or, to choose a\rwholly unsubstantial instance, purely addressed to the fancy, why, in\rreading the old fairy tales of Central Europe, does “the tall pale man”\rof the Hartz forests, whose changeless pallor unrustlingly glides\rthrough the green of the groves—why is this phantom more terrible than\rall the whooping imps of the Blocksburg?\r\rNor is it, altogether, the remembrance of her cathedral-toppling\rearthquakes; nor the stampedoes of her frantic seas; nor the\rtearlessness of arid skies that never rain; nor the sight of her wide\rfield of leaning spires, wrenched cope-stones, and crosses all adroop\r(like canted yards of anchored fleets); and her suburban avenues of\rhouse-walls lying over upon each other, as a tossed pack of cards;—it\ris not these things alone which make tearless Lima, the strangest,\rsaddest city thou can’st see. For Lima has taken the white veil; and\rthere is a higher horror in this whiteness of her woe. Old as Pizarro,\rthis whiteness keeps her ruins for ever new; admits not the cheerful\rgreenness of complete decay; spreads over her broken ramparts the rigid\rpallor of an apoplexy that fixes its own distortions.\r\rI know that, to the common apprehension, this phenomenon of whiteness\ris not confessed to be the prime agent in exaggerating the terror of\robjects otherwise terrible; nor to the unimaginative mind is there\raught of terror in those appearances whose awfulness to another mind\ralmost solely consists in this one phenomenon, especially when\rexhibited under any form at all approaching to muteness or\runiversality. What I mean by these two statements may perhaps be\rrespectively elucidated by the following examples.\r\rFirst: The mariner, when drawing nigh the coasts of foreign lands, if\rby night he hear the roar of breakers, starts to vigilance, and feels\rjust enough of trepidation to sharpen all his faculties; but under\rprecisely similar circumstances, let him be called from his hammock to\rview his ship sailing through a midnight sea of milky whiteness—as if\rfrom encircling headlands shoals of combed white bears were swimming\rround him, then he feels a silent, superstitious dread; the shrouded\rphantom of the whitened waters is horrible to him as a real ghost; in\rvain the lead assures him he is still off soundings; heart and helm\rthey both go down; he never rests till blue water is under him again.\rYet where is the mariner who will tell thee, “Sir, it was not so much\rthe fear of striking hidden rocks, as the fear of that hideous\rwhiteness that so stirred me?”\r\rSecond: To the native Indian of Peru, the continual sight of the\rsnow-howdahed Andes conveys naught of dread, except, perhaps, in the\rmere fancying of the eternal frosted desolateness reigning at such vast\raltitudes, and the natural conceit of what a fearfulness it would be to\rlose oneself in such inhuman solitudes. Much the same is it with the\rbackwoodsman of the West, who with comparative indifference views an\runbounded prairie sheeted with driven snow, no shadow of tree or twig\rto break the fixed trance of whiteness. Not so the sailor, beholding\rthe scenery of the Antarctic seas; where at times, by some infernal\rtrick of legerdemain in the powers of frost and air, he, shivering and\rhalf shipwrecked, instead of rainbows speaking hope and solace to his\rmisery, views what seems a boundless churchyard grinning upon him with\rits lean ice monuments and splintered crosses.\r\rBut thou sayest, methinks that white-lead chapter about whiteness is\rbut a white flag hung out from a craven soul; thou surrenderest to a\rhypo, Ishmael.\r\rTell me, why this strong young colt, foaled in some peaceful valley of\rVermont, far removed from all beasts of prey—why is it that upon the\rsunniest day, if you but shake a fresh buffalo robe behind him, so that\rhe cannot even see it, but only smells its wild animal muskiness—why\rwill he start, snort, and with bursting eyes paw the ground in\rphrensies of affright? There is no remembrance in him of any gorings of\rwild creatures in his green northern home, so that the strange\rmuskiness he smells cannot recall to him anything associated with the\rexperience of former perils; for what knows he, this New England colt,\rof the black bisons of distant Oregon?\r\rNo: but here thou beholdest even in a dumb brute, the instinct of the\rknowledge of the demonism in the world. Though thousands of miles from\rOregon, still when he smells that savage musk, the rending, goring\rbison herds are as present as to the deserted wild foal of the\rprairies, which this instant they may be trampling into dust.\r\rThus, then, the muffled rollings of a milky sea; the bleak rustlings of\rthe festooned frosts of mountains; the desolate shiftings of the\rwindrowed snows of prairies; all these, to Ishmael, are as the shaking\rof that buffalo robe to the frightened colt!\r\rThough neither knows where lie the nameless things of which the mystic\rsign gives forth such hints; yet with me, as with the colt, somewhere\rthose things must exist. Though in many of its aspects this visible\rworld seems formed in love, the invisible spheres were formed in\rfright.\r\rBut not yet have we solved the incantation of this whiteness, and\rlearned why it appeals with such power to the soul; and more strange\rand far more portentous—why, as we have seen, it is at once the most\rmeaning symbol of spiritual things, nay, the very veil of the\rChristian’s Deity; and yet should be as it is, the intensifying agent\rin things the most appalling to mankind.\r\rIs it that by its indefiniteness it shadows forth the heartless voids\rand immensities of the universe, and thus stabs us from behind with the\rthought of annihilation, when beholding the white depths of the milky\rway? Or is it, that as in essence whiteness is not so much a colour as\rthe visible absence of colour; and at the same time the concrete of all\rcolours; is it for these reasons that there is such a dumb blankness,\rfull of meaning, in a wide landscape of snows—a colourless, all-colour\rof atheism from which we shrink? And when we consider that other theory\rof the natural philosophers, that all other earthly hues—every stately\ror lovely emblazoning—the sweet tinges of sunset skies and woods; yea,\rand the gilded velvets of butterflies, and the butterfly cheeks of\ryoung girls; all these are but subtile deceits, not actually inherent\rin substances, but only laid on from without; so that all deified\rNature absolutely paints like the harlot, whose allurements cover\rnothing but the charnel-house within; and when we proceed further, and\rconsider that the mystical cosmetic which produces every one of her\rhues, the great principle of light, for ever remains white or colorless\rin itself, and if operating without medium upon matter, would touch all\robjects, even tulips and roses, with its own blank tinge—pondering all\rthis, the palsied universe lies before us a leper; and like wilful\rtravellers in Lapland, who refuse to wear coloured and colouring\rglasses upon their eyes, so the wretched infidel gazes himself blind at\rthe monumental white shroud that wraps all the prospect around him. And\rof all these things the Albino whale was the symbol. Wonder ye then at\rthe fiery hunt?\r\r\rCHAPTER 43. Hark!\r\r“HIST! Did you hear that noise, Cabaco?”\r\rIt was the middle-watch: a fair moonlight; the seamen were standing in\ra cordon, extending from one of the fresh-water butts in the waist, to\rthe scuttle-butt near the taffrail. In this manner, they passed the\rbuckets to fill the scuttle-butt. Standing, for the most part, on the\rhallowed precincts of the quarter-deck, they were careful not to speak\ror rustle their feet. From hand to hand, the buckets went in the\rdeepest silence, only broken by the occasional flap of a sail, and the\rsteady hum of the unceasingly advancing keel.\r\rIt was in the midst of this repose, that Archy, one of the cordon,\rwhose post was near the after-hatches, whispered to his neighbor, a\rCholo, the words above.\r\r“Hist! did you hear that noise, Cabaco?”\r\r“Take the bucket, will ye, Archy? what noise d’ye mean?”\r\r“There it is again—under the hatches—don’t you hear it—a cough—it\rsounded like a cough.”\r\r“Cough be damned! Pass along that return bucket.”\r\r“There again—there it is!—it sounds like two or three sleepers turning\rover, now!”\r\r“Caramba! have done, shipmate, will ye? It’s the three soaked biscuits\rye eat for supper turning over inside of ye—nothing else. Look to the\rbucket!”\r\r“Say what ye will, shipmate; I’ve sharp ears.”\r\r“Aye, you are the chap, ain’t ye, that heard the hum of the old\rQuakeress’s knitting-needles fifty miles at sea from Nantucket; you’re\rthe chap.”\r\r“Grin away; we’ll see what turns up. Hark ye, Cabaco, there is somebody\rdown in the after-hold that has not yet been seen on deck; and I\rsuspect our old Mogul knows something of it too. I heard Stubb tell\rFlask, one morning watch, that there was something of that sort in the\rwind.”\r\r“Tish! the bucket!”\r\r\rCHAPTER 44. The Chart.\r\rHad you followed Captain Ahab down into his cabin after the squall that\rtook place on the night succeeding that wild ratification of his\rpurpose with his crew, you would have seen him go to a locker in the\rtransom, and bringing out a large wrinkled roll of yellowish sea\rcharts, spread them before him on his screwed-down table. Then seating\rhimself before it, you would have seen him intently study the various\rlines and shadings which there met his eye; and with slow but steady\rpencil trace additional courses over spaces that before were blank. At\rintervals, he would refer to piles of old log-books beside him, wherein\rwere set down the seasons and places in which, on various former\rvoyages of various ships, sperm whales had been captured or seen.\r\rWhile thus employed, the heavy pewter lamp suspended in chains over his\rhead, continually rocked with the motion of the ship, and for ever\rthrew shifting gleams and shadows of lines upon his wrinkled brow, till\rit almost seemed that while he himself was marking out lines and\rcourses on the wrinkled charts, some invisible pencil was also tracing\rlines and courses upon the deeply marked chart of his forehead.\r\rBut it was not this night in particular that, in the solitude of his\rcabin, Ahab thus pondered over his charts. Almost every night they were\rbrought out; almost every night some pencil marks were effaced, and\rothers were substituted. For with the charts of all four oceans before\rhim, Ahab was threading a maze of currents and eddies, with a view to\rthe more certain accomplishment of that monomaniac thought of his soul.\r\rNow, to any one not fully acquainted with the ways of the leviathans,\rit might seem an absurdly hopeless task thus to seek out one solitary\rcreature in the unhooped oceans of this planet. But not so did it seem\rto Ahab, who knew the sets of all tides and currents; and thereby\rcalculating the driftings of the sperm whale’s food; and, also, calling\rto mind the regular, ascertained seasons for hunting him in particular\rlatitudes; could arrive at reasonable surmises, almost approaching to\rcertainties, concerning the timeliest day to be upon this or that\rground in search of his prey.\r\rSo assured, indeed, is the fact concerning the periodicalness of the\rsperm whale’s resorting to given waters, that many hunters believe\rthat, could he be closely observed and studied throughout the world;\rwere the logs for one voyage of the entire whale fleet carefully\rcollated, then the migrations of the sperm whale would be found to\rcorrespond in invariability to those of the herring-shoals or the\rflights of swallows. On this hint, attempts have been made to construct\relaborate migratory charts of the sperm whale.*\r\r\r  *Since the above was written, the statement is happily borne out by\r  an official circular, issued by Lieutenant Maury, of the National\r  Observatory, Washington, April 16th, 1851. By that circular, it\r  appears that precisely such a chart is in course of completion; and\r  portions of it are presented in the circular. “This chart divides the\r  ocean into districts of five degrees of latitude by five degrees of\r  longitude; perpendicularly through each of which districts are twelve\r  columns for the twelve months; and horizontally through each of which\r  districts are three lines; one to show the number of days that have\r  been spent in each month in every district, and the two others to\r  show the number of days in which whales, sperm or right, have been\r  seen.”\r\r\r\r\rBesides, when making a passage from one feeding-ground to another, the\rsperm whales, guided by some infallible instinct—say, rather, secret\rintelligence from the Deity—mostly swim in _veins_, as they are called;\rcontinuing their way along a given ocean-line with such undeviating\rexactitude, that no ship ever sailed her course, by any chart, with one\rtithe of such marvellous precision. Though, in these cases, the\rdirection taken by any one whale be straight as a surveyor’s parallel,\rand though the line of advance be strictly confined to its own\runavoidable, straight wake, yet the arbitrary _vein_ in which at these\rtimes he is said to swim, generally embraces some few miles in width\r(more or less, as the vein is presumed to expand or contract); but\rnever exceeds the visual sweep from the whale-ship’s mast-heads, when\rcircumspectly gliding along this magic zone. The sum is, that at\rparticular seasons within that breadth and along that path, migrating\rwhales may with great confidence be looked for.\r\rAnd hence not only at substantiated times, upon well known separate\rfeeding-grounds, could Ahab hope to encounter his prey; but in crossing\rthe widest expanses of water between those grounds he could, by his\rart, so place and time himself on his way, as even then not to be\rwholly without prospect of a meeting.\r\rThere was a circumstance which at first sight seemed to entangle his\rdelirious but still methodical scheme. But not so in the reality,\rperhaps. Though the gregarious sperm whales have their regular seasons\rfor particular grounds, yet in general you cannot conclude that the\rherds which haunted such and such a latitude or longitude this year,\rsay, will turn out to be identically the same with those that were\rfound there the preceding season; though there are peculiar and\runquestionable instances where the contrary of this has proved true. In\rgeneral, the same remark, only within a less wide limit, applies to the\rsolitaries and hermits among the matured, aged sperm whales. So that\rthough Moby Dick had in a former year been seen, for example, on what\ris called the Seychelle ground in the Indian ocean, or Volcano Bay on\rthe Japanese Coast; yet it did not follow, that were the Pequod to\rvisit either of those spots at any subsequent corresponding season, she\rwould infallibly encounter him there. So, too, with some other feeding\rgrounds, where he had at times revealed himself. But all these seemed\ronly his casual stopping-places and ocean-inns, so to speak, not his\rplaces of prolonged abode. And where Ahab’s chances of accomplishing\rhis object have hitherto been spoken of, allusion has only been made to\rwhatever way-side, antecedent, extra prospects were his, ere a\rparticular set time or place were attained, when all possibilities\rwould become probabilities, and, as Ahab fondly thought, every\rpossibility the next thing to a certainty. That particular set time and\rplace were conjoined in the one technical phrase—the\rSeason-on-the-Line. For there and then, for several consecutive years,\rMoby Dick had been periodically descried, lingering in those waters for\rawhile, as the sun, in its annual round, loiters for a predicted\rinterval in any one sign of the Zodiac. There it was, too, that most of\rthe deadly encounters with the white whale had taken place; there the\rwaves were storied with his deeds; there also was that tragic spot\rwhere the monomaniac old man had found the awful motive to his\rvengeance. But in the cautious comprehensiveness and unloitering\rvigilance with which Ahab threw his brooding soul into this unfaltering\rhunt, he would not permit himself to rest all his hopes upon the one\rcrowning fact above mentioned, however flattering it might be to those\rhopes; nor in the sleeplessness of his vow could he so tranquillize his\runquiet heart as to postpone all intervening quest.\r\rNow, the Pequod had sailed from Nantucket at the very beginning of the\rSeason-on-the-Line. No possible endeavor then could enable her\rcommander to make the great passage southwards, double Cape Horn, and\rthen running down sixty degrees of latitude arrive in the equatorial\rPacific in time to cruise there. Therefore, he must wait for the next\rensuing season. Yet the premature hour of the Pequod’s sailing had,\rperhaps, been correctly selected by Ahab, with a view to this very\rcomplexion of things. Because, an interval of three hundred and\rsixty-five days and nights was before him; an interval which, instead\rof impatiently enduring ashore, he would spend in a miscellaneous hunt;\rif by chance the White Whale, spending his vacation in seas far remote\rfrom his periodical feeding-grounds, should turn up his wrinkled brow\roff the Persian Gulf, or in the Bengal Bay, or China Seas, or in any\rother waters haunted by his race. So that Monsoons, Pampas,\rNor’-Westers, Harmattans, Trades; any wind but the Levanter and Simoon,\rmight blow Moby Dick into the devious zig-zag world-circle of the\rPequod’s circumnavigating wake.\r\rBut granting all this; yet, regarded discreetly and coolly, seems it\rnot but a mad idea, this; that in the broad boundless ocean, one\rsolitary whale, even if encountered, should be thought capable of\rindividual recognition from his hunter, even as a white-bearded Mufti\rin the thronged thoroughfares of Constantinople? Yes. For the peculiar\rsnow-white brow of Moby Dick, and his snow-white hump, could not but be\runmistakable. And have I not tallied the whale, Ahab would mutter to\rhimself, as after poring over his charts till long after midnight he\rwould throw himself back in reveries—tallied him, and shall he escape?\rHis broad fins are bored, and scalloped out like a lost sheep’s ear!\rAnd here, his mad mind would run on in a breathless race; till a\rweariness and faintness of pondering came over him; and in the open air\rof the deck he would seek to recover his strength. Ah, God! what\rtrances of torments does that man endure who is consumed with one\runachieved revengeful desire. He sleeps with clenched hands; and wakes\rwith his own bloody nails in his palms.\r\rOften, when forced from his hammock by exhausting and intolerably vivid\rdreams of the night, which, resuming his own intense thoughts through\rthe day, carried them on amid a clashing of phrensies, and whirled them\rround and round and round in his blazing brain, till the very throbbing\rof his life-spot became insufferable anguish; and when, as was\rsometimes the case, these spiritual throes in him heaved his being up\rfrom its base, and a chasm seemed opening in him, from which forked\rflames and lightnings shot up, and accursed fiends beckoned him to leap\rdown among them; when this hell in himself yawned beneath him, a wild\rcry would be heard through the ship; and with glaring eyes Ahab would\rburst from his state room, as though escaping from a bed that was on\rfire. Yet these, perhaps, instead of being the unsuppressable symptoms\rof some latent weakness, or fright at his own resolve, were but the\rplainest tokens of its intensity. For, at such times, crazy Ahab, the\rscheming, unappeasedly steadfast hunter of the white whale; this Ahab\rthat had gone to his hammock, was not the agent that so caused him to\rburst from it in horror again. The latter was the eternal, living\rprinciple or soul in him; and in sleep, being for the time dissociated\rfrom the characterizing mind, which at other times employed it for its\router vehicle or agent, it spontaneously sought escape from the\rscorching contiguity of the frantic thing, of which, for the time, it\rwas no longer an integral. But as the mind does not exist unless\rleagued with the soul, therefore it must have been that, in Ahab’s\rcase, yielding up all his thoughts and fancies to his one supreme\rpurpose; that purpose, by its own sheer inveteracy of will, forced\ritself against gods and devils into a kind of self-assumed, independent\rbeing of its own. Nay, could grimly live and burn, while the common\rvitality to which it was conjoined, fled horror-stricken from the\runbidden and unfathered birth. Therefore, the tormented spirit that\rglared out of bodily eyes, when what seemed Ahab rushed from his room,\rwas for the time but a vacated thing, a formless somnambulistic being,\ra ray of living light, to be sure, but without an object to colour, and\rtherefore a blankness in itself. God help thee, old man, thy thoughts\rhave created a creature in thee; and he whose intense thinking thus\rmakes him a Prometheus; a vulture feeds upon that heart for ever; that\rvulture the very creature he creates.\r\r\rCHAPTER 45. The Affidavit.\r\rSo far as what there may be of a narrative in this book; and, indeed,\ras indirectly touching one or two very interesting and curious\rparticulars in the habits of sperm whales, the foregoing chapter, in\rits earlier part, is as important a one as will be found in this\rvolume; but the leading matter of it requires to be still further and\rmore familiarly enlarged upon, in order to be adequately understood,\rand moreover to take away any incredulity which a profound ignorance of\rthe entire subject may induce in some minds, as to the natural verity\rof the main points of this affair.\r\rI care not to perform this part of my task methodically; but shall be\rcontent to produce the desired impression by separate citations of\ritems, practically or reliably known to me as a whaleman; and from\rthese citations, I take it—the conclusion aimed at will naturally\rfollow of itself.\r\rFirst: I have personally known three instances where a whale, after\rreceiving a harpoon, has effected a complete escape; and, after an\rinterval (in one instance of three years), has been again struck by the\rsame hand, and slain; when the two irons, both marked by the same\rprivate cypher, have been taken from the body. In the instance where\rthree years intervened between the flinging of the two harpoons; and I\rthink it may have been something more than that; the man who darted\rthem happening, in the interval, to go in a trading ship on a voyage to\rAfrica, went ashore there, joined a discovery party, and penetrated far\rinto the interior, where he travelled for a period of nearly two years,\roften endangered by serpents, savages, tigers, poisonous miasmas, with\rall the other common perils incident to wandering in the heart of\runknown regions. Meanwhile, the whale he had struck must also have been\ron its travels; no doubt it had thrice circumnavigated the globe,\rbrushing with its flanks all the coasts of Africa; but to no purpose.\rThis man and this whale again came together, and the one vanquished the\rother. I say I, myself, have known three instances similar to this;\rthat is in two of them I saw the whales struck; and, upon the second\rattack, saw the two irons with the respective marks cut in them,\rafterwards taken from the dead fish. In the three-year instance, it so\rfell out that I was in the boat both times, first and last, and the\rlast time distinctly recognised a peculiar sort of huge mole under the\rwhale’s eye, which I had observed there three years previous. I say\rthree years, but I am pretty sure it was more than that. Here are three\rinstances, then, which I personally know the truth of; but I have heard\rof many other instances from persons whose veracity in the matter there\ris no good ground to impeach.\r\rSecondly: It is well known in the Sperm Whale Fishery, however ignorant\rthe world ashore may be of it, that there have been several memorable\rhistorical instances where a particular whale in the ocean has been at\rdistant times and places popularly cognisable. Why such a whale became\rthus marked was not altogether and originally owing to his bodily\rpeculiarities as distinguished from other whales; for however peculiar\rin that respect any chance whale may be, they soon put an end to his\rpeculiarities by killing him, and boiling him down into a peculiarly\rvaluable oil. No: the reason was this: that from the fatal experiences\rof the fishery there hung a terrible prestige of perilousness about\rsuch a whale as there did about Rinaldo Rinaldini, insomuch that most\rfishermen were content to recognise him by merely touching their\rtarpaulins when he would be discovered lounging by them on the sea,\rwithout seeking to cultivate a more intimate acquaintance. Like some\rpoor devils ashore that happen to know an irascible great man, they\rmake distant unobtrusive salutations to him in the street, lest if they\rpursued the acquaintance further, they might receive a summary thump\rfor their presumption.\r\rBut not only did each of these famous whales enjoy great individual\rcelebrity—Nay, you may call it an ocean-wide renown; not only was he\rfamous in life and now is immortal in forecastle stories after death,\rbut he was admitted into all the rights, privileges, and distinctions\rof a name; had as much a name indeed as Cambyses or Cæsar. Was it not\rso, O Timor Tom! thou famed leviathan, scarred like an iceberg, who so\rlong did’st lurk in the Oriental straits of that name, whose spout was\roft seen from the palmy beach of Ombay? Was it not so, O New Zealand\rJack! thou terror of all cruisers that crossed their wakes in the\rvicinity of the Tattoo Land? Was it not so, O Morquan! King of Japan,\rwhose lofty jet they say at times assumed the semblance of a snow-white\rcross against the sky? Was it not so, O Don Miguel! thou Chilian whale,\rmarked like an old tortoise with mystic hieroglyphics upon the back! In\rplain prose, here are four whales as well known to the students of\rCetacean History as Marius or Sylla to the classic scholar.\r\rBut this is not all. New Zealand Tom and Don Miguel, after at various\rtimes creating great havoc among the boats of different vessels, were\rfinally gone in quest of, systematically hunted out, chased and killed\rby valiant whaling captains, who heaved up their anchors with that\rexpress object as much in view, as in setting out through the\rNarragansett Woods, Captain Butler of old had it in his mind to capture\rthat notorious murderous savage Annawon, the headmost warrior of the\rIndian King Philip.\r\rI do not know where I can find a better place than just here, to make\rmention of one or two other things, which to me seem important, as in\rprinted form establishing in all respects the reasonableness of the\rwhole story of the White Whale, more especially the catastrophe. For\rthis is one of those disheartening instances where truth requires full\ras much bolstering as error. So ignorant are most landsmen of some of\rthe plainest and most palpable wonders of the world, that without some\rhints touching the plain facts, historical and otherwise, of the\rfishery, they might scout at Moby Dick as a monstrous fable, or still\rworse and more detestable, a hideous and intolerable allegory.\r\rFirst: Though most men have some vague flitting ideas of the general\rperils of the grand fishery, yet they have nothing like a fixed, vivid\rconception of those perils, and the frequency with which they recur.\rOne reason perhaps is, that not one in fifty of the actual disasters\rand deaths by casualties in the fishery, ever finds a public record at\rhome, however transient and immediately forgotten that record. Do you\rsuppose that that poor fellow there, who this moment perhaps caught by\rthe whale-line off the coast of New Guinea, is being carried down to\rthe bottom of the sea by the sounding leviathan—do you suppose that\rthat poor fellow’s name will appear in the newspaper obituary you will\rread to-morrow at your breakfast? No: because the mails are very\rirregular between here and New Guinea. In fact, did you ever hear what\rmight be called regular news direct or indirect from New Guinea? Yet I\rtell you that upon one particular voyage which I made to the Pacific,\ramong many others we spoke thirty different ships, every one of which\rhad had a death by a whale, some of them more than one, and three that\rhad each lost a boat’s crew. For God’s sake, be economical with your\rlamps and candles! not a gallon you burn, but at least one drop of\rman’s blood was spilled for it.\r\rSecondly: People ashore have indeed some indefinite idea that a whale\ris an enormous creature of enormous power; but I have ever found that\rwhen narrating to them some specific example of this two-fold\renormousness, they have significantly complimented me upon my\rfacetiousness; when, I declare upon my soul, I had no more idea of\rbeing facetious than Moses, when he wrote the history of the plagues of\rEgypt.\r\rBut fortunately the special point I here seek can be established upon\rtestimony entirely independent of my own. That point is this: The Sperm\rWhale is in some cases sufficiently powerful, knowing, and judiciously\rmalicious, as with direct aforethought to stave in, utterly destroy,\rand sink a large ship; and what is more, the Sperm Whale _has_ done it.\r\rFirst: In the year 1820 the ship Essex, Captain Pollard, of Nantucket,\rwas cruising in the Pacific Ocean. One day she saw spouts, lowered her\rboats, and gave chase to a shoal of sperm whales. Ere long, several of\rthe whales were wounded; when, suddenly, a very large whale escaping\rfrom the boats, issued from the shoal, and bore directly down upon the\rship. Dashing his forehead against her hull, he so stove her in, that\rin less than “ten minutes” she settled down and fell over. Not a\rsurviving plank of her has been seen since. After the severest\rexposure, part of the crew reached the land in their boats. Being\rreturned home at last, Captain Pollard once more sailed for the Pacific\rin command of another ship, but the gods shipwrecked him again upon\runknown rocks and breakers; for the second time his ship was utterly\rlost, and forthwith forswearing the sea, he has never tempted it since.\rAt this day Captain Pollard is a resident of Nantucket. I have seen\rOwen Chace, who was chief mate of the Essex at the time of the tragedy;\rI have read his plain and faithful narrative; I have conversed with his\rson; and all this within a few miles of the scene of the catastrophe.*\r\r*The following are extracts from Chace’s narrative: “Every fact seemed\rto warrant me in concluding that it was anything but chance which\rdirected his operations; he made two several attacks upon the ship, at\ra short interval between them, both of which, according to their\rdirection, were calculated to do us the most injury, by being made\rahead, and thereby combining the speed of the two objects for the\rshock; to effect which, the exact manœuvres which he made were\rnecessary. His aspect was most horrible, and such as indicated\rresentment and fury. He came directly from the shoal which we had just\rbefore entered, and in which we had struck three of his companions, as\rif fired with revenge for their sufferings.” Again: “At all events, the\rwhole circumstances taken together, all happening before my own eyes,\rand producing, at the time, impressions in my mind of decided,\rcalculating mischief, on the part of the whale (many of which\rimpressions I cannot now recall), induce me to be satisfied that I am\rcorrect in my opinion.”\r\rHere are his reflections some time after quitting the ship, during a\rblack night in an open boat, when almost despairing of reaching any\rhospitable shore. “The dark ocean and swelling waters were nothing; the\rfears of being swallowed up by some dreadful tempest, or dashed upon\rhidden rocks, with all the other ordinary subjects of fearful\rcontemplation, seemed scarcely entitled to a moment’s thought; the\rdismal looking wreck, and _the horrid aspect and revenge of the whale_,\rwholly engrossed my reflections, until day again made its appearance.”\r\rIn another place—p. 45,—he speaks of “_the mysterious and mortal attack\rof the animal_.”\r\rSecondly: The ship Union, also of Nantucket, was in the year 1807\rtotally lost off the Azores by a similar onset, but the authentic\rparticulars of this catastrophe I have never chanced to encounter,\rthough from the whale hunters I have now and then heard casual\rallusions to it.\r\rThirdly: Some eighteen or twenty years ago Commodore J——, then\rcommanding an American sloop-of-war of the first class, happened to be\rdining with a party of whaling captains, on board a Nantucket ship in\rthe harbor of Oahu, Sandwich Islands. Conversation turning upon whales,\rthe Commodore was pleased to be sceptical touching the amazing strength\rascribed to them by the professional gentlemen present. He peremptorily\rdenied for example, that any whale could so smite his stout\rsloop-of-war as to cause her to leak so much as a thimbleful. Very\rgood; but there is more coming. Some weeks after, the Commodore set\rsail in this impregnable craft for Valparaiso. But he was stopped on\rthe way by a portly sperm whale, that begged a few moments’\rconfidential business with him. That business consisted in fetching the\rCommodore’s craft such a thwack, that with all his pumps going he made\rstraight for the nearest port to heave down and repair. I am not\rsuperstitious, but I consider the Commodore’s interview with that whale\ras providential. Was not Saul of Tarsus converted from unbelief by a\rsimilar fright? I tell you, the sperm whale will stand no nonsense.\r\rI will now refer you to Langsdorff’s Voyages for a little circumstance\rin point, peculiarly interesting to the writer hereof. Langsdorff, you\rmust know by the way, was attached to the Russian Admiral Krusenstern’s\rfamous Discovery Expedition in the beginning of the present century.\rCaptain Langsdorff thus begins his seventeenth chapter:\r\r“By the thirteenth of May our ship was ready to sail, and the next day\rwe were out in the open sea, on our way to Ochotsh. The weather was\rvery clear and fine, but so intolerably cold that we were obliged to\rkeep on our fur clothing. For some days we had very little wind; it was\rnot till the nineteenth that a brisk gale from the northwest sprang up.\rAn uncommon large whale, the body of which was larger than the ship\ritself, lay almost at the surface of the water, but was not perceived\rby any one on board till the moment when the ship, which was in full\rsail, was almost upon him, so that it was impossible to prevent its\rstriking against him. We were thus placed in the most imminent danger,\ras this gigantic creature, setting up its back, raised the ship three\rfeet at least out of the water. The masts reeled, and the sails fell\raltogether, while we who were below all sprang instantly upon the deck,\rconcluding that we had struck upon some rock; instead of this we saw\rthe monster sailing off with the utmost gravity and solemnity. Captain\rD’Wolf applied immediately to the pumps to examine whether or not the\rvessel had received any damage from the shock, but we found that very\rhappily it had escaped entirely uninjured.”\r\rNow, the Captain D’Wolf here alluded to as commanding the ship in\rquestion, is a New Englander, who, after a long life of unusual\radventures as a sea-captain, this day resides in the village of\rDorchester near Boston. I have the honor of being a nephew of his. I\rhave particularly questioned him concerning this passage in Langsdorff.\rHe substantiates every word. The ship, however, was by no means a large\rone: a Russian craft built on the Siberian coast, and purchased by my\runcle after bartering away the vessel in which he sailed from home.\r\rIn that up and down manly book of old-fashioned adventure, so full,\rtoo, of honest wonders—the voyage of Lionel Wafer, one of ancient\rDampier’s old chums—I found a little matter set down so like that just\rquoted from Langsdorff, that I cannot forbear inserting it here for a\rcorroborative example, if such be needed.\r\rLionel, it seems, was on his way to “John Ferdinando,” as he calls the\rmodern Juan Fernandes. “In our way thither,” he says, “about four\ro’clock in the morning, when we were about one hundred and fifty\rleagues from the Main of America, our ship felt a terrible shock, which\rput our men in such consternation that they could hardly tell where\rthey were or what to think; but every one began to prepare for death.\rAnd, indeed, the shock was so sudden and violent, that we took it for\rgranted the ship had struck against a rock; but when the amazement was\ra little over, we cast the lead, and sounded, but found no ground. * *\r* * * The suddenness of the shock made the guns leap in their\rcarriages, and several of the men were shaken out of their hammocks.\rCaptain Davis, who lay with his head on a gun, was thrown out of his\rcabin!” Lionel then goes on to impute the shock to an earthquake, and\rseems to substantiate the imputation by stating that a great\rearthquake, somewhere about that time, did actually do great mischief\ralong the Spanish land. But I should not much wonder if, in the\rdarkness of that early hour of the morning, the shock was after all\rcaused by an unseen whale vertically bumping the hull from beneath.\r\rI might proceed with several more examples, one way or another known to\rme, of the great power and malice at times of the sperm whale. In more\rthan one instance, he has been known, not only to chase the assailing\rboats back to their ships, but to pursue the ship itself, and long\rwithstand all the lances hurled at him from its decks. The English ship\rPusie Hall can tell a story on that head; and, as for his strength, let\rme say, that there have been examples where the lines attached to a\rrunning sperm whale have, in a calm, been transferred to the ship, and\rsecured there; the whale towing her great hull through the water, as a\rhorse walks off with a cart. Again, it is very often observed that, if\rthe sperm whale, once struck, is allowed time to rally, he then acts,\rnot so often with blind rage, as with wilful, deliberate designs of\rdestruction to his pursuers; nor is it without conveying some eloquent\rindication of his character, that upon being attacked he will\rfrequently open his mouth, and retain it in that dread expansion for\rseveral consecutive minutes. But I must be content with only one more\rand a concluding illustration; a remarkable and most significant one,\rby which you will not fail to see, that not only is the most marvellous\revent in this book corroborated by plain facts of the present day, but\rthat these marvels (like all marvels) are mere repetitions of the ages;\rso that for the millionth time we say amen with Solomon—Verily there is\rnothing new under the sun.\r\rIn the sixth Christian century lived Procopius, a Christian magistrate\rof Constantinople, in the days when Justinian was Emperor and\rBelisarius general. As many know, he wrote the history of his own\rtimes, a work every way of uncommon value. By the best authorities, he\rhas always been considered a most trustworthy and unexaggerating\rhistorian, except in some one or two particulars, not at all affecting\rthe matter presently to be mentioned.\r\rNow, in this history of his, Procopius mentions that, during the term\rof his prefecture at Constantinople, a great sea-monster was captured\rin the neighboring Propontis, or Sea of Marmora, after having destroyed\rvessels at intervals in those waters for a period of more than fifty\ryears. A fact thus set down in substantial history cannot easily be\rgainsaid. Nor is there any reason it should be. Of what precise species\rthis sea-monster was, is not mentioned. But as he destroyed ships, as\rwell as for other reasons, he must have been a whale; and I am strongly\rinclined to think a sperm whale. And I will tell you why. For a long\rtime I fancied that the sperm whale had been always unknown in the\rMediterranean and the deep waters connecting with it. Even now I am\rcertain that those seas are not, and perhaps never can be, in the\rpresent constitution of things, a place for his habitual gregarious\rresort. But further investigations have recently proved to me, that in\rmodern times there have been isolated instances of the presence of the\rsperm whale in the Mediterranean. I am told, on good authority, that on\rthe Barbary coast, a Commodore Davis of the British navy found the\rskeleton of a sperm whale. Now, as a vessel of war readily passes\rthrough the Dardanelles, hence a sperm whale could, by the same route,\rpass out of the Mediterranean into the Propontis.\r\rIn the Propontis, as far as I can learn, none of that peculiar\rsubstance called _brit_ is to be found, the aliment of the right whale.\rBut I have every reason to believe that the food of the sperm\rwhale—squid or cuttle-fish—lurks at the bottom of that sea, because\rlarge creatures, but by no means the largest of that sort, have been\rfound at its surface. If, then, you properly put these statements\rtogether, and reason upon them a bit, you will clearly perceive that,\raccording to all human reasoning, Procopius’s sea-monster, that for\rhalf a century stove the ships of a Roman Emperor, must in all\rprobability have been a sperm whale.\r\r\rCHAPTER 46. Surmises.\r\rThough, consumed with the hot fire of his purpose, Ahab in all his\rthoughts and actions ever had in view the ultimate capture of Moby\rDick; though he seemed ready to sacrifice all mortal interests to that\rone passion; nevertheless it may have been that he was by nature and\rlong habituation far too wedded to a fiery whaleman’s ways, altogether\rto abandon the collateral prosecution of the voyage. Or at least if\rthis were otherwise, there were not wanting other motives much more\rinfluential with him. It would be refining too much, perhaps, even\rconsidering his monomania, to hint that his vindictiveness towards the\rWhite Whale might have possibly extended itself in some degree to all\rsperm whales, and that the more monsters he slew by so much the more he\rmultiplied the chances that each subsequently encountered whale would\rprove to be the hated one he hunted. But if such an hypothesis be\rindeed exceptionable, there were still additional considerations which,\rthough not so strictly according with the wildness of his ruling\rpassion, yet were by no means incapable of swaying him.\r\rTo accomplish his object Ahab must use tools; and of all tools used in\rthe shadow of the moon, men are most apt to get out of order. He knew,\rfor example, that however magnetic his ascendency in some respects was\rover Starbuck, yet that ascendency did not cover the complete spiritual\rman any more than mere corporeal superiority involves intellectual\rmastership; for to the purely spiritual, the intellectual but stand in\ra sort of corporeal relation. Starbuck’s body and Starbuck’s coerced\rwill were Ahab’s, so long as Ahab kept his magnet at Starbuck’s brain;\rstill he knew that for all this the chief mate, in his soul, abhorred\rhis captain’s quest, and could he, would joyfully disintegrate himself\rfrom it, or even frustrate it. It might be that a long interval would\relapse ere the White Whale was seen. During that long interval Starbuck\rwould ever be apt to fall into open relapses of rebellion against his\rcaptain’s leadership, unless some ordinary, prudential, circumstantial\rinfluences were brought to bear upon him. Not only that, but the subtle\rinsanity of Ahab respecting Moby Dick was noways more significantly\rmanifested than in his superlative sense and shrewdness in foreseeing\rthat, for the present, the hunt should in some way be stripped of that\rstrange imaginative impiousness which naturally invested it; that the\rfull terror of the voyage must be kept withdrawn into the obscure\rbackground (for few men’s courage is proof against protracted\rmeditation unrelieved by action); that when they stood their long night\rwatches, his officers and men must have some nearer things to think of\rthan Moby Dick. For however eagerly and impetuously the savage crew had\rhailed the announcement of his quest; yet all sailors of all sorts are\rmore or less capricious and unreliable—they live in the varying outer\rweather, and they inhale its fickleness—and when retained for any\robject remote and blank in the pursuit, however promissory of life and\rpassion in the end, it is above all things requisite that temporary\rinterests and employments should intervene and hold them healthily\rsuspended for the final dash.\r\rNor was Ahab unmindful of another thing. In times of strong emotion\rmankind disdain all base considerations; but such times are evanescent.\rThe permanent constitutional condition of the manufactured man, thought\rAhab, is sordidness. Granting that the White Whale fully incites the\rhearts of this my savage crew, and playing round their savageness even\rbreeds a certain generous knight-errantism in them, still, while for\rthe love of it they give chase to Moby Dick, they must also have food\rfor their more common, daily appetites. For even the high lifted and\rchivalric Crusaders of old times were not content to traverse two\rthousand miles of land to fight for their holy sepulchre, without\rcommitting burglaries, picking pockets, and gaining other pious\rperquisites by the way. Had they been strictly held to their one final\rand romantic object—that final and romantic object, too many would have\rturned from in disgust. I will not strip these men, thought Ahab, of\rall hopes of cash—aye, cash. They may scorn cash now; but let some\rmonths go by, and no perspective promise of it to them, and then this\rsame quiescent cash all at once mutinying in them, this same cash would\rsoon cashier Ahab.\r\rNor was there wanting still another precautionary motive more related\rto Ahab personally. Having impulsively, it is probable, and perhaps\rsomewhat prematurely revealed the prime but private purpose of the\rPequod’s voyage, Ahab was now entirely conscious that, in so doing, he\rhad indirectly laid himself open to the unanswerable charge of\rusurpation; and with perfect impunity, both moral and legal, his crew\rif so disposed, and to that end competent, could refuse all further\robedience to him, and even violently wrest from him the command. From\reven the barely hinted imputation of usurpation, and the possible\rconsequences of such a suppressed impression gaining ground, Ahab must\rof course have been most anxious to protect himself. That protection\rcould only consist in his own predominating brain and heart and hand,\rbacked by a heedful, closely calculating attention to every minute\ratmospheric influence which it was possible for his crew to be\rsubjected to.\r\rFor all these reasons then, and others perhaps too analytic to be\rverbally developed here, Ahab plainly saw that he must still in a good\rdegree continue true to the natural, nominal purpose of the Pequod’s\rvoyage; observe all customary usages; and not only that, but force\rhimself to evince all his well known passionate interest in the general\rpursuit of his profession.\r\rBe all this as it may, his voice was now often heard hailing the three\rmast-heads and admonishing them to keep a bright look-out, and not omit\rreporting even a porpoise. This vigilance was not long without reward.\r\r\rCHAPTER 47. The Mat-Maker.\r\rIt was a cloudy, sultry afternoon; the seamen were lazily lounging\rabout the decks, or vacantly gazing over into the lead-coloured waters.\rQueequeg and I were mildly employed weaving what is called a sword-mat,\rfor an additional lashing to our boat. So still and subdued and yet\rsomehow preluding was all the scene, and such an incantation of reverie\rlurked in the air, that each silent sailor seemed resolved into his own\rinvisible self.\r\rI was the attendant or page of Queequeg, while busy at the mat. As I\rkept passing and repassing the filling or woof of marline between the\rlong yarns of the warp, using my own hand for the shuttle, and as\rQueequeg, standing sideways, ever and anon slid his heavy oaken sword\rbetween the threads, and idly looking off upon the water, carelessly\rand unthinkingly drove home every yarn: I say so strange a dreaminess\rdid there then reign all over the ship and all over the sea, only\rbroken by the intermitting dull sound of the sword, that it seemed as\rif this were the Loom of Time, and I myself were a shuttle mechanically\rweaving and weaving away at the Fates. There lay the fixed threads of\rthe warp subject to but one single, ever returning, unchanging\rvibration, and that vibration merely enough to admit of the crosswise\rinterblending of other threads with its own. This warp seemed\rnecessity; and here, thought I, with my own hand I ply my own shuttle\rand weave my own destiny into these unalterable threads. Meantime,\rQueequeg’s impulsive, indifferent sword, sometimes hitting the woof\rslantingly, or crookedly, or strongly, or weakly, as the case might be;\rand by this difference in the concluding blow producing a corresponding\rcontrast in the final aspect of the completed fabric; this savage’s\rsword, thought I, which thus finally shapes and fashions both warp and\rwoof; this easy, indifferent sword must be chance—aye, chance, free\rwill, and necessity—nowise incompatible—all interweavingly working\rtogether. The straight warp of necessity, not to be swerved from its\rultimate course—its every alternating vibration, indeed, only tending\rto that; free will still free to ply her shuttle between given threads;\rand chance, though restrained in its play within the right lines of\rnecessity, and sideways in its motions directed by free will, though\rthus prescribed to by both, chance by turns rules either, and has the\rlast featuring blow at events.\r\rThus we were weaving and weaving away when I started at a sound so\rstrange, long drawn, and musically wild and unearthly, that the ball of\rfree will dropped from my hand, and I stood gazing up at the clouds\rwhence that voice dropped like a wing. High aloft in the cross-trees\rwas that mad Gay-Header, Tashtego. His body was reaching eagerly\rforward, his hand stretched out like a wand, and at brief sudden\rintervals he continued his cries. To be sure the same sound was that\rvery moment perhaps being heard all over the seas, from hundreds of\rwhalemen’s look-outs perched as high in the air; but from few of those\rlungs could that accustomed old cry have derived such a marvellous\rcadence as from Tashtego the Indian’s.\r\rAs he stood hovering over you half suspended in air, so wildly and\reagerly peering towards the horizon, you would have thought him some\rprophet or seer beholding the shadows of Fate, and by those wild cries\rannouncing their coming.\r\r“There she blows! there! there! there! she blows! she blows!”\r\r“Where-away?”\r\r“On the lee-beam, about two miles off! a school of them!”\r\rInstantly all was commotion.\r\rThe Sperm Whale blows as a clock ticks, with the same undeviating and\rreliable uniformity. And thereby whalemen distinguish this fish from\rother tribes of his genus.\r\r“There go flukes!” was now the cry from Tashtego; and the whales\rdisappeared.\r\r“Quick, steward!” cried Ahab. “Time! time!”\r\rDough-Boy hurried below, glanced at the watch, and reported the exact\rminute to Ahab.\r\rThe ship was now kept away from the wind, and she went gently rolling\rbefore it. Tashtego reporting that the whales had gone down heading to\rleeward, we confidently looked to see them again directly in advance of\rour bows. For that singular craft at times evinced by the Sperm Whale\rwhen, sounding with his head in one direction, he nevertheless, while\rconcealed beneath the surface, mills round, and swiftly swims off in\rthe opposite quarter—this deceitfulness of his could not now be in\raction; for there was no reason to suppose that the fish seen by\rTashtego had been in any way alarmed, or indeed knew at all of our\rvicinity. One of the men selected for shipkeepers—that is, those not\rappointed to the boats, by this time relieved the Indian at the\rmain-mast head. The sailors at the fore and mizzen had come down; the\rline tubs were fixed in their places; the cranes were thrust out; the\rmainyard was backed, and the three boats swung over the sea like three\rsamphire baskets over high cliffs. Outside of the bulwarks their eager\rcrews with one hand clung to the rail, while one foot was expectantly\rpoised on the gunwale. So look the long line of man-of-war’s men about\rto throw themselves on board an enemy’s ship.\r\rBut at this critical instant a sudden exclamation was heard that took\revery eye from the whale. With a start all glared at dark Ahab, who was\rsurrounded by five dusky phantoms that seemed fresh formed out of air.\r\r\rCHAPTER 48. The First Lowering.\r\rThe phantoms, for so they then seemed, were flitting on the other side\rof the deck, and, with a noiseless celerity, were casting loose the\rtackles and bands of the boat which swung there. This boat had always\rbeen deemed one of the spare boats, though technically called the\rcaptain’s, on account of its hanging from the starboard quarter. The\rfigure that now stood by its bows was tall and swart, with one white\rtooth evilly protruding from its steel-like lips. A rumpled Chinese\rjacket of black cotton funereally invested him, with wide black\rtrowsers of the same dark stuff. But strangely crowning this ebonness\rwas a glistening white plaited turban, the living hair braided and\rcoiled round and round upon his head. Less swart in aspect, the\rcompanions of this figure were of that vivid, tiger-yellow complexion\rpeculiar to some of the aboriginal natives of the Manillas;—a race\rnotorious for a certain diabolism of subtilty, and by some honest white\rmariners supposed to be the paid spies and secret confidential agents\ron the water of the devil, their lord, whose counting-room they suppose\rto be elsewhere.\r\rWhile yet the wondering ship’s company were gazing upon these\rstrangers, Ahab cried out to the white-turbaned old man at their head,\r“All ready there, Fedallah?”\r\r“Ready,” was the half-hissed reply.\r\r“Lower away then; d’ye hear?” shouting across the deck. “Lower away\rthere, I say.”\r\rSuch was the thunder of his voice, that spite of their amazement the\rmen sprang over the rail; the sheaves whirled round in the blocks; with\ra wallow, the three boats dropped into the sea; while, with a\rdexterous, off-handed daring, unknown in any other vocation, the\rsailors, goat-like, leaped down the rolling ship’s side into the tossed\rboats below.\r\rHardly had they pulled out from under the ship’s lee, when a fourth\rkeel, coming from the windward side, pulled round under the stern, and\rshowed the five strangers rowing Ahab, who, standing erect in the\rstern, loudly hailed Starbuck, Stubb, and Flask, to spread themselves\rwidely, so as to cover a large expanse of water. But with all their\reyes again riveted upon the swart Fedallah and his crew, the inmates of\rthe other boats obeyed not the command.\r\r“Captain Ahab?—” said Starbuck.\r\r“Spread yourselves,” cried Ahab; “give way, all four boats. Thou,\rFlask, pull out more to leeward!”\r\r“Aye, aye, sir,” cheerily cried little King-Post, sweeping round his\rgreat steering oar. “Lay back!” addressing his crew.\r“There!—there!—there again! There she blows right ahead, boys!—lay\rback!”\r\r“Never heed yonder yellow boys, Archy.”\r\r“Oh, I don’t mind ’em, sir,” said Archy; “I knew it all before now.\rDidn’t I hear ’em in the hold? And didn’t I tell Cabaco here of it?\rWhat say ye, Cabaco? They are stowaways, Mr. Flask.”\r\r“Pull, pull, my fine hearts-alive; pull, my children; pull, my little\rones,” drawlingly and soothingly sighed Stubb to his crew, some of whom\rstill showed signs of uneasiness. “Why don’t you break your backbones,\rmy boys? What is it you stare at? Those chaps in yonder boat? Tut! They\rare only five more hands come to help us—never mind from where—the more\rthe merrier. Pull, then, do pull; never mind the brimstone—devils are\rgood fellows enough. So, so; there you are now; that’s the stroke for a\rthousand pounds; that’s the stroke to sweep the stakes! Hurrah for the\rgold cup of sperm oil, my heroes! Three cheers, men—all hearts alive!\rEasy, easy; don’t be in a hurry—don’t be in a hurry. Why don’t you snap\ryour oars, you rascals? Bite something, you dogs! So, so, so,\rthen:—softly, softly! That’s it—that’s it! long and strong. Give way\rthere, give way! The devil fetch ye, ye ragamuffin rapscallions; ye are\rall asleep. Stop snoring, ye sleepers, and pull. Pull, will ye? pull,\rcan’t ye? pull, won’t ye? Why in the name of gudgeons and ginger-cakes\rdon’t ye pull?—pull and break something! pull, and start your eyes out!\rHere!” whipping out the sharp knife from his girdle; “every mother’s\rson of ye draw his knife, and pull with the blade between his teeth.\rThat’s it—that’s it. Now ye do something; that looks like it, my\rsteel-bits. Start her—start her, my silver-spoons! Start her,\rmarling-spikes!”\r\rStubb’s exordium to his crew is given here at large, because he had\rrather a peculiar way of talking to them in general, and especially in\rinculcating the religion of rowing. But you must not suppose from this\rspecimen of his sermonizings that he ever flew into downright passions\rwith his congregation. Not at all; and therein consisted his chief\rpeculiarity. He would say the most terrific things to his crew, in a\rtone so strangely compounded of fun and fury, and the fury seemed so\rcalculated merely as a spice to the fun, that no oarsman could hear\rsuch queer invocations without pulling for dear life, and yet pulling\rfor the mere joke of the thing. Besides he all the time looked so easy\rand indolent himself, so loungingly managed his steering-oar, and so\rbroadly gaped—open-mouthed at times—that the mere sight of such a\ryawning commander, by sheer force of contrast, acted like a charm upon\rthe crew. Then again, Stubb was one of those odd sort of humorists,\rwhose jollity is sometimes so curiously ambiguous, as to put all\rinferiors on their guard in the matter of obeying them.\r\rIn obedience to a sign from Ahab, Starbuck was now pulling obliquely\racross Stubb’s bow; and when for a minute or so the two boats were\rpretty near to each other, Stubb hailed the mate.\r\r“Mr. Starbuck! larboard boat there, ahoy! a word with ye, sir, if ye\rplease!”\r\r“Halloa!” returned Starbuck, turning round not a single inch as he\rspoke; still earnestly but whisperingly urging his crew; his face set\rlike a flint from Stubb’s.\r\r“What think ye of those yellow boys, sir!”\r\r“Smuggled on board, somehow, before the ship sailed. (Strong, strong,\rboys!)” in a whisper to his crew, then speaking out loud again: “A sad\rbusiness, Mr. Stubb! (seethe her, seethe her, my lads!) but never mind,\rMr. Stubb, all for the best. Let all your crew pull strong, come what\rwill. (Spring, my men, spring!) There’s hogsheads of sperm ahead, Mr.\rStubb, and that’s what ye came for. (Pull, my boys!) Sperm, sperm’s the\rplay! This at least is duty; duty and profit hand in hand.”\r\r“Aye, aye, I thought as much,” soliloquized Stubb, when the boats\rdiverged, “as soon as I clapt eye on ’em, I thought so. Aye, and that’s\rwhat he went into the after hold for, so often, as Dough-Boy long\rsuspected. They were hidden down there. The White Whale’s at the bottom\rof it. Well, well, so be it! Can’t be helped! All right! Give way, men!\rIt ain’t the White Whale to-day! Give way!”\r\rNow the advent of these outlandish strangers at such a critical instant\ras the lowering of the boats from the deck, this had not unreasonably\rawakened a sort of superstitious amazement in some of the ship’s\rcompany; but Archy’s fancied discovery having some time previous got\rabroad among them, though indeed not credited then, this had in some\rsmall measure prepared them for the event. It took off the extreme edge\rof their wonder; and so what with all this and Stubb’s confident way of\raccounting for their appearance, they were for the time freed from\rsuperstitious surmisings; though the affair still left abundant room\rfor all manner of wild conjectures as to dark Ahab’s precise agency in\rthe matter from the beginning. For me, I silently recalled the\rmysterious shadows I had seen creeping on board the Pequod during the\rdim Nantucket dawn, as well as the enigmatical hintings of the\runaccountable Elijah.\r\rMeantime, Ahab, out of hearing of his officers, having sided the\rfurthest to windward, was still ranging ahead of the other boats; a\rcircumstance bespeaking how potent a crew was pulling him. Those tiger\ryellow creatures of his seemed all steel and whalebone; like five\rtrip-hammers they rose and fell with regular strokes of strength, which\rperiodically started the boat along the water like a horizontal burst\rboiler out of a Mississippi steamer. As for Fedallah, who was seen\rpulling the harpooneer oar, he had thrown aside his black jacket, and\rdisplayed his naked chest with the whole part of his body above the\rgunwale, clearly cut against the alternating depressions of the watery\rhorizon; while at the other end of the boat Ahab, with one arm, like a\rfencer’s, thrown half backward into the air, as if to counterbalance\rany tendency to trip; Ahab was seen steadily managing his steering oar\ras in a thousand boat lowerings ere the White Whale had torn him. All\rat once the outstretched arm gave a peculiar motion and then remained\rfixed, while the boat’s five oars were seen simultaneously peaked. Boat\rand crew sat motionless on the sea. Instantly the three spread boats in\rthe rear paused on their way. The whales had irregularly settled bodily\rdown into the blue, thus giving no distantly discernible token of the\rmovement, though from his closer vicinity Ahab had observed it.\r\r“Every man look out along his oars!” cried Starbuck. “Thou, Queequeg,\rstand up!”\r\rNimbly springing up on the triangular raised box in the bow, the savage\rstood erect there, and with intensely eager eyes gazed off towards the\rspot where the chase had last been descried. Likewise upon the extreme\rstern of the boat where it was also triangularly platformed level with\rthe gunwale, Starbuck himself was seen coolly and adroitly balancing\rhimself to the jerking tossings of his chip of a craft, and silently\reyeing the vast blue eye of the sea.\r\rNot very far distant Flask’s boat was also lying breathlessly still;\rits commander recklessly standing upon the top of the loggerhead, a\rstout sort of post rooted in the keel, and rising some two feet above\rthe level of the stern platform. It is used for catching turns with the\rwhale line. Its top is not more spacious than the palm of a man’s hand,\rand standing upon such a base as that, Flask seemed perched at the\rmast-head of some ship which had sunk to all but her trucks. But little\rKing-Post was small and short, and at the same time little King-Post\rwas full of a large and tall ambition, so that this loggerhead\rstand-point of his did by no means satisfy King-Post.\r\r“I can’t see three seas off; tip us up an oar there, and let me on to\rthat.”\r\rUpon this, Daggoo, with either hand upon the gunwale to steady his way,\rswiftly slid aft, and then erecting himself volunteered his lofty\rshoulders for a pedestal.\r\r“Good a mast-head as any, sir. Will you mount?”\r\r“That I will, and thank ye very much, my fine fellow; only I wish you\rfifty feet taller.”\r\rWhereupon planting his feet firmly against two opposite planks of the\rboat, the gigantic negro, stooping a little, presented his flat palm to\rFlask’s foot, and then putting Flask’s hand on his hearse-plumed head\rand bidding him spring as he himself should toss, with one dexterous\rfling landed the little man high and dry on his shoulders. And here was\rFlask now standing, Daggoo with one lifted arm furnishing him with a\rbreastband to lean against and steady himself by.\r\rAt any time it is a strange sight to the tyro to see with what wondrous\rhabitude of unconscious skill the whaleman will maintain an erect\rposture in his boat, even when pitched about by the most riotously\rperverse and cross-running seas. Still more strange to see him giddily\rperched upon the loggerhead itself, under such circumstances. But the\rsight of little Flask mounted upon gigantic Daggoo was yet more\rcurious; for sustaining himself with a cool, indifferent, easy,\runthought of, barbaric majesty, the noble negro to every roll of the\rsea harmoniously rolled his fine form. On his broad back, flaxen-haired\rFlask seemed a snow-flake. The bearer looked nobler than the rider.\rThough truly vivacious, tumultuous, ostentatious little Flask would now\rand then stamp with impatience; but not one added heave did he thereby\rgive to the negro’s lordly chest. So have I seen Passion and Vanity\rstamping the living magnanimous earth, but the earth did not alter her\rtides and her seasons for that.\r\rMeanwhile Stubb, the third mate, betrayed no such far-gazing\rsolicitudes. The whales might have made one of their regular soundings,\rnot a temporary dive from mere fright; and if that were the case,\rStubb, as his wont in such cases, it seems, was resolved to solace the\rlanguishing interval with his pipe. He withdrew it from his hatband,\rwhere he always wore it aslant like a feather. He loaded it, and rammed\rhome the loading with his thumb-end; but hardly had he ignited his\rmatch across the rough sandpaper of his hand, when Tashtego, his\rharpooneer, whose eyes had been setting to windward like two fixed\rstars, suddenly dropped like light from his erect attitude to his seat,\rcrying out in a quick phrensy of hurry, “Down, down all, and give\rway!—there they are!”\r\rTo a landsman, no whale, nor any sign of a herring, would have been\rvisible at that moment; nothing but a troubled bit of greenish white\rwater, and thin scattered puffs of vapor hovering over it, and\rsuffusingly blowing off to leeward, like the confused scud from white\rrolling billows. The air around suddenly vibrated and tingled, as it\rwere, like the air over intensely heated plates of iron. Beneath this\ratmospheric waving and curling, and partially beneath a thin layer of\rwater, also, the whales were swimming. Seen in advance of all the other\rindications, the puffs of vapor they spouted, seemed their forerunning\rcouriers and detached flying outriders.\r\rAll four boats were now in keen pursuit of that one spot of troubled\rwater and air. But it bade fair to outstrip them; it flew on and on, as\ra mass of interblending bubbles borne down a rapid stream from the\rhills.\r\r“Pull, pull, my good boys,” said Starbuck, in the lowest possible but\rintensest concentrated whisper to his men; while the sharp fixed glance\rfrom his eyes darted straight ahead of the bow, almost seemed as two\rvisible needles in two unerring binnacle compasses. He did not say much\rto his crew, though, nor did his crew say anything to him. Only the\rsilence of the boat was at intervals startlingly pierced by one of his\rpeculiar whispers, now harsh with command, now soft with entreaty.\r\rHow different the loud little King-Post. “Sing out and say something,\rmy hearties. Roar and pull, my thunderbolts! Beach me, beach me on\rtheir black backs, boys; only do that for me, and I’ll sign over to you\rmy Martha’s Vineyard plantation, boys; including wife and children,\rboys. Lay me on—lay me on! O Lord, Lord! but I shall go stark, staring\rmad! See! see that white water!” And so shouting, he pulled his hat\rfrom his head, and stamped up and down on it; then picking it up,\rflirted it far off upon the sea; and finally fell to rearing and\rplunging in the boat’s stern like a crazed colt from the prairie.\r\r“Look at that chap now,” philosophically drawled Stubb, who, with his\runlighted short pipe, mechanically retained between his teeth, at a\rshort distance, followed after—“He’s got fits, that Flask has. Fits?\ryes, give him fits—that’s the very word—pitch fits into ’em. Merrily,\rmerrily, hearts-alive. Pudding for supper, you know;—merry’s the word.\rPull, babes—pull, sucklings—pull, all. But what the devil are you\rhurrying about? Softly, softly, and steadily, my men. Only pull, and\rkeep pulling; nothing more. Crack all your backbones, and bite your\rknives in two—that’s all. Take it easy—why don’t ye take it easy, I\rsay, and burst all your livers and lungs!”\r\rBut what it was that inscrutable Ahab said to that tiger-yellow crew of\rhis—these were words best omitted here; for you live under the blessed\rlight of the evangelical land. Only the infidel sharks in the audacious\rseas may give ear to such words, when, with tornado brow, and eyes of\rred murder, and foam-glued lips, Ahab leaped after his prey.\r\rMeanwhile, all the boats tore on. The repeated specific allusions of\rFlask to “that whale,” as he called the fictitious monster which he\rdeclared to be incessantly tantalizing his boat’s bow with its\rtail—these allusions of his were at times so vivid and life-like, that\rthey would cause some one or two of his men to snatch a fearful look\rover the shoulder. But this was against all rule; for the oarsmen must\rput out their eyes, and ram a skewer through their necks; usage\rpronouncing that they must have no organs but ears, and no limbs but\rarms, in these critical moments.\r\rIt was a sight full of quick wonder and awe! The vast swells of the\romnipotent sea; the surging, hollow roar they made, as they rolled\ralong the eight gunwales, like gigantic bowls in a boundless\rbowling-green; the brief suspended agony of the boat, as it would tip\rfor an instant on the knife-like edge of the sharper waves, that almost\rseemed threatening to cut it in two; the sudden profound dip into the\rwatery glens and hollows; the keen spurrings and goadings to gain the\rtop of the opposite hill; the headlong, sled-like slide down its other\rside;—all these, with the cries of the headsmen and harpooneers, and\rthe shuddering gasps of the oarsmen, with the wondrous sight of the\rivory Pequod bearing down upon her boats with outstretched sails, like\ra wild hen after her screaming brood;—all this was thrilling.\r\rNot the raw recruit, marching from the bosom of his wife into the fever\rheat of his first battle; not the dead man’s ghost encountering the\rfirst unknown phantom in the other world;—neither of these can feel\rstranger and stronger emotions than that man does, who for the first\rtime finds himself pulling into the charmed, churned circle of the\rhunted sperm whale.\r\rThe dancing white water made by the chase was now becoming more and\rmore visible, owing to the increasing darkness of the dun cloud-shadows\rflung upon the sea. The jets of vapor no longer blended, but tilted\reverywhere to right and left; the whales seemed separating their wakes.\rThe boats were pulled more apart; Starbuck giving chase to three whales\rrunning dead to leeward. Our sail was now set, and, with the still\rrising wind, we rushed along; the boat going with such madness through\rthe water, that the lee oars could scarcely be worked rapidly enough to\rescape being torn from the row-locks.\r\rSoon we were running through a suffusing wide veil of mist; neither\rship nor boat to be seen.\r\r“Give way, men,” whispered Starbuck, drawing still further aft the\rsheet of his sail; “there is time to kill a fish yet before the squall\rcomes. There’s white water again!—close to! Spring!”\r\rSoon after, two cries in quick succession on each side of us denoted\rthat the other boats had got fast; but hardly were they overheard, when\rwith a lightning-like hurtling whisper Starbuck said: “Stand up!” and\rQueequeg, harpoon in hand, sprang to his feet.\r\rThough not one of the oarsmen was then facing the life and death peril\rso close to them ahead, yet with their eyes on the intense countenance\rof the mate in the stern of the boat, they knew that the imminent\rinstant had come; they heard, too, an enormous wallowing sound as of\rfifty elephants stirring in their litter. Meanwhile the boat was still\rbooming through the mist, the waves curling and hissing around us like\rthe erected crests of enraged serpents.\r\r“That’s his hump. _There_, _there_, give it to him!” whispered\rStarbuck.\r\rA short rushing sound leaped out of the boat; it was the darted iron of\rQueequeg. Then all in one welded commotion came an invisible push from\rastern, while forward the boat seemed striking on a ledge; the sail\rcollapsed and exploded; a gush of scalding vapor shot up near by;\rsomething rolled and tumbled like an earthquake beneath us. The whole\rcrew were half suffocated as they were tossed helter-skelter into the\rwhite curdling cream of the squall. Squall, whale, and harpoon had all\rblended together; and the whale, merely grazed by the iron, escaped.\r\rThough completely swamped, the boat was nearly unharmed. Swimming round\rit we picked up the floating oars, and lashing them across the gunwale,\rtumbled back to our places. There we sat up to our knees in the sea,\rthe water covering every rib and plank, so that to our downward gazing\reyes the suspended craft seemed a coral boat grown up to us from the\rbottom of the ocean.\r\rThe wind increased to a howl; the waves dashed their bucklers together;\rthe whole squall roared, forked, and crackled around us like a white\rfire upon the prairie, in which, unconsumed, we were burning; immortal\rin these jaws of death! In vain we hailed the other boats; as well roar\rto the live coals down the chimney of a flaming furnace as hail those\rboats in that storm. Meanwhile the driving scud, rack, and mist, grew\rdarker with the shadows of night; no sign of the ship could be seen.\rThe rising sea forbade all attempts to bale out the boat. The oars were\ruseless as propellers, performing now the office of life-preservers.\rSo, cutting the lashing of the waterproof match keg, after many\rfailures Starbuck contrived to ignite the lamp in the lantern; then\rstretching it on a waif pole, handed it to Queequeg as the\rstandard-bearer of this forlorn hope. There, then, he sat, holding up\rthat imbecile candle in the heart of that almighty forlornness. There,\rthen, he sat, the sign and symbol of a man without faith, hopelessly\rholding up hope in the midst of despair.\r\rWet, drenched through, and shivering cold, despairing of ship or boat,\rwe lifted up our eyes as the dawn came on. The mist still spread over\rthe sea, the empty lantern lay crushed in the bottom of the boat.\rSuddenly Queequeg started to his feet, hollowing his hand to his ear.\rWe all heard a faint creaking, as of ropes and yards hitherto muffled\rby the storm. The sound came nearer and nearer; the thick mists were\rdimly parted by a huge, vague form. Affrighted, we all sprang into the\rsea as the ship at last loomed into view, bearing right down upon us\rwithin a distance of not much more than its length.\r\rFloating on the waves we saw the abandoned boat, as for one instant it\rtossed and gaped beneath the ship’s bows like a chip at the base of a\rcataract; and then the vast hull rolled over it, and it was seen no\rmore till it came up weltering astern. Again we swam for it, were\rdashed against it by the seas, and were at last taken up and safely\rlanded on board. Ere the squall came close to, the other boats had cut\rloose from their fish and returned to the ship in good time. The ship\rhad given us up, but was still cruising, if haply it might light upon\rsome token of our perishing,—an oar or a lance pole.\r\r\rCHAPTER 49. The Hyena.\r\rThere are certain queer times and occasions in this strange mixed\raffair we call life when a man takes this whole universe for a vast\rpractical joke, though the wit thereof he but dimly discerns, and more\rthan suspects that the joke is at nobody’s expense but his own.\rHowever, nothing dispirits, and nothing seems worth while disputing. He\rbolts down all events, all creeds, and beliefs, and persuasions, all\rhard things visible and invisible, never mind how knobby; as an ostrich\rof potent digestion gobbles down bullets and gun flints. And as for\rsmall difficulties and worryings, prospects of sudden disaster, peril\rof life and limb; all these, and death itself, seem to him only sly,\rgood-natured hits, and jolly punches in the side bestowed by the unseen\rand unaccountable old joker. That odd sort of wayward mood I am\rspeaking of, comes over a man only in some time of extreme tribulation;\rit comes in the very midst of his earnestness, so that what just before\rmight have seemed to him a thing most momentous, now seems but a part\rof the general joke. There is nothing like the perils of whaling to\rbreed this free and easy sort of genial, desperado philosophy; and with\rit I now regarded this whole voyage of the Pequod, and the great White\rWhale its object.\r\r“Queequeg,” said I, when they had dragged me, the last man, to the\rdeck, and I was still shaking myself in my jacket to fling off the\rwater; “Queequeg, my fine friend, does this sort of thing often\rhappen?” Without much emotion, though soaked through just like me, he\rgave me to understand that such things did often happen.\r\r“Mr. Stubb,” said I, turning to that worthy, who, buttoned up in his\roil-jacket, was now calmly smoking his pipe in the rain; “Mr. Stubb, I\rthink I have heard you say that of all whalemen you ever met, our chief\rmate, Mr. Starbuck, is by far the most careful and prudent. I suppose\rthen, that going plump on a flying whale with your sail set in a foggy\rsquall is the height of a whaleman’s discretion?”\r\r“Certain. I’ve lowered for whales from a leaking ship in a gale off\rCape Horn.”\r\r“Mr. Flask,” said I, turning to little King-Post, who was standing\rclose by; “you are experienced in these things, and I am not. Will you\rtell me whether it is an unalterable law in this fishery, Mr. Flask,\rfor an oarsman to break his own back pulling himself back-foremost into\rdeath’s jaws?”\r\r“Can’t you twist that smaller?” said Flask. “Yes, that’s the law. I\rshould like to see a boat’s crew backing water up to a whale face\rforemost. Ha, ha! the whale would give them squint for squint, mind\rthat!”\r\rHere then, from three impartial witnesses, I had a deliberate statement\rof the entire case. Considering, therefore, that squalls and capsizings\rin the water and consequent bivouacks on the deep, were matters of\rcommon occurrence in this kind of life; considering that at the\rsuperlatively critical instant of going on to the whale I must resign\rmy life into the hands of him who steered the boat—oftentimes a fellow\rwho at that very moment is in his impetuousness upon the point of\rscuttling the craft with his own frantic stampings; considering that\rthe particular disaster to our own particular boat was chiefly to be\rimputed to Starbuck’s driving on to his whale almost in the teeth of a\rsquall, and considering that Starbuck, notwithstanding, was famous for\rhis great heedfulness in the fishery; considering that I belonged to\rthis uncommonly prudent Starbuck’s boat; and finally considering in\rwhat a devil’s chase I was implicated, touching the White Whale: taking\rall things together, I say, I thought I might as well go below and make\ra rough draft of my will. “Queequeg,” said I, “come along, you shall be\rmy lawyer, executor, and legatee.”\r\rIt may seem strange that of all men sailors should be tinkering at\rtheir last wills and testaments, but there are no people in the world\rmore fond of that diversion. This was the fourth time in my nautical\rlife that I had done the same thing. After the ceremony was concluded\rupon the present occasion, I felt all the easier; a stone was rolled\raway from my heart. Besides, all the days I should now live would be as\rgood as the days that Lazarus lived after his resurrection; a\rsupplementary clean gain of so many months or weeks as the case might\rbe. I survived myself; my death and burial were locked up in my chest.\rI looked round me tranquilly and contentedly, like a quiet ghost with a\rclean conscience sitting inside the bars of a snug family vault.\r\rNow then, thought I, unconsciously rolling up the sleeves of my frock,\rhere goes for a cool, collected dive at death and destruction, and the\rdevil fetch the hindmost.\r\r\rCHAPTER 50. Ahab’s Boat and Crew. Fedallah.\r\r“Who would have thought it, Flask!” cried Stubb; “if I had but one leg\ryou would not catch me in a boat, unless maybe to stop the plug-hole\rwith my timber toe. Oh! he’s a wonderful old man!”\r\r“I don’t think it so strange, after all, on that account,” said Flask.\r“If his leg were off at the hip, now, it would be a different thing.\rThat would disable him; but he has one knee, and good part of the other\rleft, you know.”\r\r“I don’t know that, my little man; I never yet saw him kneel.”\r\rAmong whale-wise people it has often been argued whether, considering\rthe paramount importance of his life to the success of the voyage, it\ris right for a whaling captain to jeopardize that life in the active\rperils of the chase. So Tamerlane’s soldiers often argued with tears in\rtheir eyes, whether that invaluable life of his ought to be carried\rinto the thickest of the fight.\r\rBut with Ahab the question assumed a modified aspect. Considering that\rwith two legs man is but a hobbling wight in all times of danger;\rconsidering that the pursuit of whales is always under great and\rextraordinary difficulties; that every individual moment, indeed, then\rcomprises a peril; under these circumstances is it wise for any maimed\rman to enter a whale-boat in the hunt? As a general thing, the\rjoint-owners of the Pequod must have plainly thought not.\r\rAhab well knew that although his friends at home would think little of\rhis entering a boat in certain comparatively harmless vicissitudes of\rthe chase, for the sake of being near the scene of action and giving\rhis orders in person, yet for Captain Ahab to have a boat actually\rapportioned to him as a regular headsman in the hunt—above all for\rCaptain Ahab to be supplied with five extra men, as that same boat’s\rcrew, he well knew that such generous conceits never entered the heads\rof the owners of the Pequod. Therefore he had not solicited a boat’s\rcrew from them, nor had he in any way hinted his desires on that head.\rNevertheless he had taken private measures of his own touching all that\rmatter. Until Cabaco’s published discovery, the sailors had little\rforeseen it, though to be sure when, after being a little while out of\rport, all hands had concluded the customary business of fitting the\rwhaleboats for service; when some time after this Ahab was now and then\rfound bestirring himself in the matter of making thole-pins with his\rown hands for what was thought to be one of the spare boats, and even\rsolicitously cutting the small wooden skewers, which when the line is\rrunning out are pinned over the groove in the bow: when all this was\robserved in him, and particularly his solicitude in having an extra\rcoat of sheathing in the bottom of the boat, as if to make it better\rwithstand the pointed pressure of his ivory limb; and also the anxiety\rhe evinced in exactly shaping the thigh board, or clumsy cleat, as it\ris sometimes called, the horizontal piece in the boat’s bow for bracing\rthe knee against in darting or stabbing at the whale; when it was\robserved how often he stood up in that boat with his solitary knee\rfixed in the semi-circular depression in the cleat, and with the\rcarpenter’s chisel gouged out a little here and straightened it a\rlittle there; all these things, I say, had awakened much interest and\rcuriosity at the time. But almost everybody supposed that this\rparticular preparative heedfulness in Ahab must only be with a view to\rthe ultimate chase of Moby Dick; for he had already revealed his\rintention to hunt that mortal monster in person. But such a supposition\rdid by no means involve the remotest suspicion as to any boat’s crew\rbeing assigned to that boat.\r\rNow, with the subordinate phantoms, what wonder remained soon waned\raway; for in a whaler wonders soon wane. Besides, now and then such\runaccountable odds and ends of strange nations come up from the unknown\rnooks and ash-holes of the earth to man these floating outlaws of\rwhalers; and the ships themselves often pick up such queer castaway\rcreatures found tossing about the open sea on planks, bits of wreck,\roars, whaleboats, canoes, blown-off Japanese junks, and what not; that\rBeelzebub himself might climb up the side and step down into the cabin\rto chat with the captain, and it would not create any unsubduable\rexcitement in the forecastle.\r\rBut be all this as it may, certain it is that while the subordinate\rphantoms soon found their place among the crew, though still as it were\rsomehow distinct from them, yet that hair-turbaned Fedallah remained a\rmuffled mystery to the last. Whence he came in a mannerly world like\rthis, by what sort of unaccountable tie he soon evinced himself to be\rlinked with Ahab’s peculiar fortunes; nay, so far as to have some sort\rof a half-hinted influence; Heaven knows, but it might have been even\rauthority over him; all this none knew. But one cannot sustain an\rindifferent air concerning Fedallah. He was such a creature as\rcivilized, domestic people in the temperate zone only see in their\rdreams, and that but dimly; but the like of whom now and then glide\ramong the unchanging Asiatic communities, especially the Oriental isles\rto the east of the continent—those insulated, immemorial, unalterable\rcountries, which even in these modern days still preserve much of the\rghostly aboriginalness of earth’s primal generations, when the memory\rof the first man was a distinct recollection, and all men his\rdescendants, unknowing whence he came, eyed each other as real\rphantoms, and asked of the sun and the moon why they were created and\rto what end; when though, according to Genesis, the angels indeed\rconsorted with the daughters of men, the devils also, add the\runcanonical Rabbins, indulged in mundane amours.\r\r\rCHAPTER 51. The Spirit-Spout.\r\rDays, weeks passed, and under easy sail, the ivory Pequod had slowly\rswept across four several cruising-grounds; that off the Azores; off\rthe Cape de Verdes; on the Plate (so called), being off the mouth of\rthe Rio de la Plata; and the Carrol Ground, an unstaked, watery\rlocality, southerly from St. Helena.\r\rIt was while gliding through these latter waters that one serene and\rmoonlight night, when all the waves rolled by like scrolls of silver;\rand, by their soft, suffusing seethings, made what seemed a silvery\rsilence, not a solitude; on such a silent night a silvery jet was seen\rfar in advance of the white bubbles at the bow. Lit up by the moon, it\rlooked celestial; seemed some plumed and glittering god uprising from\rthe sea. Fedallah first descried this jet. For of these moonlight\rnights, it was his wont to mount to the main-mast head, and stand a\rlook-out there, with the same precision as if it had been day. And yet,\rthough herds of whales were seen by night, not one whaleman in a\rhundred would venture a lowering for them. You may think with what\remotions, then, the seamen beheld this old Oriental perched aloft at\rsuch unusual hours; his turban and the moon, companions in one sky. But\rwhen, after spending his uniform interval there for several successive\rnights without uttering a single sound; when, after all this silence,\rhis unearthly voice was heard announcing that silvery, moon-lit jet,\revery reclining mariner started to his feet as if some winged spirit\rhad lighted in the rigging, and hailed the mortal crew. “There she\rblows!” Had the trump of judgment blown, they could not have quivered\rmore; yet still they felt no terror; rather pleasure. For though it was\ra most unwonted hour, yet so impressive was the cry, and so deliriously\rexciting, that almost every soul on board instinctively desired a\rlowering.\r\rWalking the deck with quick, side-lunging strides, Ahab commanded the\rt’gallant sails and royals to be set, and every stunsail spread. The\rbest man in the ship must take the helm. Then, with every mast-head\rmanned, the piled-up craft rolled down before the wind. The strange,\rupheaving, lifting tendency of the taffrail breeze filling the hollows\rof so many sails, made the buoyant, hovering deck to feel like air\rbeneath the feet; while still she rushed along, as if two antagonistic\rinfluences were struggling in her—one to mount direct to heaven, the\rother to drive yawingly to some horizontal goal. And had you watched\rAhab’s face that night, you would have thought that in him also two\rdifferent things were warring. While his one live leg made lively\rechoes along the deck, every stroke of his dead limb sounded like a\rcoffin-tap. On life and death this old man walked. But though the ship\rso swiftly sped, and though from every eye, like arrows, the eager\rglances shot, yet the silvery jet was no more seen that night. Every\rsailor swore he saw it once, but not a second time.\r\rThis midnight-spout had almost grown a forgotten thing, when, some days\rafter, lo! at the same silent hour, it was again announced: again it\rwas descried by all; but upon making sail to overtake it, once more it\rdisappeared as if it had never been. And so it served us night after\rnight, till no one heeded it but to wonder at it. Mysteriously jetted\rinto the clear moonlight, or starlight, as the case might be;\rdisappearing again for one whole day, or two days, or three; and\rsomehow seeming at every distinct repetition to be advancing still\rfurther and further in our van, this solitary jet seemed for ever\ralluring us on.\r\rNor with the immemorial superstition of their race, and in accordance\rwith the preternaturalness, as it seemed, which in many things invested\rthe Pequod, were there wanting some of the seamen who swore that\rwhenever and wherever descried; at however remote times, or in however\rfar apart latitudes and longitudes, that unnearable spout was cast by\rone self-same whale; and that whale, Moby Dick. For a time, there\rreigned, too, a sense of peculiar dread at this flitting apparition, as\rif it were treacherously beckoning us on and on, in order that the\rmonster might turn round upon us, and rend us at last in the remotest\rand most savage seas.\r\rThese temporary apprehensions, so vague but so awful, derived a\rwondrous potency from the contrasting serenity of the weather, in\rwhich, beneath all its blue blandness, some thought there lurked a\rdevilish charm, as for days and days we voyaged along, through seas so\rwearily, lonesomely mild, that all space, in repugnance to our vengeful\rerrand, seemed vacating itself of life before our urn-like prow.\r\rBut, at last, when turning to the eastward, the Cape winds began\rhowling around us, and we rose and fell upon the long, troubled seas\rthat are there; when the ivory-tusked Pequod sharply bowed to the\rblast, and gored the dark waves in her madness, till, like showers of\rsilver chips, the foam-flakes flew over her bulwarks; then all this\rdesolate vacuity of life went away, but gave place to sights more\rdismal than before.\r\rClose to our bows, strange forms in the water darted hither and thither\rbefore us; while thick in our rear flew the inscrutable sea-ravens. And\revery morning, perched on our stays, rows of these birds were seen; and\rspite of our hootings, for a long time obstinately clung to the hemp,\ras though they deemed our ship some drifting, uninhabited craft; a\rthing appointed to desolation, and therefore fit roosting-place for\rtheir homeless selves. And heaved and heaved, still unrestingly heaved\rthe black sea, as if its vast tides were a conscience; and the great\rmundane soul were in anguish and remorse for the long sin and suffering\rit had bred.\r\rCape of Good Hope, do they call ye? Rather Cape Tormentoso, as called\rof yore; for long allured by the perfidious silences that before had\rattended us, we found ourselves launched into this tormented sea, where\rguilty beings transformed into those fowls and these fish, seemed\rcondemned to swim on everlastingly without any haven in store, or beat\rthat black air without any horizon. But calm, snow-white, and\runvarying; still directing its fountain of feathers to the sky; still\rbeckoning us on from before, the solitary jet would at times be\rdescried.\r\rDuring all this blackness of the elements, Ahab, though assuming for\rthe time the almost continual command of the drenched and dangerous\rdeck, manifested the gloomiest reserve; and more seldom than ever\raddressed his mates. In tempestuous times like these, after everything\rabove and aloft has been secured, nothing more can be done but\rpassively to await the issue of the gale. Then Captain and crew become\rpractical fatalists. So, with his ivory leg inserted into its\raccustomed hole, and with one hand firmly grasping a shroud, Ahab for\rhours and hours would stand gazing dead to windward, while an\roccasional squall of sleet or snow would all but congeal his very\reyelashes together. Meantime, the crew driven from the forward part of\rthe ship by the perilous seas that burstingly broke over its bows,\rstood in a line along the bulwarks in the waist; and the better to\rguard against the leaping waves, each man had slipped himself into a\rsort of bowline secured to the rail, in which he swung as in a loosened\rbelt. Few or no words were spoken; and the silent ship, as if manned by\rpainted sailors in wax, day after day tore on through all the swift\rmadness and gladness of the demoniac waves. By night the same muteness\rof humanity before the shrieks of the ocean prevailed; still in silence\rthe men swung in the bowlines; still wordless Ahab stood up to the\rblast. Even when wearied nature seemed demanding repose he would not\rseek that repose in his hammock. Never could Starbuck forget the old\rman’s aspect, when one night going down into the cabin to mark how the\rbarometer stood, he saw him with closed eyes sitting straight in his\rfloor-screwed chair; the rain and half-melted sleet of the storm from\rwhich he had some time before emerged, still slowly dripping from the\runremoved hat and coat. On the table beside him lay unrolled one of\rthose charts of tides and currents which have previously been spoken\rof. His lantern swung from his tightly clenched hand. Though the body\rwas erect, the head was thrown back so that the closed eyes were\rpointed towards the needle of the tell-tale that swung from a beam in\rthe ceiling.*\r\r*The cabin-compass is called the tell-tale, because without going to\rthe compass at the helm, the Captain, while below, can inform himself\rof the course of the ship.\r\rTerrible old man! thought Starbuck with a shudder, sleeping in this\rgale, still thou steadfastly eyest thy purpose.\r\r\rCHAPTER 52. The Albatross.\r\rSouth-eastward from the Cape, off the distant Crozetts, a good cruising\rground for Right Whalemen, a sail loomed ahead, the Goney (Albatross)\rby name. As she slowly drew nigh, from my lofty perch at the\rfore-mast-head, I had a good view of that sight so remarkable to a tyro\rin the far ocean fisheries—a whaler at sea, and long absent from home.\r\rAs if the waves had been fullers, this craft was bleached like the\rskeleton of a stranded walrus. All down her sides, this spectral\rappearance was traced with long channels of reddened rust, while all\rher spars and her rigging were like the thick branches of trees furred\rover with hoar-frost. Only her lower sails were set. A wild sight it\rwas to see her long-bearded look-outs at those three mast-heads. They\rseemed clad in the skins of beasts, so torn and bepatched the raiment\rthat had survived nearly four years of cruising. Standing in iron hoops\rnailed to the mast, they swayed and swung over a fathomless sea; and\rthough, when the ship slowly glided close under our stern, we six men\rin the air came so nigh to each other that we might almost have leaped\rfrom the mast-heads of one ship to those of the other; yet, those\rforlorn-looking fishermen, mildly eyeing us as they passed, said not\rone word to our own look-outs, while the quarter-deck hail was being\rheard from below.\r\r“Ship ahoy! Have ye seen the White Whale?”\r\rBut as the strange captain, leaning over the pallid bulwarks, was in\rthe act of putting his trumpet to his mouth, it somehow fell from his\rhand into the sea; and the wind now rising amain, he in vain strove to\rmake himself heard without it. Meantime his ship was still increasing\rthe distance between. While in various silent ways the seamen of the\rPequod were evincing their observance of this ominous incident at the\rfirst mere mention of the White Whale’s name to another ship, Ahab for\ra moment paused; it almost seemed as though he would have lowered a\rboat to board the stranger, had not the threatening wind forbade. But\rtaking advantage of his windward position, he again seized his trumpet,\rand knowing by her aspect that the stranger vessel was a Nantucketer\rand shortly bound home, he loudly hailed—“Ahoy there! This is the\rPequod, bound round the world! Tell them to address all future letters\rto the Pacific ocean! and this time three years, if I am not at home,\rtell them to address them to ——”\r\rAt that moment the two wakes were fairly crossed, and instantly, then,\rin accordance with their singular ways, shoals of small harmless fish,\rthat for some days before had been placidly swimming by our side,\rdarted away with what seemed shuddering fins, and ranged themselves\rfore and aft with the stranger’s flanks. Though in the course of his\rcontinual voyagings Ahab must often before have noticed a similar\rsight, yet, to any monomaniac man, the veriest trifles capriciously\rcarry meanings.\r\r“Swim away from me, do ye?” murmured Ahab, gazing over into the water.\rThere seemed but little in the words, but the tone conveyed more of\rdeep helpless sadness than the insane old man had ever before evinced.\rBut turning to the steersman, who thus far had been holding the ship in\rthe wind to diminish her headway, he cried out in his old lion\rvoice,—“Up helm! Keep her off round the world!”\r\rRound the world! There is much in that sound to inspire proud feelings;\rbut whereto does all that circumnavigation conduct? Only through\rnumberless perils to the very point whence we started, where those that\rwe left behind secure, were all the time before us.\r\rWere this world an endless plain, and by sailing eastward we could for\rever reach new distances, and discover sights more sweet and strange\rthan any Cyclades or Islands of King Solomon, then there were promise\rin the voyage. But in pursuit of those far mysteries we dream of, or in\rtormented chase of that demon phantom that, some time or other, swims\rbefore all human hearts; while chasing such over this round globe, they\reither lead us on in barren mazes or midway leave us whelmed.\r\r\rCHAPTER 53. The Gam.\r\rThe ostensible reason why Ahab did not go on board of the whaler we had\rspoken was this: the wind and sea betokened storms. But even had this\rnot been the case, he would not after all, perhaps, have boarded\rher—judging by his subsequent conduct on similar occasions—if so it had\rbeen that, by the process of hailing, he had obtained a negative answer\rto the question he put. For, as it eventually turned out, he cared not\rto consort, even for five minutes, with any stranger captain, except he\rcould contribute some of that information he so absorbingly sought. But\rall this might remain inadequately estimated, were not something said\rhere of the peculiar usages of whaling-vessels when meeting each other\rin foreign seas, and especially on a common cruising-ground.\r\rIf two strangers crossing the Pine Barrens in New York State, or the\requally desolate Salisbury Plain in England; if casually encountering\reach other in such inhospitable wilds, these twain, for the life of\rthem, cannot well avoid a mutual salutation; and stopping for a moment\rto interchange the news; and, perhaps, sitting down for a while and\rresting in concert: then, how much more natural that upon the\rillimitable Pine Barrens and Salisbury Plains of the sea, two whaling\rvessels descrying each other at the ends of the earth—off lone\rFanning’s Island, or the far away King’s Mills; how much more natural,\rI say, that under such circumstances these ships should not only\rinterchange hails, but come into still closer, more friendly and\rsociable contact. And especially would this seem to be a matter of\rcourse, in the case of vessels owned in one seaport, and whose\rcaptains, officers, and not a few of the men are personally known to\reach other; and consequently, have all sorts of dear domestic things to\rtalk about.\r\rFor the long absent ship, the outward-bounder, perhaps, has letters on\rboard; at any rate, she will be sure to let her have some papers of a\rdate a year or two later than the last one on her blurred and\rthumb-worn files. And in return for that courtesy, the outward-bound\rship would receive the latest whaling intelligence from the\rcruising-ground to which she may be destined, a thing of the utmost\rimportance to her. And in degree, all this will hold true concerning\rwhaling vessels crossing each other’s track on the cruising-ground\ritself, even though they are equally long absent from home. For one of\rthem may have received a transfer of letters from some third, and now\rfar remote vessel; and some of those letters may be for the people of\rthe ship she now meets. Besides, they would exchange the whaling news,\rand have an agreeable chat. For not only would they meet with all the\rsympathies of sailors, but likewise with all the peculiar\rcongenialities arising from a common pursuit and mutually shared\rprivations and perils.\r\rNor would difference of country make any very essential difference;\rthat is, so long as both parties speak one language, as is the case\rwith Americans and English. Though, to be sure, from the small number\rof English whalers, such meetings do not very often occur, and when\rthey do occur there is too apt to be a sort of shyness between them;\rfor your Englishman is rather reserved, and your Yankee, he does not\rfancy that sort of thing in anybody but himself. Besides, the English\rwhalers sometimes affect a kind of metropolitan superiority over the\rAmerican whalers; regarding the long, lean Nantucketer, with his\rnondescript provincialisms, as a sort of sea-peasant. But where this\rsuperiority in the English whalemen does really consist, it would be\rhard to say, seeing that the Yankees in one day, collectively, kill\rmore whales than all the English, collectively, in ten years. But this\ris a harmless little foible in the English whale-hunters, which the\rNantucketer does not take much to heart; probably, because he knows\rthat he has a few foibles himself.\r\rSo, then, we see that of all ships separately sailing the sea, the\rwhalers have most reason to be sociable—and they are so. Whereas, some\rmerchant ships crossing each other’s wake in the mid-Atlantic, will\roftentimes pass on without so much as a single word of recognition,\rmutually cutting each other on the high seas, like a brace of dandies\rin Broadway; and all the time indulging, perhaps, in finical criticism\rupon each other’s rig. As for Men-of-War, when they chance to meet at\rsea, they first go through such a string of silly bowings and\rscrapings, such a ducking of ensigns, that there does not seem to be\rmuch right-down hearty good-will and brotherly love about it at all. As\rtouching Slave-ships meeting, why, they are in such a prodigious hurry,\rthey run away from each other as soon as possible. And as for Pirates,\rwhen they chance to cross each other’s cross-bones, the first hail\ris—“How many skulls?”—the same way that whalers hail—“How many\rbarrels?” And that question once answered, pirates straightway steer\rapart, for they are infernal villains on both sides, and don’t like to\rsee overmuch of each other’s villanous likenesses.\r\rBut look at the godly, honest, unostentatious, hospitable, sociable,\rfree-and-easy whaler! What does the whaler do when she meets another\rwhaler in any sort of decent weather? She has a “_Gam_,” a thing so\rutterly unknown to all other ships that they never heard of the name\reven; and if by chance they should hear of it, they only grin at it,\rand repeat gamesome stuff about “spouters” and “blubber-boilers,” and\rsuch like pretty exclamations. Why it is that all Merchant-seamen, and\ralso all Pirates and Man-of-War’s men, and Slave-ship sailors, cherish\rsuch a scornful feeling towards Whale-ships; this is a question it\rwould be hard to answer. Because, in the case of pirates, say, I should\rlike to know whether that profession of theirs has any peculiar glory\rabout it. It sometimes ends in uncommon elevation, indeed; but only at\rthe gallows. And besides, when a man is elevated in that odd fashion,\rhe has no proper foundation for his superior altitude. Hence, I\rconclude, that in boasting himself to be high lifted above a whaleman,\rin that assertion the pirate has no solid basis to stand on.\r\rBut what is a _Gam?_ You might wear out your index-finger running up\rand down the columns of dictionaries, and never find the word. Dr.\rJohnson never attained to that erudition; Noah Webster’s ark does not\rhold it. Nevertheless, this same expressive word has now for many years\rbeen in constant use among some fifteen thousand true born Yankees.\rCertainly, it needs a definition, and should be incorporated into the\rLexicon. With that view, let me learnedly define it.\r\rGAM. NOUN—_A social meeting of two_ (_or more_) _Whaleships, generally\ron a cruising-ground; when, after exchanging hails, they exchange\rvisits by boats’ crews: the two captains remaining, for the time, on\rboard of one ship, and the two chief mates on the other._\r\rThere is another little item about Gamming which must not be forgotten\rhere. All professions have their own little peculiarities of detail; so\rhas the whale fishery. In a pirate, man-of-war, or slave ship, when the\rcaptain is rowed anywhere in his boat, he always sits in the stern\rsheets on a comfortable, sometimes cushioned seat there, and often\rsteers himself with a pretty little milliner’s tiller decorated with\rgay cords and ribbons. But the whale-boat has no seat astern, no sofa\rof that sort whatever, and no tiller at all. High times indeed, if\rwhaling captains were wheeled about the water on castors like gouty old\raldermen in patent chairs. And as for a tiller, the whale-boat never\radmits of any such effeminacy; and therefore as in gamming a complete\rboat’s crew must leave the ship, and hence as the boat steerer or\rharpooneer is of the number, that subordinate is the steersman upon the\roccasion, and the captain, having no place to sit in, is pulled off to\rhis visit all standing like a pine tree. And often you will notice that\rbeing conscious of the eyes of the whole visible world resting on him\rfrom the sides of the two ships, this standing captain is all alive to\rthe importance of sustaining his dignity by maintaining his legs. Nor\ris this any very easy matter; for in his rear is the immense projecting\rsteering oar hitting him now and then in the small of his back, the\rafter-oar reciprocating by rapping his knees in front. He is thus\rcompletely wedged before and behind, and can only expand himself\rsideways by settling down on his stretched legs; but a sudden, violent\rpitch of the boat will often go far to topple him, because length of\rfoundation is nothing without corresponding breadth. Merely make a\rspread angle of two poles, and you cannot stand them up. Then, again,\rit would never do in plain sight of the world’s riveted eyes, it would\rnever do, I say, for this straddling captain to be seen steadying\rhimself the slightest particle by catching hold of anything with his\rhands; indeed, as token of his entire, buoyant self-command, he\rgenerally carries his hands in his trowsers’ pockets; but perhaps being\rgenerally very large, heavy hands, he carries them there for ballast.\rNevertheless there have occurred instances, well authenticated ones\rtoo, where the captain has been known for an uncommonly critical moment\ror two, in a sudden squall say—to seize hold of the nearest oarsman’s\rhair, and hold on there like grim death.\r\r\rCHAPTER 54. The Town-Ho’s Story.\r\r(_As told at the Golden Inn._)\r\rThe Cape of Good Hope, and all the watery region round about there, is\rmuch like some noted four corners of a great highway, where you meet\rmore travellers than in any other part.\r\rIt was not very long after speaking the Goney that another\rhomeward-bound whaleman, the Town-Ho,* was encountered. She was manned\ralmost wholly by Polynesians. In the short gam that ensued she gave us\rstrong news of Moby Dick. To some the general interest in the White\rWhale was now wildly heightened by a circumstance of the Town-Ho’s\rstory, which seemed obscurely to involve with the whale a certain\rwondrous, inverted visitation of one of those so called judgments of\rGod which at times are said to overtake some men. This latter\rcircumstance, with its own particular accompaniments, forming what may\rbe called the secret part of the tragedy about to be narrated, never\rreached the ears of Captain Ahab or his mates. For that secret part of\rthe story was unknown to the captain of the Town-Ho himself. It was the\rprivate property of three confederate white seamen of that ship, one of\rwhom, it seems, communicated it to Tashtego with Romish injunctions of\rsecrecy, but the following night Tashtego rambled in his sleep, and\rrevealed so much of it in that way, that when he was wakened he could\rnot well withhold the rest. Nevertheless, so potent an influence did\rthis thing have on those seamen in the Pequod who came to the full\rknowledge of it, and by such a strange delicacy, to call it so, were\rthey governed in this matter, that they kept the secret among\rthemselves so that it never transpired abaft the Pequod’s main-mast.\rInterweaving in its proper place this darker thread with the story as\rpublicly narrated on the ship, the whole of this strange affair I now\rproceed to put on lasting record.\r\r*The ancient whale-cry upon first sighting a whale from the mast-head,\rstill used by whalemen in hunting the famous Gallipagos terrapin.\r\rFor my humor’s sake, I shall preserve the style in which I once\rnarrated it at Lima, to a lounging circle of my Spanish friends, one\rsaint’s eve, smoking upon the thick-gilt tiled piazza of the Golden\rInn. Of those fine cavaliers, the young Dons, Pedro and Sebastian, were\ron the closer terms with me; and hence the interluding questions they\roccasionally put, and which are duly answered at the time.\r\r“Some two years prior to my first learning the events which I am about\rrehearsing to you, gentlemen, the Town-Ho, Sperm Whaler of Nantucket,\rwas cruising in your Pacific here, not very many days’ sail eastward\rfrom the eaves of this good Golden Inn. She was somewhere to the\rnorthward of the Line. One morning upon handling the pumps, according\rto daily usage, it was observed that she made more water in her hold\rthan common. They supposed a sword-fish had stabbed her, gentlemen. But\rthe captain, having some unusual reason for believing that rare good\rluck awaited him in those latitudes; and therefore being very averse to\rquit them, and the leak not being then considered at all dangerous,\rthough, indeed, they could not find it after searching the hold as low\rdown as was possible in rather heavy weather, the ship still continued\rher cruisings, the mariners working at the pumps at wide and easy\rintervals; but no good luck came; more days went by, and not only was\rthe leak yet undiscovered, but it sensibly increased. So much so, that\rnow taking some alarm, the captain, making all sail, stood away for the\rnearest harbor among the islands, there to have his hull hove out and\rrepaired.\r\r“Though no small passage was before her, yet, if the commonest chance\rfavoured, he did not at all fear that his ship would founder by the\rway, because his pumps were of the best, and being periodically\rrelieved at them, those six-and-thirty men of his could easily keep the\rship free; never mind if the leak should double on her. In truth, well\rnigh the whole of this passage being attended by very prosperous\rbreezes, the Town-Ho had all but certainly arrived in perfect safety at\rher port without the occurrence of the least fatality, had it not been\rfor the brutal overbearing of Radney, the mate, a Vineyarder, and the\rbitterly provoked vengeance of Steelkilt, a Lakeman and desperado from\rBuffalo.\r\r“‘Lakeman!—Buffalo! Pray, what is a Lakeman, and where is Buffalo?’\rsaid Don Sebastian, rising in his swinging mat of grass.\r\r“On the eastern shore of our Lake Erie, Don; but—I crave your\rcourtesy—may be, you shall soon hear further of all that. Now,\rgentlemen, in square-sail brigs and three-masted ships, well-nigh as\rlarge and stout as any that ever sailed out of your old Callao to far\rManilla; this Lakeman, in the land-locked heart of our America, had yet\rbeen nurtured by all those agrarian freebooting impressions popularly\rconnected with the open ocean. For in their interflowing aggregate,\rthose grand fresh-water seas of ours,—Erie, and Ontario, and Huron, and\rSuperior, and Michigan,—possess an ocean-like expansiveness, with many\rof the ocean’s noblest traits; with many of its rimmed varieties of\rraces and of climes. They contain round archipelagoes of romantic\risles, even as the Polynesian waters do; in large part, are shored by\rtwo great contrasting nations, as the Atlantic is; they furnish long\rmaritime approaches to our numerous territorial colonies from the East,\rdotted all round their banks; here and there are frowned upon by\rbatteries, and by the goat-like craggy guns of lofty Mackinaw; they\rhave heard the fleet thunderings of naval victories; at intervals, they\ryield their beaches to wild barbarians, whose red painted faces flash\rfrom out their peltry wigwams; for leagues and leagues are flanked by\rancient and unentered forests, where the gaunt pines stand like serried\rlines of kings in Gothic genealogies; those same woods harboring wild\rAfric beasts of prey, and silken creatures whose exported furs give\rrobes to Tartar Emperors; they mirror the paved capitals of Buffalo and\rCleveland, as well as Winnebago villages; they float alike the\rfull-rigged merchant ship, the armed cruiser of the State, the steamer,\rand the beech canoe; they are swept by Borean and dismasting blasts as\rdireful as any that lash the salted wave; they know what shipwrecks\rare, for out of sight of land, however inland, they have drowned full\rmany a midnight ship with all its shrieking crew. Thus, gentlemen,\rthough an inlander, Steelkilt was wild-ocean born, and wild-ocean\rnurtured; as much of an audacious mariner as any. And for Radney,\rthough in his infancy he may have laid him down on the lone Nantucket\rbeach, to nurse at his maternal sea; though in after life he had long\rfollowed our austere Atlantic and your contemplative Pacific; yet was\rhe quite as vengeful and full of social quarrel as the backwoods\rseaman, fresh from the latitudes of buck-horn handled Bowie-knives. Yet\rwas this Nantucketer a man with some good-hearted traits; and this\rLakeman, a mariner, who though a sort of devil indeed, might yet by\rinflexible firmness, only tempered by that common decency of human\rrecognition which is the meanest slave’s right; thus treated, this\rSteelkilt had long been retained harmless and docile. At all events, he\rhad proved so thus far; but Radney was doomed and made mad, and\rSteelkilt—but, gentlemen, you shall hear.\r\r“It was not more than a day or two at the furthest after pointing her\rprow for her island haven, that the Town-Ho’s leak seemed again\rincreasing, but only so as to require an hour or more at the pumps\revery day. You must know that in a settled and civilized ocean like our\rAtlantic, for example, some skippers think little of pumping their\rwhole way across it; though of a still, sleepy night, should the\rofficer of the deck happen to forget his duty in that respect, the\rprobability would be that he and his shipmates would never again\rremember it, on account of all hands gently subsiding to the bottom.\rNor in the solitary and savage seas far from you to the westward,\rgentlemen, is it altogether unusual for ships to keep clanging at their\rpump-handles in full chorus even for a voyage of considerable length;\rthat is, if it lie along a tolerably accessible coast, or if any other\rreasonable retreat is afforded them. It is only when a leaky vessel is\rin some very out of the way part of those waters, some really landless\rlatitude, that her captain begins to feel a little anxious.\r\r“Much this way had it been with the Town-Ho; so when her leak was found\rgaining once more, there was in truth some small concern manifested by\rseveral of her company; especially by Radney the mate. He commanded the\rupper sails to be well hoisted, sheeted home anew, and every way\rexpanded to the breeze. Now this Radney, I suppose, was as little of a\rcoward, and as little inclined to any sort of nervous apprehensiveness\rtouching his own person as any fearless, unthinking creature on land or\ron sea that you can conveniently imagine, gentlemen. Therefore when he\rbetrayed this solicitude about the safety of the ship, some of the\rseamen declared that it was only on account of his being a part owner\rin her. So when they were working that evening at the pumps, there was\ron this head no small gamesomeness slily going on among them, as they\rstood with their feet continually overflowed by the rippling clear\rwater; clear as any mountain spring, gentlemen—that bubbling from the\rpumps ran across the deck, and poured itself out in steady spouts at\rthe lee scupper-holes.\r\r“Now, as you well know, it is not seldom the case in this conventional\rworld of ours—watery or otherwise; that when a person placed in command\rover his fellow-men finds one of them to be very significantly his\rsuperior in general pride of manhood, straightway against that man he\rconceives an unconquerable dislike and bitterness; and if he have a\rchance he will pull down and pulverize that subaltern’s tower, and make\ra little heap of dust of it. Be this conceit of mine as it may,\rgentlemen, at all events Steelkilt was a tall and noble animal with a\rhead like a Roman, and a flowing golden beard like the tasseled\rhousings of your last viceroy’s snorting charger; and a brain, and a\rheart, and a soul in him, gentlemen, which had made Steelkilt\rCharlemagne, had he been born son to Charlemagne’s father. But Radney,\rthe mate, was ugly as a mule; yet as hardy, as stubborn, as malicious.\rHe did not love Steelkilt, and Steelkilt knew it.\r\r“Espying the mate drawing near as he was toiling at the pump with the\rrest, the Lakeman affected not to notice him, but unawed, went on with\rhis gay banterings.\r\r“‘Aye, aye, my merry lads, it’s a lively leak this; hold a cannikin,\rone of ye, and let’s have a taste. By the Lord, it’s worth bottling! I\rtell ye what, men, old Rad’s investment must go for it! he had best cut\raway his part of the hull and tow it home. The fact is, boys, that\rsword-fish only began the job; he’s come back again with a gang of\rship-carpenters, saw-fish, and file-fish, and what not; and the whole\rposse of ’em are now hard at work cutting and slashing at the bottom;\rmaking improvements, I suppose. If old Rad were here now, I’d tell him\rto jump overboard and scatter ’em. They’re playing the devil with his\restate, I can tell him. But he’s a simple old soul,—Rad, and a beauty\rtoo. Boys, they say the rest of his property is invested in\rlooking-glasses. I wonder if he’d give a poor devil like me the model\rof his nose.’\r\r“‘Damn your eyes! what’s that pump stopping for?’ roared Radney,\rpretending not to have heard the sailors’ talk. ‘Thunder away at it!’\r\r“‘Aye, aye, sir,’ said Steelkilt, merry as a cricket. ‘Lively, boys,\rlively, now!’ And with that the pump clanged like fifty fire-engines;\rthe men tossed their hats off to it, and ere long that peculiar gasping\rof the lungs was heard which denotes the fullest tension of life’s\rutmost energies.\r\r“Quitting the pump at last, with the rest of his band, the Lakeman went\rforward all panting, and sat himself down on the windlass; his face\rfiery red, his eyes bloodshot, and wiping the profuse sweat from his\rbrow. Now what cozening fiend it was, gentlemen, that possessed Radney\rto meddle with such a man in that corporeally exasperated state, I know\rnot; but so it happened. Intolerably striding along the deck, the mate\rcommanded him to get a broom and sweep down the planks, and also a\rshovel, and remove some offensive matters consequent upon allowing a\rpig to run at large.\r\r“Now, gentlemen, sweeping a ship’s deck at sea is a piece of household\rwork which in all times but raging gales is regularly attended to every\revening; it has been known to be done in the case of ships actually\rfoundering at the time. Such, gentlemen, is the inflexibility of\rsea-usages and the instinctive love of neatness in seamen; some of whom\rwould not willingly drown without first washing their faces. But in all\rvessels this broom business is the prescriptive province of the boys,\rif boys there be aboard. Besides, it was the stronger men in the\rTown-Ho that had been divided into gangs, taking turns at the pumps;\rand being the most athletic seaman of them all, Steelkilt had been\rregularly assigned captain of one of the gangs; consequently he should\rhave been freed from any trivial business not connected with truly\rnautical duties, such being the case with his comrades. I mention all\rthese particulars so that you may understand exactly how this affair\rstood between the two men.\r\r“But there was more than this: the order about the shovel was almost as\rplainly meant to sting and insult Steelkilt, as though Radney had spat\rin his face. Any man who has gone sailor in a whale-ship will\runderstand this; and all this and doubtless much more, the Lakeman\rfully comprehended when the mate uttered his command. But as he sat\rstill for a moment, and as he steadfastly looked into the mate’s\rmalignant eye and perceived the stacks of powder-casks heaped up in him\rand the slow-match silently burning along towards them; as he\rinstinctively saw all this, that strange forbearance and unwillingness\rto stir up the deeper passionateness in any already ireful being—a\rrepugnance most felt, when felt at all, by really valiant men even when\raggrieved—this nameless phantom feeling, gentlemen, stole over\rSteelkilt.\r\r“Therefore, in his ordinary tone, only a little broken by the bodily\rexhaustion he was temporarily in, he answered him saying that sweeping\rthe deck was not his business, and he would not do it. And then,\rwithout at all alluding to the shovel, he pointed to three lads as the\rcustomary sweepers; who, not being billeted at the pumps, had done\rlittle or nothing all day. To this, Radney replied with an oath, in a\rmost domineering and outrageous manner unconditionally reiterating his\rcommand; meanwhile advancing upon the still seated Lakeman, with an\ruplifted cooper’s club hammer which he had snatched from a cask near\rby.\r\r“Heated and irritated as he was by his spasmodic toil at the pumps, for\rall his first nameless feeling of forbearance the sweating Steelkilt\rcould but ill brook this bearing in the mate; but somehow still\rsmothering the conflagration within him, without speaking he remained\rdoggedly rooted to his seat, till at last the incensed Radney shook the\rhammer within a few inches of his face, furiously commanding him to do\rhis bidding.\r\r“Steelkilt rose, and slowly retreating round the windlass, steadily\rfollowed by the mate with his menacing hammer, deliberately repeated\rhis intention not to obey. Seeing, however, that his forbearance had\rnot the slightest effect, by an awful and unspeakable intimation with\rhis twisted hand he warned off the foolish and infatuated man; but it\rwas to no purpose. And in this way the two went once slowly round the\rwindlass; when, resolved at last no longer to retreat, bethinking him\rthat he had now forborne as much as comported with his humor, the\rLakeman paused on the hatches and thus spoke to the officer:\r\r“‘Mr. Radney, I will not obey you. Take that hammer away, or look to\ryourself.’ But the predestinated mate coming still closer to him, where\rthe Lakeman stood fixed, now shook the heavy hammer within an inch of\rhis teeth; meanwhile repeating a string of insufferable maledictions.\rRetreating not the thousandth part of an inch; stabbing him in the eye\rwith the unflinching poniard of his glance, Steelkilt, clenching his\rright hand behind him and creepingly drawing it back, told his\rpersecutor that if the hammer but grazed his cheek he (Steelkilt) would\rmurder him. But, gentlemen, the fool had been branded for the slaughter\rby the gods. Immediately the hammer touched the cheek; the next instant\rthe lower jaw of the mate was stove in his head; he fell on the hatch\rspouting blood like a whale.\r\r“Ere the cry could go aft Steelkilt was shaking one of the backstays\rleading far aloft to where two of his comrades were standing their\rmastheads. They were both Canallers.\r\r“‘Canallers!’ cried Don Pedro. ‘We have seen many whale-ships in our\rharbours, but never heard of your Canallers. Pardon: who and what are\rthey?’\r\r“‘Canallers, Don, are the boatmen belonging to our grand Erie Canal.\rYou must have heard of it.’\r\r“‘Nay, Senor; hereabouts in this dull, warm, most lazy, and hereditary\rland, we know but little of your vigorous North.’\r\r“‘Aye? Well then, Don, refill my cup. Your chicha’s very fine; and ere\rproceeding further I will tell ye what our Canallers are; for such\rinformation may throw side-light upon my story.’\r\r“For three hundred and sixty miles, gentlemen, through the entire\rbreadth of the state of New York; through numerous populous cities and\rmost thriving villages; through long, dismal, uninhabited swamps, and\raffluent, cultivated fields, unrivalled for fertility; by billiard-room\rand bar-room; through the holy-of-holies of great forests; on Roman\rarches over Indian rivers; through sun and shade; by happy hearts or\rbroken; through all the wide contrasting scenery of those noble Mohawk\rcounties; and especially, by rows of snow-white chapels, whose spires\rstand almost like milestones, flows one continual stream of Venetianly\rcorrupt and often lawless life. There’s your true Ashantee, gentlemen;\rthere howl your pagans; where you ever find them, next door to you;\runder the long-flung shadow, and the snug patronising lee of churches.\rFor by some curious fatality, as it is often noted of your metropolitan\rfreebooters that they ever encamp around the halls of justice, so\rsinners, gentlemen, most abound in holiest vicinities.\r\r“‘Is that a friar passing?’ said Don Pedro, looking downwards into the\rcrowded plazza, with humorous concern.\r\r“‘Well for our northern friend, Dame Isabella’s Inquisition wanes in\rLima,’ laughed Don Sebastian. ‘Proceed, Senor.’\r\r“‘A moment! Pardon!’ cried another of the company. ‘In the name of all\rus Limeese, I but desire to express to you, sir sailor, that we have by\rno means overlooked your delicacy in not substituting present Lima for\rdistant Venice in your corrupt comparison. Oh! do not bow and look\rsurprised; you know the proverb all along this coast—“Corrupt as Lima.”\rIt but bears out your saying, too; churches more plentiful than\rbilliard-tables, and for ever open—and “Corrupt as Lima.” So, too,\rVenice; I have been there; the holy city of the blessed evangelist, St.\rMark!—St. Dominic, purge it! Your cup! Thanks: here I refill; now, you\rpour out again.’\r\r“Freely depicted in his own vocation, gentlemen, the Canaller would\rmake a fine dramatic hero, so abundantly and picturesquely wicked is\rhe. Like Mark Antony, for days and days along his green-turfed, flowery\rNile, he indolently floats, openly toying with his red-cheeked\rCleopatra, ripening his apricot thigh upon the sunny deck. But ashore,\rall this effeminacy is dashed. The brigandish guise which the Canaller\rso proudly sports; his slouched and gaily-ribboned hat betoken his\rgrand features. A terror to the smiling innocence of the villages\rthrough which he floats; his swart visage and bold swagger are not\runshunned in cities. Once a vagabond on his own canal, I have received\rgood turns from one of these Canallers; I thank him heartily; would\rfain be not ungrateful; but it is often one of the prime redeeming\rqualities of your man of violence, that at times he has as stiff an arm\rto back a poor stranger in a strait, as to plunder a wealthy one. In\rsum, gentlemen, what the wildness of this canal life is, is\remphatically evinced by this; that our wild whale-fishery contains so\rmany of its most finished graduates, and that scarce any race of\rmankind, except Sydney men, are so much distrusted by our whaling\rcaptains. Nor does it at all diminish the curiousness of this matter,\rthat to many thousands of our rural boys and young men born along its\rline, the probationary life of the Grand Canal furnishes the sole\rtransition between quietly reaping in a Christian corn-field, and\rrecklessly ploughing the waters of the most barbaric seas.\r\r“‘I see! I see!’ impetuously exclaimed Don Pedro, spilling his chicha\rupon his silvery ruffles. ‘No need to travel! The world’s one Lima. I\rhad thought, now, that at your temperate North the generations were\rcold and holy as the hills.—But the story.’\r\r“I left off, gentlemen, where the Lakeman shook the backstay. Hardly\rhad he done so, when he was surrounded by the three junior mates and\rthe four harpooneers, who all crowded him to the deck. But sliding down\rthe ropes like baleful comets, the two Canallers rushed into the\ruproar, and sought to drag their man out of it towards the forecastle.\rOthers of the sailors joined with them in this attempt, and a twisted\rturmoil ensued; while standing out of harm’s way, the valiant captain\rdanced up and down with a whale-pike, calling upon his officers to\rmanhandle that atrocious scoundrel, and smoke him along to the\rquarter-deck. At intervals, he ran close up to the revolving border of\rthe confusion, and prying into the heart of it with his pike, sought to\rprick out the object of his resentment. But Steelkilt and his\rdesperadoes were too much for them all; they succeeded in gaining the\rforecastle deck, where, hastily slewing about three or four large casks\rin a line with the windlass, these sea-Parisians entrenched themselves\rbehind the barricade.\r\r“‘Come out of that, ye pirates!’ roared the captain, now menacing them\rwith a pistol in each hand, just brought to him by the steward. ‘Come\rout of that, ye cut-throats!’\r\r“Steelkilt leaped on the barricade, and striding up and down there,\rdefied the worst the pistols could do; but gave the captain to\runderstand distinctly, that his (Steelkilt’s) death would be the signal\rfor a murderous mutiny on the part of all hands. Fearing in his heart\rlest this might prove but too true, the captain a little desisted, but\rstill commanded the insurgents instantly to return to their duty.\r\r“‘Will you promise not to touch us, if we do?’ demanded their\rringleader.\r\r“‘Turn to! turn to!—I make no promise;—to your duty! Do you want to\rsink the ship, by knocking off at a time like this? Turn to!’ and he\ronce more raised a pistol.\r\r“‘Sink the ship?’ cried Steelkilt. ‘Aye, let her sink. Not a man of us\rturns to, unless you swear not to raise a rope-yarn against us. What\rsay ye, men?’ turning to his comrades. A fierce cheer was their\rresponse.\r\r“The Lakeman now patrolled the barricade, all the while keeping his eye\ron the Captain, and jerking out such sentences as these:—‘It’s not our\rfault; we didn’t want it; I told him to take his hammer away; it was\rboy’s business; he might have known me before this; I told him not to\rprick the buffalo; I believe I have broken a finger here against his\rcursed jaw; ain’t those mincing knives down in the forecastle there,\rmen? look to those handspikes, my hearties. Captain, by God, look to\ryourself; say the word; don’t be a fool; forget it all; we are ready to\rturn to; treat us decently, and we’re your men; but we won’t be\rflogged.’\r\r“‘Turn to! I make no promises, turn to, I say!’\r\r“‘Look ye, now,’ cried the Lakeman, flinging out his arm towards him,\r‘there are a few of us here (and I am one of them) who have shipped for\rthe cruise, d’ye see; now as you well know, sir, we can claim our\rdischarge as soon as the anchor is down; so we don’t want a row; it’s\rnot our interest; we want to be peaceable; we are ready to work, but we\rwon’t be flogged.’\r\r“‘Turn to!’ roared the Captain.\r\r“Steelkilt glanced round him a moment, and then said:—‘I tell you what\rit is now, Captain, rather than kill ye, and be hung for such a shabby\rrascal, we won’t lift a hand against ye unless ye attack us; but till\ryou say the word about not flogging us, we don’t do a hand’s turn.’\r\r“‘Down into the forecastle then, down with ye, I’ll keep ye there till\rye’re sick of it. Down ye go.’\r\r“‘Shall we?’ cried the ringleader to his men. Most of them were against\rit; but at length, in obedience to Steelkilt, they preceded him down\rinto their dark den, growlingly disappearing, like bears into a cave.\r\r“As the Lakeman’s bare head was just level with the planks, the Captain\rand his posse leaped the barricade, and rapidly drawing over the slide\rof the scuttle, planted their group of hands upon it, and loudly called\rfor the steward to bring the heavy brass padlock belonging to the\rcompanionway. Then opening the slide a little, the Captain whispered\rsomething down the crack, closed it, and turned the key upon them—ten\rin number—leaving on deck some twenty or more, who thus far had\rremained neutral.\r\r“All night a wide-awake watch was kept by all the officers, forward and\raft, especially about the forecastle scuttle and fore hatchway; at\rwhich last place it was feared the insurgents might emerge, after\rbreaking through the bulkhead below. But the hours of darkness passed\rin peace; the men who still remained at their duty toiling hard at the\rpumps, whose clinking and clanking at intervals through the dreary\rnight dismally resounded through the ship.\r\r“At sunrise the Captain went forward, and knocking on the deck,\rsummoned the prisoners to work; but with a yell they refused. Water was\rthen lowered down to them, and a couple of handfuls of biscuit were\rtossed after it; when again turning the key upon them and pocketing it,\rthe Captain returned to the quarter-deck. Twice every day for three\rdays this was repeated; but on the fourth morning a confused wrangling,\rand then a scuffling was heard, as the customary summons was delivered;\rand suddenly four men burst up from the forecastle, saying they were\rready to turn to. The fetid closeness of the air, and a famishing diet,\runited perhaps to some fears of ultimate retribution, had constrained\rthem to surrender at discretion. Emboldened by this, the Captain\rreiterated his demand to the rest, but Steelkilt shouted up to him a\rterrific hint to stop his babbling and betake himself where he\rbelonged. On the fifth morning three others of the mutineers bolted up\rinto the air from the desperate arms below that sought to restrain\rthem. Only three were left.\r\r“‘Better turn to, now?’ said the Captain with a heartless jeer.\r\r“‘Shut us up again, will ye!’ cried Steelkilt.\r\r“‘Oh certainly,’ said the Captain, and the key clicked.\r\r“It was at this point, gentlemen, that enraged by the defection of\rseven of his former associates, and stung by the mocking voice that had\rlast hailed him, and maddened by his long entombment in a place as\rblack as the bowels of despair; it was then that Steelkilt proposed to\rthe two Canallers, thus far apparently of one mind with him, to burst\rout of their hole at the next summoning of the garrison; and armed with\rtheir keen mincing knives (long, crescentic, heavy implements with a\rhandle at each end) run amuck from the bowsprit to the taffrail; and if\rby any devilishness of desperation possible, seize the ship. For\rhimself, he would do this, he said, whether they joined him or not.\rThat was the last night he should spend in that den. But the scheme met\rwith no opposition on the part of the other two; they swore they were\rready for that, or for any other mad thing, for anything in short but a\rsurrender. And what was more, they each insisted upon being the first\rman on deck, when the time to make the rush should come. But to this\rtheir leader as fiercely objected, reserving that priority for himself;\rparticularly as his two comrades would not yield, the one to the other,\rin the matter; and both of them could not be first, for the ladder\rwould but admit one man at a time. And here, gentlemen, the foul play\rof these miscreants must come out.\r\r“Upon hearing the frantic project of their leader, each in his own\rseparate soul had suddenly lighted, it would seem, upon the same piece\rof treachery, namely: to be foremost in breaking out, in order to be\rthe first of the three, though the last of the ten, to surrender; and\rthereby secure whatever small chance of pardon such conduct might\rmerit. But when Steelkilt made known his determination still to lead\rthem to the last, they in some way, by some subtle chemistry of\rvillany, mixed their before secret treacheries together; and when their\rleader fell into a doze, verbally opened their souls to each other in\rthree sentences; and bound the sleeper with cords, and gagged him with\rcords; and shrieked out for the Captain at midnight.\r\r“Thinking murder at hand, and smelling in the dark for the blood, he\rand all his armed mates and harpooneers rushed for the forecastle. In a\rfew minutes the scuttle was opened, and, bound hand and foot, the still\rstruggling ringleader was shoved up into the air by his perfidious\rallies, who at once claimed the honor of securing a man who had been\rfully ripe for murder. But all these were collared, and dragged along\rthe deck like dead cattle; and, side by side, were seized up into the\rmizzen rigging, like three quarters of meat, and there they hung till\rmorning. ‘Damn ye,’ cried the Captain, pacing to and fro before them,\r‘the vultures would not touch ye, ye villains!’\r\r“At sunrise he summoned all hands; and separating those who had\rrebelled from those who had taken no part in the mutiny, he told the\rformer that he had a good mind to flog them all round—thought, upon the\rwhole, he would do so—he ought to—justice demanded it; but for the\rpresent, considering their timely surrender, he would let them go with\ra reprimand, which he accordingly administered in the vernacular.\r\r“‘But as for you, ye carrion rogues,’ turning to the three men in the\rrigging—‘for you, I mean to mince ye up for the try-pots;’ and, seizing\ra rope, he applied it with all his might to the backs of the two\rtraitors, till they yelled no more, but lifelessly hung their heads\rsideways, as the two crucified thieves are drawn.\r\r“‘My wrist is sprained with ye!’ he cried, at last; ‘but there is still\rrope enough left for you, my fine bantam, that wouldn’t give up. Take\rthat gag from his mouth, and let us hear what he can say for himself.’\r\r“For a moment the exhausted mutineer made a tremulous motion of his\rcramped jaws, and then painfully twisting round his head, said in a\rsort of hiss, ‘What I say is this—and mind it well—if you flog me, I\rmurder you!’\r\r“‘Say ye so? then see how ye frighten me’—and the Captain drew off with\rthe rope to strike.\r\r“‘Best not,’ hissed the Lakeman.\r\r“‘But I must,’—and the rope was once more drawn back for the stroke.\r\r“Steelkilt here hissed out something, inaudible to all but the Captain;\rwho, to the amazement of all hands, started back, paced the deck\rrapidly two or three times, and then suddenly throwing down his rope,\rsaid, ‘I won’t do it—let him go—cut him down: d’ye hear?’\r\r“But as the junior mates were hurrying to execute the order, a pale\rman, with a bandaged head, arrested them—Radney the chief mate. Ever\rsince the blow, he had lain in his berth; but that morning, hearing the\rtumult on the deck, he had crept out, and thus far had watched the\rwhole scene. Such was the state of his mouth, that he could hardly\rspeak; but mumbling something about _his_ being willing and able to do\rwhat the captain dared not attempt, he snatched the rope and advanced\rto his pinioned foe.\r\r“‘You are a coward!’ hissed the Lakeman.\r\r“‘So I am, but take that.’ The mate was in the very act of striking,\rwhen another hiss stayed his uplifted arm. He paused: and then pausing\rno more, made good his word, spite of Steelkilt’s threat, whatever that\rmight have been. The three men were then cut down, all hands were\rturned to, and, sullenly worked by the moody seamen, the iron pumps\rclanged as before.\r\r“Just after dark that day, when one watch had retired below, a clamor\rwas heard in the forecastle; and the two trembling traitors running up,\rbesieged the cabin door, saying they durst not consort with the crew.\rEntreaties, cuffs, and kicks could not drive them back, so at their own\rinstance they were put down in the ship’s run for salvation. Still, no\rsign of mutiny reappeared among the rest. On the contrary, it seemed,\rthat mainly at Steelkilt’s instigation, they had resolved to maintain\rthe strictest peacefulness, obey all orders to the last, and, when the\rship reached port, desert her in a body. But in order to insure the\rspeediest end to the voyage, they all agreed to another thing—namely,\rnot to sing out for whales, in case any should be discovered. For,\rspite of her leak, and spite of all her other perils, the Town-Ho still\rmaintained her mast-heads, and her captain was just as willing to lower\rfor a fish that moment, as on the day his craft first struck the\rcruising ground; and Radney the mate was quite as ready to change his\rberth for a boat, and with his bandaged mouth seek to gag in death the\rvital jaw of the whale.\r\r“But though the Lakeman had induced the seamen to adopt this sort of\rpassiveness in their conduct, he kept his own counsel (at least till\rall was over) concerning his own proper and private revenge upon the\rman who had stung him in the ventricles of his heart. He was in Radney\rthe chief mate’s watch; and as if the infatuated man sought to run more\rthan half way to meet his doom, after the scene at the rigging, he\rinsisted, against the express counsel of the captain, upon resuming the\rhead of his watch at night. Upon this, and one or two other\rcircumstances, Steelkilt systematically built the plan of his revenge.\r\r“During the night, Radney had an unseamanlike way of sitting on the\rbulwarks of the quarter-deck, and leaning his arm upon the gunwale of\rthe boat which was hoisted up there, a little above the ship’s side. In\rthis attitude, it was well known, he sometimes dozed. There was a\rconsiderable vacancy between the boat and the ship, and down between\rthis was the sea. Steelkilt calculated his time, and found that his\rnext trick at the helm would come round at two o’clock, in the morning\rof the third day from that in which he had been betrayed. At his\rleisure, he employed the interval in braiding something very carefully\rin his watches below.\r\r“‘What are you making there?’ said a shipmate.\r\r“‘What do you think? what does it look like?’\r\r“‘Like a lanyard for your bag; but it’s an odd one, seems to me.’\r\r“‘Yes, rather oddish,’ said the Lakeman, holding it at arm’s length\rbefore him; ‘but I think it will answer. Shipmate, I haven’t enough\rtwine,—have you any?’\r\r“But there was none in the forecastle.\r\r“‘Then I must get some from old Rad;’ and he rose to go aft.\r\r“‘You don’t mean to go a begging to _him!_’ said a sailor.\r\r“‘Why not? Do you think he won’t do me a turn, when it’s to help\rhimself in the end, shipmate?’ and going to the mate, he looked at him\rquietly, and asked him for some twine to mend his hammock. It was given\rhim—neither twine nor lanyard were seen again; but the next night an\riron ball, closely netted, partly rolled from the pocket of the\rLakeman’s monkey jacket, as he was tucking the coat into his hammock\rfor a pillow. Twenty-four hours after, his trick at the silent\rhelm—nigh to the man who was apt to doze over the grave always ready\rdug to the seaman’s hand—that fatal hour was then to come; and in the\rfore-ordaining soul of Steelkilt, the mate was already stark and\rstretched as a corpse, with his forehead crushed in.\r\r“But, gentlemen, a fool saved the would-be murderer from the bloody\rdeed he had planned. Yet complete revenge he had, and without being the\ravenger. For by a mysterious fatality, Heaven itself seemed to step in\rto take out of his hands into its own the damning thing he would have\rdone.\r\r“It was just between daybreak and sunrise of the morning of the second\rday, when they were washing down the decks, that a stupid Teneriffe\rman, drawing water in the main-chains, all at once shouted out, ‘There\rshe rolls! there she rolls!’ Jesu, what a whale! It was Moby Dick.\r\r“‘Moby Dick!’ cried Don Sebastian; ‘St. Dominic! Sir sailor, but do\rwhales have christenings? Whom call you Moby Dick?’\r\r“‘A very white, and famous, and most deadly immortal monster, Don;—but\rthat would be too long a story.’\r\r“‘How? how?’ cried all the young Spaniards, crowding.\r\r“‘Nay, Dons, Dons—nay, nay! I cannot rehearse that now. Let me get more\rinto the air, Sirs.’\r\r“‘The chicha! the chicha!’ cried Don Pedro; ‘our vigorous friend looks\rfaint;—fill up his empty glass!’\r\r“No need, gentlemen; one moment, and I proceed.—Now, gentlemen, so\rsuddenly perceiving the snowy whale within fifty yards of the\rship—forgetful of the compact among the crew—in the excitement of the\rmoment, the Teneriffe man had instinctively and involuntarily lifted\rhis voice for the monster, though for some little time past it had been\rplainly beheld from the three sullen mast-heads. All was now a phrensy.\r‘The White Whale—the White Whale!’ was the cry from captain, mates, and\rharpooneers, who, undeterred by fearful rumours, were all anxious to\rcapture so famous and precious a fish; while the dogged crew eyed\raskance, and with curses, the appalling beauty of the vast milky mass,\rthat lit up by a horizontal spangling sun, shifted and glistened like a\rliving opal in the blue morning sea. Gentlemen, a strange fatality\rpervades the whole career of these events, as if verily mapped out\rbefore the world itself was charted. The mutineer was the bowsman of\rthe mate, and when fast to a fish, it was his duty to sit next him,\rwhile Radney stood up with his lance in the prow, and haul in or\rslacken the line, at the word of command. Moreover, when the four boats\rwere lowered, the mate’s got the start; and none howled more fiercely\rwith delight than did Steelkilt, as he strained at his oar. After a\rstiff pull, their harpooneer got fast, and, spear in hand, Radney\rsprang to the bow. He was always a furious man, it seems, in a boat.\rAnd now his bandaged cry was, to beach him on the whale’s topmost back.\rNothing loath, his bowsman hauled him up and up, through a blinding\rfoam that blent two whitenesses together; till of a sudden the boat\rstruck as against a sunken ledge, and keeling over, spilled out the\rstanding mate. That instant, as he fell on the whale’s slippery back,\rthe boat righted, and was dashed aside by the swell, while Radney was\rtossed over into the sea, on the other flank of the whale. He struck\rout through the spray, and, for an instant, was dimly seen through that\rveil, wildly seeking to remove himself from the eye of Moby Dick. But\rthe whale rushed round in a sudden maelstrom; seized the swimmer\rbetween his jaws; and rearing high up with him, plunged headlong again,\rand went down.\r\r“Meantime, at the first tap of the boat’s bottom, the Lakeman had\rslackened the line, so as to drop astern from the whirlpool; calmly\rlooking on, he thought his own thoughts. But a sudden, terrific,\rdownward jerking of the boat, quickly brought his knife to the line. He\rcut it; and the whale was free. But, at some distance, Moby Dick rose\ragain, with some tatters of Radney’s red woollen shirt, caught in the\rteeth that had destroyed him. All four boats gave chase again; but the\rwhale eluded them, and finally wholly disappeared.\r\r“In good time, the Town-Ho reached her port—a savage, solitary\rplace—where no civilized creature resided. There, headed by the\rLakeman, all but five or six of the foremastmen deliberately deserted\ramong the palms; eventually, as it turned out, seizing a large double\rwar-canoe of the savages, and setting sail for some other harbor.\r\r“The ship’s company being reduced to but a handful, the captain called\rupon the Islanders to assist him in the laborious business of heaving\rdown the ship to stop the leak. But to such unresting vigilance over\rtheir dangerous allies was this small band of whites necessitated, both\rby night and by day, and so extreme was the hard work they underwent,\rthat upon the vessel being ready again for sea, they were in such a\rweakened condition that the captain durst not put off with them in so\rheavy a vessel. After taking counsel with his officers, he anchored the\rship as far off shore as possible; loaded and ran out his two cannon\rfrom the bows; stacked his muskets on the poop; and warning the\rIslanders not to approach the ship at their peril, took one man with\rhim, and setting the sail of his best whale-boat, steered straight\rbefore the wind for Tahiti, five hundred miles distant, to procure a\rreinforcement to his crew.\r\r“On the fourth day of the sail, a large canoe was descried, which\rseemed to have touched at a low isle of corals. He steered away from\rit; but the savage craft bore down on him; and soon the voice of\rSteelkilt hailed him to heave to, or he would run him under water. The\rcaptain presented a pistol. With one foot on each prow of the yoked\rwar-canoes, the Lakeman laughed him to scorn; assuring him that if the\rpistol so much as clicked in the lock, he would bury him in bubbles and\rfoam.\r\r“‘What do you want of me?’ cried the captain.\r\r“‘Where are you bound? and for what are you bound?’ demanded Steelkilt;\r‘no lies.’\r\r“‘I am bound to Tahiti for more men.’\r\r“‘Very good. Let me board you a moment—I come in peace.’ With that he\rleaped from the canoe, swam to the boat; and climbing the gunwale,\rstood face to face with the captain.\r\r“‘Cross your arms, sir; throw back your head. Now, repeat after me. As\rsoon as Steelkilt leaves me, I swear to beach this boat on yonder\risland, and remain there six days. If I do not, may lightnings strike\rme!’\r\r“‘A pretty scholar,’ laughed the Lakeman. ‘Adios, Senor!’ and leaping\rinto the sea, he swam back to his comrades.\r\r“Watching the boat till it was fairly beached, and drawn up to the\rroots of the cocoa-nut trees, Steelkilt made sail again, and in due\rtime arrived at Tahiti, his own place of destination. There, luck\rbefriended him; two ships were about to sail for France, and were\rprovidentially in want of precisely that number of men which the sailor\rheaded. They embarked; and so for ever got the start of their former\rcaptain, had he been at all minded to work them legal retribution.\r\r“Some ten days after the French ships sailed, the whale-boat arrived,\rand the captain was forced to enlist some of the more civilized\rTahitians, who had been somewhat used to the sea. Chartering a small\rnative schooner, he returned with them to his vessel; and finding all\rright there, again resumed his cruisings.\r\r“Where Steelkilt now is, gentlemen, none know; but upon the island of\rNantucket, the widow of Radney still turns to the sea which refuses to\rgive up its dead; still in dreams sees the awful white whale that\rdestroyed him.  * * * *\r\r“‘Are you through?’ said Don Sebastian, quietly.\r\r“‘I am, Don.’\r\r“‘Then I entreat you, tell me if to the best of your own convictions,\rthis your story is in substance really true? It is so passing\rwonderful! Did you get it from an unquestionable source? Bear with me\rif I seem to press.’\r\r“‘Also bear with all of us, sir sailor; for we all join in Don\rSebastian’s suit,’ cried the company, with exceeding interest.\r\r“‘Is there a copy of the Holy Evangelists in the Golden Inn,\rgentlemen?’\r\r“‘Nay,’ said Don Sebastian; ‘but I know a worthy priest near by, who\rwill quickly procure one for me. I go for it; but are you well advised?\rthis may grow too serious.’\r\r“‘Will you be so good as to bring the priest also, Don?’\r\r“‘Though there are no Auto-da-Fés in Lima now,’ said one of the company\rto another; ‘I fear our sailor friend runs risk of the archiepiscopacy.\rLet us withdraw more out of the moonlight. I see no need of this.’\r\r“‘Excuse me for running after you, Don Sebastian; but may I also beg\rthat you will be particular in procuring the largest sized Evangelists\ryou can.’\r\r* * * * * *\r\r“‘This is the priest, he brings you the Evangelists,’ said Don\rSebastian, gravely, returning with a tall and solemn figure.\r\r“‘Let me remove my hat. Now, venerable priest, further into the light,\rand hold the Holy Book before me that I may touch it.\r\r“‘So help me Heaven, and on my honor the story I have told ye,\rgentlemen, is in substance and its great items, true. I know it to be\rtrue; it happened on this ball; I trod the ship; I knew the crew; I\rhave seen and talked with Steelkilt since the death of Radney.’”\r\r\rCHAPTER 55. Of the Monstrous Pictures of Whales.\r\rI shall ere long paint to you as well as one can without canvas,\rsomething like the true form of the whale as he actually appears to the\reye of the whaleman when in his own absolute body the whale is moored\ralongside the whale-ship so that he can be fairly stepped upon there.\rIt may be worth while, therefore, previously to advert to those curious\rimaginary portraits of him which even down to the present day\rconfidently challenge the faith of the landsman. It is time to set the\rworld right in this matter, by proving such pictures of the whale all\rwrong.\r\rIt may be that the primal source of all those pictorial delusions will\rbe found among the oldest Hindoo, Egyptian, and Grecian sculptures. For\rever since those inventive but unscrupulous times when on the marble\rpanellings of temples, the pedestals of statues, and on shields,\rmedallions, cups, and coins, the dolphin was drawn in scales of\rchain-armor like Saladin’s, and a helmeted head like St. George’s; ever\rsince then has something of the same sort of license prevailed, not\ronly in most popular pictures of the whale, but in many scientific\rpresentations of him.\r\rNow, by all odds, the most ancient extant portrait anyways purporting\rto be the whale’s, is to be found in the famous cavern-pagoda of\rElephanta, in India. The Brahmins maintain that in the almost endless\rsculptures of that immemorial pagoda, all the trades and pursuits,\revery conceivable avocation of man, were prefigured ages before any of\rthem actually came into being. No wonder then, that in some sort our\rnoble profession of whaling should have been there shadowed forth. The\rHindoo whale referred to, occurs in a separate department of the wall,\rdepicting the incarnation of Vishnu in the form of leviathan, learnedly\rknown as the Matse Avatar. But though this sculpture is half man and\rhalf whale, so as only to give the tail of the latter, yet that small\rsection of him is all wrong. It looks more like the tapering tail of an\ranaconda, than the broad palms of the true whale’s majestic flukes.\r\rBut go to the old Galleries, and look now at a great Christian\rpainter’s portrait of this fish; for he succeeds no better than the\rantediluvian Hindoo. It is Guido’s picture of Perseus rescuing\rAndromeda from the sea-monster or whale. Where did Guido get the model\rof such a strange creature as that? Nor does Hogarth, in painting the\rsame scene in his own “Perseus Descending,” make out one whit better.\rThe huge corpulence of that Hogarthian monster undulates on the\rsurface, scarcely drawing one inch of water. It has a sort of howdah on\rits back, and its distended tusked mouth into which the billows are\rrolling, might be taken for the Traitors’ Gate leading from the Thames\rby water into the Tower. Then, there are the Prodromus whales of old\rScotch Sibbald, and Jonah’s whale, as depicted in the prints of old\rBibles and the cuts of old primers. What shall be said of these? As for\rthe book-binder’s whale winding like a vine-stalk round the stock of a\rdescending anchor—as stamped and gilded on the backs and title-pages of\rmany books both old and new—that is a very picturesque but purely\rfabulous creature, imitated, I take it, from the like figures on\rantique vases. Though universally denominated a dolphin, I nevertheless\rcall this book-binder’s fish an attempt at a whale; because it was so\rintended when the device was first introduced. It was introduced by an\rold Italian publisher somewhere about the 15th century, during the\rRevival of Learning; and in those days, and even down to a\rcomparatively late period, dolphins were popularly supposed to be a\rspecies of the Leviathan.\r\rIn the vignettes and other embellishments of some ancient books you\rwill at times meet with very curious touches at the whale, where all\rmanner of spouts, jets d’eau, hot springs and cold, Saratoga and\rBaden-Baden, come bubbling up from his unexhausted brain. In the\rtitle-page of the original edition of the “Advancement of Learning” you\rwill find some curious whales.\r\rBut quitting all these unprofessional attempts, let us glance at those\rpictures of leviathan purporting to be sober, scientific delineations,\rby those who know. In old Harris’s collection of voyages there are some\rplates of whales extracted from a Dutch book of voyages, A.D. 1671,\rentitled “A Whaling Voyage to Spitzbergen in the ship Jonas in the\rWhale, Peter Peterson of Friesland, master.” In one of those plates the\rwhales, like great rafts of logs, are represented lying among\rice-isles, with white bears running over their living backs. In another\rplate, the prodigious blunder is made of representing the whale with\rperpendicular flukes.\r\rThen again, there is an imposing quarto, written by one Captain\rColnett, a Post Captain in the English navy, entitled “A Voyage round\rCape Horn into the South Seas, for the purpose of extending the\rSpermaceti Whale Fisheries.” In this book is an outline purporting to\rbe a “Picture of a Physeter or Spermaceti whale, drawn by scale from\rone killed on the coast of Mexico, August, 1793, and hoisted on deck.”\rI doubt not the captain had this veracious picture taken for the\rbenefit of his marines. To mention but one thing about it, let me say\rthat it has an eye which applied, according to the accompanying scale,\rto a full grown sperm whale, would make the eye of that whale a\rbow-window some five feet long. Ah, my gallant captain, why did ye not\rgive us Jonah looking out of that eye!\r\rNor are the most conscientious compilations of Natural History for the\rbenefit of the young and tender, free from the same heinousness of\rmistake. Look at that popular work “Goldsmith’s Animated Nature.” In\rthe abridged London edition of 1807, there are plates of an alleged\r“whale” and a “narwhale.” I do not wish to seem inelegant, but this\runsightly whale looks much like an amputated sow; and, as for the\rnarwhale, one glimpse at it is enough to amaze one, that in this\rnineteenth century such a hippogriff could be palmed for genuine upon\rany intelligent public of schoolboys.\r\rThen, again, in 1825, Bernard Germain, Count de Lacépède, a great\rnaturalist, published a scientific systemized whale book, wherein are\rseveral pictures of the different species of the Leviathan. All these\rare not only incorrect, but the picture of the Mysticetus or Greenland\rwhale (that is to say, the Right whale), even Scoresby, a long\rexperienced man as touching that species, declares not to have its\rcounterpart in nature.\r\rBut the placing of the cap-sheaf to all this blundering business was\rreserved for the scientific Frederick Cuvier, brother to the famous\rBaron. In 1836, he published a Natural History of Whales, in which he\rgives what he calls a picture of the Sperm Whale. Before showing that\rpicture to any Nantucketer, you had best provide for your summary\rretreat from Nantucket. In a word, Frederick Cuvier’s Sperm Whale is\rnot a Sperm Whale, but a squash. Of course, he never had the benefit of\ra whaling voyage (such men seldom have), but whence he derived that\rpicture, who can tell? Perhaps he got it as his scientific predecessor\rin the same field, Desmarest, got one of his authentic abortions; that\ris, from a Chinese drawing. And what sort of lively lads with the\rpencil those Chinese are, many queer cups and saucers inform us.\r\rAs for the sign-painters’ whales seen in the streets hanging over the\rshops of oil-dealers, what shall be said of them? They are generally\rRichard III. whales, with dromedary humps, and very savage;\rbreakfasting on three or four sailor tarts, that is whaleboats full of\rmariners: their deformities floundering in seas of blood and blue\rpaint.\r\rBut these manifold mistakes in depicting the whale are not so very\rsurprising after all. Consider! Most of the scientific drawings have\rbeen taken from the stranded fish; and these are about as correct as a\rdrawing of a wrecked ship, with broken back, would correctly represent\rthe noble animal itself in all its undashed pride of hull and spars.\rThough elephants have stood for their full-lengths, the living\rLeviathan has never yet fairly floated himself for his portrait. The\rliving whale, in his full majesty and significance, is only to be seen\rat sea in unfathomable waters; and afloat the vast bulk of him is out\rof sight, like a launched line-of-battle ship; and out of that element\rit is a thing eternally impossible for mortal man to hoist him bodily\rinto the air, so as to preserve all his mighty swells and undulations.\rAnd, not to speak of the highly presumable difference of contour\rbetween a young sucking whale and a full-grown Platonian Leviathan;\ryet, even in the case of one of those young sucking whales hoisted to a\rship’s deck, such is then the outlandish, eel-like, limbered, varying\rshape of him, that his precise expression the devil himself could not\rcatch.\r\rBut it may be fancied, that from the naked skeleton of the stranded\rwhale, accurate hints may be derived touching his true form. Not at\rall. For it is one of the more curious things about this Leviathan,\rthat his skeleton gives very little idea of his general shape. Though\rJeremy Bentham’s skeleton, which hangs for candelabra in the library of\rone of his executors, correctly conveys the idea of a burly-browed\rutilitarian old gentleman, with all Jeremy’s other leading personal\rcharacteristics; yet nothing of this kind could be inferred from any\rleviathan’s articulated bones. In fact, as the great Hunter says, the\rmere skeleton of the whale bears the same relation to the fully\rinvested and padded animal as the insect does to the chrysalis that so\rroundingly envelopes it. This peculiarity is strikingly evinced in the\rhead, as in some part of this book will be incidentally shown. It is\ralso very curiously displayed in the side fin, the bones of which\ralmost exactly answer to the bones of the human hand, minus only the\rthumb. This fin has four regular bone-fingers, the index, middle, ring,\rand little finger. But all these are permanently lodged in their fleshy\rcovering, as the human fingers in an artificial covering. “However\rrecklessly the whale may sometimes serve us,” said humorous Stubb one\rday, “he can never be truly said to handle us without mittens.”\r\rFor all these reasons, then, any way you may look at it, you must needs\rconclude that the great Leviathan is that one creature in the world\rwhich must remain unpainted to the last. True, one portrait may hit the\rmark much nearer than another, but none can hit it with any very\rconsiderable degree of exactness. So there is no earthly way of finding\rout precisely what the whale really looks like. And the only mode in\rwhich you can derive even a tolerable idea of his living contour, is by\rgoing a whaling yourself; but by so doing, you run no small risk of\rbeing eternally stove and sunk by him. Wherefore, it seems to me you\rhad best not be too fastidious in your curiosity touching this\rLeviathan.\r\r\rCHAPTER 56. Of the Less Erroneous Pictures of Whales, and the True\rPictures of Whaling Scenes.\r\rIn connexion with the monstrous pictures of whales, I am strongly\rtempted here to enter upon those still more monstrous stories of them\rwhich are to be found in certain books, both ancient and modern,\respecially in Pliny, Purchas, Hackluyt, Harris, Cuvier, etc. But I pass\rthat matter by.\r\rI know of only four published outlines of the great Sperm Whale;\rColnett’s, Huggins’s, Frederick Cuvier’s, and Beale’s. In the previous\rchapter Colnett and Cuvier have been referred to. Huggins’s is far\rbetter than theirs; but, by great odds, Beale’s is the best. All\rBeale’s drawings of this whale are good, excepting the middle figure in\rthe picture of three whales in various attitudes, capping his second\rchapter. His frontispiece, boats attacking Sperm Whales, though no\rdoubt calculated to excite the civil scepticism of some parlor men, is\radmirably correct and life-like in its general effect. Some of the\rSperm Whale drawings in J. Ross Browne are pretty correct in contour;\rbut they are wretchedly engraved. That is not his fault though.\r\rOf the Right Whale, the best outline pictures are in Scoresby; but they\rare drawn on too small a scale to convey a desirable impression. He has\rbut one picture of whaling scenes, and this is a sad deficiency,\rbecause it is by such pictures only, when at all well done, that you\rcan derive anything like a truthful idea of the living whale as seen by\rhis living hunters.\r\rBut, taken for all in all, by far the finest, though in some details\rnot the most correct, presentations of whales and whaling scenes to be\ranywhere found, are two large French engravings, well executed, and\rtaken from paintings by one Garnery. Respectively, they represent\rattacks on the Sperm and Right Whale. In the first engraving a noble\rSperm Whale is depicted in full majesty of might, just risen beneath\rthe boat from the profundities of the ocean, and bearing high in the\rair upon his back the terrific wreck of the stoven planks. The prow of\rthe boat is partially unbroken, and is drawn just balancing upon the\rmonster’s spine; and standing in that prow, for that one single\rincomputable flash of time, you behold an oarsman, half shrouded by the\rincensed boiling spout of the whale, and in the act of leaping, as if\rfrom a precipice. The action of the whole thing is wonderfully good and\rtrue. The half-emptied line-tub floats on the whitened sea; the wooden\rpoles of the spilled harpoons obliquely bob in it; the heads of the\rswimming crew are scattered about the whale in contrasting expressions\rof affright; while in the black stormy distance the ship is bearing\rdown upon the scene. Serious fault might be found with the anatomical\rdetails of this whale, but let that pass; since, for the life of me, I\rcould not draw so good a one.\r\rIn the second engraving, the boat is in the act of drawing alongside\rthe barnacled flank of a large running Right Whale, that rolls his\rblack weedy bulk in the sea like some mossy rock-slide from the\rPatagonian cliffs. His jets are erect, full, and black like soot; so\rthat from so abounding a smoke in the chimney, you would think there\rmust be a brave supper cooking in the great bowels below. Sea fowls are\rpecking at the small crabs, shell-fish, and other sea candies and\rmaccaroni, which the Right Whale sometimes carries on his pestilent\rback. And all the while the thick-lipped leviathan is rushing through\rthe deep, leaving tons of tumultuous white curds in his wake, and\rcausing the slight boat to rock in the swells like a skiff caught nigh\rthe paddle-wheels of an ocean steamer. Thus, the foreground is all\rraging commotion; but behind, in admirable artistic contrast, is the\rglassy level of a sea becalmed, the drooping unstarched sails of the\rpowerless ship, and the inert mass of a dead whale, a conquered\rfortress, with the flag of capture lazily hanging from the whale-pole\rinserted into his spout-hole.\r\rWho Garnery the painter is, or was, I know not. But my life for it he\rwas either practically conversant with his subject, or else\rmarvellously tutored by some experienced whaleman. The French are the\rlads for painting action. Go and gaze upon all the paintings of Europe,\rand where will you find such a gallery of living and breathing\rcommotion on canvas, as in that triumphal hall at Versailles; where the\rbeholder fights his way, pell-mell, through the consecutive great\rbattles of France; where every sword seems a flash of the Northern\rLights, and the successive armed kings and Emperors dash by, like a\rcharge of crowned centaurs? Not wholly unworthy of a place in that\rgallery, are these sea battle-pieces of Garnery.\r\rThe natural aptitude of the French for seizing the picturesqueness of\rthings seems to be peculiarly evinced in what paintings and engravings\rthey have of their whaling scenes. With not one tenth of England’s\rexperience in the fishery, and not the thousandth part of that of the\rAmericans, they have nevertheless furnished both nations with the only\rfinished sketches at all capable of conveying the real spirit of the\rwhale hunt. For the most part, the English and American whale\rdraughtsmen seem entirely content with presenting the mechanical\routline of things, such as the vacant profile of the whale; which, so\rfar as picturesqueness of effect is concerned, is about tantamount to\rsketching the profile of a pyramid. Even Scoresby, the justly renowned\rRight whaleman, after giving us a stiff full length of the Greenland\rwhale, and three or four delicate miniatures of narwhales and\rporpoises, treats us to a series of classical engravings of boat hooks,\rchopping knives, and grapnels; and with the microscopic diligence of a\rLeuwenhoeck submits to the inspection of a shivering world ninety-six\rfac-similes of magnified Arctic snow crystals. I mean no disparagement\rto the excellent voyager (I honor him for a veteran), but in so\rimportant a matter it was certainly an oversight not to have procured\rfor every crystal a sworn affidavit taken before a Greenland Justice of\rthe Peace.\r\rIn addition to those fine engravings from Garnery, there are two other\rFrench engravings worthy of note, by some one who subscribes himself\r“H. Durand.” One of them, though not precisely adapted to our present\rpurpose, nevertheless deserves mention on other accounts. It is a quiet\rnoon-scene among the isles of the Pacific; a French whaler anchored,\rinshore, in a calm, and lazily taking water on board; the loosened\rsails of the ship, and the long leaves of the palms in the background,\rboth drooping together in the breezeless air. The effect is very fine,\rwhen considered with reference to its presenting the hardy fishermen\runder one of their few aspects of oriental repose. The other engraving\ris quite a different affair: the ship hove-to upon the open sea, and in\rthe very heart of the Leviathanic life, with a Right Whale alongside;\rthe vessel (in the act of cutting-in) hove over to the monster as if to\ra quay; and a boat, hurriedly pushing off from this scene of activity,\ris about giving chase to whales in the distance. The harpoons and\rlances lie levelled for use; three oarsmen are just setting the mast in\rits hole; while from a sudden roll of the sea, the little craft stands\rhalf-erect out of the water, like a rearing horse. From the ship, the\rsmoke of the torments of the boiling whale is going up like the smoke\rover a village of smithies; and to windward, a black cloud, rising up\rwith earnest of squalls and rains, seems to quicken the activity of the\rexcited seamen.\r\r\rCHAPTER 57. Of Whales in Paint; in Teeth; in Wood; in Sheet-Iron; in\rStone; in Mountains; in Stars.\r\rOn Tower-hill, as you go down to the London docks, you may have seen a\rcrippled beggar (or _kedger_, as the sailors say) holding a painted\rboard before him, representing the tragic scene in which he lost his\rleg. There are three whales and three boats; and one of the boats\r(presumed to contain the missing leg in all its original integrity) is\rbeing crunched by the jaws of the foremost whale. Any time these ten\ryears, they tell me, has that man held up that picture, and exhibited\rthat stump to an incredulous world. But the time of his justification\rhas now come. His three whales are as good whales as were ever\rpublished in Wapping, at any rate; and his stump as unquestionable a\rstump as any you will find in the western clearings. But, though for\rever mounted on that stump, never a stump-speech does the poor whaleman\rmake; but, with downcast eyes, stands ruefully contemplating his own\ramputation.\r\rThroughout the Pacific, and also in Nantucket, and New Bedford, and Sag\rHarbor, you will come across lively sketches of whales and\rwhaling-scenes, graven by the fishermen themselves on Sperm\rWhale-teeth, or ladies’ busks wrought out of the Right Whale-bone, and\rother like skrimshander articles, as the whalemen call the numerous\rlittle ingenious contrivances they elaborately carve out of the rough\rmaterial, in their hours of ocean leisure. Some of them have little\rboxes of dentistical-looking implements, specially intended for the\rskrimshandering business. But, in general, they toil with their\rjack-knives alone; and, with that almost omnipotent tool of the sailor,\rthey will turn you out anything you please, in the way of a mariner’s\rfancy.\r\rLong exile from Christendom and civilization inevitably restores a man\rto that condition in which God placed him, _i.e._ what is called\rsavagery. Your true whale-hunter is as much a savage as an Iroquois. I\rmyself am a savage, owning no allegiance but to the King of the\rCannibals; and ready at any moment to rebel against him.\r\rNow, one of the peculiar characteristics of the savage in his domestic\rhours, is his wonderful patience of industry. An ancient Hawaiian\rwar-club or spear-paddle, in its full multiplicity and elaboration of\rcarving, is as great a trophy of human perseverance as a Latin lexicon.\rFor, with but a bit of broken sea-shell or a shark’s tooth, that\rmiraculous intricacy of wooden net-work has been achieved; and it has\rcost steady years of steady application.\r\rAs with the Hawaiian savage, so with the white sailor-savage. With the\rsame marvellous patience, and with the same single shark’s tooth, of\rhis one poor jack-knife, he will carve you a bit of bone sculpture, not\rquite as workmanlike, but as close packed in its maziness of design, as\rthe Greek savage, Achilles’s shield; and full of barbaric spirit and\rsuggestiveness, as the prints of that fine old Dutch savage, Albert\rDurer.\r\rWooden whales, or whales cut in profile out of the small dark slabs of\rthe noble South Sea war-wood, are frequently met with in the\rforecastles of American whalers. Some of them are done with much\raccuracy.\r\rAt some old gable-roofed country houses you will see brass whales hung\rby the tail for knockers to the road-side door. When the porter is\rsleepy, the anvil-headed whale would be best. But these knocking whales\rare seldom remarkable as faithful essays. On the spires of some\rold-fashioned churches you will see sheet-iron whales placed there for\rweather-cocks; but they are so elevated, and besides that are to all\rintents and purposes so labelled with “_Hands off!_” you cannot examine\rthem closely enough to decide upon their merit.\r\rIn bony, ribby regions of the earth, where at the base of high broken\rcliffs masses of rock lie strewn in fantastic groupings upon the plain,\ryou will often discover images as of the petrified forms of the\rLeviathan partly merged in grass, which of a windy day breaks against\rthem in a surf of green surges.\r\rThen, again, in mountainous countries where the traveller is\rcontinually girdled by amphitheatrical heights; here and there from\rsome lucky point of view you will catch passing glimpses of the\rprofiles of whales defined along the undulating ridges. But you must be\ra thorough whaleman, to see these sights; and not only that, but if you\rwish to return to such a sight again, you must be sure and take the\rexact intersecting latitude and longitude of your first stand-point,\relse so chance-like are such observations of the hills, that your\rprecise, previous stand-point would require a laborious re-discovery;\rlike the Soloma Islands, which still remain incognita, though once\rhigh-ruffed Mendanna trod them and old Figuera chronicled them.\r\rNor when expandingly lifted by your subject, can you fail to trace out\rgreat whales in the starry heavens, and boats in pursuit of them; as\rwhen long filled with thoughts of war the Eastern nations saw armies\rlocked in battle among the clouds. Thus at the North have I chased\rLeviathan round and round the Pole with the revolutions of the bright\rpoints that first defined him to me. And beneath the effulgent\rAntarctic skies I have boarded the Argo-Navis, and joined the chase\ragainst the starry Cetus far beyond the utmost stretch of Hydrus and\rthe Flying Fish.\r\rWith a frigate’s anchors for my bridle-bitts and fasces of harpoons for\rspurs, would I could mount that whale and leap the topmost skies, to\rsee whether the fabled heavens with all their countless tents really\rlie encamped beyond my mortal sight!\r\r\rCHAPTER 58. Brit.\r\rSteering north-eastward from the Crozetts, we fell in with vast meadows\rof brit, the minute, yellow substance, upon which the Right Whale\rlargely feeds. For leagues and leagues it undulated round us, so that\rwe seemed to be sailing through boundless fields of ripe and golden\rwheat.\r\rOn the second day, numbers of Right Whales were seen, who, secure from\rthe attack of a Sperm Whaler like the Pequod, with open jaws sluggishly\rswam through the brit, which, adhering to the fringing fibres of that\rwondrous Venetian blind in their mouths, was in that manner separated\rfrom the water that escaped at the lip.\r\rAs morning mowers, who side by side slowly and seethingly advance their\rscythes through the long wet grass of marshy meads; even so these\rmonsters swam, making a strange, grassy, cutting sound; and leaving\rbehind them endless swaths of blue upon the yellow sea.*\r\r*That part of the sea known among whalemen as the “Brazil Banks” does\rnot bear that name as the Banks of Newfoundland do, because of there\rbeing shallows and soundings there, but because of this remarkable\rmeadow-like appearance, caused by the vast drifts of brit continually\rfloating in those latitudes, where the Right Whale is often chased.\r\rBut it was only the sound they made as they parted the brit which at\rall reminded one of mowers. Seen from the mast-heads, especially when\rthey paused and were stationary for a while, their vast black forms\rlooked more like lifeless masses of rock than anything else. And as in\rthe great hunting countries of India, the stranger at a distance will\rsometimes pass on the plains recumbent elephants without knowing them\rto be such, taking them for bare, blackened elevations of the soil;\reven so, often, with him, who for the first time beholds this species\rof the leviathans of the sea. And even when recognised at last, their\rimmense magnitude renders it very hard really to believe that such\rbulky masses of overgrowth can possibly be instinct, in all parts, with\rthe same sort of life that lives in a dog or a horse.\r\rIndeed, in other respects, you can hardly regard any creatures of the\rdeep with the same feelings that you do those of the shore. For though\rsome old naturalists have maintained that all creatures of the land are\rof their kind in the sea; and though taking a broad general view of the\rthing, this may very well be; yet coming to specialties, where, for\rexample, does the ocean furnish any fish that in disposition answers to\rthe sagacious kindness of the dog? The accursed shark alone can in any\rgeneric respect be said to bear comparative analogy to him.\r\rBut though, to landsmen in general, the native inhabitants of the seas\rhave ever been regarded with emotions unspeakably unsocial and\rrepelling; though we know the sea to be an everlasting terra incognita,\rso that Columbus sailed over numberless unknown worlds to discover his\rone superficial western one; though, by vast odds, the most terrific of\rall mortal disasters have immemorially and indiscriminately befallen\rtens and hundreds of thousands of those who have gone upon the waters;\rthough but a moment’s consideration will teach, that however baby man\rmay brag of his science and skill, and however much, in a flattering\rfuture, that science and skill may augment; yet for ever and for ever,\rto the crack of doom, the sea will insult and murder him, and pulverize\rthe stateliest, stiffest frigate he can make; nevertheless, by the\rcontinual repetition of these very impressions, man has lost that sense\rof the full awfulness of the sea which aboriginally belongs to it.\r\rThe first boat we read of, floated on an ocean, that with Portuguese\rvengeance had whelmed a whole world without leaving so much as a widow.\rThat same ocean rolls now; that same ocean destroyed the wrecked ships\rof last year. Yea, foolish mortals, Noah’s flood is not yet subsided;\rtwo thirds of the fair world it yet covers.\r\rWherein differ the sea and the land, that a miracle upon one is not a\rmiracle upon the other? Preternatural terrors rested upon the Hebrews,\rwhen under the feet of Korah and his company the live ground opened and\rswallowed them up for ever; yet not a modern sun ever sets, but in\rprecisely the same manner the live sea swallows up ships and crews.\r\rBut not only is the sea such a foe to man who is an alien to it, but it\ris also a fiend to its own off-spring; worse than the Persian host who\rmurdered his own guests; sparing not the creatures which itself hath\rspawned. Like a savage tigress that tossing in the jungle overlays her\rown cubs, so the sea dashes even the mightiest whales against the\rrocks, and leaves them there side by side with the split wrecks of\rships. No mercy, no power but its own controls it. Panting and snorting\rlike a mad battle steed that has lost its rider, the masterless ocean\roverruns the globe.\r\rConsider the subtleness of the sea; how its most dreaded creatures\rglide under water, unapparent for the most part, and treacherously\rhidden beneath the loveliest tints of azure. Consider also the devilish\rbrilliance and beauty of many of its most remorseless tribes, as the\rdainty embellished shape of many species of sharks. Consider, once\rmore, the universal cannibalism of the sea; all whose creatures prey\rupon each other, carrying on eternal war since the world began.\r\rConsider all this; and then turn to this green, gentle, and most docile\rearth; consider them both, the sea and the land; and do you not find a\rstrange analogy to something in yourself? For as this appalling ocean\rsurrounds the verdant land, so in the soul of man there lies one\rinsular Tahiti, full of peace and joy, but encompassed by all the\rhorrors of the half known life. God keep thee! Push not off from that\risle, thou canst never return!\r\r\rCHAPTER 59. Squid.\r\rSlowly wading through the meadows of brit, the Pequod still held on her\rway north-eastward towards the island of Java; a gentle air impelling\rher keel, so that in the surrounding serenity her three tall tapering\rmasts mildly waved to that languid breeze, as three mild palms on a\rplain. And still, at wide intervals in the silvery night, the lonely,\ralluring jet would be seen.\r\rBut one transparent blue morning, when a stillness almost preternatural\rspread over the sea, however unattended with any stagnant calm; when\rthe long burnished sun-glade on the waters seemed a golden finger laid\racross them, enjoining some secrecy; when the slippered waves whispered\rtogether as they softly ran on; in this profound hush of the visible\rsphere a strange spectre was seen by Daggoo from the main-mast-head.\r\rIn the distance, a great white mass lazily rose, and rising higher and\rhigher, and disentangling itself from the azure, at last gleamed before\rour prow like a snow-slide, new slid from the hills. Thus glistening\rfor a moment, as slowly it subsided, and sank. Then once more arose,\rand silently gleamed. It seemed not a whale; and yet is this Moby Dick?\rthought Daggoo. Again the phantom went down, but on re-appearing once\rmore, with a stiletto-like cry that startled every man from his nod,\rthe negro yelled out—“There! there again! there she breaches! right\rahead! The White Whale, the White Whale!”\r\rUpon this, the seamen rushed to the yard-arms, as in swarming-time the\rbees rush to the boughs. Bare-headed in the sultry sun, Ahab stood on\rthe bowsprit, and with one hand pushed far behind in readiness to wave\rhis orders to the helmsman, cast his eager glance in the direction\rindicated aloft by the outstretched motionless arm of Daggoo.\r\rWhether the flitting attendance of the one still and solitary jet had\rgradually worked upon Ahab, so that he was now prepared to connect the\rideas of mildness and repose with the first sight of the particular\rwhale he pursued; however this was, or whether his eagerness betrayed\rhim; whichever way it might have been, no sooner did he distinctly\rperceive the white mass, than with a quick intensity he instantly gave\rorders for lowering.\r\rThe four boats were soon on the water; Ahab’s in advance, and all\rswiftly pulling towards their prey. Soon it went down, and while, with\roars suspended, we were awaiting its reappearance, lo! in the same spot\rwhere it sank, once more it slowly rose. Almost forgetting for the\rmoment all thoughts of Moby Dick, we now gazed at the most wondrous\rphenomenon which the secret seas have hitherto revealed to mankind. A\rvast pulpy mass, furlongs in length and breadth, of a glancing\rcream-colour, lay floating on the water, innumerable long arms\rradiating from its centre, and curling and twisting like a nest of\ranacondas, as if blindly to clutch at any hapless object within reach.\rNo perceptible face or front did it have; no conceivable token of\reither sensation or instinct; but undulated there on the billows, an\runearthly, formless, chance-like apparition of life.\r\rAs with a low sucking sound it slowly disappeared again, Starbuck still\rgazing at the agitated waters where it had sunk, with a wild voice\rexclaimed—“Almost rather had I seen Moby Dick and fought him, than to\rhave seen thee, thou white ghost!”\r\r“What was it, Sir?” said Flask.\r\r“The great live squid, which, they say, few whale-ships ever beheld,\rand returned to their ports to tell of it.”\r\rBut Ahab said nothing; turning his boat, he sailed back to the vessel;\rthe rest as silently following.\r\rWhatever superstitions the sperm whalemen in general have connected\rwith the sight of this object, certain it is, that a glimpse of it\rbeing so very unusual, that circumstance has gone far to invest it with\rportentousness. So rarely is it beheld, that though one and all of them\rdeclare it to be the largest animated thing in the ocean, yet very few\rof them have any but the most vague ideas concerning its true nature\rand form; notwithstanding, they believe it to furnish to the sperm\rwhale his only food. For though other species of whales find their food\rabove water, and may be seen by man in the act of feeding, the\rspermaceti whale obtains his whole food in unknown zones below the\rsurface; and only by inference is it that any one can tell of what,\rprecisely, that food consists. At times, when closely pursued, he will\rdisgorge what are supposed to be the detached arms of the squid; some\rof them thus exhibited exceeding twenty and thirty feet in length. They\rfancy that the monster to which these arms belonged ordinarily clings\rby them to the bed of the ocean; and that the sperm whale, unlike other\rspecies, is supplied with teeth in order to attack and tear it.\r\rThere seems some ground to imagine that the great Kraken of Bishop\rPontoppodan may ultimately resolve itself into Squid. The manner in\rwhich the Bishop describes it, as alternately rising and sinking, with\rsome other particulars he narrates, in all this the two correspond. But\rmuch abatement is necessary with respect to the incredible bulk he\rassigns it.\r\rBy some naturalists who have vaguely heard rumors of the mysterious\rcreature, here spoken of, it is included among the class of\rcuttle-fish, to which, indeed, in certain external respects it would\rseem to belong, but only as the Anak of the tribe.\r\r\rCHAPTER 60. The Line.\r\rWith reference to the whaling scene shortly to be described, as well as\rfor the better understanding of all similar scenes elsewhere presented,\rI have here to speak of the magical, sometimes horrible whale-line.\r\rThe line originally used in the fishery was of the best hemp, slightly\rvapored with tar, not impregnated with it, as in the case of ordinary\rropes; for while tar, as ordinarily used, makes the hemp more pliable\rto the rope-maker, and also renders the rope itself more convenient to\rthe sailor for common ship use; yet, not only would the ordinary\rquantity too much stiffen the whale-line for the close coiling to which\rit must be subjected; but as most seamen are beginning to learn, tar in\rgeneral by no means adds to the rope’s durability or strength, however\rmuch it may give it compactness and gloss.\r\rOf late years the Manilla rope has in the American fishery almost\rentirely superseded hemp as a material for whale-lines; for, though not\rso durable as hemp, it is stronger, and far more soft and elastic; and\rI will add (since there is an æsthetics in all things), is much more\rhandsome and becoming to the boat, than hemp. Hemp is a dusky, dark\rfellow, a sort of Indian; but Manilla is as a golden-haired Circassian\rto behold.\r\rThe whale-line is only two-thirds of an inch in thickness. At first\rsight, you would not think it so strong as it really is. By experiment\rits one and fifty yarns will each suspend a weight of one hundred and\rtwenty pounds; so that the whole rope will bear a strain nearly equal\rto three tons. In length, the common sperm whale-line measures\rsomething over two hundred fathoms. Towards the stern of the boat it is\rspirally coiled away in the tub, not like the worm-pipe of a still\rthough, but so as to form one round, cheese-shaped mass of densely\rbedded “sheaves,” or layers of concentric spiralizations, without any\rhollow but the “heart,” or minute vertical tube formed at the axis of\rthe cheese. As the least tangle or kink in the coiling would, in\rrunning out, infallibly take somebody’s arm, leg, or entire body off,\rthe utmost precaution is used in stowing the line in its tub. Some\rharpooneers will consume almost an entire morning in this business,\rcarrying the line high aloft and then reeving it downwards through a\rblock towards the tub, so as in the act of coiling to free it from all\rpossible wrinkles and twists.\r\rIn the English boats two tubs are used instead of one; the same line\rbeing continuously coiled in both tubs. There is some advantage in\rthis; because these twin-tubs being so small they fit more readily into\rthe boat, and do not strain it so much; whereas, the American tub,\rnearly three feet in diameter and of proportionate depth, makes a\rrather bulky freight for a craft whose planks are but one half-inch in\rthickness; for the bottom of the whale-boat is like critical ice, which\rwill bear up a considerable distributed weight, but not very much of a\rconcentrated one. When the painted canvas cover is clapped on the\rAmerican line-tub, the boat looks as if it were pulling off with a\rprodigious great wedding-cake to present to the whales.\r\rBoth ends of the line are exposed; the lower end terminating in an\reye-splice or loop coming up from the bottom against the side of the\rtub, and hanging over its edge completely disengaged from everything.\rThis arrangement of the lower end is necessary on two accounts. First:\rIn order to facilitate the fastening to it of an additional line from a\rneighboring boat, in case the stricken whale should sound so deep as to\rthreaten to carry off the entire line originally attached to the\rharpoon. In these instances, the whale of course is shifted like a mug\rof ale, as it were, from the one boat to the other; though the first\rboat always hovers at hand to assist its consort. Second: This\rarrangement is indispensable for common safety’s sake; for were the\rlower end of the line in any way attached to the boat, and were the\rwhale then to run the line out to the end almost in a single, smoking\rminute as he sometimes does, he would not stop there, for the doomed\rboat would infallibly be dragged down after him into the profundity of\rthe sea; and in that case no town-crier would ever find her again.\r\rBefore lowering the boat for the chase, the upper end of the line is\rtaken aft from the tub, and passing round the loggerhead there, is\ragain carried forward the entire length of the boat, resting crosswise\rupon the loom or handle of every man’s oar, so that it jogs against his\rwrist in rowing; and also passing between the men, as they alternately\rsit at the opposite gunwales, to the leaded chocks or grooves in the\rextreme pointed prow of the boat, where a wooden pin or skewer the size\rof a common quill, prevents it from slipping out. From the chocks it\rhangs in a slight festoon over the bows, and is then passed inside the\rboat again; and some ten or twenty fathoms (called box-line) being\rcoiled upon the box in the bows, it continues its way to the gunwale\rstill a little further aft, and is then attached to the short-warp—the\rrope which is immediately connected with the harpoon; but previous to\rthat connexion, the short-warp goes through sundry mystifications too\rtedious to detail.\r\rThus the whale-line folds the whole boat in its complicated coils,\rtwisting and writhing around it in almost every direction. All the\roarsmen are involved in its perilous contortions; so that to the timid\reye of the landsman, they seem as Indian jugglers, with the deadliest\rsnakes sportively festooning their limbs. Nor can any son of mortal\rwoman, for the first time, seat himself amid those hempen intricacies,\rand while straining his utmost at the oar, bethink him that at any\runknown instant the harpoon may be darted, and all these horrible\rcontortions be put in play like ringed lightnings; he cannot be thus\rcircumstanced without a shudder that makes the very marrow in his bones\rto quiver in him like a shaken jelly. Yet habit—strange thing! what\rcannot habit accomplish?—Gayer sallies, more merry mirth, better jokes,\rand brighter repartees, you never heard over your mahogany, than you\rwill hear over the half-inch white cedar of the whale-boat, when thus\rhung in hangman’s nooses; and, like the six burghers of Calais before\rKing Edward, the six men composing the crew pull into the jaws of\rdeath, with a halter around every neck, as you may say.\r\rPerhaps a very little thought will now enable you to account for those\rrepeated whaling disasters—some few of which are casually chronicled—of\rthis man or that man being taken out of the boat by the line, and lost.\rFor, when the line is darting out, to be seated then in the boat, is\rlike being seated in the midst of the manifold whizzings of a\rsteam-engine in full play, when every flying beam, and shaft, and\rwheel, is grazing you. It is worse; for you cannot sit motionless in\rthe heart of these perils, because the boat is rocking like a cradle,\rand you are pitched one way and the other, without the slightest\rwarning; and only by a certain self-adjusting buoyancy and\rsimultaneousness of volition and action, can you escape being made a\rMazeppa of, and run away with where the all-seeing sun himself could\rnever pierce you out.\r\rAgain: as the profound calm which only apparently precedes and\rprophesies of the storm, is perhaps more awful than the storm itself;\rfor, indeed, the calm is but the wrapper and envelope of the storm; and\rcontains it in itself, as the seemingly harmless rifle holds the fatal\rpowder, and the ball, and the explosion; so the graceful repose of the\rline, as it silently serpentines about the oarsmen before being brought\rinto actual play—this is a thing which carries more of true terror than\rany other aspect of this dangerous affair. But why say more? All men\rlive enveloped in whale-lines. All are born with halters round their\rnecks; but it is only when caught in the swift, sudden turn of death,\rthat mortals realize the silent, subtle, ever-present perils of life.\rAnd if you be a philosopher, though seated in the whale-boat, you would\rnot at heart feel one whit more of terror, than though seated before\ryour evening fire with a poker, and not a harpoon, by your side.\r\r\rCHAPTER 61. Stubb Kills a Whale.\r\rIf to Starbuck the apparition of the Squid was a thing of portents, to\rQueequeg it was quite a different object.\r\r“When you see him ’quid,” said the savage, honing his harpoon in the\rbow of his hoisted boat, “then you quick see him ’parm whale.”\r\rThe next day was exceedingly still and sultry, and with nothing special\rto engage them, the Pequod’s crew could hardly resist the spell of\rsleep induced by such a vacant sea. For this part of the Indian Ocean\rthrough which we then were voyaging is not what whalemen call a lively\rground; that is, it affords fewer glimpses of porpoises, dolphins,\rflying-fish, and other vivacious denizens of more stirring waters, than\rthose off the Rio de la Plata, or the in-shore ground off Peru.\r\rIt was my turn to stand at the foremast-head; and with my shoulders\rleaning against the slackened royal shrouds, to and fro I idly swayed\rin what seemed an enchanted air. No resolution could withstand it; in\rthat dreamy mood losing all consciousness, at last my soul went out of\rmy body; though my body still continued to sway as a pendulum will,\rlong after the power which first moved it is withdrawn.\r\rEre forgetfulness altogether came over me, I had noticed that the\rseamen at the main and mizzen-mast-heads were already drowsy. So that\rat last all three of us lifelessly swung from the spars, and for every\rswing that we made there was a nod from below from the slumbering\rhelmsman. The waves, too, nodded their indolent crests; and across the\rwide trance of the sea, east nodded to west, and the sun over all.\r\rSuddenly bubbles seemed bursting beneath my closed eyes; like vices my\rhands grasped the shrouds; some invisible, gracious agency preserved\rme; with a shock I came back to life. And lo! close under our lee, not\rforty fathoms off, a gigantic Sperm Whale lay rolling in the water like\rthe capsized hull of a frigate, his broad, glossy back, of an Ethiopian\rhue, glistening in the sun’s rays like a mirror. But lazily undulating\rin the trough of the sea, and ever and anon tranquilly spouting his\rvapory jet, the whale looked like a portly burgher smoking his pipe of\ra warm afternoon. But that pipe, poor whale, was thy last. As if struck\rby some enchanter’s wand, the sleepy ship and every sleeper in it all\rat once started into wakefulness; and more than a score of voices from\rall parts of the vessel, simultaneously with the three notes from\raloft, shouted forth the accustomed cry, as the great fish slowly and\rregularly spouted the sparkling brine into the air.\r\r“Clear away the boats! Luff!” cried Ahab. And obeying his own order, he\rdashed the helm down before the helmsman could handle the spokes.\r\rThe sudden exclamations of the crew must have alarmed the whale; and\rere the boats were down, majestically turning, he swam away to the\rleeward, but with such a steady tranquillity, and making so few ripples\ras he swam, that thinking after all he might not as yet be alarmed,\rAhab gave orders that not an oar should be used, and no man must speak\rbut in whispers. So seated like Ontario Indians on the gunwales of the\rboats, we swiftly but silently paddled along; the calm not admitting of\rthe noiseless sails being set. Presently, as we thus glided in chase,\rthe monster perpendicularly flitted his tail forty feet into the air,\rand then sank out of sight like a tower swallowed up.\r\r“There go flukes!” was the cry, an announcement immediately followed by\rStubb’s producing his match and igniting his pipe, for now a respite\rwas granted. After the full interval of his sounding had elapsed, the\rwhale rose again, and being now in advance of the smoker’s boat, and\rmuch nearer to it than to any of the others, Stubb counted upon the\rhonor of the capture. It was obvious, now, that the whale had at length\rbecome aware of his pursuers. All silence of cautiousness was therefore\rno longer of use. Paddles were dropped, and oars came loudly into play.\rAnd still puffing at his pipe, Stubb cheered on his crew to the\rassault.\r\rYes, a mighty change had come over the fish. All alive to his jeopardy,\rhe was going “head out”; that part obliquely projecting from the mad\ryeast which he brewed.*\r\r*It will be seen in some other place of what a very light substance the\rentire interior of the sperm whale’s enormous head consists. Though\rapparently the most massive, it is by far the most buoyant part about\rhim. So that with ease he elevates it in the air, and invariably does\rso when going at his utmost speed. Besides, such is the breadth of the\rupper part of the front of his head, and such the tapering cut-water\rformation of the lower part, that by obliquely elevating his head, he\rthereby may be said to transform himself from a bluff-bowed sluggish\rgalliot into a sharppointed New York pilot-boat.\r\r“Start her, start her, my men! Don’t hurry yourselves; take plenty of\rtime—but start her; start her like thunder-claps, that’s all,” cried\rStubb, spluttering out the smoke as he spoke. “Start her, now; give ’em\rthe long and strong stroke, Tashtego. Start her, Tash, my boy—start\rher, all; but keep cool, keep cool—cucumbers is the word—easy,\reasy—only start her like grim death and grinning devils, and raise the\rburied dead perpendicular out of their graves, boys—that’s all. Start\rher!”\r\r“Woo-hoo! Wa-hee!” screamed the Gay-Header in reply, raising some old\rwar-whoop to the skies; as every oarsman in the strained boat\rinvoluntarily bounced forward with the one tremendous leading stroke\rwhich the eager Indian gave.\r\rBut his wild screams were answered by others quite as wild. “Kee-hee!\rKee-hee!” yelled Daggoo, straining forwards and backwards on his seat,\rlike a pacing tiger in his cage.\r\r“Ka-la! Koo-loo!” howled Queequeg, as if smacking his lips over a\rmouthful of Grenadier’s steak. And thus with oars and yells the keels\rcut the sea. Meanwhile, Stubb retaining his place in the van, still\rencouraged his men to the onset, all the while puffing the smoke from\rhis mouth. Like desperadoes they tugged and they strained, till the\rwelcome cry was heard—“Stand up, Tashtego!—give it to him!” The harpoon\rwas hurled. “Stern all!” The oarsmen backed water; the same moment\rsomething went hot and hissing along every one of their wrists. It was\rthe magical line. An instant before, Stubb had swiftly caught two\radditional turns with it round the loggerhead, whence, by reason of its\rincreased rapid circlings, a hempen blue smoke now jetted up and\rmingled with the steady fumes from his pipe. As the line passed round\rand round the loggerhead; so also, just before reaching that point, it\rblisteringly passed through and through both of Stubb’s hands, from\rwhich the hand-cloths, or squares of quilted canvas sometimes worn at\rthese times, had accidentally dropped. It was like holding an enemy’s\rsharp two-edged sword by the blade, and that enemy all the time\rstriving to wrest it out of your clutch.\r\r“Wet the line! wet the line!” cried Stubb to the tub oarsman (him\rseated by the tub) who, snatching off his hat, dashed sea-water into\rit.* More turns were taken, so that the line began holding its place.\rThe boat now flew through the boiling water like a shark all fins.\rStubb and Tashtego here changed places—stem for stern—a staggering\rbusiness truly in that rocking commotion.\r\r*Partly to show the indispensableness of this act, it may here be\rstated, that, in the old Dutch fishery, a mop was used to dash the\rrunning line with water; in many other ships, a wooden piggin, or\rbailer, is set apart for that purpose. Your hat, however, is the most\rconvenient.\r\rFrom the vibrating line extending the entire length of the upper part\rof the boat, and from its now being more tight than a harpstring, you\rwould have thought the craft had two keels—one cleaving the water, the\rother the air—as the boat churned on through both opposing elements at\ronce. A continual cascade played at the bows; a ceaseless whirling eddy\rin her wake; and, at the slightest motion from within, even but of a\rlittle finger, the vibrating, cracking craft canted over her spasmodic\rgunwale into the sea. Thus they rushed; each man with might and main\rclinging to his seat, to prevent being tossed to the foam; and the tall\rform of Tashtego at the steering oar crouching almost double, in order\rto bring down his centre of gravity. Whole Atlantics and Pacifics\rseemed passed as they shot on their way, till at length the whale\rsomewhat slackened his flight.\r\r“Haul in—haul in!” cried Stubb to the bowsman! and, facing round\rtowards the whale, all hands began pulling the boat up to him, while\ryet the boat was being towed on. Soon ranging up by his flank, Stubb,\rfirmly planting his knee in the clumsy cleat, darted dart after dart\rinto the flying fish; at the word of command, the boat alternately\rsterning out of the way of the whale’s horrible wallow, and then\rranging up for another fling.\r\rThe red tide now poured from all sides of the monster like brooks down\ra hill. His tormented body rolled not in brine but in blood, which\rbubbled and seethed for furlongs behind in their wake. The slanting sun\rplaying upon this crimson pond in the sea, sent back its reflection\rinto every face, so that they all glowed to each other like red men.\rAnd all the while, jet after jet of white smoke was agonizingly shot\rfrom the spiracle of the whale, and vehement puff after puff from the\rmouth of the excited headsman; as at every dart, hauling in upon his\rcrooked lance (by the line attached to it), Stubb straightened it again\rand again, by a few rapid blows against the gunwale, then again and\ragain sent it into the whale.\r\r“Pull up—pull up!” he now cried to the bowsman, as the waning whale\rrelaxed in his wrath. “Pull up!—close to!” and the boat ranged along\rthe fish’s flank. When reaching far over the bow, Stubb slowly churned\rhis long sharp lance into the fish, and kept it there, carefully\rchurning and churning, as if cautiously seeking to feel after some gold\rwatch that the whale might have swallowed, and which he was fearful of\rbreaking ere he could hook it out. But that gold watch he sought was\rthe innermost life of the fish. And now it is struck; for, starting\rfrom his trance into that unspeakable thing called his “flurry,” the\rmonster horribly wallowed in his blood, overwrapped himself in\rimpenetrable, mad, boiling spray, so that the imperilled craft,\rinstantly dropping astern, had much ado blindly to struggle out from\rthat phrensied twilight into the clear air of the day.\r\rAnd now abating in his flurry, the whale once more rolled out into\rview; surging from side to side; spasmodically dilating and contracting\rhis spout-hole, with sharp, cracking, agonized respirations. At last,\rgush after gush of clotted red gore, as if it had been the purple lees\rof red wine, shot into the frighted air; and falling back again, ran\rdripping down his motionless flanks into the sea. His heart had burst!\r\r“He’s dead, Mr. Stubb,” said Daggoo.\r\r“Yes; both pipes smoked out!” and withdrawing his own from his mouth,\rStubb scattered the dead ashes over the water; and, for a moment, stood\rthoughtfully eyeing the vast corpse he had made.\r\r\rCHAPTER 62. The Dart.\r\rA word concerning an incident in the last chapter.\r\rAccording to the invariable usage of the fishery, the whale-boat pushes\roff from the ship, with the headsman or whale-killer as temporary\rsteersman, and the harpooneer or whale-fastener pulling the foremost\roar, the one known as the harpooneer-oar. Now it needs a strong,\rnervous arm to strike the first iron into the fish; for often, in what\ris called a long dart, the heavy implement has to be flung to the\rdistance of twenty or thirty feet. But however prolonged and exhausting\rthe chase, the harpooneer is expected to pull his oar meanwhile to the\ruttermost; indeed, he is expected to set an example of superhuman\ractivity to the rest, not only by incredible rowing, but by repeated\rloud and intrepid exclamations; and what it is to keep shouting at the\rtop of one’s compass, while all the other muscles are strained and half\rstarted—what that is none know but those who have tried it. For one, I\rcannot bawl very heartily and work very recklessly at one and the same\rtime. In this straining, bawling state, then, with his back to the\rfish, all at once the exhausted harpooneer hears the exciting\rcry—“Stand up, and give it to him!” He now has to drop and secure his\roar, turn round on his centre half way, seize his harpoon from the\rcrotch, and with what little strength may remain, he essays to pitch it\rsomehow into the whale. No wonder, taking the whole fleet of whalemen\rin a body, that out of fifty fair chances for a dart, not five are\rsuccessful; no wonder that so many hapless harpooneers are madly cursed\rand disrated; no wonder that some of them actually burst their\rblood-vessels in the boat; no wonder that some sperm whalemen are\rabsent four years with four barrels; no wonder that to many ship\rowners, whaling is but a losing concern; for it is the harpooneer that\rmakes the voyage, and if you take the breath out of his body how can\ryou expect to find it there when most wanted!\r\rAgain, if the dart be successful, then at the second critical instant,\rthat is, when the whale starts to run, the boatheader and harpooneer\rlikewise start to running fore and aft, to the imminent jeopardy of\rthemselves and every one else. It is then they change places; and the\rheadsman, the chief officer of the little craft, takes his proper\rstation in the bows of the boat.\r\rNow, I care not who maintains the contrary, but all this is both\rfoolish and unnecessary. The headsman should stay in the bows from\rfirst to last; he should both dart the harpoon and the lance, and no\rrowing whatever should be expected of him, except under circumstances\robvious to any fisherman. I know that this would sometimes involve a\rslight loss of speed in the chase; but long experience in various\rwhalemen of more than one nation has convinced me that in the vast\rmajority of failures in the fishery, it has not by any means been so\rmuch the speed of the whale as the before described exhaustion of the\rharpooneer that has caused them.\r\rTo insure the greatest efficiency in the dart, the harpooneers of this\rworld must start to their feet from out of idleness, and not from out\rof toil.\r\r\rCHAPTER 63. The Crotch.\r\rOut of the trunk, the branches grow; out of them, the twigs. So, in\rproductive subjects, grow the chapters.\r\rThe crotch alluded to on a previous page deserves independent mention.\rIt is a notched stick of a peculiar form, some two feet in length,\rwhich is perpendicularly inserted into the starboard gunwale near the\rbow, for the purpose of furnishing a rest for the wooden extremity of\rthe harpoon, whose other naked, barbed end slopingly projects from the\rprow. Thereby the weapon is instantly at hand to its hurler, who\rsnatches it up as readily from its rest as a backwoodsman swings his\rrifle from the wall. It is customary to have two harpoons reposing in\rthe crotch, respectively called the first and second irons.\r\rBut these two harpoons, each by its own cord, are both connected with\rthe line; the object being this: to dart them both, if possible, one\rinstantly after the other into the same whale; so that if, in the\rcoming drag, one should draw out, the other may still retain a hold. It\ris a doubling of the chances. But it very often happens that owing to\rthe instantaneous, violent, convulsive running of the whale upon\rreceiving the first iron, it becomes impossible for the harpooneer,\rhowever lightning-like in his movements, to pitch the second iron into\rhim. Nevertheless, as the second iron is already connected with the\rline, and the line is running, hence that weapon must, at all events,\rbe anticipatingly tossed out of the boat, somehow and somewhere; else\rthe most terrible jeopardy would involve all hands. Tumbled into the\rwater, it accordingly is in such cases; the spare coils of box line\r(mentioned in a preceding chapter) making this feat, in most instances,\rprudently practicable. But this critical act is not always unattended\rwith the saddest and most fatal casualties.\r\rFurthermore: you must know that when the second iron is thrown\roverboard, it thenceforth becomes a dangling, sharp-edged terror,\rskittishly curvetting about both boat and whale, entangling the lines,\ror cutting them, and making a prodigious sensation in all directions.\rNor, in general, is it possible to secure it again until the whale is\rfairly captured and a corpse.\r\rConsider, now, how it must be in the case of four boats all engaging\rone unusually strong, active, and knowing whale; when owing to these\rqualities in him, as well as to the thousand concurring accidents of\rsuch an audacious enterprise, eight or ten loose second irons may be\rsimultaneously dangling about him. For, of course, each boat is\rsupplied with several harpoons to bend on to the line should the first\rone be ineffectually darted without recovery. All these particulars are\rfaithfully narrated here, as they will not fail to elucidate several\rmost important, however intricate passages, in scenes hereafter to be\rpainted.\r\r\rCHAPTER 64. Stubb’s Supper.\r\rStubb’s whale had been killed some distance from the ship. It was a\rcalm; so, forming a tandem of three boats, we commenced the slow\rbusiness of towing the trophy to the Pequod. And now, as we eighteen\rmen with our thirty-six arms, and one hundred and eighty thumbs and\rfingers, slowly toiled hour after hour upon that inert, sluggish corpse\rin the sea; and it seemed hardly to budge at all, except at long\rintervals; good evidence was hereby furnished of the enormousness of\rthe mass we moved. For, upon the great canal of Hang-Ho, or whatever\rthey call it, in China, four or five laborers on the foot-path will\rdraw a bulky freighted junk at the rate of a mile an hour; but this\rgrand argosy we towed heavily forged along, as if laden with pig-lead\rin bulk.\r\rDarkness came on; but three lights up and down in the Pequod’s\rmain-rigging dimly guided our way; till drawing nearer we saw Ahab\rdropping one of several more lanterns over the bulwarks. Vacantly\reyeing the heaving whale for a moment, he issued the usual orders for\rsecuring it for the night, and then handing his lantern to a seaman,\rwent his way into the cabin, and did not come forward again until\rmorning.\r\rThough, in overseeing the pursuit of this whale, Captain Ahab had\revinced his customary activity, to call it so; yet now that the\rcreature was dead, some vague dissatisfaction, or impatience, or\rdespair, seemed working in him; as if the sight of that dead body\rreminded him that Moby Dick was yet to be slain; and though a thousand\rother whales were brought to his ship, all that would not one jot\radvance his grand, monomaniac object. Very soon you would have thought\rfrom the sound on the Pequod’s decks, that all hands were preparing to\rcast anchor in the deep; for heavy chains are being dragged along the\rdeck, and thrust rattling out of the port-holes. But by those clanking\rlinks, the vast corpse itself, not the ship, is to be moored. Tied by\rthe head to the stern, and by the tail to the bows, the whale now lies\rwith its black hull close to the vessel’s and seen through the darkness\rof the night, which obscured the spars and rigging aloft, the two—ship\rand whale, seemed yoked together like colossal bullocks, whereof one\rreclines while the other remains standing.*\r\r*A little item may as well be related here. The strongest and most\rreliable hold which the ship has upon the whale when moored alongside,\ris by the flukes or tail; and as from its greater density that part is\rrelatively heavier than any other (excepting the side-fins), its\rflexibility even in death, causes it to sink low beneath the surface;\rso that with the hand you cannot get at it from the boat, in order to\rput the chain round it. But this difficulty is ingeniously overcome: a\rsmall, strong line is prepared with a wooden float at its outer end,\rand a weight in its middle, while the other end is secured to the ship.\rBy adroit management the wooden float is made to rise on the other side\rof the mass, so that now having girdled the whale, the chain is readily\rmade to follow suit; and being slipped along the body, is at last\rlocked fast round the smallest part of the tail, at the point of\rjunction with its broad flukes or lobes.\r\rIf moody Ahab was now all quiescence, at least so far as could be known\ron deck, Stubb, his second mate, flushed with conquest, betrayed an\runusual but still good-natured excitement. Such an unwonted bustle was\rhe in that the staid Starbuck, his official superior, quietly resigned\rto him for the time the sole management of affairs. One small, helping\rcause of all this liveliness in Stubb, was soon made strangely\rmanifest. Stubb was a high liver; he was somewhat intemperately fond of\rthe whale as a flavorish thing to his palate.\r\r“A steak, a steak, ere I sleep! You, Daggoo! overboard you go, and cut\rme one from his small!”\r\rHere be it known, that though these wild fishermen do not, as a general\rthing, and according to the great military maxim, make the enemy defray\rthe current expenses of the war (at least before realizing the proceeds\rof the voyage), yet now and then you find some of these Nantucketers\rwho have a genuine relish for that particular part of the Sperm Whale\rdesignated by Stubb; comprising the tapering extremity of the body.\r\rAbout midnight that steak was cut and cooked; and lighted by two\rlanterns of sperm oil, Stubb stoutly stood up to his spermaceti supper\rat the capstan-head, as if that capstan were a sideboard. Nor was Stubb\rthe only banqueter on whale’s flesh that night. Mingling their\rmumblings with his own mastications, thousands on thousands of sharks,\rswarming round the dead leviathan, smackingly feasted on its fatness.\rThe few sleepers below in their bunks were often startled by the sharp\rslapping of their tails against the hull, within a few inches of the\rsleepers’ hearts. Peering over the side you could just see them (as\rbefore you heard them) wallowing in the sullen, black waters, and\rturning over on their backs as they scooped out huge globular pieces of\rthe whale of the bigness of a human head. This particular feat of the\rshark seems all but miraculous. How at such an apparently unassailable\rsurface, they contrive to gouge out such symmetrical mouthfuls, remains\ra part of the universal problem of all things. The mark they thus leave\ron the whale, may best be likened to the hollow made by a carpenter in\rcountersinking for a screw.\r\rThough amid all the smoking horror and diabolism of a sea-fight, sharks\rwill be seen longingly gazing up to the ship’s decks, like hungry dogs\rround a table where red meat is being carved, ready to bolt down every\rkilled man that is tossed to them; and though, while the valiant\rbutchers over the deck-table are thus cannibally carving each other’s\rlive meat with carving-knives all gilded and tasselled, the sharks,\ralso, with their jewel-hilted mouths, are quarrelsomely carving away\runder the table at the dead meat; and though, were you to turn the\rwhole affair upside down, it would still be pretty much the same thing,\rthat is to say, a shocking sharkish business enough for all parties;\rand though sharks also are the invariable outriders of all slave ships\rcrossing the Atlantic, systematically trotting alongside, to be handy\rin case a parcel is to be carried anywhere, or a dead slave to be\rdecently buried; and though one or two other like instances might be\rset down, touching the set terms, places, and occasions, when sharks do\rmost socially congregate, and most hilariously feast; yet is there no\rconceivable time or occasion when you will find them in such countless\rnumbers, and in gayer or more jovial spirits, than around a dead sperm\rwhale, moored by night to a whaleship at sea. If you have never seen\rthat sight, then suspend your decision about the propriety of\rdevil-worship, and the expediency of conciliating the devil.\r\rBut, as yet, Stubb heeded not the mumblings of the banquet that was\rgoing on so nigh him, no more than the sharks heeded the smacking of\rhis own epicurean lips.\r\r“Cook, cook!—where’s that old Fleece?” he cried at length, widening his\rlegs still further, as if to form a more secure base for his supper;\rand, at the same time darting his fork into the dish, as if stabbing\rwith his lance; “cook, you cook!—sail this way, cook!”\r\rThe old black, not in any very high glee at having been previously\rroused from his warm hammock at a most unseasonable hour, came\rshambling along from his galley, for, like many old blacks, there was\rsomething the matter with his knee-pans, which he did not keep well\rscoured like his other pans; this old Fleece, as they called him, came\rshuffling and limping along, assisting his step with his tongs, which,\rafter a clumsy fashion, were made of straightened iron hoops; this old\rEbony floundered along, and in obedience to the word of command, came\rto a dead stop on the opposite side of Stubb’s sideboard; when, with\rboth hands folded before him, and resting on his two-legged cane, he\rbowed his arched back still further over, at the same time sideways\rinclining his head, so as to bring his best ear into play.\r\r“Cook,” said Stubb, rapidly lifting a rather reddish morsel to his\rmouth, “don’t you think this steak is rather overdone? You’ve been\rbeating this steak too much, cook; it’s too tender. Don’t I always say\rthat to be good, a whale-steak must be tough? There are those sharks\rnow over the side, don’t you see they prefer it tough and rare? What a\rshindy they are kicking up! Cook, go and talk to ’em; tell ’em they are\rwelcome to help themselves civilly, and in moderation, but they must\rkeep quiet. Blast me, if I can hear my own voice. Away, cook, and\rdeliver my message. Here, take this lantern,” snatching one from his\rsideboard; “now then, go and preach to ’em!”\r\rSullenly taking the offered lantern, old Fleece limped across the deck\rto the bulwarks; and then, with one hand dropping his light low over\rthe sea, so as to get a good view of his congregation, with the other\rhand he solemnly flourished his tongs, and leaning far over the side in\ra mumbling voice began addressing the sharks, while Stubb, softly\rcrawling behind, overheard all that was said.\r\r“Fellow-critters: I’se ordered here to say dat you must stop dat dam\rnoise dare. You hear? Stop dat dam smackin’ ob de lip! Massa Stubb say\rdat you can fill your dam bellies up to de hatchings, but by Gor! you\rmust stop dat dam racket!”\r\r“Cook,” here interposed Stubb, accompanying the word with a sudden slap\ron the shoulder,—“Cook! why, damn your eyes, you mustn’t swear that way\rwhen you’re preaching. That’s no way to convert sinners, cook!”\r\r“Who dat? Den preach to him yourself,” sullenly turning to go.\r\r“No, cook; go on, go on.”\r\r“Well, den, Belubed fellow-critters:”—\r\r“Right!” exclaimed Stubb, approvingly, “coax ’em to it; try that,” and\rFleece continued.\r\r“Do you is all sharks, and by natur wery woracious, yet I zay to you,\rfellow-critters, dat dat woraciousness—’top dat dam slappin’ ob de\rtail! How you tink to hear, spose you keep up such a dam slappin’ and\rbitin’ dare?”\r\r“Cook,” cried Stubb, collaring him, “I won’t have that swearing. Talk\rto ’em gentlemanly.”\r\rOnce more the sermon proceeded.\r\r“Your woraciousness, fellow-critters, I don’t blame ye so much for; dat\ris natur, and can’t be helped; but to gobern dat wicked natur, dat is\rde pint. You is sharks, sartin; but if you gobern de shark in you, why\rden you be angel; for all angel is not’ing more dan de shark well\rgoberned. Now, look here, bred’ren, just try wonst to be cibil, a\rhelping yourselbs from dat whale. Don’t be tearin’ de blubber out your\rneighbour’s mout, I say. Is not one shark dood right as toder to dat\rwhale? And, by Gor, none on you has de right to dat whale; dat whale\rbelong to some one else. I know some o’ you has berry brig mout,\rbrigger dan oders; but den de brig mouts sometimes has de small\rbellies; so dat de brigness of de mout is not to swaller wid, but to\rbit off de blubber for de small fry ob sharks, dat can’t get into de\rscrouge to help demselves.”\r\r“Well done, old Fleece!” cried Stubb, “that’s Christianity; go on.”\r\r“No use goin’ on; de dam willains will keep a scougin’ and slappin’\reach oder, Massa Stubb; dey don’t hear one word; no use a-preachin’ to\rsuch dam g’uttons as you call ’em, till dare bellies is full, and dare\rbellies is bottomless; and when dey do get ’em full, dey wont hear you\rden; for den dey sink in de sea, go fast to sleep on de coral, and\rcan’t hear not’ing at all, no more, for eber and eber.”\r\r“Upon my soul, I am about of the same opinion; so give the benediction,\rFleece, and I’ll away to my supper.”\r\rUpon this, Fleece, holding both hands over the fishy mob, raised his\rshrill voice, and cried—\r\r“Cussed fellow-critters! Kick up de damndest row as ever you can; fill\ryour dam’ bellies ’till dey bust—and den die.”\r\r“Now, cook,” said Stubb, resuming his supper at the capstan; “stand\rjust where you stood before, there, over against me, and pay particular\rattention.”\r\r“All dention,” said Fleece, again stooping over upon his tongs in the\rdesired position.\r\r“Well,” said Stubb, helping himself freely meanwhile; “I shall now go\rback to the subject of this steak. In the first place, how old are you,\rcook?”\r\r“What dat do wid de ’teak,” said the old black, testily.\r\r“Silence! How old are you, cook?”\r\r“’Bout ninety, dey say,” he gloomily muttered.\r\r“And you have lived in this world hard upon one hundred years, cook,\rand don’t know yet how to cook a whale-steak?” rapidly bolting another\rmouthful at the last word, so that morsel seemed a continuation of the\rquestion. “Where were you born, cook?”\r\r“’Hind de hatchway, in ferry-boat, goin’ ober de Roanoke.”\r\r“Born in a ferry-boat! That’s queer, too. But I want to know what\rcountry you were born in, cook!”\r\r“Didn’t I say de Roanoke country?” he cried sharply.\r\r“No, you didn’t, cook; but I’ll tell you what I’m coming to, cook. You\rmust go home and be born over again; you don’t know how to cook a\rwhale-steak yet.”\r\r“Bress my soul, if I cook noder one,” he growled, angrily, turning\rround to depart.\r\r“Come back, cook;—here, hand me those tongs;—now take that bit of steak\rthere, and tell me if you think that steak cooked as it should be? Take\rit, I say”—holding the tongs towards him—“take it, and taste it.”\r\rFaintly smacking his withered lips over it for a moment, the old negro\rmuttered, “Best cooked ’teak I eber taste; joosy, berry joosy.”\r\r“Cook,” said Stubb, squaring himself once more; “do you belong to the\rchurch?”\r\r“Passed one once in Cape-Down,” said the old man sullenly.\r\r“And you have once in your life passed a holy church in Cape-Town,\rwhere you doubtless overheard a holy parson addressing his hearers as\rhis beloved fellow-creatures, have you, cook! And yet you come here,\rand tell me such a dreadful lie as you did just now, eh?” said Stubb.\r“Where do you expect to go to, cook?”\r\r“Go to bed berry soon,” he mumbled, half-turning as he spoke.\r\r“Avast! heave to! I mean when you die, cook. It’s an awful question.\rNow what’s your answer?”\r\r“When dis old brack man dies,” said the negro slowly, changing his\rwhole air and demeanor, “he hisself won’t go nowhere; but some bressed\rangel will come and fetch him.”\r\r“Fetch him? How? In a coach and four, as they fetched Elijah? And fetch\rhim where?”\r\r“Up dere,” said Fleece, holding his tongs straight over his head, and\rkeeping it there very solemnly.\r\r“So, then, you expect to go up into our main-top, do you, cook, when\ryou are dead? But don’t you know the higher you climb, the colder it\rgets? Main-top, eh?”\r\r“Didn’t say dat t’all,” said Fleece, again in the sulks.\r\r“You said up there, didn’t you? and now look yourself, and see where\ryour tongs are pointing. But, perhaps you expect to get into heaven by\rcrawling through the lubber’s hole, cook; but, no, no, cook, you don’t\rget there, except you go the regular way, round by the rigging. It’s a\rticklish business, but must be done, or else it’s no go. But none of us\rare in heaven yet. Drop your tongs, cook, and hear my orders. Do ye\rhear? Hold your hat in one hand, and clap t’other a’top of your heart,\rwhen I’m giving my orders, cook. What! that your heart, there?—that’s\ryour gizzard! Aloft! aloft!—that’s it—now you have it. Hold it there\rnow, and pay attention.”\r\r“All ’dention,” said the old black, with both hands placed as desired,\rvainly wriggling his grizzled head, as if to get both ears in front at\rone and the same time.\r\r“Well then, cook, you see this whale-steak of yours was so very bad,\rthat I have put it out of sight as soon as possible; you see that,\rdon’t you? Well, for the future, when you cook another whale-steak for\rmy private table here, the capstan, I’ll tell you what to do so as not\rto spoil it by overdoing. Hold the steak in one hand, and show a live\rcoal to it with the other; that done, dish it; d’ye hear? And now\rto-morrow, cook, when we are cutting in the fish, be sure you stand by\rto get the tips of his fins; have them put in pickle. As for the ends\rof the flukes, have them soused, cook. There, now ye may go.”\r\rBut Fleece had hardly got three paces off, when he was recalled.\r\r“Cook, give me cutlets for supper to-morrow night in the mid-watch.\rD’ye hear? away you sail, then.—Halloa! stop! make a bow before you\rgo.—Avast heaving again! Whale-balls for breakfast—don’t forget.”\r\r“Wish, by gor! whale eat him, ’stead of him eat whale. I’m bressed if\rhe ain’t more of shark dan Massa Shark hisself,” muttered the old man,\rlimping away; with which sage ejaculation he went to his hammock.\r\r\rCHAPTER 65. The Whale as a Dish.\r\rThat mortal man should feed upon the creature that feeds his lamp, and,\rlike Stubb, eat him by his own light, as you may say; this seems so\routlandish a thing that one must needs go a little into the history and\rphilosophy of it.\r\rIt is upon record, that three centuries ago the tongue of the Right\rWhale was esteemed a great delicacy in France, and commanded large\rprices there. Also, that in Henry VIIIth’s time, a certain cook of the\rcourt obtained a handsome reward for inventing an admirable sauce to be\reaten with barbacued porpoises, which, you remember, are a species of\rwhale. Porpoises, indeed, are to this day considered fine eating. The\rmeat is made into balls about the size of billiard balls, and being\rwell seasoned and spiced might be taken for turtle-balls or veal balls.\rThe old monks of Dunfermline were very fond of them. They had a great\rporpoise grant from the crown.\r\rThe fact is, that among his hunters at least, the whale would by all\rhands be considered a noble dish, were there not so much of him; but\rwhen you come to sit down before a meat-pie nearly one hundred feet\rlong, it takes away your appetite. Only the most unprejudiced of men\rlike Stubb, nowadays partake of cooked whales; but the Esquimaux are\rnot so fastidious. We all know how they live upon whales, and have rare\rold vintages of prime old train oil. Zogranda, one of their most famous\rdoctors, recommends strips of blubber for infants, as being exceedingly\rjuicy and nourishing. And this reminds me that certain Englishmen, who\rlong ago were accidentally left in Greenland by a whaling vessel—that\rthese men actually lived for several months on the mouldy scraps of\rwhales which had been left ashore after trying out the blubber. Among\rthe Dutch whalemen these scraps are called “fritters”; which, indeed,\rthey greatly resemble, being brown and crisp, and smelling something\rlike old Amsterdam housewives’ dough-nuts or oly-cooks, when fresh.\rThey have such an eatable look that the most self-denying stranger can\rhardly keep his hands off.\r\rBut what further depreciates the whale as a civilized dish, is his\rexceeding richness. He is the great prize ox of the sea, too fat to be\rdelicately good. Look at his hump, which would be as fine eating as the\rbuffalo’s (which is esteemed a rare dish), were it not such a solid\rpyramid of fat. But the spermaceti itself, how bland and creamy that\ris; like the transparent, half-jellied, white meat of a cocoanut in the\rthird month of its growth, yet far too rich to supply a substitute for\rbutter. Nevertheless, many whalemen have a method of absorbing it into\rsome other substance, and then partaking of it. In the long try watches\rof the night it is a common thing for the seamen to dip their\rship-biscuit into the huge oil-pots and let them fry there awhile. Many\ra good supper have I thus made.\r\rIn the case of a small Sperm Whale the brains are accounted a fine\rdish. The casket of the skull is broken into with an axe, and the two\rplump, whitish lobes being withdrawn (precisely resembling two large\rpuddings), they are then mixed with flour, and cooked into a most\rdelectable mess, in flavor somewhat resembling calves’ head, which is\rquite a dish among some epicures; and every one knows that some young\rbucks among the epicures, by continually dining upon calves’ brains, by\rand by get to have a little brains of their own, so as to be able to\rtell a calf’s head from their own heads; which, indeed, requires\runcommon discrimination. And that is the reason why a young buck with\ran intelligent looking calf’s head before him, is somehow one of the\rsaddest sights you can see. The head looks a sort of reproachfully at\rhim, with an “Et tu Brute!” expression.\r\rIt is not, perhaps, entirely because the whale is so excessively\runctuous that landsmen seem to regard the eating of him with\rabhorrence; that appears to result, in some way, from the consideration\rbefore mentioned: _i.e._ that a man should eat a newly murdered thing\rof the sea, and eat it too by its own light. But no doubt the first man\rthat ever murdered an ox was regarded as a murderer; perhaps he was\rhung; and if he had been put on his trial by oxen, he certainly would\rhave been; and he certainly deserved it if any murderer does. Go to the\rmeat-market of a Saturday night and see the crowds of live bipeds\rstaring up at the long rows of dead quadrupeds. Does not that sight\rtake a tooth out of the cannibal’s jaw? Cannibals? who is not a\rcannibal? I tell you it will be more tolerable for the Fejee that\rsalted down a lean missionary in his cellar against a coming famine; it\rwill be more tolerable for that provident Fejee, I say, in the day of\rjudgment, than for thee, civilized and enlightened gourmand, who\rnailest geese to the ground and feastest on their bloated livers in thy\rpaté-de-foie-gras.\r\rBut Stubb, he eats the whale by its own light, does he? and that is\radding insult to injury, is it? Look at your knife-handle, there, my\rcivilized and enlightened gourmand dining off that roast beef, what is\rthat handle made of?—what but the bones of the brother of the very ox\ryou are eating? And what do you pick your teeth with, after devouring\rthat fat goose? With a feather of the same fowl. And with what quill\rdid the Secretary of the Society for the Suppression of Cruelty to\rGanders formally indite his circulars? It is only within the last month\ror two that that society passed a resolution to patronize nothing but\rsteel pens.\r\r\rCHAPTER 66. The Shark Massacre.\r\rWhen in the Southern Fishery, a captured Sperm Whale, after long and\rweary toil, is brought alongside late at night, it is not, as a general\rthing at least, customary to proceed at once to the business of cutting\rhim in. For that business is an exceedingly laborious one; is not very\rsoon completed; and requires all hands to set about it. Therefore, the\rcommon usage is to take in all sail; lash the helm a’lee; and then send\revery one below to his hammock till daylight, with the reservation\rthat, until that time, anchor-watches shall be kept; that is, two and\rtwo for an hour, each couple, the crew in rotation shall mount the deck\rto see that all goes well.\r\rBut sometimes, especially upon the Line in the Pacific, this plan will\rnot answer at all; because such incalculable hosts of sharks gather\rround the moored carcase, that were he left so for six hours, say, on a\rstretch, little more than the skeleton would be visible by morning. In\rmost other parts of the ocean, however, where these fish do not so\rlargely abound, their wondrous voracity can be at times considerably\rdiminished, by vigorously stirring them up with sharp whaling-spades, a\rprocedure notwithstanding, which, in some instances, only seems to\rtickle them into still greater activity. But it was not thus in the\rpresent case with the Pequod’s sharks; though, to be sure, any man\runaccustomed to such sights, to have looked over her side that night,\rwould have almost thought the whole round sea was one huge cheese, and\rthose sharks the maggots in it.\r\rNevertheless, upon Stubb setting the anchor-watch after his supper was\rconcluded; and when, accordingly, Queequeg and a forecastle seaman came\ron deck, no small excitement was created among the sharks; for\rimmediately suspending the cutting stages over the side, and lowering\rthree lanterns, so that they cast long gleams of light over the turbid\rsea, these two mariners, darting their long whaling-spades, kept up an\rincessant murdering of the sharks,* by striking the keen steel deep\rinto their skulls, seemingly their only vital part. But in the foamy\rconfusion of their mixed and struggling hosts, the marksmen could not\ralways hit their mark; and this brought about new revelations of the\rincredible ferocity of the foe. They viciously snapped, not only at\reach other’s disembowelments, but like flexible bows, bent round, and\rbit their own; till those entrails seemed swallowed over and over again\rby the same mouth, to be oppositely voided by the gaping wound. Nor was\rthis all. It was unsafe to meddle with the corpses and ghosts of these\rcreatures. A sort of generic or Pantheistic vitality seemed to lurk in\rtheir very joints and bones, after what might be called the individual\rlife had departed. Killed and hoisted on deck for the sake of his skin,\rone of these sharks almost took poor Queequeg’s hand off, when he tried\rto shut down the dead lid of his murderous jaw.\r\r*The whaling-spade used for cutting-in is made of the very best steel;\ris about the bigness of a man’s spread hand; and in general shape,\rcorresponds to the garden implement after which it is named; only its\rsides are perfectly flat, and its upper end considerably narrower than\rthe lower. This weapon is always kept as sharp as possible; and when\rbeing used is occasionally honed, just like a razor. In its socket, a\rstiff pole, from twenty to thirty feet long, is inserted for a handle.\r\r“Queequeg no care what god made him shark,” said the savage,\ragonizingly lifting his hand up and down; “wedder Fejee god or\rNantucket god; but de god wat made shark must be one dam Ingin.”\r\r\rCHAPTER 67. Cutting In.\r\rIt was a Saturday night, and such a Sabbath as followed! Ex officio\rprofessors of Sabbath breaking are all whalemen. The ivory Pequod was\rturned into what seemed a shamble; every sailor a butcher. You would\rhave thought we were offering up ten thousand red oxen to the sea gods.\r\rIn the first place, the enormous cutting tackles, among other ponderous\rthings comprising a cluster of blocks generally painted green, and\rwhich no single man can possibly lift—this vast bunch of grapes was\rswayed up to the main-top and firmly lashed to the lower mast-head, the\rstrongest point anywhere above a ship’s deck. The end of the\rhawser-like rope winding through these intricacies, was then conducted\rto the windlass, and the huge lower block of the tackles was swung over\rthe whale; to this block the great blubber hook, weighing some one\rhundred pounds, was attached. And now suspended in stages over the\rside, Starbuck and Stubb, the mates, armed with their long spades,\rbegan cutting a hole in the body for the insertion of the hook just\rabove the nearest of the two side-fins. This done, a broad,\rsemicircular line is cut round the hole, the hook is inserted, and the\rmain body of the crew striking up a wild chorus, now commence heaving\rin one dense crowd at the windlass. When instantly, the entire ship\rcareens over on her side; every bolt in her starts like the nail-heads\rof an old house in frosty weather; she trembles, quivers, and nods her\rfrighted mast-heads to the sky. More and more she leans over to the\rwhale, while every gasping heave of the windlass is answered by a\rhelping heave from the billows; till at last, a swift, startling snap\ris heard; with a great swash the ship rolls upwards and backwards from\rthe whale, and the triumphant tackle rises into sight dragging after it\rthe disengaged semicircular end of the first strip of blubber. Now as\rthe blubber envelopes the whale precisely as the rind does an orange,\rso is it stripped off from the body precisely as an orange is sometimes\rstripped by spiralizing it. For the strain constantly kept up by the\rwindlass continually keeps the whale rolling over and over in the\rwater, and as the blubber in one strip uniformly peels off along the\rline called the “scarf,” simultaneously cut by the spades of Starbuck\rand Stubb, the mates; and just as fast as it is thus peeled off, and\rindeed by that very act itself, it is all the time being hoisted higher\rand higher aloft till its upper end grazes the main-top; the men at the\rwindlass then cease heaving, and for a moment or two the prodigious\rblood-dripping mass sways to and fro as if let down from the sky, and\revery one present must take good heed to dodge it when it swings, else\rit may box his ears and pitch him headlong overboard.\r\rOne of the attending harpooneers now advances with a long, keen weapon\rcalled a boarding-sword, and watching his chance he dexterously slices\rout a considerable hole in the lower part of the swaying mass. Into\rthis hole, the end of the second alternating great tackle is then\rhooked so as to retain a hold upon the blubber, in order to prepare for\rwhat follows. Whereupon, this accomplished swordsman, warning all hands\rto stand off, once more makes a scientific dash at the mass, and with a\rfew sidelong, desperate, lunging slicings, severs it completely in\rtwain; so that while the short lower part is still fast, the long upper\rstrip, called a blanket-piece, swings clear, and is all ready for\rlowering. The heavers forward now resume their song, and while the one\rtackle is peeling and hoisting a second strip from the whale, the other\ris slowly slackened away, and down goes the first strip through the\rmain hatchway right beneath, into an unfurnished parlor called the\rblubber-room. Into this twilight apartment sundry nimble hands keep\rcoiling away the long blanket-piece as if it were a great live mass of\rplaited serpents. And thus the work proceeds; the two tackles hoisting\rand lowering simultaneously; both whale and windlass heaving, the\rheavers singing, the blubber-room gentlemen coiling, the mates\rscarfing, the ship straining, and all hands swearing occasionally, by\rway of assuaging the general friction.\r\r\rCHAPTER 68. The Blanket.\r\rI have given no small attention to that not unvexed subject, the skin\rof the whale. I have had controversies about it with experienced\rwhalemen afloat, and learned naturalists ashore. My original opinion\rremains unchanged; but it is only an opinion.\r\rThe question is, what and where is the skin of the whale? Already you\rknow what his blubber is. That blubber is something of the consistence\rof firm, close-grained beef, but tougher, more elastic and compact, and\rranges from eight or ten to twelve and fifteen inches in thickness.\r\rNow, however preposterous it may at first seem to talk of any\rcreature’s skin as being of that sort of consistence and thickness, yet\rin point of fact these are no arguments against such a presumption;\rbecause you cannot raise any other dense enveloping layer from the\rwhale’s body but that same blubber; and the outermost enveloping layer\rof any animal, if reasonably dense, what can that be but the skin?\rTrue, from the unmarred dead body of the whale, you may scrape off with\ryour hand an infinitely thin, transparent substance, somewhat\rresembling the thinnest shreds of isinglass, only it is almost as\rflexible and soft as satin; that is, previous to being dried, when it\rnot only contracts and thickens, but becomes rather hard and brittle. I\rhave several such dried bits, which I use for marks in my whale-books.\rIt is transparent, as I said before; and being laid upon the printed\rpage, I have sometimes pleased myself with fancying it exerted a\rmagnifying influence. At any rate, it is pleasant to read about whales\rthrough their own spectacles, as you may say. But what I am driving at\rhere is this. That same infinitely thin, isinglass substance, which, I\radmit, invests the entire body of the whale, is not so much to be\rregarded as the skin of the creature, as the skin of the skin, so to\rspeak; for it were simply ridiculous to say, that the proper skin of\rthe tremendous whale is thinner and more tender than the skin of a\rnew-born child. But no more of this.\r\rAssuming the blubber to be the skin of the whale; then, when this skin,\ras in the case of a very large Sperm Whale, will yield the bulk of one\rhundred barrels of oil; and, when it is considered that, in quantity,\ror rather weight, that oil, in its expressed state, is only three\rfourths, and not the entire substance of the coat; some idea may hence\rbe had of the enormousness of that animated mass, a mere part of whose\rmere integument yields such a lake of liquid as that. Reckoning ten\rbarrels to the ton, you have ten tons for the net weight of only three\rquarters of the stuff of the whale’s skin.\r\rIn life, the visible surface of the Sperm Whale is not the least among\rthe many marvels he presents. Almost invariably it is all over\robliquely crossed and re-crossed with numberless straight marks in\rthick array, something like those in the finest Italian line\rengravings. But these marks do not seem to be impressed upon the\risinglass substance above mentioned, but seem to be seen through it, as\rif they were engraved upon the body itself. Nor is this all. In some\rinstances, to the quick, observant eye, those linear marks, as in a\rveritable engraving, but afford the ground for far other delineations.\rThese are hieroglyphical; that is, if you call those mysterious cyphers\ron the walls of pyramids hieroglyphics, then that is the proper word to\ruse in the present connexion. By my retentive memory of the\rhieroglyphics upon one Sperm Whale in particular, I was much struck\rwith a plate representing the old Indian characters chiselled on the\rfamous hieroglyphic palisades on the banks of the Upper Mississippi.\rLike those mystic rocks, too, the mystic-marked whale remains\rundecipherable. This allusion to the Indian rocks reminds me of another\rthing. Besides all the other phenomena which the exterior of the Sperm\rWhale presents, he not seldom displays the back, and more especially\rhis flanks, effaced in great part of the regular linear appearance, by\rreason of numerous rude scratches, altogether of an irregular, random\raspect. I should say that those New England rocks on the sea-coast,\rwhich Agassiz imagines to bear the marks of violent scraping contact\rwith vast floating icebergs—I should say, that those rocks must not a\rlittle resemble the Sperm Whale in this particular. It also seems to me\rthat such scratches in the whale are probably made by hostile contact\rwith other whales; for I have most remarked them in the large,\rfull-grown bulls of the species.\r\rA word or two more concerning this matter of the skin or blubber of the\rwhale. It has already been said, that it is stript from him in long\rpieces, called blanket-pieces. Like most sea-terms, this one is very\rhappy and significant. For the whale is indeed wrapt up in his blubber\ras in a real blanket or counterpane; or, still better, an Indian poncho\rslipt over his head, and skirting his extremity. It is by reason of\rthis cosy blanketing of his body, that the whale is enabled to keep\rhimself comfortable in all weathers, in all seas, times, and tides.\rWhat would become of a Greenland whale, say, in those shuddering, icy\rseas of the North, if unsupplied with his cosy surtout? True, other\rfish are found exceedingly brisk in those Hyperborean waters; but\rthese, be it observed, are your cold-blooded, lungless fish, whose very\rbellies are refrigerators; creatures, that warm themselves under the\rlee of an iceberg, as a traveller in winter would bask before an inn\rfire; whereas, like man, the whale has lungs and warm blood. Freeze his\rblood, and he dies. How wonderful is it then—except after\rexplanation—that this great monster, to whom corporeal warmth is as\rindispensable as it is to man; how wonderful that he should be found at\rhome, immersed to his lips for life in those Arctic waters! where, when\rseamen fall overboard, they are sometimes found, months afterwards,\rperpendicularly frozen into the hearts of fields of ice, as a fly is\rfound glued in amber. But more surprising is it to know, as has been\rproved by experiment, that the blood of a Polar whale is warmer than\rthat of a Borneo negro in summer.\r\rIt does seem to me, that herein we see the rare virtue of a strong\rindividual vitality, and the rare virtue of thick walls, and the rare\rvirtue of interior spaciousness. Oh, man! admire and model thyself\rafter the whale! Do thou, too, remain warm among ice. Do thou, too,\rlive in this world without being of it. Be cool at the equator; keep\rthy blood fluid at the Pole. Like the great dome of St. Peter’s, and\rlike the great whale, retain, O man! in all seasons a temperature of\rthine own.\r\rBut how easy and how hopeless to teach these fine things! Of erections,\rhow few are domed like St. Peter’s! of creatures, how few vast as the\rwhale!\r\r\rCHAPTER 69. The Funeral.\r\r“Haul in the chains! Let the carcase go astern!”\r\rThe vast tackles have now done their duty. The peeled white body of the\rbeheaded whale flashes like a marble sepulchre; though changed in hue,\rit has not perceptibly lost anything in bulk. It is still colossal.\rSlowly it floats more and more away, the water round it torn and\rsplashed by the insatiate sharks, and the air above vexed with\rrapacious flights of screaming fowls, whose beaks are like so many\rinsulting poniards in the whale. The vast white headless phantom floats\rfurther and further from the ship, and every rod that it so floats,\rwhat seem square roods of sharks and cubic roods of fowls, augment the\rmurderous din. For hours and hours from the almost stationary ship that\rhideous sight is seen. Beneath the unclouded and mild azure sky, upon\rthe fair face of the pleasant sea, wafted by the joyous breezes, that\rgreat mass of death floats on and on, till lost in infinite\rperspectives.\r\rThere’s a most doleful and most mocking funeral! The sea-vultures all\rin pious mourning, the air-sharks all punctiliously in black or\rspeckled. In life but few of them would have helped the whale, I ween,\rif peradventure he had needed it; but upon the banquet of his funeral\rthey most piously do pounce. Oh, horrible vultureism of earth! from\rwhich not the mightiest whale is free.\r\rNor is this the end. Desecrated as the body is, a vengeful ghost\rsurvives and hovers over it to scare. Espied by some timid man-of-war\ror blundering discovery-vessel from afar, when the distance obscuring\rthe swarming fowls, nevertheless still shows the white mass floating in\rthe sun, and the white spray heaving high against it; straightway the\rwhale’s unharming corpse, with trembling fingers is set down in the\rlog—_shoals, rocks, and breakers hereabouts: beware!_ And for years\rafterwards, perhaps, ships shun the place; leaping over it as silly\rsheep leap over a vacuum, because their leader originally leaped there\rwhen a stick was held. There’s your law of precedents; there’s your\rutility of traditions; there’s the story of your obstinate survival of\rold beliefs never bottomed on the earth, and now not even hovering in\rthe air! There’s orthodoxy!\r\rThus, while in life the great whale’s body may have been a real terror\rto his foes, in his death his ghost becomes a powerless panic to a\rworld.\r\rAre you a believer in ghosts, my friend? There are other ghosts than\rthe Cock-Lane one, and far deeper men than Doctor Johnson who believe\rin them.\r\r\rCHAPTER 70. The Sphynx.\r\rIt should not have been omitted that previous to completely stripping\rthe body of the leviathan, he was beheaded. Now, the beheading of the\rSperm Whale is a scientific anatomical feat, upon which experienced\rwhale surgeons very much pride themselves: and not without reason.\r\rConsider that the whale has nothing that can properly be called a neck;\ron the contrary, where his head and body seem to join, there, in that\rvery place, is the thickest part of him. Remember, also, that the\rsurgeon must operate from above, some eight or ten feet intervening\rbetween him and his subject, and that subject almost hidden in a\rdiscoloured, rolling, and oftentimes tumultuous and bursting sea. Bear\rin mind, too, that under these untoward circumstances he has to cut\rmany feet deep in the flesh; and in that subterraneous manner, without\rso much as getting one single peep into the ever-contracting gash thus\rmade, he must skilfully steer clear of all adjacent, interdicted parts,\rand exactly divide the spine at a critical point hard by its insertion\rinto the skull. Do you not marvel, then, at Stubb’s boast, that he\rdemanded but ten minutes to behead a sperm whale?\r\rWhen first severed, the head is dropped astern and held there by a\rcable till the body is stripped. That done, if it belong to a small\rwhale it is hoisted on deck to be deliberately disposed of. But, with a\rfull grown leviathan this is impossible; for the sperm whale’s head\rembraces nearly one third of his entire bulk, and completely to suspend\rsuch a burden as that, even by the immense tackles of a whaler, this\rwere as vain a thing as to attempt weighing a Dutch barn in jewellers’\rscales.\r\rThe Pequod’s whale being decapitated and the body stripped, the head\rwas hoisted against the ship’s side—about half way out of the sea, so\rthat it might yet in great part be buoyed up by its native element. And\rthere with the strained craft steeply leaning over to it, by reason of\rthe enormous downward drag from the lower mast-head, and every yard-arm\ron that side projecting like a crane over the waves; there, that\rblood-dripping head hung to the Pequod’s waist like the giant\rHolofernes’s from the girdle of Judith.\r\rWhen this last task was accomplished it was noon, and the seamen went\rbelow to their dinner. Silence reigned over the before tumultuous but\rnow deserted deck. An intense copper calm, like a universal yellow\rlotus, was more and more unfolding its noiseless measureless leaves\rupon the sea.\r\rA short space elapsed, and up into this noiselessness came Ahab alone\rfrom his cabin. Taking a few turns on the quarter-deck, he paused to\rgaze over the side, then slowly getting into the main-chains he took\rStubb’s long spade—still remaining there after the whale’s\rdecapitation—and striking it into the lower part of the half-suspended\rmass, placed its other end crutch-wise under one arm, and so stood\rleaning over with eyes attentively fixed on this head.\r\rIt was a black and hooded head; and hanging there in the midst of so\rintense a calm, it seemed the Sphynx’s in the desert. “Speak, thou vast\rand venerable head,” muttered Ahab, “which, though ungarnished with a\rbeard, yet here and there lookest hoary with mosses; speak, mighty\rhead, and tell us the secret thing that is in thee. Of all divers, thou\rhast dived the deepest. That head upon which the upper sun now gleams,\rhas moved amid this world’s foundations. Where unrecorded names and\rnavies rust, and untold hopes and anchors rot; where in her murderous\rhold this frigate earth is ballasted with bones of millions of the\rdrowned; there, in that awful water-land, there was thy most familiar\rhome. Thou hast been where bell or diver never went; hast slept by many\ra sailor’s side, where sleepless mothers would give their lives to lay\rthem down. Thou saw’st the locked lovers when leaping from their\rflaming ship; heart to heart they sank beneath the exulting wave; true\rto each other, when heaven seemed false to them. Thou saw’st the\rmurdered mate when tossed by pirates from the midnight deck; for hours\rhe fell into the deeper midnight of the insatiate maw; and his\rmurderers still sailed on unharmed—while swift lightnings shivered the\rneighboring ship that would have borne a righteous husband to\routstretched, longing arms. O head! thou hast seen enough to split the\rplanets and make an infidel of Abraham, and not one syllable is thine!”\r\r“Sail ho!” cried a triumphant voice from the main-mast-head.\r\r“Aye? Well, now, that’s cheering,” cried Ahab, suddenly erecting\rhimself, while whole thunder-clouds swept aside from his brow. “That\rlively cry upon this deadly calm might almost convert a better\rman.—Where away?”\r\r“Three points on the starboard bow, sir, and bringing down her breeze\rto us!\r\r“Better and better, man. Would now St. Paul would come along that way,\rand to my breezelessness bring his breeze! O Nature, and O soul of man!\rhow far beyond all utterance are your linked analogies! not the\rsmallest atom stirs or lives on matter, but has its cunning duplicate\rin mind.”\r\r\rCHAPTER 71. The Jeroboam’s Story.\r\rHand in hand, ship and breeze blew on; but the breeze came faster than\rthe ship, and soon the Pequod began to rock.\r\rBy and by, through the glass the stranger’s boats and manned mast-heads\rproved her a whale-ship. But as she was so far to windward, and\rshooting by, apparently making a passage to some other ground, the\rPequod could not hope to reach her. So the signal was set to see what\rresponse would be made.\r\rHere be it said, that like the vessels of military marines, the ships\rof the American Whale Fleet have each a private signal; all which\rsignals being collected in a book with the names of the respective\rvessels attached, every captain is provided with it. Thereby, the whale\rcommanders are enabled to recognise each other upon the ocean, even at\rconsiderable distances and with no small facility.\r\rThe Pequod’s signal was at last responded to by the stranger’s setting\rher own; which proved the ship to be the Jeroboam of Nantucket.\rSquaring her yards, she bore down, ranged abeam under the Pequod’s lee,\rand lowered a boat; it soon drew nigh; but, as the side-ladder was\rbeing rigged by Starbuck’s order to accommodate the visiting captain,\rthe stranger in question waved his hand from his boat’s stern in token\rof that proceeding being entirely unnecessary. It turned out that the\rJeroboam had a malignant epidemic on board, and that Mayhew, her\rcaptain, was fearful of infecting the Pequod’s company. For, though\rhimself and boat’s crew remained untainted, and though his ship was\rhalf a rifle-shot off, and an incorruptible sea and air rolling and\rflowing between; yet conscientiously adhering to the timid quarantine\rof the land, he peremptorily refused to come into direct contact with\rthe Pequod.\r\rBut this did by no means prevent all communications. Preserving an\rinterval of some few yards between itself and the ship, the Jeroboam’s\rboat by the occasional use of its oars contrived to keep parallel to\rthe Pequod, as she heavily forged through the sea (for by this time it\rblew very fresh), with her main-topsail aback; though, indeed, at times\rby the sudden onset of a large rolling wave, the boat would be pushed\rsome way ahead; but would be soon skilfully brought to her proper\rbearings again. Subject to this, and other the like interruptions now\rand then, a conversation was sustained between the two parties; but at\rintervals not without still another interruption of a very different\rsort.\r\rPulling an oar in the Jeroboam’s boat, was a man of a singular\rappearance, even in that wild whaling life where individual\rnotabilities make up all totalities. He was a small, short, youngish\rman, sprinkled all over his face with freckles, and wearing redundant\ryellow hair. A long-skirted, cabalistically-cut coat of a faded walnut\rtinge enveloped him; the overlapping sleeves of which were rolled up on\rhis wrists. A deep, settled, fanatic delirium was in his eyes.\r\rSo soon as this figure had been first descried, Stubb had\rexclaimed—“That’s he! that’s he!—the long-togged scaramouch the\rTown-Ho’s company told us of!” Stubb here alluded to a strange story\rtold of the Jeroboam, and a certain man among her crew, some time\rprevious when the Pequod spoke the Town-Ho. According to this account\rand what was subsequently learned, it seemed that the scaramouch in\rquestion had gained a wonderful ascendency over almost everybody in the\rJeroboam. His story was this:\r\rHe had been originally nurtured among the crazy society of Neskyeuna\rShakers, where he had been a great prophet; in their cracked, secret\rmeetings having several times descended from heaven by the way of a\rtrap-door, announcing the speedy opening of the seventh vial, which he\rcarried in his vest-pocket; but, which, instead of containing\rgunpowder, was supposed to be charged with laudanum. A strange,\rapostolic whim having seized him, he had left Neskyeuna for Nantucket,\rwhere, with that cunning peculiar to craziness, he assumed a steady,\rcommon-sense exterior, and offered himself as a green-hand candidate\rfor the Jeroboam’s whaling voyage. They engaged him; but straightway\rupon the ship’s getting out of sight of land, his insanity broke out in\ra freshet. He announced himself as the archangel Gabriel, and commanded\rthe captain to jump overboard. He published his manifesto, whereby he\rset himself forth as the deliverer of the isles of the sea and\rvicar-general of all Oceanica. The unflinching earnestness with which\rhe declared these things;—the dark, daring play of his sleepless,\rexcited imagination, and all the preternatural terrors of real\rdelirium, united to invest this Gabriel in the minds of the majority of\rthe ignorant crew, with an atmosphere of sacredness. Moreover, they\rwere afraid of him. As such a man, however, was not of much practical\ruse in the ship, especially as he refused to work except when he\rpleased, the incredulous captain would fain have been rid of him; but\rapprised that that individual’s intention was to land him in the first\rconvenient port, the archangel forthwith opened all his seals and\rvials—devoting the ship and all hands to unconditional perdition, in\rcase this intention was carried out. So strongly did he work upon his\rdisciples among the crew, that at last in a body they went to the\rcaptain and told him if Gabriel was sent from the ship, not a man of\rthem would remain. He was therefore forced to relinquish his plan. Nor\rwould they permit Gabriel to be any way maltreated, say or do what he\rwould; so that it came to pass that Gabriel had the complete freedom of\rthe ship. The consequence of all this was, that the archangel cared\rlittle or nothing for the captain and mates; and since the epidemic had\rbroken out, he carried a higher hand than ever; declaring that the\rplague, as he called it, was at his sole command; nor should it be\rstayed but according to his good pleasure. The sailors, mostly poor\rdevils, cringed, and some of them fawned before him; in obedience to\rhis instructions, sometimes rendering him personal homage, as to a god.\rSuch things may seem incredible; but, however wondrous, they are true.\rNor is the history of fanatics half so striking in respect to the\rmeasureless self-deception of the fanatic himself, as his measureless\rpower of deceiving and bedevilling so many others. But it is time to\rreturn to the Pequod.\r\r“I fear not thy epidemic, man,” said Ahab from the bulwarks, to Captain\rMayhew, who stood in the boat’s stern; “come on board.”\r\rBut now Gabriel started to his feet.\r\r“Think, think of the fevers, yellow and bilious! Beware of the horrible\rplague!”\r\r“Gabriel! Gabriel!” cried Captain Mayhew; “thou must either—” But that\rinstant a headlong wave shot the boat far ahead, and its seethings\rdrowned all speech.\r\r“Hast thou seen the White Whale?” demanded Ahab, when the boat drifted\rback.\r\r“Think, think of thy whale-boat, stoven and sunk! Beware of the\rhorrible tail!”\r\r“I tell thee again, Gabriel, that—” But again the boat tore ahead as if\rdragged by fiends. Nothing was said for some moments, while a\rsuccession of riotous waves rolled by, which by one of those occasional\rcaprices of the seas were tumbling, not heaving it. Meantime, the\rhoisted sperm whale’s head jogged about very violently, and Gabriel was\rseen eyeing it with rather more apprehensiveness than his archangel\rnature seemed to warrant.\r\rWhen this interlude was over, Captain Mayhew began a dark story\rconcerning Moby Dick; not, however, without frequent interruptions from\rGabriel, whenever his name was mentioned, and the crazy sea that seemed\rleagued with him.\r\rIt seemed that the Jeroboam had not long left home, when upon speaking\ra whale-ship, her people were reliably apprised of the existence of\rMoby Dick, and the havoc he had made. Greedily sucking in this\rintelligence, Gabriel solemnly warned the captain against attacking the\rWhite Whale, in case the monster should be seen; in his gibbering\rinsanity, pronouncing the White Whale to be no less a being than the\rShaker God incarnated; the Shakers receiving the Bible. But when, some\ryear or two afterwards, Moby Dick was fairly sighted from the\rmast-heads, Macey, the chief mate, burned with ardour to encounter him;\rand the captain himself being not unwilling to let him have the\ropportunity, despite all the archangel’s denunciations and\rforewarnings, Macey succeeded in persuading five men to man his boat.\rWith them he pushed off; and, after much weary pulling, and many\rperilous, unsuccessful onsets, he at last succeeded in getting one iron\rfast. Meantime, Gabriel, ascending to the main-royal mast-head, was\rtossing one arm in frantic gestures, and hurling forth prophecies of\rspeedy doom to the sacrilegious assailants of his divinity. Now, while\rMacey, the mate, was standing up in his boat’s bow, and with all the\rreckless energy of his tribe was venting his wild exclamations upon the\rwhale, and essaying to get a fair chance for his poised lance, lo! a\rbroad white shadow rose from the sea; by its quick, fanning motion,\rtemporarily taking the breath out of the bodies of the oarsmen. Next\rinstant, the luckless mate, so full of furious life, was smitten bodily\rinto the air, and making a long arc in his descent, fell into the sea\rat the distance of about fifty yards. Not a chip of the boat was\rharmed, nor a hair of any oarsman’s head; but the mate for ever sank.\r\rIt is well to parenthesize here, that of the fatal accidents in the\rSperm-Whale Fishery, this kind is perhaps almost as frequent as any.\rSometimes, nothing is injured but the man who is thus annihilated;\roftener the boat’s bow is knocked off, or the thigh-board, in which the\rheadsman stands, is torn from its place and accompanies the body. But\rstrangest of all is the circumstance, that in more instances than one,\rwhen the body has been recovered, not a single mark of violence is\rdiscernible; the man being stark dead.\r\rThe whole calamity, with the falling form of Macey, was plainly\rdescried from the ship. Raising a piercing shriek—“The vial! the vial!”\rGabriel called off the terror-stricken crew from the further hunting of\rthe whale. This terrible event clothed the archangel with added\rinfluence; because his credulous disciples believed that he had\rspecifically fore-announced it, instead of only making a general\rprophecy, which any one might have done, and so have chanced to hit one\rof many marks in the wide margin allowed. He became a nameless terror\rto the ship.\r\rMayhew having concluded his narration, Ahab put such questions to him,\rthat the stranger captain could not forbear inquiring whether he\rintended to hunt the White Whale, if opportunity should offer. To which\rAhab answered—“Aye.” Straightway, then, Gabriel once more started to\rhis feet, glaring upon the old man, and vehemently exclaimed, with\rdownward pointed finger—“Think, think of the blasphemer—dead, and down\rthere!—beware of the blasphemer’s end!”\r\rAhab stolidly turned aside; then said to Mayhew, “Captain, I have just\rbethought me of my letter-bag; there is a letter for one of thy\rofficers, if I mistake not. Starbuck, look over the bag.”\r\rEvery whale-ship takes out a goodly number of letters for various\rships, whose delivery to the persons to whom they may be addressed,\rdepends upon the mere chance of encountering them in the four oceans.\rThus, most letters never reach their mark; and many are only received\rafter attaining an age of two or three years or more.\r\rSoon Starbuck returned with a letter in his hand. It was sorely\rtumbled, damp, and covered with a dull, spotted, green mould, in\rconsequence of being kept in a dark locker of the cabin. Of such a\rletter, Death himself might well have been the post-boy.\r\r“Can’st not read it?” cried Ahab. “Give it me, man. Aye, aye, it’s but\ra dim scrawl;—what’s this?” As he was studying it out, Starbuck took a\rlong cutting-spade pole, and with his knife slightly split the end, to\rinsert the letter there, and in that way, hand it to the boat, without\rits coming any closer to the ship.\r\rMeantime, Ahab holding the letter, muttered, “Mr. Har—yes, Mr. Harry—(a\rwoman’s pinny hand,—the man’s wife, I’ll wager)—Aye—Mr. Harry Macey,\rShip Jeroboam;—why it’s Macey, and he’s dead!”\r\r“Poor fellow! poor fellow! and from his wife,” sighed Mayhew; “but let\rme have it.”\r\r“Nay, keep it thyself,” cried Gabriel to Ahab; “thou art soon going\rthat way.”\r\r“Curses throttle thee!” yelled Ahab. “Captain Mayhew, stand by now to\rreceive it”; and taking the fatal missive from Starbuck’s hands, he\rcaught it in the slit of the pole, and reached it over towards the\rboat. But as he did so, the oarsmen expectantly desisted from rowing;\rthe boat drifted a little towards the ship’s stern; so that, as if by\rmagic, the letter suddenly ranged along with Gabriel’s eager hand. He\rclutched it in an instant, seized the boat-knife, and impaling the\rletter on it, sent it thus loaded back into the ship. It fell at Ahab’s\rfeet. Then Gabriel shrieked out to his comrades to give way with their\roars, and in that manner the mutinous boat rapidly shot away from the\rPequod.\r\rAs, after this interlude, the seamen resumed their work upon the jacket\rof the whale, many strange things were hinted in reference to this wild\raffair.\r\r\rCHAPTER 72. The Monkey-Rope.\r\rIn the tumultuous business of cutting-in and attending to a whale,\rthere is much running backwards and forwards among the crew. Now hands\rare wanted here, and then again hands are wanted there. There is no\rstaying in any one place; for at one and the same time everything has\rto be done everywhere. It is much the same with him who endeavors the\rdescription of the scene. We must now retrace our way a little. It was\rmentioned that upon first breaking ground in the whale’s back, the\rblubber-hook was inserted into the original hole there cut by the\rspades of the mates. But how did so clumsy and weighty a mass as that\rsame hook get fixed in that hole? It was inserted there by my\rparticular friend Queequeg, whose duty it was, as harpooneer, to\rdescend upon the monster’s back for the special purpose referred to.\rBut in very many cases, circumstances require that the harpooneer shall\rremain on the whale till the whole flensing or stripping operation is\rconcluded. The whale, be it observed, lies almost entirely submerged,\rexcepting the immediate parts operated upon. So down there, some ten\rfeet below the level of the deck, the poor harpooneer flounders about,\rhalf on the whale and half in the water, as the vast mass revolves like\ra tread-mill beneath him. On the occasion in question, Queequeg figured\rin the Highland costume—a shirt and socks—in which to my eyes, at\rleast, he appeared to uncommon advantage; and no one had a better\rchance to observe him, as will presently be seen.\r\rBeing the savage’s bowsman, that is, the person who pulled the bow-oar\rin his boat (the second one from forward), it was my cheerful duty to\rattend upon him while taking that hard-scrabble scramble upon the dead\rwhale’s back. You have seen Italian organ-boys holding a dancing-ape by\ra long cord. Just so, from the ship’s steep side, did I hold Queequeg\rdown there in the sea, by what is technically called in the fishery a\rmonkey-rope, attached to a strong strip of canvas belted round his\rwaist.\r\rIt was a humorously perilous business for both of us. For, before we\rproceed further, it must be said that the monkey-rope was fast at both\rends; fast to Queequeg’s broad canvas belt, and fast to my narrow\rleather one. So that for better or for worse, we two, for the time,\rwere wedded; and should poor Queequeg sink to rise no more, then both\rusage and honor demanded, that instead of cutting the cord, it should\rdrag me down in his wake. So, then, an elongated Siamese ligature\runited us. Queequeg was my own inseparable twin brother; nor could I\rany way get rid of the dangerous liabilities which the hempen bond\rentailed.\r\rSo strongly and metaphysically did I conceive of my situation then,\rthat while earnestly watching his motions, I seemed distinctly to\rperceive that my own individuality was now merged in a joint stock\rcompany of two; that my free will had received a mortal wound; and that\ranother’s mistake or misfortune might plunge innocent me into unmerited\rdisaster and death. Therefore, I saw that here was a sort of\rinterregnum in Providence; for its even-handed equity never could have\rso gross an injustice. And yet still further pondering—while I jerked\rhim now and then from between the whale and ship, which would threaten\rto jam him—still further pondering, I say, I saw that this situation of\rmine was the precise situation of every mortal that breathes; only, in\rmost cases, he, one way or other, has this Siamese connexion with a\rplurality of other mortals. If your banker breaks, you snap; if your\rapothecary by mistake sends you poison in your pills, you die. True,\ryou may say that, by exceeding caution, you may possibly escape these\rand the multitudinous other evil chances of life. But handle Queequeg’s\rmonkey-rope heedfully as I would, sometimes he jerked it so, that I\rcame very near sliding overboard. Nor could I possibly forget that, do\rwhat I would, I only had the management of one end of it.*\r\r*The monkey-rope is found in all whalers; but it was only in the Pequod\rthat the monkey and his holder were ever tied together. This\rimprovement upon the original usage was introduced by no less a man\rthan Stubb, in order to afford the imperilled harpooneer the strongest\rpossible guarantee for the faithfulness and vigilance of his\rmonkey-rope holder.\r\rI have hinted that I would often jerk poor Queequeg from between the\rwhale and the ship—where he would occasionally fall, from the incessant\rrolling and swaying of both. But this was not the only jamming jeopardy\rhe was exposed to. Unappalled by the massacre made upon them during the\rnight, the sharks now freshly and more keenly allured by the before\rpent blood which began to flow from the carcass—the rabid creatures\rswarmed round it like bees in a beehive.\r\rAnd right in among those sharks was Queequeg; who often pushed them\raside with his floundering feet. A thing altogether incredible were it\rnot that attracted by such prey as a dead whale, the otherwise\rmiscellaneously carnivorous shark will seldom touch a man.\r\rNevertheless, it may well be believed that since they have such a\rravenous finger in the pie, it is deemed but wise to look sharp to\rthem. Accordingly, besides the monkey-rope, with which I now and then\rjerked the poor fellow from too close a vicinity to the maw of what\rseemed a peculiarly ferocious shark—he was provided with still another\rprotection. Suspended over the side in one of the stages, Tashtego and\rDaggoo continually flourished over his head a couple of keen\rwhale-spades, wherewith they slaughtered as many sharks as they could\rreach. This procedure of theirs, to be sure, was very disinterested and\rbenevolent of them. They meant Queequeg’s best happiness, I admit; but\rin their hasty zeal to befriend him, and from the circumstance that\rboth he and the sharks were at times half hidden by the blood-muddled\rwater, those indiscreet spades of theirs would come nearer amputating a\rleg than a tail. But poor Queequeg, I suppose, straining and gasping\rthere with that great iron hook—poor Queequeg, I suppose, only prayed\rto his Yojo, and gave up his life into the hands of his gods.\r\rWell, well, my dear comrade and twin-brother, thought I, as I drew in\rand then slacked off the rope to every swell of the sea—what matters\rit, after all? Are you not the precious image of each and all of us men\rin this whaling world? That unsounded ocean you gasp in, is Life; those\rsharks, your foes; those spades, your friends; and what between sharks\rand spades you are in a sad pickle and peril, poor lad.\r\rBut courage! there is good cheer in store for you, Queequeg. For now,\ras with blue lips and blood-shot eyes the exhausted savage at last\rclimbs up the chains and stands all dripping and involuntarily\rtrembling over the side; the steward advances, and with a benevolent,\rconsolatory glance hands him—what? Some hot Cognac? No! hands him, ye\rgods! hands him a cup of tepid ginger and water!\r\r“Ginger? Do I smell ginger?” suspiciously asked Stubb, coming near.\r“Yes, this must be ginger,” peering into the as yet untasted cup. Then\rstanding as if incredulous for a while, he calmly walked towards the\rastonished steward slowly saying, “Ginger? ginger? and will you have\rthe goodness to tell me, Mr. Dough-Boy, where lies the virtue of\rginger? Ginger! is ginger the sort of fuel you use, Dough-boy, to\rkindle a fire in this shivering cannibal? Ginger!—what the devil is\rginger? Sea-coal? firewood?—lucifer matches?—tinder?—gunpowder?—what\rthe devil is ginger, I say, that you offer this cup to our poor\rQueequeg here.”\r\r“There is some sneaking Temperance Society movement about this\rbusiness,” he suddenly added, now approaching Starbuck, who had just\rcome from forward. “Will you look at that kannakin, sir: smell of it,\rif you please.” Then watching the mate’s countenance, he added, “The\rsteward, Mr. Starbuck, had the face to offer that calomel and jalap to\rQueequeg, there, this instant off the whale. Is the steward an\rapothecary, sir? and may I ask whether this is the sort of bitters by\rwhich he blows back the life into a half-drowned man?”\r\r“I trust not,” said Starbuck, “it is poor stuff enough.”\r\r“Aye, aye, steward,” cried Stubb, “we’ll teach you to drug a\rharpooneer; none of your apothecary’s medicine here; you want to poison\rus, do ye? You have got out insurances on our lives and want to murder\rus all, and pocket the proceeds, do ye?”\r\r“It was not me,” cried Dough-Boy, “it was Aunt Charity that brought the\rginger on board; and bade me never give the harpooneers any spirits,\rbut only this ginger-jub—so she called it.”\r\r“Ginger-jub! you gingerly rascal! take that! and run along with ye to\rthe lockers, and get something better. I hope I do no wrong, Mr.\rStarbuck. It is the captain’s orders—grog for the harpooneer on a\rwhale.”\r\r“Enough,” replied Starbuck, “only don’t hit him again, but—”\r\r“Oh, I never hurt when I hit, except when I hit a whale or something of\rthat sort; and this fellow’s a weazel. What were you about saying,\rsir?”\r\r“Only this: go down with him, and get what thou wantest thyself.”\r\rWhen Stubb reappeared, he came with a dark flask in one hand, and a\rsort of tea-caddy in the other. The first contained strong spirits, and\rwas handed to Queequeg; the second was Aunt Charity’s gift, and that\rwas freely given to the waves.\r\r\rCHAPTER 73. Stubb and Flask kill a Right Whale; and Then Have a Talk\rover Him.\r\rIt must be borne in mind that all this time we have a Sperm Whale’s\rprodigious head hanging to the Pequod’s side. But we must let it\rcontinue hanging there a while till we can get a chance to attend to\rit. For the present other matters press, and the best we can do now for\rthe head, is to pray heaven the tackles may hold.\r\rNow, during the past night and forenoon, the Pequod had gradually\rdrifted into a sea, which, by its occasional patches of yellow brit,\rgave unusual tokens of the vicinity of Right Whales, a species of the\rLeviathan that but few supposed to be at this particular time lurking\ranywhere near. And though all hands commonly disdained the capture of\rthose inferior creatures; and though the Pequod was not commissioned to\rcruise for them at all, and though she had passed numbers of them near\rthe Crozetts without lowering a boat; yet now that a Sperm Whale had\rbeen brought alongside and beheaded, to the surprise of all, the\rannouncement was made that a Right Whale should be captured that day,\rif opportunity offered.\r\rNor was this long wanting. Tall spouts were seen to leeward; and two\rboats, Stubb’s and Flask’s, were detached in pursuit. Pulling further\rand further away, they at last became almost invisible to the men at\rthe mast-head. But suddenly in the distance, they saw a great heap of\rtumultuous white water, and soon after news came from aloft that one or\rboth the boats must be fast. An interval passed and the boats were in\rplain sight, in the act of being dragged right towards the ship by the\rtowing whale. So close did the monster come to the hull, that at first\rit seemed as if he meant it malice; but suddenly going down in a\rmaelstrom, within three rods of the planks, he wholly disappeared from\rview, as if diving under the keel. “Cut, cut!” was the cry from the\rship to the boats, which, for one instant, seemed on the point of being\rbrought with a deadly dash against the vessel’s side. But having plenty\rof line yet in the tubs, and the whale not sounding very rapidly, they\rpaid out abundance of rope, and at the same time pulled with all their\rmight so as to get ahead of the ship. For a few minutes the struggle\rwas intensely critical; for while they still slacked out the tightened\rline in one direction, and still plied their oars in another, the\rcontending strain threatened to take them under. But it was only a few\rfeet advance they sought to gain. And they stuck to it till they did\rgain it; when instantly, a swift tremor was felt running like lightning\ralong the keel, as the strained line, scraping beneath the ship,\rsuddenly rose to view under her bows, snapping and quivering; and so\rflinging off its drippings, that the drops fell like bits of broken\rglass on the water, while the whale beyond also rose to sight, and once\rmore the boats were free to fly. But the fagged whale abated his speed,\rand blindly altering his course, went round the stern of the ship\rtowing the two boats after him, so that they performed a complete\rcircuit.\r\rMeantime, they hauled more and more upon their lines, till close\rflanking him on both sides, Stubb answered Flask with lance for lance;\rand thus round and round the Pequod the battle went, while the\rmultitudes of sharks that had before swum round the Sperm Whale’s body,\rrushed to the fresh blood that was spilled, thirstily drinking at every\rnew gash, as the eager Israelites did at the new bursting fountains\rthat poured from the smitten rock.\r\rAt last his spout grew thick, and with a frightful roll and vomit, he\rturned upon his back a corpse.\r\rWhile the two headsmen were engaged in making fast cords to his flukes,\rand in other ways getting the mass in readiness for towing, some\rconversation ensued between them.\r\r“I wonder what the old man wants with this lump of foul lard,” said\rStubb, not without some disgust at the thought of having to do with so\rignoble a leviathan.\r\r“Wants with it?” said Flask, coiling some spare line in the boat’s bow,\r“did you never hear that the ship which but once has a Sperm Whale’s\rhead hoisted on her starboard side, and at the same time a Right\rWhale’s on the larboard; did you never hear, Stubb, that that ship can\rnever afterwards capsize?”\r\r“Why not?\r\r“I don’t know, but I heard that gamboge ghost of a Fedallah saying so,\rand he seems to know all about ships’ charms. But I sometimes think\rhe’ll charm the ship to no good at last. I don’t half like that chap,\rStubb. Did you ever notice how that tusk of his is a sort of carved\rinto a snake’s head, Stubb?”\r\r“Sink him! I never look at him at all; but if ever I get a chance of a\rdark night, and he standing hard by the bulwarks, and no one by; look\rdown there, Flask”—pointing into the sea with a peculiar motion of both\rhands—“Aye, will I! Flask, I take that Fedallah to be the devil in\rdisguise. Do you believe that cock and bull story about his having been\rstowed away on board ship? He’s the devil, I say. The reason why you\rdon’t see his tail, is because he tucks it up out of sight; he carries\rit coiled away in his pocket, I guess. Blast him! now that I think of\rit, he’s always wanting oakum to stuff into the toes of his boots.”\r\r“He sleeps in his boots, don’t he? He hasn’t got any hammock; but I’ve\rseen him lay of nights in a coil of rigging.”\r\r“No doubt, and it’s because of his cursed tail; he coils it down, do ye\rsee, in the eye of the rigging.”\r\r“What’s the old man have so much to do with him for?”\r\r“Striking up a swap or a bargain, I suppose.”\r\r“Bargain?—about what?”\r\r“Why, do ye see, the old man is hard bent after that White Whale, and\rthe devil there is trying to come round him, and get him to swap away\rhis silver watch, or his soul, or something of that sort, and then\rhe’ll surrender Moby Dick.”\r\r“Pooh! Stubb, you are skylarking; how can Fedallah do that?”\r\r“I don’t know, Flask, but the devil is a curious chap, and a wicked\rone, I tell ye. Why, they say as how he went a sauntering into the old\rflag-ship once, switching his tail about devilish easy and\rgentlemanlike, and inquiring if the old governor was at home. Well, he\rwas at home, and asked the devil what he wanted. The devil, switching\rhis hoofs, up and says, ‘I want John.’ ‘What for?’ says the old\rgovernor. ‘What business is that of yours,’ says the devil, getting\rmad,—‘I want to use him.’ ‘Take him,’ says the governor—and by the\rLord, Flask, if the devil didn’t give John the Asiatic cholera before\rhe got through with him, I’ll eat this whale in one mouthful. But look\rsharp—ain’t you all ready there? Well, then, pull ahead, and let’s get\rthe whale alongside.”\r\r“I think I remember some such story as you were telling,” said Flask,\rwhen at last the two boats were slowly advancing with their burden\rtowards the ship, “but I can’t remember where.”\r\r“Three Spaniards? Adventures of those three bloody-minded soldadoes?\rDid ye read it there, Flask? I guess ye did?”\r\r“No: never saw such a book; heard of it, though. But now, tell me,\rStubb, do you suppose that that devil you was speaking of just now, was\rthe same you say is now on board the Pequod?”\r\r“Am I the same man that helped kill this whale? Doesn’t the devil live\rfor ever; who ever heard that the devil was dead? Did you ever see any\rparson a wearing mourning for the devil? And if the devil has a\rlatch-key to get into the admiral’s cabin, don’t you suppose he can\rcrawl into a porthole? Tell me that, Mr. Flask?”\r\r“How old do you suppose Fedallah is, Stubb?”\r\r“Do you see that mainmast there?” pointing to the ship; “well, that’s\rthe figure one; now take all the hoops in the Pequod’s hold, and string\ralong in a row with that mast, for oughts, do you see; well, that\rwouldn’t begin to be Fedallah’s age. Nor all the coopers in creation\rcouldn’t show hoops enough to make oughts enough.”\r\r“But see here, Stubb, I thought you a little boasted just now, that you\rmeant to give Fedallah a sea-toss, if you got a good chance. Now, if\rhe’s so old as all those hoops of yours come to, and if he is going to\rlive for ever, what good will it do to pitch him overboard—tell me\rthat?\r\r“Give him a good ducking, anyhow.”\r\r“But he’d crawl back.”\r\r“Duck him again; and keep ducking him.”\r\r“Suppose he should take it into his head to duck you, though—yes, and\rdrown you—what then?”\r\r“I should like to see him try it; I’d give him such a pair of black\reyes that he wouldn’t dare to show his face in the admiral’s cabin\ragain for a long while, let alone down in the orlop there, where he\rlives, and hereabouts on the upper decks where he sneaks so much. Damn\rthe devil, Flask; so you suppose I’m afraid of the devil? Who’s afraid\rof him, except the old governor who daresn’t catch him and put him in\rdouble-darbies, as he deserves, but lets him go about kidnapping\rpeople; aye, and signed a bond with him, that all the people the devil\rkidnapped, he’d roast for him? There’s a governor!”\r\r“Do you suppose Fedallah wants to kidnap Captain Ahab?”\r\r“Do I suppose it? You’ll know it before long, Flask. But I am going now\rto keep a sharp look-out on him; and if I see anything very suspicious\rgoing on, I’ll just take him by the nape of his neck, and say—Look\rhere, Beelzebub, you don’t do it; and if he makes any fuss, by the Lord\rI’ll make a grab into his pocket for his tail, take it to the capstan,\rand give him such a wrenching and heaving, that his tail will come\rshort off at the stump—do you see; and then, I rather guess when he\rfinds himself docked in that queer fashion, he’ll sneak off without the\rpoor satisfaction of feeling his tail between his legs.”\r\r“And what will you do with the tail, Stubb?”\r\r“Do with it? Sell it for an ox whip when we get home;—what else?”\r\r“Now, do you mean what you say, and have been saying all along, Stubb?”\r\r“Mean or not mean, here we are at the ship.”\r\rThe boats were here hailed, to tow the whale on the larboard side,\rwhere fluke chains and other necessaries were already prepared for\rsecuring him.\r\r“Didn’t I tell you so?” said Flask; “yes, you’ll soon see this right\rwhale’s head hoisted up opposite that parmacetti’s.”\r\rIn good time, Flask’s saying proved true. As before, the Pequod steeply\rleaned over towards the sperm whale’s head, now, by the counterpoise of\rboth heads, she regained her even keel; though sorely strained, you may\rwell believe. So, when on one side you hoist in Locke’s head, you go\rover that way; but now, on the other side, hoist in Kant’s and you come\rback again; but in very poor plight. Thus, some minds for ever keep\rtrimming boat. Oh, ye foolish! throw all these thunder-heads overboard,\rand then you will float light and right.\r\rIn disposing of the body of a right whale, when brought alongside the\rship, the same preliminary proceedings commonly take place as in the\rcase of a sperm whale; only, in the latter instance, the head is cut\roff whole, but in the former the lips and tongue are separately removed\rand hoisted on deck, with all the well known black bone attached to\rwhat is called the crown-piece. But nothing like this, in the present\rcase, had been done. The carcases of both whales had dropped astern;\rand the head-laden ship not a little resembled a mule carrying a pair\rof overburdening panniers.\r\rMeantime, Fedallah was calmly eyeing the right whale’s head, and ever\rand anon glancing from the deep wrinkles there to the lines in his own\rhand. And Ahab chanced so to stand, that the Parsee occupied his\rshadow; while, if the Parsee’s shadow was there at all it seemed only\rto blend with, and lengthen Ahab’s. As the crew toiled on, Laplandish\rspeculations were bandied among them, concerning all these passing\rthings.\r\r\rCHAPTER 74. The Sperm Whale’s Head—Contrasted View.\r\rHere, now, are two great whales, laying their heads together; let us\rjoin them, and lay together our own.\r\rOf the grand order of folio leviathans, the Sperm Whale and the Right\rWhale are by far the most noteworthy. They are the only whales\rregularly hunted by man. To the Nantucketer, they present the two\rextremes of all the known varieties of the whale. As the external\rdifference between them is mainly observable in their heads; and as a\rhead of each is this moment hanging from the Pequod’s side; and as we\rmay freely go from one to the other, by merely stepping across the\rdeck:—where, I should like to know, will you obtain a better chance to\rstudy practical cetology than here?\r\rIn the first place, you are struck by the general contrast between\rthese heads. Both are massive enough in all conscience; but there is a\rcertain mathematical symmetry in the Sperm Whale’s which the Right\rWhale’s sadly lacks. There is more character in the Sperm Whale’s head.\rAs you behold it, you involuntarily yield the immense superiority to\rhim, in point of pervading dignity. In the present instance, too, this\rdignity is heightened by the pepper and salt colour of his head at the\rsummit, giving token of advanced age and large experience. In short, he\ris what the fishermen technically call a “grey-headed whale.”\r\rLet us now note what is least dissimilar in these heads—namely, the two\rmost important organs, the eye and the ear. Far back on the side of the\rhead, and low down, near the angle of either whale’s jaw, if you\rnarrowly search, you will at last see a lashless eye, which you would\rfancy to be a young colt’s eye; so out of all proportion is it to the\rmagnitude of the head.\r\rNow, from this peculiar sideway position of the whale’s eyes, it is\rplain that he can never see an object which is exactly ahead, no more\rthan he can one exactly astern. In a word, the position of the whale’s\reyes corresponds to that of a man’s ears; and you may fancy, for\ryourself, how it would fare with you, did you sideways survey objects\rthrough your ears. You would find that you could only command some\rthirty degrees of vision in advance of the straight side-line of sight;\rand about thirty more behind it. If your bitterest foe were walking\rstraight towards you, with dagger uplifted in broad day, you would not\rbe able to see him, any more than if he were stealing upon you from\rbehind. In a word, you would have two backs, so to speak; but, at the\rsame time, also, two fronts (side fronts): for what is it that makes\rthe front of a man—what, indeed, but his eyes?\r\rMoreover, while in most other animals that I can now think of, the eyes\rare so planted as imperceptibly to blend their visual power, so as to\rproduce one picture and not two to the brain; the peculiar position of\rthe whale’s eyes, effectually divided as they are by many cubic feet of\rsolid head, which towers between them like a great mountain separating\rtwo lakes in valleys; this, of course, must wholly separate the\rimpressions which each independent organ imparts. The whale, therefore,\rmust see one distinct picture on this side, and another distinct\rpicture on that side; while all between must be profound darkness and\rnothingness to him. Man may, in effect, be said to look out on the\rworld from a sentry-box with two joined sashes for his window. But with\rthe whale, these two sashes are separately inserted, making two\rdistinct windows, but sadly impairing the view. This peculiarity of the\rwhale’s eyes is a thing always to be borne in mind in the fishery; and\rto be remembered by the reader in some subsequent scenes.\r\rA curious and most puzzling question might be started concerning this\rvisual matter as touching the Leviathan. But I must be content with a\rhint. So long as a man’s eyes are open in the light, the act of seeing\ris involuntary; that is, he cannot then help mechanically seeing\rwhatever objects are before him. Nevertheless, any one’s experience\rwill teach him, that though he can take in an undiscriminating sweep of\rthings at one glance, it is quite impossible for him, attentively, and\rcompletely, to examine any two things—however large or however small—at\rone and the same instant of time; never mind if they lie side by side\rand touch each other. But if you now come to separate these two\robjects, and surround each by a circle of profound darkness; then, in\rorder to see one of them, in such a manner as to bring your mind to\rbear on it, the other will be utterly excluded from your contemporary\rconsciousness. How is it, then, with the whale? True, both his eyes, in\rthemselves, must simultaneously act; but is his brain so much more\rcomprehensive, combining, and subtle than man’s, that he can at the\rsame moment of time attentively examine two distinct prospects, one on\rone side of him, and the other in an exactly opposite direction? If he\rcan, then is it as marvellous a thing in him, as if a man were able\rsimultaneously to go through the demonstrations of two distinct\rproblems in Euclid. Nor, strictly investigated, is there any\rincongruity in this comparison.\r\rIt may be but an idle whim, but it has always seemed to me, that the\rextraordinary vacillations of movement displayed by some whales when\rbeset by three or four boats; the timidity and liability to queer\rfrights, so common to such whales; I think that all this indirectly\rproceeds from the helpless perplexity of volition, in which their\rdivided and diametrically opposite powers of vision must involve them.\r\rBut the ear of the whale is full as curious as the eye. If you are an\rentire stranger to their race, you might hunt over these two heads for\rhours, and never discover that organ. The ear has no external leaf\rwhatever; and into the hole itself you can hardly insert a quill, so\rwondrously minute is it. It is lodged a little behind the eye. With\rrespect to their ears, this important difference is to be observed\rbetween the sperm whale and the right. While the ear of the former has\ran external opening, that of the latter is entirely and evenly covered\rover with a membrane, so as to be quite imperceptible from without.\r\rIs it not curious, that so vast a being as the whale should see the\rworld through so small an eye, and hear the thunder through an ear\rwhich is smaller than a hare’s? But if his eyes were broad as the lens\rof Herschel’s great telescope; and his ears capacious as the porches of\rcathedrals; would that make him any longer of sight, or sharper of\rhearing? Not at all.—Why then do you try to “enlarge” your mind?\rSubtilize it.\r\rLet us now with whatever levers and steam-engines we have at hand, cant\rover the sperm whale’s head, that it may lie bottom up; then, ascending\rby a ladder to the summit, have a peep down the mouth; and were it not\rthat the body is now completely separated from it, with a lantern we\rmight descend into the great Kentucky Mammoth Cave of his stomach. But\rlet us hold on here by this tooth, and look about us where we are. What\ra really beautiful and chaste-looking mouth! from floor to ceiling,\rlined, or rather papered with a glistening white membrane, glossy as\rbridal satins.\r\rBut come out now, and look at this portentous lower jaw, which seems\rlike the long narrow lid of an immense snuff-box, with the hinge at one\rend, instead of one side. If you pry it up, so as to get it overhead,\rand expose its rows of teeth, it seems a terrific portcullis; and such,\ralas! it proves to many a poor wight in the fishery, upon whom these\rspikes fall with impaling force. But far more terrible is it to behold,\rwhen fathoms down in the sea, you see some sulky whale, floating there\rsuspended, with his prodigious jaw, some fifteen feet long, hanging\rstraight down at right-angles with his body, for all the world like a\rship’s jib-boom. This whale is not dead; he is only dispirited; out of\rsorts, perhaps; hypochondriac; and so supine, that the hinges of his\rjaw have relaxed, leaving him there in that ungainly sort of plight, a\rreproach to all his tribe, who must, no doubt, imprecate lock-jaws upon\rhim.\r\rIn most cases this lower jaw—being easily unhinged by a practised\rartist—is disengaged and hoisted on deck for the purpose of extracting\rthe ivory teeth, and furnishing a supply of that hard white whalebone\rwith which the fishermen fashion all sorts of curious articles,\rincluding canes, umbrella-stocks, and handles to riding-whips.\r\rWith a long, weary hoist the jaw is dragged on board, as if it were an\ranchor; and when the proper time comes—some few days after the other\rwork—Queequeg, Daggoo, and Tashtego, being all accomplished dentists,\rare set to drawing teeth. With a keen cutting-spade, Queequeg lances\rthe gums; then the jaw is lashed down to ringbolts, and a tackle being\rrigged from aloft, they drag out these teeth, as Michigan oxen drag\rstumps of old oaks out of wild wood lands. There are generally\rforty-two teeth in all; in old whales, much worn down, but undecayed;\rnor filled after our artificial fashion. The jaw is afterwards sawn\rinto slabs, and piled away like joists for building houses.\r\r\rCHAPTER 75. The Right Whale’s Head—Contrasted View.\r\rCrossing the deck, let us now have a good long look at the Right\rWhale’s head.\r\rAs in general shape the noble Sperm Whale’s head may be compared to a\rRoman war-chariot (especially in front, where it is so broadly\rrounded); so, at a broad view, the Right Whale’s head bears a rather\rinelegant resemblance to a gigantic galliot-toed shoe. Two hundred\ryears ago an old Dutch voyager likened its shape to that of a\rshoemaker’s last. And in this same last or shoe, that old woman of the\rnursery tale, with the swarming brood, might very comfortably be\rlodged, she and all her progeny.\r\rBut as you come nearer to this great head it begins to assume different\raspects, according to your point of view. If you stand on its summit\rand look at these two F-shaped spoutholes, you would take the whole\rhead for an enormous bass-viol, and these spiracles, the apertures in\rits sounding-board. Then, again, if you fix your eye upon this strange,\rcrested, comb-like incrustation on the top of the mass—this green,\rbarnacled thing, which the Greenlanders call the “crown,” and the\rSouthern fishers the “bonnet” of the Right Whale; fixing your eyes\rsolely on this, you would take the head for the trunk of some huge oak,\rwith a bird’s nest in its crotch. At any rate, when you watch those\rlive crabs that nestle here on this bonnet, such an idea will be almost\rsure to occur to you; unless, indeed, your fancy has been fixed by the\rtechnical term “crown” also bestowed upon it; in which case you will\rtake great interest in thinking how this mighty monster is actually a\rdiademed king of the sea, whose green crown has been put together for\rhim in this marvellous manner. But if this whale be a king, he is a\rvery sulky looking fellow to grace a diadem. Look at that hanging lower\rlip! what a huge sulk and pout is there! a sulk and pout, by\rcarpenter’s measurement, about twenty feet long and five feet deep; a\rsulk and pout that will yield you some 500 gallons of oil and more.\r\rA great pity, now, that this unfortunate whale should be hare-lipped.\rThe fissure is about a foot across. Probably the mother during an\rimportant interval was sailing down the Peruvian coast, when\rearthquakes caused the beach to gape. Over this lip, as over a slippery\rthreshold, we now slide into the mouth. Upon my word were I at\rMackinaw, I should take this to be the inside of an Indian wigwam. Good\rLord! is this the road that Jonah went? The roof is about twelve feet\rhigh, and runs to a pretty sharp angle, as if there were a regular\rridge-pole there; while these ribbed, arched, hairy sides, present us\rwith those wondrous, half vertical, scimetar-shaped slats of whalebone,\rsay three hundred on a side, which depending from the upper part of the\rhead or crown bone, form those Venetian blinds which have elsewhere\rbeen cursorily mentioned. The edges of these bones are fringed with\rhairy fibres, through which the Right Whale strains the water, and in\rwhose intricacies he retains the small fish, when openmouthed he goes\rthrough the seas of brit in feeding time. In the central blinds of\rbone, as they stand in their natural order, there are certain curious\rmarks, curves, hollows, and ridges, whereby some whalemen calculate the\rcreature’s age, as the age of an oak by its circular rings. Though the\rcertainty of this criterion is far from demonstrable, yet it has the\rsavor of analogical probability. At any rate, if we yield to it, we\rmust grant a far greater age to the Right Whale than at first glance\rwill seem reasonable.\r\rIn old times, there seem to have prevailed the most curious fancies\rconcerning these blinds. One voyager in Purchas calls them the wondrous\r“whiskers” inside of the whale’s mouth;* another, “hogs’ bristles”; a\rthird old gentleman in Hackluyt uses the following elegant language:\r“There are about two hundred and fifty fins growing on each side of his\rupper _chop_, which arch over his tongue on each side of his mouth.”\r\r*This reminds us that the Right Whale really has a sort of whisker, or\rrather a moustache, consisting of a few scattered white hairs on the\rupper part of the outer end of the lower jaw. Sometimes these tufts\rimpart a rather brigandish expression to his otherwise solemn\rcountenance.\r\rAs every one knows, these same “hogs’ bristles,” “fins,” “whiskers,”\r“blinds,” or whatever you please, furnish to the ladies their busks and\rother stiffening contrivances. But in this particular, the demand has\rlong been on the decline. It was in Queen Anne’s time that the bone was\rin its glory, the farthingale being then all the fashion. And as those\rancient dames moved about gaily, though in the jaws of the whale, as\ryou may say; even so, in a shower, with the like thoughtlessness, do we\rnowadays fly under the same jaws for protection; the umbrella being a\rtent spread over the same bone.\r\rBut now forget all about blinds and whiskers for a moment, and,\rstanding in the Right Whale’s mouth, look around you afresh. Seeing all\rthese colonnades of bone so methodically ranged about, would you not\rthink you were inside of the great Haarlem organ, and gazing upon its\rthousand pipes? For a carpet to the organ we have a rug of the softest\rTurkey—the tongue, which is glued, as it were, to the floor of the\rmouth. It is very fat and tender, and apt to tear in pieces in hoisting\rit on deck. This particular tongue now before us; at a passing glance I\rshould say it was a six-barreler; that is, it will yield you about that\ramount of oil.\r\rEre this, you must have plainly seen the truth of what I started\rwith—that the Sperm Whale and the Right Whale have almost entirely\rdifferent heads. To sum up, then: in the Right Whale’s there is no\rgreat well of sperm; no ivory teeth at all; no long, slender mandible\rof a lower jaw, like the Sperm Whale’s. Nor in the Sperm Whale are\rthere any of those blinds of bone; no huge lower lip; and scarcely\ranything of a tongue. Again, the Right Whale has two external\rspout-holes, the Sperm Whale only one.\r\rLook your last, now, on these venerable hooded heads, while they yet\rlie together; for one will soon sink, unrecorded, in the sea; the other\rwill not be very long in following.\r\rCan you catch the expression of the Sperm Whale’s there? It is the same\rhe died with, only some of the longer wrinkles in the forehead seem now\rfaded away. I think his broad brow to be full of a prairie-like\rplacidity, born of a speculative indifference as to death. But mark the\rother head’s expression. See that amazing lower lip, pressed by\raccident against the vessel’s side, so as firmly to embrace the jaw.\rDoes not this whole head seem to speak of an enormous practical\rresolution in facing death? This Right Whale I take to have been a\rStoic; the Sperm Whale, a Platonian, who might have taken up Spinoza in\rhis latter years.\r\r\rCHAPTER 76. The Battering-Ram.\r\rEre quitting, for the nonce, the Sperm Whale’s head, I would have you,\ras a sensible physiologist, simply—particularly remark its front\raspect, in all its compacted collectedness. I would have you\rinvestigate it now with the sole view of forming to yourself some\runexaggerated, intelligent estimate of whatever battering-ram power may\rbe lodged there. Here is a vital point; for you must either\rsatisfactorily settle this matter with yourself, or for ever remain an\rinfidel as to one of the most appalling, but not the less true events,\rperhaps anywhere to be found in all recorded history.\r\rYou observe that in the ordinary swimming position of the Sperm Whale,\rthe front of his head presents an almost wholly vertical plane to the\rwater; you observe that the lower part of that front slopes\rconsiderably backwards, so as to furnish more of a retreat for the long\rsocket which receives the boom-like lower jaw; you observe that the\rmouth is entirely under the head, much in the same way, indeed, as\rthough your own mouth were entirely under your chin. Moreover you\robserve that the whale has no external nose; and that what nose he\rhas—his spout hole—is on the top of his head; you observe that his eyes\rand ears are at the sides of his head, nearly one third of his entire\rlength from the front. Wherefore, you must now have perceived that the\rfront of the Sperm Whale’s head is a dead, blind wall, without a single\rorgan or tender prominence of any sort whatsoever. Furthermore, you are\rnow to consider that only in the extreme, lower, backward sloping part\rof the front of the head, is there the slightest vestige of bone; and\rnot till you get near twenty feet from the forehead do you come to the\rfull cranial development. So that this whole enormous boneless mass is\ras one wad. Finally, though, as will soon be revealed, its contents\rpartly comprise the most delicate oil; yet, you are now to be apprised\rof the nature of the substance which so impregnably invests all that\rapparent effeminacy. In some previous place I have described to you how\rthe blubber wraps the body of the whale, as the rind wraps an orange.\rJust so with the head; but with this difference: about the head this\renvelope, though not so thick, is of a boneless toughness, inestimable\rby any man who has not handled it. The severest pointed harpoon, the\rsharpest lance darted by the strongest human arm, impotently rebounds\rfrom it. It is as though the forehead of the Sperm Whale were paved\rwith horses’ hoofs. I do not think that any sensation lurks in it.\r\rBethink yourself also of another thing. When two large, loaded Indiamen\rchance to crowd and crush towards each other in the docks, what do the\rsailors do? They do not suspend between them, at the point of coming\rcontact, any merely hard substance, like iron or wood. No, they hold\rthere a large, round wad of tow and cork, enveloped in the thickest and\rtoughest of ox-hide. That bravely and uninjured takes the jam which\rwould have snapped all their oaken handspikes and iron crow-bars. By\ritself this sufficiently illustrates the obvious fact I drive at. But\rsupplementary to this, it has hypothetically occurred to me, that as\rordinary fish possess what is called a swimming bladder in them,\rcapable, at will, of distension or contraction; and as the Sperm Whale,\ras far as I know, has no such provision in him; considering, too, the\rotherwise inexplicable manner in which he now depresses his head\raltogether beneath the surface, and anon swims with it high elevated\rout of the water; considering the unobstructed elasticity of its\renvelope; considering the unique interior of his head; it has\rhypothetically occurred to me, I say, that those mystical lung-celled\rhoneycombs there may possibly have some hitherto unknown and\runsuspected connexion with the outer air, so as to be susceptible to\ratmospheric distension and contraction. If this be so, fancy the\rirresistibleness of that might, to which the most impalpable and\rdestructive of all elements contributes.\r\rNow, mark. Unerringly impelling this dead, impregnable, uninjurable\rwall, and this most buoyant thing within; there swims behind it all a\rmass of tremendous life, only to be adequately estimated as piled wood\ris—by the cord; and all obedient to one volition, as the smallest\rinsect. So that when I shall hereafter detail to you all the\rspecialities and concentrations of potency everywhere lurking in this\rexpansive monster; when I shall show you some of his more\rinconsiderable braining feats; I trust you will have renounced all\rignorant incredulity, and be ready to abide by this; that though the\rSperm Whale stove a passage through the Isthmus of Darien, and mixed\rthe Atlantic with the Pacific, you would not elevate one hair of your\reye-brow. For unless you own the whale, you are but a provincial and\rsentimentalist in Truth. But clear Truth is a thing for salamander\rgiants only to encounter; how small the chances for the provincials\rthen? What befell the weakling youth lifting the dread goddess’s veil\rat Lais?\r\r\rCHAPTER 77. The Great Heidelburgh Tun.\r\rNow comes the Baling of the Case. But to comprehend it aright, you must\rknow something of the curious internal structure of the thing operated\rupon.\r\rRegarding the Sperm Whale’s head as a solid oblong, you may, on an\rinclined plane, sideways divide it into two quoins,* whereof the lower\ris the bony structure, forming the cranium and jaws, and the upper an\runctuous mass wholly free from bones; its broad forward end forming the\rexpanded vertical apparent forehead of the whale. At the middle of the\rforehead horizontally subdivide this upper quoin, and then you have two\ralmost equal parts, which before were naturally divided by an internal\rwall of a thick tendinous substance.\r\r*Quoin is not a Euclidean term. It belongs to the pure nautical\rmathematics. I know not that it has been defined before. A quoin is a\rsolid which differs from a wedge in having its sharp end formed by the\rsteep inclination of one side, instead of the mutual tapering of both\rsides.\r\rThe lower subdivided part, called the junk, is one immense honeycomb of\roil, formed by the crossing and recrossing, into ten thousand\rinfiltrated cells, of tough elastic white fibres throughout its whole\rextent. The upper part, known as the Case, may be regarded as the great\rHeidelburgh Tun of the Sperm Whale. And as that famous great tierce is\rmystically carved in front, so the whale’s vast plaited forehead forms\rinnumerable strange devices for the emblematical adornment of his\rwondrous tun. Moreover, as that of Heidelburgh was always replenished\rwith the most excellent of the wines of the Rhenish valleys, so the tun\rof the whale contains by far the most precious of all his oily\rvintages; namely, the highly-prized spermaceti, in its absolutely pure,\rlimpid, and odoriferous state. Nor is this precious substance found\runalloyed in any other part of the creature. Though in life it remains\rperfectly fluid, yet, upon exposure to the air, after death, it soon\rbegins to concrete; sending forth beautiful crystalline shoots, as when\rthe first thin delicate ice is just forming in water. A large whale’s\rcase generally yields about five hundred gallons of sperm, though from\runavoidable circumstances, considerable of it is spilled, leaks, and\rdribbles away, or is otherwise irrevocably lost in the ticklish\rbusiness of securing what you can.\r\rI know not with what fine and costly material the Heidelburgh Tun was\rcoated within, but in superlative richness that coating could not\rpossibly have compared with the silken pearl-coloured membrane, like\rthe lining of a fine pelisse, forming the inner surface of the Sperm\rWhale’s case.\r\rIt will have been seen that the Heidelburgh Tun of the Sperm Whale\rembraces the entire length of the entire top of the head; and since—as\rhas been elsewhere set forth—the head embraces one third of the whole\rlength of the creature, then setting that length down at eighty feet\rfor a good sized whale, you have more than twenty-six feet for the\rdepth of the tun, when it is lengthwise hoisted up and down against a\rship’s side.\r\rAs in decapitating the whale, the operator’s instrument is brought\rclose to the spot where an entrance is subsequently forced into the\rspermaceti magazine; he has, therefore, to be uncommonly heedful, lest\ra careless, untimely stroke should invade the sanctuary and wastingly\rlet out its invaluable contents. It is this decapitated end of the\rhead, also, which is at last elevated out of the water, and retained in\rthat position by the enormous cutting tackles, whose hempen\rcombinations, on one side, make quite a wilderness of ropes in that\rquarter.\r\rThus much being said, attend now, I pray you, to that marvellous and—in\rthis particular instance—almost fatal operation whereby the Sperm\rWhale’s great Heidelburgh Tun is tapped.\r\r\rCHAPTER 78. Cistern and Buckets.\r\rNimble as a cat, Tashtego mounts aloft; and without altering his erect\rposture, runs straight out upon the overhanging mainyard-arm, to the\rpart where it exactly projects over the hoisted Tun. He has carried\rwith him a light tackle called a whip, consisting of only two parts,\rtravelling through a single-sheaved block. Securing this block, so that\rit hangs down from the yard-arm, he swings one end of the rope, till it\ris caught and firmly held by a hand on deck. Then, hand-over-hand, down\rthe other part, the Indian drops through the air, till dexterously he\rlands on the summit of the head. There—still high elevated above the\rrest of the company, to whom he vivaciously cries—he seems some Turkish\rMuezzin calling the good people to prayers from the top of a tower. A\rshort-handled sharp spade being sent up to him, he diligently searches\rfor the proper place to begin breaking into the Tun. In this business\rhe proceeds very heedfully, like a treasure-hunter in some old house,\rsounding the walls to find where the gold is masoned in. By the time\rthis cautious search is over, a stout iron-bound bucket, precisely like\ra well-bucket, has been attached to one end of the whip; while the\rother end, being stretched across the deck, is there held by two or\rthree alert hands. These last now hoist the bucket within grasp of the\rIndian, to whom another person has reached up a very long pole.\rInserting this pole into the bucket, Tashtego downward guides the\rbucket into the Tun, till it entirely disappears; then giving the word\rto the seamen at the whip, up comes the bucket again, all bubbling like\ra dairy-maid’s pail of new milk. Carefully lowered from its height, the\rfull-freighted vessel is caught by an appointed hand, and quickly\remptied into a large tub. Then remounting aloft, it again goes through\rthe same round until the deep cistern will yield no more. Towards the\rend, Tashtego has to ram his long pole harder and harder, and deeper\rand deeper into the Tun, until some twenty feet of the pole have gone\rdown.\r\rNow, the people of the Pequod had been baling some time in this way;\rseveral tubs had been filled with the fragrant sperm; when all at once\ra queer accident happened. Whether it was that Tashtego, that wild\rIndian, was so heedless and reckless as to let go for a moment his\rone-handed hold on the great cabled tackles suspending the head; or\rwhether the place where he stood was so treacherous and oozy; or\rwhether the Evil One himself would have it to fall out so, without\rstating his particular reasons; how it was exactly, there is no telling\rnow; but, on a sudden, as the eightieth or ninetieth bucket came\rsuckingly up—my God! poor Tashtego—like the twin reciprocating bucket\rin a veritable well, dropped head-foremost down into this great Tun of\rHeidelburgh, and with a horrible oily gurgling, went clean out of\rsight!\r\r“Man overboard!” cried Daggoo, who amid the general consternation first\rcame to his senses. “Swing the bucket this way!” and putting one foot\rinto it, so as the better to secure his slippery hand-hold on the whip\ritself, the hoisters ran him high up to the top of the head, almost\rbefore Tashtego could have reached its interior bottom. Meantime, there\rwas a terrible tumult. Looking over the side, they saw the before\rlifeless head throbbing and heaving just below the surface of the sea,\ras if that moment seized with some momentous idea; whereas it was only\rthe poor Indian unconsciously revealing by those struggles the perilous\rdepth to which he had sunk.\r\rAt this instant, while Daggoo, on the summit of the head, was clearing\rthe whip—which had somehow got foul of the great cutting tackles—a\rsharp cracking noise was heard; and to the unspeakable horror of all,\rone of the two enormous hooks suspending the head tore out, and with a\rvast vibration the enormous mass sideways swung, till the drunk ship\rreeled and shook as if smitten by an iceberg. The one remaining hook,\rupon which the entire strain now depended, seemed every instant to be\ron the point of giving way; an event still more likely from the violent\rmotions of the head.\r\r“Come down, come down!” yelled the seamen to Daggoo, but with one hand\rholding on to the heavy tackles, so that if the head should drop, he\rwould still remain suspended; the negro having cleared the foul line,\rrammed down the bucket into the now collapsed well, meaning that the\rburied harpooneer should grasp it, and so be hoisted out.\r\r“In heaven’s name, man,” cried Stubb, “are you ramming home a cartridge\rthere?—Avast! How will that help him; jamming that iron-bound bucket on\rtop of his head? Avast, will ye!”\r\r“Stand clear of the tackle!” cried a voice like the bursting of a\rrocket.\r\rAlmost in the same instant, with a thunder-boom, the enormous mass\rdropped into the sea, like Niagara’s Table-Rock into the whirlpool; the\rsuddenly relieved hull rolled away from it, to far down her glittering\rcopper; and all caught their breath, as half swinging—now over the\rsailors’ heads, and now over the water—Daggoo, through a thick mist of\rspray, was dimly beheld clinging to the pendulous tackles, while poor,\rburied-alive Tashtego was sinking utterly down to the bottom of the\rsea! But hardly had the blinding vapor cleared away, when a naked\rfigure with a boarding-sword in his hand, was for one swift moment seen\rhovering over the bulwarks. The next, a loud splash announced that my\rbrave Queequeg had dived to the rescue. One packed rush was made to the\rside, and every eye counted every ripple, as moment followed moment,\rand no sign of either the sinker or the diver could be seen. Some hands\rnow jumped into a boat alongside, and pushed a little off from the\rship.\r\r“Ha! ha!” cried Daggoo, all at once, from his now quiet, swinging perch\roverhead; and looking further off from the side, we saw an arm thrust\rupright from the blue waves; a sight strange to see, as an arm thrust\rforth from the grass over a grave.\r\r“Both! both!—it is both!”—cried Daggoo again with a joyful shout; and\rsoon after, Queequeg was seen boldly striking out with one hand, and\rwith the other clutching the long hair of the Indian. Drawn into the\rwaiting boat, they were quickly brought to the deck; but Tashtego was\rlong in coming to, and Queequeg did not look very brisk.\r\rNow, how had this noble rescue been accomplished? Why, diving after the\rslowly descending head, Queequeg with his keen sword had made side\rlunges near its bottom, so as to scuttle a large hole there; then\rdropping his sword, had thrust his long arm far inwards and upwards,\rand so hauled out poor Tash by the head. He averred, that upon first\rthrusting in for him, a leg was presented; but well knowing that that\rwas not as it ought to be, and might occasion great trouble;—he had\rthrust back the leg, and by a dexterous heave and toss, had wrought a\rsomerset upon the Indian; so that with the next trial, he came forth in\rthe good old way—head foremost. As for the great head itself, that was\rdoing as well as could be expected.\r\rAnd thus, through the courage and great skill in obstetrics of\rQueequeg, the deliverance, or rather, delivery of Tashtego, was\rsuccessfully accomplished, in the teeth, too, of the most untoward and\rapparently hopeless impediments; which is a lesson by no means to be\rforgotten. Midwifery should be taught in the same course with fencing\rand boxing, riding and rowing.\r\rI know that this queer adventure of the Gay-Header’s will be sure to\rseem incredible to some landsmen, though they themselves may have\reither seen or heard of some one’s falling into a cistern ashore; an\raccident which not seldom happens, and with much less reason too than\rthe Indian’s, considering the exceeding slipperiness of the curb of the\rSperm Whale’s well.\r\rBut, peradventure, it may be sagaciously urged, how is this? We thought\rthe tissued, infiltrated head of the Sperm Whale, was the lightest and\rmost corky part about him; and yet thou makest it sink in an element of\ra far greater specific gravity than itself. We have thee there. Not at\rall, but I have ye; for at the time poor Tash fell in, the case had\rbeen nearly emptied of its lighter contents, leaving little but the\rdense tendinous wall of the well—a double welded, hammered substance,\ras I have before said, much heavier than the sea water, and a lump of\rwhich sinks in it like lead almost. But the tendency to rapid sinking\rin this substance was in the present instance materially counteracted\rby the other parts of the head remaining undetached from it, so that it\rsank very slowly and deliberately indeed, affording Queequeg a fair\rchance for performing his agile obstetrics on the run, as you may say.\rYes, it was a running delivery, so it was.\r\rNow, had Tashtego perished in that head, it had been a very precious\rperishing; smothered in the very whitest and daintiest of fragrant\rspermaceti; coffined, hearsed, and tombed in the secret inner chamber\rand sanctum sanctorum of the whale. Only one sweeter end can readily be\rrecalled—the delicious death of an Ohio honey-hunter, who seeking honey\rin the crotch of a hollow tree, found such exceeding store of it, that\rleaning too far over, it sucked him in, so that he died embalmed. How\rmany, think ye, have likewise fallen into Plato’s honey head, and\rsweetly perished there?\r\r\rCHAPTER 79. The Prairie.\r\rTo scan the lines of his face, or feel the bumps on the head of this\rLeviathan; this is a thing which no Physiognomist or Phrenologist has\ras yet undertaken. Such an enterprise would seem almost as hopeful as\rfor Lavater to have scrutinized the wrinkles on the Rock of Gibraltar,\ror for Gall to have mounted a ladder and manipulated the Dome of the\rPantheon. Still, in that famous work of his, Lavater not only treats of\rthe various faces of men, but also attentively studies the faces of\rhorses, birds, serpents, and fish; and dwells in detail upon the\rmodifications of expression discernible therein. Nor have Gall and his\rdisciple Spurzheim failed to throw out some hints touching the\rphrenological characteristics of other beings than man. Therefore,\rthough I am but ill qualified for a pioneer, in the application of\rthese two semi-sciences to the whale, I will do my endeavor. I try all\rthings; I achieve what I can.\r\rPhysiognomically regarded, the Sperm Whale is an anomalous creature. He\rhas no proper nose. And since the nose is the central and most\rconspicuous of the features; and since it perhaps most modifies and\rfinally controls their combined expression; hence it would seem that\rits entire absence, as an external appendage, must very largely affect\rthe countenance of the whale. For as in landscape gardening, a spire,\rcupola, monument, or tower of some sort, is deemed almost indispensable\rto the completion of the scene; so no face can be physiognomically in\rkeeping without the elevated open-work belfry of the nose. Dash the\rnose from Phidias’s marble Jove, and what a sorry remainder!\rNevertheless, Leviathan is of so mighty a magnitude, all his\rproportions are so stately, that the same deficiency which in the\rsculptured Jove were hideous, in him is no blemish at all. Nay, it is\ran added grandeur. A nose to the whale would have been impertinent. As\ron your physiognomical voyage you sail round his vast head in your\rjolly-boat, your noble conceptions of him are never insulted by the\rreflection that he has a nose to be pulled. A pestilent conceit, which\rso often will insist upon obtruding even when beholding the mightiest\rroyal beadle on his throne.\r\rIn some particulars, perhaps the most imposing physiognomical view to\rbe had of the Sperm Whale, is that of the full front of his head. This\raspect is sublime.\r\rIn thought, a fine human brow is like the East when troubled with the\rmorning. In the repose of the pasture, the curled brow of the bull has\ra touch of the grand in it. Pushing heavy cannon up mountain defiles,\rthe elephant’s brow is majestic. Human or animal, the mystical brow is\ras that great golden seal affixed by the German emperors to their\rdecrees. It signifies—“God: done this day by my hand.” But in most\rcreatures, nay in man himself, very often the brow is but a mere strip\rof alpine land lying along the snow line. Few are the foreheads which\rlike Shakespeare’s or Melancthon’s rise so high, and descend so low,\rthat the eyes themselves seem clear, eternal, tideless mountain lakes;\rand all above them in the forehead’s wrinkles, you seem to track the\rantlered thoughts descending there to drink, as the Highland hunters\rtrack the snow prints of the deer. But in the great Sperm Whale, this\rhigh and mighty god-like dignity inherent in the brow is so immensely\ramplified, that gazing on it, in that full front view, you feel the\rDeity and the dread powers more forcibly than in beholding any other\robject in living nature. For you see no one point precisely; not one\rdistinct feature is revealed; no nose, eyes, ears, or mouth; no face;\rhe has none, proper; nothing but that one broad firmament of a\rforehead, pleated with riddles; dumbly lowering with the doom of boats,\rand ships, and men. Nor, in profile, does this wondrous brow diminish;\rthough that way viewed its grandeur does not domineer upon you so. In\rprofile, you plainly perceive that horizontal, semi-crescentic\rdepression in the forehead’s middle, which, in man, is Lavater’s mark\rof genius.\r\rBut how? Genius in the Sperm Whale? Has the Sperm Whale ever written a\rbook, spoken a speech? No, his great genius is declared in his doing\rnothing particular to prove it. It is moreover declared in his\rpyramidical silence. And this reminds me that had the great Sperm Whale\rbeen known to the young Orient World, he would have been deified by\rtheir child-magian thoughts. They deified the crocodile of the Nile,\rbecause the crocodile is tongueless; and the Sperm Whale has no tongue,\ror at least it is so exceedingly small, as to be incapable of\rprotrusion. If hereafter any highly cultured, poetical nation shall\rlure back to their birth-right, the merry May-day gods of old; and\rlivingly enthrone them again in the now egotistical sky; in the now\runhaunted hill; then be sure, exalted to Jove’s high seat, the great\rSperm Whale shall lord it.\r\rChampollion deciphered the wrinkled granite hieroglyphics. But there is\rno Champollion to decipher the Egypt of every man’s and every being’s\rface. Physiognomy, like every other human science, is but a passing\rfable. If then, Sir William Jones, who read in thirty languages, could\rnot read the simplest peasant’s face in its profounder and more subtle\rmeanings, how may unlettered Ishmael hope to read the awful Chaldee of\rthe Sperm Whale’s brow? I but put that brow before you. Read it if you\rcan.\r\r\rCHAPTER 80. The Nut.\r\rIf the Sperm Whale be physiognomically a Sphinx, to the phrenologist\rhis brain seems that geometrical circle which it is impossible to\rsquare.\r\rIn the full-grown creature the skull will measure at least twenty feet\rin length. Unhinge the lower jaw, and the side view of this skull is as\rthe side of a moderately inclined plane resting throughout on a level\rbase. But in life—as we have elsewhere seen—this inclined plane is\rangularly filled up, and almost squared by the enormous superincumbent\rmass of the junk and sperm. At the high end the skull forms a crater to\rbed that part of the mass; while under the long floor of this crater—in\ranother cavity seldom exceeding ten inches in length and as many in\rdepth—reposes the mere handful of this monster’s brain. The brain is at\rleast twenty feet from his apparent forehead in life; it is hidden away\rbehind its vast outworks, like the innermost citadel within the\ramplified fortifications of Quebec. So like a choice casket is it\rsecreted in him, that I have known some whalemen who peremptorily deny\rthat the Sperm Whale has any other brain than that palpable semblance\rof one formed by the cubic-yards of his sperm magazine. Lying in\rstrange folds, courses, and convolutions, to their apprehensions, it\rseems more in keeping with the idea of his general might to regard that\rmystic part of him as the seat of his intelligence.\r\rIt is plain, then, that phrenologically the head of this Leviathan, in\rthe creature’s living intact state, is an entire delusion. As for his\rtrue brain, you can then see no indications of it, nor feel any. The\rwhale, like all things that are mighty, wears a false brow to the\rcommon world.\r\rIf you unload his skull of its spermy heaps and then take a rear view\rof its rear end, which is the high end, you will be struck by its\rresemblance to the human skull, beheld in the same situation, and from\rthe same point of view. Indeed, place this reversed skull (scaled down\rto the human magnitude) among a plate of men’s skulls, and you would\rinvoluntarily confound it with them; and remarking the depressions on\rone part of its summit, in phrenological phrase you would say—This man\rhad no self-esteem, and no veneration. And by those negations,\rconsidered along with the affirmative fact of his prodigious bulk and\rpower, you can best form to yourself the truest, though not the most\rexhilarating conception of what the most exalted potency is.\r\rBut if from the comparative dimensions of the whale’s proper brain, you\rdeem it incapable of being adequately charted, then I have another idea\rfor you. If you attentively regard almost any quadruped’s spine, you\rwill be struck with the resemblance of its vertebræ to a strung\rnecklace of dwarfed skulls, all bearing rudimental resemblance to the\rskull proper. It is a German conceit, that the vertebræ are absolutely\rundeveloped skulls. But the curious external resemblance, I take it the\rGermans were not the first men to perceive. A foreign friend once\rpointed it out to me, in the skeleton of a foe he had slain, and with\rthe vertebræ of which he was inlaying, in a sort of basso-relievo, the\rbeaked prow of his canoe. Now, I consider that the phrenologists have\romitted an important thing in not pushing their investigations from the\rcerebellum through the spinal canal. For I believe that much of a man’s\rcharacter will be found betokened in his backbone. I would rather feel\ryour spine than your skull, whoever you are. A thin joist of a spine\rnever yet upheld a full and noble soul. I rejoice in my spine, as in\rthe firm audacious staff of that flag which I fling half out to the\rworld.\r\rApply this spinal branch of phrenology to the Sperm Whale. His cranial\rcavity is continuous with the first neck-vertebra; and in that vertebra\rthe bottom of the spinal canal will measure ten inches across, being\reight in height, and of a triangular figure with the base downwards. As\rit passes through the remaining vertebræ the canal tapers in size, but\rfor a considerable distance remains of large capacity. Now, of course,\rthis canal is filled with much the same strangely fibrous substance—the\rspinal cord—as the brain; and directly communicates with the brain. And\rwhat is still more, for many feet after emerging from the brain’s\rcavity, the spinal cord remains of an undecreasing girth, almost equal\rto that of the brain. Under all these circumstances, would it be\runreasonable to survey and map out the whale’s spine phrenologically?\rFor, viewed in this light, the wonderful comparative smallness of his\rbrain proper is more than compensated by the wonderful comparative\rmagnitude of his spinal cord.\r\rBut leaving this hint to operate as it may with the phrenologists, I\rwould merely assume the spinal theory for a moment, in reference to the\rSperm Whale’s hump. This august hump, if I mistake not, rises over one\rof the larger vertebræ, and is, therefore, in some sort, the outer\rconvex mould of it. From its relative situation then, I should call\rthis high hump the organ of firmness or indomitableness in the Sperm\rWhale. And that the great monster is indomitable, you will yet have\rreason to know.\r\r\rCHAPTER 81. The Pequod Meets The Virgin.\r\rThe predestinated day arrived, and we duly met the ship Jungfrau,\rDerick De Deer, master, of Bremen.\r\rAt one time the greatest whaling people in the world, the Dutch and\rGermans are now among the least; but here and there at very wide\rintervals of latitude and longitude, you still occasionally meet with\rtheir flag in the Pacific.\r\rFor some reason, the Jungfrau seemed quite eager to pay her respects.\rWhile yet some distance from the Pequod, she rounded to, and dropping a\rboat, her captain was impelled towards us, impatiently standing in the\rbows instead of the stern.\r\r“What has he in his hand there?” cried Starbuck, pointing to something\rwavingly held by the German. “Impossible!—a lamp-feeder!”\r\r“Not that,” said Stubb, “no, no, it’s a coffee-pot, Mr. Starbuck; he’s\rcoming off to make us our coffee, is the Yarman; don’t you see that big\rtin can there alongside of him?—that’s his boiling water. Oh! he’s all\rright, is the Yarman.”\r\r“Go along with you,” cried Flask, “it’s a lamp-feeder and an oil-can.\rHe’s out of oil, and has come a-begging.”\r\rHowever curious it may seem for an oil-ship to be borrowing oil on the\rwhale-ground, and however much it may invertedly contradict the old\rproverb about carrying coals to Newcastle, yet sometimes such a thing\rreally happens; and in the present case Captain Derick De Deer did\rindubitably conduct a lamp-feeder as Flask did declare.\r\rAs he mounted the deck, Ahab abruptly accosted him, without at all\rheeding what he had in his hand; but in his broken lingo, the German\rsoon evinced his complete ignorance of the White Whale; immediately\rturning the conversation to his lamp-feeder and oil can, with some\rremarks touching his having to turn into his hammock at night in\rprofound darkness—his last drop of Bremen oil being gone, and not a\rsingle flying-fish yet captured to supply the deficiency; concluding by\rhinting that his ship was indeed what in the Fishery is technically\rcalled a _clean_ one (that is, an empty one), well deserving the name\rof Jungfrau or the Virgin.\r\rHis necessities supplied, Derick departed; but he had not gained his\rship’s side, when whales were almost simultaneously raised from the\rmast-heads of both vessels; and so eager for the chase was Derick, that\rwithout pausing to put his oil-can and lamp-feeder aboard, he slewed\rround his boat and made after the leviathan lamp-feeders.\r\rNow, the game having risen to leeward, he and the other three German\rboats that soon followed him, had considerably the start of the\rPequod’s keels. There were eight whales, an average pod. Aware of their\rdanger, they were going all abreast with great speed straight before\rthe wind, rubbing their flanks as closely as so many spans of horses in\rharness. They left a great, wide wake, as though continually unrolling\ra great wide parchment upon the sea.\r\rFull in this rapid wake, and many fathoms in the rear, swam a huge,\rhumped old bull, which by his comparatively slow progress, as well as\rby the unusual yellowish incrustations overgrowing him, seemed\rafflicted with the jaundice, or some other infirmity. Whether this\rwhale belonged to the pod in advance, seemed questionable; for it is\rnot customary for such venerable leviathans to be at all social.\rNevertheless, he stuck to their wake, though indeed their back water\rmust have retarded him, because the white-bone or swell at his broad\rmuzzle was a dashed one, like the swell formed when two hostile\rcurrents meet. His spout was short, slow, and laborious; coming forth\rwith a choking sort of gush, and spending itself in torn shreds,\rfollowed by strange subterranean commotions in him, which seemed to\rhave egress at his other buried extremity, causing the waters behind\rhim to upbubble.\r\r“Who’s got some paregoric?” said Stubb, “he has the stomach-ache, I’m\rafraid. Lord, think of having half an acre of stomach-ache! Adverse\rwinds are holding mad Christmas in him, boys. It’s the first foul wind\rI ever knew to blow from astern; but look, did ever whale yaw so\rbefore? it must be, he’s lost his tiller.”\r\rAs an overladen Indiaman bearing down the Hindostan coast with a deck\rload of frightened horses, careens, buries, rolls, and wallows on her\rway; so did this old whale heave his aged bulk, and now and then partly\rturning over on his cumbrous rib-ends, expose the cause of his devious\rwake in the unnatural stump of his starboard fin. Whether he had lost\rthat fin in battle, or had been born without it, it were hard to say.\r\r“Only wait a bit, old chap, and I’ll give ye a sling for that wounded\rarm,” cried cruel Flask, pointing to the whale-line near him.\r\r“Mind he don’t sling thee with it,” cried Starbuck. “Give way, or the\rGerman will have him.”\r\rWith one intent all the combined rival boats were pointed for this one\rfish, because not only was he the largest, and therefore the most\rvaluable whale, but he was nearest to them, and the other whales were\rgoing with such great velocity, moreover, as almost to defy pursuit for\rthe time. At this juncture the Pequod’s keels had shot by the three\rGerman boats last lowered; but from the great start he had had,\rDerick’s boat still led the chase, though every moment neared by his\rforeign rivals. The only thing they feared, was, that from being\ralready so nigh to his mark, he would be enabled to dart his iron\rbefore they could completely overtake and pass him. As for Derick, he\rseemed quite confident that this would be the case, and occasionally\rwith a deriding gesture shook his lamp-feeder at the other boats.\r\r“The ungracious and ungrateful dog!” cried Starbuck; “he mocks and\rdares me with the very poor-box I filled for him not five minutes\rago!”—then in his old intense whisper—“Give way, greyhounds! Dog to\rit!”\r\r“I tell ye what it is, men”—cried Stubb to his crew—“it’s against my\rreligion to get mad; but I’d like to eat that villainous\rYarman—Pull—won’t ye? Are ye going to let that rascal beat ye? Do ye\rlove brandy? A hogshead of brandy, then, to the best man. Come, why\rdon’t some of ye burst a blood-vessel? Who’s that been dropping an\ranchor overboard—we don’t budge an inch—we’re becalmed. Halloo, here’s\rgrass growing in the boat’s bottom—and by the Lord, the mast there’s\rbudding. This won’t do, boys. Look at that Yarman! The short and long\rof it is, men, will ye spit fire or not?”\r\r“Oh! see the suds he makes!” cried Flask, dancing up and down—“What a\rhump—Oh, _do_ pile on the beef—lays like a log! Oh! my lads, _do_\rspring—slap-jacks and quahogs for supper, you know, my lads—baked clams\rand muffins—oh, _do_, _do_, spring,—he’s a hundred barreller—don’t lose\rhim now—don’t oh, _don’t!_—see that Yarman—Oh, won’t ye pull for your\rduff, my lads—such a sog! such a sogger! Don’t ye love sperm? There\rgoes three thousand dollars, men!—a bank!—a whole bank! The bank of\rEngland!—Oh, _do_, _do_, _do!_—What’s that Yarman about now?”\r\rAt this moment Derick was in the act of pitching his lamp-feeder at the\radvancing boats, and also his oil-can; perhaps with the double view of\rretarding his rivals’ way, and at the same time economically\raccelerating his own by the momentary impetus of the backward toss.\r\r“The unmannerly Dutch dogger!” cried Stubb. “Pull now, men, like fifty\rthousand line-of-battle-ship loads of red-haired devils. What d’ye say,\rTashtego; are you the man to snap your spine in two-and-twenty pieces\rfor the honor of old Gayhead? What d’ye say?”\r\r“I say, pull like god-dam,”—cried the Indian.\r\rFiercely, but evenly incited by the taunts of the German, the Pequod’s\rthree boats now began ranging almost abreast; and, so disposed,\rmomentarily neared him. In that fine, loose, chivalrous attitude of the\rheadsman when drawing near to his prey, the three mates stood up\rproudly, occasionally backing the after oarsman with an exhilarating\rcry of, “There she slides, now! Hurrah for the white-ash breeze! Down\rwith the Yarman! Sail over him!”\r\rBut so decided an original start had Derick had, that spite of all\rtheir gallantry, he would have proved the victor in this race, had not\ra righteous judgment descended upon him in a crab which caught the\rblade of his midship oarsman. While this clumsy lubber was striving to\rfree his white-ash, and while, in consequence, Derick’s boat was nigh\rto capsizing, and he thundering away at his men in a mighty rage;—that\rwas a good time for Starbuck, Stubb, and Flask. With a shout, they took\ra mortal start forwards, and slantingly ranged up on the German’s\rquarter. An instant more, and all four boats were diagonically in the\rwhale’s immediate wake, while stretching from them, on both sides, was\rthe foaming swell that he made.\r\rIt was a terrific, most pitiable, and maddening sight. The whale was\rnow going head out, and sending his spout before him in a continual\rtormented jet; while his one poor fin beat his side in an agony of\rfright. Now to this hand, now to that, he yawed in his faltering\rflight, and still at every billow that he broke, he spasmodically sank\rin the sea, or sideways rolled towards the sky his one beating fin. So\rhave I seen a bird with clipped wing making affrighted broken circles\rin the air, vainly striving to escape the piratical hawks. But the bird\rhas a voice, and with plaintive cries will make known her fear; but the\rfear of this vast dumb brute of the sea, was chained up and enchanted\rin him; he had no voice, save that choking respiration through his\rspiracle, and this made the sight of him unspeakably pitiable; while\rstill, in his amazing bulk, portcullis jaw, and omnipotent tail, there\rwas enough to appal the stoutest man who so pitied.\r\rSeeing now that but a very few moments more would give the Pequod’s\rboats the advantage, and rather than be thus foiled of his game, Derick\rchose to hazard what to him must have seemed a most unusually long\rdart, ere the last chance would for ever escape.\r\rBut no sooner did his harpooneer stand up for the stroke, than all\rthree tigers—Queequeg, Tashtego, Daggoo—instinctively sprang to their\rfeet, and standing in a diagonal row, simultaneously pointed their\rbarbs; and darted over the head of the German harpooneer, their three\rNantucket irons entered the whale. Blinding vapors of foam and\rwhite-fire! The three boats, in the first fury of the whale’s headlong\rrush, bumped the German’s aside with such force, that both Derick and\rhis baffled harpooneer were spilled out, and sailed over by the three\rflying keels.\r\r“Don’t be afraid, my butter-boxes,” cried Stubb, casting a passing\rglance upon them as he shot by; “ye’ll be picked up presently—all\rright—I saw some sharks astern—St. Bernard’s dogs, you know—relieve\rdistressed travellers. Hurrah! this is the way to sail now. Every keel\ra sunbeam! Hurrah!—Here we go like three tin kettles at the tail of a\rmad cougar! This puts me in mind of fastening to an elephant in a\rtilbury on a plain—makes the wheel-spokes fly, boys, when you fasten to\rhim that way; and there’s danger of being pitched out too, when you\rstrike a hill. Hurrah! this is the way a fellow feels when he’s going\rto Davy Jones—all a rush down an endless inclined plane! Hurrah! this\rwhale carries the everlasting mail!”\r\rBut the monster’s run was a brief one. Giving a sudden gasp, he\rtumultuously sounded. With a grating rush, the three lines flew round\rthe loggerheads with such a force as to gouge deep grooves in them;\rwhile so fearful were the harpooneers that this rapid sounding would\rsoon exhaust the lines, that using all their dexterous might, they\rcaught repeated smoking turns with the rope to hold on; till at\rlast—owing to the perpendicular strain from the lead-lined chocks of\rthe boats, whence the three ropes went straight down into the blue—the\rgunwales of the bows were almost even with the water, while the three\rsterns tilted high in the air. And the whale soon ceasing to sound, for\rsome time they remained in that attitude, fearful of expending more\rline, though the position was a little ticklish. But though boats have\rbeen taken down and lost in this way, yet it is this “holding on,” as\rit is called; this hooking up by the sharp barbs of his live flesh from\rthe back; this it is that often torments the Leviathan into soon rising\ragain to meet the sharp lance of his foes. Yet not to speak of the\rperil of the thing, it is to be doubted whether this course is always\rthe best; for it is but reasonable to presume, that the longer the\rstricken whale stays under water, the more he is exhausted. Because,\rowing to the enormous surface of him—in a full grown sperm whale\rsomething less than 2000 square feet—the pressure of the water is\rimmense. We all know what an astonishing atmospheric weight we\rourselves stand up under; even here, above-ground, in the air; how\rvast, then, the burden of a whale, bearing on his back a column of two\rhundred fathoms of ocean! It must at least equal the weight of fifty\ratmospheres. One whaleman has estimated it at the weight of twenty\rline-of-battle ships, with all their guns, and stores, and men on\rboard.\r\rAs the three boats lay there on that gently rolling sea, gazing down\rinto its eternal blue noon; and as not a single groan or cry of any\rsort, nay, not so much as a ripple or a bubble came up from its depths;\rwhat landsman would have thought, that beneath all that silence and\rplacidity, the utmost monster of the seas was writhing and wrenching in\ragony! Not eight inches of perpendicular rope were visible at the bows.\rSeems it credible that by three such thin threads the great Leviathan\rwas suspended like the big weight to an eight day clock. Suspended? and\rto what? To three bits of board. Is this the creature of whom it was\ronce so triumphantly said—“Canst thou fill his skin with barbed irons?\ror his head with fish-spears? The sword of him that layeth at him\rcannot hold, the spear, the dart, nor the habergeon: he esteemeth iron\ras straw; the arrow cannot make him flee; darts are counted as stubble;\rhe laugheth at the shaking of a spear!” This the creature? this he? Oh!\rthat unfulfilments should follow the prophets. For with the strength of\ra thousand thighs in his tail, Leviathan had run his head under the\rmountains of the sea, to hide him from the Pequod’s fish-spears!\r\rIn that sloping afternoon sunlight, the shadows that the three boats\rsent down beneath the surface, must have been long enough and broad\renough to shade half Xerxes’ army. Who can tell how appalling to the\rwounded whale must have been such huge phantoms flitting over his head!\r\r“Stand by, men; he stirs,” cried Starbuck, as the three lines suddenly\rvibrated in the water, distinctly conducting upwards to them, as by\rmagnetic wires, the life and death throbs of the whale, so that every\roarsman felt them in his seat. The next moment, relieved in great part\rfrom the downward strain at the bows, the boats gave a sudden bounce\rupwards, as a small icefield will, when a dense herd of white bears are\rscared from it into the sea.\r\r“Haul in! Haul in!” cried Starbuck again; “he’s rising.”\r\rThe lines, of which, hardly an instant before, not one hand’s breadth\rcould have been gained, were now in long quick coils flung back all\rdripping into the boats, and soon the whale broke water within two\rship’s lengths of the hunters.\r\rHis motions plainly denoted his extreme exhaustion. In most land\ranimals there are certain valves or flood-gates in many of their veins,\rwhereby when wounded, the blood is in some degree at least instantly\rshut off in certain directions. Not so with the whale; one of whose\rpeculiarities it is to have an entire non-valvular structure of the\rblood-vessels, so that when pierced even by so small a point as a\rharpoon, a deadly drain is at once begun upon his whole arterial\rsystem; and when this is heightened by the extraordinary pressure of\rwater at a great distance below the surface, his life may be said to\rpour from him in incessant streams. Yet so vast is the quantity of\rblood in him, and so distant and numerous its interior fountains, that\rhe will keep thus bleeding and bleeding for a considerable period; even\ras in a drought a river will flow, whose source is in the well-springs\rof far-off and undiscernible hills. Even now, when the boats pulled\rupon this whale, and perilously drew over his swaying flukes, and the\rlances were darted into him, they were followed by steady jets from the\rnew made wound, which kept continually playing, while the natural\rspout-hole in his head was only at intervals, however rapid, sending\rits affrighted moisture into the air. From this last vent no blood yet\rcame, because no vital part of him had thus far been struck. His life,\ras they significantly call it, was untouched.\r\rAs the boats now more closely surrounded him, the whole upper part of\rhis form, with much of it that is ordinarily submerged, was plainly\rrevealed. His eyes, or rather the places where his eyes had been, were\rbeheld. As strange misgrown masses gather in the knot-holes of the\rnoblest oaks when prostrate, so from the points which the whale’s eyes\rhad once occupied, now protruded blind bulbs, horribly pitiable to see.\rBut pity there was none. For all his old age, and his one arm, and his\rblind eyes, he must die the death and be murdered, in order to light\rthe gay bridals and other merry-makings of men, and also to illuminate\rthe solemn churches that preach unconditional inoffensiveness by all to\rall. Still rolling in his blood, at last he partially disclosed a\rstrangely discoloured bunch or protuberance, the size of a bushel, low\rdown on the flank.\r\r“A nice spot,” cried Flask; “just let me prick him there once.”\r\r“Avast!” cried Starbuck, “there’s no need of that!”\r\rBut humane Starbuck was too late. At the instant of the dart an\rulcerous jet shot from this cruel wound, and goaded by it into more\rthan sufferable anguish, the whale now spouting thick blood, with swift\rfury blindly darted at the craft, bespattering them and their glorying\rcrews all over with showers of gore, capsizing Flask’s boat and marring\rthe bows. It was his death stroke. For, by this time, so spent was he\rby loss of blood, that he helplessly rolled away from the wreck he had\rmade; lay panting on his side, impotently flapped with his stumped fin,\rthen over and over slowly revolved like a waning world; turned up the\rwhite secrets of his belly; lay like a log, and died. It was most\rpiteous, that last expiring spout. As when by unseen hands the water is\rgradually drawn off from some mighty fountain, and with half-stifled\rmelancholy gurglings the spray-column lowers and lowers to the\rground—so the last long dying spout of the whale.\r\rSoon, while the crews were awaiting the arrival of the ship, the body\rshowed symptoms of sinking with all its treasures unrifled.\rImmediately, by Starbuck’s orders, lines were secured to it at\rdifferent points, so that ere long every boat was a buoy; the sunken\rwhale being suspended a few inches beneath them by the cords. By very\rheedful management, when the ship drew nigh, the whale was transferred\rto her side, and was strongly secured there by the stiffest\rfluke-chains, for it was plain that unless artificially upheld, the\rbody would at once sink to the bottom.\r\rIt so chanced that almost upon first cutting into him with the spade,\rthe entire length of a corroded harpoon was found imbedded in his\rflesh, on the lower part of the bunch before described. But as the\rstumps of harpoons are frequently found in the dead bodies of captured\rwhales, with the flesh perfectly healed around them, and no prominence\rof any kind to denote their place; therefore, there must needs have\rbeen some other unknown reason in the present case fully to account for\rthe ulceration alluded to. But still more curious was the fact of a\rlance-head of stone being found in him, not far from the buried iron,\rthe flesh perfectly firm about it. Who had darted that stone lance? And\rwhen? It might have been darted by some Nor’ West Indian long before\rAmerica was discovered.\r\rWhat other marvels might have been rummaged out of this monstrous\rcabinet there is no telling. But a sudden stop was put to further\rdiscoveries, by the ship’s being unprecedentedly dragged over sideways\rto the sea, owing to the body’s immensely increasing tendency to sink.\rHowever, Starbuck, who had the ordering of affairs, hung on to it to\rthe last; hung on to it so resolutely, indeed, that when at length the\rship would have been capsized, if still persisting in locking arms with\rthe body; then, when the command was given to break clear from it, such\rwas the immovable strain upon the timber-heads to which the\rfluke-chains and cables were fastened, that it was impossible to cast\rthem off. Meantime everything in the Pequod was aslant. To cross to the\rother side of the deck was like walking up the steep gabled roof of a\rhouse. The ship groaned and gasped. Many of the ivory inlayings of her\rbulwarks and cabins were started from their places, by the unnatural\rdislocation. In vain handspikes and crows were brought to bear upon the\rimmovable fluke-chains, to pry them adrift from the timberheads; and so\rlow had the whale now settled that the submerged ends could not be at\rall approached, while every moment whole tons of ponderosity seemed\radded to the sinking bulk, and the ship seemed on the point of going\rover.\r\r“Hold on, hold on, won’t ye?” cried Stubb to the body, “don’t be in\rsuch a devil of a hurry to sink! By thunder, men, we must do something\ror go for it. No use prying there; avast, I say with your handspikes,\rand run one of ye for a prayer book and a pen-knife, and cut the big\rchains.”\r\r“Knife? Aye, aye,” cried Queequeg, and seizing the carpenter’s heavy\rhatchet, he leaned out of a porthole, and steel to iron, began slashing\rat the largest fluke-chains. But a few strokes, full of sparks, were\rgiven, when the exceeding strain effected the rest. With a terrific\rsnap, every fastening went adrift; the ship righted, the carcase sank.\r\rNow, this occasional inevitable sinking of the recently killed Sperm\rWhale is a very curious thing; nor has any fisherman yet adequately\raccounted for it. Usually the dead Sperm Whale floats with great\rbuoyancy, with its side or belly considerably elevated above the\rsurface. If the only whales that thus sank were old, meagre, and\rbroken-hearted creatures, their pads of lard diminished and all their\rbones heavy and rheumatic; then you might with some reason assert that\rthis sinking is caused by an uncommon specific gravity in the fish so\rsinking, consequent upon this absence of buoyant matter in him. But it\ris not so. For young whales, in the highest health, and swelling with\rnoble aspirations, prematurely cut off in the warm flush and May of\rlife, with all their panting lard about them; even these brawny,\rbuoyant heroes do sometimes sink.\r\rBe it said, however, that the Sperm Whale is far less liable to this\raccident than any other species. Where one of that sort go down, twenty\rRight Whales do. This difference in the species is no doubt imputable\rin no small degree to the greater quantity of bone in the Right Whale;\rhis Venetian blinds alone sometimes weighing more than a ton; from this\rincumbrance the Sperm Whale is wholly free. But there are instances\rwhere, after the lapse of many hours or several days, the sunken whale\ragain rises, more buoyant than in life. But the reason of this is\robvious. Gases are generated in him; he swells to a prodigious\rmagnitude; becomes a sort of animal balloon. A line-of-battle ship\rcould hardly keep him under then. In the Shore Whaling, on soundings,\ramong the Bays of New Zealand, when a Right Whale gives token of\rsinking, they fasten buoys to him, with plenty of rope; so that when\rthe body has gone down, they know where to look for it when it shall\rhave ascended again.\r\rIt was not long after the sinking of the body that a cry was heard from\rthe Pequod’s mast-heads, announcing that the Jungfrau was again\rlowering her boats; though the only spout in sight was that of a\rFin-Back, belonging to the species of uncapturable whales, because of\rits incredible power of swimming. Nevertheless, the Fin-Back’s spout is\rso similar to the Sperm Whale’s, that by unskilful fishermen it is\roften mistaken for it. And consequently Derick and all his host were\rnow in valiant chase of this unnearable brute. The Virgin crowding all\rsail, made after her four young keels, and thus they all disappeared\rfar to leeward, still in bold, hopeful chase.\r\rOh! many are the Fin-Backs, and many are the Dericks, my friend.\r\r\rCHAPTER 82. The Honor and Glory of Whaling.\r\rThere are some enterprises in which a careful disorderliness is the\rtrue method.\r\rThe more I dive into this matter of whaling, and push my researches up\rto the very spring-head of it so much the more am I impressed with its\rgreat honorableness and antiquity; and especially when I find so many\rgreat demi-gods and heroes, prophets of all sorts, who one way or other\rhave shed distinction upon it, I am transported with the reflection\rthat I myself belong, though but subordinately, to so emblazoned a\rfraternity.\r\rThe gallant Perseus, a son of Jupiter, was the first whaleman; and to\rthe eternal honor of our calling be it said, that the first whale\rattacked by our brotherhood was not killed with any sordid intent.\rThose were the knightly days of our profession, when we only bore arms\rto succor the distressed, and not to fill men’s lamp-feeders. Every one\rknows the fine story of Perseus and Andromeda; how the lovely\rAndromeda, the daughter of a king, was tied to a rock on the sea-coast,\rand as Leviathan was in the very act of carrying her off, Perseus, the\rprince of whalemen, intrepidly advancing, harpooned the monster, and\rdelivered and married the maid. It was an admirable artistic exploit,\rrarely achieved by the best harpooneers of the present day; inasmuch as\rthis Leviathan was slain at the very first dart. And let no man doubt\rthis Arkite story; for in the ancient Joppa, now Jaffa, on the Syrian\rcoast, in one of the Pagan temples, there stood for many ages the vast\rskeleton of a whale, which the city’s legends and all the inhabitants\rasserted to be the identical bones of the monster that Perseus slew.\rWhen the Romans took Joppa, the same skeleton was carried to Italy in\rtriumph. What seems most singular and suggestively important in this\rstory, is this: it was from Joppa that Jonah set sail.\r\rAkin to the adventure of Perseus and Andromeda—indeed, by some supposed\rto be indirectly derived from it—is that famous story of St. George and\rthe Dragon; which dragon I maintain to have been a whale; for in many\rold chronicles whales and dragons are strangely jumbled together, and\roften stand for each other. “Thou art as a lion of the waters, and as a\rdragon of the sea,” saith Ezekiel; hereby, plainly meaning a whale; in\rtruth, some versions of the Bible use that word itself. Besides, it\rwould much subtract from the glory of the exploit had St. George but\rencountered a crawling reptile of the land, instead of doing battle\rwith the great monster of the deep. Any man may kill a snake, but only\ra Perseus, a St. George, a Coffin, have the heart in them to march\rboldly up to a whale.\r\rLet not the modern paintings of this scene mislead us; for though the\rcreature encountered by that valiant whaleman of old is vaguely\rrepresented of a griffin-like shape, and though the battle is depicted\ron land and the saint on horseback, yet considering the great ignorance\rof those times, when the true form of the whale was unknown to artists;\rand considering that as in Perseus’ case, St. George’s whale might have\rcrawled up out of the sea on the beach; and considering that the animal\rridden by St. George might have been only a large seal, or sea-horse;\rbearing all this in mind, it will not appear altogether incompatible\rwith the sacred legend and the ancientest draughts of the scene, to\rhold this so-called dragon no other than the great Leviathan himself.\rIn fact, placed before the strict and piercing truth, this whole story\rwill fare like that fish, flesh, and fowl idol of the Philistines,\rDagon by name; who being planted before the ark of Israel, his horse’s\rhead and both the palms of his hands fell off from him, and only the\rstump or fishy part of him remained. Thus, then, one of our own noble\rstamp, even a whaleman, is the tutelary guardian of England; and by\rgood rights, we harpooneers of Nantucket should be enrolled in the most\rnoble order of St. George. And therefore, let not the knights of that\rhonorable company (none of whom, I venture to say, have ever had to do\rwith a whale like their great patron), let them never eye a Nantucketer\rwith disdain, since even in our woollen frocks and tarred trowsers we\rare much better entitled to St. George’s decoration than they.\r\rWhether to admit Hercules among us or not, concerning this I long\rremained dubious: for though according to the Greek mythologies, that\rantique Crockett and Kit Carson—that brawny doer of rejoicing good\rdeeds, was swallowed down and thrown up by a whale; still, whether that\rstrictly makes a whaleman of him, that might be mooted. It nowhere\rappears that he ever actually harpooned his fish, unless, indeed, from\rthe inside. Nevertheless, he may be deemed a sort of involuntary\rwhaleman; at any rate the whale caught him, if he did not the whale. I\rclaim him for one of our clan.\r\rBut, by the best contradictory authorities, this Grecian story of\rHercules and the whale is considered to be derived from the still more\rancient Hebrew story of Jonah and the whale; and vice versâ; certainly\rthey are very similar. If I claim the demi-god then, why not the\rprophet?\r\rNor do heroes, saints, demigods, and prophets alone comprise the whole\rroll of our order. Our grand master is still to be named; for like\rroyal kings of old times, we find the head waters of our fraternity in\rnothing short of the great gods themselves. That wondrous oriental\rstory is now to be rehearsed from the Shaster, which gives us the dread\rVishnoo, one of the three persons in the godhead of the Hindoos; gives\rus this divine Vishnoo himself for our Lord;—Vishnoo, who, by the first\rof his ten earthly incarnations, has for ever set apart and sanctified\rthe whale. When Brahma, or the God of Gods, saith the Shaster, resolved\rto recreate the world after one of its periodical dissolutions, he gave\rbirth to Vishnoo, to preside over the work; but the Vedas, or mystical\rbooks, whose perusal would seem to have been indispensable to Vishnoo\rbefore beginning the creation, and which therefore must have contained\rsomething in the shape of practical hints to young architects, these\rVedas were lying at the bottom of the waters; so Vishnoo became\rincarnate in a whale, and sounding down in him to the uttermost depths,\rrescued the sacred volumes. Was not this Vishnoo a whaleman, then? even\ras a man who rides a horse is called a horseman?\r\rPerseus, St. George, Hercules, Jonah, and Vishnoo! there’s a\rmember-roll for you! What club but the whaleman’s can head off like\rthat?\r\r\rCHAPTER 83. Jonah Historically Regarded.\r\rReference was made to the historical story of Jonah and the whale in\rthe preceding chapter. Now some Nantucketers rather distrust this\rhistorical story of Jonah and the whale. But then there were some\rsceptical Greeks and Romans, who, standing out from the orthodox pagans\rof their times, equally doubted the story of Hercules and the whale,\rand Arion and the dolphin; and yet their doubting those traditions did\rnot make those traditions one whit the less facts, for all that.\r\rOne old Sag-Harbor whaleman’s chief reason for questioning the Hebrew\rstory was this:—He had one of those quaint old-fashioned Bibles,\rembellished with curious, unscientific plates; one of which represented\rJonah’s whale with two spouts in his head—a peculiarity only true with\rrespect to a species of the Leviathan (the Right Whale, and the\rvarieties of that order), concerning which the fishermen have this\rsaying, “A penny roll would choke him”; his swallow is so very small.\rBut, to this, Bishop Jebb’s anticipative answer is ready. It is not\rnecessary, hints the Bishop, that we consider Jonah as tombed in the\rwhale’s belly, but as temporarily lodged in some part of his mouth. And\rthis seems reasonable enough in the good Bishop. For truly, the Right\rWhale’s mouth would accommodate a couple of whist-tables, and\rcomfortably seat all the players. Possibly, too, Jonah might have\rensconced himself in a hollow tooth; but, on second thoughts, the Right\rWhale is toothless.\r\rAnother reason which Sag-Harbor (he went by that name) urged for his\rwant of faith in this matter of the prophet, was something obscurely in\rreference to his incarcerated body and the whale’s gastric juices. But\rthis objection likewise falls to the ground, because a German exegetist\rsupposes that Jonah must have taken refuge in the floating body of a\r_dead_ whale—even as the French soldiers in the Russian campaign turned\rtheir dead horses into tents, and crawled into them. Besides, it has\rbeen divined by other continental commentators, that when Jonah was\rthrown overboard from the Joppa ship, he straightway effected his\rescape to another vessel near by, some vessel with a whale for a\rfigure-head; and, I would add, possibly called “The Whale,” as some\rcraft are nowadays christened the “Shark,” the “Gull,” the “Eagle.” Nor\rhave there been wanting learned exegetists who have opined that the\rwhale mentioned in the book of Jonah merely meant a life-preserver—an\rinflated bag of wind—which the endangered prophet swam to, and so was\rsaved from a watery doom. Poor Sag-Harbor, therefore, seems worsted all\rround. But he had still another reason for his want of faith. It was\rthis, if I remember right: Jonah was swallowed by the whale in the\rMediterranean Sea, and after three days he was vomited up somewhere\rwithin three days’ journey of Nineveh, a city on the Tigris, very much\rmore than three days’ journey across from the nearest point of the\rMediterranean coast. How is that?\r\rBut was there no other way for the whale to land the prophet within\rthat short distance of Nineveh? Yes. He might have carried him round by\rthe way of the Cape of Good Hope. But not to speak of the passage\rthrough the whole length of the Mediterranean, and another passage up\rthe Persian Gulf and Red Sea, such a supposition would involve the\rcomplete circumnavigation of all Africa in three days, not to speak of\rthe Tigris waters, near the site of Nineveh, being too shallow for any\rwhale to swim in. Besides, this idea of Jonah’s weathering the Cape of\rGood Hope at so early a day would wrest the honor of the discovery of\rthat great headland from Bartholomew Diaz, its reputed discoverer, and\rso make modern history a liar.\r\rBut all these foolish arguments of old Sag-Harbor only evinced his\rfoolish pride of reason—a thing still more reprehensible in him, seeing\rthat he had but little learning except what he had picked up from the\rsun and the sea. I say it only shows his foolish, impious pride, and\rabominable, devilish rebellion against the reverend clergy. For by a\rPortuguese Catholic priest, this very idea of Jonah’s going to Nineveh\rvia the Cape of Good Hope was advanced as a signal magnification of the\rgeneral miracle. And so it was. Besides, to this day, the highly\renlightened Turks devoutly believe in the historical story of Jonah.\rAnd some three centuries ago, an English traveller in old Harris’s\rVoyages, speaks of a Turkish Mosque built in honor of Jonah, in which\rMosque was a miraculous lamp that burnt without any oil.\r\r\rCHAPTER 84. Pitchpoling.\r\rTo make them run easily and swiftly, the axles of carriages are\ranointed; and for much the same purpose, some whalers perform an\ranalogous operation upon their boat; they grease the bottom. Nor is it\rto be doubted that as such a procedure can do no harm, it may possibly\rbe of no contemptible advantage; considering that oil and water are\rhostile; that oil is a sliding thing, and that the object in view is to\rmake the boat slide bravely. Queequeg believed strongly in anointing\rhis boat, and one morning not long after the German ship Jungfrau\rdisappeared, took more than customary pains in that occupation;\rcrawling under its bottom, where it hung over the side, and rubbing in\rthe unctuousness as though diligently seeking to insure a crop of hair\rfrom the craft’s bald keel. He seemed to be working in obedience to\rsome particular presentiment. Nor did it remain unwarranted by the\revent.\r\rTowards noon whales were raised; but so soon as the ship sailed down to\rthem, they turned and fled with swift precipitancy; a disordered\rflight, as of Cleopatra’s barges from Actium.\r\rNevertheless, the boats pursued, and Stubb’s was foremost. By great\rexertion, Tashtego at last succeeded in planting one iron; but the\rstricken whale, without at all sounding, still continued his horizontal\rflight, with added fleetness. Such unintermitted strainings upon the\rplanted iron must sooner or later inevitably extract it. It became\rimperative to lance the flying whale, or be content to lose him. But to\rhaul the boat up to his flank was impossible, he swam so fast and\rfurious. What then remained?\r\rOf all the wondrous devices and dexterities, the sleights of hand and\rcountless subtleties, to which the veteran whaleman is so often forced,\rnone exceed that fine manœuvre with the lance called pitchpoling. Small\rsword, or broad sword, in all its exercises boasts nothing like it. It\ris only indispensable with an inveterate running whale; its grand fact\rand feature is the wonderful distance to which the long lance is\raccurately darted from a violently rocking, jerking boat, under extreme\rheadway. Steel and wood included, the entire spear is some ten or\rtwelve feet in length; the staff is much slighter than that of the\rharpoon, and also of a lighter material—pine. It is furnished with a\rsmall rope called a warp, of considerable length, by which it can be\rhauled back to the hand after darting.\r\rBut before going further, it is important to mention here, that though\rthe harpoon may be pitchpoled in the same way with the lance, yet it is\rseldom done; and when done, is still less frequently successful, on\raccount of the greater weight and inferior length of the harpoon as\rcompared with the lance, which in effect become serious drawbacks. As a\rgeneral thing, therefore, you must first get fast to a whale, before\rany pitchpoling comes into play.\r\rLook now at Stubb; a man who from his humorous, deliberate coolness and\requanimity in the direst emergencies, was specially qualified to excel\rin pitchpoling. Look at him; he stands upright in the tossed bow of the\rflying boat; wrapt in fleecy foam, the towing whale is forty feet\rahead. Handling the long lance lightly, glancing twice or thrice along\rits length to see if it be exactly straight, Stubb whistlingly gathers\rup the coil of the warp in one hand, so as to secure its free end in\rhis grasp, leaving the rest unobstructed. Then holding the lance full\rbefore his waistband’s middle, he levels it at the whale; when,\rcovering him with it, he steadily depresses the butt-end in his hand,\rthereby elevating the point till the weapon stands fairly balanced upon\rhis palm, fifteen feet in the air. He minds you somewhat of a juggler,\rbalancing a long staff on his chin. Next moment with a rapid, nameless\rimpulse, in a superb lofty arch the bright steel spans the foaming\rdistance, and quivers in the life spot of the whale. Instead of\rsparkling water, he now spouts red blood.\r\r“That drove the spigot out of him!” cried Stubb. “’Tis July’s immortal\rFourth; all fountains must run wine today! Would now, it were old\rOrleans whiskey, or old Ohio, or unspeakable old Monongahela! Then,\rTashtego, lad, I’d have ye hold a canakin to the jet, and we’d drink\rround it! Yea, verily, hearts alive, we’d brew choice punch in the\rspread of his spout-hole there, and from that live punch-bowl quaff the\rliving stuff.”\r\rAgain and again to such gamesome talk, the dexterous dart is repeated,\rthe spear returning to its master like a greyhound held in skilful\rleash. The agonized whale goes into his flurry; the tow-line is\rslackened, and the pitchpoler dropping astern, folds his hands, and\rmutely watches the monster die.\r\r\rCHAPTER 85. The Fountain.\r\rThat for six thousand years—and no one knows how many millions of ages\rbefore—the great whales should have been spouting all over the sea, and\rsprinkling and mistifying the gardens of the deep, as with so many\rsprinkling or mistifying pots; and that for some centuries back,\rthousands of hunters should have been close by the fountain of the\rwhale, watching these sprinklings and spoutings—that all this should\rbe, and yet, that down to this blessed minute (fifteen and a quarter\rminutes past one o’clock P.M. of this sixteenth day of December, A.D.\r1851), it should still remain a problem, whether these spoutings are,\rafter all, really water, or nothing but vapor—this is surely a\rnoteworthy thing.\r\rLet us, then, look at this matter, along with some interesting items\rcontingent. Every one knows that by the peculiar cunning of their\rgills, the finny tribes in general breathe the air which at all times\ris combined with the element in which they swim; hence, a herring or a\rcod might live a century, and never once raise its head above the\rsurface. But owing to his marked internal structure which gives him\rregular lungs, like a human being’s, the whale can only live by\rinhaling the disengaged air in the open atmosphere. Wherefore the\rnecessity for his periodical visits to the upper world. But he cannot\rin any degree breathe through his mouth, for, in his ordinary attitude,\rthe Sperm Whale’s mouth is buried at least eight feet beneath the\rsurface; and what is still more, his windpipe has no connexion with his\rmouth. No, he breathes through his spiracle alone; and this is on the\rtop of his head.\r\rIf I say, that in any creature breathing is only a function\rindispensable to vitality, inasmuch as it withdraws from the air a\rcertain element, which being subsequently brought into contact with the\rblood imparts to the blood its vivifying principle, I do not think I\rshall err; though I may possibly use some superfluous scientific words.\rAssume it, and it follows that if all the blood in a man could be\raerated with one breath, he might then seal up his nostrils and not\rfetch another for a considerable time. That is to say, he would then\rlive without breathing. Anomalous as it may seem, this is precisely the\rcase with the whale, who systematically lives, by intervals, his full\rhour and more (when at the bottom) without drawing a single breath, or\rso much as in any way inhaling a particle of air; for, remember, he has\rno gills. How is this? Between his ribs and on each side of his spine\rhe is supplied with a remarkable involved Cretan labyrinth of\rvermicelli-like vessels, which vessels, when he quits the surface, are\rcompletely distended with oxygenated blood. So that for an hour or\rmore, a thousand fathoms in the sea, he carries a surplus stock of\rvitality in him, just as the camel crossing the waterless desert\rcarries a surplus supply of drink for future use in its four\rsupplementary stomachs. The anatomical fact of this labyrinth is\rindisputable; and that the supposition founded upon it is reasonable\rand true, seems the more cogent to me, when I consider the otherwise\rinexplicable obstinacy of that leviathan in _having his spoutings out_,\ras the fishermen phrase it. This is what I mean. If unmolested, upon\rrising to the surface, the Sperm Whale will continue there for a period\rof time exactly uniform with all his other unmolested risings. Say he\rstays eleven minutes, and jets seventy times, that is, respires seventy\rbreaths; then whenever he rises again, he will be sure to have his\rseventy breaths over again, to a minute. Now, if after he fetches a few\rbreaths you alarm him, so that he sounds, he will be always dodging up\ragain to make good his regular allowance of air. And not till those\rseventy breaths are told, will he finally go down to stay out his full\rterm below. Remark, however, that in different individuals these rates\rare different; but in any one they are alike. Now, why should the whale\rthus insist upon having his spoutings out, unless it be to replenish\rhis reservoir of air, ere descending for good? How obvious is it, too,\rthat this necessity for the whale’s rising exposes him to all the fatal\rhazards of the chase. For not by hook or by net could this vast\rleviathan be caught, when sailing a thousand fathoms beneath the\rsunlight. Not so much thy skill, then, O hunter, as the great\rnecessities that strike the victory to thee!\r\rIn man, breathing is incessantly going on—one breath only serving for\rtwo or three pulsations; so that whatever other business he has to\rattend to, waking or sleeping, breathe he must, or die he will. But the\rSperm Whale only breathes about one seventh or Sunday of his time.\r\rIt has been said that the whale only breathes through his spout-hole;\rif it could truthfully be added that his spouts are mixed with water,\rthen I opine we should be furnished with the reason why his sense of\rsmell seems obliterated in him; for the only thing about him that at\rall answers to his nose is that identical spout-hole; and being so\rclogged with two elements, it could not be expected to have the power\rof smelling. But owing to the mystery of the spout—whether it be water\ror whether it be vapor—no absolute certainty can as yet be arrived at\ron this head. Sure it is, nevertheless, that the Sperm Whale has no\rproper olfactories. But what does he want of them? No roses, no\rviolets, no Cologne-water in the sea.\r\rFurthermore, as his windpipe solely opens into the tube of his spouting\rcanal, and as that long canal—like the grand Erie Canal—is furnished\rwith a sort of locks (that open and shut) for the downward retention of\rair or the upward exclusion of water, therefore the whale has no voice;\runless you insult him by saying, that when he so strangely rumbles, he\rtalks through his nose. But then again, what has the whale to say?\rSeldom have I known any profound being that had anything to say to this\rworld, unless forced to stammer out something by way of getting a\rliving. Oh! happy that the world is such an excellent listener!\r\rNow, the spouting canal of the Sperm Whale, chiefly intended as it is\rfor the conveyance of air, and for several feet laid along,\rhorizontally, just beneath the upper surface of his head, and a little\rto one side; this curious canal is very much like a gas-pipe laid down\rin a city on one side of a street. But the question returns whether\rthis gas-pipe is also a water-pipe; in other words, whether the spout\rof the Sperm Whale is the mere vapor of the exhaled breath, or whether\rthat exhaled breath is mixed with water taken in at the mouth, and\rdischarged through the spiracle. It is certain that the mouth\rindirectly communicates with the spouting canal; but it cannot be\rproved that this is for the purpose of discharging water through the\rspiracle. Because the greatest necessity for so doing would seem to be,\rwhen in feeding he accidentally takes in water. But the Sperm Whale’s\rfood is far beneath the surface, and there he cannot spout even if he\rwould. Besides, if you regard him very closely, and time him with your\rwatch, you will find that when unmolested, there is an undeviating\rrhyme between the periods of his jets and the ordinary periods of\rrespiration.\r\rBut why pester one with all this reasoning on the subject? Speak out!\rYou have seen him spout; then declare what the spout is; can you not\rtell water from air? My dear sir, in this world it is not so easy to\rsettle these plain things. I have ever found your plain things the\rknottiest of all. And as for this whale spout, you might almost stand\rin it, and yet be undecided as to what it is precisely.\r\rThe central body of it is hidden in the snowy sparkling mist enveloping\rit; and how can you certainly tell whether any water falls from it,\rwhen, always, when you are close enough to a whale to get a close view\rof his spout, he is in a prodigious commotion, the water cascading all\raround him. And if at such times you should think that you really\rperceived drops of moisture in the spout, how do you know that they are\rnot merely condensed from its vapor; or how do you know that they are\rnot those identical drops superficially lodged in the spout-hole\rfissure, which is countersunk into the summit of the whale’s head? For\reven when tranquilly swimming through the mid-day sea in a calm, with\rhis elevated hump sun-dried as a dromedary’s in the desert; even then,\rthe whale always carries a small basin of water on his head, as under a\rblazing sun you will sometimes see a cavity in a rock filled up with\rrain.\r\rNor is it at all prudent for the hunter to be over curious touching the\rprecise nature of the whale spout. It will not do for him to be peering\rinto it, and putting his face in it. You cannot go with your pitcher to\rthis fountain and fill it, and bring it away. For even when coming into\rslight contact with the outer, vapory shreds of the jet, which will\roften happen, your skin will feverishly smart, from the acridness of\rthe thing so touching it. And I know one, who coming into still closer\rcontact with the spout, whether with some scientific object in view, or\rotherwise, I cannot say, the skin peeled off from his cheek and arm.\rWherefore, among whalemen, the spout is deemed poisonous; they try to\revade it. Another thing; I have heard it said, and I do not much doubt\rit, that if the jet is fairly spouted into your eyes, it will blind\ryou. The wisest thing the investigator can do then, it seems to me, is\rto let this deadly spout alone.\r\rStill, we can hypothesize, even if we cannot prove and establish. My\rhypothesis is this: that the spout is nothing but mist. And besides\rother reasons, to this conclusion I am impelled, by considerations\rtouching the great inherent dignity and sublimity of the Sperm Whale; I\raccount him no common, shallow being, inasmuch as it is an undisputed\rfact that he is never found on soundings, or near shores; all other\rwhales sometimes are. He is both ponderous and profound. And I am\rconvinced that from the heads of all ponderous profound beings, such as\rPlato, Pyrrho, the Devil, Jupiter, Dante, and so on, there always goes\rup a certain semi-visible steam, while in the act of thinking deep\rthoughts. While composing a little treatise on Eternity, I had the\rcuriosity to place a mirror before me; and ere long saw reflected\rthere, a curious involved worming and undulation in the atmosphere over\rmy head. The invariable moisture of my hair, while plunged in deep\rthought, after six cups of hot tea in my thin shingled attic, of an\rAugust noon; this seems an additional argument for the above\rsupposition.\r\rAnd how nobly it raises our conceit of the mighty, misty monster, to\rbehold him solemnly sailing through a calm tropical sea; his vast, mild\rhead overhung by a canopy of vapor, engendered by his incommunicable\rcontemplations, and that vapor—as you will sometimes see it—glorified\rby a rainbow, as if Heaven itself had put its seal upon his thoughts.\rFor, d’ye see, rainbows do not visit the clear air; they only irradiate\rvapor. And so, through all the thick mists of the dim doubts in my\rmind, divine intuitions now and then shoot, enkindling my fog with a\rheavenly ray. And for this I thank God; for all have doubts; many deny;\rbut doubts or denials, few along with them, have intuitions. Doubts of\rall things earthly, and intuitions of some things heavenly; this\rcombination makes neither believer nor infidel, but makes a man who\rregards them both with equal eye.\r\r\rCHAPTER 86. The Tail.\r\rOther poets have warbled the praises of the soft eye of the antelope,\rand the lovely plumage of the bird that never alights; less celestial,\rI celebrate a tail.\r\rReckoning the largest sized Sperm Whale’s tail to begin at that point\rof the trunk where it tapers to about the girth of a man, it comprises\rupon its upper surface alone, an area of at least fifty square feet.\rThe compact round body of its root expands into two broad, firm, flat\rpalms or flukes, gradually shoaling away to less than an inch in\rthickness. At the crotch or junction, these flukes slightly overlap,\rthen sideways recede from each other like wings, leaving a wide vacancy\rbetween. In no living thing are the lines of beauty more exquisitely\rdefined than in the crescentic borders of these flukes. At its utmost\rexpansion in the full grown whale, the tail will considerably exceed\rtwenty feet across.\r\rThe entire member seems a dense webbed bed of welded sinews; but cut\rinto it, and you find that three distinct strata compose it:—upper,\rmiddle, and lower. The fibres in the upper and lower layers, are long\rand horizontal; those of the middle one, very short, and running\rcrosswise between the outside layers. This triune structure, as much as\ranything else, imparts power to the tail. To the student of old Roman\rwalls, the middle layer will furnish a curious parallel to the thin\rcourse of tiles always alternating with the stone in those wonderful\rrelics of the antique, and which undoubtedly contribute so much to the\rgreat strength of the masonry.\r\rBut as if this vast local power in the tendinous tail were not enough,\rthe whole bulk of the leviathan is knit over with a warp and woof of\rmuscular fibres and filaments, which passing on either side the loins\rand running down into the flukes, insensibly blend with them, and\rlargely contribute to their might; so that in the tail the confluent\rmeasureless force of the whole whale seems concentrated to a point.\rCould annihilation occur to matter, this were the thing to do it.\r\rNor does this—its amazing strength, at all tend to cripple the graceful\rflexion of its motions; where infantileness of ease undulates through a\rTitanism of power. On the contrary, those motions derive their most\rappalling beauty from it. Real strength never impairs beauty or\rharmony, but it often bestows it; and in everything imposingly\rbeautiful, strength has much to do with the magic. Take away the tied\rtendons that all over seem bursting from the marble in the carved\rHercules, and its charm would be gone. As devout Eckerman lifted the\rlinen sheet from the naked corpse of Goethe, he was overwhelmed with\rthe massive chest of the man, that seemed as a Roman triumphal arch.\rWhen Angelo paints even God the Father in human form, mark what\rrobustness is there. And whatever they may reveal of the divine love in\rthe Son, the soft, curled, hermaphroditical Italian pictures, in which\rhis idea has been most successfully embodied; these pictures, so\rdestitute as they are of all brawniness, hint nothing of any power, but\rthe mere negative, feminine one of submission and endurance, which on\rall hands it is conceded, form the peculiar practical virtues of his\rteachings.\r\rSuch is the subtle elasticity of the organ I treat of, that whether\rwielded in sport, or in earnest, or in anger, whatever be the mood it\rbe in, its flexions are invariably marked by exceeding grace. Therein\rno fairy’s arm can transcend it.\r\rFive great motions are peculiar to it. First, when used as a fin for\rprogression; Second, when used as a mace in battle; Third, in sweeping;\rFourth, in lobtailing; Fifth, in peaking flukes.\r\rFirst: Being horizontal in its position, the Leviathan’s tail acts in a\rdifferent manner from the tails of all other sea creatures. It never\rwriggles. In man or fish, wriggling is a sign of inferiority. To the\rwhale, his tail is the sole means of propulsion. Scroll-wise coiled\rforwards beneath the body, and then rapidly sprung backwards, it is\rthis which gives that singular darting, leaping motion to the monster\rwhen furiously swimming. His side-fins only serve to steer by.\r\rSecond: It is a little significant, that while one sperm whale only\rfights another sperm whale with his head and jaw, nevertheless, in his\rconflicts with man, he chiefly and contemptuously uses his tail. In\rstriking at a boat, he swiftly curves away his flukes from it, and the\rblow is only inflicted by the recoil. If it be made in the unobstructed\rair, especially if it descend to its mark, the stroke is then simply\rirresistible. No ribs of man or boat can withstand it. Your only\rsalvation lies in eluding it; but if it comes sideways through the\ropposing water, then partly owing to the light buoyancy of the\rwhale-boat, and the elasticity of its materials, a cracked rib or a\rdashed plank or two, a sort of stitch in the side, is generally the\rmost serious result. These submerged side blows are so often received\rin the fishery, that they are accounted mere child’s play. Some one\rstrips off a frock, and the hole is stopped.\r\rThird: I cannot demonstrate it, but it seems to me, that in the whale\rthe sense of touch is concentrated in the tail; for in this respect\rthere is a delicacy in it only equalled by the daintiness of the\relephant’s trunk. This delicacy is chiefly evinced in the action of\rsweeping, when in maidenly gentleness the whale with a certain soft\rslowness moves his immense flukes from side to side upon the surface of\rthe sea; and if he feel but a sailor’s whisker, woe to that sailor,\rwhiskers and all. What tenderness there is in that preliminary touch!\rHad this tail any prehensile power, I should straightway bethink me of\rDarmonodes’ elephant that so frequented the flower-market, and with low\rsalutations presented nosegays to damsels, and then caressed their\rzones. On more accounts than one, a pity it is that the whale does not\rpossess this prehensile virtue in his tail; for I have heard of yet\ranother elephant, that when wounded in the fight, curved round his\rtrunk and extracted the dart.\r\rFourth: Stealing unawares upon the whale in the fancied security of the\rmiddle of solitary seas, you find him unbent from the vast corpulence\rof his dignity, and kitten-like, he plays on the ocean as if it were a\rhearth. But still you see his power in his play. The broad palms of his\rtail are flirted high into the air; then smiting the surface, the\rthunderous concussion resounds for miles. You would almost think a\rgreat gun had been discharged; and if you noticed the light wreath of\rvapor from the spiracle at his other extremity, you would think that\rthat was the smoke from the touch-hole.\r\rFifth: As in the ordinary floating posture of the leviathan the flukes\rlie considerably below the level of his back, they are then completely\rout of sight beneath the surface; but when he is about to plunge into\rthe deeps, his entire flukes with at least thirty feet of his body are\rtossed erect in the air, and so remain vibrating a moment, till they\rdownwards shoot out of view. Excepting the sublime _breach_—somewhere\relse to be described—this peaking of the whale’s flukes is perhaps the\rgrandest sight to be seen in all animated nature. Out of the bottomless\rprofundities the gigantic tail seems spasmodically snatching at the\rhighest heaven. So in dreams, have I seen majestic Satan thrusting\rforth his tormented colossal claw from the flame Baltic of Hell. But in\rgazing at such scenes, it is all in all what mood you are in; if in the\rDantean, the devils will occur to you; if in that of Isaiah, the\rarchangels. Standing at the mast-head of my ship during a sunrise that\rcrimsoned sky and sea, I once saw a large herd of whales in the east,\rall heading towards the sun, and for a moment vibrating in concert with\rpeaked flukes. As it seemed to me at the time, such a grand embodiment\rof adoration of the gods was never beheld, even in Persia, the home of\rthe fire worshippers. As Ptolemy Philopater testified of the African\relephant, I then testified of the whale, pronouncing him the most\rdevout of all beings. For according to King Juba, the military\relephants of antiquity often hailed the morning with their trunks\ruplifted in the profoundest silence.\r\rThe chance comparison in this chapter, between the whale and the\relephant, so far as some aspects of the tail of the one and the trunk\rof the other are concerned, should not tend to place those two opposite\rorgans on an equality, much less the creatures to which they\rrespectively belong. For as the mightiest elephant is but a terrier to\rLeviathan, so, compared with Leviathan’s tail, his trunk is but the\rstalk of a lily. The most direful blow from the elephant’s trunk were\ras the playful tap of a fan, compared with the measureless crush and\rcrash of the sperm whale’s ponderous flukes, which in repeated\rinstances have one after the other hurled entire boats with all their\roars and crews into the air, very much as an Indian juggler tosses his\rballs.*\r\r*Though all comparison in the way of general bulk between the whale and\rthe elephant is preposterous, inasmuch as in that particular the\relephant stands in much the same respect to the whale that a dog does\rto the elephant; nevertheless, there are not wanting some points of\rcurious similitude; among these is the spout. It is well known that the\relephant will often draw up water or dust in his trunk, and then\relevating it, jet it forth in a stream.\r\rThe more I consider this mighty tail, the more do I deplore my\rinability to express it. At times there are gestures in it, which,\rthough they would well grace the hand of man, remain wholly\rinexplicable. In an extensive herd, so remarkable, occasionally, are\rthese mystic gestures, that I have heard hunters who have declared them\rakin to Free-Mason signs and symbols; that the whale, indeed, by these\rmethods intelligently conversed with the world. Nor are there wanting\rother motions of the whale in his general body, full of strangeness,\rand unaccountable to his most experienced assailant. Dissect him how I\rmay, then, I but go skin deep; I know him not, and never will. But if I\rknow not even the tail of this whale, how understand his head? much\rmore, how comprehend his face, when face he has none? Thou shalt see my\rback parts, my tail, he seems to say, but my face shall not be seen.\rBut I cannot completely make out his back parts; and hint what he will\rabout his face, I say again he has no face.\r\r\rCHAPTER 87. The Grand Armada.\r\rThe long and narrow peninsula of Malacca, extending south-eastward from\rthe territories of Birmah, forms the most southerly point of all Asia.\rIn a continuous line from that peninsula stretch the long islands of\rSumatra, Java, Bally, and Timor; which, with many others, form a vast\rmole, or rampart, lengthwise connecting Asia with Australia, and\rdividing the long unbroken Indian ocean from the thickly studded\roriental archipelagoes. This rampart is pierced by several sally-ports\rfor the convenience of ships and whales; conspicuous among which are\rthe straits of Sunda and Malacca. By the straits of Sunda, chiefly,\rvessels bound to China from the west, emerge into the China seas.\r\rThose narrow straits of Sunda divide Sumatra from Java; and standing\rmidway in that vast rampart of islands, buttressed by that bold green\rpromontory, known to seamen as Java Head; they not a little correspond\rto the central gateway opening into some vast walled empire: and\rconsidering the inexhaustible wealth of spices, and silks, and jewels,\rand gold, and ivory, with which the thousand islands of that oriental\rsea are enriched, it seems a significant provision of nature, that such\rtreasures, by the very formation of the land, should at least bear the\rappearance, however ineffectual, of being guarded from the all-grasping\rwestern world. The shores of the Straits of Sunda are unsupplied with\rthose domineering fortresses which guard the entrances to the\rMediterranean, the Baltic, and the Propontis. Unlike the Danes, these\rOrientals do not demand the obsequious homage of lowered top-sails from\rthe endless procession of ships before the wind, which for centuries\rpast, by night and by day, have passed between the islands of Sumatra\rand Java, freighted with the costliest cargoes of the east. But while\rthey freely waive a ceremonial like this, they do by no means renounce\rtheir claim to more solid tribute.\r\rTime out of mind the piratical proas of the Malays, lurking among the\rlow shaded coves and islets of Sumatra, have sallied out upon the\rvessels sailing through the straits, fiercely demanding tribute at the\rpoint of their spears. Though by the repeated bloody chastisements they\rhave received at the hands of European cruisers, the audacity of these\rcorsairs has of late been somewhat repressed; yet, even at the present\rday, we occasionally hear of English and American vessels, which, in\rthose waters, have been remorselessly boarded and pillaged.\r\rWith a fair, fresh wind, the Pequod was now drawing nigh to these\rstraits; Ahab purposing to pass through them into the Javan sea, and\rthence, cruising northwards, over waters known to be frequented here\rand there by the Sperm Whale, sweep inshore by the Philippine Islands,\rand gain the far coast of Japan, in time for the great whaling season\rthere. By these means, the circumnavigating Pequod would sweep almost\rall the known Sperm Whale cruising grounds of the world, previous to\rdescending upon the Line in the Pacific; where Ahab, though everywhere\relse foiled in his pursuit, firmly counted upon giving battle to Moby\rDick, in the sea he was most known to frequent; and at a season when he\rmight most reasonably be presumed to be haunting it.\r\rBut how now? in this zoned quest, does Ahab touch no land? does his\rcrew drink air? Surely, he will stop for water. Nay. For a long time,\rnow, the circus-running sun has raced within his fiery ring, and needs\rno sustenance but what’s in himself. So Ahab. Mark this, too, in the\rwhaler. While other hulls are loaded down with alien stuff, to be\rtransferred to foreign wharves; the world-wandering whale-ship carries\rno cargo but herself and crew, their weapons and their wants. She has a\rwhole lake’s contents bottled in her ample hold. She is ballasted with\rutilities; not altogether with unusable pig-lead and kentledge. She\rcarries years’ water in her. Clear old prime Nantucket water; which,\rwhen three years afloat, the Nantucketer, in the Pacific, prefers to\rdrink before the brackish fluid, but yesterday rafted off in casks,\rfrom the Peruvian or Indian streams. Hence it is, that, while other\rships may have gone to China from New York, and back again, touching at\ra score of ports, the whale-ship, in all that interval, may not have\rsighted one grain of soil; her crew having seen no man but floating\rseamen like themselves. So that did you carry them the news that\ranother flood had come; they would only answer—“Well, boys, here’s the\rark!”\r\rNow, as many Sperm Whales had been captured off the western coast of\rJava, in the near vicinity of the Straits of Sunda; indeed, as most of\rthe ground, roundabout, was generally recognised by the fishermen as an\rexcellent spot for cruising; therefore, as the Pequod gained more and\rmore upon Java Head, the look-outs were repeatedly hailed, and\radmonished to keep wide awake. But though the green palmy cliffs of the\rland soon loomed on the starboard bow, and with delighted nostrils the\rfresh cinnamon was snuffed in the air, yet not a single jet was\rdescried. Almost renouncing all thought of falling in with any game\rhereabouts, the ship had well nigh entered the straits, when the\rcustomary cheering cry was heard from aloft, and ere long a spectacle\rof singular magnificence saluted us.\r\rBut here be it premised, that owing to the unwearied activity with\rwhich of late they have been hunted over all four oceans, the Sperm\rWhales, instead of almost invariably sailing in small detached\rcompanies, as in former times, are now frequently met with in extensive\rherds, sometimes embracing so great a multitude, that it would almost\rseem as if numerous nations of them had sworn solemn league and\rcovenant for mutual assistance and protection. To this aggregation of\rthe Sperm Whale into such immense caravans, may be imputed the\rcircumstance that even in the best cruising grounds, you may now\rsometimes sail for weeks and months together, without being greeted by\ra single spout; and then be suddenly saluted by what sometimes seems\rthousands on thousands.\r\rBroad on both bows, at the distance of some two or three miles, and\rforming a great semicircle, embracing one half of the level horizon, a\rcontinuous chain of whale-jets were up-playing and sparkling in the\rnoon-day air. Unlike the straight perpendicular twin-jets of the Right\rWhale, which, dividing at top, fall over in two branches, like the\rcleft drooping boughs of a willow, the single forward-slanting spout of\rthe Sperm Whale presents a thick curled bush of white mist, continually\rrising and falling away to leeward.\r\rSeen from the Pequod’s deck, then, as she would rise on a high hill of\rthe sea, this host of vapory spouts, individually curling up into the\rair, and beheld through a blending atmosphere of bluish haze, showed\rlike the thousand cheerful chimneys of some dense metropolis, descried\rof a balmy autumnal morning, by some horseman on a height.\r\rAs marching armies approaching an unfriendly defile in the mountains,\raccelerate their march, all eagerness to place that perilous passage in\rtheir rear, and once more expand in comparative security upon the\rplain; even so did this vast fleet of whales now seem hurrying forward\rthrough the straits; gradually contracting the wings of their\rsemicircle, and swimming on, in one solid, but still crescentic centre.\r\rCrowding all sail the Pequod pressed after them; the harpooneers\rhandling their weapons, and loudly cheering from the heads of their yet\rsuspended boats. If the wind only held, little doubt had they, that\rchased through these Straits of Sunda, the vast host would only deploy\rinto the Oriental seas to witness the capture of not a few of their\rnumber. And who could tell whether, in that congregated caravan, Moby\rDick himself might not temporarily be swimming, like the worshipped\rwhite-elephant in the coronation procession of the Siamese! So with\rstun-sail piled on stun-sail, we sailed along, driving these leviathans\rbefore us; when, of a sudden, the voice of Tashtego was heard, loudly\rdirecting attention to something in our wake.\r\rCorresponding to the crescent in our van, we beheld another in our\rrear. It seemed formed of detached white vapors, rising and falling\rsomething like the spouts of the whales; only they did not so\rcompletely come and go; for they constantly hovered, without finally\rdisappearing. Levelling his glass at this sight, Ahab quickly revolved\rin his pivot-hole, crying, “Aloft there, and rig whips and buckets to\rwet the sails;—Malays, sir, and after us!”\r\rAs if too long lurking behind the headlands, till the Pequod should\rfairly have entered the straits, these rascally Asiatics were now in\rhot pursuit, to make up for their over-cautious delay. But when the\rswift Pequod, with a fresh leading wind, was herself in hot chase; how\rvery kind of these tawny philanthropists to assist in speeding her on\rto her own chosen pursuit,—mere riding-whips and rowels to her, that\rthey were. As with glass under arm, Ahab to-and-fro paced the deck; in\rhis forward turn beholding the monsters he chased, and in the after one\rthe bloodthirsty pirates chasing _him_; some such fancy as the above\rseemed his. And when he glanced upon the green walls of the watery\rdefile in which the ship was then sailing, and bethought him that\rthrough that gate lay the route to his vengeance, and beheld, how that\rthrough that same gate he was now both chasing and being chased to his\rdeadly end; and not only that, but a herd of remorseless wild pirates\rand inhuman atheistical devils were infernally cheering him on with\rtheir curses;—when all these conceits had passed through his brain,\rAhab’s brow was left gaunt and ribbed, like the black sand beach after\rsome stormy tide has been gnawing it, without being able to drag the\rfirm thing from its place.\r\rBut thoughts like these troubled very few of the reckless crew; and\rwhen, after steadily dropping and dropping the pirates astern, the\rPequod at last shot by the vivid green Cockatoo Point on the Sumatra\rside, emerging at last upon the broad waters beyond; then, the\rharpooneers seemed more to grieve that the swift whales had been\rgaining upon the ship, than to rejoice that the ship had so\rvictoriously gained upon the Malays. But still driving on in the wake\rof the whales, at length they seemed abating their speed; gradually the\rship neared them; and the wind now dying away, word was passed to\rspring to the boats. But no sooner did the herd, by some presumed\rwonderful instinct of the Sperm Whale, become notified of the three\rkeels that were after them,—though as yet a mile in their rear,—than\rthey rallied again, and forming in close ranks and battalions, so that\rtheir spouts all looked like flashing lines of stacked bayonets, moved\ron with redoubled velocity.\r\rStripped to our shirts and drawers, we sprang to the white-ash, and\rafter several hours’ pulling were almost disposed to renounce the\rchase, when a general pausing commotion among the whales gave animating\rtoken that they were now at last under the influence of that strange\rperplexity of inert irresolution, which, when the fishermen perceive it\rin the whale, they say he is gallied. The compact martial columns in\rwhich they had been hitherto rapidly and steadily swimming, were now\rbroken up in one measureless rout; and like King Porus’ elephants in\rthe Indian battle with Alexander, they seemed going mad with\rconsternation. In all directions expanding in vast irregular circles,\rand aimlessly swimming hither and thither, by their short thick\rspoutings, they plainly betrayed their distraction of panic. This was\rstill more strangely evinced by those of their number, who, completely\rparalysed as it were, helplessly floated like water-logged dismantled\rships on the sea. Had these Leviathans been but a flock of simple\rsheep, pursued over the pasture by three fierce wolves, they could not\rpossibly have evinced such excessive dismay. But this occasional\rtimidity is characteristic of almost all herding creatures. Though\rbanding together in tens of thousands, the lion-maned buffaloes of the\rWest have fled before a solitary horseman. Witness, too, all human\rbeings, how when herded together in the sheepfold of a theatre’s pit,\rthey will, at the slightest alarm of fire, rush helter-skelter for the\routlets, crowding, trampling, jamming, and remorselessly dashing each\rother to death. Best, therefore, withhold any amazement at the\rstrangely gallied whales before us, for there is no folly of the beasts\rof the earth which is not infinitely outdone by the madness of men.\r\rThough many of the whales, as has been said, were in violent motion,\ryet it is to be observed that as a whole the herd neither advanced nor\rretreated, but collectively remained in one place. As is customary in\rthose cases, the boats at once separated, each making for some one lone\rwhale on the outskirts of the shoal. In about three minutes’ time,\rQueequeg’s harpoon was flung; the stricken fish darted blinding spray\rin our faces, and then running away with us like light, steered\rstraight for the heart of the herd. Though such a movement on the part\rof the whale struck under such circumstances, is in no wise\runprecedented; and indeed is almost always more or less anticipated;\ryet does it present one of the more perilous vicissitudes of the\rfishery. For as the swift monster drags you deeper and deeper into the\rfrantic shoal, you bid adieu to circumspect life and only exist in a\rdelirious throb.\r\rAs, blind and deaf, the whale plunged forward, as if by sheer power of\rspeed to rid himself of the iron leech that had fastened to him; as we\rthus tore a white gash in the sea, on all sides menaced as we flew, by\rthe crazed creatures to and fro rushing about us; our beset boat was\rlike a ship mobbed by ice-isles in a tempest, and striving to steer\rthrough their complicated channels and straits, knowing not at what\rmoment it may be locked in and crushed.\r\rBut not a bit daunted, Queequeg steered us manfully; now sheering off\rfrom this monster directly across our route in advance; now edging away\rfrom that, whose colossal flukes were suspended overhead, while all the\rtime, Starbuck stood up in the bows, lance in hand, pricking out of our\rway whatever whales he could reach by short darts, for there was no\rtime to make long ones. Nor were the oarsmen quite idle, though their\rwonted duty was now altogether dispensed with. They chiefly attended to\rthe shouting part of the business. “Out of the way, Commodore!” cried\rone, to a great dromedary that of a sudden rose bodily to the surface,\rand for an instant threatened to swamp us. “Hard down with your tail,\rthere!” cried a second to another, which, close to our gunwale, seemed\rcalmly cooling himself with his own fan-like extremity.\r\rAll whaleboats carry certain curious contrivances, originally invented\rby the Nantucket Indians, called druggs. Two thick squares of wood of\requal size are stoutly clenched together, so that they cross each\rother’s grain at right angles; a line of considerable length is then\rattached to the middle of this block, and the other end of the line\rbeing looped, it can in a moment be fastened to a harpoon. It is\rchiefly among gallied whales that this drugg is used. For then, more\rwhales are close round you than you can possibly chase at one time. But\rsperm whales are not every day encountered; while you may, then, you\rmust kill all you can. And if you cannot kill them all at once, you\rmust wing them, so that they can be afterwards killed at your leisure.\rHence it is, that at times like these the drugg, comes into\rrequisition. Our boat was furnished with three of them. The first and\rsecond were successfully darted, and we saw the whales staggeringly\rrunning off, fettered by the enormous sidelong resistance of the towing\rdrugg. They were cramped like malefactors with the chain and ball. But\rupon flinging the third, in the act of tossing overboard the clumsy\rwooden block, it caught under one of the seats of the boat, and in an\rinstant tore it out and carried it away, dropping the oarsman in the\rboat’s bottom as the seat slid from under him. On both sides the sea\rcame in at the wounded planks, but we stuffed two or three drawers and\rshirts in, and so stopped the leaks for the time.\r\rIt had been next to impossible to dart these drugged-harpoons, were it\rnot that as we advanced into the herd, our whale’s way greatly\rdiminished; moreover, that as we went still further and further from\rthe circumference of commotion, the direful disorders seemed waning. So\rthat when at last the jerking harpoon drew out, and the towing whale\rsideways vanished; then, with the tapering force of his parting\rmomentum, we glided between two whales into the innermost heart of the\rshoal, as if from some mountain torrent we had slid into a serene\rvalley lake. Here the storms in the roaring glens between the outermost\rwhales, were heard but not felt. In this central expanse the sea\rpresented that smooth satin-like surface, called a sleek, produced by\rthe subtle moisture thrown off by the whale in his more quiet moods.\rYes, we were now in that enchanted calm which they say lurks at the\rheart of every commotion. And still in the distracted distance we\rbeheld the tumults of the outer concentric circles, and saw successive\rpods of whales, eight or ten in each, swiftly going round and round,\rlike multiplied spans of horses in a ring; and so closely shoulder to\rshoulder, that a Titanic circus-rider might easily have over-arched the\rmiddle ones, and so have gone round on their backs. Owing to the\rdensity of the crowd of reposing whales, more immediately surrounding\rthe embayed axis of the herd, no possible chance of escape was at\rpresent afforded us. We must watch for a breach in the living wall that\rhemmed us in; the wall that had only admitted us in order to shut us\rup. Keeping at the centre of the lake, we were occasionally visited by\rsmall tame cows and calves; the women and children of this routed host.\r\rNow, inclusive of the occasional wide intervals between the revolving\router circles, and inclusive of the spaces between the various pods in\rany one of those circles, the entire area at this juncture, embraced by\rthe whole multitude, must have contained at least two or three square\rmiles. At any rate—though indeed such a test at such a time might be\rdeceptive—spoutings might be discovered from our low boat that seemed\rplaying up almost from the rim of the horizon. I mention this\rcircumstance, because, as if the cows and calves had been purposely\rlocked up in this innermost fold; and as if the wide extent of the herd\rhad hitherto prevented them from learning the precise cause of its\rstopping; or, possibly, being so young, unsophisticated, and every way\rinnocent and inexperienced; however it may have been, these smaller\rwhales—now and then visiting our becalmed boat from the margin of the\rlake—evinced a wondrous fearlessness and confidence, or else a still\rbecharmed panic which it was impossible not to marvel at. Like\rhousehold dogs they came snuffling round us, right up to our gunwales,\rand touching them; till it almost seemed that some spell had suddenly\rdomesticated them. Queequeg patted their foreheads; Starbuck scratched\rtheir backs with his lance; but fearful of the consequences, for the\rtime refrained from darting it.\r\rBut far beneath this wondrous world upon the surface, another and still\rstranger world met our eyes as we gazed over the side. For, suspended\rin those watery vaults, floated the forms of the nursing mothers of the\rwhales, and those that by their enormous girth seemed shortly to become\rmothers. The lake, as I have hinted, was to a considerable depth\rexceedingly transparent; and as human infants while suckling will\rcalmly and fixedly gaze away from the breast, as if leading two\rdifferent lives at the time; and while yet drawing mortal nourishment,\rbe still spiritually feasting upon some unearthly reminiscence;—even so\rdid the young of these whales seem looking up towards us, but not at\rus, as if we were but a bit of Gulfweed in their new-born sight.\rFloating on their sides, the mothers also seemed quietly eyeing us. One\rof these little infants, that from certain queer tokens seemed hardly a\rday old, might have measured some fourteen feet in length, and some six\rfeet in girth. He was a little frisky; though as yet his body seemed\rscarce yet recovered from that irksome position it had so lately\roccupied in the maternal reticule; where, tail to head, and all ready\rfor the final spring, the unborn whale lies bent like a Tartar’s bow.\rThe delicate side-fins, and the palms of his flukes, still freshly\rretained the plaited crumpled appearance of a baby’s ears newly arrived\rfrom foreign parts.\r\r“Line! line!” cried Queequeg, looking over the gunwale; “him fast! him\rfast!—Who line him! Who struck?—Two whale; one big, one little!”\r\r“What ails ye, man?” cried Starbuck.\r\r“Look-e here,” said Queequeg, pointing down.\r\rAs when the stricken whale, that from the tub has reeled out hundreds\rof fathoms of rope; as, after deep sounding, he floats up again, and\rshows the slackened curling line buoyantly rising and spiralling\rtowards the air; so now, Starbuck saw long coils of the umbilical cord\rof Madame Leviathan, by which the young cub seemed still tethered to\rits dam. Not seldom in the rapid vicissitudes of the chase, this\rnatural line, with the maternal end loose, becomes entangled with the\rhempen one, so that the cub is thereby trapped. Some of the subtlest\rsecrets of the seas seemed divulged to us in this enchanted pond. We\rsaw young Leviathan amours in the deep.*\r\r*The sperm whale, as with all other species of the Leviathan, but\runlike most other fish, breeds indifferently at all seasons; after a\rgestation which may probably be set down at nine months, producing but\rone at a time; though in some few known instances giving birth to an\rEsau and Jacob:—a contingency provided for in suckling by two teats,\rcuriously situated, one on each side of the anus; but the breasts\rthemselves extend upwards from that. When by chance these precious\rparts in a nursing whale are cut by the hunter’s lance, the mother’s\rpouring milk and blood rivallingly discolour the sea for rods. The milk\ris very sweet and rich; it has been tasted by man; it might do well\rwith strawberries. When overflowing with mutual esteem, the whales\rsalute _more hominum_.\r\rAnd thus, though surrounded by circle upon circle of consternations and\raffrights, did these inscrutable creatures at the centre freely and\rfearlessly indulge in all peaceful concernments; yea, serenely revelled\rin dalliance and delight. But even so, amid the tornadoed Atlantic of\rmy being, do I myself still for ever centrally disport in mute calm;\rand while ponderous planets of unwaning woe revolve round me, deep down\rand deep inland there I still bathe me in eternal mildness of joy.\r\rMeanwhile, as we thus lay entranced, the occasional sudden frantic\rspectacles in the distance evinced the activity of the other boats,\rstill engaged in drugging the whales on the frontier of the host; or\rpossibly carrying on the war within the first circle, where abundance\rof room and some convenient retreats were afforded them. But the sight\rof the enraged drugged whales now and then blindly darting to and fro\racross the circles, was nothing to what at last met our eyes. It is\rsometimes the custom when fast to a whale more than commonly powerful\rand alert, to seek to hamstring him, as it were, by sundering or\rmaiming his gigantic tail-tendon. It is done by darting a short-handled\rcutting-spade, to which is attached a rope for hauling it back again. A\rwhale wounded (as we afterwards learned) in this part, but not\reffectually, as it seemed, had broken away from the boat, carrying\ralong with him half of the harpoon line; and in the extraordinary agony\rof the wound, he was now dashing among the revolving circles like the\rlone mounted desperado Arnold, at the battle of Saratoga, carrying\rdismay wherever he went.\r\rBut agonizing as was the wound of this whale, and an appalling\rspectacle enough, any way; yet the peculiar horror with which he seemed\rto inspire the rest of the herd, was owing to a cause which at first\rthe intervening distance obscured from us. But at length we perceived\rthat by one of the unimaginable accidents of the fishery, this whale\rhad become entangled in the harpoon-line that he towed; he had also run\raway with the cutting-spade in him; and while the free end of the rope\rattached to that weapon, had permanently caught in the coils of the\rharpoon-line round his tail, the cutting-spade itself had worked loose\rfrom his flesh. So that tormented to madness, he was now churning\rthrough the water, violently flailing with his flexible tail, and\rtossing the keen spade about him, wounding and murdering his own\rcomrades.\r\rThis terrific object seemed to recall the whole herd from their\rstationary fright. First, the whales forming the margin of our lake\rbegan to crowd a little, and tumble against each other, as if lifted by\rhalf spent billows from afar; then the lake itself began faintly to\rheave and swell; the submarine bridal-chambers and nurseries vanished;\rin more and more contracting orbits the whales in the more central\rcircles began to swim in thickening clusters. Yes, the long calm was\rdeparting. A low advancing hum was soon heard; and then like to the\rtumultuous masses of block-ice when the great river Hudson breaks up in\rSpring, the entire host of whales came tumbling upon their inner\rcentre, as if to pile themselves up in one common mountain. Instantly\rStarbuck and Queequeg changed places; Starbuck taking the stern.\r\r“Oars! Oars!” he intensely whispered, seizing the helm—“gripe your\roars, and clutch your souls, now! My God, men, stand by! Shove him off,\ryou Queequeg—the whale there!—prick him!—hit him! Stand up—stand up,\rand stay so! Spring, men—pull, men; never mind their backs—scrape\rthem!—scrape away!”\r\rThe boat was now all but jammed between two vast black bulks, leaving a\rnarrow Dardanelles between their long lengths. But by desperate\rendeavor we at last shot into a temporary opening; then giving way\rrapidly, and at the same time earnestly watching for another outlet.\rAfter many similar hair-breadth escapes, we at last swiftly glided into\rwhat had just been one of the outer circles, but now crossed by random\rwhales, all violently making for one centre. This lucky salvation was\rcheaply purchased by the loss of Queequeg’s hat, who, while standing in\rthe bows to prick the fugitive whales, had his hat taken clean from his\rhead by the air-eddy made by the sudden tossing of a pair of broad\rflukes close by.\r\rRiotous and disordered as the universal commotion now was, it soon\rresolved itself into what seemed a systematic movement; for having\rclumped together at last in one dense body, they then renewed their\ronward flight with augmented fleetness. Further pursuit was useless;\rbut the boats still lingered in their wake to pick up what drugged\rwhales might be dropped astern, and likewise to secure one which Flask\rhad killed and waifed. The waif is a pennoned pole, two or three of\rwhich are carried by every boat; and which, when additional game is at\rhand, are inserted upright into the floating body of a dead whale, both\rto mark its place on the sea, and also as token of prior possession,\rshould the boats of any other ship draw near.\r\rThe result of this lowering was somewhat illustrative of that sagacious\rsaying in the Fishery,—the more whales the less fish. Of all the\rdrugged whales only one was captured. The rest contrived to escape for\rthe time, but only to be taken, as will hereafter be seen, by some\rother craft than the Pequod.\r\r\rCHAPTER 88. Schools and Schoolmasters.\r\rThe previous chapter gave account of an immense body or herd of Sperm\rWhales, and there was also then given the probable cause inducing those\rvast aggregations.\r\rNow, though such great bodies are at times encountered, yet, as must\rhave been seen, even at the present day, small detached bands are\roccasionally observed, embracing from twenty to fifty individuals each.\rSuch bands are known as schools. They generally are of two sorts; those\rcomposed almost entirely of females, and those mustering none but young\rvigorous males, or bulls, as they are familiarly designated.\r\rIn cavalier attendance upon the school of females, you invariably see a\rmale of full grown magnitude, but not old; who, upon any alarm, evinces\rhis gallantry by falling in the rear and covering the flight of his\rladies. In truth, this gentleman is a luxurious Ottoman, swimming about\rover the watery world, surroundingly accompanied by all the solaces and\rendearments of the harem. The contrast between this Ottoman and his\rconcubines is striking; because, while he is always of the largest\rleviathanic proportions, the ladies, even at full growth, are not more\rthan one-third of the bulk of an average-sized male. They are\rcomparatively delicate, indeed; I dare say, not to exceed half a dozen\ryards round the waist. Nevertheless, it cannot be denied, that upon the\rwhole they are hereditarily entitled to _en bon point_.\r\rIt is very curious to watch this harem and its lord in their indolent\rramblings. Like fashionables, they are for ever on the move in\rleisurely search of variety. You meet them on the Line in time for the\rfull flower of the Equatorial feeding season, having just returned,\rperhaps, from spending the summer in the Northern seas, and so cheating\rsummer of all unpleasant weariness and warmth. By the time they have\rlounged up and down the promenade of the Equator awhile, they start for\rthe Oriental waters in anticipation of the cool season there, and so\revade the other excessive temperature of the year.\r\rWhen serenely advancing on one of these journeys, if any strange\rsuspicious sights are seen, my lord whale keeps a wary eye on his\rinteresting family. Should any unwarrantably pert young Leviathan\rcoming that way, presume to draw confidentially close to one of the\rladies, with what prodigious fury the Bashaw assails him, and chases\rhim away! High times, indeed, if unprincipled young rakes like him are\rto be permitted to invade the sanctity of domestic bliss; though do\rwhat the Bashaw will, he cannot keep the most notorious Lothario out of\rhis bed; for, alas! all fish bed in common. As ashore, the ladies often\rcause the most terrible duels among their rival admirers; just so with\rthe whales, who sometimes come to deadly battle, and all for love. They\rfence with their long lower jaws, sometimes locking them together, and\rso striving for the supremacy like elks that warringly interweave their\rantlers. Not a few are captured having the deep scars of these\rencounters,—furrowed heads, broken teeth, scolloped fins; and in some\rinstances, wrenched and dislocated mouths.\r\rBut supposing the invader of domestic bliss to betake himself away at\rthe first rush of the harem’s lord, then is it very diverting to watch\rthat lord. Gently he insinuates his vast bulk among them again and\rrevels there awhile, still in tantalizing vicinity to young Lothario,\rlike pious Solomon devoutly worshipping among his thousand concubines.\rGranting other whales to be in sight, the fishermen will seldom give\rchase to one of these Grand Turks; for these Grand Turks are too lavish\rof their strength, and hence their unctuousness is small. As for the\rsons and the daughters they beget, why, those sons and daughters must\rtake care of themselves; at least, with only the maternal help. For\rlike certain other omnivorous roving lovers that might be named, my\rLord Whale has no taste for the nursery, however much for the bower;\rand so, being a great traveller, he leaves his anonymous babies all\rover the world; every baby an exotic. In good time, nevertheless, as\rthe ardour of youth declines; as years and dumps increase; as\rreflection lends her solemn pauses; in short, as a general lassitude\rovertakes the sated Turk; then a love of ease and virtue supplants the\rlove for maidens; our Ottoman enters upon the impotent, repentant,\radmonitory stage of life, forswears, disbands the harem, and grown to\ran exemplary, sulky old soul, goes about all alone among the meridians\rand parallels saying his prayers, and warning each young Leviathan from\rhis amorous errors.\r\rNow, as the harem of whales is called by the fishermen a school, so is\rthe lord and master of that school technically known as the\rschoolmaster. It is therefore not in strict character, however\radmirably satirical, that after going to school himself, he should then\rgo abroad inculcating not what he learned there, but the folly of it.\rHis title, schoolmaster, would very naturally seem derived from the\rname bestowed upon the harem itself, but some have surmised that the\rman who first thus entitled this sort of Ottoman whale, must have read\rthe memoirs of Vidocq, and informed himself what sort of a\rcountry-schoolmaster that famous Frenchman was in his younger days, and\rwhat was the nature of those occult lessons he inculcated into some of\rhis pupils.\r\rThe same secludedness and isolation to which the schoolmaster whale\rbetakes himself in his advancing years, is true of all aged Sperm\rWhales. Almost universally, a lone whale—as a solitary Leviathan is\rcalled—proves an ancient one. Like venerable moss-bearded Daniel Boone,\rhe will have no one near him but Nature herself; and her he takes to\rwife in the wilderness of waters, and the best of wives she is, though\rshe keeps so many moody secrets.\r\rThe schools composing none but young and vigorous males, previously\rmentioned, offer a strong contrast to the harem schools. For while\rthose female whales are characteristically timid, the young males, or\rforty-barrel-bulls, as they call them, are by far the most pugnacious\rof all Leviathans, and proverbially the most dangerous to encounter;\rexcepting those wondrous grey-headed, grizzled whales, sometimes met,\rand these will fight you like grim fiends exasperated by a penal gout.\r\rThe Forty-barrel-bull schools are larger than the harem schools. Like a\rmob of young collegians, they are full of fight, fun, and wickedness,\rtumbling round the world at such a reckless, rollicking rate, that no\rprudent underwriter would insure them any more than he would a riotous\rlad at Yale or Harvard. They soon relinquish this turbulence though,\rand when about three-fourths grown, break up, and separately go about\rin quest of settlements, that is, harems.\r\rAnother point of difference between the male and female schools is\rstill more characteristic of the sexes. Say you strike a\rForty-barrel-bull—poor devil! all his comrades quit him. But strike a\rmember of the harem school, and her companions swim around her with\revery token of concern, sometimes lingering so near her and so long, as\rthemselves to fall a prey.\r\r\rCHAPTER 89. Fast-Fish and Loose-Fish.\r\rThe allusion to the waif and waif-poles in the last chapter but one,\rnecessitates some account of the laws and regulations of the whale\rfishery, of which the waif may be deemed the grand symbol and badge.\r\rIt frequently happens that when several ships are cruising in company,\ra whale may be struck by one vessel, then escape, and be finally killed\rand captured by another vessel; and herein are indirectly comprised\rmany minor contingencies, all partaking of this one grand feature. For\rexample,—after a weary and perilous chase and capture of a whale, the\rbody may get loose from the ship by reason of a violent storm; and\rdrifting far away to leeward, be retaken by a second whaler, who, in a\rcalm, snugly tows it alongside, without risk of life or line. Thus the\rmost vexatious and violent disputes would often arise between the\rfishermen, were there not some written or unwritten, universal,\rundisputed law applicable to all cases.\r\rPerhaps the only formal whaling code authorized by legislative\renactment, was that of Holland. It was decreed by the States-General in\rA.D. 1695. But though no other nation has ever had any written whaling\rlaw, yet the American fishermen have been their own legislators and\rlawyers in this matter. They have provided a system which for terse\rcomprehensiveness surpasses Justinian’s Pandects and the By-laws of the\rChinese Society for the Suppression of Meddling with other People’s\rBusiness. Yes; these laws might be engraven on a Queen Anne’s farthing,\ror the barb of a harpoon, and worn round the neck, so small are they.\r\rI. A Fast-Fish belongs to the party fast to it.\r\rII. A Loose-Fish is fair game for anybody who can soonest catch it.\r\rBut what plays the mischief with this masterly code is the admirable\rbrevity of it, which necessitates a vast volume of commentaries to\rexpound it.\r\rFirst: What is a Fast-Fish? Alive or dead a fish is technically fast,\rwhen it is connected with an occupied ship or boat, by any medium at\rall controllable by the occupant or occupants,—a mast, an oar, a\rnine-inch cable, a telegraph wire, or a strand of cobweb, it is all the\rsame. Likewise a fish is technically fast when it bears a waif, or any\rother recognised symbol of possession; so long as the party waifing it\rplainly evince their ability at any time to take it alongside, as well\ras their intention so to do.\r\rThese are scientific commentaries; but the commentaries of the whalemen\rthemselves sometimes consist in hard words and harder knocks—the\rCoke-upon-Littleton of the fist. True, among the more upright and\rhonorable whalemen allowances are always made for peculiar cases, where\rit would be an outrageous moral injustice for one party to claim\rpossession of a whale previously chased or killed by another party. But\rothers are by no means so scrupulous.\r\rSome fifty years ago there was a curious case of whale-trover litigated\rin England, wherein the plaintiffs set forth that after a hard chase of\ra whale in the Northern seas; and when indeed they (the plaintiffs) had\rsucceeded in harpooning the fish; they were at last, through peril of\rtheir lives, obliged to forsake not only their lines, but their boat\ritself. Ultimately the defendants (the crew of another ship) came up\rwith the whale, struck, killed, seized, and finally appropriated it\rbefore the very eyes of the plaintiffs. And when those defendants were\rremonstrated with, their captain snapped his fingers in the plaintiffs’\rteeth, and assured them that by way of doxology to the deed he had\rdone, he would now retain their line, harpoons, and boat, which had\rremained attached to the whale at the time of the seizure. Wherefore\rthe plaintiffs now sued for the recovery of the value of their whale,\rline, harpoons, and boat.\r\rMr. Erskine was counsel for the defendants; Lord Ellenborough was the\rjudge. In the course of the defence, the witty Erskine went on to\rillustrate his position, by alluding to a recent crim. con. case,\rwherein a gentleman, after in vain trying to bridle his wife’s\rviciousness, had at last abandoned her upon the seas of life; but in\rthe course of years, repenting of that step, he instituted an action to\rrecover possession of her. Erskine was on the other side; and he then\rsupported it by saying, that though the gentleman had originally\rharpooned the lady, and had once had her fast, and only by reason of\rthe great stress of her plunging viciousness, had at last abandoned\rher; yet abandon her he did, so that she became a loose-fish; and\rtherefore when a subsequent gentleman re-harpooned her, the lady then\rbecame that subsequent gentleman’s property, along with whatever\rharpoon might have been found sticking in her.\r\rNow in the present case Erskine contended that the examples of the\rwhale and the lady were reciprocally illustrative of each other.\r\rThese pleadings, and the counter pleadings, being duly heard, the very\rlearned judge in set terms decided, to wit,—That as for the boat, he\rawarded it to the plaintiffs, because they had merely abandoned it to\rsave their lives; but that with regard to the controverted whale,\rharpoons, and line, they belonged to the defendants; the whale, because\rit was a Loose-Fish at the time of the final capture; and the harpoons\rand line because when the fish made off with them, it (the fish)\racquired a property in those articles; and hence anybody who afterwards\rtook the fish had a right to them. Now the defendants afterwards took\rthe fish; ergo, the aforesaid articles were theirs.\r\rA common man looking at this decision of the very learned Judge, might\rpossibly object to it. But ploughed up to the primary rock of the\rmatter, the two great principles laid down in the twin whaling laws\rpreviously quoted, and applied and elucidated by Lord Ellenborough in\rthe above cited case; these two laws touching Fast-Fish and Loose-Fish,\rI say, will, on reflection, be found the fundamentals of all human\rjurisprudence; for notwithstanding its complicated tracery of\rsculpture, the Temple of the Law, like the Temple of the Philistines,\rhas but two props to stand on.\r\rIs it not a saying in every one’s mouth, Possession is half of the law:\rthat is, regardless of how the thing came into possession? But often\rpossession is the whole of the law. What are the sinews and souls of\rRussian serfs and Republican slaves but Fast-Fish, whereof possession\ris the whole of the law? What to the rapacious landlord is the widow’s\rlast mite but a Fast-Fish? What is yonder undetected villain’s marble\rmansion with a door-plate for a waif; what is that but a Fast-Fish?\rWhat is the ruinous discount which Mordecai, the broker, gets from poor\rWoebegone, the bankrupt, on a loan to keep Woebegone’s family from\rstarvation; what is that ruinous discount but a Fast-Fish? What is the\rArchbishop of Savesoul’s income of £100,000 seized from the scant bread\rand cheese of hundreds of thousands of broken-backed laborers (all sure\rof heaven without any of Savesoul’s help) what is that globular\r£100,000 but a Fast-Fish? What are the Duke of Dunder’s hereditary\rtowns and hamlets but Fast-Fish? What to that redoubted harpooneer,\rJohn Bull, is poor Ireland, but a Fast-Fish? What to that apostolic\rlancer, Brother Jonathan, is Texas but a Fast-Fish? And concerning all\rthese, is not Possession the whole of the law?\r\rBut if the doctrine of Fast-Fish be pretty generally applicable, the\rkindred doctrine of Loose-Fish is still more widely so. That is\rinternationally and universally applicable.\r\rWhat was America in 1492 but a Loose-Fish, in which Columbus struck the\rSpanish standard by way of waifing it for his royal master and\rmistress? What was Poland to the Czar? What Greece to the Turk? What\rIndia to England? What at last will Mexico be to the United States? All\rLoose-Fish.\r\rWhat are the Rights of Man and the Liberties of the World but\rLoose-Fish? What all men’s minds and opinions but Loose-Fish? What is\rthe principle of religious belief in them but a Loose-Fish? What to the\rostentatious smuggling verbalists are the thoughts of thinkers but\rLoose-Fish? What is the great globe itself but a Loose-Fish? And what\rare you, reader, but a Loose-Fish and a Fast-Fish, too?\r\r\rCHAPTER 90. Heads or Tails.\r\r“De balena vero sufficit, si rex habeat caput, et regina caudam.”\r_Bracton, l. 3, c. 3._\r\rLatin from the books of the Laws of England, which taken along with the\rcontext, means, that of all whales captured by anybody on the coast of\rthat land, the King, as Honorary Grand Harpooneer, must have the head,\rand the Queen be respectfully presented with the tail. A division\rwhich, in the whale, is much like halving an apple; there is no\rintermediate remainder. Now as this law, under a modified form, is to\rthis day in force in England; and as it offers in various respects a\rstrange anomaly touching the general law of Fast and Loose-Fish, it is\rhere treated of in a separate chapter, on the same courteous principle\rthat prompts the English railways to be at the expense of a separate\rcar, specially reserved for the accommodation of royalty. In the first\rplace, in curious proof of the fact that the above-mentioned law is\rstill in force, I proceed to lay before you a circumstance that\rhappened within the last two years.\r\rIt seems that some honest mariners of Dover, or Sandwich, or some one\rof the Cinque Ports, had after a hard chase succeeded in killing and\rbeaching a fine whale which they had originally descried afar off from\rthe shore. Now the Cinque Ports are partially or somehow under the\rjurisdiction of a sort of policeman or beadle, called a Lord Warden.\rHolding the office directly from the crown, I believe, all the royal\remoluments incident to the Cinque Port territories become by assignment\rhis. By some writers this office is called a sinecure. But not so.\rBecause the Lord Warden is busily employed at times in fobbing his\rperquisites; which are his chiefly by virtue of that same fobbing of\rthem.\r\rNow when these poor sun-burnt mariners, bare-footed, and with their\rtrowsers rolled high up on their eely legs, had wearily hauled their\rfat fish high and dry, promising themselves a good £150 from the\rprecious oil and bone; and in fantasy sipping rare tea with their\rwives, and good ale with their cronies, upon the strength of their\rrespective shares; up steps a very learned and most Christian and\rcharitable gentleman, with a copy of Blackstone under his arm; and\rlaying it upon the whale’s head, he says—“Hands off! this fish, my\rmasters, is a Fast-Fish. I seize it as the Lord Warden’s.” Upon this\rthe poor mariners in their respectful consternation—so truly\rEnglish—knowing not what to say, fall to vigorously scratching their\rheads all round; meanwhile ruefully glancing from the whale to the\rstranger. But that did in nowise mend the matter, or at all soften the\rhard heart of the learned gentleman with the copy of Blackstone. At\rlength one of them, after long scratching about for his ideas, made\rbold to speak,\r\r“Please, sir, who is the Lord Warden?”\r\r“The Duke.”\r\r“But the duke had nothing to do with taking this fish?”\r\r“It is his.”\r\r“We have been at great trouble, and peril, and some expense, and is all\rthat to go to the Duke’s benefit; we getting nothing at all for our\rpains but our blisters?”\r\r“It is his.”\r\r“Is the Duke so very poor as to be forced to this desperate mode of\rgetting a livelihood?”\r\r“It is his.”\r\r“I thought to relieve my old bed-ridden mother by part of my share of\rthis whale.”\r\r“It is his.”\r\r“Won’t the Duke be content with a quarter or a half?”\r\r“It is his.”\r\rIn a word, the whale was seized and sold, and his Grace the Duke of\rWellington received the money. Thinking that viewed in some particular\rlights, the case might by a bare possibility in some small degree be\rdeemed, under the circumstances, a rather hard one, an honest clergyman\rof the town respectfully addressed a note to his Grace, begging him to\rtake the case of those unfortunate mariners into full consideration. To\rwhich my Lord Duke in substance replied (both letters were published)\rthat he had already done so, and received the money, and would be\robliged to the reverend gentleman if for the future he (the reverend\rgentleman) would decline meddling with other people’s business. Is this\rthe still militant old man, standing at the corners of the three\rkingdoms, on all hands coercing alms of beggars?\r\rIt will readily be seen that in this case the alleged right of the Duke\rto the whale was a delegated one from the Sovereign. We must needs\rinquire then on what principle the Sovereign is originally invested\rwith that right. The law itself has already been set forth. But Plowdon\rgives us the reason for it. Says Plowdon, the whale so caught belongs\rto the King and Queen, “because of its superior excellence.” And by the\rsoundest commentators this has ever been held a cogent argument in such\rmatters.\r\rBut why should the King have the head, and the Queen the tail? A reason\rfor that, ye lawyers!\r\rIn his treatise on “Queen-Gold,” or Queen-pinmoney, an old King’s Bench\rauthor, one William Prynne, thus discourseth: “Ye tail is ye Queen’s,\rthat ye Queen’s wardrobe may be supplied with ye whalebone.” Now this\rwas written at a time when the black limber bone of the Greenland or\rRight whale was largely used in ladies’ bodices. But this same bone is\rnot in the tail; it is in the head, which is a sad mistake for a\rsagacious lawyer like Prynne. But is the Queen a mermaid, to be\rpresented with a tail? An allegorical meaning may lurk here.\r\rThere are two royal fish so styled by the English law writers—the whale\rand the sturgeon; both royal property under certain limitations, and\rnominally supplying the tenth branch of the crown’s ordinary revenue. I\rknow not that any other author has hinted of the matter; but by\rinference it seems to me that the sturgeon must be divided in the same\rway as the whale, the King receiving the highly dense and elastic head\rpeculiar to that fish, which, symbolically regarded, may possibly be\rhumorously grounded upon some presumed congeniality. And thus there\rseems a reason in all things, even in law.\r\r\rCHAPTER 91. The Pequod Meets The Rose-Bud.\r\r“In vain it was to rake for Ambergriese in the paunch of this\rLeviathan, insufferable fetor denying not inquiry.” _Sir T. Browne,\rV.E._\r\rIt was a week or two after the last whaling scene recounted, and when\rwe were slowly sailing over a sleepy, vapory, mid-day sea, that the\rmany noses on the Pequod’s deck proved more vigilant discoverers than\rthe three pairs of eyes aloft. A peculiar and not very pleasant smell\rwas smelt in the sea.\r\r“I will bet something now,” said Stubb, “that somewhere hereabouts are\rsome of those drugged whales we tickled the other day. I thought they\rwould keel up before long.”\r\rPresently, the vapors in advance slid aside; and there in the distance\rlay a ship, whose furled sails betokened that some sort of whale must\rbe alongside. As we glided nearer, the stranger showed French colours\rfrom his peak; and by the eddying cloud of vulture sea-fowl that\rcircled, and hovered, and swooped around him, it was plain that the\rwhale alongside must be what the fishermen call a blasted whale, that\ris, a whale that has died unmolested on the sea, and so floated an\runappropriated corpse. It may well be conceived, what an unsavory odor\rsuch a mass must exhale; worse than an Assyrian city in the plague,\rwhen the living are incompetent to bury the departed. So intolerable\rindeed is it regarded by some, that no cupidity could persuade them to\rmoor alongside of it. Yet are there those who will still do it;\rnotwithstanding the fact that the oil obtained from such subjects is of\ra very inferior quality, and by no means of the nature of\rattar-of-rose.\r\rComing still nearer with the expiring breeze, we saw that the Frenchman\rhad a second whale alongside; and this second whale seemed even more of\ra nosegay than the first. In truth, it turned out to be one of those\rproblematical whales that seem to dry up and die with a sort of\rprodigious dyspepsia, or indigestion; leaving their defunct bodies\ralmost entirely bankrupt of anything like oil. Nevertheless, in the\rproper place we shall see that no knowing fisherman will ever turn up\rhis nose at such a whale as this, however much he may shun blasted\rwhales in general.\r\rThe Pequod had now swept so nigh to the stranger, that Stubb vowed he\rrecognised his cutting spade-pole entangled in the lines that were\rknotted round the tail of one of these whales.\r\r“There’s a pretty fellow, now,” he banteringly laughed, standing in the\rship’s bows, “there’s a jackal for ye! I well know that these Crappoes\rof Frenchmen are but poor devils in the fishery; sometimes lowering\rtheir boats for breakers, mistaking them for Sperm Whale spouts; yes,\rand sometimes sailing from their port with their hold full of boxes of\rtallow candles, and cases of snuffers, foreseeing that all the oil they\rwill get won’t be enough to dip the Captain’s wick into; aye, we all\rknow these things; but look ye, here’s a Crappo that is content with\rour leavings, the drugged whale there, I mean; aye, and is content too\rwith scraping the dry bones of that other precious fish he has there.\rPoor devil! I say, pass round a hat, some one, and let’s make him a\rpresent of a little oil for dear charity’s sake. For what oil he’ll get\rfrom that drugged whale there, wouldn’t be fit to burn in a jail; no,\rnot in a condemned cell. And as for the other whale, why, I’ll agree to\rget more oil by chopping up and trying out these three masts of ours,\rthan he’ll get from that bundle of bones; though, now that I think of\rit, it may contain something worth a good deal more than oil; yes,\rambergris. I wonder now if our old man has thought of that. It’s worth\rtrying. Yes, I’m for it;” and so saying he started for the\rquarter-deck.\r\rBy this time the faint air had become a complete calm; so that whether\ror no, the Pequod was now fairly entrapped in the smell, with no hope\rof escaping except by its breezing up again. Issuing from the cabin,\rStubb now called his boat’s crew, and pulled off for the stranger.\rDrawing across her bow, he perceived that in accordance with the\rfanciful French taste, the upper part of her stem-piece was carved in\rthe likeness of a huge drooping stalk, was painted green, and for\rthorns had copper spikes projecting from it here and there; the whole\rterminating in a symmetrical folded bulb of a bright red colour. Upon\rher head boards, in large gilt letters, he read “Bouton de\rRose,”—Rose-button, or Rose-bud; and this was the romantic name of this\raromatic ship.\r\rThough Stubb did not understand the _Bouton_ part of the inscription,\ryet the word _rose_, and the bulbous figure-head put together,\rsufficiently explained the whole to him.\r\r“A wooden rose-bud, eh?” he cried with his hand to his nose, “that will\rdo very well; but how like all creation it smells!”\r\rNow in order to hold direct communication with the people on deck, he\rhad to pull round the bows to the starboard side, and thus come close\rto the blasted whale; and so talk over it.\r\rArrived then at this spot, with one hand still to his nose, he\rbawled—“Bouton-de-Rose, ahoy! are there any of you Bouton-de-Roses that\rspeak English?”\r\r“Yes,” rejoined a Guernsey-man from the bulwarks, who turned out to be\rthe chief-mate.\r\r“Well, then, my Bouton-de-Rose-bud, have you seen the White Whale?”\r\r“_What_ whale?”\r\r“The _White_ Whale—a Sperm Whale—Moby Dick, have ye seen him?\r\r“Never heard of such a whale. Cachalot Blanche! White Whale—no.”\r\r“Very good, then; good bye now, and I’ll call again in a minute.”\r\rThen rapidly pulling back towards the Pequod, and seeing Ahab leaning\rover the quarter-deck rail awaiting his report, he moulded his two\rhands into a trumpet and shouted—“No, Sir! No!” Upon which Ahab\rretired, and Stubb returned to the Frenchman.\r\rHe now perceived that the Guernsey-man, who had just got into the\rchains, and was using a cutting-spade, had slung his nose in a sort of\rbag.\r\r“What’s the matter with your nose, there?” said Stubb. “Broke it?”\r\r“I wish it was broken, or that I didn’t have any nose at all!” answered\rthe Guernsey-man, who did not seem to relish the job he was at very\rmuch. “But what are you holding _yours_ for?”\r\r“Oh, nothing! It’s a wax nose; I have to hold it on. Fine day, ain’t\rit? Air rather gardenny, I should say; throw us a bunch of posies, will\rye, Bouton-de-Rose?”\r\r“What in the devil’s name do you want here?” roared the Guernseyman,\rflying into a sudden passion.\r\r“Oh! keep cool—cool? yes, that’s the word! why don’t you pack those\rwhales in ice while you’re working at ’em? But joking aside, though; do\ryou know, Rose-bud, that it’s all nonsense trying to get any oil out of\rsuch whales? As for that dried up one, there, he hasn’t a gill in his\rwhole carcase.”\r\r“I know that well enough; but, d’ye see, the Captain here won’t believe\rit; this is his first voyage; he was a Cologne manufacturer before. But\rcome aboard, and mayhap he’ll believe you, if he won’t me; and so I’ll\rget out of this dirty scrape.”\r\r“Anything to oblige ye, my sweet and pleasant fellow,” rejoined Stubb,\rand with that he soon mounted to the deck. There a queer scene\rpresented itself. The sailors, in tasselled caps of red worsted, were\rgetting the heavy tackles in readiness for the whales. But they worked\rrather slow and talked very fast, and seemed in anything but a good\rhumor. All their noses upwardly projected from their faces like so many\rjib-booms. Now and then pairs of them would drop their work, and run up\rto the mast-head to get some fresh air. Some thinking they would catch\rthe plague, dipped oakum in coal-tar, and at intervals held it to their\rnostrils. Others having broken the stems of their pipes almost short\roff at the bowl, were vigorously puffing tobacco-smoke, so that it\rconstantly filled their olfactories.\r\rStubb was struck by a shower of outcries and anathemas proceeding from\rthe Captain’s round-house abaft; and looking in that direction saw a\rfiery face thrust from behind the door, which was held ajar from\rwithin. This was the tormented surgeon, who, after in vain\rremonstrating against the proceedings of the day, had betaken himself\rto the Captain’s round-house (_cabinet_ he called it) to avoid the\rpest; but still, could not help yelling out his entreaties and\rindignations at times.\r\rMarking all this, Stubb argued well for his scheme, and turning to the\rGuernsey-man had a little chat with him, during which the stranger mate\rexpressed his detestation of his Captain as a conceited ignoramus, who\rhad brought them all into so unsavory and unprofitable a pickle.\rSounding him carefully, Stubb further perceived that the Guernsey-man\rhad not the slightest suspicion concerning the ambergris. He therefore\rheld his peace on that head, but otherwise was quite frank and\rconfidential with him, so that the two quickly concocted a little plan\rfor both circumventing and satirizing the Captain, without his at all\rdreaming of distrusting their sincerity. According to this little plan\rof theirs, the Guernsey-man, under cover of an interpreter’s office,\rwas to tell the Captain what he pleased, but as coming from Stubb; and\ras for Stubb, he was to utter any nonsense that should come uppermost\rin him during the interview.\r\rBy this time their destined victim appeared from his cabin. He was a\rsmall and dark, but rather delicate looking man for a sea-captain, with\rlarge whiskers and moustache, however; and wore a red cotton velvet\rvest with watch-seals at his side. To this gentleman, Stubb was now\rpolitely introduced by the Guernsey-man, who at once ostentatiously put\ron the aspect of interpreting between them.\r\r“What shall I say to him first?” said he.\r\r“Why,” said Stubb, eyeing the velvet vest and the watch and seals, “you\rmay as well begin by telling him that he looks a sort of babyish to me,\rthough I don’t pretend to be a judge.”\r\r“He says, Monsieur,” said the Guernsey-man, in French, turning to his\rcaptain, “that only yesterday his ship spoke a vessel, whose captain\rand chief-mate, with six sailors, had all died of a fever caught from a\rblasted whale they had brought alongside.”\r\rUpon this the captain started, and eagerly desired to know more.\r\r“What now?” said the Guernsey-man to Stubb.\r\r“Why, since he takes it so easy, tell him that now I have eyed him\rcarefully, I’m quite certain that he’s no more fit to command a\rwhale-ship than a St. Jago monkey. In fact, tell him from me he’s a\rbaboon.”\r\r“He vows and declares, Monsieur, that the other whale, the dried one,\ris far more deadly than the blasted one; in fine, Monsieur, he conjures\rus, as we value our lives, to cut loose from these fish.”\r\rInstantly the captain ran forward, and in a loud voice commanded his\rcrew to desist from hoisting the cutting-tackles, and at once cast\rloose the cables and chains confining the whales to the ship.\r\r“What now?” said the Guernsey-man, when the Captain had returned to\rthem.\r\r“Why, let me see; yes, you may as well tell him now that—that—in fact,\rtell him I’ve diddled him, and (aside to himself) perhaps somebody\relse.”\r\r“He says, Monsieur, that he’s very happy to have been of any service to\rus.”\r\rHearing this, the captain vowed that they were the grateful parties\r(meaning himself and mate) and concluded by inviting Stubb down into\rhis cabin to drink a bottle of Bordeaux.\r\r“He wants you to take a glass of wine with him,” said the interpreter.\r\r“Thank him heartily; but tell him it’s against my principles to drink\rwith the man I’ve diddled. In fact, tell him I must go.”\r\r“He says, Monsieur, that his principles won’t admit of his drinking;\rbut that if Monsieur wants to live another day to drink, then Monsieur\rhad best drop all four boats, and pull the ship away from these whales,\rfor it’s so calm they won’t drift.”\r\rBy this time Stubb was over the side, and getting into his boat, hailed\rthe Guernsey-man to this effect,—that having a long tow-line in his\rboat, he would do what he could to help them, by pulling out the\rlighter whale of the two from the ship’s side. While the Frenchman’s\rboats, then, were engaged in towing the ship one way, Stubb\rbenevolently towed away at his whale the other way, ostentatiously\rslacking out a most unusually long tow-line.\r\rPresently a breeze sprang up; Stubb feigned to cast off from the whale;\rhoisting his boats, the Frenchman soon increased his distance, while\rthe Pequod slid in between him and Stubb’s whale. Whereupon Stubb\rquickly pulled to the floating body, and hailing the Pequod to give\rnotice of his intentions, at once proceeded to reap the fruit of his\runrighteous cunning. Seizing his sharp boat-spade, he commenced an\rexcavation in the body, a little behind the side fin. You would almost\rhave thought he was digging a cellar there in the sea; and when at\rlength his spade struck against the gaunt ribs, it was like turning up\rold Roman tiles and pottery buried in fat English loam. His boat’s crew\rwere all in high excitement, eagerly helping their chief, and looking\ras anxious as gold-hunters.\r\rAnd all the time numberless fowls were diving, and ducking, and\rscreaming, and yelling, and fighting around them. Stubb was beginning\rto look disappointed, especially as the horrible nosegay increased,\rwhen suddenly from out the very heart of this plague, there stole a\rfaint stream of perfume, which flowed through the tide of bad smells\rwithout being absorbed by it, as one river will flow into and then\ralong with another, without at all blending with it for a time.\r\r“I have it, I have it,” cried Stubb, with delight, striking something\rin the subterranean regions, “a purse! a purse!”\r\rDropping his spade, he thrust both hands in, and drew out handfuls of\rsomething that looked like ripe Windsor soap, or rich mottled old\rcheese; very unctuous and savory withal. You might easily dent it with\ryour thumb; it is of a hue between yellow and ash colour. And this,\rgood friends, is ambergris, worth a gold guinea an ounce to any\rdruggist. Some six handfuls were obtained; but more was unavoidably\rlost in the sea, and still more, perhaps, might have been secured were\rit not for impatient Ahab’s loud command to Stubb to desist, and come\ron board, else the ship would bid them good bye.\r\r\rCHAPTER 92. Ambergris.\r\rNow this ambergris is a very curious substance, and so important as an\rarticle of commerce, that in 1791 a certain Nantucket-born Captain\rCoffin was examined at the bar of the English House of Commons on that\rsubject. For at that time, and indeed until a comparatively late day,\rthe precise origin of ambergris remained, like amber itself, a problem\rto the learned. Though the word ambergris is but the French compound\rfor grey amber, yet the two substances are quite distinct. For amber,\rthough at times found on the sea-coast, is also dug up in some far\rinland soils, whereas ambergris is never found except upon the sea.\rBesides, amber is a hard, transparent, brittle, odorless substance,\rused for mouth-pieces to pipes, for beads and ornaments; but ambergris\ris soft, waxy, and so highly fragrant and spicy, that it is largely\rused in perfumery, in pastiles, precious candles, hair-powders, and\rpomatum. The Turks use it in cooking, and also carry it to Mecca, for\rthe same purpose that frankincense is carried to St. Peter’s in Rome.\rSome wine merchants drop a few grains into claret, to flavor it.\r\rWho would think, then, that such fine ladies and gentlemen should\rregale themselves with an essence found in the inglorious bowels of a\rsick whale! Yet so it is. By some, ambergris is supposed to be the\rcause, and by others the effect, of the dyspepsia in the whale. How to\rcure such a dyspepsia it were hard to say, unless by administering\rthree or four boat loads of Brandreth’s pills, and then running out of\rharm’s way, as laborers do in blasting rocks.\r\rI have forgotten to say that there were found in this ambergris,\rcertain hard, round, bony plates, which at first Stubb thought might be\rsailors’ trowsers buttons; but it afterwards turned out that they were\rnothing more than pieces of small squid bones embalmed in that manner.\r\rNow that the incorruption of this most fragrant ambergris should be\rfound in the heart of such decay; is this nothing? Bethink thee of that\rsaying of St. Paul in Corinthians, about corruption and incorruption;\rhow that we are sown in dishonor, but raised in glory. And likewise\rcall to mind that saying of Paracelsus about what it is that maketh the\rbest musk. Also forget not the strange fact that of all things of\rill-savor, Cologne-water, in its rudimental manufacturing stages, is\rthe worst.\r\rI should like to conclude the chapter with the above appeal, but\rcannot, owing to my anxiety to repel a charge often made against\rwhalemen, and which, in the estimation of some already biased minds,\rmight be considered as indirectly substantiated by what has been said\rof the Frenchman’s two whales. Elsewhere in this volume the slanderous\raspersion has been disproved, that the vocation of whaling is\rthroughout a slatternly, untidy business. But there is another thing to\rrebut. They hint that all whales always smell bad. Now how did this\rodious stigma originate?\r\rI opine, that it is plainly traceable to the first arrival of the\rGreenland whaling ships in London, more than two centuries ago. Because\rthose whalemen did not then, and do not now, try out their oil at sea\ras the Southern ships have always done; but cutting up the fresh\rblubber in small bits, thrust it through the bung holes of large casks,\rand carry it home in that manner; the shortness of the season in those\rIcy Seas, and the sudden and violent storms to which they are exposed,\rforbidding any other course. The consequence is, that upon breaking\rinto the hold, and unloading one of these whale cemeteries, in the\rGreenland dock, a savor is given forth somewhat similar to that arising\rfrom excavating an old city grave-yard, for the foundations of a\rLying-in Hospital.\r\rI partly surmise also, that this wicked charge against whalers may be\rlikewise imputed to the existence on the coast of Greenland, in former\rtimes, of a Dutch village called Schmerenburgh or Smeerenberg, which\rlatter name is the one used by the learned Fogo Von Slack, in his great\rwork on Smells, a text-book on that subject. As its name imports\r(smeer, fat; berg, to put up), this village was founded in order to\rafford a place for the blubber of the Dutch whale fleet to be tried\rout, without being taken home to Holland for that purpose. It was a\rcollection of furnaces, fat-kettles, and oil sheds; and when the works\rwere in full operation certainly gave forth no very pleasant savor. But\rall this is quite different with a South Sea Sperm Whaler; which in a\rvoyage of four years perhaps, after completely filling her hold with\roil, does not, perhaps, consume fifty days in the business of boiling\rout; and in the state that it is casked, the oil is nearly scentless.\rThe truth is, that living or dead, if but decently treated, whales as a\rspecies are by no means creatures of ill odor; nor can whalemen be\rrecognised, as the people of the middle ages affected to detect a Jew\rin the company, by the nose. Nor indeed can the whale possibly be\rotherwise than fragrant, when, as a general thing, he enjoys such high\rhealth; taking abundance of exercise; always out of doors; though, it\ris true, seldom in the open air. I say, that the motion of a Sperm\rWhale’s flukes above water dispenses a perfume, as when a musk-scented\rlady rustles her dress in a warm parlor. What then shall I liken the\rSperm Whale to for fragrance, considering his magnitude? Must it not be\rto that famous elephant, with jewelled tusks, and redolent with myrrh,\rwhich was led out of an Indian town to do honor to Alexander the Great?\r\r\rCHAPTER 93. The Castaway.\r\rIt was but some few days after encountering the Frenchman, that a most\rsignificant event befell the most insignificant of the Pequod’s crew;\ran event most lamentable; and which ended in providing the sometimes\rmadly merry and predestinated craft with a living and ever accompanying\rprophecy of whatever shattered sequel might prove her own.\r\rNow, in the whale ship, it is not every one that goes in the boats.\rSome few hands are reserved called ship-keepers, whose province it is\rto work the vessel while the boats are pursuing the whale. As a general\rthing, these ship-keepers are as hardy fellows as the men comprising\rthe boats’ crews. But if there happen to be an unduly slender, clumsy,\ror timorous wight in the ship, that wight is certain to be made a\rship-keeper. It was so in the Pequod with the little negro Pippin by\rnick-name, Pip by abbreviation. Poor Pip! ye have heard of him before;\rye must remember his tambourine on that dramatic midnight, so\rgloomy-jolly.\r\rIn outer aspect, Pip and Dough-Boy made a match, like a black pony and\ra white one, of equal developments, though of dissimilar colour, driven\rin one eccentric span. But while hapless Dough-Boy was by nature dull\rand torpid in his intellects, Pip, though over tender-hearted, was at\rbottom very bright, with that pleasant, genial, jolly brightness\rpeculiar to his tribe; a tribe, which ever enjoy all holidays and\rfestivities with finer, freer relish than any other race. For blacks,\rthe year’s calendar should show naught but three hundred and sixty-five\rFourth of Julys and New Year’s Days. Nor smile so, while I write that\rthis little black was brilliant, for even blackness has its brilliancy;\rbehold yon lustrous ebony, panelled in king’s cabinets. But Pip loved\rlife, and all life’s peaceable securities; so that the panic-striking\rbusiness in which he had somehow unaccountably become entrapped, had\rmost sadly blurred his brightness; though, as ere long will be seen,\rwhat was thus temporarily subdued in him, in the end was destined to be\rluridly illumined by strange wild fires, that fictitiously showed him\roff to ten times the natural lustre with which in his native Tolland\rCounty in Connecticut, he had once enlivened many a fiddler’s frolic on\rthe green; and at melodious even-tide, with his gay ha-ha! had turned\rthe round horizon into one star-belled tambourine. So, though in the\rclear air of day, suspended against a blue-veined neck, the\rpure-watered diamond drop will healthful glow; yet, when the cunning\rjeweller would show you the diamond in its most impressive lustre, he\rlays it against a gloomy ground, and then lights it up, not by the sun,\rbut by some unnatural gases. Then come out those fiery effulgences,\rinfernally superb; then the evil-blazing diamond, once the divinest\rsymbol of the crystal skies, looks like some crown-jewel stolen from\rthe King of Hell. But let us to the story.\r\rIt came to pass, that in the ambergris affair Stubb’s after-oarsman\rchanced so to sprain his hand, as for a time to become quite maimed;\rand, temporarily, Pip was put into his place.\r\rThe first time Stubb lowered with him, Pip evinced much nervousness;\rbut happily, for that time, escaped close contact with the whale; and\rtherefore came off not altogether discreditably; though Stubb observing\rhim, took care, afterwards, to exhort him to cherish his courageousness\rto the utmost, for he might often find it needful.\r\rNow upon the second lowering, the boat paddled upon the whale; and as\rthe fish received the darted iron, it gave its customary rap, which\rhappened, in this instance, to be right under poor Pip’s seat. The\rinvoluntary consternation of the moment caused him to leap, paddle in\rhand, out of the boat; and in such a way, that part of the slack whale\rline coming against his chest, he breasted it overboard with him, so as\rto become entangled in it, when at last plumping into the water. That\rinstant the stricken whale started on a fierce run, the line swiftly\rstraightened; and presto! poor Pip came all foaming up to the chocks of\rthe boat, remorselessly dragged there by the line, which had taken\rseveral turns around his chest and neck.\r\rTashtego stood in the bows. He was full of the fire of the hunt. He\rhated Pip for a poltroon. Snatching the boat-knife from its sheath, he\rsuspended its sharp edge over the line, and turning towards Stubb,\rexclaimed interrogatively, “Cut?” Meantime Pip’s blue, choked face\rplainly looked, Do, for God’s sake! All passed in a flash. In less than\rhalf a minute, this entire thing happened.\r\r“Damn him, cut!” roared Stubb; and so the whale was lost and Pip was\rsaved.\r\rSo soon as he recovered himself, the poor little negro was assailed by\ryells and execrations from the crew. Tranquilly permitting these\rirregular cursings to evaporate, Stubb then in a plain, business-like,\rbut still half humorous manner, cursed Pip officially; and that done,\runofficially gave him much wholesome advice. The substance was, Never\rjump from a boat, Pip, except—but all the rest was indefinite, as the\rsoundest advice ever is. Now, in general, _Stick to the boat_, is your\rtrue motto in whaling; but cases will sometimes happen when _Leap from\rthe boat_, is still better. Moreover, as if perceiving at last that if\rhe should give undiluted conscientious advice to Pip, he would be\rleaving him too wide a margin to jump in for the future; Stubb suddenly\rdropped all advice, and concluded with a peremptory command, “Stick to\rthe boat, Pip, or by the Lord, I won’t pick you up if you jump; mind\rthat. We can’t afford to lose whales by the likes of you; a whale would\rsell for thirty times what you would, Pip, in Alabama. Bear that in\rmind, and don’t jump any more.” Hereby perhaps Stubb indirectly hinted,\rthat though man loved his fellow, yet man is a money-making animal,\rwhich propensity too often interferes with his benevolence.\r\rBut we are all in the hands of the Gods; and Pip jumped again. It was\runder very similar circumstances to the first performance; but this\rtime he did not breast out the line; and hence, when the whale started\rto run, Pip was left behind on the sea, like a hurried traveller’s\rtrunk. Alas! Stubb was but too true to his word. It was a beautiful,\rbounteous, blue day; the spangled sea calm and cool, and flatly\rstretching away, all round, to the horizon, like gold-beater’s skin\rhammered out to the extremest. Bobbing up and down in that sea, Pip’s\rebon head showed like a head of cloves. No boat-knife was lifted when\rhe fell so rapidly astern. Stubb’s inexorable back was turned upon him;\rand the whale was winged. In three minutes, a whole mile of shoreless\rocean was between Pip and Stubb. Out from the centre of the sea, poor\rPip turned his crisp, curling, black head to the sun, another lonely\rcastaway, though the loftiest and the brightest.\r\rNow, in calm weather, to swim in the open ocean is as easy to the\rpractised swimmer as to ride in a spring-carriage ashore. But the awful\rlonesomeness is intolerable. The intense concentration of self in the\rmiddle of such a heartless immensity, my God! who can tell it? Mark,\rhow when sailors in a dead calm bathe in the open sea—mark how closely\rthey hug their ship and only coast along her sides.\r\rBut had Stubb really abandoned the poor little negro to his fate? No;\rhe did not mean to, at least. Because there were two boats in his wake,\rand he supposed, no doubt, that they would of course come up to Pip\rvery quickly, and pick him up; though, indeed, such considerations\rtowards oarsmen jeopardized through their own timidity, is not always\rmanifested by the hunters in all similar instances; and such instances\rnot unfrequently occur; almost invariably in the fishery, a coward, so\rcalled, is marked with the same ruthless detestation peculiar to\rmilitary navies and armies.\r\rBut it so happened, that those boats, without seeing Pip, suddenly\rspying whales close to them on one side, turned, and gave chase; and\rStubb’s boat was now so far away, and he and all his crew so intent\rupon his fish, that Pip’s ringed horizon began to expand around him\rmiserably. By the merest chance the ship itself at last rescued him;\rbut from that hour the little negro went about the deck an idiot; such,\rat least, they said he was. The sea had jeeringly kept his finite body\rup, but drowned the infinite of his soul. Not drowned entirely, though.\rRather carried down alive to wondrous depths, where strange shapes of\rthe unwarped primal world glided to and fro before his passive eyes;\rand the miser-merman, Wisdom, revealed his hoarded heaps; and among the\rjoyous, heartless, ever-juvenile eternities, Pip saw the multitudinous,\rGod-omnipresent, coral insects, that out of the firmament of waters\rheaved the colossal orbs. He saw God’s foot upon the treadle of the\rloom, and spoke it; and therefore his shipmates called him mad. So\rman’s insanity is heaven’s sense; and wandering from all mortal reason,\rman comes at last to that celestial thought, which, to reason, is\rabsurd and frantic; and weal or woe, feels then uncompromised,\rindifferent as his God.\r\rFor the rest, blame not Stubb too hardly. The thing is common in that\rfishery; and in the sequel of the narrative, it will then be seen what\rlike abandonment befell myself.\r\r\rCHAPTER 94. A Squeeze of the Hand.\r\rThat whale of Stubb’s, so dearly purchased, was duly brought to the\rPequod’s side, where all those cutting and hoisting operations\rpreviously detailed, were regularly gone through, even to the baling of\rthe Heidelburgh Tun, or Case.\r\rWhile some were occupied with this latter duty, others were employed in\rdragging away the larger tubs, so soon as filled with the sperm; and\rwhen the proper time arrived, this same sperm was carefully manipulated\rere going to the try-works, of which anon.\r\rIt had cooled and crystallized to such a degree, that when, with\rseveral others, I sat down before a large Constantine’s bath of it, I\rfound it strangely concreted into lumps, here and there rolling about\rin the liquid part. It was our business to squeeze these lumps back\rinto fluid. A sweet and unctuous duty! No wonder that in old times this\rsperm was such a favourite cosmetic. Such a clearer! such a sweetener!\rsuch a softener! such a delicious molifier! After having my hands in it\rfor only a few minutes, my fingers felt like eels, and began, as it\rwere, to serpentine and spiralise.\r\rAs I sat there at my ease, cross-legged on the deck; after the bitter\rexertion at the windlass; under a blue tranquil sky; the ship under\rindolent sail, and gliding so serenely along; as I bathed my hands\ramong those soft, gentle globules of infiltrated tissues, woven almost\rwithin the hour; as they richly broke to my fingers, and discharged all\rtheir opulence, like fully ripe grapes their wine; as I snuffed up that\runcontaminated aroma,—literally and truly, like the smell of spring\rviolets; I declare to you, that for the time I lived as in a musky\rmeadow; I forgot all about our horrible oath; in that inexpressible\rsperm, I washed my hands and my heart of it; I almost began to credit\rthe old Paracelsan superstition that sperm is of rare virtue in\rallaying the heat of anger; while bathing in that bath, I felt divinely\rfree from all ill-will, or petulance, or malice, of any sort\rwhatsoever.\r\rSqueeze! squeeze! squeeze! all the morning long; I squeezed that sperm\rtill I myself almost melted into it; I squeezed that sperm till a\rstrange sort of insanity came over me; and I found myself unwittingly\rsqueezing my co-laborers’ hands in it, mistaking their hands for the\rgentle globules. Such an abounding, affectionate, friendly, loving\rfeeling did this avocation beget; that at last I was continually\rsqueezing their hands, and looking up into their eyes sentimentally; as\rmuch as to say,—Oh! my dear fellow beings, why should we longer cherish\rany social acerbities, or know the slightest ill-humor or envy! Come;\rlet us squeeze hands all round; nay, let us all squeeze ourselves into\reach other; let us squeeze ourselves universally into the very milk and\rsperm of kindness.\r\rWould that I could keep squeezing that sperm for ever! For now, since\rby many prolonged, repeated experiences, I have perceived that in all\rcases man must eventually lower, or at least shift, his conceit of\rattainable felicity; not placing it anywhere in the intellect or the\rfancy; but in the wife, the heart, the bed, the table, the saddle, the\rfireside, the country; now that I have perceived all this, I am ready\rto squeeze case eternally. In thoughts of the visions of the night, I\rsaw long rows of angels in paradise, each with his hands in a jar of\rspermaceti.\r\rNow, while discoursing of sperm, it behooves to speak of other things\rakin to it, in the business of preparing the sperm whale for the\rtry-works.\r\rFirst comes white-horse, so called, which is obtained from the tapering\rpart of the fish, and also from the thicker portions of his flukes. It\ris tough with congealed tendons—a wad of muscle—but still contains some\roil. After being severed from the whale, the white-horse is first cut\rinto portable oblongs ere going to the mincer. They look much like\rblocks of Berkshire marble.\r\rPlum-pudding is the term bestowed upon certain fragmentary parts of the\rwhale’s flesh, here and there adhering to the blanket of blubber, and\roften participating to a considerable degree in its unctuousness. It is\ra most refreshing, convivial, beautiful object to behold. As its name\rimports, it is of an exceedingly rich, mottled tint, with a bestreaked\rsnowy and golden ground, dotted with spots of the deepest crimson and\rpurple. It is plums of rubies, in pictures of citron. Spite of reason,\rit is hard to keep yourself from eating it. I confess, that once I\rstole behind the foremast to try it. It tasted something as I should\rconceive a royal cutlet from the thigh of Louis le Gros might have\rtasted, supposing him to have been killed the first day after the\rvenison season, and that particular venison season contemporary with an\runusually fine vintage of the vineyards of Champagne.\r\rThere is another substance, and a very singular one, which turns up in\rthe course of this business, but which I feel it to be very puzzling\radequately to describe. It is called slobgollion; an appellation\roriginal with the whalemen, and even so is the nature of the substance.\rIt is an ineffably oozy, stringy affair, most frequently found in the\rtubs of sperm, after a prolonged squeezing, and subsequent decanting. I\rhold it to be the wondrously thin, ruptured membranes of the case,\rcoalescing.\r\rGurry, so called, is a term properly belonging to right whalemen, but\rsometimes incidentally used by the sperm fishermen. It designates the\rdark, glutinous substance which is scraped off the back of the\rGreenland or right whale, and much of which covers the decks of those\rinferior souls who hunt that ignoble Leviathan.\r\rNippers. Strictly this word is not indigenous to the whale’s\rvocabulary. But as applied by whalemen, it becomes so. A whaleman’s\rnipper is a short firm strip of tendinous stuff cut from the tapering\rpart of Leviathan’s tail: it averages an inch in thickness, and for the\rrest, is about the size of the iron part of a hoe. Edgewise moved along\rthe oily deck, it operates like a leathern squilgee; and by nameless\rblandishments, as of magic, allures along with it all impurities.\r\rBut to learn all about these recondite matters, your best way is at\ronce to descend into the blubber-room, and have a long talk with its\rinmates. This place has previously been mentioned as the receptacle for\rthe blanket-pieces, when stript and hoisted from the whale. When the\rproper time arrives for cutting up its contents, this apartment is a\rscene of terror to all tyros, especially by night. On one side, lit by\ra dull lantern, a space has been left clear for the workmen. They\rgenerally go in pairs,—a pike-and-gaffman and a spade-man. The\rwhaling-pike is similar to a frigate’s boarding-weapon of the same\rname. The gaff is something like a boat-hook. With his gaff, the\rgaffman hooks on to a sheet of blubber, and strives to hold it from\rslipping, as the ship pitches and lurches about. Meanwhile, the\rspade-man stands on the sheet itself, perpendicularly chopping it into\rthe portable horse-pieces. This spade is sharp as hone can make it; the\rspademan’s feet are shoeless; the thing he stands on will sometimes\rirresistibly slide away from him, like a sledge. If he cuts off one of\rhis own toes, or one of his assistants’, would you be very much\rastonished? Toes are scarce among veteran blubber-room men.\r\r\rCHAPTER 95. The Cassock.\r\rHad you stepped on board the Pequod at a certain juncture of this\rpost-mortemizing of the whale; and had you strolled forward nigh the\rwindlass, pretty sure am I that you would have scanned with no small\rcuriosity a very strange, enigmatical object, which you would have seen\rthere, lying along lengthwise in the lee scuppers. Not the wondrous\rcistern in the whale’s huge head; not the prodigy of his unhinged lower\rjaw; not the miracle of his symmetrical tail; none of these would so\rsurprise you, as half a glimpse of that unaccountable cone,—longer than\ra Kentuckian is tall, nigh a foot in diameter at the base, and\rjet-black as Yojo, the ebony idol of Queequeg. And an idol, indeed, it\ris; or, rather, in old times, its likeness was. Such an idol as that\rfound in the secret groves of Queen Maachah in Judea; and for\rworshipping which, King Asa, her son, did depose her, and destroyed the\ridol, and burnt it for an abomination at the brook Kedron, as darkly\rset forth in the 15th chapter of the First Book of Kings.\r\rLook at the sailor, called the mincer, who now comes along, and\rassisted by two allies, heavily backs the grandissimus, as the mariners\rcall it, and with bowed shoulders, staggers off with it as if he were a\rgrenadier carrying a dead comrade from the field. Extending it upon the\rforecastle deck, he now proceeds cylindrically to remove its dark pelt,\ras an African hunter the pelt of a boa. This done he turns the pelt\rinside out, like a pantaloon leg; gives it a good stretching, so as\ralmost to double its diameter; and at last hangs it, well spread, in\rthe rigging, to dry. Ere long, it is taken down; when removing some\rthree feet of it, towards the pointed extremity, and then cutting two\rslits for arm-holes at the other end, he lengthwise slips himself\rbodily into it. The mincer now stands before you invested in the full\rcanonicals of his calling. Immemorial to all his order, this\rinvestiture alone will adequately protect him, while employed in the\rpeculiar functions of his office.\r\rThat office consists in mincing the horse-pieces of blubber for the\rpots; an operation which is conducted at a curious wooden horse,\rplanted endwise against the bulwarks, and with a capacious tub beneath\rit, into which the minced pieces drop, fast as the sheets from a rapt\rorator’s desk. Arrayed in decent black; occupying a conspicuous pulpit;\rintent on bible leaves; what a candidate for an archbishopric, what a\rlad for a Pope were this mincer!*\r\r*Bible leaves! Bible leaves! This is the invariable cry from the mates\rto the mincer. It enjoins him to be careful, and cut his work into as\rthin slices as possible, inasmuch as by so doing the business of\rboiling out the oil is much accelerated, and its quantity considerably\rincreased, besides perhaps improving it in quality.\r\r\rCHAPTER 96. The Try-Works.\r\rBesides her hoisted boats, an American whaler is outwardly\rdistinguished by her try-works. She presents the curious anomaly of the\rmost solid masonry joining with oak and hemp in constituting the\rcompleted ship. It is as if from the open field a brick-kiln were\rtransported to her planks.\r\rThe try-works are planted between the foremast and mainmast, the most\rroomy part of the deck. The timbers beneath are of a peculiar strength,\rfitted to sustain the weight of an almost solid mass of brick and\rmortar, some ten feet by eight square, and five in height. The\rfoundation does not penetrate the deck, but the masonry is firmly\rsecured to the surface by ponderous knees of iron bracing it on all\rsides, and screwing it down to the timbers. On the flanks it is cased\rwith wood, and at top completely covered by a large, sloping, battened\rhatchway. Removing this hatch we expose the great try-pots, two in\rnumber, and each of several barrels’ capacity. When not in use, they\rare kept remarkably clean. Sometimes they are polished with soapstone\rand sand, till they shine within like silver punch-bowls. During the\rnight-watches some cynical old sailors will crawl into them and coil\rthemselves away there for a nap. While employed in polishing them—one\rman in each pot, side by side—many confidential communications are\rcarried on, over the iron lips. It is a place also for profound\rmathematical meditation. It was in the left hand try-pot of the Pequod,\rwith the soapstone diligently circling round me, that I was first\rindirectly struck by the remarkable fact, that in geometry all bodies\rgliding along the cycloid, my soapstone for example, will descend from\rany point in precisely the same time.\r\rRemoving the fire-board from the front of the try-works, the bare\rmasonry of that side is exposed, penetrated by the two iron mouths of\rthe furnaces, directly underneath the pots. These mouths are fitted\rwith heavy doors of iron. The intense heat of the fire is prevented\rfrom communicating itself to the deck, by means of a shallow reservoir\rextending under the entire inclosed surface of the works. By a tunnel\rinserted at the rear, this reservoir is kept replenished with water as\rfast as it evaporates. There are no external chimneys; they open direct\rfrom the rear wall. And here let us go back for a moment.\r\rIt was about nine o’clock at night that the Pequod’s try-works were\rfirst started on this present voyage. It belonged to Stubb to oversee\rthe business.\r\r“All ready there? Off hatch, then, and start her. You cook, fire the\rworks.” This was an easy thing, for the carpenter had been thrusting\rhis shavings into the furnace throughout the passage. Here be it said\rthat in a whaling voyage the first fire in the try-works has to be fed\rfor a time with wood. After that no wood is used, except as a means of\rquick ignition to the staple fuel. In a word, after being tried out,\rthe crisp, shrivelled blubber, now called scraps or fritters, still\rcontains considerable of its unctuous properties. These fritters feed\rthe flames. Like a plethoric burning martyr, or a self-consuming\rmisanthrope, once ignited, the whale supplies his own fuel and burns by\rhis own body. Would that he consumed his own smoke! for his smoke is\rhorrible to inhale, and inhale it you must, and not only that, but you\rmust live in it for the time. It has an unspeakable, wild, Hindoo odor\rabout it, such as may lurk in the vicinity of funereal pyres. It smells\rlike the left wing of the day of judgment; it is an argument for the\rpit.\r\rBy midnight the works were in full operation. We were clear from the\rcarcase; sail had been made; the wind was freshening; the wild ocean\rdarkness was intense. But that darkness was licked up by the fierce\rflames, which at intervals forked forth from the sooty flues, and\rilluminated every lofty rope in the rigging, as with the famed Greek\rfire. The burning ship drove on, as if remorselessly commissioned to\rsome vengeful deed. So the pitch and sulphur-freighted brigs of the\rbold Hydriote, Canaris, issuing from their midnight harbors, with broad\rsheets of flame for sails, bore down upon the Turkish frigates, and\rfolded them in conflagrations.\r\rThe hatch, removed from the top of the works, now afforded a wide\rhearth in front of them. Standing on this were the Tartarean shapes of\rthe pagan harpooneers, always the whale-ship’s stokers. With huge\rpronged poles they pitched hissing masses of blubber into the scalding\rpots, or stirred up the fires beneath, till the snaky flames darted,\rcurling, out of the doors to catch them by the feet. The smoke rolled\raway in sullen heaps. To every pitch of the ship there was a pitch of\rthe boiling oil, which seemed all eagerness to leap into their faces.\rOpposite the mouth of the works, on the further side of the wide wooden\rhearth, was the windlass. This served for a sea-sofa. Here lounged the\rwatch, when not otherwise employed, looking into the red heat of the\rfire, till their eyes felt scorched in their heads. Their tawny\rfeatures, now all begrimed with smoke and sweat, their matted beards,\rand the contrasting barbaric brilliancy of their teeth, all these were\rstrangely revealed in the capricious emblazonings of the works. As they\rnarrated to each other their unholy adventures, their tales of terror\rtold in words of mirth; as their uncivilized laughter forked upwards\rout of them, like the flames from the furnace; as to and fro, in their\rfront, the harpooneers wildly gesticulated with their huge pronged\rforks and dippers; as the wind howled on, and the sea leaped, and the\rship groaned and dived, and yet steadfastly shot her red hell further\rand further into the blackness of the sea and the night, and scornfully\rchamped the white bone in her mouth, and viciously spat round her on\rall sides; then the rushing Pequod, freighted with savages, and laden\rwith fire, and burning a corpse, and plunging into that blackness of\rdarkness, seemed the material counterpart of her monomaniac commander’s\rsoul.\r\rSo seemed it to me, as I stood at her helm, and for long hours silently\rguided the way of this fire-ship on the sea. Wrapped, for that\rinterval, in darkness myself, I but the better saw the redness, the\rmadness, the ghastliness of others. The continual sight of the fiend\rshapes before me, capering half in smoke and half in fire, these at\rlast begat kindred visions in my soul, so soon as I began to yield to\rthat unaccountable drowsiness which ever would come over me at a\rmidnight helm.\r\rBut that night, in particular, a strange (and ever since inexplicable)\rthing occurred to me. Starting from a brief standing sleep, I was\rhorribly conscious of something fatally wrong. The jaw-bone tiller\rsmote my side, which leaned against it; in my ears was the low hum of\rsails, just beginning to shake in the wind; I thought my eyes were\ropen; I was half conscious of putting my fingers to the lids and\rmechanically stretching them still further apart. But, spite of all\rthis, I could see no compass before me to steer by; though it seemed\rbut a minute since I had been watching the card, by the steady binnacle\rlamp illuminating it. Nothing seemed before me but a jet gloom, now and\rthen made ghastly by flashes of redness. Uppermost was the impression,\rthat whatever swift, rushing thing I stood on was not so much bound to\rany haven ahead as rushing from all havens astern. A stark, bewildered\rfeeling, as of death, came over me. Convulsively my hands grasped the\rtiller, but with the crazy conceit that the tiller was, somehow, in\rsome enchanted way, inverted. My God! what is the matter with me?\rthought I. Lo! in my brief sleep I had turned myself about, and was\rfronting the ship’s stern, with my back to her prow and the compass. In\ran instant I faced back, just in time to prevent the vessel from flying\rup into the wind, and very probably capsizing her. How glad and how\rgrateful the relief from this unnatural hallucination of the night, and\rthe fatal contingency of being brought by the lee!\r\rLook not too long in the face of the fire, O man! Never dream with thy\rhand on the helm! Turn not thy back to the compass; accept the first\rhint of the hitching tiller; believe not the artificial fire, when its\rredness makes all things look ghastly. To-morrow, in the natural sun,\rthe skies will be bright; those who glared like devils in the forking\rflames, the morn will show in far other, at least gentler, relief; the\rglorious, golden, glad sun, the only true lamp—all others but liars!\r\rNevertheless the sun hides not Virginia’s Dismal Swamp, nor Rome’s\raccursed Campagna, nor wide Sahara, nor all the millions of miles of\rdeserts and of griefs beneath the moon. The sun hides not the ocean,\rwhich is the dark side of this earth, and which is two thirds of this\rearth. So, therefore, that mortal man who hath more of joy than sorrow\rin him, that mortal man cannot be true—not true, or undeveloped. With\rbooks the same. The truest of all men was the Man of Sorrows, and the\rtruest of all books is Solomon’s, and Ecclesiastes is the fine hammered\rsteel of woe. “All is vanity.” ALL. This wilful world hath not got hold\rof unchristian Solomon’s wisdom yet. But he who dodges hospitals and\rjails, and walks fast crossing graveyards, and would rather talk of\roperas than hell; calls Cowper, Young, Pascal, Rousseau, poor devils\rall of sick men; and throughout a care-free lifetime swears by Rabelais\ras passing wise, and therefore jolly;—not that man is fitted to sit\rdown on tomb-stones, and break the green damp mould with unfathomably\rwondrous Solomon.\r\rBut even Solomon, he says, “the man that wandereth out of the way of\runderstanding shall remain” (_i.e._, even while living) “in the\rcongregation of the dead.” Give not thyself up, then, to fire, lest it\rinvert thee, deaden thee; as for the time it did me. There is a wisdom\rthat is woe; but there is a woe that is madness. And there is a\rCatskill eagle in some souls that can alike dive down into the blackest\rgorges, and soar out of them again and become invisible in the sunny\rspaces. And even if he for ever flies within the gorge, that gorge is\rin the mountains; so that even in his lowest swoop the mountain eagle\ris still higher than other birds upon the plain, even though they soar.\r\r\rCHAPTER 97. The Lamp.\r\rHad you descended from the Pequod’s try-works to the Pequod’s\rforecastle, where the off duty watch were sleeping, for one single\rmoment you would have almost thought you were standing in some\rilluminated shrine of canonized kings and counsellors. There they lay\rin their triangular oaken vaults, each mariner a chiselled muteness; a\rscore of lamps flashing upon his hooded eyes.\r\rIn merchantmen, oil for the sailor is more scarce than the milk of\rqueens. To dress in the dark, and eat in the dark, and stumble in\rdarkness to his pallet, this is his usual lot. But the whaleman, as he\rseeks the food of light, so he lives in light. He makes his berth an\rAladdin’s lamp, and lays him down in it; so that in the pitchiest night\rthe ship’s black hull still houses an illumination.\r\rSee with what entire freedom the whaleman takes his handful of\rlamps—often but old bottles and vials, though—to the copper cooler at\rthe try-works, and replenishes them there, as mugs of ale at a vat. He\rburns, too, the purest of oil, in its unmanufactured, and, therefore,\runvitiated state; a fluid unknown to solar, lunar, or astral\rcontrivances ashore. It is sweet as early grass butter in April. He\rgoes and hunts for his oil, so as to be sure of its freshness and\rgenuineness, even as the traveller on the prairie hunts up his own\rsupper of game.\r\r\rCHAPTER 98. Stowing Down and Clearing Up.\r\rAlready has it been related how the great leviathan is afar off\rdescried from the mast-head; how he is chased over the watery moors,\rand slaughtered in the valleys of the deep; how he is then towed\ralongside and beheaded; and how (on the principle which entitled the\rheadsman of old to the garments in which the beheaded was killed) his\rgreat padded surtout becomes the property of his executioner; how, in\rdue time, he is condemned to the pots, and, like Shadrach, Meshach, and\rAbednego, his spermaceti, oil, and bone pass unscathed through the\rfire;—but now it remains to conclude the last chapter of this part of\rthe description by rehearsing—singing, if I may—the romantic proceeding\rof decanting off his oil into the casks and striking them down into the\rhold, where once again leviathan returns to his native profundities,\rsliding along beneath the surface as before; but, alas! never more to\rrise and blow.\r\rWhile still warm, the oil, like hot punch, is received into the\rsix-barrel casks; and while, perhaps, the ship is pitching and rolling\rthis way and that in the midnight sea, the enormous casks are slewed\rround and headed over, end for end, and sometimes perilously scoot\racross the slippery deck, like so many land slides, till at last\rman-handled and stayed in their course; and all round the hoops, rap,\rrap, go as many hammers as can play upon them, for now, _ex officio_,\revery sailor is a cooper.\r\rAt length, when the last pint is casked, and all is cool, then the\rgreat hatchways are unsealed, the bowels of the ship are thrown open,\rand down go the casks to their final rest in the sea. This done, the\rhatches are replaced, and hermetically closed, like a closet walled up.\r\rIn the sperm fishery, this is perhaps one of the most remarkable\rincidents in all the business of whaling. One day the planks stream\rwith freshets of blood and oil; on the sacred quarter-deck enormous\rmasses of the whale’s head are profanely piled; great rusty casks lie\rabout, as in a brewery yard; the smoke from the try-works has besooted\rall the bulwarks; the mariners go about suffused with unctuousness; the\rentire ship seems great leviathan himself; while on all hands the din\ris deafening.\r\rBut a day or two after, you look about you, and prick your ears in this\rself-same ship; and were it not for the tell-tale boats and try-works,\ryou would all but swear you trod some silent merchant vessel, with a\rmost scrupulously neat commander. The unmanufactured sperm oil\rpossesses a singularly cleansing virtue. This is the reason why the\rdecks never look so white as just after what they call an affair of\roil. Besides, from the ashes of the burned scraps of the whale, a\rpotent lye is readily made; and whenever any adhesiveness from the back\rof the whale remains clinging to the side, that lye quickly\rexterminates it. Hands go diligently along the bulwarks, and with\rbuckets of water and rags restore them to their full tidiness. The soot\ris brushed from the lower rigging. All the numerous implements which\rhave been in use are likewise faithfully cleansed and put away. The\rgreat hatch is scrubbed and placed upon the try-works, completely\rhiding the pots; every cask is out of sight; all tackles are coiled in\runseen nooks; and when by the combined and simultaneous industry of\ralmost the entire ship’s company, the whole of this conscientious duty\ris at last concluded, then the crew themselves proceed to their own\rablutions; shift themselves from top to toe; and finally issue to the\rimmaculate deck, fresh and all aglow, as bridegrooms new-leaped from\rout the daintiest Holland.\r\rNow, with elated step, they pace the planks in twos and threes, and\rhumorously discourse of parlors, sofas, carpets, and fine cambrics;\rpropose to mat the deck; think of having hanging to the top; object not\rto taking tea by moonlight on the piazza of the forecastle. To hint to\rsuch musked mariners of oil, and bone, and blubber, were little short\rof audacity. They know not the thing you distantly allude to. Away, and\rbring us napkins!\r\rBut mark: aloft there, at the three mast heads, stand three men intent\ron spying out more whales, which, if caught, infallibly will again soil\rthe old oaken furniture, and drop at least one small grease-spot\rsomewhere. Yes; and many is the time, when, after the severest\runinterrupted labors, which know no night; continuing straight through\rfor ninety-six hours; when from the boat, where they have swelled their\rwrists with all day rowing on the Line,—they only step to the deck to\rcarry vast chains, and heave the heavy windlass, and cut and slash,\ryea, and in their very sweatings to be smoked and burned anew by the\rcombined fires of the equatorial sun and the equatorial try-works;\rwhen, on the heel of all this, they have finally bestirred themselves\rto cleanse the ship, and make a spotless dairy room of it; many is the\rtime the poor fellows, just buttoning the necks of their clean frocks,\rare startled by the cry of “There she blows!” and away they fly to\rfight another whale, and go through the whole weary thing again. Oh! my\rfriends, but this is man-killing! Yet this is life. For hardly have we\rmortals by long toilings extracted from this world’s vast bulk its\rsmall but valuable sperm; and then, with weary patience, cleansed\rourselves from its defilements, and learned to live here in clean\rtabernacles of the soul; hardly is this done, when—_There she\rblows!_—the ghost is spouted up, and away we sail to fight some other\rworld, and go through young life’s old routine again.\r\rOh! the metempsychosis! Oh! Pythagoras, that in bright Greece, two\rthousand years ago, did die, so good, so wise, so mild; I sailed with\rthee along the Peruvian coast last voyage—and, foolish as I am, taught\rthee, a green simple boy, how to splice a rope!\r\r\rCHAPTER 99. The Doubloon.\r\rEre now it has been related how Ahab was wont to pace his quarter-deck,\rtaking regular turns at either limit, the binnacle and mainmast; but in\rthe multiplicity of other things requiring narration it has not been\radded how that sometimes in these walks, when most plunged in his mood,\rhe was wont to pause in turn at each spot, and stand there strangely\reyeing the particular object before him. When he halted before the\rbinnacle, with his glance fastened on the pointed needle in the\rcompass, that glance shot like a javelin with the pointed intensity of\rhis purpose; and when resuming his walk he again paused before the\rmainmast, then, as the same riveted glance fastened upon the riveted\rgold coin there, he still wore the same aspect of nailed firmness, only\rdashed with a certain wild longing, if not hopefulness.\r\rBut one morning, turning to pass the doubloon, he seemed to be newly\rattracted by the strange figures and inscriptions stamped on it, as\rthough now for the first time beginning to interpret for himself in\rsome monomaniac way whatever significance might lurk in them. And some\rcertain significance lurks in all things, else all things are little\rworth, and the round world itself but an empty cipher, except to sell\rby the cartload, as they do hills about Boston, to fill up some morass\rin the Milky Way.\r\rNow this doubloon was of purest, virgin gold, raked somewhere out of\rthe heart of gorgeous hills, whence, east and west, over golden sands,\rthe head-waters of many a Pactolus flows. And though now nailed amidst\rall the rustiness of iron bolts and the verdigris of copper spikes,\ryet, untouchable and immaculate to any foulness, it still preserved its\rQuito glow. Nor, though placed amongst a ruthless crew and every hour\rpassed by ruthless hands, and through the livelong nights shrouded with\rthick darkness which might cover any pilfering approach, nevertheless\revery sunrise found the doubloon where the sunset left it last. For it\rwas set apart and sanctified to one awe-striking end; and however\rwanton in their sailor ways, one and all, the mariners revered it as\rthe white whale’s talisman. Sometimes they talked it over in the weary\rwatch by night, wondering whose it was to be at last, and whether he\rwould ever live to spend it.\r\rNow those noble golden coins of South America are as medals of the sun\rand tropic token-pieces. Here palms, alpacas, and volcanoes; sun’s\rdisks and stars; ecliptics, horns-of-plenty, and rich banners waving,\rare in luxuriant profusion stamped; so that the precious gold seems\ralmost to derive an added preciousness and enhancing glories, by\rpassing through those fancy mints, so Spanishly poetic.\r\rIt so chanced that the doubloon of the Pequod was a most wealthy\rexample of these things. On its round border it bore the letters,\rREPUBLICA DEL ECUADOR: QUITO. So this bright coin came from a country\rplanted in the middle of the world, and beneath the great equator, and\rnamed after it; and it had been cast midway up the Andes, in the\runwaning clime that knows no autumn. Zoned by those letters you saw the\rlikeness of three Andes’ summits; from one a flame; a tower on another;\ron the third a crowing cock; while arching over all was a segment of\rthe partitioned zodiac, the signs all marked with their usual\rcabalistics, and the keystone sun entering the equinoctial point at\rLibra.\r\rBefore this equatorial coin, Ahab, not unobserved by others, was now\rpausing.\r\r“There’s something ever egotistical in mountain-tops and towers, and\rall other grand and lofty things; look here,—three peaks as proud as\rLucifer. The firm tower, that is Ahab; the volcano, that is Ahab; the\rcourageous, the undaunted, and victorious fowl, that, too, is Ahab; all\rare Ahab; and this round gold is but the image of the rounder globe,\rwhich, like a magician’s glass, to each and every man in turn but\rmirrors back his own mysterious self. Great pains, small gains for\rthose who ask the world to solve them; it cannot solve itself. Methinks\rnow this coined sun wears a ruddy face; but see! aye, he enters the\rsign of storms, the equinox! and but six months before he wheeled out\rof a former equinox at Aries! From storm to storm! So be it, then. Born\rin throes, ’tis fit that man should live in pains and die in pangs! So\rbe it, then! Here’s stout stuff for woe to work on. So be it, then.”\r\r“No fairy fingers can have pressed the gold, but devil’s claws must\rhave left their mouldings there since yesterday,” murmured Starbuck to\rhimself, leaning against the bulwarks. “The old man seems to read\rBelshazzar’s awful writing. I have never marked the coin inspectingly.\rHe goes below; let me read. A dark valley between three mighty,\rheaven-abiding peaks, that almost seem the Trinity, in some faint\rearthly symbol. So in this vale of Death, God girds us round; and over\rall our gloom, the sun of Righteousness still shines a beacon and a\rhope. If we bend down our eyes, the dark vale shows her mouldy soil;\rbut if we lift them, the bright sun meets our glance half way, to\rcheer. Yet, oh, the great sun is no fixture; and if, at midnight, we\rwould fain snatch some sweet solace from him, we gaze for him in vain!\rThis coin speaks wisely, mildly, truly, but still sadly to me. I will\rquit it, lest Truth shake me falsely.”\r\r“There now’s the old Mogul,” soliloquized Stubb by the try-works, “he’s\rbeen twigging it; and there goes Starbuck from the same, and both with\rfaces which I should say might be somewhere within nine fathoms long.\rAnd all from looking at a piece of gold, which did I have it now on\rNegro Hill or in Corlaer’s Hook, I’d not look at it very long ere\rspending it. Humph! in my poor, insignificant opinion, I regard this as\rqueer. I have seen doubloons before now in my voyagings; your doubloons\rof old Spain, your doubloons of Peru, your doubloons of Chili, your\rdoubloons of Bolivia, your doubloons of Popayan; with plenty of gold\rmoidores and pistoles, and joes, and half joes, and quarter joes. What\rthen should there be in this doubloon of the Equator that is so killing\rwonderful? By Golconda! let me read it once. Halloa! here’s signs and\rwonders truly! That, now, is what old Bowditch in his Epitome calls the\rzodiac, and what my almanac below calls ditto. I’ll get the almanac and\ras I have heard devils can be raised with Daboll’s arithmetic, I’ll try\rmy hand at raising a meaning out of these queer curvicues here with the\rMassachusetts calendar. Here’s the book. Let’s see now. Signs and\rwonders; and the sun, he’s always among ’em. Hem, hem, hem; here they\rare—here they go—all alive:—Aries, or the Ram; Taurus, or the Bull and\rJimimi! here’s Gemini himself, or the Twins. Well; the sun he wheels\ramong ’em. Aye, here on the coin he’s just crossing the threshold\rbetween two of twelve sitting-rooms all in a ring. Book! you lie there;\rthe fact is, you books must know your places. You’ll do to give us the\rbare words and facts, but we come in to supply the thoughts. That’s my\rsmall experience, so far as the Massachusetts calendar, and Bowditch’s\rnavigator, and Daboll’s arithmetic go. Signs and wonders, eh? Pity if\rthere is nothing wonderful in signs, and significant in wonders!\rThere’s a clue somewhere; wait a bit; hist—hark! By Jove, I have it!\rLook you, Doubloon, your zodiac here is the life of man in one round\rchapter; and now I’ll read it off, straight out of the book. Come,\rAlmanack! To begin: there’s Aries, or the Ram—lecherous dog, he begets\rus; then, Taurus, or the Bull—he bumps us the first thing; then Gemini,\ror the Twins—that is, Virtue and Vice; we try to reach Virtue, when lo!\rcomes Cancer the Crab, and drags us back; and here, going from Virtue,\rLeo, a roaring Lion, lies in the path—he gives a few fierce bites and\rsurly dabs with his paw; we escape, and hail Virgo, the Virgin! that’s\rour first love; we marry and think to be happy for aye, when pop comes\rLibra, or the Scales—happiness weighed and found wanting; and while we\rare very sad about that, Lord! how we suddenly jump, as Scorpio, or the\rScorpion, stings us in the rear; we are curing the wound, when whang\rcome the arrows all round; Sagittarius, or the Archer, is amusing\rhimself. As we pluck out the shafts, stand aside! here’s the\rbattering-ram, Capricornus, or the Goat; full tilt, he comes rushing,\rand headlong we are tossed; when Aquarius, or the Water-bearer, pours\rout his whole deluge and drowns us; and to wind up with Pisces, or the\rFishes, we sleep. There’s a sermon now, writ in high heaven, and the\rsun goes through it every year, and yet comes out of it all alive and\rhearty. Jollily he, aloft there, wheels through toil and trouble; and\rso, alow here, does jolly Stubb. Oh, jolly’s the word for aye! Adieu,\rDoubloon! But stop; here comes little King-Post; dodge round the\rtry-works, now, and let’s hear what he’ll have to say. There; he’s\rbefore it; he’ll out with something presently. So, so; he’s beginning.”\r\r“I see nothing here, but a round thing made of gold, and whoever raises\ra certain whale, this round thing belongs to him. So, what’s all this\rstaring been about? It is worth sixteen dollars, that’s true; and at\rtwo cents the cigar, that’s nine hundred and sixty cigars. I won’t\rsmoke dirty pipes like Stubb, but I like cigars, and here’s nine\rhundred and sixty of them; so here goes Flask aloft to spy ’em out.”\r\r“Shall I call that wise or foolish, now; if it be really wise it has a\rfoolish look to it; yet, if it be really foolish, then has it a sort of\rwiseish look to it. But, avast; here comes our old Manxman—the old\rhearse-driver, he must have been, that is, before he took to the sea.\rHe luffs up before the doubloon; halloa, and goes round on the other\rside of the mast; why, there’s a horse-shoe nailed on that side; and\rnow he’s back again; what does that mean? Hark! he’s muttering—voice\rlike an old worn-out coffee-mill. Prick ears, and listen!”\r\r“If the White Whale be raised, it must be in a month and a day, when\rthe sun stands in some one of these signs. I’ve studied signs, and know\rtheir marks; they were taught me two score years ago, by the old witch\rin Copenhagen. Now, in what sign will the sun then be? The horse-shoe\rsign; for there it is, right opposite the gold. And what’s the\rhorse-shoe sign? The lion is the horse-shoe sign—the roaring and\rdevouring lion. Ship, old ship! my old head shakes to think of thee.”\r\r“There’s another rendering now; but still one text. All sorts of men in\rone kind of world, you see. Dodge again! here comes Queequeg—all\rtattooing—looks like the signs of the Zodiac himself. What says the\rCannibal? As I live he’s comparing notes; looking at his thigh bone;\rthinks the sun is in the thigh, or in the calf, or in the bowels, I\rsuppose, as the old women talk Surgeon’s Astronomy in the back country.\rAnd by Jove, he’s found something there in the vicinity of his thigh—I\rguess it’s Sagittarius, or the Archer. No: he don’t know what to make\rof the doubloon; he takes it for an old button off some king’s\rtrowsers. But, aside again! here comes that ghost-devil, Fedallah; tail\rcoiled out of sight as usual, oakum in the toes of his pumps as usual.\rWhat does he say, with that look of his? Ah, only makes a sign to the\rsign and bows himself; there is a sun on the coin—fire worshipper,\rdepend upon it. Ho! more and more. This way comes Pip—poor boy! would\rhe had died, or I; he’s half horrible to me. He too has been watching\rall of these interpreters—myself included—and look now, he comes to\rread, with that unearthly idiot face. Stand away again and hear him.\rHark!”\r\r“I look, you look, he looks; we look, ye look, they look.”\r\r“Upon my soul, he’s been studying Murray’s Grammar! Improving his mind,\rpoor fellow! But what’s that he says now—hist!”\r\r“I look, you look, he looks; we look, ye look, they look.”\r\r“Why, he’s getting it by heart—hist! again.”\r\r“I look, you look, he looks; we look, ye look, they look.”\r\r“Well, that’s funny.”\r\r“And I, you, and he; and we, ye, and they, are all bats; and I’m a\rcrow, especially when I stand a’top of this pine tree here. Caw! caw!\rcaw! caw! caw! caw! Ain’t I a crow? And where’s the scare-crow? There\rhe stands; two bones stuck into a pair of old trowsers, and two more\rpoked into the sleeves of an old jacket.”\r\r“Wonder if he means me?—complimentary!—poor lad!—I could go hang\rmyself. Any way, for the present, I’ll quit Pip’s vicinity. I can stand\rthe rest, for they have plain wits; but he’s too crazy-witty for my\rsanity. So, so, I leave him muttering.”\r\r“Here’s the ship’s navel, this doubloon here, and they are all on fire\rto unscrew it. But, unscrew your navel, and what’s the consequence?\rThen again, if it stays here, that is ugly, too, for when aught’s\rnailed to the mast it’s a sign that things grow desperate. Ha, ha! old\rAhab! the White Whale; he’ll nail ye! This is a pine tree. My father,\rin old Tolland county, cut down a pine tree once, and found a silver\rring grown over in it; some old darkey’s wedding ring. How did it get\rthere? And so they’ll say in the resurrection, when they come to fish\rup this old mast, and find a doubloon lodged in it, with bedded oysters\rfor the shaggy bark. Oh, the gold! the precious, precious, gold! the\rgreen miser’ll hoard ye soon! Hish! hish! God goes ’mong the worlds\rblackberrying. Cook! ho, cook! and cook us! Jenny! hey, hey, hey, hey,\rhey, Jenny, Jenny! and get your hoe-cake done!”\r\r\rCHAPTER 100. Leg and Arm.\r\rThe Pequod, of Nantucket, Meets the Samuel Enderby, of London.\r\r“Ship, ahoy! Hast seen the White Whale?”\r\rSo cried Ahab, once more hailing a ship showing English colours,\rbearing down under the stern. Trumpet to mouth, the old man was\rstanding in his hoisted quarter-boat, his ivory leg plainly revealed to\rthe stranger captain, who was carelessly reclining in his own boat’s\rbow. He was a darkly-tanned, burly, good-natured, fine-looking man, of\rsixty or thereabouts, dressed in a spacious roundabout, that hung round\rhim in festoons of blue pilot-cloth; and one empty arm of this jacket\rstreamed behind him like the broidered arm of a hussar’s surcoat.\r\r“Hast seen the White Whale?”\r\r“See you this?” and withdrawing it from the folds that had hidden it,\rhe held up a white arm of sperm whale bone, terminating in a wooden\rhead like a mallet.\r\r“Man my boat!” cried Ahab, impetuously, and tossing about the oars near\rhim—“Stand by to lower!”\r\rIn less than a minute, without quitting his little craft, he and his\rcrew were dropped to the water, and were soon alongside of the\rstranger. But here a curious difficulty presented itself. In the\rexcitement of the moment, Ahab had forgotten that since the loss of his\rleg he had never once stepped on board of any vessel at sea but his\rown, and then it was always by an ingenious and very handy mechanical\rcontrivance peculiar to the Pequod, and a thing not to be rigged and\rshipped in any other vessel at a moment’s warning. Now, it is no very\reasy matter for anybody—except those who are almost hourly used to it,\rlike whalemen—to clamber up a ship’s side from a boat on the open sea;\rfor the great swells now lift the boat high up towards the bulwarks,\rand then instantaneously drop it half way down to the kelson. So,\rdeprived of one leg, and the strange ship of course being altogether\runsupplied with the kindly invention, Ahab now found himself abjectly\rreduced to a clumsy landsman again; hopelessly eyeing the uncertain\rchangeful height he could hardly hope to attain.\r\rIt has before been hinted, perhaps, that every little untoward\rcircumstance that befell him, and which indirectly sprang from his\rluckless mishap, almost invariably irritated or exasperated Ahab. And\rin the present instance, all this was heightened by the sight of the\rtwo officers of the strange ship, leaning over the side, by the\rperpendicular ladder of nailed cleets there, and swinging towards him a\rpair of tastefully-ornamented man-ropes; for at first they did not seem\rto bethink them that a one-legged man must be too much of a cripple to\ruse their sea bannisters. But this awkwardness only lasted a minute,\rbecause the strange captain, observing at a glance how affairs stood,\rcried out, “I see, I see!—avast heaving there! Jump, boys, and swing\rover the cutting-tackle.”\r\rAs good luck would have it, they had had a whale alongside a day or two\rprevious, and the great tackles were still aloft, and the massive\rcurved blubber-hook, now clean and dry, was still attached to the end.\rThis was quickly lowered to Ahab, who at once comprehending it all,\rslid his solitary thigh into the curve of the hook (it was like sitting\rin the fluke of an anchor, or the crotch of an apple tree), and then\rgiving the word, held himself fast, and at the same time also helped to\rhoist his own weight, by pulling hand-over-hand upon one of the running\rparts of the tackle. Soon he was carefully swung inside the high\rbulwarks, and gently landed upon the capstan head. With his ivory arm\rfrankly thrust forth in welcome, the other captain advanced, and Ahab,\rputting out his ivory leg, and crossing the ivory arm (like two\rsword-fish blades) cried out in his walrus way, “Aye, aye, hearty! let\rus shake bones together!—an arm and a leg!—an arm that never can\rshrink, d’ye see; and a leg that never can run. Where did’st thou see\rthe White Whale?—how long ago?”\r\r“The White Whale,” said the Englishman, pointing his ivory arm towards\rthe East, and taking a rueful sight along it, as if it had been a\rtelescope; “there I saw him, on the Line, last season.”\r\r“And he took that arm off, did he?” asked Ahab, now sliding down from\rthe capstan, and resting on the Englishman’s shoulder, as he did so.\r\r“Aye, he was the cause of it, at least; and that leg, too?”\r\r“Spin me the yarn,” said Ahab; “how was it?”\r\r“It was the first time in my life that I ever cruised on the Line,”\rbegan the Englishman. “I was ignorant of the White Whale at that time.\rWell, one day we lowered for a pod of four or five whales, and my boat\rfastened to one of them; a regular circus horse he was, too, that went\rmilling and milling round so, that my boat’s crew could only trim dish,\rby sitting all their sterns on the outer gunwale. Presently up breaches\rfrom the bottom of the sea a bouncing great whale, with a milky-white\rhead and hump, all crows’ feet and wrinkles.”\r\r“It was he, it was he!” cried Ahab, suddenly letting out his suspended\rbreath.\r\r“And harpoons sticking in near his starboard fin.”\r\r“Aye, aye—they were mine—_my_ irons,” cried Ahab, exultingly—“but on!”\r\r“Give me a chance, then,” said the Englishman, good-humoredly. “Well,\rthis old great-grandfather, with the white head and hump, runs all\rafoam into the pod, and goes to snapping furiously at my fast-line!\r\r“Aye, I see!—wanted to part it; free the fast-fish—an old trick—I know\rhim.”\r\r“How it was exactly,” continued the one-armed commander, “I do not\rknow; but in biting the line, it got foul of his teeth, caught there\rsomehow; but we didn’t know it then; so that when we afterwards pulled\ron the line, bounce we came plump on to his hump! instead of the other\rwhale’s; that went off to windward, all fluking. Seeing how matters\rstood, and what a noble great whale it was—the noblest and biggest I\rever saw, sir, in my life—I resolved to capture him, spite of the\rboiling rage he seemed to be in. And thinking the hap-hazard line would\rget loose, or the tooth it was tangled to might draw (for I have a\rdevil of a boat’s crew for a pull on a whale-line); seeing all this, I\rsay, I jumped into my first mate’s boat—Mr. Mounttop’s here (by the\rway, Captain—Mounttop; Mounttop—the captain);—as I was saying, I jumped\rinto Mounttop’s boat, which, d’ye see, was gunwale and gunwale with\rmine, then; and snatching the first harpoon, let this old\rgreat-grandfather have it. But, Lord, look you, sir—hearts and souls\ralive, man—the next instant, in a jiff, I was blind as a bat—both eyes\rout—all befogged and bedeadened with black foam—the whale’s tail\rlooming straight up out of it, perpendicular in the air, like a marble\rsteeple. No use sterning all, then; but as I was groping at midday,\rwith a blinding sun, all crown-jewels; as I was groping, I say, after\rthe second iron, to toss it overboard—down comes the tail like a Lima\rtower, cutting my boat in two, leaving each half in splinters; and,\rflukes first, the white hump backed through the wreck, as though it was\rall chips. We all struck out. To escape his terrible flailings, I\rseized hold of my harpoon-pole sticking in him, and for a moment clung\rto that like a sucking fish. But a combing sea dashed me off, and at\rthe same instant, the fish, taking one good dart forwards, went down\rlike a flash; and the barb of that cursed second iron towing along near\rme caught me here” (clapping his hand just below his shoulder); “yes,\rcaught me just here, I say, and bore me down to Hell’s flames, I was\rthinking; when, when, all of a sudden, thank the good God, the barb\rript its way along the flesh—clear along the whole length of my\rarm—came out nigh my wrist, and up I floated;—and that gentleman there\rwill tell you the rest (by the way, captain—Dr. Bunger, ship’s surgeon:\rBunger, my lad,—the captain). Now, Bunger boy, spin your part of the\ryarn.”\r\rThe professional gentleman thus familiarly pointed out, had been all\rthe time standing near them, with nothing specific visible, to denote\rhis gentlemanly rank on board. His face was an exceedingly round but\rsober one; he was dressed in a faded blue woollen frock or shirt, and\rpatched trowsers; and had thus far been dividing his attention between\ra marlingspike he held in one hand, and a pill-box held in the other,\roccasionally casting a critical glance at the ivory limbs of the two\rcrippled captains. But, at his superior’s introduction of him to Ahab,\rhe politely bowed, and straightway went on to do his captain’s bidding.\r\r“It was a shocking bad wound,” began the whale-surgeon; “and, taking my\radvice, Captain Boomer here, stood our old Sammy—”\r\r“Samuel Enderby is the name of my ship,” interrupted the one-armed\rcaptain, addressing Ahab; “go on, boy.”\r\r“Stood our old Sammy off to the northward, to get out of the blazing\rhot weather there on the Line. But it was no use—I did all I could; sat\rup with him nights; was very severe with him in the matter of diet—”\r\r“Oh, very severe!” chimed in the patient himself; then suddenly\raltering his voice, “Drinking hot rum toddies with me every night, till\rhe couldn’t see to put on the bandages; and sending me to bed, half\rseas over, about three o’clock in the morning. Oh, ye stars! he sat up\rwith me indeed, and was very severe in my diet. Oh! a great watcher,\rand very dietetically severe, is Dr. Bunger. (Bunger, you dog, laugh\rout! why don’t ye? You know you’re a precious jolly rascal.) But, heave\rahead, boy, I’d rather be killed by you than kept alive by any other\rman.”\r\r“My captain, you must have ere this perceived, respected sir”—said the\rimperturbable godly-looking Bunger, slightly bowing to Ahab—“is apt to\rbe facetious at times; he spins us many clever things of that sort. But\rI may as well say—en passant, as the French remark—that I myself—that\ris to say, Jack Bunger, late of the reverend clergy—am a strict total\rabstinence man; I never drink—”\r\r“Water!” cried the captain; “he never drinks it; it’s a sort of fits to\rhim; fresh water throws him into the hydrophobia; but go on—go on with\rthe arm story.”\r\r“Yes, I may as well,” said the surgeon, coolly. “I was about observing,\rsir, before Captain Boomer’s facetious interruption, that spite of my\rbest and severest endeavors, the wound kept getting worse and worse;\rthe truth was, sir, it was as ugly gaping wound as surgeon ever saw;\rmore than two feet and several inches long. I measured it with the lead\rline. In short, it grew black; I knew what was threatened, and off it\rcame. But I had no hand in shipping that ivory arm there; that thing is\ragainst all rule”—pointing at it with the marlingspike—“that is the\rcaptain’s work, not mine; he ordered the carpenter to make it; he had\rthat club-hammer there put to the end, to knock some one’s brains out\rwith, I suppose, as he tried mine once. He flies into diabolical\rpassions sometimes. Do ye see this dent, sir”—removing his hat, and\rbrushing aside his hair, and exposing a bowl-like cavity in his skull,\rbut which bore not the slightest scarry trace, or any token of ever\rhaving been a wound—“Well, the captain there will tell you how that\rcame here; he knows.”\r\r“No, I don’t,” said the captain, “but his mother did; he was born with\rit. Oh, you solemn rogue, you—you Bunger! was there ever such another\rBunger in the watery world? Bunger, when you die, you ought to die in\rpickle, you dog; you should be preserved to future ages, you rascal.”\r\r“What became of the White Whale?” now cried Ahab, who thus far had been\rimpatiently listening to this by-play between the two Englishmen.\r\r“Oh!” cried the one-armed captain, “oh, yes! Well; after he sounded, we\rdidn’t see him again for some time; in fact, as I before hinted, I\rdidn’t then know what whale it was that had served me such a trick,\rtill some time afterwards, when coming back to the Line, we heard about\rMoby Dick—as some call him—and then I knew it was he.”\r\r“Did’st thou cross his wake again?”\r\r“Twice.”\r\r“But could not fasten?”\r\r“Didn’t want to try to: ain’t one limb enough? What should I do without\rthis other arm? And I’m thinking Moby Dick doesn’t bite so much as he\rswallows.”\r\r“Well, then,” interrupted Bunger, “give him your left arm for bait to\rget the right. Do you know, gentlemen”—very gravely and mathematically\rbowing to each Captain in succession—“Do you know, gentlemen, that the\rdigestive organs of the whale are so inscrutably constructed by Divine\rProvidence, that it is quite impossible for him to completely digest\reven a man’s arm? And he knows it too. So that what you take for the\rWhite Whale’s malice is only his awkwardness. For he never means to\rswallow a single limb; he only thinks to terrify by feints. But\rsometimes he is like the old juggling fellow, formerly a patient of\rmine in Ceylon, that making believe swallow jack-knives, once upon a\rtime let one drop into him in good earnest, and there it stayed for a\rtwelvemonth or more; when I gave him an emetic, and he heaved it up in\rsmall tacks, d’ye see. No possible way for him to digest that\rjack-knife, and fully incorporate it into his general bodily system.\rYes, Captain Boomer, if you are quick enough about it, and have a mind\rto pawn one arm for the sake of the privilege of giving decent burial\rto the other, why in that case the arm is yours; only let the whale\rhave another chance at you shortly, that’s all.”\r\r“No, thank ye, Bunger,” said the English Captain, “he’s welcome to the\rarm he has, since I can’t help it, and didn’t know him then; but not to\ranother one. No more White Whales for me; I’ve lowered for him once,\rand that has satisfied me. There would be great glory in killing him, I\rknow that; and there is a ship-load of precious sperm in him, but, hark\rye, he’s best let alone; don’t you think so, Captain?”—glancing at the\rivory leg.\r\r“He is. But he will still be hunted, for all that. What is best let\ralone, that accursed thing is not always what least allures. He’s all a\rmagnet! How long since thou saw’st him last? Which way heading?”\r\r“Bless my soul, and curse the foul fiend’s,” cried Bunger, stoopingly\rwalking round Ahab, and like a dog, strangely snuffing; “this man’s\rblood—bring the thermometer!—it’s at the boiling point!—his pulse makes\rthese planks beat!—sir!”—taking a lancet from his pocket, and drawing\rnear to Ahab’s arm.\r\r“Avast!” roared Ahab, dashing him against the bulwarks—“Man the boat!\rWhich way heading?”\r\r“Good God!” cried the English Captain, to whom the question was put.\r“What’s the matter? He was heading east, I think.—Is your Captain\rcrazy?” whispering Fedallah.\r\rBut Fedallah, putting a finger on his lip, slid over the bulwarks to\rtake the boat’s steering oar, and Ahab, swinging the cutting-tackle\rtowards him, commanded the ship’s sailors to stand by to lower.\r\rIn a moment he was standing in the boat’s stern, and the Manilla men\rwere springing to their oars. In vain the English Captain hailed him.\rWith back to the stranger ship, and face set like a flint to his own,\rAhab stood upright till alongside of the Pequod.\r\r\rCHAPTER 101. The Decanter.\r\rEre the English ship fades from sight, be it set down here, that she\rhailed from London, and was named after the late Samuel Enderby,\rmerchant of that city, the original of the famous whaling house of\rEnderby & Sons; a house which in my poor whaleman’s opinion, comes not\rfar behind the united royal houses of the Tudors and Bourbons, in point\rof real historical interest. How long, prior to the year of our Lord\r1775, this great whaling house was in existence, my numerous\rfish-documents do not make plain; but in that year (1775) it fitted out\rthe first English ships that ever regularly hunted the Sperm Whale;\rthough for some score of years previous (ever since 1726) our valiant\rCoffins and Maceys of Nantucket and the Vineyard had in large fleets\rpursued that Leviathan, but only in the North and South Atlantic: not\relsewhere. Be it distinctly recorded here, that the Nantucketers were\rthe first among mankind to harpoon with civilized steel the great Sperm\rWhale; and that for half a century they were the only people of the\rwhole globe who so harpooned him.\r\rIn 1778, a fine ship, the Amelia, fitted out for the express purpose,\rand at the sole charge of the vigorous Enderbys, boldly rounded Cape\rHorn, and was the first among the nations to lower a whale-boat of any\rsort in the great South Sea. The voyage was a skilful and lucky one;\rand returning to her berth with her hold full of the precious sperm,\rthe Amelia’s example was soon followed by other ships, English and\rAmerican, and thus the vast Sperm Whale grounds of the Pacific were\rthrown open. But not content with this good deed, the indefatigable\rhouse again bestirred itself: Samuel and all his Sons—how many, their\rmother only knows—and under their immediate auspices, and partly, I\rthink, at their expense, the British government was induced to send the\rsloop-of-war Rattler on a whaling voyage of discovery into the South\rSea. Commanded by a naval Post-Captain, the Rattler made a rattling\rvoyage of it, and did some service; how much does not appear. But this\ris not all. In 1819, the same house fitted out a discovery whale ship\rof their own, to go on a tasting cruise to the remote waters of Japan.\rThat ship—well called the “Syren”—made a noble experimental cruise; and\rit was thus that the great Japanese Whaling Ground first became\rgenerally known. The Syren in this famous voyage was commanded by a\rCaptain Coffin, a Nantucketer.\r\rAll honor to the Enderbies, therefore, whose house, I think, exists to\rthe present day; though doubtless the original Samuel must long ago\rhave slipped his cable for the great South Sea of the other world.\r\rThe ship named after him was worthy of the honor, being a very fast\rsailer and a noble craft every way. I boarded her once at midnight\rsomewhere off the Patagonian coast, and drank good flip down in the\rforecastle. It was a fine gam we had, and they were all trumps—every\rsoul on board. A short life to them, and a jolly death. And that fine\rgam I had—long, very long after old Ahab touched her planks with his\rivory heel—it minds me of the noble, solid, Saxon hospitality of that\rship; and may my parson forget me, and the devil remember me, if I ever\rlose sight of it. Flip? Did I say we had flip? Yes, and we flipped it\rat the rate of ten gallons the hour; and when the squall came (for it’s\rsqually off there by Patagonia), and all hands—visitors and all—were\rcalled to reef topsails, we were so top-heavy that we had to swing each\rother aloft in bowlines; and we ignorantly furled the skirts of our\rjackets into the sails, so that we hung there, reefed fast in the\rhowling gale, a warning example to all drunken tars. However, the masts\rdid not go overboard; and by and by we scrambled down, so sober, that\rwe had to pass the flip again, though the savage salt spray bursting\rdown the forecastle scuttle, rather too much diluted and pickled it to\rmy taste.\r\rThe beef was fine—tough, but with body in it. They said it was\rbull-beef; others, that it was dromedary beef; but I do not know, for\rcertain, how that was. They had dumplings too; small, but substantial,\rsymmetrically globular, and indestructible dumplings. I fancied that\ryou could feel them, and roll them about in you after they were\rswallowed. If you stooped over too far forward, you risked their\rpitching out of you like billiard-balls. The bread—but that couldn’t be\rhelped; besides, it was an anti-scorbutic; in short, the bread\rcontained the only fresh fare they had. But the forecastle was not very\rlight, and it was very easy to step over into a dark corner when you\rate it. But all in all, taking her from truck to helm, considering the\rdimensions of the cook’s boilers, including his own live parchment\rboilers; fore and aft, I say, the Samuel Enderby was a jolly ship; of\rgood fare and plenty; fine flip and strong; crack fellows all, and\rcapital from boot heels to hat-band.\r\rBut why was it, think ye, that the Samuel Enderby, and some other\rEnglish whalers I know of—not all though—were such famous, hospitable\rships; that passed round the beef, and the bread, and the can, and the\rjoke; and were not soon weary of eating, and drinking, and laughing? I\rwill tell you. The abounding good cheer of these English whalers is\rmatter for historical research. Nor have I been at all sparing of\rhistorical whale research, when it has seemed needed.\r\rThe English were preceded in the whale fishery by the Hollanders,\rZealanders, and Danes; from whom they derived many terms still extant\rin the fishery; and what is yet more, their fat old fashions, touching\rplenty to eat and drink. For, as a general thing, the English\rmerchant-ship scrimps her crew; but not so the English whaler. Hence,\rin the English, this thing of whaling good cheer is not normal and\rnatural, but incidental and particular; and, therefore, must have some\rspecial origin, which is here pointed out, and will be still further\relucidated.\r\rDuring my researches in the Leviathanic histories, I stumbled upon an\rancient Dutch volume, which, by the musty whaling smell of it, I knew\rmust be about whalers. The title was, “Dan Coopman,” wherefore I\rconcluded that this must be the invaluable memoirs of some Amsterdam\rcooper in the fishery, as every whale ship must carry its cooper. I was\rreinforced in this opinion by seeing that it was the production of one\r“Fitz Swackhammer.” But my friend Dr. Snodhead, a very learned man,\rprofessor of Low Dutch and High German in the college of Santa Claus\rand St. Pott’s, to whom I handed the work for translation, giving him a\rbox of sperm candles for his trouble—this same Dr. Snodhead, so soon as\rhe spied the book, assured me that “Dan Coopman” did not mean “The\rCooper,” but “The Merchant.” In short, this ancient and learned Low\rDutch book treated of the commerce of Holland; and, among other\rsubjects, contained a very interesting account of its whale fishery.\rAnd in this chapter it was, headed, “Smeer,” or “Fat,” that I found a\rlong detailed list of the outfits for the larders and cellars of 180\rsail of Dutch whalemen; from which list, as translated by Dr. Snodhead,\rI transcribe the following:\r\r400,000 lbs. of beef. 60,000 lbs. Friesland pork. 150,000 lbs. of stock\rfish. 550,000 lbs. of biscuit. 72,000 lbs. of soft bread. 2,800 firkins\rof butter. 20,000 lbs. Texel & Leyden cheese. 144,000 lbs. cheese\r(probably an inferior article). 550 ankers of Geneva. 10,800 barrels of\rbeer.\r\rMost statistical tables are parchingly dry in the reading; not so in\rthe present case, however, where the reader is flooded with whole\rpipes, barrels, quarts, and gills of good gin and good cheer.\r\rAt the time, I devoted three days to the studious digesting of all this\rbeer, beef, and bread, during which many profound thoughts were\rincidentally suggested to me, capable of a transcendental and Platonic\rapplication; and, furthermore, I compiled supplementary tables of my\rown, touching the probable quantity of stock-fish, etc., consumed by\revery Low Dutch harpooneer in that ancient Greenland and Spitzbergen\rwhale fishery. In the first place, the amount of butter, and Texel and\rLeyden cheese consumed, seems amazing. I impute it, though, to their\rnaturally unctuous natures, being rendered still more unctuous by the\rnature of their vocation, and especially by their pursuing their game\rin those frigid Polar Seas, on the very coasts of that Esquimaux\rcountry where the convivial natives pledge each other in bumpers of\rtrain oil.\r\rThe quantity of beer, too, is very large, 10,800 barrels. Now, as those\rpolar fisheries could only be prosecuted in the short summer of that\rclimate, so that the whole cruise of one of these Dutch whalemen,\rincluding the short voyage to and from the Spitzbergen sea, did not\rmuch exceed three months, say, and reckoning 30 men to each of their\rfleet of 180 sail, we have 5,400 Low Dutch seamen in all; therefore, I\rsay, we have precisely two barrels of beer per man, for a twelve weeks’\rallowance, exclusive of his fair proportion of that 550 ankers of gin.\rNow, whether these gin and beer harpooneers, so fuddled as one might\rfancy them to have been, were the right sort of men to stand up in a\rboat’s head, and take good aim at flying whales; this would seem\rsomewhat improbable. Yet they did aim at them, and hit them too. But\rthis was very far North, be it remembered, where beer agrees well with\rthe constitution; upon the Equator, in our southern fishery, beer would\rbe apt to make the harpooneer sleepy at the mast-head and boozy in his\rboat; and grievous loss might ensue to Nantucket and New Bedford.\r\rBut no more; enough has been said to show that the old Dutch whalers of\rtwo or three centuries ago were high livers; and that the English\rwhalers have not neglected so excellent an example. For, say they, when\rcruising in an empty ship, if you can get nothing better out of the\rworld, get a good dinner out of it, at least. And this empties the\rdecanter.\r\r\rCHAPTER 102. A Bower in the Arsacides.\r\rHitherto, in descriptively treating of the Sperm Whale, I have chiefly\rdwelt upon the marvels of his outer aspect; or separately and in detail\rupon some few interior structural features. But to a large and thorough\rsweeping comprehension of him, it behooves me now to unbutton him still\rfurther, and untagging the points of his hose, unbuckling his garters,\rand casting loose the hooks and the eyes of the joints of his innermost\rbones, set him before you in his ultimatum; that is to say, in his\runconditional skeleton.\r\rBut how now, Ishmael? How is it, that you, a mere oarsman in the\rfishery, pretend to know aught about the subterranean parts of the\rwhale? Did erudite Stubb, mounted upon your capstan, deliver lectures\ron the anatomy of the Cetacea; and by help of the windlass, hold up a\rspecimen rib for exhibition? Explain thyself, Ishmael. Can you land a\rfull-grown whale on your deck for examination, as a cook dishes a\rroast-pig? Surely not. A veritable witness have you hitherto been,\rIshmael; but have a care how you seize the privilege of Jonah alone;\rthe privilege of discoursing upon the joists and beams; the rafters,\rridge-pole, sleepers, and under-pinnings, making up the frame-work of\rleviathan; and belike of the tallow-vats, dairy-rooms, butteries, and\rcheeseries in his bowels.\r\rI confess, that since Jonah, few whalemen have penetrated very far\rbeneath the skin of the adult whale; nevertheless, I have been blessed\rwith an opportunity to dissect him in miniature. In a ship I belonged\rto, a small cub Sperm Whale was once bodily hoisted to the deck for his\rpoke or bag, to make sheaths for the barbs of the harpoons, and for the\rheads of the lances. Think you I let that chance go, without using my\rboat-hatchet and jack-knife, and breaking the seal and reading all the\rcontents of that young cub?\r\rAnd as for my exact knowledge of the bones of the leviathan in their\rgigantic, full grown development, for that rare knowledge I am indebted\rto my late royal friend Tranquo, king of Tranque, one of the Arsacides.\rFor being at Tranque, years ago, when attached to the trading-ship Dey\rof Algiers, I was invited to spend part of the Arsacidean holidays with\rthe lord of Tranque, at his retired palm villa at Pupella; a sea-side\rglen not very far distant from what our sailors called Bamboo-Town, his\rcapital.\r\rAmong many other fine qualities, my royal friend Tranquo, being gifted\rwith a devout love for all matters of barbaric vertu, had brought\rtogether in Pupella whatever rare things the more ingenious of his\rpeople could invent; chiefly carved woods of wonderful devices,\rchiselled shells, inlaid spears, costly paddles, aromatic canoes; and\rall these distributed among whatever natural wonders, the\rwonder-freighted, tribute-rendering waves had cast upon his shores.\r\rChief among these latter was a great Sperm Whale, which, after an\runusually long raging gale, had been found dead and stranded, with his\rhead against a cocoa-nut tree, whose plumage-like, tufted droopings\rseemed his verdant jet. When the vast body had at last been stripped of\rits fathom-deep enfoldings, and the bones become dust dry in the sun,\rthen the skeleton was carefully transported up the Pupella glen, where\ra grand temple of lordly palms now sheltered it.\r\rThe ribs were hung with trophies; the vertebræ were carved with\rArsacidean annals, in strange hieroglyphics; in the skull, the priests\rkept up an unextinguished aromatic flame, so that the mystic head again\rsent forth its vapory spout; while, suspended from a bough, the\rterrific lower jaw vibrated over all the devotees, like the hair-hung\rsword that so affrighted Damocles.\r\rIt was a wondrous sight. The wood was green as mosses of the Icy Glen;\rthe trees stood high and haughty, feeling their living sap; the\rindustrious earth beneath was as a weaver’s loom, with a gorgeous\rcarpet on it, whereof the ground-vine tendrils formed the warp and\rwoof, and the living flowers the figures. All the trees, with all their\rladen branches; all the shrubs, and ferns, and grasses; the\rmessage-carrying air; all these unceasingly were active. Through the\rlacings of the leaves, the great sun seemed a flying shuttle weaving\rthe unwearied verdure. Oh, busy weaver! unseen weaver!—pause!—one\rword!—whither flows the fabric? what palace may it deck? wherefore all\rthese ceaseless toilings? Speak, weaver!—stay thy hand!—but one single\rword with thee! Nay—the shuttle flies—the figures float from forth the\rloom; the freshet-rushing carpet for ever slides away. The weaver-god,\rhe weaves; and by that weaving is he deafened, that he hears no mortal\rvoice; and by that humming, we, too, who look on the loom are deafened;\rand only when we escape it shall we hear the thousand voices that speak\rthrough it. For even so it is in all material factories. The spoken\rwords that are inaudible among the flying spindles; those same words\rare plainly heard without the walls, bursting from the opened\rcasements. Thereby have villainies been detected. Ah, mortal! then, be\rheedful; for so, in all this din of the great world’s loom, thy\rsubtlest thinkings may be overheard afar.\r\rNow, amid the green, life-restless loom of that Arsacidean wood, the\rgreat, white, worshipped skeleton lay lounging—a gigantic idler! Yet,\ras the ever-woven verdant warp and woof intermixed and hummed around\rhim, the mighty idler seemed the cunning weaver; himself all woven over\rwith the vines; every month assuming greener, fresher verdure; but\rhimself a skeleton. Life folded Death; Death trellised Life; the grim\rgod wived with youthful Life, and begat him curly-headed glories.\r\rNow, when with royal Tranquo I visited this wondrous whale, and saw the\rskull an altar, and the artificial smoke ascending from where the real\rjet had issued, I marvelled that the king should regard a chapel as an\robject of vertu. He laughed. But more I marvelled that the priests\rshould swear that smoky jet of his was genuine. To and fro I paced\rbefore this skeleton—brushed the vines aside—broke through the ribs—and\rwith a ball of Arsacidean twine, wandered, eddied long amid its many\rwinding, shaded colonnades and arbours. But soon my line was out; and\rfollowing it back, I emerged from the opening where I entered. I saw no\rliving thing within; naught was there but bones.\r\rCutting me a green measuring-rod, I once more dived within the\rskeleton. From their arrow-slit in the skull, the priests perceived me\rtaking the altitude of the final rib, “How now!” they shouted; “Dar’st\rthou measure this our god! That’s for us.” “Aye, priests—well, how long\rdo ye make him, then?” But hereupon a fierce contest rose among them,\rconcerning feet and inches; they cracked each other’s sconces with\rtheir yard-sticks—the great skull echoed—and seizing that lucky chance,\rI quickly concluded my own admeasurements.\r\rThese admeasurements I now propose to set before you. But first, be it\rrecorded, that, in this matter, I am not free to utter any fancied\rmeasurement I please. Because there are skeleton authorities you can\rrefer to, to test my accuracy. There is a Leviathanic Museum, they tell\rme, in Hull, England, one of the whaling ports of that country, where\rthey have some fine specimens of fin-backs and other whales. Likewise,\rI have heard that in the museum of Manchester, in New Hampshire, they\rhave what the proprietors call “the only perfect specimen of a\rGreenland or River Whale in the United States.” Moreover, at a place in\rYorkshire, England, Burton Constable by name, a certain Sir Clifford\rConstable has in his possession the skeleton of a Sperm Whale, but of\rmoderate size, by no means of the full-grown magnitude of my friend\rKing Tranquo’s.\r\rIn both cases, the stranded whales to which these two skeletons\rbelonged, were originally claimed by their proprietors upon similar\rgrounds. King Tranquo seizing his because he wanted it; and Sir\rClifford, because he was lord of the seignories of those parts. Sir\rClifford’s whale has been articulated throughout; so that, like a great\rchest of drawers, you can open and shut him, in all his bony\rcavities—spread out his ribs like a gigantic fan—and swing all day upon\rhis lower jaw. Locks are to be put upon some of his trap-doors and\rshutters; and a footman will show round future visitors with a bunch of\rkeys at his side. Sir Clifford thinks of charging twopence for a peep\rat the whispering gallery in the spinal column; threepence to hear the\recho in the hollow of his cerebellum; and sixpence for the unrivalled\rview from his forehead.\r\rThe skeleton dimensions I shall now proceed to set down are copied\rverbatim from my right arm, where I had them tattooed; as in my wild\rwanderings at that period, there was no other secure way of preserving\rsuch valuable statistics. But as I was crowded for space, and wished\rthe other parts of my body to remain a blank page for a poem I was then\rcomposing—at least, what untattooed parts might remain—I did not\rtrouble myself with the odd inches; nor, indeed, should inches at all\renter into a congenial admeasurement of the whale.\r\r\rCHAPTER 103. Measurement of The Whale’s Skeleton.\r\rIn the first place, I wish to lay before you a particular, plain\rstatement, touching the living bulk of this leviathan, whose skeleton\rwe are briefly to exhibit. Such a statement may prove useful here.\r\rAccording to a careful calculation I have made, and which I partly base\rupon Captain Scoresby’s estimate, of seventy tons for the largest sized\rGreenland whale of sixty feet in length; according to my careful\rcalculation, I say, a Sperm Whale of the largest magnitude, between\reighty-five and ninety feet in length, and something less than forty\rfeet in its fullest circumference, such a whale will weigh at least\rninety tons; so that, reckoning thirteen men to a ton, he would\rconsiderably outweigh the combined population of a whole village of one\rthousand one hundred inhabitants.\r\rThink you not then that brains, like yoked cattle, should be put to\rthis leviathan, to make him at all budge to any landsman’s imagination?\r\rHaving already in various ways put before you his skull, spout-hole,\rjaw, teeth, tail, forehead, fins, and divers other parts, I shall now\rsimply point out what is most interesting in the general bulk of his\runobstructed bones. But as the colossal skull embraces so very large a\rproportion of the entire extent of the skeleton; as it is by far the\rmost complicated part; and as nothing is to be repeated concerning it\rin this chapter, you must not fail to carry it in your mind, or under\ryour arm, as we proceed, otherwise you will not gain a complete notion\rof the general structure we are about to view.\r\rIn length, the Sperm Whale’s skeleton at Tranque measured seventy-two\rfeet; so that when fully invested and extended in life, he must have\rbeen ninety feet long; for in the whale, the skeleton loses about one\rfifth in length compared with the living body. Of this seventy-two\rfeet, his skull and jaw comprised some twenty feet, leaving some fifty\rfeet of plain back-bone. Attached to this back-bone, for something less\rthan a third of its length, was the mighty circular basket of ribs\rwhich once enclosed his vitals.\r\rTo me this vast ivory-ribbed chest, with the long, unrelieved spine,\rextending far away from it in a straight line, not a little resembled\rthe hull of a great ship new-laid upon the stocks, when only some\rtwenty of her naked bow-ribs are inserted, and the keel is otherwise,\rfor the time, but a long, disconnected timber.\r\rThe ribs were ten on a side. The first, to begin from the neck, was\rnearly six feet long; the second, third, and fourth were each\rsuccessively longer, till you came to the climax of the fifth, or one\rof the middle ribs, which measured eight feet and some inches. From\rthat part, the remaining ribs diminished, till the tenth and last only\rspanned five feet and some inches. In general thickness, they all bore\ra seemly correspondence to their length. The middle ribs were the most\rarched. In some of the Arsacides they are used for beams whereon to lay\rfootpath bridges over small streams.\r\rIn considering these ribs, I could not but be struck anew with the\rcircumstance, so variously repeated in this book, that the skeleton of\rthe whale is by no means the mould of his invested form. The largest of\rthe Tranque ribs, one of the middle ones, occupied that part of the\rfish which, in life, is greatest in depth. Now, the greatest depth of\rthe invested body of this particular whale must have been at least\rsixteen feet; whereas, the corresponding rib measured but little more\rthan eight feet. So that this rib only conveyed half of the true notion\rof the living magnitude of that part. Besides, for some way, where I\rnow saw but a naked spine, all that had been once wrapped round with\rtons of added bulk in flesh, muscle, blood, and bowels. Still more, for\rthe ample fins, I here saw but a few disordered joints; and in place of\rthe weighty and majestic, but boneless flukes, an utter blank!\r\rHow vain and foolish, then, thought I, for timid untravelled man to try\rto comprehend aright this wondrous whale, by merely poring over his\rdead attenuated skeleton, stretched in this peaceful wood. No. Only in\rthe heart of quickest perils; only when within the eddyings of his\rangry flukes; only on the profound unbounded sea, can the fully\rinvested whale be truly and livingly found out.\r\rBut the spine. For that, the best way we can consider it is, with a\rcrane, to pile its bones high up on end. No speedy enterprise. But now\rit’s done, it looks much like Pompey’s Pillar.\r\rThere are forty and odd vertebræ in all, which in the skeleton are not\rlocked together. They mostly lie like the great knobbed blocks on a\rGothic spire, forming solid courses of heavy masonry. The largest, a\rmiddle one, is in width something less than three feet, and in depth\rmore than four. The smallest, where the spine tapers away into the\rtail, is only two inches in width, and looks something like a white\rbilliard-ball. I was told that there were still smaller ones, but they\rhad been lost by some little cannibal urchins, the priest’s children,\rwho had stolen them to play marbles with. Thus we see how that the\rspine of even the hugest of living things tapers off at last into\rsimple child’s play.\r\r\rCHAPTER 104. The Fossil Whale.\r\rFrom his mighty bulk the whale affords a most congenial theme whereon\rto enlarge, amplify, and generally expatiate. Would you, you could not\rcompress him. By good rights he should only be treated of in imperial\rfolio. Not to tell over again his furlongs from spiracle to tail, and\rthe yards he measures about the waist; only think of the gigantic\rinvolutions of his intestines, where they lie in him like great cables\rand hawsers coiled away in the subterranean orlop-deck of a\rline-of-battle-ship.\r\rSince I have undertaken to manhandle this Leviathan, it behooves me to\rapprove myself omnisciently exhaustive in the enterprise; not\roverlooking the minutest seminal germs of his blood, and spinning him\rout to the uttermost coil of his bowels. Having already described him\rin most of his present habitatory and anatomical peculiarities, it now\rremains to magnify him in an archæological, fossiliferous, and\rantediluvian point of view. Applied to any other creature than the\rLeviathan—to an ant or a flea—such portly terms might justly be deemed\runwarrantably grandiloquent. But when Leviathan is the text, the case\ris altered. Fain am I to stagger to this emprise under the weightiest\rwords of the dictionary. And here be it said, that whenever it has been\rconvenient to consult one in the course of these dissertations, I have\rinvariably used a huge quarto edition of Johnson, expressly purchased\rfor that purpose; because that famous lexicographer’s uncommon personal\rbulk more fitted him to compile a lexicon to be used by a whale author\rlike me.\r\rOne often hears of writers that rise and swell with their subject,\rthough it may seem but an ordinary one. How, then, with me, writing of\rthis Leviathan? Unconsciously my chirography expands into placard\rcapitals. Give me a condor’s quill! Give me Vesuvius’ crater for an\rinkstand! Friends, hold my arms! For in the mere act of penning my\rthoughts of this Leviathan, they weary me, and make me faint with their\routreaching comprehensiveness of sweep, as if to include the whole\rcircle of the sciences, and all the generations of whales, and men, and\rmastodons, past, present, and to come, with all the revolving panoramas\rof empire on earth, and throughout the whole universe, not excluding\rits suburbs. Such, and so magnifying, is the virtue of a large and\rliberal theme! We expand to its bulk. To produce a mighty book, you\rmust choose a mighty theme. No great and enduring volume can ever be\rwritten on the flea, though many there be who have tried it.\r\rEre entering upon the subject of Fossil Whales, I present my\rcredentials as a geologist, by stating that in my miscellaneous time I\rhave been a stone-mason, and also a great digger of ditches, canals and\rwells, wine-vaults, cellars, and cisterns of all sorts. Likewise, by\rway of preliminary, I desire to remind the reader, that while in the\rearlier geological strata there are found the fossils of monsters now\ralmost completely extinct; the subsequent relics discovered in what are\rcalled the Tertiary formations seem the connecting, or at any rate\rintercepted links, between the antichronical creatures, and those whose\rremote posterity are said to have entered the Ark; all the Fossil\rWhales hitherto discovered belong to the Tertiary period, which is the\rlast preceding the superficial formations. And though none of them\rprecisely answer to any known species of the present time, they are yet\rsufficiently akin to them in general respects, to justify their taking\rrank as Cetacean fossils.\r\rDetached broken fossils of pre-adamite whales, fragments of their bones\rand skeletons, have within thirty years past, at various intervals,\rbeen found at the base of the Alps, in Lombardy, in France, in England,\rin Scotland, and in the States of Louisiana, Mississippi, and Alabama.\rAmong the more curious of such remains is part of a skull, which in the\ryear 1779 was disinterred in the Rue Dauphine in Paris, a short street\ropening almost directly upon the palace of the Tuileries; and bones\rdisinterred in excavating the great docks of Antwerp, in Napoleon’s\rtime. Cuvier pronounced these fragments to have belonged to some\rutterly unknown Leviathanic species.\r\rBut by far the most wonderful of all Cetacean relics was the almost\rcomplete vast skeleton of an extinct monster, found in the year 1842,\ron the plantation of Judge Creagh, in Alabama. The awe-stricken\rcredulous slaves in the vicinity took it for the bones of one of the\rfallen angels. The Alabama doctors declared it a huge reptile, and\rbestowed upon it the name of Basilosaurus. But some specimen bones of\rit being taken across the sea to Owen, the English Anatomist, it turned\rout that this alleged reptile was a whale, though of a departed\rspecies. A significant illustration of the fact, again and again\rrepeated in this book, that the skeleton of the whale furnishes but\rlittle clue to the shape of his fully invested body. So Owen\rrechristened the monster Zeuglodon; and in his paper read before the\rLondon Geological Society, pronounced it, in substance, one of the most\rextraordinary creatures which the mutations of the globe have blotted\rout of existence.\r\rWhen I stand among these mighty Leviathan skeletons, skulls, tusks,\rjaws, ribs, and vertebræ, all characterized by partial resemblances to\rthe existing breeds of sea-monsters; but at the same time bearing on\rthe other hand similar affinities to the annihilated antichronical\rLeviathans, their incalculable seniors; I am, by a flood, borne back to\rthat wondrous period, ere time itself can be said to have begun; for\rtime began with man. Here Saturn’s grey chaos rolls over me, and I\robtain dim, shuddering glimpses into those Polar eternities; when\rwedged bastions of ice pressed hard upon what are now the Tropics; and\rin all the 25,000 miles of this world’s circumference, not an\rinhabitable hand’s breadth of land was visible. Then the whole world\rwas the whale’s; and, king of creation, he left his wake along the\rpresent lines of the Andes and the Himmalehs. Who can show a pedigree\rlike Leviathan? Ahab’s harpoon had shed older blood than the Pharaoh’s.\rMethuselah seems a school-boy. I look round to shake hands with Shem. I\ram horror-struck at this antemosaic, unsourced existence of the\runspeakable terrors of the whale, which, having been before all time,\rmust needs exist after all humane ages are over.\r\rBut not alone has this Leviathan left his pre-adamite traces in the\rstereotype plates of nature, and in limestone and marl bequeathed his\rancient bust; but upon Egyptian tablets, whose antiquity seems to claim\rfor them an almost fossiliferous character, we find the unmistakable\rprint of his fin. In an apartment of the great temple of Denderah, some\rfifty years ago, there was discovered upon the granite ceiling a\rsculptured and painted planisphere, abounding in centaurs, griffins,\rand dolphins, similar to the grotesque figures on the celestial globe\rof the moderns. Gliding among them, old Leviathan swam as of yore; was\rthere swimming in that planisphere, centuries before Solomon was\rcradled.\r\rNor must there be omitted another strange attestation of the antiquity\rof the whale, in his own osseous post-diluvian reality, as set down by\rthe venerable John Leo, the old Barbary traveller.\r\r“Not far from the Sea-side, they have a Temple, the Rafters and Beams\rof which are made of Whale-Bones; for Whales of a monstrous size are\roftentimes cast up dead upon that shore. The Common People imagine,\rthat by a secret Power bestowed by God upon the Temple, no Whale can\rpass it without immediate death. But the truth of the Matter is, that\ron either side of the Temple, there are Rocks that shoot two Miles into\rthe Sea, and wound the Whales when they light upon ’em. They keep a\rWhale’s Rib of an incredible length for a Miracle, which lying upon the\rGround with its convex part uppermost, makes an Arch, the Head of which\rcannot be reached by a Man upon a Camel’s Back. This Rib (says John\rLeo) is said to have layn there a hundred Years before I saw it. Their\rHistorians affirm, that a Prophet who prophesy’d of Mahomet, came from\rthis Temple, and some do not stand to assert, that the Prophet Jonas\rwas cast forth by the Whale at the Base of the Temple.”\r\rIn this Afric Temple of the Whale I leave you, reader, and if you be a\rNantucketer, and a whaleman, you will silently worship there.\r\r\rCHAPTER 105. Does the Whale’s Magnitude Diminish?—Will He Perish?\r\rInasmuch, then, as this Leviathan comes floundering down upon us from\rthe head-waters of the Eternities, it may be fitly inquired, whether,\rin the long course of his generations, he has not degenerated from the\roriginal bulk of his sires.\r\rBut upon investigation we find, that not only are the whales of the\rpresent day superior in magnitude to those whose fossil remains are\rfound in the Tertiary system (embracing a distinct geological period\rprior to man), but of the whales found in that Tertiary system, those\rbelonging to its latter formations exceed in size those of its earlier\rones.\r\rOf all the pre-adamite whales yet exhumed, by far the largest is the\rAlabama one mentioned in the last chapter, and that was less than\rseventy feet in length in the skeleton. Whereas, we have already seen,\rthat the tape-measure gives seventy-two feet for the skeleton of a\rlarge sized modern whale. And I have heard, on whalemen’s authority,\rthat Sperm Whales have been captured near a hundred feet long at the\rtime of capture.\r\rBut may it not be, that while the whales of the present hour are an\radvance in magnitude upon those of all previous geological periods; may\rit not be, that since Adam’s time they have degenerated?\r\rAssuredly, we must conclude so, if we are to credit the accounts of\rsuch gentlemen as Pliny, and the ancient naturalists generally. For\rPliny tells us of whales that embraced acres of living bulk, and\rAldrovandus of others which measured eight hundred feet in length—Rope\rWalks and Thames Tunnels of Whales! And even in the days of Banks and\rSolander, Cooke’s naturalists, we find a Danish member of the Academy\rof Sciences setting down certain Iceland Whales (reydan-siskur, or\rWrinkled Bellies) at one hundred and twenty yards; that is, three\rhundred and sixty feet. And Lacépède, the French naturalist, in his\relaborate history of whales, in the very beginning of his work (page\r3), sets down the Right Whale at one hundred metres, three hundred and\rtwenty-eight feet. And this work was published so late as A.D. 1825.\r\rBut will any whaleman believe these stories? No. The whale of to-day is\ras big as his ancestors in Pliny’s time. And if ever I go where Pliny\ris, I, a whaleman (more than he was), will make bold to tell him so.\rBecause I cannot understand how it is, that while the Egyptian mummies\rthat were buried thousands of years before even Pliny was born, do not\rmeasure so much in their coffins as a modern Kentuckian in his socks;\rand while the cattle and other animals sculptured on the oldest\rEgyptian and Nineveh tablets, by the relative proportions in which they\rare drawn, just as plainly prove that the high-bred, stall-fed, prize\rcattle of Smithfield, not only equal, but far exceed in magnitude the\rfattest of Pharaoh’s fat kine; in the face of all this, I will not\radmit that of all animals the whale alone should have degenerated.\r\rBut still another inquiry remains; one often agitated by the more\rrecondite Nantucketers. Whether owing to the almost omniscient\rlook-outs at the mast-heads of the whale-ships, now penetrating even\rthrough Behring’s straits, and into the remotest secret drawers and\rlockers of the world; and the thousand harpoons and lances darted along\rall continental coasts; the moot point is, whether Leviathan can long\rendure so wide a chase, and so remorseless a havoc; whether he must not\rat last be exterminated from the waters, and the last whale, like the\rlast man, smoke his last pipe, and then himself evaporate in the final\rpuff.\r\rComparing the humped herds of whales with the humped herds of buffalo,\rwhich, not forty years ago, overspread by tens of thousands the\rprairies of Illinois and Missouri, and shook their iron manes and\rscowled with their thunder-clotted brows upon the sites of populous\rriver-capitals, where now the polite broker sells you land at a dollar\ran inch; in such a comparison an irresistible argument would seem\rfurnished, to show that the hunted whale cannot now escape speedy\rextinction.\r\rBut you must look at this matter in every light. Though so short a\rperiod ago—not a good lifetime—the census of the buffalo in Illinois\rexceeded the census of men now in London, and though at the present day\rnot one horn or hoof of them remains in all that region; and though the\rcause of this wondrous extermination was the spear of man; yet the far\rdifferent nature of the whale-hunt peremptorily forbids so inglorious\ran end to the Leviathan. Forty men in one ship hunting the Sperm Whales\rfor forty-eight months think they have done extremely well, and thank\rGod, if at last they carry home the oil of forty fish. Whereas, in the\rdays of the old Canadian and Indian hunters and trappers of the West,\rwhen the far west (in whose sunset suns still rise) was a wilderness\rand a virgin, the same number of moccasined men, for the same number of\rmonths, mounted on horse instead of sailing in ships, would have slain\rnot forty, but forty thousand and more buffaloes; a fact that, if need\rwere, could be statistically stated.\r\rNor, considered aright, does it seem any argument in favour of the\rgradual extinction of the Sperm Whale, for example, that in former\ryears (the latter part of the last century, say) these Leviathans, in\rsmall pods, were encountered much oftener than at present, and, in\rconsequence, the voyages were not so prolonged, and were also much more\rremunerative. Because, as has been elsewhere noticed, those whales,\rinfluenced by some views to safety, now swim the seas in immense\rcaravans, so that to a large degree the scattered solitaries, yokes,\rand pods, and schools of other days are now aggregated into vast but\rwidely separated, unfrequent armies. That is all. And equally\rfallacious seems the conceit, that because the so-called whale-bone\rwhales no longer haunt many grounds in former years abounding with\rthem, hence that species also is declining. For they are only being\rdriven from promontory to cape; and if one coast is no longer enlivened\rwith their jets, then, be sure, some other and remoter strand has been\rvery recently startled by the unfamiliar spectacle.\r\rFurthermore: concerning these last mentioned Leviathans, they have two\rfirm fortresses, which, in all human probability, will for ever remain\rimpregnable. And as upon the invasion of their valleys, the frosty\rSwiss have retreated to their mountains; so, hunted from the savannas\rand glades of the middle seas, the whale-bone whales can at last resort\rto their Polar citadels, and diving under the ultimate glassy barriers\rand walls there, come up among icy fields and floes; and in a charmed\rcircle of everlasting December, bid defiance to all pursuit from man.\r\rBut as perhaps fifty of these whale-bone whales are harpooned for one\rcachalot, some philosophers of the forecastle have concluded that this\rpositive havoc has already very seriously diminished their battalions.\rBut though for some time past a number of these whales, not less than\r13,000, have been annually slain on the nor’ west coast by the\rAmericans alone; yet there are considerations which render even this\rcircumstance of little or no account as an opposing argument in this\rmatter.\r\rNatural as it is to be somewhat incredulous concerning the populousness\rof the more enormous creatures of the globe, yet what shall we say to\rHarto, the historian of Goa, when he tells us that at one hunting the\rKing of Siam took 4,000 elephants; that in those regions elephants are\rnumerous as droves of cattle in the temperate climes. And there seems\rno reason to doubt that if these elephants, which have now been hunted\rfor thousands of years, by Semiramis, by Porus, by Hannibal, and by all\rthe successive monarchs of the East—if they still survive there in\rgreat numbers, much more may the great whale outlast all hunting, since\rhe has a pasture to expatiate in, which is precisely twice as large as\rall Asia, both Americas, Europe and Africa, New Holland, and all the\rIsles of the sea combined.\r\rMoreover: we are to consider, that from the presumed great longevity of\rwhales, their probably attaining the age of a century and more,\rtherefore at any one period of time, several distinct adult generations\rmust be contemporary. And what that is, we may soon gain some idea of,\rby imagining all the grave-yards, cemeteries, and family vaults of\rcreation yielding up the live bodies of all the men, women, and\rchildren who were alive seventy-five years ago; and adding this\rcountless host to the present human population of the globe.\r\rWherefore, for all these things, we account the whale immortal in his\rspecies, however perishable in his individuality. He swam the seas\rbefore the continents broke water; he once swam over the site of the\rTuileries, and Windsor Castle, and the Kremlin. In Noah’s flood he\rdespised Noah’s Ark; and if ever the world is to be again flooded, like\rthe Netherlands, to kill off its rats, then the eternal whale will\rstill survive, and rearing upon the topmost crest of the equatorial\rflood, spout his frothed defiance to the skies.\r\r\rCHAPTER 106. Ahab’s Leg.\r\rThe precipitating manner in which Captain Ahab had quitted the Samuel\rEnderby of London, had not been unattended with some small violence to\rhis own person. He had lighted with such energy upon a thwart of his\rboat that his ivory leg had received a half-splintering shock. And when\rafter gaining his own deck, and his own pivot-hole there, he so\rvehemently wheeled round with an urgent command to the steersman (it\rwas, as ever, something about his not steering inflexibly enough);\rthen, the already shaken ivory received such an additional twist and\rwrench, that though it still remained entire, and to all appearances\rlusty, yet Ahab did not deem it entirely trustworthy.\r\rAnd, indeed, it seemed small matter for wonder, that for all his\rpervading, mad recklessness, Ahab did at times give careful heed to the\rcondition of that dead bone upon which he partly stood. For it had not\rbeen very long prior to the Pequod’s sailing from Nantucket, that he\rhad been found one night lying prone upon the ground, and insensible;\rby some unknown, and seemingly inexplicable, unimaginable casualty, his\rivory limb having been so violently displaced, that it had stake-wise\rsmitten, and all but pierced his groin; nor was it without extreme\rdifficulty that the agonizing wound was entirely cured.\r\rNor, at the time, had it failed to enter his monomaniac mind, that all\rthe anguish of that then present suffering was but the direct issue of\ra former woe; and he too plainly seemed to see, that as the most\rpoisonous reptile of the marsh perpetuates his kind as inevitably as\rthe sweetest songster of the grove; so, equally with every felicity,\rall miserable events do naturally beget their like. Yea, more than\requally, thought Ahab; since both the ancestry and posterity of Grief\rgo further than the ancestry and posterity of Joy. For, not to hint of\rthis: that it is an inference from certain canonic teachings, that\rwhile some natural enjoyments here shall have no children born to them\rfor the other world, but, on the contrary, shall be followed by the\rjoy-childlessness of all hell’s despair; whereas, some guilty mortal\rmiseries shall still fertilely beget to themselves an eternally\rprogressive progeny of griefs beyond the grave; not at all to hint of\rthis, there still seems an inequality in the deeper analysis of the\rthing. For, thought Ahab, while even the highest earthly felicities\rever have a certain unsignifying pettiness lurking in them, but, at\rbottom, all heartwoes, a mystic significance, and, in some men, an\rarchangelic grandeur; so do their diligent tracings-out not belie the\robvious deduction. To trail the genealogies of these high mortal\rmiseries, carries us at last among the sourceless primogenitures of the\rgods; so that, in the face of all the glad, hay-making suns, and soft\rcymballing, round harvest-moons, we must needs give in to this: that\rthe gods themselves are not for ever glad. The ineffaceable, sad\rbirth-mark in the brow of man, is but the stamp of sorrow in the\rsigners.\r\rUnwittingly here a secret has been divulged, which perhaps might more\rproperly, in set way, have been disclosed before. With many other\rparticulars concerning Ahab, always had it remained a mystery to some,\rwhy it was, that for a certain period, both before and after the\rsailing of the Pequod, he had hidden himself away with such\rGrand-Lama-like exclusiveness; and, for that one interval, sought\rspeechless refuge, as it were, among the marble senate of the dead.\rCaptain Peleg’s bruited reason for this thing appeared by no means\radequate; though, indeed, as touching all Ahab’s deeper part, every\rrevelation partook more of significant darkness than of explanatory\rlight. But, in the end, it all came out; this one matter did, at least.\rThat direful mishap was at the bottom of his temporary recluseness. And\rnot only this, but to that ever-contracting, dropping circle ashore,\rwho, for any reason, possessed the privilege of a less banned approach\rto him; to that timid circle the above hinted casualty—remaining, as it\rdid, moodily unaccounted for by Ahab—invested itself with terrors, not\rentirely underived from the land of spirits and of wails. So that,\rthrough their zeal for him, they had all conspired, so far as in them\rlay, to muffle up the knowledge of this thing from others; and hence it\rwas, that not till a considerable interval had elapsed, did it\rtranspire upon the Pequod’s decks.\r\rBut be all this as it may; let the unseen, ambiguous synod in the air,\ror the vindictive princes and potentates of fire, have to do or not\rwith earthly Ahab, yet, in this present matter of his leg, he took\rplain practical procedures;—he called the carpenter.\r\rAnd when that functionary appeared before him, he bade him without\rdelay set about making a new leg, and directed the mates to see him\rsupplied with all the studs and joists of jaw-ivory (Sperm Whale) which\rhad thus far been accumulated on the voyage, in order that a careful\rselection of the stoutest, clearest-grained stuff might be secured.\rThis done, the carpenter received orders to have the leg completed that\rnight; and to provide all the fittings for it, independent of those\rpertaining to the distrusted one in use. Moreover, the ship’s forge was\rordered to be hoisted out of its temporary idleness in the hold; and,\rto accelerate the affair, the blacksmith was commanded to proceed at\ronce to the forging of whatever iron contrivances might be needed.\r\r\rCHAPTER 107. The Carpenter.\r\rSeat thyself sultanically among the moons of Saturn, and take high\rabstracted man alone; and he seems a wonder, a grandeur, and a woe. But\rfrom the same point, take mankind in mass, and for the most part, they\rseem a mob of unnecessary duplicates, both contemporary and hereditary.\rBut most humble though he was, and far from furnishing an example of\rthe high, humane abstraction; the Pequod’s carpenter was no duplicate;\rhence, he now comes in person on this stage.\r\rLike all sea-going ship carpenters, and more especially those belonging\rto whaling vessels, he was, to a certain off-handed, practical extent,\ralike experienced in numerous trades and callings collateral to his\rown; the carpenter’s pursuit being the ancient and outbranching trunk\rof all those numerous handicrafts which more or less have to do with\rwood as an auxiliary material. But, besides the application to him of\rthe generic remark above, this carpenter of the Pequod was singularly\refficient in those thousand nameless mechanical emergencies continually\rrecurring in a large ship, upon a three or four years’ voyage, in\runcivilized and far-distant seas. For not to speak of his readiness in\rordinary duties:—repairing stove boats, sprung spars, reforming the\rshape of clumsy-bladed oars, inserting bull’s eyes in the deck, or new\rtree-nails in the side planks, and other miscellaneous matters more\rdirectly pertaining to his special business; he was moreover\runhesitatingly expert in all manner of conflicting aptitudes, both\ruseful and capricious.\r\rThe one grand stage where he enacted all his various parts so manifold,\rwas his vice-bench; a long rude ponderous table furnished with several\rvices, of different sizes, and both of iron and of wood. At all times\rexcept when whales were alongside, this bench was securely lashed\rathwartships against the rear of the Try-works.\r\rA belaying pin is found too large to be easily inserted into its hole:\rthe carpenter claps it into one of his ever-ready vices, and\rstraightway files it smaller. A lost land-bird of strange plumage\rstrays on board, and is made a captive: out of clean shaved rods of\rright-whale bone, and cross-beams of sperm whale ivory, the carpenter\rmakes a pagoda-looking cage for it. An oarsman sprains his wrist: the\rcarpenter concocts a soothing lotion. Stubb longed for vermillion stars\rto be painted upon the blade of his every oar; screwing each oar in his\rbig vice of wood, the carpenter symmetrically supplies the\rconstellation. A sailor takes a fancy to wear shark-bone ear-rings: the\rcarpenter drills his ears. Another has the toothache: the carpenter out\rpincers, and clapping one hand upon his bench bids him be seated there;\rbut the poor fellow unmanageably winces under the unconcluded\roperation; whirling round the handle of his wooden vice, the carpenter\rsigns him to clap his jaw in that, if he would have him draw the tooth.\r\rThus, this carpenter was prepared at all points, and alike indifferent\rand without respect in all. Teeth he accounted bits of ivory; heads he\rdeemed but top-blocks; men themselves he lightly held for capstans. But\rwhile now upon so wide a field thus variously accomplished and with\rsuch liveliness of expertness in him, too; all this would seem to argue\rsome uncommon vivacity of intelligence. But not precisely so. For\rnothing was this man more remarkable, than for a certain impersonal\rstolidity as it were; impersonal, I say; for it so shaded off into the\rsurrounding infinite of things, that it seemed one with the general\rstolidity discernible in the whole visible world; which while\rpauselessly active in uncounted modes, still eternally holds its peace,\rand ignores you, though you dig foundations for cathedrals. Yet was\rthis half-horrible stolidity in him, involving, too, as it appeared, an\rall-ramifying heartlessness;—yet was it oddly dashed at times, with an\rold, crutch-like, antediluvian, wheezing humorousness, not unstreaked\rnow and then with a certain grizzled wittiness; such as might have\rserved to pass the time during the midnight watch on the bearded\rforecastle of Noah’s ark. Was it that this old carpenter had been a\rlife-long wanderer, whose much rolling, to and fro, not only had\rgathered no moss; but what is more, had rubbed off whatever small\routward clingings might have originally pertained to him? He was a\rstript abstract; an unfractioned integral; uncompromised as a new-born\rbabe; living without premeditated reference to this world or the next.\rYou might almost say, that this strange uncompromisedness in him\rinvolved a sort of unintelligence; for in his numerous trades, he did\rnot seem to work so much by reason or by instinct, or simply because he\rhad been tutored to it, or by any intermixture of all these, even or\runeven; but merely by a kind of deaf and dumb, spontaneous literal\rprocess. He was a pure manipulator; his brain, if he had ever had one,\rmust have early oozed along into the muscles of his fingers. He was\rlike one of those unreasoning but still highly useful, _multum in\rparvo_, Sheffield contrivances, assuming the exterior—though a little\rswelled—of a common pocket knife; but containing, not only blades of\rvarious sizes, but also screw-drivers, cork-screws, tweezers, awls,\rpens, rulers, nail-filers, countersinkers. So, if his superiors wanted\rto use the carpenter for a screw-driver, all they had to do was to open\rthat part of him, and the screw was fast: or if for tweezers, take him\rup by the legs, and there they were.\r\rYet, as previously hinted, this omnitooled, open-and-shut carpenter,\rwas, after all, no mere machine of an automaton. If he did not have a\rcommon soul in him, he had a subtle something that somehow anomalously\rdid its duty. What that was, whether essence of quicksilver, or a few\rdrops of hartshorn, there is no telling. But there it was; and there it\rhad abided for now some sixty years or more. And this it was, this same\runaccountable, cunning life-principle in him; this it was, that kept\rhim a great part of the time soliloquizing; but only like an\runreasoning wheel, which also hummingly soliloquizes; or rather, his\rbody was a sentry-box and this soliloquizer on guard there, and talking\rall the time to keep himself awake.\r\r\rCHAPTER 108. Ahab and the Carpenter.\r\rThe Deck—First Night Watch.\r\r(_Carpenter standing before his vice-bench, and by the light of two\rlanterns busily filing the ivory joist for the leg, which joist is\rfirmly fixed in the vice. Slabs of ivory, leather straps, pads, screws,\rand various tools of all sorts lying about the bench. Forward, the red\rflame of the forge is seen, where the blacksmith is at work._)\r\rDrat the file, and drat the bone! That is hard which should be soft,\rand that is soft which should be hard. So we go, who file old jaws and\rshinbones. Let’s try another. Aye, now, this works better (_sneezes_).\rHalloa, this bone dust is (_sneezes_)—why it’s (_sneezes_)—yes it’s\r(_sneezes_)—bless my soul, it won’t let me speak! This is what an old\rfellow gets now for working in dead lumber. Saw a live tree, and you\rdon’t get this dust; amputate a live bone, and you don’t get it\r(_sneezes_). Come, come, you old Smut, there, bear a hand, and let’s\rhave that ferule and buckle-screw; I’ll be ready for them presently.\rLucky now (_sneezes_) there’s no knee-joint to make; that might puzzle\ra little; but a mere shinbone—why it’s easy as making hop-poles; only I\rshould like to put a good finish on. Time, time; if I but only had the\rtime, I could turn him out as neat a leg now as ever (_sneezes_)\rscraped to a lady in a parlor. Those buckskin legs and calves of legs\rI’ve seen in shop windows wouldn’t compare at all. They soak water,\rthey do; and of course get rheumatic, and have to be doctored\r(_sneezes_) with washes and lotions, just like live legs. There; before\rI saw it off, now, I must call his old Mogulship, and see whether the\rlength will be all right; too short, if anything, I guess. Ha! that’s\rthe heel; we are in luck; here he comes, or it’s somebody else, that’s\rcertain.\r\rAHAB (_advancing_). (_During the ensuing scene, the carpenter continues\rsneezing at times._)\r\rWell, manmaker!\r\rJust in time, sir. If the captain pleases, I will now mark the length.\rLet me measure, sir.\r\rMeasured for a leg! good. Well, it’s not the first time. About it!\rThere; keep thy finger on it. This is a cogent vice thou hast here,\rcarpenter; let me feel its grip once. So, so; it does pinch some.\r\rOh, sir, it will break bones—beware, beware!\r\rNo fear; I like a good grip; I like to feel something in this slippery\rworld that can hold, man. What’s Prometheus about there?—the\rblacksmith, I mean—what’s he about?\r\rHe must be forging the buckle-screw, sir, now.\r\rRight. It’s a partnership; he supplies the muscle part. He makes a\rfierce red flame there!\r\rAye, sir; he must have the white heat for this kind of fine work.\r\rUm-m. So he must. I do deem it now a most meaning thing, that that old\rGreek, Prometheus, who made men, they say, should have been a\rblacksmith, and animated them with fire; for what’s made in fire must\rproperly belong to fire; and so hell’s probable. How the soot flies!\rThis must be the remainder the Greek made the Africans of. Carpenter,\rwhen he’s through with that buckle, tell him to forge a pair of steel\rshoulder-blades; there’s a pedlar aboard with a crushing pack.\r\rSir?\r\rHold; while Prometheus is about it, I’ll order a complete man after a\rdesirable pattern. Imprimis, fifty feet high in his socks; then, chest\rmodelled after the Thames Tunnel; then, legs with roots to ’em, to stay\rin one place; then, arms three feet through the wrist; no heart at all,\rbrass forehead, and about a quarter of an acre of fine brains; and let\rme see—shall I order eyes to see outwards? No, but put a sky-light on\rtop of his head to illuminate inwards. There, take the order, and away.\r\rNow, what’s he speaking about, and who’s he speaking to, I should like\rto know? Shall I keep standing here? (_aside_).\r\r’Tis but indifferent architecture to make a blind dome; here’s one. No,\rno, no; I must have a lantern.\r\rHo, ho! That’s it, hey? Here are two, sir; one will serve my turn.\r\rWhat art thou thrusting that thief-catcher into my face for, man?\rThrusted light is worse than presented pistols.\r\rI thought, sir, that you spoke to carpenter.\r\rCarpenter? why that’s—but no;—a very tidy, and, I may say, an extremely\rgentlemanlike sort of business thou art in here, carpenter;—or would’st\rthou rather work in clay?\r\rSir?—Clay? clay, sir? That’s mud; we leave clay to ditchers, sir.\r\rThe fellow’s impious! What art thou sneezing about?\r\rBone is rather dusty, sir.\r\rTake the hint, then; and when thou art dead, never bury thyself under\rliving people’s noses.\r\rSir?—oh! ah!—I guess so;—yes—oh, dear!\r\rLook ye, carpenter, I dare say thou callest thyself a right good\rworkmanlike workman, eh? Well, then, will it speak thoroughly well for\rthy work, if, when I come to mount this leg thou makest, I shall\rnevertheless feel another leg in the same identical place with it; that\ris, carpenter, my old lost leg; the flesh and blood one, I mean. Canst\rthou not drive that old Adam away?\r\rTruly, sir, I begin to understand somewhat now. Yes, I have heard\rsomething curious on that score, sir; how that a dismasted man never\rentirely loses the feeling of his old spar, but it will be still\rpricking him at times. May I humbly ask if it be really so, sir?\r\rIt is, man. Look, put thy live leg here in the place where mine once\rwas; so, now, here is only one distinct leg to the eye, yet two to the\rsoul. Where thou feelest tingling life; there, exactly there, there to\ra hair, do I. Is’t a riddle?\r\rI should humbly call it a poser, sir.\r\rHist, then. How dost thou know that some entire, living, thinking thing\rmay not be invisibly and uninterpenetratingly standing precisely where\rthou now standest; aye, and standing there in thy spite? In thy most\rsolitary hours, then, dost thou not fear eavesdroppers? Hold, don’t\rspeak! And if I still feel the smart of my crushed leg, though it be\rnow so long dissolved; then, why mayst not thou, carpenter, feel the\rfiery pains of hell for ever, and without a body? Hah!\r\rGood Lord! Truly, sir, if it comes to that, I must calculate over\ragain; I think I didn’t carry a small figure, sir.\r\rLook ye, pudding-heads should never grant premises.—How long before the\rleg is done?\r\rPerhaps an hour, sir.\r\rBungle away at it then, and bring it to me (_turns to go_). Oh, Life!\rHere I am, proud as Greek god, and yet standing debtor to this\rblockhead for a bone to stand on! Cursed be that mortal\rinter-indebtedness which will not do away with ledgers. I would be free\ras air; and I’m down in the whole world’s books. I am so rich, I could\rhave given bid for bid with the wealthiest Prætorians at the auction of\rthe Roman empire (which was the world’s); and yet I owe for the flesh\rin the tongue I brag with. By heavens! I’ll get a crucible, and into\rit, and dissolve myself down to one small, compendious vertebra. So.\r\rCARPENTER (_resuming his work_).\r\rWell, well, well! Stubb knows him best of all, and Stubb always says\rhe’s queer; says nothing but that one sufficient little word queer;\rhe’s queer, says Stubb; he’s queer—queer, queer; and keeps dinning it\rinto Mr. Starbuck all the time—queer—sir—queer, queer, very queer. And\rhere’s his leg! Yes, now that I think of it, here’s his bedfellow! has\ra stick of whale’s jaw-bone for a wife! And this is his leg; he’ll\rstand on this. What was that now about one leg standing in three\rplaces, and all three places standing in one hell—how was that? Oh! I\rdon’t wonder he looked so scornful at me! I’m a sort of\rstrange-thoughted sometimes, they say; but that’s only haphazard-like.\rThen, a short, little old body like me, should never undertake to wade\rout into deep waters with tall, heron-built captains; the water chucks\ryou under the chin pretty quick, and there’s a great cry for\rlife-boats. And here’s the heron’s leg! long and slim, sure enough!\rNow, for most folks one pair of legs lasts a lifetime, and that must be\rbecause they use them mercifully, as a tender-hearted old lady uses her\rroly-poly old coach-horses. But Ahab; oh he’s a hard driver. Look,\rdriven one leg to death, and spavined the other for life, and now wears\rout bone legs by the cord. Halloa, there, you Smut! bear a hand there\rwith those screws, and let’s finish it before the resurrection fellow\rcomes a-calling with his horn for all legs, true or false, as\rbrewery-men go round collecting old beer barrels, to fill ’em up again.\rWhat a leg this is! It looks like a real live leg, filed down to\rnothing but the core; he’ll be standing on this to-morrow; he’ll be\rtaking altitudes on it. Halloa! I almost forgot the little oval slate,\rsmoothed ivory, where he figures up the latitude. So, so; chisel, file,\rand sand-paper, now!\r\r\rCHAPTER 109. Ahab and Starbuck in the Cabin.\r\rAccording to usage they were pumping the ship next morning; and lo! no\rinconsiderable oil came up with the water; the casks below must have\rsprung a bad leak. Much concern was shown; and Starbuck went down into\rthe cabin to report this unfavourable affair.*\r\r*In Sperm-whalemen with any considerable quantity of oil on board, it\ris a regular semi-weekly duty to conduct a hose into the hold, and\rdrench the casks with sea-water; which afterwards, at varying\rintervals, is removed by the ship’s pumps. Hereby the casks are sought\rto be kept damply tight; while by the changed character of the\rwithdrawn water, the mariners readily detect any serious leakage in the\rprecious cargo.\r\rNow, from the South and West the Pequod was drawing nigh to Formosa and\rthe Bashee Isles, between which lies one of the tropical outlets from\rthe China waters into the Pacific. And so Starbuck found Ahab with a\rgeneral chart of the oriental archipelagoes spread before him; and\ranother separate one representing the long eastern coasts of the\rJapanese islands—Niphon, Matsmai, and Sikoke. With his snow-white new\rivory leg braced against the screwed leg of his table, and with a long\rpruning-hook of a jack-knife in his hand, the wondrous old man, with\rhis back to the gangway door, was wrinkling his brow, and tracing his\rold courses again.\r\r“Who’s there?” hearing the footstep at the door, but not turning round\rto it. “On deck! Begone!”\r\r“Captain Ahab mistakes; it is I. The oil in the hold is leaking, sir.\rWe must up Burtons and break out.”\r\r“Up Burtons and break out? Now that we are nearing Japan; heave-to here\rfor a week to tinker a parcel of old hoops?”\r\r“Either do that, sir, or waste in one day more oil than we may make\rgood in a year. What we come twenty thousand miles to get is worth\rsaving, sir.”\r\r“So it is, so it is; if we get it.”\r\r“I was speaking of the oil in the hold, sir.”\r\r“And I was not speaking or thinking of that at all. Begone! Let it\rleak! I’m all aleak myself. Aye! leaks in leaks! not only full of leaky\rcasks, but those leaky casks are in a leaky ship; and that’s a far\rworse plight than the Pequod’s, man. Yet I don’t stop to plug my leak;\rfor who can find it in the deep-loaded hull; or how hope to plug it,\reven if found, in this life’s howling gale? Starbuck! I’ll not have the\rBurtons hoisted.”\r\r“What will the owners say, sir?”\r\r“Let the owners stand on Nantucket beach and outyell the Typhoons. What\rcares Ahab? Owners, owners? Thou art always prating to me, Starbuck,\rabout those miserly owners, as if the owners were my conscience. But\rlook ye, the only real owner of anything is its commander; and hark ye,\rmy conscience is in this ship’s keel.—On deck!”\r\r“Captain Ahab,” said the reddening mate, moving further into the cabin,\rwith a daring so strangely respectful and cautious that it almost\rseemed not only every way seeking to avoid the slightest outward\rmanifestation of itself, but within also seemed more than half\rdistrustful of itself; “A better man than I might well pass over in\rthee what he would quickly enough resent in a younger man; aye, and in\ra happier, Captain Ahab.”\r\r“Devils! Dost thou then so much as dare to critically think of me?—On\rdeck!”\r\r“Nay, sir, not yet; I do entreat. And I do dare, sir—to be forbearing!\rShall we not understand each other better than hitherto, Captain Ahab?”\r\rAhab seized a loaded musket from the rack (forming part of most\rSouth-Sea-men’s cabin furniture), and pointing it towards Starbuck,\rexclaimed: “There is one God that is Lord over the earth, and one\rCaptain that is lord over the Pequod.—On deck!”\r\rFor an instant in the flashing eyes of the mate, and his fiery cheeks,\ryou would have almost thought that he had really received the blaze of\rthe levelled tube. But, mastering his emotion, he half calmly rose, and\ras he quitted the cabin, paused for an instant and said: “Thou hast\routraged, not insulted me, sir; but for that I ask thee not to beware\rof Starbuck; thou wouldst but laugh; but let Ahab beware of Ahab;\rbeware of thyself, old man.”\r\r“He waxes brave, but nevertheless obeys; most careful bravery that!”\rmurmured Ahab, as Starbuck disappeared. “What’s that he said—Ahab\rbeware of Ahab—there’s something there!” Then unconsciously using the\rmusket for a staff, with an iron brow he paced to and fro in the little\rcabin; but presently the thick plaits of his forehead relaxed, and\rreturning the gun to the rack, he went to the deck.\r\r“Thou art but too good a fellow, Starbuck,” he said lowly to the mate;\rthen raising his voice to the crew: “Furl the t’gallant-sails, and\rclose-reef the top-sails, fore and aft; back the main-yard; up Burton,\rand break out in the main-hold.”\r\rIt were perhaps vain to surmise exactly why it was, that as respecting\rStarbuck, Ahab thus acted. It may have been a flash of honesty in him;\ror mere prudential policy which, under the circumstance, imperiously\rforbade the slightest symptom of open disaffection, however transient,\rin the important chief officer of his ship. However it was, his orders\rwere executed; and the Burtons were hoisted.\r\r\rCHAPTER 110. Queequeg in His Coffin.\r\rUpon searching, it was found that the casks last struck into the hold\rwere perfectly sound, and that the leak must be further off. So, it\rbeing calm weather, they broke out deeper and deeper, disturbing the\rslumbers of the huge ground-tier butts; and from that black midnight\rsending those gigantic moles into the daylight above. So deep did they\rgo; and so ancient, and corroded, and weedy the aspect of the lowermost\rpuncheons, that you almost looked next for some mouldy corner-stone\rcask containing coins of Captain Noah, with copies of the posted\rplacards, vainly warning the infatuated old world from the flood.\rTierce after tierce, too, of water, and bread, and beef, and shooks of\rstaves, and iron bundles of hoops, were hoisted out, till at last the\rpiled decks were hard to get about; and the hollow hull echoed under\rfoot, as if you were treading over empty catacombs, and reeled and\rrolled in the sea like an air-freighted demijohn. Top-heavy was the\rship as a dinnerless student with all Aristotle in his head. Well was\rit that the Typhoons did not visit them then.\r\rNow, at this time it was that my poor pagan companion, and fast\rbosom-friend, Queequeg, was seized with a fever, which brought him nigh\rto his endless end.\r\rBe it said, that in this vocation of whaling, sinecures are unknown;\rdignity and danger go hand in hand; till you get to be Captain, the\rhigher you rise the harder you toil. So with poor Queequeg, who, as\rharpooneer, must not only face all the rage of the living whale, but—as\rwe have elsewhere seen—mount his dead back in a rolling sea; and\rfinally descend into the gloom of the hold, and bitterly sweating all\rday in that subterraneous confinement, resolutely manhandle the\rclumsiest casks and see to their stowage. To be short, among whalemen,\rthe harpooneers are the holders, so called.\r\rPoor Queequeg! when the ship was about half disembowelled, you should\rhave stooped over the hatchway, and peered down upon him there; where,\rstripped to his woollen drawers, the tattooed savage was crawling about\ramid that dampness and slime, like a green spotted lizard at the bottom\rof a well. And a well, or an ice-house, it somehow proved to him, poor\rpagan; where, strange to say, for all the heat of his sweatings, he\rcaught a terrible chill which lapsed into a fever; and at last, after\rsome days’ suffering, laid him in his hammock, close to the very sill\rof the door of death. How he wasted and wasted away in those few\rlong-lingering days, till there seemed but little left of him but his\rframe and tattooing. But as all else in him thinned, and his\rcheek-bones grew sharper, his eyes, nevertheless, seemed growing fuller\rand fuller; they became of a strange softness of lustre; and mildly but\rdeeply looked out at you there from his sickness, a wondrous testimony\rto that immortal health in him which could not die, or be weakened. And\rlike circles on the water, which, as they grow fainter, expand; so his\reyes seemed rounding and rounding, like the rings of Eternity. An awe\rthat cannot be named would steal over you as you sat by the side of\rthis waning savage, and saw as strange things in his face, as any\rbeheld who were bystanders when Zoroaster died. For whatever is truly\rwondrous and fearful in man, never yet was put into words or books. And\rthe drawing near of Death, which alike levels all, alike impresses all\rwith a last revelation, which only an author from the dead could\radequately tell. So that—let us say it again—no dying Chaldee or Greek\rhad higher and holier thoughts than those, whose mysterious shades you\rsaw creeping over the face of poor Queequeg, as he quietly lay in his\rswaying hammock, and the rolling sea seemed gently rocking him to his\rfinal rest, and the ocean’s invisible flood-tide lifted him higher and\rhigher towards his destined heaven.\r\rNot a man of the crew but gave him up; and, as for Queequeg himself,\rwhat he thought of his case was forcibly shown by a curious favour he\rasked. He called one to him in the grey morning watch, when the day was\rjust breaking, and taking his hand, said that while in Nantucket he had\rchanced to see certain little canoes of dark wood, like the rich\rwar-wood of his native isle; and upon inquiry, he had learned that all\rwhalemen who died in Nantucket, were laid in those same dark canoes,\rand that the fancy of being so laid had much pleased him; for it was\rnot unlike the custom of his own race, who, after embalming a dead\rwarrior, stretched him out in his canoe, and so left him to be floated\raway to the starry archipelagoes; for not only do they believe that the\rstars are isles, but that far beyond all visible horizons, their own\rmild, uncontinented seas, interflow with the blue heavens; and so form\rthe white breakers of the milky way. He added, that he shuddered at the\rthought of being buried in his hammock, according to the usual\rsea-custom, tossed like something vile to the death-devouring sharks.\rNo: he desired a canoe like those of Nantucket, all the more congenial\rto him, being a whaleman, that like a whale-boat these coffin-canoes\rwere without a keel; though that involved but uncertain steering, and\rmuch lee-way adown the dim ages.\r\rNow, when this strange circumstance was made known aft, the carpenter\rwas at once commanded to do Queequeg’s bidding, whatever it might\rinclude. There was some heathenish, coffin-coloured old lumber aboard,\rwhich, upon a long previous voyage, had been cut from the aboriginal\rgroves of the Lackaday islands, and from these dark planks the coffin\rwas recommended to be made. No sooner was the carpenter apprised of the\rorder, than taking his rule, he forthwith with all the indifferent\rpromptitude of his character, proceeded into the forecastle and took\rQueequeg’s measure with great accuracy, regularly chalking Queequeg’s\rperson as he shifted the rule.\r\r“Ah! poor fellow! he’ll have to die now,” ejaculated the Long Island\rsailor.\r\rGoing to his vice-bench, the carpenter for convenience sake and general\rreference, now transferringly measured on it the exact length the\rcoffin was to be, and then made the transfer permanent by cutting two\rnotches at its extremities. This done, he marshalled the planks and his\rtools, and to work.\r\rWhen the last nail was driven, and the lid duly planed and fitted, he\rlightly shouldered the coffin and went forward with it, inquiring\rwhether they were ready for it yet in that direction.\r\rOverhearing the indignant but half-humorous cries with which the people\ron deck began to drive the coffin away, Queequeg, to every one’s\rconsternation, commanded that the thing should be instantly brought to\rhim, nor was there any denying him; seeing that, of all mortals, some\rdying men are the most tyrannical; and certainly, since they will\rshortly trouble us so little for evermore, the poor fellows ought to be\rindulged.\r\rLeaning over in his hammock, Queequeg long regarded the coffin with an\rattentive eye. He then called for his harpoon, had the wooden stock\rdrawn from it, and then had the iron part placed in the coffin along\rwith one of the paddles of his boat. All by his own request, also,\rbiscuits were then ranged round the sides within: a flask of fresh\rwater was placed at the head, and a small bag of woody earth scraped up\rin the hold at the foot; and a piece of sail-cloth being rolled up for\ra pillow, Queequeg now entreated to be lifted into his final bed, that\rhe might make trial of its comforts, if any it had. He lay without\rmoving a few minutes, then told one to go to his bag and bring out his\rlittle god, Yojo. Then crossing his arms on his breast with Yojo\rbetween, he called for the coffin lid (hatch he called it) to be placed\rover him. The head part turned over with a leather hinge, and there lay\rQueequeg in his coffin with little but his composed countenance in\rview. “Rarmai” (it will do; it is easy), he murmured at last, and\rsigned to be replaced in his hammock.\r\rBut ere this was done, Pip, who had been slily hovering near by all\rthis while, drew nigh to him where he lay, and with soft sobbings, took\rhim by the hand; in the other, holding his tambourine.\r\r“Poor rover! will ye never have done with all this weary roving? where\rgo ye now? But if the currents carry ye to those sweet Antilles where\rthe beaches are only beat with water-lilies, will ye do one little\rerrand for me? Seek out one Pip, who’s now been missing long: I think\rhe’s in those far Antilles. If ye find him, then comfort him; for he\rmust be very sad; for look! he’s left his tambourine behind;—I found\rit. Rig-a-dig, dig, dig! Now, Queequeg, die; and I’ll beat ye your\rdying march.”\r\r“I have heard,” murmured Starbuck, gazing down the scuttle, “that in\rviolent fevers, men, all ignorance, have talked in ancient tongues; and\rthat when the mystery is probed, it turns out always that in their\rwholly forgotten childhood those ancient tongues had been really spoken\rin their hearing by some lofty scholars. So, to my fond faith, poor\rPip, in this strange sweetness of his lunacy, brings heavenly vouchers\rof all our heavenly homes. Where learned he that, but there?—Hark! he\rspeaks again: but more wildly now.”\r\r“Form two and two! Let’s make a General of him! Ho, where’s his\rharpoon? Lay it across here.—Rig-a-dig, dig, dig! huzza! Oh for a game\rcock now to sit upon his head and crow! Queequeg dies game!—mind ye\rthat; Queequeg dies game!—take ye good heed of that; Queequeg dies\rgame! I say; game, game, game! but base little Pip, he died a coward;\rdied all a’shiver;—out upon Pip! Hark ye; if ye find Pip, tell all the\rAntilles he’s a runaway; a coward, a coward, a coward! Tell them he\rjumped from a whale-boat! I’d never beat my tambourine over base Pip,\rand hail him General, if he were once more dying here. No, no! shame\rupon all cowards—shame upon them! Let ’em go drown like Pip, that\rjumped from a whale-boat. Shame! shame!”\r\rDuring all this, Queequeg lay with closed eyes, as if in a dream. Pip\rwas led away, and the sick man was replaced in his hammock.\r\rBut now that he had apparently made every preparation for death; now\rthat his coffin was proved a good fit, Queequeg suddenly rallied; soon\rthere seemed no need of the carpenter’s box: and thereupon, when some\rexpressed their delighted surprise, he, in substance, said, that the\rcause of his sudden convalescence was this;—at a critical moment, he\rhad just recalled a little duty ashore, which he was leaving undone;\rand therefore had changed his mind about dying: he could not die yet,\rhe averred. They asked him, then, whether to live or die was a matter\rof his own sovereign will and pleasure. He answered, certainly. In a\rword, it was Queequeg’s conceit, that if a man made up his mind to\rlive, mere sickness could not kill him: nothing but a whale, or a gale,\ror some violent, ungovernable, unintelligent destroyer of that sort.\r\rNow, there is this noteworthy difference between savage and civilized;\rthat while a sick, civilized man may be six months convalescing,\rgenerally speaking, a sick savage is almost half-well again in a day.\rSo, in good time my Queequeg gained strength; and at length after\rsitting on the windlass for a few indolent days (but eating with a\rvigorous appetite) he suddenly leaped to his feet, threw out his arms\rand legs, gave himself a good stretching, yawned a little bit, and then\rspringing into the head of his hoisted boat, and poising a harpoon,\rpronounced himself fit for a fight.\r\rWith a wild whimsiness, he now used his coffin for a sea-chest; and\remptying into it his canvas bag of clothes, set them in order there.\rMany spare hours he spent, in carving the lid with all manner of\rgrotesque figures and drawings; and it seemed that hereby he was\rstriving, in his rude way, to copy parts of the twisted tattooing on\rhis body. And this tattooing had been the work of a departed prophet\rand seer of his island, who, by those hieroglyphic marks, had written\rout on his body a complete theory of the heavens and the earth, and a\rmystical treatise on the art of attaining truth; so that Queequeg in\rhis own proper person was a riddle to unfold; a wondrous work in one\rvolume; but whose mysteries not even himself could read, though his own\rlive heart beat against them; and these mysteries were therefore\rdestined in the end to moulder away with the living parchment whereon\rthey were inscribed, and so be unsolved to the last. And this thought\rit must have been which suggested to Ahab that wild exclamation of his,\rwhen one morning turning away from surveying poor Queequeg—“Oh,\rdevilish tantalization of the gods!”\r\r\rCHAPTER 111. The Pacific.\r\rWhen gliding by the Bashee isles we emerged at last upon the great\rSouth Sea; were it not for other things, I could have greeted my dear\rPacific with uncounted thanks, for now the long supplication of my\ryouth was answered; that serene ocean rolled eastwards from me a\rthousand leagues of blue.\r\rThere is, one knows not what sweet mystery about this sea, whose gently\rawful stirrings seem to speak of some hidden soul beneath; like those\rfabled undulations of the Ephesian sod over the buried Evangelist St.\rJohn. And meet it is, that over these sea-pastures, wide-rolling watery\rprairies and Potters’ Fields of all four continents, the waves should\rrise and fall, and ebb and flow unceasingly; for here, millions of\rmixed shades and shadows, drowned dreams, somnambulisms, reveries; all\rthat we call lives and souls, lie dreaming, dreaming, still; tossing\rlike slumberers in their beds; the ever-rolling waves but made so by\rtheir restlessness.\r\rTo any meditative Magian rover, this serene Pacific, once beheld, must\rever after be the sea of his adoption. It rolls the midmost waters of\rthe world, the Indian ocean and Atlantic being but its arms. The same\rwaves wash the moles of the new-built Californian towns, but yesterday\rplanted by the recentest race of men, and lave the faded but still\rgorgeous skirts of Asiatic lands, older than Abraham; while all between\rfloat milky-ways of coral isles, and low-lying, endless, unknown\rArchipelagoes, and impenetrable Japans. Thus this mysterious, divine\rPacific zones the world’s whole bulk about; makes all coasts one bay to\rit; seems the tide-beating heart of earth. Lifted by those eternal\rswells, you needs must own the seductive god, bowing your head to Pan.\r\rBut few thoughts of Pan stirred Ahab’s brain, as standing like an iron\rstatue at his accustomed place beside the mizen rigging, with one\rnostril he unthinkingly snuffed the sugary musk from the Bashee isles\r(in whose sweet woods mild lovers must be walking), and with the other\rconsciously inhaled the salt breath of the new found sea; that sea in\rwhich the hated White Whale must even then be swimming. Launched at\rlength upon these almost final waters, and gliding towards the Japanese\rcruising-ground, the old man’s purpose intensified itself. His firm\rlips met like the lips of a vice; the Delta of his forehead’s veins\rswelled like overladen brooks; in his very sleep, his ringing cry ran\rthrough the vaulted hull, “Stern all! the White Whale spouts thick\rblood!”\r\r\rCHAPTER 112. The Blacksmith.\r\rAvailing himself of the mild, summer-cool weather that now reigned in\rthese latitudes, and in preparation for the peculiarly active pursuits\rshortly to be anticipated, Perth, the begrimed, blistered old\rblacksmith, had not removed his portable forge to the hold again, after\rconcluding his contributory work for Ahab’s leg, but still retained it\ron deck, fast lashed to ringbolts by the foremast; being now almost\rincessantly invoked by the headsmen, and harpooneers, and bowsmen to do\rsome little job for them; altering, or repairing, or new shaping their\rvarious weapons and boat furniture. Often he would be surrounded by an\reager circle, all waiting to be served; holding boat-spades,\rpike-heads, harpoons, and lances, and jealously watching his every\rsooty movement, as he toiled. Nevertheless, this old man’s was a\rpatient hammer wielded by a patient arm. No murmur, no impatience, no\rpetulance did come from him. Silent, slow, and solemn; bowing over\rstill further his chronically broken back, he toiled away, as if toil\rwere life itself, and the heavy beating of his hammer the heavy beating\rof his heart. And so it was.—Most miserable!\r\rA peculiar walk in this old man, a certain slight but painful appearing\ryawing in his gait, had at an early period of the voyage excited the\rcuriosity of the mariners. And to the importunity of their persisted\rquestionings he had finally given in; and so it came to pass that every\rone now knew the shameful story of his wretched fate.\r\rBelated, and not innocently, one bitter winter’s midnight, on the road\rrunning between two country towns, the blacksmith half-stupidly felt\rthe deadly numbness stealing over him, and sought refuge in a leaning,\rdilapidated barn. The issue was, the loss of the extremities of both\rfeet. Out of this revelation, part by part, at last came out the four\racts of the gladness, and the one long, and as yet uncatastrophied\rfifth act of the grief of his life’s drama.\r\rHe was an old man, who, at the age of nearly sixty, had postponedly\rencountered that thing in sorrow’s technicals called ruin. He had been\ran artisan of famed excellence, and with plenty to do; owned a house\rand garden; embraced a youthful, daughter-like, loving wife, and three\rblithe, ruddy children; every Sunday went to a cheerful-looking church,\rplanted in a grove. But one night, under cover of darkness, and further\rconcealed in a most cunning disguisement, a desperate burglar slid into\rhis happy home, and robbed them all of everything. And darker yet to\rtell, the blacksmith himself did ignorantly conduct this burglar into\rhis family’s heart. It was the Bottle Conjuror! Upon the opening of\rthat fatal cork, forth flew the fiend, and shrivelled up his home. Now,\rfor prudent, most wise, and economic reasons, the blacksmith’s shop was\rin the basement of his dwelling, but with a separate entrance to it; so\rthat always had the young and loving healthy wife listened with no\runhappy nervousness, but with vigorous pleasure, to the stout ringing\rof her young-armed old husband’s hammer; whose reverberations, muffled\rby passing through the floors and walls, came up to her, not unsweetly,\rin her nursery; and so, to stout Labor’s iron lullaby, the blacksmith’s\rinfants were rocked to slumber.\r\rOh, woe on woe! Oh, Death, why canst thou not sometimes be timely?\rHadst thou taken this old blacksmith to thyself ere his full ruin came\rupon him, then had the young widow had a delicious grief, and her\rorphans a truly venerable, legendary sire to dream of in their after\ryears; and all of them a care-killing competency. But Death plucked\rdown some virtuous elder brother, on whose whistling daily toil solely\rhung the responsibilities of some other family, and left the worse than\ruseless old man standing, till the hideous rot of life should make him\reasier to harvest.\r\rWhy tell the whole? The blows of the basement hammer every day grew\rmore and more between; and each blow every day grew fainter than the\rlast; the wife sat frozen at the window, with tearless eyes,\rglitteringly gazing into the weeping faces of her children; the bellows\rfell; the forge choked up with cinders; the house was sold; the mother\rdived down into the long church-yard grass; her children twice followed\rher thither; and the houseless, familyless old man staggered off a\rvagabond in crape; his every woe unreverenced; his grey head a scorn to\rflaxen curls!\r\rDeath seems the only desirable sequel for a career like this; but Death\ris only a launching into the region of the strange Untried; it is but\rthe first salutation to the possibilities of the immense Remote, the\rWild, the Watery, the Unshored; therefore, to the death-longing eyes of\rsuch men, who still have left in them some interior compunctions\ragainst suicide, does the all-contributed and all-receptive ocean\ralluringly spread forth his whole plain of unimaginable, taking\rterrors, and wonderful, new-life adventures; and from the hearts of\rinfinite Pacifics, the thousand mermaids sing to them—“Come hither,\rbroken-hearted; here is another life without the guilt of intermediate\rdeath; here are wonders supernatural, without dying for them. Come\rhither! bury thyself in a life which, to your now equally abhorred and\rabhorring, landed world, is more oblivious than death. Come hither! put\rup _thy_ gravestone, too, within the churchyard, and come hither, till\rwe marry thee!”\r\rHearkening to these voices, East and West, by early sunrise, and by\rfall of eve, the blacksmith’s soul responded, Aye, I come! And so Perth\rwent a-whaling.\r\r\rCHAPTER 113. The Forge.\r\rWith matted beard, and swathed in a bristling shark-skin apron, about\rmid-day, Perth was standing between his forge and anvil, the latter\rplaced upon an iron-wood log, with one hand holding a pike-head in the\rcoals, and with the other at his forge’s lungs, when Captain Ahab came\ralong, carrying in his hand a small rusty-looking leathern bag. While\ryet a little distance from the forge, moody Ahab paused; till at last,\rPerth, withdrawing his iron from the fire, began hammering it upon the\ranvil—the red mass sending off the sparks in thick hovering flights,\rsome of which flew close to Ahab.\r\r“Are these thy Mother Carey’s chickens, Perth? they are always flying\rin thy wake; birds of good omen, too, but not to all;—look here, they\rburn; but thou—thou liv’st among them without a scorch.”\r\r“Because I am scorched all over, Captain Ahab,” answered Perth, resting\rfor a moment on his hammer; “I am past scorching; not easily can’st\rthou scorch a scar.”\r\r“Well, well; no more. Thy shrunk voice sounds too calmly, sanely woeful\rto me. In no Paradise myself, I am impatient of all misery in others\rthat is not mad. Thou should’st go mad, blacksmith; say, why dost thou\rnot go mad? How can’st thou endure without being mad? Do the heavens\ryet hate thee, that thou can’st not go mad?—What wert thou making\rthere?”\r\r“Welding an old pike-head, sir; there were seams and dents in it.”\r\r“And can’st thou make it all smooth again, blacksmith, after such hard\rusage as it had?”\r\r“I think so, sir.”\r\r“And I suppose thou can’st smoothe almost any seams and dents; never\rmind how hard the metal, blacksmith?”\r\r“Aye, sir, I think I can; all seams and dents but one.”\r\r“Look ye here, then,” cried Ahab, passionately advancing, and leaning\rwith both hands on Perth’s shoulders; “look ye here—_here_—can ye\rsmoothe out a seam like this, blacksmith,” sweeping one hand across his\rribbed brow; “if thou could’st, blacksmith, glad enough would I lay my\rhead upon thy anvil, and feel thy heaviest hammer between my eyes.\rAnswer! Can’st thou smoothe this seam?”\r\r“Oh! that is the one, sir! Said I not all seams and dents but one?”\r\r“Aye, blacksmith, it is the one; aye, man, it is unsmoothable; for\rthough thou only see’st it here in my flesh, it has worked down into\rthe bone of my skull—_that_ is all wrinkles! But, away with child’s\rplay; no more gaffs and pikes to-day. Look ye here!” jingling the\rleathern bag, as if it were full of gold coins. “I, too, want a harpoon\rmade; one that a thousand yoke of fiends could not part, Perth;\rsomething that will stick in a whale like his own fin-bone. There’s the\rstuff,” flinging the pouch upon the anvil. “Look ye, blacksmith, these\rare the gathered nail-stubbs of the steel shoes of racing horses.”\r\r“Horse-shoe stubbs, sir? Why, Captain Ahab, thou hast here, then, the\rbest and stubbornest stuff we blacksmiths ever work.”\r\r“I know it, old man; these stubbs will weld together like glue from the\rmelted bones of murderers. Quick! forge me the harpoon. And forge me\rfirst, twelve rods for its shank; then wind, and twist, and hammer\rthese twelve together like the yarns and strands of a tow-line. Quick!\rI’ll blow the fire.”\r\rWhen at last the twelve rods were made, Ahab tried them, one by one, by\rspiralling them, with his own hand, round a long, heavy iron bolt. “A\rflaw!” rejecting the last one. “Work that over again, Perth.”\r\rThis done, Perth was about to begin welding the twelve into one, when\rAhab stayed his hand, and said he would weld his own iron. As, then,\rwith regular, gasping hems, he hammered on the anvil, Perth passing to\rhim the glowing rods, one after the other, and the hard pressed forge\rshooting up its intense straight flame, the Parsee passed silently, and\rbowing over his head towards the fire, seemed invoking some curse or\rsome blessing on the toil. But, as Ahab looked up, he slid aside.\r\r“What’s that bunch of lucifers dodging about there for?” muttered\rStubb, looking on from the forecastle. “That Parsee smells fire like a\rfusee; and smells of it himself, like a hot musket’s powder-pan.”\r\rAt last the shank, in one complete rod, received its final heat; and as\rPerth, to temper it, plunged it all hissing into the cask of water near\rby, the scalding steam shot up into Ahab’s bent face.\r\r“Would’st thou brand me, Perth?” wincing for a moment with the pain;\r“have I been but forging my own branding-iron, then?”\r\r“Pray God, not that; yet I fear something, Captain Ahab. Is not this\rharpoon for the White Whale?”\r\r“For the white fiend! But now for the barbs; thou must make them\rthyself, man. Here are my razors—the best of steel; here, and make the\rbarbs sharp as the needle-sleet of the Icy Sea.”\r\rFor a moment, the old blacksmith eyed the razors as though he would\rfain not use them.\r\r“Take them, man, I have no need for them; for I now neither shave, sup,\rnor pray till—but here—to work!”\r\rFashioned at last into an arrowy shape, and welded by Perth to the\rshank, the steel soon pointed the end of the iron; and as the\rblacksmith was about giving the barbs their final heat, prior to\rtempering them, he cried to Ahab to place the water-cask near.\r\r“No, no—no water for that; I want it of the true death-temper. Ahoy,\rthere! Tashtego, Queequeg, Daggoo! What say ye, pagans! Will ye give me\ras much blood as will cover this barb?” holding it high up. A cluster\rof dark nods replied, Yes. Three punctures were made in the heathen\rflesh, and the White Whale’s barbs were then tempered.\r\r“Ego non baptizo te in nomine patris, sed in nomine diaboli!”\rdeliriously howled Ahab, as the malignant iron scorchingly devoured the\rbaptismal blood.\r\rNow, mustering the spare poles from below, and selecting one of\rhickory, with the bark still investing it, Ahab fitted the end to the\rsocket of the iron. A coil of new tow-line was then unwound, and some\rfathoms of it taken to the windlass, and stretched to a great tension.\rPressing his foot upon it, till the rope hummed like a harp-string,\rthen eagerly bending over it, and seeing no strandings, Ahab exclaimed,\r“Good! and now for the seizings.”\r\rAt one extremity the rope was unstranded, and the separate spread yarns\rwere all braided and woven round the socket of the harpoon; the pole\rwas then driven hard up into the socket; from the lower end the rope\rwas traced half-way along the pole’s length, and firmly secured so,\rwith intertwistings of twine. This done, pole, iron, and rope—like the\rThree Fates—remained inseparable, and Ahab moodily stalked away with\rthe weapon; the sound of his ivory leg, and the sound of the hickory\rpole, both hollowly ringing along every plank. But ere he entered his\rcabin, light, unnatural, half-bantering, yet most piteous sound was\rheard. Oh, Pip! thy wretched laugh, thy idle but unresting eye; all thy\rstrange mummeries not unmeaningly blended with the black tragedy of the\rmelancholy ship, and mocked it!\r\r\rCHAPTER 114. The Gilder.\r\rPenetrating further and further into the heart of the Japanese cruising\rground, the Pequod was soon all astir in the fishery. Often, in mild,\rpleasant weather, for twelve, fifteen, eighteen, and twenty hours on\rthe stretch, they were engaged in the boats, steadily pulling, or\rsailing, or paddling after the whales, or for an interlude of sixty or\rseventy minutes calmly awaiting their uprising; though with but small\rsuccess for their pains.\r\rAt such times, under an abated sun; afloat all day upon smooth, slow\rheaving swells; seated in his boat, light as a birch canoe; and so\rsociably mixing with the soft waves themselves, that like hearth-stone\rcats they purr against the gunwale; these are the times of dreamy\rquietude, when beholding the tranquil beauty and brilliancy of the\rocean’s skin, one forgets the tiger heart that pants beneath it; and\rwould not willingly remember, that this velvet paw but conceals a\rremorseless fang.\r\rThese are the times, when in his whale-boat the rover softly feels a\rcertain filial, confident, land-like feeling towards the sea; that he\rregards it as so much flowery earth; and the distant ship revealing\ronly the tops of her masts, seems struggling forward, not through high\rrolling waves, but through the tall grass of a rolling prairie: as when\rthe western emigrants’ horses only show their erected ears, while their\rhidden bodies widely wade through the amazing verdure.\r\rThe long-drawn virgin vales; the mild blue hill-sides; as over these\rthere steals the hush, the hum; you almost swear that play-wearied\rchildren lie sleeping in these solitudes, in some glad May-time, when\rthe flowers of the woods are plucked. And all this mixes with your most\rmystic mood; so that fact and fancy, half-way meeting, interpenetrate,\rand form one seamless whole.\r\rNor did such soothing scenes, however temporary, fail of at least as\rtemporary an effect on Ahab. But if these secret golden keys did seem\rto open in him his own secret golden treasuries, yet did his breath\rupon them prove but tarnishing.\r\rOh, grassy glades! oh, ever vernal endless landscapes in the soul; in\rye,—though long parched by the dead drought of the earthy life,—in ye,\rmen yet may roll, like young horses in new morning clover; and for some\rfew fleeting moments, feel the cool dew of the life immortal on them.\rWould to God these blessed calms would last. But the mingled, mingling\rthreads of life are woven by warp and woof: calms crossed by storms, a\rstorm for every calm. There is no steady unretracing progress in this\rlife; we do not advance through fixed gradations, and at the last one\rpause:—through infancy’s unconscious spell, boyhood’s thoughtless\rfaith, adolescence’ doubt (the common doom), then scepticism, then\rdisbelief, resting at last in manhood’s pondering repose of If. But\ronce gone through, we trace the round again; and are infants, boys, and\rmen, and Ifs eternally. Where lies the final harbor, whence we unmoor\rno more? In what rapt ether sails the world, of which the weariest will\rnever weary? Where is the foundling’s father hidden? Our souls are like\rthose orphans whose unwedded mothers die in bearing them: the secret of\rour paternity lies in their grave, and we must there to learn it.\r\rAnd that same day, too, gazing far down from his boat’s side into that\rsame golden sea, Starbuck lowly murmured:—\r\r“Loveliness unfathomable, as ever lover saw in his young bride’s\reye!—Tell me not of thy teeth-tiered sharks, and thy kidnapping\rcannibal ways. Let faith oust fact; let fancy oust memory; I look deep\rdown and do believe.”\r\rAnd Stubb, fish-like, with sparkling scales, leaped up in that same\rgolden light:—\r\r“I am Stubb, and Stubb has his history; but here Stubb takes oaths that\rhe has always been jolly!”\r\r\rCHAPTER 115. The Pequod Meets The Bachelor.\r\rAnd jolly enough were the sights and the sounds that came bearing down\rbefore the wind, some few weeks after Ahab’s harpoon had been welded.\r\rIt was a Nantucket ship, the Bachelor, which had just wedged in her\rlast cask of oil, and bolted down her bursting hatches; and now, in\rglad holiday apparel, was joyously, though somewhat vain-gloriously,\rsailing round among the widely-separated ships on the ground, previous\rto pointing her prow for home.\r\rThe three men at her mast-head wore long streamers of narrow red\rbunting at their hats; from the stern, a whale-boat was suspended,\rbottom down; and hanging captive from the bowsprit was seen the long\rlower jaw of the last whale they had slain. Signals, ensigns, and jacks\rof all colours were flying from her rigging, on every side. Sideways\rlashed in each of her three basketed tops were two barrels of sperm;\rabove which, in her top-mast cross-trees, you saw slender breakers of\rthe same precious fluid; and nailed to her main truck was a brazen\rlamp.\r\rAs was afterwards learned, the Bachelor had met with the most\rsurprising success; all the more wonderful, for that while cruising in\rthe same seas numerous other vessels had gone entire months without\rsecuring a single fish. Not only had barrels of beef and bread been\rgiven away to make room for the far more valuable sperm, but additional\rsupplemental casks had been bartered for, from the ships she had met;\rand these were stowed along the deck, and in the captain’s and\rofficers’ state-rooms. Even the cabin table itself had been knocked\rinto kindling-wood; and the cabin mess dined off the broad head of an\roil-butt, lashed down to the floor for a centrepiece. In the\rforecastle, the sailors had actually caulked and pitched their chests,\rand filled them; it was humorously added, that the cook had clapped a\rhead on his largest boiler, and filled it; that the steward had plugged\rhis spare coffee-pot and filled it; that the harpooneers had headed the\rsockets of their irons and filled them; that indeed everything was\rfilled with sperm, except the captain’s pantaloons pockets, and those\rhe reserved to thrust his hands into, in self-complacent testimony of\rhis entire satisfaction.\r\rAs this glad ship of good luck bore down upon the moody Pequod, the\rbarbarian sound of enormous drums came from her forecastle; and drawing\rstill nearer, a crowd of her men were seen standing round her huge\rtry-pots, which, covered with the parchment-like _poke_ or stomach skin\rof the black fish, gave forth a loud roar to every stroke of the\rclenched hands of the crew. On the quarter-deck, the mates and\rharpooneers were dancing with the olive-hued girls who had eloped with\rthem from the Polynesian Isles; while suspended in an ornamented boat,\rfirmly secured aloft between the foremast and mainmast, three Long\rIsland negroes, with glittering fiddle-bows of whale ivory, were\rpresiding over the hilarious jig. Meanwhile, others of the ship’s\rcompany were tumultuously busy at the masonry of the try-works, from\rwhich the huge pots had been removed. You would have almost thought\rthey were pulling down the cursed Bastille, such wild cries they\rraised, as the now useless brick and mortar were being hurled into the\rsea.\r\rLord and master over all this scene, the captain stood erect on the\rship’s elevated quarter-deck, so that the whole rejoicing drama was\rfull before him, and seemed merely contrived for his own individual\rdiversion.\r\rAnd Ahab, he too was standing on his quarter-deck, shaggy and black,\rwith a stubborn gloom; and as the two ships crossed each other’s\rwakes—one all jubilations for things passed, the other all forebodings\ras to things to come—their two captains in themselves impersonated the\rwhole striking contrast of the scene.\r\r“Come aboard, come aboard!” cried the gay Bachelor’s commander, lifting\ra glass and a bottle in the air.\r\r“Hast seen the White Whale?” gritted Ahab in reply.\r\r“No; only heard of him; but don’t believe in him at all,” said the\rother good-humoredly. “Come aboard!”\r\r“Thou art too damned jolly. Sail on. Hast lost any men?”\r\r“Not enough to speak of—two islanders, that’s all;—but come aboard, old\rhearty, come along. I’ll soon take that black from your brow. Come\ralong, will ye (merry’s the play); a full ship and homeward-bound.”\r\r“How wondrous familiar is a fool!” muttered Ahab; then aloud, “Thou art\ra full ship and homeward bound, thou sayst; well, then, call me an\rempty ship, and outward-bound. So go thy ways, and I will mine. Forward\rthere! Set all sail, and keep her to the wind!”\r\rAnd thus, while the one ship went cheerily before the breeze, the other\rstubbornly fought against it; and so the two vessels parted; the crew\rof the Pequod looking with grave, lingering glances towards the\rreceding Bachelor; but the Bachelor’s men never heeding their gaze for\rthe lively revelry they were in. And as Ahab, leaning over the\rtaffrail, eyed the homeward-bound craft, he took from his pocket a\rsmall vial of sand, and then looking from the ship to the vial, seemed\rthereby bringing two remote associations together, for that vial was\rfilled with Nantucket soundings.\r\r\rCHAPTER 116. The Dying Whale.\r\rNot seldom in this life, when, on the right side, fortune’s favourites\rsail close by us, we, though all adroop before, catch somewhat of the\rrushing breeze, and joyfully feel our bagging sails fill out. So seemed\rit with the Pequod. For next day after encountering the gay Bachelor,\rwhales were seen and four were slain; and one of them by Ahab.\r\rIt was far down the afternoon; and when all the spearings of the\rcrimson fight were done: and floating in the lovely sunset sea and sky,\rsun and whale both stilly died together; then, such a sweetness and\rsuch plaintiveness, such inwreathing orisons curled up in that rosy\rair, that it almost seemed as if far over from the deep green convent\rvalleys of the Manilla isles, the Spanish land-breeze, wantonly turned\rsailor, had gone to sea, freighted with these vesper hymns.\r\rSoothed again, but only soothed to deeper gloom, Ahab, who had sterned\roff from the whale, sat intently watching his final wanings from the\rnow tranquil boat. For that strange spectacle observable in all sperm\rwhales dying—the turning sunwards of the head, and so expiring—that\rstrange spectacle, beheld of such a placid evening, somehow to Ahab\rconveyed a wondrousness unknown before.\r\r“He turns and turns him to it,—how slowly, but how steadfastly, his\rhomage-rendering and invoking brow, with his last dying motions. He too\rworships fire; most faithful, broad, baronial vassal of the sun!—Oh\rthat these too-favouring eyes should see these too-favouring sights.\rLook! here, far water-locked; beyond all hum of human weal or woe; in\rthese most candid and impartial seas; where to traditions no rocks\rfurnish tablets; where for long Chinese ages, the billows have still\rrolled on speechless and unspoken to, as stars that shine upon the\rNiger’s unknown source; here, too, life dies sunwards full of faith;\rbut see! no sooner dead, than death whirls round the corpse, and it\rheads some other way.\r\r“Oh, thou dark Hindoo half of nature, who of drowned bones hast builded\rthy separate throne somewhere in the heart of these unverdured seas;\rthou art an infidel, thou queen, and too truly speakest to me in the\rwide-slaughtering Typhoon, and the hushed burial of its after calm. Nor\rhas this thy whale sunwards turned his dying head, and then gone round\ragain, without a lesson to me.\r\r“Oh, trebly hooped and welded hip of power! Oh, high aspiring,\rrainbowed jet!—that one strivest, this one jettest all in vain! In\rvain, oh whale, dost thou seek intercedings with yon all-quickening\rsun, that only calls forth life, but gives it not again. Yet dost thou,\rdarker half, rock me with a prouder, if a darker faith. All thy\runnamable imminglings float beneath me here; I am buoyed by breaths of\ronce living things, exhaled as air, but water now.\r\r“Then hail, for ever hail, O sea, in whose eternal tossings the wild\rfowl finds his only rest. Born of earth, yet suckled by the sea; though\rhill and valley mothered me, ye billows are my foster-brothers!”\r\r\rCHAPTER 117. The Whale Watch.\r\rThe four whales slain that evening had died wide apart; one, far to\rwindward; one, less distant, to leeward; one ahead; one astern. These\rlast three were brought alongside ere nightfall; but the windward one\rcould not be reached till morning; and the boat that had killed it lay\rby its side all night; and that boat was Ahab’s.\r\rThe waif-pole was thrust upright into the dead whale’s spout-hole; and\rthe lantern hanging from its top, cast a troubled flickering glare upon\rthe black, glossy back, and far out upon the midnight waves, which\rgently chafed the whale’s broad flank, like soft surf upon a beach.\r\rAhab and all his boat’s crew seemed asleep but the Parsee; who\rcrouching in the bow, sat watching the sharks, that spectrally played\rround the whale, and tapped the light cedar planks with their tails. A\rsound like the moaning in squadrons over Asphaltites of unforgiven\rghosts of Gomorrah, ran shuddering through the air.\r\rStarted from his slumbers, Ahab, face to face, saw the Parsee; and\rhooped round by the gloom of the night they seemed the last men in a\rflooded world. “I have dreamed it again,” said he.\r\r“Of the hearses? Have I not said, old man, that neither hearse nor\rcoffin can be thine?”\r\r“And who are hearsed that die on the sea?”\r\r“But I said, old man, that ere thou couldst die on this voyage, two\rhearses must verily be seen by thee on the sea; the first not made by\rmortal hands; and the visible wood of the last one must be grown in\rAmerica.”\r\r“Aye, aye! a strange sight that, Parsee:—a hearse and its plumes\rfloating over the ocean with the waves for the pall-bearers. Ha! Such a\rsight we shall not soon see.”\r\r“Believe it or not, thou canst not die till it be seen, old man.”\r\r“And what was that saying about thyself?”\r\r“Though it come to the last, I shall still go before thee thy pilot.”\r\r“And when thou art so gone before—if that ever befall—then ere I can\rfollow, thou must still appear to me, to pilot me still?—Was it not so?\rWell, then, did I believe all ye say, oh my pilot! I have here two\rpledges that I shall yet slay Moby Dick and survive it.”\r\r“Take another pledge, old man,” said the Parsee, as his eyes lighted up\rlike fire-flies in the gloom—“Hemp only can kill thee.”\r\r“The gallows, ye mean.—I am immortal then, on land and on sea,” cried\rAhab, with a laugh of derision;—“Immortal on land and on sea!”\r\rBoth were silent again, as one man. The grey dawn came on, and the\rslumbering crew arose from the boat’s bottom, and ere noon the dead\rwhale was brought to the ship.\r\r\rCHAPTER 118. The Quadrant.\r\rThe season for the Line at length drew near; and every day when Ahab,\rcoming from his cabin, cast his eyes aloft, the vigilant helmsman would\rostentatiously handle his spokes, and the eager mariners quickly run to\rthe braces, and would stand there with all their eyes centrally fixed\ron the nailed doubloon; impatient for the order to point the ship’s\rprow for the equator. In good time the order came. It was hard upon\rhigh noon; and Ahab, seated in the bows of his high-hoisted boat, was\rabout taking his wonted daily observation of the sun to determine his\rlatitude.\r\rNow, in that Japanese sea, the days in summer are as freshets of\reffulgences. That unblinkingly vivid Japanese sun seems the blazing\rfocus of the glassy ocean’s immeasurable burning-glass. The sky looks\rlacquered; clouds there are none; the horizon floats; and this\rnakedness of unrelieved radiance is as the insufferable splendors of\rGod’s throne. Well that Ahab’s quadrant was furnished with coloured\rglasses, through which to take sight of that solar fire. So, swinging\rhis seated form to the roll of the ship, and with his\rastrological-looking instrument placed to his eye, he remained in that\rposture for some moments to catch the precise instant when the sun\rshould gain its precise meridian. Meantime while his whole attention\rwas absorbed, the Parsee was kneeling beneath him on the ship’s deck,\rand with face thrown up like Ahab’s, was eyeing the same sun with him;\ronly the lids of his eyes half hooded their orbs, and his wild face was\rsubdued to an earthly passionlessness. At length the desired\robservation was taken; and with his pencil upon his ivory leg, Ahab\rsoon calculated what his latitude must be at that precise instant. Then\rfalling into a moment’s revery, he again looked up towards the sun and\rmurmured to himself: “Thou sea-mark! thou high and mighty Pilot! thou\rtellest me truly where I _am_—but canst thou cast the least hint where\rI _shall_ be? Or canst thou tell where some other thing besides me is\rthis moment living? Where is Moby Dick? This instant thou must be\reyeing him. These eyes of mine look into the very eye that is even now\rbeholding him; aye, and into the eye that is even now equally beholding\rthe objects on the unknown, thither side of thee, thou sun!”\r\rThen gazing at his quadrant, and handling, one after the other, its\rnumerous cabalistical contrivances, he pondered again, and muttered:\r“Foolish toy! babies’ plaything of haughty Admirals, and Commodores,\rand Captains; the world brags of thee, of thy cunning and might; but\rwhat after all canst thou do, but tell the poor, pitiful point, where\rthou thyself happenest to be on this wide planet, and the hand that\rholds thee: no! not one jot more! Thou canst not tell where one drop of\rwater or one grain of sand will be to-morrow noon; and yet with thy\rimpotence thou insultest the sun! Science! Curse thee, thou vain toy;\rand cursed be all the things that cast man’s eyes aloft to that heaven,\rwhose live vividness but scorches him, as these old eyes are even now\rscorched with thy light, O sun! Level by nature to this earth’s horizon\rare the glances of man’s eyes; not shot from the crown of his head, as\rif God had meant him to gaze on his firmament. Curse thee, thou\rquadrant!” dashing it to the deck, “no longer will I guide my earthly\rway by thee; the level ship’s compass, and the level dead-reckoning, by\rlog and by line; _these_ shall conduct me, and show me my place on the\rsea. Aye,” lighting from the boat to the deck, “thus I trample on thee,\rthou paltry thing that feebly pointest on high; thus I split and\rdestroy thee!”\r\rAs the frantic old man thus spoke and thus trampled with his live and\rdead feet, a sneering triumph that seemed meant for Ahab, and a\rfatalistic despair that seemed meant for himself—these passed over the\rmute, motionless Parsee’s face. Unobserved he rose and glided away;\rwhile, awestruck by the aspect of their commander, the seamen clustered\rtogether on the forecastle, till Ahab, troubledly pacing the deck,\rshouted out—“To the braces! Up helm!—square in!”\r\rIn an instant the yards swung round; and as the ship half-wheeled upon\rher heel, her three firm-seated graceful masts erectly poised upon her\rlong, ribbed hull, seemed as the three Horatii pirouetting on one\rsufficient steed.\r\rStanding between the knight-heads, Starbuck watched the Pequod’s\rtumultuous way, and Ahab’s also, as he went lurching along the deck.\r\r“I have sat before the dense coal fire and watched it all aglow, full\rof its tormented flaming life; and I have seen it wane at last, down,\rdown, to dumbest dust. Old man of oceans! of all this fiery life of\rthine, what will at length remain but one little heap of ashes!”\r\r“Aye,” cried Stubb, “but sea-coal ashes—mind ye that, Mr.\rStarbuck—sea-coal, not your common charcoal. Well, well; I heard Ahab\rmutter, ‘Here some one thrusts these cards into these old hands of\rmine; swears that I must play them, and no others.’ And damn me, Ahab,\rbut thou actest right; live in the game, and die in it!”\r\r\rCHAPTER 119. The Candles.\r\rWarmest climes but nurse the cruellest fangs: the tiger of Bengal\rcrouches in spiced groves of ceaseless verdure. Skies the most\reffulgent but basket the deadliest thunders: gorgeous Cuba knows\rtornadoes that never swept tame northern lands. So, too, it is, that in\rthese resplendent Japanese seas the mariner encounters the direst of\rall storms, the Typhoon. It will sometimes burst from out that\rcloudless sky, like an exploding bomb upon a dazed and sleepy town.\r\rTowards evening of that day, the Pequod was torn of her canvas, and\rbare-poled was left to fight a Typhoon which had struck her directly\rahead. When darkness came on, sky and sea roared and split with the\rthunder, and blazed with the lightning, that showed the disabled masts\rfluttering here and there with the rags which the first fury of the\rtempest had left for its after sport.\r\rHolding by a shroud, Starbuck was standing on the quarter-deck; at\revery flash of the lightning glancing aloft, to see what additional\rdisaster might have befallen the intricate hamper there; while Stubb\rand Flask were directing the men in the higher hoisting and firmer\rlashing of the boats. But all their pains seemed naught. Though lifted\rto the very top of the cranes, the windward quarter boat (Ahab’s) did\rnot escape. A great rolling sea, dashing high up against the reeling\rship’s high teetering side, stove in the boat’s bottom at the stern,\rand left it again, all dripping through like a sieve.\r\r“Bad work, bad work! Mr. Starbuck,” said Stubb, regarding the wreck,\r“but the sea will have its way. Stubb, for one, can’t fight it. You\rsee, Mr. Starbuck, a wave has such a great long start before it leaps,\rall round the world it runs, and then comes the spring! But as for me,\rall the start I have to meet it, is just across the deck here. But\rnever mind; it’s all in fun: so the old song says;”—(_sings_.)\r\r\r  Oh! jolly is the gale, And a joker is the whale, A’ flourishin’ his\r  tail,— Such a funny, sporty, gamy, jesty, joky, hoky-poky lad, is the\r  Ocean, oh!\r\r  The scud all a flyin’, That’s his flip only foamin’; When he stirs in\r  the spicin’,— Such a funny, sporty, gamy, jesty, joky, hoky-poky lad,\r  is the Ocean, oh!\r\r  Thunder splits the ships, But he only smacks his lips, A tastin’ of\r  this flip,— Such a funny, sporty, gamy, jesty, joky, hoky-poky lad,\r  is the Ocean, oh!\r\r\r\r“Avast Stubb,” cried Starbuck, “let the Typhoon sing, and strike his\rharp here in our rigging; but if thou art a brave man thou wilt hold\rthy peace.”\r\r“But I am not a brave man; never said I was a brave man; I am a coward;\rand I sing to keep up my spirits. And I tell you what it is, Mr.\rStarbuck, there’s no way to stop my singing in this world but to cut my\rthroat. And when that’s done, ten to one I sing ye the doxology for a\rwind-up.”\r\r“Madman! look through my eyes if thou hast none of thine own.”\r\r“What! how can you see better of a dark night than anybody else, never\rmind how foolish?”\r\r“Here!” cried Starbuck, seizing Stubb by the shoulder, and pointing his\rhand towards the weather bow, “markest thou not that the gale comes\rfrom the eastward, the very course Ahab is to run for Moby Dick? the\rvery course he swung to this day noon? now mark his boat there; where\ris that stove? In the stern-sheets, man; where he is wont to stand—his\rstand-point is stove, man! Now jump overboard, and sing away, if thou\rmust!\r\r“I don’t half understand ye: what’s in the wind?”\r\r“Yes, yes, round the Cape of Good Hope is the shortest way to\rNantucket,” soliloquized Starbuck suddenly, heedless of Stubb’s\rquestion. “The gale that now hammers at us to stave us, we can turn it\rinto a fair wind that will drive us towards home. Yonder, to windward,\rall is blackness of doom; but to leeward, homeward—I see it lightens up\rthere; but not with the lightning.”\r\rAt that moment in one of the intervals of profound darkness, following\rthe flashes, a voice was heard at his side; and almost at the same\rinstant a volley of thunder peals rolled overhead.\r\r“Who’s there?”\r\r“Old Thunder!” said Ahab, groping his way along the bulwarks to his\rpivot-hole; but suddenly finding his path made plain to him by elbowed\rlances of fire.\r\rNow, as the lightning rod to a spire on shore is intended to carry off\rthe perilous fluid into the soil; so the kindred rod which at sea some\rships carry to each mast, is intended to conduct it into the water. But\ras this conductor must descend to considerable depth, that its end may\ravoid all contact with the hull; and as moreover, if kept constantly\rtowing there, it would be liable to many mishaps, besides interfering\rnot a little with some of the rigging, and more or less impeding the\rvessel’s way in the water; because of all this, the lower parts of a\rship’s lightning-rods are not always overboard; but are generally made\rin long slender links, so as to be the more readily hauled up into the\rchains outside, or thrown down into the sea, as occasion may require.\r\r“The rods! the rods!” cried Starbuck to the crew, suddenly admonished\rto vigilance by the vivid lightning that had just been darting\rflambeaux, to light Ahab to his post. “Are they overboard? drop them\rover, fore and aft. Quick!”\r\r“Avast!” cried Ahab; “let’s have fair play here, though we be the\rweaker side. Yet I’ll contribute to raise rods on the Himmalehs and\rAndes, that all the world may be secured; but out on privileges! Let\rthem be, sir.”\r\r“Look aloft!” cried Starbuck. “The corpusants! the corpusants!”\r\rAll the yard-arms were tipped with a pallid fire; and touched at each\rtri-pointed lightning-rod-end with three tapering white flames, each of\rthe three tall masts was silently burning in that sulphurous air, like\rthree gigantic wax tapers before an altar.\r\r“Blast the boat! let it go!” cried Stubb at this instant, as a swashing\rsea heaved up under his own little craft, so that its gunwale violently\rjammed his hand, as he was passing a lashing. “Blast it!”—but slipping\rbackward on the deck, his uplifted eyes caught the flames; and\rimmediately shifting his tone he cried—“The corpusants have mercy on us\rall!”\r\rTo sailors, oaths are household words; they will swear in the trance of\rthe calm, and in the teeth of the tempest; they will imprecate curses\rfrom the topsail-yard-arms, when most they teeter over to a seething\rsea; but in all my voyagings, seldom have I heard a common oath when\rGod’s burning finger has been laid on the ship; when His “Mene, Mene,\rTekel Upharsin” has been woven into the shrouds and the cordage.\r\rWhile this pallidness was burning aloft, few words were heard from the\renchanted crew; who in one thick cluster stood on the forecastle, all\rtheir eyes gleaming in that pale phosphorescence, like a far away\rconstellation of stars. Relieved against the ghostly light, the\rgigantic jet negro, Daggoo, loomed up to thrice his real stature, and\rseemed the black cloud from which the thunder had come. The parted\rmouth of Tashtego revealed his shark-white teeth, which strangely\rgleamed as if they too had been tipped by corpusants; while lit up by\rthe preternatural light, Queequeg’s tattooing burned like Satanic blue\rflames on his body.\r\rThe tableau all waned at last with the pallidness aloft; and once more\rthe Pequod and every soul on her decks were wrapped in a pall. A moment\ror two passed, when Starbuck, going forward, pushed against some one.\rIt was Stubb. “What thinkest thou now, man; I heard thy cry; it was not\rthe same in the song.”\r\r“No, no, it wasn’t; I said the corpusants have mercy on us all; and I\rhope they will, still. But do they only have mercy on long faces?—have\rthey no bowels for a laugh? And look ye, Mr. Starbuck—but it’s too dark\rto look. Hear me, then: I take that mast-head flame we saw for a sign\rof good luck; for those masts are rooted in a hold that is going to be\rchock a’ block with sperm-oil, d’ye see; and so, all that sperm will\rwork up into the masts, like sap in a tree. Yes, our three masts will\ryet be as three spermaceti candles—that’s the good promise we saw.”\r\rAt that moment Starbuck caught sight of Stubb’s face slowly beginning\rto glimmer into sight. Glancing upwards, he cried: “See! see!” and once\rmore the high tapering flames were beheld with what seemed redoubled\rsupernaturalness in their pallor.\r\r“The corpusants have mercy on us all,” cried Stubb, again.\r\rAt the base of the mainmast, full beneath the doubloon and the flame,\rthe Parsee was kneeling in Ahab’s front, but with his head bowed away\rfrom him; while near by, from the arched and overhanging rigging, where\rthey had just been engaged securing a spar, a number of the seamen,\rarrested by the glare, now cohered together, and hung pendulous, like a\rknot of numbed wasps from a drooping, orchard twig. In various\renchanted attitudes, like the standing, or stepping, or running\rskeletons in Herculaneum, others remained rooted to the deck; but all\rtheir eyes upcast.\r\r“Aye, aye, men!” cried Ahab. “Look up at it; mark it well; the white\rflame but lights the way to the White Whale! Hand me those mainmast\rlinks there; I would fain feel this pulse, and let mine beat against\rit; blood against fire! So.”\r\rThen turning—the last link held fast in his left hand, he put his foot\rupon the Parsee; and with fixed upward eye, and high-flung right arm,\rhe stood erect before the lofty tri-pointed trinity of flames.\r\r“Oh! thou clear spirit of clear fire, whom on these seas I as Persian\ronce did worship, till in the sacramental act so burned by thee, that\rto this hour I bear the scar; I now know thee, thou clear spirit, and I\rnow know that thy right worship is defiance. To neither love nor\rreverence wilt thou be kind; and e’en for hate thou canst but kill; and\rall are killed. No fearless fool now fronts thee. I own thy speechless,\rplaceless power; but to the last gasp of my earthquake life will\rdispute its unconditional, unintegral mastery in me. In the midst of\rthe personified impersonal, a personality stands here. Though but a\rpoint at best; whencesoe’er I came; wheresoe’er I go; yet while I\rearthly live, the queenly personality lives in me, and feels her royal\rrights. But war is pain, and hate is woe. Come in thy lowest form of\rlove, and I will kneel and kiss thee; but at thy highest, come as mere\rsupernal power; and though thou launchest navies of full-freighted\rworlds, there’s that in here that still remains indifferent. Oh, thou\rclear spirit, of thy fire thou madest me, and like a true child of\rfire, I breathe it back to thee.”\r\r[_Sudden, repeated flashes of lightning; the nine flames leap\rlengthwise to thrice their previous height; Ahab, with the rest, closes\rhis eyes, his right hand pressed hard upon them._]\r\r“I own thy speechless, placeless power; said I not so? Nor was it wrung\rfrom me; nor do I now drop these links. Thou canst blind; but I can\rthen grope. Thou canst consume; but I can then be ashes. Take the\rhomage of these poor eyes, and shutter-hands. I would not take it. The\rlightning flashes through my skull; mine eye-balls ache and ache; my\rwhole beaten brain seems as beheaded, and rolling on some stunning\rground. Oh, oh! Yet blindfold, yet will I talk to thee. Light though\rthou be, thou leapest out of darkness; but I am darkness leaping out of\rlight, leaping out of thee! The javelins cease; open eyes; see, or not?\rThere burn the flames! Oh, thou magnanimous! now I do glory in my\rgenealogy. But thou art but my fiery father; my sweet mother, I know\rnot. Oh, cruel! what hast thou done with her? There lies my puzzle; but\rthine is greater. Thou knowest not how came ye, hence callest thyself\runbegotten; certainly knowest not thy beginning, hence callest thyself\runbegun. I know that of me, which thou knowest not of thyself, oh, thou\romnipotent. There is some unsuffusing thing beyond thee, thou clear\rspirit, to whom all thy eternity is but time, all thy creativeness\rmechanical. Through thee, thy flaming self, my scorched eyes do dimly\rsee it. Oh, thou foundling fire, thou hermit immemorial, thou too hast\rthy incommunicable riddle, thy unparticipated grief. Here again with\rhaughty agony, I read my sire. Leap! leap up, and lick the sky! I leap\rwith thee; I burn with thee; would fain be welded with thee; defyingly\rI worship thee!”\r\r“The boat! the boat!” cried Starbuck, “look at thy boat, old man!”\r\rAhab’s harpoon, the one forged at Perth’s fire, remained firmly lashed\rin its conspicuous crotch, so that it projected beyond his whale-boat’s\rbow; but the sea that had stove its bottom had caused the loose leather\rsheath to drop off; and from the keen steel barb there now came a\rlevelled flame of pale, forked fire. As the silent harpoon burned there\rlike a serpent’s tongue, Starbuck grasped Ahab by the arm—“God, God is\ragainst thee, old man; forbear! ’tis an ill voyage! ill begun, ill\rcontinued; let me square the yards, while we may, old man, and make a\rfair wind of it homewards, to go on a better voyage than this.”\r\rOverhearing Starbuck, the panic-stricken crew instantly ran to the\rbraces—though not a sail was left aloft. For the moment all the aghast\rmate’s thoughts seemed theirs; they raised a half mutinous cry. But\rdashing the rattling lightning links to the deck, and snatching the\rburning harpoon, Ahab waved it like a torch among them; swearing to\rtransfix with it the first sailor that but cast loose a rope’s end.\rPetrified by his aspect, and still more shrinking from the fiery dart\rthat he held, the men fell back in dismay, and Ahab again spoke:—\r\r“All your oaths to hunt the White Whale are as binding as mine; and\rheart, soul, and body, lungs and life, old Ahab is bound. And that ye\rmay know to what tune this heart beats; look ye here; thus I blow out\rthe last fear!” And with one blast of his breath he extinguished the\rflame.\r\rAs in the hurricane that sweeps the plain, men fly the neighborhood of\rsome lone, gigantic elm, whose very height and strength but render it\rso much the more unsafe, because so much the more a mark for\rthunderbolts; so at those last words of Ahab’s many of the mariners did\rrun from him in a terror of dismay.\r\r\rCHAPTER 120. The Deck Towards the End of the First Night Watch.\r\r_Ahab standing by the helm. Starbuck approaching him._\r\r“We must send down the main-top-sail yard, sir. The band is working\rloose and the lee lift is half-stranded. Shall I strike it, sir?”\r\r“Strike nothing; lash it. If I had sky-sail poles, I’d sway them up\rnow.”\r\r“Sir!—in God’s name!—sir?”\r\r“Well.”\r\r“The anchors are working, sir. Shall I get them inboard?”\r\r“Strike nothing, and stir nothing, but lash everything. The wind rises,\rbut it has not got up to my table-lands yet. Quick, and see to it.—By\rmasts and keels! he takes me for the hunch-backed skipper of some\rcoasting smack. Send down my main-top-sail yard! Ho, gluepots! Loftiest\rtrucks were made for wildest winds, and this brain-truck of mine now\rsails amid the cloud-scud. Shall I strike that? Oh, none but cowards\rsend down their brain-trucks in tempest time. What a hooroosh aloft\rthere! I would e’en take it for sublime, did I not know that the colic\ris a noisy malady. Oh, take medicine, take medicine!”\r\r\rCHAPTER 121. Midnight.—The Forecastle Bulwarks.\r\r_Stubb and Flask mounted on them, and passing additional lashings over\rthe anchors there hanging._\r\r“No, Stubb; you may pound that knot there as much as you please, but\ryou will never pound into me what you were just now saying. And how\rlong ago is it since you said the very contrary? Didn’t you once say\rthat whatever ship Ahab sails in, that ship should pay something extra\ron its insurance policy, just as though it were loaded with powder\rbarrels aft and boxes of lucifers forward? Stop, now; didn’t you say\rso?”\r\r“Well, suppose I did? What then? I’ve part changed my flesh since that\rtime, why not my mind? Besides, supposing we _are_ loaded with powder\rbarrels aft and lucifers forward; how the devil could the lucifers get\rafire in this drenching spray here? Why, my little man, you have pretty\rred hair, but you couldn’t get afire now. Shake yourself; you’re\rAquarius, or the water-bearer, Flask; might fill pitchers at your coat\rcollar. Don’t you see, then, that for these extra risks the Marine\rInsurance companies have extra guarantees? Here are hydrants, Flask.\rBut hark, again, and I’ll answer ye the other thing. First take your\rleg off from the crown of the anchor here, though, so I can pass the\rrope; now listen. What’s the mighty difference between holding a mast’s\rlightning-rod in the storm, and standing close by a mast that hasn’t\rgot any lightning-rod at all in a storm? Don’t you see, you\rtimber-head, that no harm can come to the holder of the rod, unless the\rmast is first struck? What are you talking about, then? Not one ship in\ra hundred carries rods, and Ahab,—aye, man, and all of us,—were in no\rmore danger then, in my poor opinion, than all the crews in ten\rthousand ships now sailing the seas. Why, you King-Post, you, I suppose\ryou would have every man in the world go about with a small\rlightning-rod running up the corner of his hat, like a militia\rofficer’s skewered feather, and trailing behind like his sash. Why\rdon’t ye be sensible, Flask? it’s easy to be sensible; why don’t ye,\rthen? any man with half an eye can be sensible.”\r\r“I don’t know that, Stubb. You sometimes find it rather hard.”\r\r“Yes, when a fellow’s soaked through, it’s hard to be sensible, that’s\ra fact. And I am about drenched with this spray. Never mind; catch the\rturn there, and pass it. Seems to me we are lashing down these anchors\rnow as if they were never going to be used again. Tying these two\ranchors here, Flask, seems like tying a man’s hands behind him. And\rwhat big generous hands they are, to be sure. These are your iron\rfists, hey? What a hold they have, too! I wonder, Flask, whether the\rworld is anchored anywhere; if she is, she swings with an uncommon long\rcable, though. There, hammer that knot down, and we’ve done. So; next\rto touching land, lighting on deck is the most satisfactory. I say,\rjust wring out my jacket skirts, will ye? Thank ye. They laugh at\rlong-togs so, Flask; but seems to me, a long tailed coat ought always\rto be worn in all storms afloat. The tails tapering down that way,\rserve to carry off the water, d’ye see. Same with cocked hats; the\rcocks form gable-end eave-troughs, Flask. No more monkey-jackets and\rtarpaulins for me; I must mount a swallow-tail, and drive down a\rbeaver; so. Halloa! whew! there goes my tarpaulin overboard; Lord,\rLord, that the winds that come from heaven should be so unmannerly!\rThis is a nasty night, lad.”\r\r\rCHAPTER 122. Midnight Aloft.—Thunder and Lightning.\r\r_The main-top-sail yard_.—_Tashtego passing new lashings around it_.\r\r“Um, um, um. Stop that thunder! Plenty too much thunder up here. What’s\rthe use of thunder? Um, um, um. We don’t want thunder; we want rum;\rgive us a glass of rum. Um, um, um!”\r\r\rCHAPTER 123. The Musket.\r\rDuring the most violent shocks of the Typhoon, the man at the Pequod’s\rjaw-bone tiller had several times been reelingly hurled to the deck by\rits spasmodic motions, even though preventer tackles had been attached\rto it—for they were slack—because some play to the tiller was\rindispensable.\r\rIn a severe gale like this, while the ship is but a tossed shuttlecock\rto the blast, it is by no means uncommon to see the needles in the\rcompasses, at intervals, go round and round. It was thus with the\rPequod’s; at almost every shock the helmsman had not failed to notice\rthe whirling velocity with which they revolved upon the cards; it is a\rsight that hardly anyone can behold without some sort of unwonted\remotion.\r\rSome hours after midnight, the Typhoon abated so much, that through the\rstrenuous exertions of Starbuck and Stubb—one engaged forward and the\rother aft—the shivered remnants of the jib and fore and main-top-sails\rwere cut adrift from the spars, and went eddying away to leeward, like\rthe feathers of an albatross, which sometimes are cast to the winds\rwhen that storm-tossed bird is on the wing.\r\rThe three corresponding new sails were now bent and reefed, and a\rstorm-trysail was set further aft; so that the ship soon went through\rthe water with some precision again; and the course—for the present,\rEast-south-east—which he was to steer, if practicable, was once more\rgiven to the helmsman. For during the violence of the gale, he had only\rsteered according to its vicissitudes. But as he was now bringing the\rship as near her course as possible, watching the compass meanwhile,\rlo! a good sign! the wind seemed coming round astern; aye, the foul\rbreeze became fair!\r\rInstantly the yards were squared, to the lively song of “_Ho! the fair\rwind! oh-ye-ho, cheerly men!_” the crew singing for joy, that so\rpromising an event should so soon have falsified the evil portents\rpreceding it.\r\rIn compliance with the standing order of his commander—to report\rimmediately, and at any one of the twenty-four hours, any decided\rchange in the affairs of the deck,—Starbuck had no sooner trimmed the\ryards to the breeze—however reluctantly and gloomily,—than he\rmechanically went below to apprise Captain Ahab of the circumstance.\r\rEre knocking at his state-room, he involuntarily paused before it a\rmoment. The cabin lamp—taking long swings this way and that—was burning\rfitfully, and casting fitful shadows upon the old man’s bolted door,—a\rthin one, with fixed blinds inserted, in place of upper panels. The\risolated subterraneousness of the cabin made a certain humming silence\rto reign there, though it was hooped round by all the roar of the\relements. The loaded muskets in the rack were shiningly revealed, as\rthey stood upright against the forward bulkhead. Starbuck was an\rhonest, upright man; but out of Starbuck’s heart, at that instant when\rhe saw the muskets, there strangely evolved an evil thought; but so\rblent with its neutral or good accompaniments that for the instant he\rhardly knew it for itself.\r\r“He would have shot me once,” he murmured, “yes, there’s the very\rmusket that he pointed at me;—that one with the studded stock; let me\rtouch it—lift it. Strange, that I, who have handled so many deadly\rlances, strange, that I should shake so now. Loaded? I must see. Aye,\raye; and powder in the pan;—that’s not good. Best spill it?—wait. I’ll\rcure myself of this. I’ll hold the musket boldly while I think.—I come\rto report a fair wind to him. But how fair? Fair for death and\rdoom,—_that’s_ fair for Moby Dick. It’s a fair wind that’s only fair\rfor that accursed fish.—The very tube he pointed at me!—the very one;\r_this_ one—I hold it here; he would have killed me with the very thing\rI handle now.—Aye and he would fain kill all his crew. Does he not say\rhe will not strike his spars to any gale? Has he not dashed his\rheavenly quadrant? and in these same perilous seas, gropes he not his\rway by mere dead reckoning of the error-abounding log? and in this very\rTyphoon, did he not swear that he would have no lightning-rods? But\rshall this crazed old man be tamely suffered to drag a whole ship’s\rcompany down to doom with him?—Yes, it would make him the wilful\rmurderer of thirty men and more, if this ship come to any deadly harm;\rand come to deadly harm, my soul swears this ship will, if Ahab have\rhis way. If, then, he were this instant—put aside, that crime would not\rbe his. Ha! is he muttering in his sleep? Yes, just there,—in there,\rhe’s sleeping. Sleeping? aye, but still alive, and soon awake again. I\rcan’t withstand thee, then, old man. Not reasoning; not remonstrance;\rnot entreaty wilt thou hearken to; all this thou scornest. Flat\robedience to thy own flat commands, this is all thou breathest. Aye,\rand say’st the men have vow’d thy vow; say’st all of us are Ahabs.\rGreat God forbid!—But is there no other way? no lawful way?—Make him a\rprisoner to be taken home? What! hope to wrest this old man’s living\rpower from his own living hands? Only a fool would try it. Say he were\rpinioned even; knotted all over with ropes and hawsers; chained down to\rring-bolts on this cabin floor; he would be more hideous than a caged\rtiger, then. I could not endure the sight; could not possibly fly his\rhowlings; all comfort, sleep itself, inestimable reason would leave me\ron the long intolerable voyage. What, then, remains? The land is\rhundreds of leagues away, and locked Japan the nearest. I stand alone\rhere upon an open sea, with two oceans and a whole continent between me\rand law.—Aye, aye, ’tis so.—Is heaven a murderer when its lightning\rstrikes a would-be murderer in his bed, tindering sheets and skin\rtogether?—And would I be a murderer, then, if”—and slowly, stealthily,\rand half sideways looking, he placed the loaded musket’s end against\rthe door.\r\r“On this level, Ahab’s hammock swings within; his head this way. A\rtouch, and Starbuck may survive to hug his wife and child again.—Oh\rMary! Mary!—boy! boy! boy!—But if I wake thee not to death, old man,\rwho can tell to what unsounded deeps Starbuck’s body this day week may\rsink, with all the crew! Great God, where art Thou? Shall I? shall\rI?—The wind has gone down and shifted, sir; the fore and main topsails\rare reefed and set; she heads her course.”\r\r“Stern all! Oh Moby Dick, I clutch thy heart at last!”\r\rSuch were the sounds that now came hurtling from out the old man’s\rtormented sleep, as if Starbuck’s voice had caused the long dumb dream\rto speak.\r\rThe yet levelled musket shook like a drunkard’s arm against the panel;\rStarbuck seemed wrestling with an angel; but turning from the door, he\rplaced the death-tube in its rack, and left the place.\r\r“He’s too sound asleep, Mr. Stubb; go thou down, and wake him, and tell\rhim. I must see to the deck here. Thou know’st what to say.”\r\r\rCHAPTER 124. The Needle.\r\rNext morning the not-yet-subsided sea rolled in long slow billows of\rmighty bulk, and striving in the Pequod’s gurgling track, pushed her on\rlike giants’ palms outspread. The strong, unstaggering breeze abounded\rso, that sky and air seemed vast outbellying sails; the whole world\rboomed before the wind. Muffled in the full morning light, the\rinvisible sun was only known by the spread intensity of his place;\rwhere his bayonet rays moved on in stacks. Emblazonings, as of crowned\rBabylonian kings and queens, reigned over everything. The sea was as a\rcrucible of molten gold, that bubblingly leaps with light and heat.\r\rLong maintaining an enchanted silence, Ahab stood apart; and every time\rthe tetering ship loweringly pitched down her bowsprit, he turned to\reye the bright sun’s rays produced ahead; and when she profoundly\rsettled by the stern, he turned behind, and saw the sun’s rearward\rplace, and how the same yellow rays were blending with his undeviating\rwake.\r\r“Ha, ha, my ship! thou mightest well be taken now for the sea-chariot\rof the sun. Ho, ho! all ye nations before my prow, I bring the sun to\rye! Yoke on the further billows; hallo! a tandem, I drive the sea!”\r\rBut suddenly reined back by some counter thought, he hurried towards\rthe helm, huskily demanding how the ship was heading.\r\r“East-sou-east, sir,” said the frightened steersman.\r\r“Thou liest!” smiting him with his clenched fist. “Heading East at this\rhour in the morning, and the sun astern?”\r\rUpon this every soul was confounded; for the phenomenon just then\robserved by Ahab had unaccountably escaped every one else; but its very\rblinding palpableness must have been the cause.\r\rThrusting his head half way into the binnacle, Ahab caught one glimpse\rof the compasses; his uplifted arm slowly fell; for a moment he almost\rseemed to stagger. Standing behind him Starbuck looked, and lo! the two\rcompasses pointed East, and the Pequod was as infallibly going West.\r\rBut ere the first wild alarm could get out abroad among the crew, the\rold man with a rigid laugh exclaimed, “I have it! It has happened\rbefore. Mr. Starbuck, last night’s thunder turned our compasses—that’s\rall. Thou hast before now heard of such a thing, I take it.”\r\r“Aye; but never before has it happened to me, sir,” said the pale mate,\rgloomily.\r\rHere, it must needs be said, that accidents like this have in more than\rone case occurred to ships in violent storms. The magnetic energy, as\rdeveloped in the mariner’s needle, is, as all know, essentially one\rwith the electricity beheld in heaven; hence it is not to be much\rmarvelled at, that such things should be. Instances where the lightning\rhas actually struck the vessel, so as to smite down some of the spars\rand rigging, the effect upon the needle has at times been still more\rfatal; all its loadstone virtue being annihilated, so that the before\rmagnetic steel was of no more use than an old wife’s knitting needle.\rBut in either case, the needle never again, of itself, recovers the\roriginal virtue thus marred or lost; and if the binnacle compasses be\raffected, the same fate reaches all the others that may be in the ship;\reven were the lowermost one inserted into the kelson.\r\rDeliberately standing before the binnacle, and eyeing the transpointed\rcompasses, the old man, with the sharp of his extended hand, now took\rthe precise bearing of the sun, and satisfied that the needles were\rexactly inverted, shouted out his orders for the ship’s course to be\rchanged accordingly. The yards were hard up; and once more the Pequod\rthrust her undaunted bows into the opposing wind, for the supposed fair\rone had only been juggling her.\r\rMeanwhile, whatever were his own secret thoughts, Starbuck said\rnothing, but quietly he issued all requisite orders; while Stubb and\rFlask—who in some small degree seemed then to be sharing his\rfeelings—likewise unmurmuringly acquiesced. As for the men, though some\rof them lowly rumbled, their fear of Ahab was greater than their fear\rof Fate. But as ever before, the pagan harpooneers remained almost\rwholly unimpressed; or if impressed, it was only with a certain\rmagnetism shot into their congenial hearts from inflexible Ahab’s.\r\rFor a space the old man walked the deck in rolling reveries. But\rchancing to slip with his ivory heel, he saw the crushed copper\rsight-tubes of the quadrant he had the day before dashed to the deck.\r\r“Thou poor, proud heaven-gazer and sun’s pilot! yesterday I wrecked\rthee, and to-day the compasses would fain have wrecked me. So, so. But\rAhab is lord over the level loadstone yet. Mr. Starbuck—a lance without\ra pole; a top-maul, and the smallest of the sail-maker’s needles.\rQuick!”\r\rAccessory, perhaps, to the impulse dictating the thing he was now about\rto do, were certain prudential motives, whose object might have been to\rrevive the spirits of his crew by a stroke of his subtile skill, in a\rmatter so wondrous as that of the inverted compasses. Besides, the old\rman well knew that to steer by transpointed needles, though clumsily\rpracticable, was not a thing to be passed over by superstitious\rsailors, without some shudderings and evil portents.\r\r“Men,” said he, steadily turning upon the crew, as the mate handed him\rthe things he had demanded, “my men, the thunder turned old Ahab’s\rneedles; but out of this bit of steel Ahab can make one of his own,\rthat will point as true as any.”\r\rAbashed glances of servile wonder were exchanged by the sailors, as\rthis was said; and with fascinated eyes they awaited whatever magic\rmight follow. But Starbuck looked away.\r\rWith a blow from the top-maul Ahab knocked off the steel head of the\rlance, and then handing to the mate the long iron rod remaining, bade\rhim hold it upright, without its touching the deck. Then, with the\rmaul, after repeatedly smiting the upper end of this iron rod, he\rplaced the blunted needle endwise on the top of it, and less strongly\rhammered that, several times, the mate still holding the rod as before.\rThen going through some small strange motions with it—whether\rindispensable to the magnetizing of the steel, or merely intended to\raugment the awe of the crew, is uncertain—he called for linen thread;\rand moving to the binnacle, slipped out the two reversed needles there,\rand horizontally suspended the sail-needle by its middle, over one of\rthe compass-cards. At first, the steel went round and round, quivering\rand vibrating at either end; but at last it settled to its place, when\rAhab, who had been intently watching for this result, stepped frankly\rback from the binnacle, and pointing his stretched arm towards it,\rexclaimed,—“Look ye, for yourselves, if Ahab be not lord of the level\rloadstone! The sun is East, and that compass swears it!”\r\rOne after another they peered in, for nothing but their own eyes could\rpersuade such ignorance as theirs, and one after another they slunk\raway.\r\rIn his fiery eyes of scorn and triumph, you then saw Ahab in all his\rfatal pride.\r\r\rCHAPTER 125. The Log and Line.\r\rWhile now the fated Pequod had been so long afloat this voyage, the log\rand line had but very seldom been in use. Owing to a confident reliance\rupon other means of determining the vessel’s place, some merchantmen,\rand many whalemen, especially when cruising, wholly neglect to heave\rthe log; though at the same time, and frequently more for form’s sake\rthan anything else, regularly putting down upon the customary slate the\rcourse steered by the ship, as well as the presumed average rate of\rprogression every hour. It had been thus with the Pequod. The wooden\rreel and angular log attached hung, long untouched, just beneath the\rrailing of the after bulwarks. Rains and spray had damped it; sun and\rwind had warped it; all the elements had combined to rot a thing that\rhung so idly. But heedless of all this, his mood seized Ahab, as he\rhappened to glance upon the reel, not many hours after the magnet\rscene, and he remembered how his quadrant was no more, and recalled his\rfrantic oath about the level log and line. The ship was sailing\rplungingly; astern the billows rolled in riots.\r\r“Forward, there! Heave the log!”\r\rTwo seamen came. The golden-hued Tahitian and the grizzly Manxman.\r“Take the reel, one of ye, I’ll heave.”\r\rThey went towards the extreme stern, on the ship’s lee side, where the\rdeck, with the oblique energy of the wind, was now almost dipping into\rthe creamy, sidelong-rushing sea.\r\rThe Manxman took the reel, and holding it high up, by the projecting\rhandle-ends of the spindle, round which the spool of line revolved, so\rstood with the angular log hanging downwards, till Ahab advanced to\rhim.\r\rAhab stood before him, and was lightly unwinding some thirty or forty\rturns to form a preliminary hand-coil to toss overboard, when the old\rManxman, who was intently eyeing both him and the line, made bold to\rspeak.\r\r“Sir, I mistrust it; this line looks far gone, long heat and wet have\rspoiled it.”\r\r“’Twill hold, old gentleman. Long heat and wet, have they spoiled thee?\rThou seem’st to hold. Or, truer perhaps, life holds thee; not thou it.”\r\r“I hold the spool, sir. But just as my captain says. With these grey\rhairs of mine ’tis not worth while disputing, ’specially with a\rsuperior, who’ll ne’er confess.”\r\r“What’s that? There now’s a patched professor in Queen Nature’s\rgranite-founded College; but methinks he’s too subservient. Where wert\rthou born?”\r\r“In the little rocky Isle of Man, sir.”\r\r“Excellent! Thou’st hit the world by that.”\r\r“I know not, sir, but I was born there.”\r\r“In the Isle of Man, hey? Well, the other way, it’s good. Here’s a man\rfrom Man; a man born in once independent Man, and now unmanned of Man;\rwhich is sucked in—by what? Up with the reel! The dead, blind wall\rbutts all inquiring heads at last. Up with it! So.”\r\rThe log was heaved. The loose coils rapidly straightened out in a long\rdragging line astern, and then, instantly, the reel began to whirl. In\rturn, jerkingly raised and lowered by the rolling billows, the towing\rresistance of the log caused the old reelman to stagger strangely.\r\r“Hold hard!”\r\rSnap! the overstrained line sagged down in one long festoon; the\rtugging log was gone.\r\r“I crush the quadrant, the thunder turns the needles, and now the mad\rsea parts the log-line. But Ahab can mend all. Haul in here, Tahitian;\rreel up, Manxman. And look ye, let the carpenter make another log, and\rmend thou the line. See to it.”\r\r“There he goes now; to him nothing’s happened; but to me, the skewer\rseems loosening out of the middle of the world. Haul in, haul in,\rTahitian! These lines run whole, and whirling out: come in broken, and\rdragging slow. Ha, Pip? come to help; eh, Pip?”\r\r“Pip? whom call ye Pip? Pip jumped from the whale-boat. Pip’s missing.\rLet’s see now if ye haven’t fished him up here, fisherman. It drags\rhard; I guess he’s holding on. Jerk him, Tahiti! Jerk him off; we haul\rin no cowards here. Ho! there’s his arm just breaking water. A hatchet!\ra hatchet! cut it off—we haul in no cowards here. Captain Ahab! sir,\rsir! here’s Pip, trying to get on board again.”\r\r“Peace, thou crazy loon,” cried the Manxman, seizing him by the arm.\r“Away from the quarter-deck!”\r\r“The greater idiot ever scolds the lesser,” muttered Ahab, advancing.\r“Hands off from that holiness! Where sayest thou Pip was, boy?\r\r“Astern there, sir, astern! Lo! lo!”\r\r“And who art thou, boy? I see not my reflection in the vacant pupils of\rthy eyes. Oh God! that man should be a thing for immortal souls to\rsieve through! Who art thou, boy?”\r\r“Bell-boy, sir; ship’s-crier; ding, dong, ding! Pip! Pip! Pip! One\rhundred pounds of clay reward for Pip; five feet high—looks\rcowardly—quickest known by that! Ding, dong, ding! Who’s seen Pip the\rcoward?”\r\r“There can be no hearts above the snow-line. Oh, ye frozen heavens!\rlook down here. Ye did beget this luckless child, and have abandoned\rhim, ye creative libertines. Here, boy; Ahab’s cabin shall be Pip’s\rhome henceforth, while Ahab lives. Thou touchest my inmost centre, boy;\rthou art tied to me by cords woven of my heart-strings. Come, let’s\rdown.”\r\r“What’s this? here’s velvet shark-skin,” intently gazing at Ahab’s\rhand, and feeling it. “Ah, now, had poor Pip but felt so kind a thing\ras this, perhaps he had ne’er been lost! This seems to me, sir, as a\rman-rope; something that weak souls may hold by. Oh, sir, let old Perth\rnow come and rivet these two hands together; the black one with the\rwhite, for I will not let this go.”\r\r“Oh, boy, nor will I thee, unless I should thereby drag thee to worse\rhorrors than are here. Come, then, to my cabin. Lo! ye believers in\rgods all goodness, and in man all ill, lo you! see the omniscient gods\roblivious of suffering man; and man, though idiotic, and knowing not\rwhat he does, yet full of the sweet things of love and gratitude. Come!\rI feel prouder leading thee by thy black hand, than though I grasped an\rEmperor’s!”\r\r“There go two daft ones now,” muttered the old Manxman. “One daft with\rstrength, the other daft with weakness. But here’s the end of the\rrotten line—all dripping, too. Mend it, eh? I think we had best have a\rnew line altogether. I’ll see Mr. Stubb about it.”\r\r\rCHAPTER 126. The Life-Buoy.\r\rSteering now south-eastward by Ahab’s levelled steel, and her progress\rsolely determined by Ahab’s level log and line; the Pequod held on her\rpath towards the Equator. Making so long a passage through such\runfrequented waters, descrying no ships, and ere long, sideways\rimpelled by unvarying trade winds, over waves monotonously mild; all\rthese seemed the strange calm things preluding some riotous and\rdesperate scene.\r\rAt last, when the ship drew near to the outskirts, as it were, of the\rEquatorial fishing-ground, and in the deep darkness that goes before\rthe dawn, was sailing by a cluster of rocky islets; the watch—then\rheaded by Flask—was startled by a cry so plaintively wild and\runearthly—like half-articulated wailings of the ghosts of all Herod’s\rmurdered Innocents—that one and all, they started from their reveries,\rand for the space of some moments stood, or sat, or leaned all\rtransfixedly listening, like the carved Roman slave, while that wild\rcry remained within hearing. The Christian or civilized part of the\rcrew said it was mermaids, and shuddered; but the pagan harpooneers\rremained unappalled. Yet the grey Manxman—the oldest mariner of\rall—declared that the wild thrilling sounds that were heard, were the\rvoices of newly drowned men in the sea.\r\rBelow in his hammock, Ahab did not hear of this till grey dawn, when he\rcame to the deck; it was then recounted to him by Flask, not\runaccompanied with hinted dark meanings. He hollowly laughed, and thus\rexplained the wonder.\r\rThose rocky islands the ship had passed were the resort of great\rnumbers of seals, and some young seals that had lost their dams, or\rsome dams that had lost their cubs, must have risen nigh the ship and\rkept company with her, crying and sobbing with their human sort of\rwail. But this only the more affected some of them, because most\rmariners cherish a very superstitious feeling about seals, arising not\ronly from their peculiar tones when in distress, but also from the\rhuman look of their round heads and semi-intelligent faces, seen\rpeeringly uprising from the water alongside. In the sea, under certain\rcircumstances, seals have more than once been mistaken for men.\r\rBut the bodings of the crew were destined to receive a most plausible\rconfirmation in the fate of one of their number that morning. At\rsun-rise this man went from his hammock to his mast-head at the fore;\rand whether it was that he was not yet half waked from his sleep (for\rsailors sometimes go aloft in a transition state), whether it was thus\rwith the man, there is now no telling; but, be that as it may, he had\rnot been long at his perch, when a cry was heard—a cry and a\rrushing—and looking up, they saw a falling phantom in the air; and\rlooking down, a little tossed heap of white bubbles in the blue of the\rsea.\r\rThe life-buoy—a long slender cask—was dropped from the stern, where it\ralways hung obedient to a cunning spring; but no hand rose to seize it,\rand the sun having long beat upon this cask it had shrunken, so that it\rslowly filled, and that parched wood also filled at its every pore; and\rthe studded iron-bound cask followed the sailor to the bottom, as if to\ryield him his pillow, though in sooth but a hard one.\r\rAnd thus the first man of the Pequod that mounted the mast to look out\rfor the White Whale, on the White Whale’s own peculiar ground; that man\rwas swallowed up in the deep. But few, perhaps, thought of that at the\rtime. Indeed, in some sort, they were not grieved at this event, at\rleast as a portent; for they regarded it, not as a foreshadowing of\revil in the future, but as the fulfilment of an evil already presaged.\rThey declared that now they knew the reason of those wild shrieks they\rhad heard the night before. But again the old Manxman said nay.\r\rThe lost life-buoy was now to be replaced; Starbuck was directed to see\rto it; but as no cask of sufficient lightness could be found, and as in\rthe feverish eagerness of what seemed the approaching crisis of the\rvoyage, all hands were impatient of any toil but what was directly\rconnected with its final end, whatever that might prove to be;\rtherefore, they were going to leave the ship’s stern unprovided with a\rbuoy, when by certain strange signs and inuendoes Queequeg hinted a\rhint concerning his coffin.\r\r“A life-buoy of a coffin!” cried Starbuck, starting.\r\r“Rather queer, that, I should say,” said Stubb.\r\r“It will make a good enough one,” said Flask, “the carpenter here can\rarrange it easily.”\r\r“Bring it up; there’s nothing else for it,” said Starbuck, after a\rmelancholy pause. “Rig it, carpenter; do not look at me so—the coffin,\rI mean. Dost thou hear me? Rig it.”\r\r“And shall I nail down the lid, sir?” moving his hand as with a hammer.\r\r“Aye.”\r\r“And shall I caulk the seams, sir?” moving his hand as with a\rcaulking-iron.\r\r“Aye.”\r\r“And shall I then pay over the same with pitch, sir?” moving his hand\ras with a pitch-pot.\r\r“Away! what possesses thee to this? Make a life-buoy of the coffin, and\rno more.—Mr. Stubb, Mr. Flask, come forward with me.”\r\r“He goes off in a huff. The whole he can endure; at the parts he\rbaulks. Now I don’t like this. I make a leg for Captain Ahab, and he\rwears it like a gentleman; but I make a bandbox for Queequeg, and he\rwon’t put his head into it. Are all my pains to go for nothing with\rthat coffin? And now I’m ordered to make a life-buoy of it. It’s like\rturning an old coat; going to bring the flesh on the other side now. I\rdon’t like this cobbling sort of business—I don’t like it at all; it’s\rundignified; it’s not my place. Let tinkers’ brats do tinkerings; we\rare their betters. I like to take in hand none but clean, virgin,\rfair-and-square mathematical jobs, something that regularly begins at\rthe beginning, and is at the middle when midway, and comes to an end at\rthe conclusion; not a cobbler’s job, that’s at an end in the middle,\rand at the beginning at the end. It’s the old woman’s tricks to be\rgiving cobbling jobs. Lord! what an affection all old women have for\rtinkers. I know an old woman of sixty-five who ran away with a\rbald-headed young tinker once. And that’s the reason I never would work\rfor lonely widow old women ashore, when I kept my job-shop in the\rVineyard; they might have taken it into their lonely old heads to run\roff with me. But heigh-ho! there are no caps at sea but snow-caps. Let\rme see. Nail down the lid; caulk the seams; pay over the same with\rpitch; batten them down tight, and hang it with the snap-spring over\rthe ship’s stern. Were ever such things done before with a coffin? Some\rsuperstitious old carpenters, now, would be tied up in the rigging, ere\rthey would do the job. But I’m made of knotty Aroostook hemlock; I\rdon’t budge. Cruppered with a coffin! Sailing about with a grave-yard\rtray! But never mind. We workers in woods make bridal-bedsteads and\rcard-tables, as well as coffins and hearses. We work by the month, or\rby the job, or by the profit; not for us to ask the why and wherefore\rof our work, unless it be too confounded cobbling, and then we stash it\rif we can. Hem! I’ll do the job, now, tenderly. I’ll have me—let’s\rsee—how many in the ship’s company, all told? But I’ve forgotten. Any\rway, I’ll have me thirty separate, Turk’s-headed life-lines, each three\rfeet long hanging all round to the coffin. Then, if the hull go down,\rthere’ll be thirty lively fellows all fighting for one coffin, a sight\rnot seen very often beneath the sun! Come hammer, caulking-iron,\rpitch-pot, and marling-spike! Let’s to it.”\r\r\rCHAPTER 127. The Deck.\r\r_The coffin laid upon two line-tubs, between the vice-bench and the\ropen hatchway; the Carpenter caulking its seams; the string of twisted\roakum slowly unwinding from a large roll of it placed in the bosom of\rhis frock.—Ahab comes slowly from the cabin-gangway, and hears Pip\rfollowing him._\r\r“Back, lad; I will be with ye again presently. He goes! Not this hand\rcomplies with my humor more genially than that boy.—Middle aisle of a\rchurch! What’s here?”\r\r“Life-buoy, sir. Mr. Starbuck’s orders. Oh, look, sir! Beware the\rhatchway!”\r\r“Thank ye, man. Thy coffin lies handy to the vault.”\r\r“Sir? The hatchway? oh! So it does, sir, so it does.”\r\r“Art not thou the leg-maker? Look, did not this stump come from thy\rshop?”\r\r“I believe it did, sir; does the ferrule stand, sir?”\r\r“Well enough. But art thou not also the undertaker?”\r\r“Aye, sir; I patched up this thing here as a coffin for Queequeg; but\rthey’ve set me now to turning it into something else.”\r\r“Then tell me; art thou not an arrant, all-grasping, intermeddling,\rmonopolising, heathenish old scamp, to be one day making legs, and the\rnext day coffins to clap them in, and yet again life-buoys out of those\rsame coffins? Thou art as unprincipled as the gods, and as much of a\rjack-of-all-trades.”\r\r“But I do not mean anything, sir. I do as I do.”\r\r“The gods again. Hark ye, dost thou not ever sing working about a\rcoffin? The Titans, they say, hummed snatches when chipping out the\rcraters for volcanoes; and the grave-digger in the play sings, spade in\rhand. Dost thou never?”\r\r“Sing, sir? Do I sing? Oh, I’m indifferent enough, sir, for that; but\rthe reason why the grave-digger made music must have been because there\rwas none in his spade, sir. But the caulking mallet is full of it. Hark\rto it.”\r\r“Aye, and that’s because the lid there’s a sounding-board; and what in\rall things makes the sounding-board is this—there’s naught beneath. And\ryet, a coffin with a body in it rings pretty much the same, Carpenter.\rHast thou ever helped carry a bier, and heard the coffin knock against\rthe churchyard gate, going in?\r\r“Faith, sir, I’ve——”\r\r“Faith? What’s that?”\r\r“Why, faith, sir, it’s only a sort of exclamation-like—that’s all,\rsir.”\r\r“Um, um; go on.”\r\r“I was about to say, sir, that——”\r\r“Art thou a silk-worm? Dost thou spin thy own shroud out of thyself?\rLook at thy bosom! Despatch! and get these traps out of sight.”\r\r“He goes aft. That was sudden, now; but squalls come sudden in hot\rlatitudes. I’ve heard that the Isle of Albemarle, one of the\rGallipagos, is cut by the Equator right in the middle. Seems to me some\rsort of Equator cuts yon old man, too, right in his middle. He’s always\runder the Line—fiery hot, I tell ye! He’s looking this way—come, oakum;\rquick. Here we go again. This wooden mallet is the cork, and I’m the\rprofessor of musical glasses—tap, tap!”\r\r(_Ahab to himself_.)\r\r“There’s a sight! There’s a sound! The greyheaded woodpecker tapping\rthe hollow tree! Blind and dumb might well be envied now. See! that\rthing rests on two line-tubs, full of tow-lines. A most malicious wag,\rthat fellow. Rat-tat! So man’s seconds tick! Oh! how immaterial are all\rmaterials! What things real are there, but imponderable thoughts? Here\rnow’s the very dreaded symbol of grim death, by a mere hap, made the\rexpressive sign of the help and hope of most endangered life. A\rlife-buoy of a coffin! Does it go further? Can it be that in some\rspiritual sense the coffin is, after all, but an immortality-preserver!\rI’ll think of that. But no. So far gone am I in the dark side of earth,\rthat its other side, the theoretic bright one, seems but uncertain\rtwilight to me. Will ye never have done, Carpenter, with that accursed\rsound? I go below; let me not see that thing here when I return again.\rNow, then, Pip, we’ll talk this over; I do suck most wondrous\rphilosophies from thee! Some unknown conduits from the unknown worlds\rmust empty into thee!”\r\r\rCHAPTER 128. The Pequod Meets The Rachel.\r\rNext day, a large ship, the Rachel, was descried, bearing directly down\rupon the Pequod, all her spars thickly clustering with men. At the time\rthe Pequod was making good speed through the water; but as the\rbroad-winged windward stranger shot nigh to her, the boastful sails all\rfell together as blank bladders that are burst, and all life fled from\rthe smitten hull.\r\r“Bad news; she brings bad news,” muttered the old Manxman. But ere her\rcommander, who, with trumpet to mouth, stood up in his boat; ere he\rcould hopefully hail, Ahab’s voice was heard.\r\r“Hast seen the White Whale?”\r\r“Aye, yesterday. Have ye seen a whale-boat adrift?”\r\rThrottling his joy, Ahab negatively answered this unexpected question;\rand would then have fain boarded the stranger, when the stranger\rcaptain himself, having stopped his vessel’s way, was seen descending\rher side. A few keen pulls, and his boat-hook soon clinched the\rPequod’s main-chains, and he sprang to the deck. Immediately he was\rrecognised by Ahab for a Nantucketer he knew. But no formal salutation\rwas exchanged.\r\r“Where was he?—not killed!—not killed!” cried Ahab, closely advancing.\r“How was it?”\r\rIt seemed that somewhat late on the afternoon of the day previous,\rwhile three of the stranger’s boats were engaged with a shoal of\rwhales, which had led them some four or five miles from the ship; and\rwhile they were yet in swift chase to windward, the white hump and head\rof Moby Dick had suddenly loomed up out of the water, not very far to\rleeward; whereupon, the fourth rigged boat—a reserved one—had been\rinstantly lowered in chase. After a keen sail before the wind, this\rfourth boat—the swiftest keeled of all—seemed to have succeeded in\rfastening—at least, as well as the man at the mast-head could tell\ranything about it. In the distance he saw the diminished dotted boat;\rand then a swift gleam of bubbling white water; and after that nothing\rmore; whence it was concluded that the stricken whale must have\rindefinitely run away with his pursuers, as often happens. There was\rsome apprehension, but no positive alarm, as yet. The recall signals\rwere placed in the rigging; darkness came on; and forced to pick up her\rthree far to windward boats—ere going in quest of the fourth one in the\rprecisely opposite direction—the ship had not only been necessitated to\rleave that boat to its fate till near midnight, but, for the time, to\rincrease her distance from it. But the rest of her crew being at last\rsafe aboard, she crowded all sail—stunsail on stunsail—after the\rmissing boat; kindling a fire in her try-pots for a beacon; and every\rother man aloft on the look-out. But though when she had thus sailed a\rsufficient distance to gain the presumed place of the absent ones when\rlast seen; though she then paused to lower her spare boats to pull all\raround her; and not finding anything, had again dashed on; again\rpaused, and lowered her boats; and though she had thus continued doing\rtill daylight; yet not the least glimpse of the missing keel had been\rseen.\r\rThe story told, the stranger Captain immediately went on to reveal his\robject in boarding the Pequod. He desired that ship to unite with his\rown in the search; by sailing over the sea some four or five miles\rapart, on parallel lines, and so sweeping a double horizon, as it were.\r\r“I will wager something now,” whispered Stubb to Flask, “that some one\rin that missing boat wore off that Captain’s best coat; mayhap, his\rwatch—he’s so cursed anxious to get it back. Who ever heard of two\rpious whale-ships cruising after one missing whale-boat in the height\rof the whaling season? See, Flask, only see how pale he looks—pale in\rthe very buttons of his eyes—look—it wasn’t the coat—it must have been\rthe—”\r\r“My boy, my own boy is among them. For God’s sake—I beg, I\rconjure”—here exclaimed the stranger Captain to Ahab, who thus far had\rbut icily received his petition. “For eight-and-forty hours let me\rcharter your ship—I will gladly pay for it, and roundly pay for it—if\rthere be no other way—for eight-and-forty hours only—only that—you\rmust, oh, you must, and you _shall_ do this thing.”\r\r“His son!” cried Stubb, “oh, it’s his son he’s lost! I take back the\rcoat and watch—what says Ahab? We must save that boy.”\r\r“He’s drowned with the rest on ’em, last night,” said the old Manx\rsailor standing behind them; “I heard; all of ye heard their spirits.”\r\rNow, as it shortly turned out, what made this incident of the Rachel’s\rthe more melancholy, was the circumstance, that not only was one of the\rCaptain’s sons among the number of the missing boat’s crew; but among\rthe number of the other boat’s crews, at the same time, but on the\rother hand, separated from the ship during the dark vicissitudes of the\rchase, there had been still another son; as that for a time, the\rwretched father was plunged to the bottom of the cruellest perplexity;\rwhich was only solved for him by his chief mate’s instinctively\radopting the ordinary procedure of a whale-ship in such emergencies,\rthat is, when placed between jeopardized but divided boats, always to\rpick up the majority first. But the captain, for some unknown\rconstitutional reason, had refrained from mentioning all this, and not\rtill forced to it by Ahab’s iciness did he allude to his one yet\rmissing boy; a little lad, but twelve years old, whose father with the\rearnest but unmisgiving hardihood of a Nantucketer’s paternal love, had\rthus early sought to initiate him in the perils and wonders of a\rvocation almost immemorially the destiny of all his race. Nor does it\runfrequently occur, that Nantucket captains will send a son of such\rtender age away from them, for a protracted three or four years’ voyage\rin some other ship than their own; so that their first knowledge of a\rwhaleman’s career shall be unenervated by any chance display of a\rfather’s natural but untimely partiality, or undue apprehensiveness and\rconcern.\r\rMeantime, now the stranger was still beseeching his poor boon of Ahab;\rand Ahab still stood like an anvil, receiving every shock, but without\rthe least quivering of his own.\r\r“I will not go,” said the stranger, “till you say _aye_ to me. Do to me\ras you would have me do to you in the like case. For _you_ too have a\rboy, Captain Ahab—though but a child, and nestling safely at home now—a\rchild of your old age too—Yes, yes, you relent; I see it—run, run, men,\rnow, and stand by to square in the yards.”\r\r“Avast,” cried Ahab—“touch not a rope-yarn”; then in a voice that\rprolongingly moulded every word—“Captain Gardiner, I will not do it.\rEven now I lose time. Good-bye, good-bye. God bless ye, man, and may I\rforgive myself, but I must go. Mr. Starbuck, look at the binnacle\rwatch, and in three minutes from this present instant warn off all\rstrangers: then brace forward again, and let the ship sail as before.”\r\rHurriedly turning, with averted face, he descended into his cabin,\rleaving the strange captain transfixed at this unconditional and utter\rrejection of his so earnest suit. But starting from his enchantment,\rGardiner silently hurried to the side; more fell than stepped into his\rboat, and returned to his ship.\r\rSoon the two ships diverged their wakes; and long as the strange vessel\rwas in view, she was seen to yaw hither and thither at every dark spot,\rhowever small, on the sea. This way and that her yards were swung\rround; starboard and larboard, she continued to tack; now she beat\ragainst a head sea; and again it pushed her before it; while all the\rwhile, her masts and yards were thickly clustered with men, as three\rtall cherry trees, when the boys are cherrying among the boughs.\r\rBut by her still halting course and winding, woeful way, you plainly\rsaw that this ship that so wept with spray, still remained without\rcomfort. She was Rachel, weeping for her children, because they were\rnot.\r\r\rCHAPTER 129. The Cabin.\r\r(_Ahab moving to go on deck; Pip catches him by the hand to follow._)\r\r“Lad, lad, I tell thee thou must not follow Ahab now. The hour is\rcoming when Ahab would not scare thee from him, yet would not have thee\rby him. There is that in thee, poor lad, which I feel too curing to my\rmalady. Like cures like; and for this hunt, my malady becomes my most\rdesired health. Do thou abide below here, where they shall serve thee,\ras if thou wert the captain. Aye, lad, thou shalt sit here in my own\rscrewed chair; another screw to it, thou must be.”\r\r“No, no, no! ye have not a whole body, sir; do ye but use poor me for\ryour one lost leg; only tread upon me, sir; I ask no more, so I remain\ra part of ye.”\r\r“Oh! spite of million villains, this makes me a bigot in the fadeless\rfidelity of man!—and a black! and crazy!—but methinks like-cures-like\rapplies to him too; he grows so sane again.”\r\r“They tell me, sir, that Stubb did once desert poor little Pip, whose\rdrowned bones now show white, for all the blackness of his living skin.\rBut I will never desert ye, sir, as Stubb did him. Sir, I must go with\rye.”\r\r“If thou speakest thus to me much more, Ahab’s purpose keels up in him.\rI tell thee no; it cannot be.”\r\r“Oh good master, master, master!\r\r“Weep so, and I will murder thee! have a care, for Ahab too is mad.\rListen, and thou wilt often hear my ivory foot upon the deck, and still\rknow that I am there. And now I quit thee. Thy hand!—Met! True art\rthou, lad, as the circumference to its centre. So: God for ever bless\rthee; and if it come to that,—God for ever save thee, let what will\rbefall.”\r\r(_Ahab goes; Pip steps one step forward._)\r\r“Here he this instant stood; I stand in his air,—but I’m alone. Now\rwere even poor Pip here I could endure it, but he’s missing. Pip! Pip!\rDing, dong, ding! Who’s seen Pip? He must be up here; let’s try the\rdoor. What? neither lock, nor bolt, nor bar; and yet there’s no opening\rit. It must be the spell; he told me to stay here: Aye, and told me\rthis screwed chair was mine. Here, then, I’ll seat me, against the\rtransom, in the ship’s full middle, all her keel and her three masts\rbefore me. Here, our old sailors say, in their black seventy-fours\rgreat admirals sometimes sit at table, and lord it over rows of\rcaptains and lieutenants. Ha! what’s this? epaulets! epaulets! the\repaulets all come crowding! Pass round the decanters; glad to see ye;\rfill up, monsieurs! What an odd feeling, now, when a black boy’s host\rto white men with gold lace upon their coats!—Monsieurs, have ye seen\rone Pip?—a little negro lad, five feet high, hang-dog look, and\rcowardly! Jumped from a whale-boat once;—seen him? No! Well then, fill\rup again, captains, and let’s drink shame upon all cowards! I name no\rnames. Shame upon them! Put one foot upon the table. Shame upon all\rcowards.—Hist! above there, I hear ivory—Oh, master! master! I am\rindeed down-hearted when you walk over me. But here I’ll stay, though\rthis stern strikes rocks; and they bulge through; and oysters come to\rjoin me.”\r\r\rCHAPTER 130. The Hat.\r\rAnd now that at the proper time and place, after so long and wide a\rpreliminary cruise, Ahab,—all other whaling waters swept—seemed to have\rchased his foe into an ocean-fold, to slay him the more securely there;\rnow, that he found himself hard by the very latitude and longitude\rwhere his tormenting wound had been inflicted; now that a vessel had\rbeen spoken which on the very day preceding had actually encountered\rMoby Dick;—and now that all his successive meetings with various ships\rcontrastingly concurred to show the demoniac indifference with which\rthe white whale tore his hunters, whether sinning or sinned against;\rnow it was that there lurked a something in the old man’s eyes, which\rit was hardly sufferable for feeble souls to see. As the unsetting\rpolar star, which through the livelong, arctic, six months’ night\rsustains its piercing, steady, central gaze; so Ahab’s purpose now\rfixedly gleamed down upon the constant midnight of the gloomy crew. It\rdomineered above them so, that all their bodings, doubts, misgivings,\rfears, were fain to hide beneath their souls, and not sprout forth a\rsingle spear or leaf.\r\rIn this foreshadowing interval too, all humor, forced or natural,\rvanished. Stubb no more strove to raise a smile; Starbuck no more\rstrove to check one. Alike, joy and sorrow, hope and fear, seemed\rground to finest dust, and powdered, for the time, in the clamped\rmortar of Ahab’s iron soul. Like machines, they dumbly moved about the\rdeck, ever conscious that the old man’s despot eye was on them.\r\rBut did you deeply scan him in his more secret confidential hours; when\rhe thought no glance but one was on him; then you would have seen that\reven as Ahab’s eyes so awed the crew’s, the inscrutable Parsee’s glance\rawed his; or somehow, at least, in some wild way, at times affected it.\rSuch an added, gliding strangeness began to invest the thin Fedallah\rnow; such ceaseless shudderings shook him; that the men looked dubious\rat him; half uncertain, as it seemed, whether indeed he were a mortal\rsubstance, or else a tremulous shadow cast upon the deck by some unseen\rbeing’s body. And that shadow was always hovering there. For not by\rnight, even, had Fedallah ever certainly been known to slumber, or go\rbelow. He would stand still for hours: but never sat or leaned; his wan\rbut wondrous eyes did plainly say—We two watchmen never rest.\r\rNor, at any time, by night or day could the mariners now step upon the\rdeck, unless Ahab was before them; either standing in his pivot-hole,\ror exactly pacing the planks between two undeviating limits,—the\rmain-mast and the mizen; or else they saw him standing in the\rcabin-scuttle,—his living foot advanced upon the deck, as if to step;\rhis hat slouched heavily over his eyes; so that however motionless he\rstood, however the days and nights were added on, that he had not swung\rin his hammock; yet hidden beneath that slouching hat, they could never\rtell unerringly whether, for all this, his eyes were really closed at\rtimes; or whether he was still intently scanning them; no matter,\rthough he stood so in the scuttle for a whole hour on the stretch, and\rthe unheeded night-damp gathered in beads of dew upon that stone-carved\rcoat and hat. The clothes that the night had wet, the next day’s\rsunshine dried upon him; and so, day after day, and night after night;\rhe went no more beneath the planks; whatever he wanted from the cabin\rthat thing he sent for.\r\rHe ate in the same open air; that is, his two only meals,—breakfast and\rdinner: supper he never touched; nor reaped his beard; which darkly\rgrew all gnarled, as unearthed roots of trees blown over, which still\rgrow idly on at naked base, though perished in the upper verdure. But\rthough his whole life was now become one watch on deck; and though the\rParsee’s mystic watch was without intermission as his own; yet these\rtwo never seemed to speak—one man to the other—unless at long intervals\rsome passing unmomentous matter made it necessary. Though such a potent\rspell seemed secretly to join the twain; openly, and to the awe-struck\rcrew, they seemed pole-like asunder. If by day they chanced to speak\rone word; by night, dumb men were both, so far as concerned the\rslightest verbal interchange. At times, for longest hours, without a\rsingle hail, they stood far parted in the starlight; Ahab in his\rscuttle, the Parsee by the mainmast; but still fixedly gazing upon each\rother; as if in the Parsee Ahab saw his forethrown shadow, in Ahab the\rParsee his abandoned substance.\r\rAnd yet, somehow, did Ahab—in his own proper self, as daily, hourly,\rand every instant, commandingly revealed to his subordinates,—Ahab\rseemed an independent lord; the Parsee but his slave. Still again both\rseemed yoked together, and an unseen tyrant driving them; the lean\rshade siding the solid rib. For be this Parsee what he may, all rib and\rkeel was solid Ahab.\r\rAt the first faintest glimmering of the dawn, his iron voice was heard\rfrom aft,—“Man the mast-heads!”—and all through the day, till after\rsunset and after twilight, the same voice every hour, at the striking\rof the helmsman’s bell, was heard—“What d’ye see?—sharp! sharp!”\r\rBut when three or four days had slided by, after meeting the\rchildren-seeking Rachel; and no spout had yet been seen; the monomaniac\rold man seemed distrustful of his crew’s fidelity; at least, of nearly\rall except the Pagan harpooneers; he seemed to doubt, even, whether\rStubb and Flask might not willingly overlook the sight he sought. But\rif these suspicions were really his, he sagaciously refrained from\rverbally expressing them, however his actions might seem to hint them.\r\r“I will have the first sight of the whale myself,”—he said. “Aye! Ahab\rmust have the doubloon!” and with his own hands he rigged a nest of\rbasketed bowlines; and sending a hand aloft, with a single sheaved\rblock, to secure to the main-mast head, he received the two ends of the\rdownward-reeved rope; and attaching one to his basket prepared a pin\rfor the other end, in order to fasten it at the rail. This done, with\rthat end yet in his hand and standing beside the pin, he looked round\rupon his crew, sweeping from one to the other; pausing his glance long\rupon Daggoo, Queequeg, Tashtego; but shunning Fedallah; and then\rsettling his firm relying eye upon the chief mate, said,—“Take the\rrope, sir—I give it into thy hands, Starbuck.” Then arranging his\rperson in the basket, he gave the word for them to hoist him to his\rperch, Starbuck being the one who secured the rope at last; and\rafterwards stood near it. And thus, with one hand clinging round the\rroyal mast, Ahab gazed abroad upon the sea for miles and miles,—ahead,\rastern, this side, and that,—within the wide expanded circle commanded\rat so great a height.\r\rWhen in working with his hands at some lofty almost isolated place in\rthe rigging, which chances to afford no foothold, the sailor at sea is\rhoisted up to that spot, and sustained there by the rope; under these\rcircumstances, its fastened end on deck is always given in strict\rcharge to some one man who has the special watch of it. Because in such\ra wilderness of running rigging, whose various different relations\raloft cannot always be infallibly discerned by what is seen of them at\rthe deck; and when the deck-ends of these ropes are being every few\rminutes cast down from the fastenings, it would be but a natural\rfatality, if, unprovided with a constant watchman, the hoisted sailor\rshould by some carelessness of the crew be cast adrift and fall all\rswooping to the sea. So Ahab’s proceedings in this matter were not\runusual; the only strange thing about them seemed to be, that Starbuck,\ralmost the one only man who had ever ventured to oppose him with\ranything in the slightest degree approaching to decision—one of those\rtoo, whose faithfulness on the look-out he had seemed to doubt\rsomewhat;—it was strange, that this was the very man he should select\rfor his watchman; freely giving his whole life into such an otherwise\rdistrusted person’s hands.\r\rNow, the first time Ahab was perched aloft; ere he had been there ten\rminutes; one of those red-billed savage sea-hawks which so often fly\rincommodiously close round the manned mast-heads of whalemen in these\rlatitudes; one of these birds came wheeling and screaming round his\rhead in a maze of untrackably swift circlings. Then it darted a\rthousand feet straight up into the air; then spiralized downwards, and\rwent eddying again round his head.\r\rBut with his gaze fixed upon the dim and distant horizon, Ahab seemed\rnot to mark this wild bird; nor, indeed, would any one else have marked\rit much, it being no uncommon circumstance; only now almost the least\rheedful eye seemed to see some sort of cunning meaning in almost every\rsight.\r\r“Your hat, your hat, sir!” suddenly cried the Sicilian seaman, who\rbeing posted at the mizen-mast-head, stood directly behind Ahab, though\rsomewhat lower than his level, and with a deep gulf of air dividing\rthem.\r\rBut already the sable wing was before the old man’s eyes; the long\rhooked bill at his head: with a scream, the black hawk darted away with\rhis prize.\r\rAn eagle flew thrice round Tarquin’s head, removing his cap to replace\rit, and thereupon Tanaquil, his wife, declared that Tarquin would be\rking of Rome. But only by the replacing of the cap was that omen\raccounted good. Ahab’s hat was never restored; the wild hawk flew on\rand on with it; far in advance of the prow: and at last disappeared;\rwhile from the point of that disappearance, a minute black spot was\rdimly discerned, falling from that vast height into the sea.\r\r\rCHAPTER 131. The Pequod Meets The Delight.\r\rThe intense Pequod sailed on; the rolling waves and days went by; the\rlife-buoy-coffin still lightly swung; and another ship, most miserably\rmisnamed the Delight, was descried. As she drew nigh, all eyes were\rfixed upon her broad beams, called shears, which, in some\rwhaling-ships, cross the quarter-deck at the height of eight or nine\rfeet; serving to carry the spare, unrigged, or disabled boats.\r\rUpon the stranger’s shears were beheld the shattered, white ribs, and\rsome few splintered planks, of what had once been a whale-boat; but you\rnow saw through this wreck, as plainly as you see through the peeled,\rhalf-unhinged, and bleaching skeleton of a horse.\r\r“Hast seen the White Whale?”\r\r“Look!” replied the hollow-cheeked captain from his taffrail; and with\rhis trumpet he pointed to the wreck.\r\r“Hast killed him?”\r\r“The harpoon is not yet forged that ever will do that,” answered the\rother, sadly glancing upon a rounded hammock on the deck, whose\rgathered sides some noiseless sailors were busy in sewing together.\r\r“Not forged!” and snatching Perth’s levelled iron from the crotch, Ahab\rheld it out, exclaiming—“Look ye, Nantucketer; here in this hand I hold\rhis death! Tempered in blood, and tempered by lightning are these\rbarbs; and I swear to temper them triply in that hot place behind the\rfin, where the White Whale most feels his accursed life!”\r\r“Then God keep thee, old man—see’st thou that”—pointing to the\rhammock—“I bury but one of five stout men, who were alive only\ryesterday; but were dead ere night. Only _that_ one I bury; the rest\rwere buried before they died; you sail upon their tomb.” Then turning\rto his crew—“Are ye ready there? place the plank then on the rail, and\rlift the body; so, then—Oh! God”—advancing towards the hammock with\ruplifted hands—“may the resurrection and the life——”\r\r“Brace forward! Up helm!” cried Ahab like lightning to his men.\r\rBut the suddenly started Pequod was not quick enough to escape the\rsound of the splash that the corpse soon made as it struck the sea; not\rso quick, indeed, but that some of the flying bubbles might have\rsprinkled her hull with their ghostly baptism.\r\rAs Ahab now glided from the dejected Delight, the strange life-buoy\rhanging at the Pequod’s stern came into conspicuous relief.\r\r“Ha! yonder! look yonder, men!” cried a foreboding voice in her wake.\r“In vain, oh, ye strangers, ye fly our sad burial; ye but turn us your\rtaffrail to show us your coffin!”\r\r\rCHAPTER 132. The Symphony.\r\rIt was a clear steel-blue day. The firmaments of air and sea were\rhardly separable in that all-pervading azure; only, the pensive air was\rtransparently pure and soft, with a woman’s look, and the robust and\rman-like sea heaved with long, strong, lingering swells, as Samson’s\rchest in his sleep.\r\rHither, and thither, on high, glided the snow-white wings of small,\runspeckled birds; these were the gentle thoughts of the feminine air;\rbut to and fro in the deeps, far down in the bottomless blue, rushed\rmighty leviathans, sword-fish, and sharks; and these were the strong,\rtroubled, murderous thinkings of the masculine sea.\r\rBut though thus contrasting within, the contrast was only in shades and\rshadows without; those two seemed one; it was only the sex, as it were,\rthat distinguished them.\r\rAloft, like a royal czar and king, the sun seemed giving this gentle\rair to this bold and rolling sea; even as bride to groom. And at the\rgirdling line of the horizon, a soft and tremulous motion—most seen\rhere at the equator—denoted the fond, throbbing trust, the loving\ralarms, with which the poor bride gave her bosom away.\r\rTied up and twisted; gnarled and knotted with wrinkles; haggardly firm\rand unyielding; his eyes glowing like coals, that still glow in the\rashes of ruin; untottering Ahab stood forth in the clearness of the\rmorn; lifting his splintered helmet of a brow to the fair girl’s\rforehead of heaven.\r\rOh, immortal infancy, and innocency of the azure! Invisible winged\rcreatures that frolic all round us! Sweet childhood of air and sky! how\roblivious were ye of old Ahab’s close-coiled woe! But so have I seen\rlittle Miriam and Martha, laughing-eyed elves, heedlessly gambol around\rtheir old sire; sporting with the circle of singed locks which grew on\rthe marge of that burnt-out crater of his brain.\r\rSlowly crossing the deck from the scuttle, Ahab leaned over the side\rand watched how his shadow in the water sank and sank to his gaze, the\rmore and the more that he strove to pierce the profundity. But the\rlovely aromas in that enchanted air did at last seem to dispel, for a\rmoment, the cankerous thing in his soul. That glad, happy air, that\rwinsome sky, did at last stroke and caress him; the step-mother world,\rso long cruel—forbidding—now threw affectionate arms round his stubborn\rneck, and did seem to joyously sob over him, as if over one, that\rhowever wilful and erring, she could yet find it in her heart to save\rand to bless. From beneath his slouched hat Ahab dropped a tear into\rthe sea; nor did all the Pacific contain such wealth as that one wee\rdrop.\r\rStarbuck saw the old man; saw him, how he heavily leaned over the side;\rand he seemed to hear in his own true heart the measureless sobbing\rthat stole out of the centre of the serenity around. Careful not to\rtouch him, or be noticed by him, he yet drew near to him, and stood\rthere.\r\rAhab turned.\r\r“Starbuck!”\r\r“Sir.”\r\r“Oh, Starbuck! it is a mild, mild wind, and a mild looking sky. On such\ra day—very much such a sweetness as this—I struck my first whale—a\rboy-harpooneer of eighteen! Forty—forty—forty years ago!—ago! Forty\ryears of continual whaling! forty years of privation, and peril, and\rstorm-time! forty years on the pitiless sea! for forty years has Ahab\rforsaken the peaceful land, for forty years to make war on the horrors\rof the deep! Aye and yes, Starbuck, out of those forty years I have not\rspent three ashore. When I think of this life I have led; the\rdesolation of solitude it has been; the masoned, walled-town of a\rCaptain’s exclusiveness, which admits but small entrance to any\rsympathy from the green country without—oh, weariness! heaviness!\rGuinea-coast slavery of solitary command!—when I think of all this;\ronly half-suspected, not so keenly known to me before—and how for forty\ryears I have fed upon dry salted fare—fit emblem of the dry nourishment\rof my soil!—when the poorest landsman has had fresh fruit to his daily\rhand, and broken the world’s fresh bread to my mouldy crusts—away,\rwhole oceans away, from that young girl-wife I wedded past fifty, and\rsailed for Cape Horn the next day, leaving but one dent in my marriage\rpillow—wife? wife?—rather a widow with her husband alive! Aye, I\rwidowed that poor girl when I married her, Starbuck; and then, the\rmadness, the frenzy, the boiling blood and the smoking brow, with\rwhich, for a thousand lowerings old Ahab has furiously, foamingly\rchased his prey—more a demon than a man!—aye, aye! what a forty years’\rfool—fool—old fool, has old Ahab been! Why this strife of the chase?\rwhy weary, and palsy the arm at the oar, and the iron, and the lance?\rhow the richer or better is Ahab now? Behold. Oh, Starbuck! is it not\rhard, that with this weary load I bear, one poor leg should have been\rsnatched from under me? Here, brush this old hair aside; it blinds me,\rthat I seem to weep. Locks so grey did never grow but from out some\rashes! But do I look very old, so very, very old, Starbuck? I feel\rdeadly faint, bowed, and humped, as though I were Adam, staggering\rbeneath the piled centuries since Paradise. God! God! God!—crack my\rheart!—stave my brain!—mockery! mockery! bitter, biting mockery of grey\rhairs, have I lived enough joy to wear ye; and seem and feel thus\rintolerably old? Close! stand close to me, Starbuck; let me look into a\rhuman eye; it is better than to gaze into sea or sky; better than to\rgaze upon God. By the green land; by the bright hearth-stone! this is\rthe magic glass, man; I see my wife and my child in thine eye. No, no;\rstay on board, on board!—lower not when I do; when branded Ahab gives\rchase to Moby Dick. That hazard shall not be thine. No, no! not with\rthe far away home I see in that eye!”\r\r“Oh, my Captain! my Captain! noble soul! grand old heart, after all!\rwhy should any one give chase to that hated fish! Away with me! let us\rfly these deadly waters! let us home! Wife and child, too, are\rStarbuck’s—wife and child of his brotherly, sisterly, play-fellow\ryouth; even as thine, sir, are the wife and child of thy loving,\rlonging, paternal old age! Away! let us away!—this instant let me alter\rthe course! How cheerily, how hilariously, O my Captain, would we bowl\ron our way to see old Nantucket again! I think, sir, they have some\rsuch mild blue days, even as this, in Nantucket.”\r\r“They have, they have. I have seen them—some summer days in the\rmorning. About this time—yes, it is his noon nap now—the boy\rvivaciously wakes; sits up in bed; and his mother tells him of me, of\rcannibal old me; how I am abroad upon the deep, but will yet come back\rto dance him again.”\r\r“’Tis my Mary, my Mary herself! She promised that my boy, every\rmorning, should be carried to the hill to catch the first glimpse of\rhis father’s sail! Yes, yes! no more! it is done! we head for\rNantucket! Come, my Captain, study out the course, and let us away!\rSee, see! the boy’s face from the window! the boy’s hand on the hill!”\r\rBut Ahab’s glance was averted; like a blighted fruit tree he shook, and\rcast his last, cindered apple to the soil.\r\r“What is it, what nameless, inscrutable, unearthly thing is it; what\rcozening, hidden lord and master, and cruel, remorseless emperor\rcommands me; that against all natural lovings and longings, I so keep\rpushing, and crowding, and jamming myself on all the time; recklessly\rmaking me ready to do what in my own proper, natural heart, I durst not\rso much as dare? Is Ahab, Ahab? Is it I, God, or who, that lifts this\rarm? But if the great sun move not of himself; but is as an errand-boy\rin heaven; nor one single star can revolve, but by some invisible\rpower; how then can this one small heart beat; this one small brain\rthink thoughts; unless God does that beating, does that thinking, does\rthat living, and not I. By heaven, man, we are turned round and round\rin this world, like yonder windlass, and Fate is the handspike. And all\rthe time, lo! that smiling sky, and this unsounded sea! Look! see yon\rAlbicore! who put it into him to chase and fang that flying-fish? Where\rdo murderers go, man! Who’s to doom, when the judge himself is dragged\rto the bar? But it is a mild, mild wind, and a mild looking sky; and\rthe air smells now, as if it blew from a far-away meadow; they have\rbeen making hay somewhere under the slopes of the Andes, Starbuck, and\rthe mowers are sleeping among the new-mown hay. Sleeping? Aye, toil we\rhow we may, we all sleep at last on the field. Sleep? Aye, and rust\ramid greenness; as last year’s scythes flung down, and left in the\rhalf-cut swaths—Starbuck!”\r\rBut blanched to a corpse’s hue with despair, the Mate had stolen away.\r\rAhab crossed the deck to gaze over on the other side; but started at\rtwo reflected, fixed eyes in the water there. Fedallah was motionlessly\rleaning over the same rail.\r\r\rCHAPTER 133. The Chase—First Day.\r\rThat night, in the mid-watch, when the old man—as his wont at\rintervals—stepped forth from the scuttle in which he leaned, and went\rto his pivot-hole, he suddenly thrust out his face fiercely, snuffing\rup the sea air as a sagacious ship’s dog will, in drawing nigh to some\rbarbarous isle. He declared that a whale must be near. Soon that\rpeculiar odor, sometimes to a great distance given forth by the living\rsperm whale, was palpable to all the watch; nor was any mariner\rsurprised when, after inspecting the compass, and then the dog-vane,\rand then ascertaining the precise bearing of the odor as nearly as\rpossible, Ahab rapidly ordered the ship’s course to be slightly\raltered, and the sail to be shortened.\r\rThe acute policy dictating these movements was sufficiently vindicated\rat daybreak, by the sight of a long sleek on the sea directly and\rlengthwise ahead, smooth as oil, and resembling in the pleated watery\rwrinkles bordering it, the polished metallic-like marks of some swift\rtide-rip, at the mouth of a deep, rapid stream.\r\r“Man the mast-heads! Call all hands!”\r\rThundering with the butts of three clubbed handspikes on the forecastle\rdeck, Daggoo roused the sleepers with such judgment claps that they\rseemed to exhale from the scuttle, so instantaneously did they appear\rwith their clothes in their hands.\r\r“What d’ye see?” cried Ahab, flattening his face to the sky.\r\r“Nothing, nothing sir!” was the sound hailing down in reply.\r\r“T’gallant sails!—stunsails! alow and aloft, and on both sides!”\r\rAll sail being set, he now cast loose the life-line, reserved for\rswaying him to the main royal-mast head; and in a few moments they were\rhoisting him thither, when, while but two thirds of the way aloft, and\rwhile peering ahead through the horizontal vacancy between the\rmain-top-sail and top-gallant-sail, he raised a gull-like cry in the\rair. “There she blows!—there she blows! A hump like a snow-hill! It is\rMoby Dick!”\r\rFired by the cry which seemed simultaneously taken up by the three\rlook-outs, the men on deck rushed to the rigging to behold the famous\rwhale they had so long been pursuing. Ahab had now gained his final\rperch, some feet above the other look-outs, Tashtego standing just\rbeneath him on the cap of the top-gallant-mast, so that the Indian’s\rhead was almost on a level with Ahab’s heel. From this height the whale\rwas now seen some mile or so ahead, at every roll of the sea revealing\rhis high sparkling hump, and regularly jetting his silent spout into\rthe air. To the credulous mariners it seemed the same silent spout they\rhad so long ago beheld in the moonlit Atlantic and Indian Oceans.\r\r“And did none of ye see it before?” cried Ahab, hailing the perched men\rall around him.\r\r“I saw him almost that same instant, sir, that Captain Ahab did, and I\rcried out,” said Tashtego.\r\r“Not the same instant; not the same—no, the doubloon is mine, Fate\rreserved the doubloon for me. _I_ only; none of ye could have raised\rthe White Whale first. There she blows!—there she blows!—there she\rblows! There again!—there again!” he cried, in long-drawn, lingering,\rmethodic tones, attuned to the gradual prolongings of the whale’s\rvisible jets. “He’s going to sound! In stunsails! Down\rtop-gallant-sails! Stand by three boats. Mr. Starbuck, remember, stay\ron board, and keep the ship. Helm there! Luff, luff a point! So;\rsteady, man, steady! There go flukes! No, no; only black water! All\rready the boats there? Stand by, stand by! Lower me, Mr. Starbuck;\rlower, lower,—quick, quicker!” and he slid through the air to the deck.\r\r“He is heading straight to leeward, sir,” cried Stubb, “right away from\rus; cannot have seen the ship yet.”\r\r“Be dumb, man! Stand by the braces! Hard down the helm!—brace up!\rShiver her!—shiver her!—So; well that! Boats, boats!”\r\rSoon all the boats but Starbuck’s were dropped; all the boat-sails\rset—all the paddles plying; with rippling swiftness, shooting to\rleeward; and Ahab heading the onset. A pale, death-glimmer lit up\rFedallah’s sunken eyes; a hideous motion gnawed his mouth.\r\rLike noiseless nautilus shells, their light prows sped through the sea;\rbut only slowly they neared the foe. As they neared him, the ocean grew\rstill more smooth; seemed drawing a carpet over its waves; seemed a\rnoon-meadow, so serenely it spread. At length the breathless hunter\rcame so nigh his seemingly unsuspecting prey, that his entire dazzling\rhump was distinctly visible, sliding along the sea as if an isolated\rthing, and continually set in a revolving ring of finest, fleecy,\rgreenish foam. He saw the vast, involved wrinkles of the slightly\rprojecting head beyond. Before it, far out on the soft Turkish-rugged\rwaters, went the glistening white shadow from his broad, milky\rforehead, a musical rippling playfully accompanying the shade; and\rbehind, the blue waters interchangeably flowed over into the moving\rvalley of his steady wake; and on either hand bright bubbles arose and\rdanced by his side. But these were broken again by the light toes of\rhundreds of gay fowl softly feathering the sea, alternate with their\rfitful flight; and like to some flag-staff rising from the painted hull\rof an argosy, the tall but shattered pole of a recent lance projected\rfrom the white whale’s back; and at intervals one of the cloud of\rsoft-toed fowls hovering, and to and fro skimming like a canopy over\rthe fish, silently perched and rocked on this pole, the long tail\rfeathers streaming like pennons.\r\rA gentle joyousness—a mighty mildness of repose in swiftness, invested\rthe gliding whale. Not the white bull Jupiter swimming away with\rravished Europa clinging to his graceful horns; his lovely, leering\reyes sideways intent upon the maid; with smooth bewitching fleetness,\rrippling straight for the nuptial bower in Crete; not Jove, not that\rgreat majesty Supreme! did surpass the glorified White Whale as he so\rdivinely swam.\r\rOn each soft side—coincident with the parted swell, that but once\rleaving him, then flowed so wide away—on each bright side, the whale\rshed off enticings. No wonder there had been some among the hunters who\rnamelessly transported and allured by all this serenity, had ventured\rto assail it; but had fatally found that quietude but the vesture of\rtornadoes. Yet calm, enticing calm, oh, whale! thou glidest on, to all\rwho for the first time eye thee, no matter how many in that same way\rthou may’st have bejuggled and destroyed before.\r\rAnd thus, through the serene tranquillities of the tropical sea, among\rwaves whose hand-clappings were suspended by exceeding rapture, Moby\rDick moved on, still withholding from sight the full terrors of his\rsubmerged trunk, entirely hiding the wrenched hideousness of his jaw.\rBut soon the fore part of him slowly rose from the water; for an\rinstant his whole marbleized body formed a high arch, like Virginia’s\rNatural Bridge, and warningly waving his bannered flukes in the air,\rthe grand god revealed himself, sounded, and went out of sight.\rHoveringly halting, and dipping on the wing, the white sea-fowls\rlongingly lingered over the agitated pool that he left.\r\rWith oars apeak, and paddles down, the sheets of their sails adrift,\rthe three boats now stilly floated, awaiting Moby Dick’s reappearance.\r\r“An hour,” said Ahab, standing rooted in his boat’s stern; and he gazed\rbeyond the whale’s place, towards the dim blue spaces and wide wooing\rvacancies to leeward. It was only an instant; for again his eyes seemed\rwhirling round in his head as he swept the watery circle. The breeze\rnow freshened; the sea began to swell.\r\r“The birds!—the birds!” cried Tashtego.\r\rIn long Indian file, as when herons take wing, the white birds were now\rall flying towards Ahab’s boat; and when within a few yards began\rfluttering over the water there, wheeling round and round, with joyous,\rexpectant cries. Their vision was keener than man’s; Ahab could\rdiscover no sign in the sea. But suddenly as he peered down and down\rinto its depths, he profoundly saw a white living spot no bigger than a\rwhite weasel, with wonderful celerity uprising, and magnifying as it\rrose, till it turned, and then there were plainly revealed two long\rcrooked rows of white, glistening teeth, floating up from the\rundiscoverable bottom. It was Moby Dick’s open mouth and scrolled jaw;\rhis vast, shadowed bulk still half blending with the blue of the sea.\rThe glittering mouth yawned beneath the boat like an open-doored marble\rtomb; and giving one sidelong sweep with his steering oar, Ahab whirled\rthe craft aside from this tremendous apparition. Then, calling upon\rFedallah to change places with him, went forward to the bows, and\rseizing Perth’s harpoon, commanded his crew to grasp their oars and\rstand by to stern.\r\rNow, by reason of this timely spinning round the boat upon its axis,\rits bow, by anticipation, was made to face the whale’s head while yet\runder water. But as if perceiving this stratagem, Moby Dick, with that\rmalicious intelligence ascribed to him, sidelingly transplanted\rhimself, as it were, in an instant, shooting his pleated head\rlengthwise beneath the boat.\r\rThrough and through; through every plank and each rib, it thrilled for\ran instant, the whale obliquely lying on his back, in the manner of a\rbiting shark, slowly and feelingly taking its bows full within his\rmouth, so that the long, narrow, scrolled lower jaw curled high up into\rthe open air, and one of the teeth caught in a row-lock. The bluish\rpearl-white of the inside of the jaw was within six inches of Ahab’s\rhead, and reached higher than that. In this attitude the White Whale\rnow shook the slight cedar as a mildly cruel cat her mouse. With\runastonished eyes Fedallah gazed, and crossed his arms; but the\rtiger-yellow crew were tumbling over each other’s heads to gain the\ruttermost stern.\r\rAnd now, while both elastic gunwales were springing in and out, as the\rwhale dallied with the doomed craft in this devilish way; and from his\rbody being submerged beneath the boat, he could not be darted at from\rthe bows, for the bows were almost inside of him, as it were; and while\rthe other boats involuntarily paused, as before a quick crisis\rimpossible to withstand, then it was that monomaniac Ahab, furious with\rthis tantalizing vicinity of his foe, which placed him all alive and\rhelpless in the very jaws he hated; frenzied with all this, he seized\rthe long bone with his naked hands, and wildly strove to wrench it from\rits gripe. As now he thus vainly strove, the jaw slipped from him; the\rfrail gunwales bent in, collapsed, and snapped, as both jaws, like an\renormous shears, sliding further aft, bit the craft completely in\rtwain, and locked themselves fast again in the sea, midway between the\rtwo floating wrecks. These floated aside, the broken ends drooping, the\rcrew at the stern-wreck clinging to the gunwales, and striving to hold\rfast to the oars to lash them across.\r\rAt that preluding moment, ere the boat was yet snapped, Ahab, the first\rto perceive the whale’s intent, by the crafty upraising of his head, a\rmovement that loosed his hold for the time; at that moment his hand had\rmade one final effort to push the boat out of the bite. But only\rslipping further into the whale’s mouth, and tilting over sideways as\rit slipped, the boat had shaken off his hold on the jaw; spilled him\rout of it, as he leaned to the push; and so he fell flat-faced upon the\rsea.\r\rRipplingly withdrawing from his prey, Moby Dick now lay at a little\rdistance, vertically thrusting his oblong white head up and down in the\rbillows; and at the same time slowly revolving his whole spindled body;\rso that when his vast wrinkled forehead rose—some twenty or more feet\rout of the water—the now rising swells, with all their confluent waves,\rdazzlingly broke against it; vindictively tossing their shivered spray\rstill higher into the air.* So, in a gale, the but half baffled Channel\rbillows only recoil from the base of the Eddystone, triumphantly to\roverleap its summit with their scud.\r\r*This motion is peculiar to the sperm whale. It receives its\rdesignation (pitchpoling) from its being likened to that preliminary\rup-and-down poise of the whale-lance, in the exercise called\rpitchpoling, previously described. By this motion the whale must best\rand most comprehensively view whatever objects may be encircling him.\r\rBut soon resuming his horizontal attitude, Moby Dick swam swiftly round\rand round the wrecked crew; sideways churning the water in his vengeful\rwake, as if lashing himself up to still another and more deadly\rassault. The sight of the splintered boat seemed to madden him, as the\rblood of grapes and mulberries cast before Antiochus’s elephants in the\rbook of Maccabees. Meanwhile Ahab half smothered in the foam of the\rwhale’s insolent tail, and too much of a cripple to swim,—though he\rcould still keep afloat, even in the heart of such a whirlpool as that;\rhelpless Ahab’s head was seen, like a tossed bubble which the least\rchance shock might burst. From the boat’s fragmentary stern, Fedallah\rincuriously and mildly eyed him; the clinging crew, at the other\rdrifting end, could not succor him; more than enough was it for them to\rlook to themselves. For so revolvingly appalling was the White Whale’s\raspect, and so planetarily swift the ever-contracting circles he made,\rthat he seemed horizontally swooping upon them. And though the other\rboats, unharmed, still hovered hard by; still they dared not pull into\rthe eddy to strike, lest that should be the signal for the instant\rdestruction of the jeopardized castaways, Ahab and all; nor in that\rcase could they themselves hope to escape. With straining eyes, then,\rthey remained on the outer edge of the direful zone, whose centre had\rnow become the old man’s head.\r\rMeantime, from the beginning all this had been descried from the ship’s\rmast heads; and squaring her yards, she had borne down upon the scene;\rand was now so nigh, that Ahab in the water hailed her!—“Sail on\rthe”—but that moment a breaking sea dashed on him from Moby Dick, and\rwhelmed him for the time. But struggling out of it again, and chancing\rto rise on a towering crest, he shouted,—“Sail on the whale!—Drive him\roff!”\r\rThe Pequod’s prows were pointed; and breaking up the charmed circle,\rshe effectually parted the white whale from his victim. As he sullenly\rswam off, the boats flew to the rescue.\r\rDragged into Stubb’s boat with blood-shot, blinded eyes, the white\rbrine caking in his wrinkles; the long tension of Ahab’s bodily\rstrength did crack, and helplessly he yielded to his body’s doom: for a\rtime, lying all crushed in the bottom of Stubb’s boat, like one trodden\runder foot of herds of elephants. Far inland, nameless wails came from\rhim, as desolate sounds from out ravines.\r\rBut this intensity of his physical prostration did but so much the more\rabbreviate it. In an instant’s compass, great hearts sometimes condense\rto one deep pang, the sum total of those shallow pains kindly diffused\rthrough feebler men’s whole lives. And so, such hearts, though summary\rin each one suffering; still, if the gods decree it, in their life-time\raggregate a whole age of woe, wholly made up of instantaneous\rintensities; for even in their pointless centres, those noble natures\rcontain the entire circumferences of inferior souls.\r\r“The harpoon,” said Ahab, half way rising, and draggingly leaning on\rone bended arm—“is it safe?”\r\r“Aye, sir, for it was not darted; this is it,” said Stubb, showing it.\r\r“Lay it before me;—any missing men?”\r\r“One, two, three, four, five;—there were five oars, sir, and here are\rfive men.”\r\r“That’s good.—Help me, man; I wish to stand. So, so, I see him! there!\rthere! going to leeward still; what a leaping spout!—Hands off from me!\rThe eternal sap runs up in Ahab’s bones again! Set the sail; out oars;\rthe helm!”\r\rIt is often the case that when a boat is stove, its crew, being picked\rup by another boat, help to work that second boat; and the chase is\rthus continued with what is called double-banked oars. It was thus now.\rBut the added power of the boat did not equal the added power of the\rwhale, for he seemed to have treble-banked his every fin; swimming with\ra velocity which plainly showed, that if now, under these\rcircumstances, pushed on, the chase would prove an indefinitely\rprolonged, if not a hopeless one; nor could any crew endure for so long\ra period, such an unintermitted, intense straining at the oar; a thing\rbarely tolerable only in some one brief vicissitude. The ship itself,\rthen, as it sometimes happens, offered the most promising intermediate\rmeans of overtaking the chase. Accordingly, the boats now made for her,\rand were soon swayed up to their cranes—the two parts of the wrecked\rboat having been previously secured by her—and then hoisting everything\rto her side, and stacking her canvas high up, and sideways\routstretching it with stun-sails, like the double-jointed wings of an\ralbatross; the Pequod bore down in the leeward wake of Moby-Dick. At\rthe well known, methodic intervals, the whale’s glittering spout was\rregularly announced from the manned mast-heads; and when he would be\rreported as just gone down, Ahab would take the time, and then pacing\rthe deck, binnacle-watch in hand, so soon as the last second of the\rallotted hour expired, his voice was heard.—“Whose is the doubloon now?\rD’ye see him?” and if the reply was, No, sir! straightway he commanded\rthem to lift him to his perch. In this way the day wore on; Ahab, now\raloft and motionless; anon, unrestingly pacing the planks.\r\rAs he was thus walking, uttering no sound, except to hail the men\raloft, or to bid them hoist a sail still higher, or to spread one to a\rstill greater breadth—thus to and fro pacing, beneath his slouched hat,\rat every turn he passed his own wrecked boat, which had been dropped\rupon the quarter-deck, and lay there reversed; broken bow to shattered\rstern. At last he paused before it; and as in an already over-clouded\rsky fresh troops of clouds will sometimes sail across, so over the old\rman’s face there now stole some such added gloom as this.\r\rStubb saw him pause; and perhaps intending, not vainly, though, to\revince his own unabated fortitude, and thus keep up a valiant place in\rhis Captain’s mind, he advanced, and eyeing the wreck exclaimed—“The\rthistle the ass refused; it pricked his mouth too keenly, sir; ha! ha!”\r\r“What soulless thing is this that laughs before a wreck? Man, man! did\rI not know thee brave as fearless fire (and as mechanical) I could\rswear thou wert a poltroon. Groan nor laugh should be heard before a\rwreck.”\r\r“Aye, sir,” said Starbuck drawing near, “’tis a solemn sight; an omen,\rand an ill one.”\r\r“Omen? omen?—the dictionary! If the gods think to speak outright to\rman, they will honorably speak outright; not shake their heads, and\rgive an old wives’ darkling hint.—Begone! Ye two are the opposite poles\rof one thing; Starbuck is Stubb reversed, and Stubb is Starbuck; and ye\rtwo are all mankind; and Ahab stands alone among the millions of the\rpeopled earth, nor gods nor men his neighbors! Cold, cold—I shiver!—How\rnow? Aloft there! D’ye see him? Sing out for every spout, though he\rspout ten times a second!”\r\rThe day was nearly done; only the hem of his golden robe was rustling.\rSoon, it was almost dark, but the look-out men still remained unset.\r\r“Can’t see the spout now, sir;—too dark”—cried a voice from the air.\r\r“How heading when last seen?”\r\r“As before, sir,—straight to leeward.”\r\r“Good! he will travel slower now ’tis night. Down royals and\rtop-gallant stun-sails, Mr. Starbuck. We must not run over him before\rmorning; he’s making a passage now, and may heave-to a while. Helm\rthere! keep her full before the wind!—Aloft! come down!—Mr. Stubb, send\ra fresh hand to the fore-mast head, and see it manned till\rmorning.”—Then advancing towards the doubloon in the main-mast—“Men,\rthis gold is mine, for I earned it; but I shall let it abide here till\rthe White Whale is dead; and then, whosoever of ye first raises him,\rupon the day he shall be killed, this gold is that man’s; and if on\rthat day I shall again raise him, then, ten times its sum shall be\rdivided among all of ye! Away now!—the deck is thine, sir!”\r\rAnd so saying, he placed himself half way within the scuttle, and\rslouching his hat, stood there till dawn, except when at intervals\rrousing himself to see how the night wore on.\r\r\rCHAPTER 134. The Chase—Second Day.\r\rAt day-break, the three mast-heads were punctually manned afresh.\r\r“D’ye see him?” cried Ahab after allowing a little space for the light\rto spread.\r\r“See nothing, sir.”\r\r“Turn up all hands and make sail! he travels faster than I thought\rfor;—the top-gallant sails!—aye, they should have been kept on her all\rnight. But no matter—’tis but resting for the rush.”\r\rHere be it said, that this pertinacious pursuit of one particular\rwhale, continued through day into night, and through night into day, is\ra thing by no means unprecedented in the South sea fishery. For such is\rthe wonderful skill, prescience of experience, and invincible\rconfidence acquired by some great natural geniuses among the Nantucket\rcommanders; that from the simple observation of a whale when last\rdescried, they will, under certain given circumstances, pretty\raccurately foretell both the direction in which he will continue to\rswim for a time, while out of sight, as well as his probable rate of\rprogression during that period. And, in these cases, somewhat as a\rpilot, when about losing sight of a coast, whose general trending he\rwell knows, and which he desires shortly to return to again, but at\rsome further point; like as this pilot stands by his compass, and takes\rthe precise bearing of the cape at present visible, in order the more\rcertainly to hit aright the remote, unseen headland, eventually to be\rvisited: so does the fisherman, at his compass, with the whale; for\rafter being chased, and diligently marked, through several hours of\rdaylight, then, when night obscures the fish, the creature’s future\rwake through the darkness is almost as established to the sagacious\rmind of the hunter, as the pilot’s coast is to him. So that to this\rhunter’s wondrous skill, the proverbial evanescence of a thing writ in\rwater, a wake, is to all desired purposes well nigh as reliable as the\rsteadfast land. And as the mighty iron Leviathan of the modern railway\ris so familiarly known in its every pace, that, with watches in their\rhands, men time his rate as doctors that of a baby’s pulse; and lightly\rsay of it, the up train or the down train will reach such or such a\rspot, at such or such an hour; even so, almost, there are occasions\rwhen these Nantucketers time that other Leviathan of the deep,\raccording to the observed humor of his speed; and say to themselves, so\rmany hours hence this whale will have gone two hundred miles, will have\rabout reached this or that degree of latitude or longitude. But to\rrender this acuteness at all successful in the end, the wind and the\rsea must be the whaleman’s allies; for of what present avail to the\rbecalmed or windbound mariner is the skill that assures him he is\rexactly ninety-three leagues and a quarter from his port? Inferable\rfrom these statements, are many collateral subtile matters touching the\rchase of whales.\r\rThe ship tore on; leaving such a furrow in the sea as when a\rcannon-ball, missent, becomes a plough-share and turns up the level\rfield.\r\r“By salt and hemp!” cried Stubb, “but this swift motion of the deck\rcreeps up one’s legs and tingles at the heart. This ship and I are two\rbrave fellows!—Ha, ha! Some one take me up, and launch me, spine-wise,\ron the sea,—for by live-oaks! my spine’s a keel. Ha, ha! we go the gait\rthat leaves no dust behind!”\r\r“There she blows—she blows!—she blows!—right ahead!” was now the\rmast-head cry.\r\r“Aye, aye!” cried Stubb, “I knew it—ye can’t escape—blow on and split\ryour spout, O whale! the mad fiend himself is after ye! blow your\rtrump—blister your lungs!—Ahab will dam off your blood, as a miller\rshuts his watergate upon the stream!”\r\rAnd Stubb did but speak out for well nigh all that crew. The frenzies\rof the chase had by this time worked them bubblingly up, like old wine\rworked anew. Whatever pale fears and forebodings some of them might\rhave felt before; these were not only now kept out of sight through the\rgrowing awe of Ahab, but they were broken up, and on all sides routed,\ras timid prairie hares that scatter before the bounding bison. The hand\rof Fate had snatched all their souls; and by the stirring perils of the\rprevious day; the rack of the past night’s suspense; the fixed,\runfearing, blind, reckless way in which their wild craft went plunging\rtowards its flying mark; by all these things, their hearts were bowled\ralong. The wind that made great bellies of their sails, and rushed the\rvessel on by arms invisible as irresistible; this seemed the symbol of\rthat unseen agency which so enslaved them to the race.\r\rThey were one man, not thirty. For as the one ship that held them all;\rthough it was put together of all contrasting things—oak, and maple,\rand pine wood; iron, and pitch, and hemp—yet all these ran into each\rother in the one concrete hull, which shot on its way, both balanced\rand directed by the long central keel; even so, all the individualities\rof the crew, this man’s valor, that man’s fear; guilt and guiltiness,\rall varieties were welded into oneness, and were all directed to that\rfatal goal which Ahab their one lord and keel did point to.\r\rThe rigging lived. The mast-heads, like the tops of tall palms, were\routspreadingly tufted with arms and legs. Clinging to a spar with one\rhand, some reached forth the other with impatient wavings; others,\rshading their eyes from the vivid sunlight, sat far out on the rocking\ryards; all the spars in full bearing of mortals, ready and ripe for\rtheir fate. Ah! how they still strove through that infinite blueness to\rseek out the thing that might destroy them!\r\r“Why sing ye not out for him, if ye see him?” cried Ahab, when, after\rthe lapse of some minutes since the first cry, no more had been heard.\r“Sway me up, men; ye have been deceived; not Moby Dick casts one odd\rjet that way, and then disappears.”\r\rIt was even so; in their headlong eagerness, the men had mistaken some\rother thing for the whale-spout, as the event itself soon proved; for\rhardly had Ahab reached his perch; hardly was the rope belayed to its\rpin on deck, when he struck the key-note to an orchestra, that made the\rair vibrate as with the combined discharges of rifles. The triumphant\rhalloo of thirty buckskin lungs was heard, as—much nearer to the ship\rthan the place of the imaginary jet, less than a mile ahead—Moby Dick\rbodily burst into view! For not by any calm and indolent spoutings; not\rby the peaceable gush of that mystic fountain in his head, did the\rWhite Whale now reveal his vicinity; but by the far more wondrous\rphenomenon of breaching. Rising with his utmost velocity from the\rfurthest depths, the Sperm Whale thus booms his entire bulk into the\rpure element of air, and piling up a mountain of dazzling foam, shows\rhis place to the distance of seven miles and more. In those moments,\rthe torn, enraged waves he shakes off, seem his mane; in some cases,\rthis breaching is his act of defiance.\r\r“There she breaches! there she breaches!” was the cry, as in his\rimmeasurable bravadoes the White Whale tossed himself salmon-like to\rHeaven. So suddenly seen in the blue plain of the sea, and relieved\ragainst the still bluer margin of the sky, the spray that he raised,\rfor the moment, intolerably glittered and glared like a glacier; and\rstood there gradually fading and fading away from its first sparkling\rintensity, to the dim mistiness of an advancing shower in a vale.\r\r“Aye, breach your last to the sun, Moby Dick!” cried Ahab, “thy hour\rand thy harpoon are at hand!—Down! down all of ye, but one man at the\rfore. The boats!—stand by!”\r\rUnmindful of the tedious rope-ladders of the shrouds, the men, like\rshooting stars, slid to the deck, by the isolated backstays and\rhalyards; while Ahab, less dartingly, but still rapidly was dropped\rfrom his perch.\r\r“Lower away,” he cried, so soon as he had reached his boat—a spare one,\rrigged the afternoon previous. “Mr. Starbuck, the ship is thine—keep\raway from the boats, but keep near them. Lower, all!”\r\rAs if to strike a quick terror into them, by this time being the first\rassailant himself, Moby Dick had turned, and was now coming for the\rthree crews. Ahab’s boat was central; and cheering his men, he told\rthem he would take the whale head-and-head,—that is, pull straight up\rto his forehead,—a not uncommon thing; for when within a certain limit,\rsuch a course excludes the coming onset from the whale’s sidelong\rvision. But ere that close limit was gained, and while yet all three\rboats were plain as the ship’s three masts to his eye; the White Whale\rchurning himself into furious speed, almost in an instant as it were,\rrushing among the boats with open jaws, and a lashing tail, offered\rappalling battle on every side; and heedless of the irons darted at him\rfrom every boat, seemed only intent on annihilating each separate plank\rof which those boats were made. But skilfully manœuvred, incessantly\rwheeling like trained chargers in the field; the boats for a while\reluded him; though, at times, but by a plank’s breadth; while all the\rtime, Ahab’s unearthly slogan tore every other cry but his to shreds.\r\rBut at last in his untraceable evolutions, the White Whale so crossed\rand recrossed, and in a thousand ways entangled the slack of the three\rlines now fast to him, that they foreshortened, and, of themselves,\rwarped the devoted boats towards the planted irons in him; though now\rfor a moment the whale drew aside a little, as if to rally for a more\rtremendous charge. Seizing that opportunity, Ahab first paid out more\rline: and then was rapidly hauling and jerking in upon it again—hoping\rthat way to disencumber it of some snarls—when lo!—a sight more savage\rthan the embattled teeth of sharks!\r\rCaught and twisted—corkscrewed in the mazes of the line, loose harpoons\rand lances, with all their bristling barbs and points, came flashing\rand dripping up to the chocks in the bows of Ahab’s boat. Only one\rthing could be done. Seizing the boat-knife, he critically reached\rwithin—through—and then, without—the rays of steel; dragged in the line\rbeyond, passed it, inboard, to the bowsman, and then, twice sundering\rthe rope near the chocks—dropped the intercepted fagot of steel into\rthe sea; and was all fast again. That instant, the White Whale made a\rsudden rush among the remaining tangles of the other lines; by so\rdoing, irresistibly dragged the more involved boats of Stubb and Flask\rtowards his flukes; dashed them together like two rolling husks on a\rsurf-beaten beach, and then, diving down into the sea, disappeared in a\rboiling maelstrom, in which, for a space, the odorous cedar chips of\rthe wrecks danced round and round, like the grated nutmeg in a swiftly\rstirred bowl of punch.\r\rWhile the two crews were yet circling in the waters, reaching out after\rthe revolving line-tubs, oars, and other floating furniture, while\raslope little Flask bobbed up and down like an empty vial, twitching\rhis legs upwards to escape the dreaded jaws of sharks; and Stubb was\rlustily singing out for some one to ladle him up; and while the old\rman’s line—now parting—admitted of his pulling into the creamy pool to\rrescue whom he could;—in that wild simultaneousness of a thousand\rconcreted perils,—Ahab’s yet unstricken boat seemed drawn up towards\rHeaven by invisible wires,—as, arrow-like, shooting perpendicularly\rfrom the sea, the White Whale dashed his broad forehead against its\rbottom, and sent it, turning over and over, into the air; till it fell\ragain—gunwale downwards—and Ahab and his men struggled out from under\rit, like seals from a sea-side cave.\r\rThe first uprising momentum of the whale—modifying its direction as he\rstruck the surface—involuntarily launched him along it, to a little\rdistance from the centre of the destruction he had made; and with his\rback to it, he now lay for a moment slowly feeling with his flukes from\rside to side; and whenever a stray oar, bit of plank, the least chip or\rcrumb of the boats touched his skin, his tail swiftly drew back, and\rcame sideways smiting the sea. But soon, as if satisfied that his work\rfor that time was done, he pushed his pleated forehead through the\rocean, and trailing after him the intertangled lines, continued his\rleeward way at a traveller’s methodic pace.\r\rAs before, the attentive ship having descried the whole fight, again\rcame bearing down to the rescue, and dropping a boat, picked up the\rfloating mariners, tubs, oars, and whatever else could be caught at,\rand safely landed them on her decks. Some sprained shoulders, wrists,\rand ankles; livid contusions; wrenched harpoons and lances;\rinextricable intricacies of rope; shattered oars and planks; all these\rwere there; but no fatal or even serious ill seemed to have befallen\rany one. As with Fedallah the day before, so Ahab was now found grimly\rclinging to his boat’s broken half, which afforded a comparatively easy\rfloat; nor did it so exhaust him as the previous day’s mishap.\r\rBut when he was helped to the deck, all eyes were fastened upon him; as\rinstead of standing by himself he still half-hung upon the shoulder of\rStarbuck, who had thus far been the foremost to assist him. His ivory\rleg had been snapped off, leaving but one short sharp splinter.\r\r“Aye, aye, Starbuck, ’tis sweet to lean sometimes, be the leaner who he\rwill; and would old Ahab had leaned oftener than he has.”\r\r“The ferrule has not stood, sir,” said the carpenter, now coming up; “I\rput good work into that leg.”\r\r“But no bones broken, sir, I hope,” said Stubb with true concern.\r\r“Aye! and all splintered to pieces, Stubb!—d’ye see it.—But even with a\rbroken bone, old Ahab is untouched; and I account no living bone of\rmine one jot more me, than this dead one that’s lost. Nor white whale,\rnor man, nor fiend, can so much as graze old Ahab in his own proper and\rinaccessible being. Can any lead touch yonder floor, any mast scrape\ryonder roof?—Aloft there! which way?”\r\r“Dead to leeward, sir.”\r\r“Up helm, then; pile on the sail again, ship keepers! down the rest of\rthe spare boats and rig them—Mr. Starbuck away, and muster the boat’s\rcrews.”\r\r“Let me first help thee towards the bulwarks, sir.”\r\r“Oh, oh, oh! how this splinter gores me now! Accursed fate! that the\runconquerable captain in the soul should have such a craven mate!”\r\r“Sir?”\r\r“My body, man, not thee. Give me something for a cane—there, that\rshivered lance will do. Muster the men. Surely I have not seen him yet.\rBy heaven it cannot be!—missing?—quick! call them all.”\r\rThe old man’s hinted thought was true. Upon mustering the company, the\rParsee was not there.\r\r“The Parsee!” cried Stubb—“he must have been caught in——”\r\r“The black vomit wrench thee!—run all of ye above, alow, cabin,\rforecastle—find him—not gone—not gone!”\r\rBut quickly they returned to him with the tidings that the Parsee was\rnowhere to be found.\r\r“Aye, sir,” said Stubb—“caught among the tangles of your line—I thought\rI saw him dragging under.”\r\r“_My_ line! _my_ line? Gone?—gone? What means that little word?—What\rdeath-knell rings in it, that old Ahab shakes as if he were the belfry.\rThe harpoon, too!—toss over the litter there,—d’ye see it?—the forged\riron, men, the white whale’s—no, no, no,—blistered fool! this hand did\rdart it!—’tis in the fish!—Aloft there! Keep him nailed—Quick!—all\rhands to the rigging of the boats—collect the oars—harpooneers! the\rirons, the irons!—hoist the royals higher—a pull on all the\rsheets!—helm there! steady, steady for your life! I’ll ten times girdle\rthe unmeasured globe; yea and dive straight through it, but I’ll slay\rhim yet!”\r\r“Great God! but for one single instant show thyself,” cried Starbuck;\r“never, never wilt thou capture him, old man—In Jesus’ name no more of\rthis, that’s worse than devil’s madness. Two days chased; twice stove\rto splinters; thy very leg once more snatched from under thee; thy evil\rshadow gone—all good angels mobbing thee with warnings:—what more\rwouldst thou have?—Shall we keep chasing this murderous fish till he\rswamps the last man? Shall we be dragged by him to the bottom of the\rsea? Shall we be towed by him to the infernal world? Oh, oh,—Impiety\rand blasphemy to hunt him more!”\r\r“Starbuck, of late I’ve felt strangely moved to thee; ever since that\rhour we both saw—thou know’st what, in one another’s eyes. But in this\rmatter of the whale, be the front of thy face to me as the palm of this\rhand—a lipless, unfeatured blank. Ahab is for ever Ahab, man. This\rwhole act’s immutably decreed. ’Twas rehearsed by thee and me a billion\ryears before this ocean rolled. Fool! I am the Fates’ lieutenant; I act\runder orders. Look thou, underling! that thou obeyest mine.—Stand round\rme, men. Ye see an old man cut down to the stump; leaning on a shivered\rlance; propped up on a lonely foot. ’Tis Ahab—his body’s part; but\rAhab’s soul’s a centipede, that moves upon a hundred legs. I feel\rstrained, half stranded, as ropes that tow dismasted frigates in a\rgale; and I may look so. But ere I break, ye’ll hear me crack; and till\rye hear _that_, know that Ahab’s hawser tows his purpose yet. Believe\rye, men, in the things called omens? Then laugh aloud, and cry encore!\rFor ere they drown, drowning things will twice rise to the surface;\rthen rise again, to sink for evermore. So with Moby Dick—two days he’s\rfloated—tomorrow will be the third. Aye, men, he’ll rise once more,—but\ronly to spout his last! D’ye feel brave men, brave?”\r\r“As fearless fire,” cried Stubb.\r\r“And as mechanical,” muttered Ahab. Then as the men went forward, he\rmuttered on: “The things called omens! And yesterday I talked the same\rto Starbuck there, concerning my broken boat. Oh! how valiantly I seek\rto drive out of others’ hearts what’s clinched so fast in mine!—The\rParsee—the Parsee!—gone, gone? and he was to go before:—but still was\rto be seen again ere I could perish—How’s that?—There’s a riddle now\rmight baffle all the lawyers backed by the ghosts of the whole line of\rjudges:—like a hawk’s beak it pecks my brain. _I’ll_, _I’ll_ solve it,\rthough!”\r\rWhen dusk descended, the whale was still in sight to leeward.\r\rSo once more the sail was shortened, and everything passed nearly as on\rthe previous night; only, the sound of hammers, and the hum of the\rgrindstone was heard till nearly daylight, as the men toiled by\rlanterns in the complete and careful rigging of the spare boats and\rsharpening their fresh weapons for the morrow. Meantime, of the broken\rkeel of Ahab’s wrecked craft the carpenter made him another leg; while\rstill as on the night before, slouched Ahab stood fixed within his\rscuttle; his hid, heliotrope glance anticipatingly gone backward on its\rdial; sat due eastward for the earliest sun.\r\r\rCHAPTER 135. The Chase.—Third Day.\r\rThe morning of the third day dawned fair and fresh, and once more the\rsolitary night-man at the fore-mast-head was relieved by crowds of the\rdaylight look-outs, who dotted every mast and almost every spar.\r\r“D’ye see him?” cried Ahab; but the whale was not yet in sight.\r\r“In his infallible wake, though; but follow that wake, that’s all. Helm\rthere; steady, as thou goest, and hast been going. What a lovely day\ragain! were it a new-made world, and made for a summer-house to the\rangels, and this morning the first of its throwing open to them, a\rfairer day could not dawn upon that world. Here’s food for thought, had\rAhab time to think; but Ahab never thinks; he only feels, feels, feels;\r_that’s_ tingling enough for mortal man! to think’s audacity. God only\rhas that right and privilege. Thinking is, or ought to be, a coolness\rand a calmness; and our poor hearts throb, and our poor brains beat too\rmuch for that. And yet, I’ve sometimes thought my brain was very\rcalm—frozen calm, this old skull cracks so, like a glass in which the\rcontents turned to ice, and shiver it. And still this hair is growing\rnow; this moment growing, and heat must breed it; but no, it’s like\rthat sort of common grass that will grow anywhere, between the earthy\rclefts of Greenland ice or in Vesuvius lava. How the wild winds blow\rit; they whip it about me as the torn shreds of split sails lash the\rtossed ship they cling to. A vile wind that has no doubt blown ere this\rthrough prison corridors and cells, and wards of hospitals, and\rventilated them, and now comes blowing hither as innocent as fleeces.\rOut upon it!—it’s tainted. Were I the wind, I’d blow no more on such a\rwicked, miserable world. I’d crawl somewhere to a cave, and slink\rthere. And yet, ’tis a noble and heroic thing, the wind! who ever\rconquered it? In every fight it has the last and bitterest blow. Run\rtilting at it, and you but run through it. Ha! a coward wind that\rstrikes stark naked men, but will not stand to receive a single blow.\rEven Ahab is a braver thing—a nobler thing than _that_. Would now the\rwind but had a body; but all the things that most exasperate and\routrage mortal man, all these things are bodiless, but only bodiless as\robjects, not as agents. There’s a most special, a most cunning, oh, a\rmost malicious difference! And yet, I say again, and swear it now, that\rthere’s something all glorious and gracious in the wind. These warm\rTrade Winds, at least, that in the clear heavens blow straight on, in\rstrong and steadfast, vigorous mildness; and veer not from their mark,\rhowever the baser currents of the sea may turn and tack, and mightiest\rMississippies of the land swift and swerve about, uncertain where to go\rat last. And by the eternal Poles! these same Trades that so directly\rblow my good ship on; these Trades, or something like them—something so\runchangeable, and full as strong, blow my keeled soul along! To it!\rAloft there! What d’ye see?”\r\r“Nothing, sir.”\r\r“Nothing! and noon at hand! The doubloon goes a-begging! See the sun!\rAye, aye, it must be so. I’ve oversailed him. How, got the start? Aye,\rhe’s chasing _me_ now; not I, _him_—that’s bad; I might have known it,\rtoo. Fool! the lines—the harpoons he’s towing. Aye, aye, I have run him\rby last night. About! about! Come down, all of ye, but the regular look\routs! Man the braces!”\r\rSteering as she had done, the wind had been somewhat on the Pequod’s\rquarter, so that now being pointed in the reverse direction, the braced\rship sailed hard upon the breeze as she rechurned the cream in her own\rwhite wake.\r\r“Against the wind he now steers for the open jaw,” murmured Starbuck to\rhimself, as he coiled the new-hauled main-brace upon the rail. “God\rkeep us, but already my bones feel damp within me, and from the inside\rwet my flesh. I misdoubt me that I disobey my God in obeying him!”\r\r“Stand by to sway me up!” cried Ahab, advancing to the hempen basket.\r“We should meet him soon.”\r\r“Aye, aye, sir,” and straightway Starbuck did Ahab’s bidding, and once\rmore Ahab swung on high.\r\rA whole hour now passed; gold-beaten out to ages. Time itself now held\rlong breaths with keen suspense. But at last, some three points off the\rweather bow, Ahab descried the spout again, and instantly from the\rthree mast-heads three shrieks went up as if the tongues of fire had\rvoiced it.\r\r“Forehead to forehead I meet thee, this third time, Moby Dick! On deck\rthere!—brace sharper up; crowd her into the wind’s eye. He’s too far\roff to lower yet, Mr. Starbuck. The sails shake! Stand over that\rhelmsman with a top-maul! So, so; he travels fast, and I must down. But\rlet me have one more good round look aloft here at the sea; there’s\rtime for that. An old, old sight, and yet somehow so young; aye, and\rnot changed a wink since I first saw it, a boy, from the sand-hills of\rNantucket! The same!—the same!—the same to Noah as to me. There’s a\rsoft shower to leeward. Such lovely leewardings! They must lead\rsomewhere—to something else than common land, more palmy than the\rpalms. Leeward! the white whale goes that way; look to windward, then;\rthe better if the bitterer quarter. But good bye, good bye, old\rmast-head! What’s this?—green? aye, tiny mosses in these warped cracks.\rNo such green weather stains on Ahab’s head! There’s the difference now\rbetween man’s old age and matter’s. But aye, old mast, we both grow old\rtogether; sound in our hulls, though, are we not, my ship? Aye, minus a\rleg, that’s all. By heaven this dead wood has the better of my live\rflesh every way. I can’t compare with it; and I’ve known some ships\rmade of dead trees outlast the lives of men made of the most vital\rstuff of vital fathers. What’s that he said? he should still go before\rme, my pilot; and yet to be seen again? But where? Will I have eyes at\rthe bottom of the sea, supposing I descend those endless stairs? and\rall night I’ve been sailing from him, wherever he did sink to. Aye,\raye, like many more thou told’st direful truth as touching thyself, O\rParsee; but, Ahab, there thy shot fell short. Good-bye, mast-head—keep\ra good eye upon the whale, the while I’m gone. We’ll talk to-morrow,\rnay, to-night, when the white whale lies down there, tied by head and\rtail.”\r\rHe gave the word; and still gazing round him, was steadily lowered\rthrough the cloven blue air to the deck.\r\rIn due time the boats were lowered; but as standing in his shallop’s\rstern, Ahab just hovered upon the point of the descent, he waved to the\rmate,—who held one of the tackle-ropes on deck—and bade him pause.\r\r“Starbuck!”\r\r“Sir?”\r\r“For the third time my soul’s ship starts upon this voyage, Starbuck.”\r\r“Aye, sir, thou wilt have it so.”\r\r“Some ships sail from their ports, and ever afterwards are missing,\rStarbuck!”\r\r“Truth, sir: saddest truth.”\r\r“Some men die at ebb tide; some at low water; some at the full of the\rflood;—and I feel now like a billow that’s all one crested comb,\rStarbuck. I am old;—shake hands with me, man.”\r\rTheir hands met; their eyes fastened; Starbuck’s tears the glue.\r\r“Oh, my captain, my captain!—noble heart—go not—go not!—see, it’s a\rbrave man that weeps; how great the agony of the persuasion then!”\r\r“Lower away!”—cried Ahab, tossing the mate’s arm from him. “Stand by\rthe crew!”\r\rIn an instant the boat was pulling round close under the stern.\r\r“The sharks! the sharks!” cried a voice from the low cabin-window\rthere; “O master, my master, come back!”\r\rBut Ahab heard nothing; for his own voice was high-lifted then; and the\rboat leaped on.\r\rYet the voice spake true; for scarce had he pushed from the ship, when\rnumbers of sharks, seemingly rising from out the dark waters beneath\rthe hull, maliciously snapped at the blades of the oars, every time\rthey dipped in the water; and in this way accompanied the boat with\rtheir bites. It is a thing not uncommonly happening to the whale-boats\rin those swarming seas; the sharks at times apparently following them\rin the same prescient way that vultures hover over the banners of\rmarching regiments in the east. But these were the first sharks that\rhad been observed by the Pequod since the White Whale had been first\rdescried; and whether it was that Ahab’s crew were all such\rtiger-yellow barbarians, and therefore their flesh more musky to the\rsenses of the sharks—a matter sometimes well known to affect\rthem,—however it was, they seemed to follow that one boat without\rmolesting the others.\r\r“Heart of wrought steel!” murmured Starbuck gazing over the side, and\rfollowing with his eyes the receding boat—“canst thou yet ring boldly\rto that sight?—lowering thy keel among ravening sharks, and followed by\rthem, open-mouthed to the chase; and this the critical third day?—For\rwhen three days flow together in one continuous intense pursuit; be\rsure the first is the morning, the second the noon, and the third the\revening and the end of that thing—be that end what it may. Oh! my God!\rwhat is this that shoots through me, and leaves me so deadly calm, yet\rexpectant,—fixed at the top of a shudder! Future things swim before me,\ras in empty outlines and skeletons; all the past is somehow grown dim.\rMary, girl! thou fadest in pale glories behind me; boy! I seem to see\rbut thy eyes grown wondrous blue. Strangest problems of life seem\rclearing; but clouds sweep between—Is my journey’s end coming? My legs\rfeel faint; like his who has footed it all day. Feel thy heart,—beats\rit yet? Stir thyself, Starbuck!—stave it off—move, move! speak\raloud!—Mast-head there! See ye my boy’s hand on the hill?—Crazed;—aloft\rthere!—keep thy keenest eye upon the boats:—mark well the whale!—Ho!\ragain!—drive off that hawk! see! he pecks—he tears the vane”—pointing\rto the red flag flying at the main-truck—“Ha! he soars away with\rit!—Where’s the old man now? see’st thou that sight, oh Ahab!—shudder,\rshudder!”\r\rThe boats had not gone very far, when by a signal from the mast-heads—a\rdownward pointed arm, Ahab knew that the whale had sounded; but\rintending to be near him at the next rising, he held on his way a\rlittle sideways from the vessel; the becharmed crew maintaining the\rprofoundest silence, as the head-beat waves hammered and hammered\ragainst the opposing bow.\r\r“Drive, drive in your nails, oh ye waves! to their uttermost heads\rdrive them in! ye but strike a thing without a lid; and no coffin and\rno hearse can be mine:—and hemp only can kill me! Ha! ha!”\r\rSuddenly the waters around them slowly swelled in broad circles; then\rquickly upheaved, as if sideways sliding from a submerged berg of ice,\rswiftly rising to the surface. A low rumbling sound was heard; a\rsubterraneous hum; and then all held their breaths; as bedraggled with\rtrailing ropes, and harpoons, and lances, a vast form shot lengthwise,\rbut obliquely from the sea. Shrouded in a thin drooping veil of mist,\rit hovered for a moment in the rainbowed air; and then fell swamping\rback into the deep. Crushed thirty feet upwards, the waters flashed for\ran instant like heaps of fountains, then brokenly sank in a shower of\rflakes, leaving the circling surface creamed like new milk round the\rmarble trunk of the whale.\r\r“Give way!” cried Ahab to the oarsmen, and the boats darted forward to\rthe attack; but maddened by yesterday’s fresh irons that corroded in\rhim, Moby Dick seemed combinedly possessed by all the angels that fell\rfrom heaven. The wide tiers of welded tendons overspreading his broad\rwhite forehead, beneath the transparent skin, looked knitted together;\ras head on, he came churning his tail among the boats; and once more\rflailed them apart; spilling out the irons and lances from the two\rmates’ boats, and dashing in one side of the upper part of their bows,\rbut leaving Ahab’s almost without a scar.\r\rWhile Daggoo and Queequeg were stopping the strained planks; and as the\rwhale swimming out from them, turned, and showed one entire flank as he\rshot by them again; at that moment a quick cry went up. Lashed round\rand round to the fish’s back; pinioned in the turns upon turns in\rwhich, during the past night, the whale had reeled the involutions of\rthe lines around him, the half torn body of the Parsee was seen; his\rsable raiment frayed to shreds; his distended eyes turned full upon old\rAhab.\r\rThe harpoon dropped from his hand.\r\r“Befooled, befooled!”—drawing in a long lean breath—“Aye, Parsee! I see\rthee again.—Aye, and thou goest before; and this, _this_ then is the\rhearse that thou didst promise. But I hold thee to the last letter of\rthy word. Where is the second hearse? Away, mates, to the ship! those\rboats are useless now; repair them if ye can in time, and return to me;\rif not, Ahab is enough to die—Down, men! the first thing that but\roffers to jump from this boat I stand in, that thing I harpoon. Ye are\rnot other men, but my arms and my legs; and so obey me.—Where’s the\rwhale? gone down again?”\r\rBut he looked too nigh the boat; for as if bent upon escaping with the\rcorpse he bore, and as if the particular place of the last encounter\rhad been but a stage in his leeward voyage, Moby Dick was now again\rsteadily swimming forward; and had almost passed the ship,—which thus\rfar had been sailing in the contrary direction to him, though for the\rpresent her headway had been stopped. He seemed swimming with his\rutmost velocity, and now only intent upon pursuing his own straight\rpath in the sea.\r\r“Oh! Ahab,” cried Starbuck, “not too late is it, even now, the third\rday, to desist. See! Moby Dick seeks thee not. It is thou, thou, that\rmadly seekest him!”\r\rSetting sail to the rising wind, the lonely boat was swiftly impelled\rto leeward, by both oars and canvas. And at last when Ahab was sliding\rby the vessel, so near as plainly to distinguish Starbuck’s face as he\rleaned over the rail, he hailed him to turn the vessel about, and\rfollow him, not too swiftly, at a judicious interval. Glancing upwards,\rhe saw Tashtego, Queequeg, and Daggoo, eagerly mounting to the three\rmast-heads; while the oarsmen were rocking in the two staved boats\rwhich had but just been hoisted to the side, and were busily at work in\rrepairing them. One after the other, through the port-holes, as he\rsped, he also caught flying glimpses of Stubb and Flask, busying\rthemselves on deck among bundles of new irons and lances. As he saw all\rthis; as he heard the hammers in the broken boats; far other hammers\rseemed driving a nail into his heart. But he rallied. And now marking\rthat the vane or flag was gone from the main-mast-head, he shouted to\rTashtego, who had just gained that perch, to descend again for another\rflag, and a hammer and nails, and so nail it to the mast.\r\rWhether fagged by the three days’ running chase, and the resistance to\rhis swimming in the knotted hamper he bore; or whether it was some\rlatent deceitfulness and malice in him: whichever was true, the White\rWhale’s way now began to abate, as it seemed, from the boat so rapidly\rnearing him once more; though indeed the whale’s last start had not\rbeen so long a one as before. And still as Ahab glided over the waves\rthe unpitying sharks accompanied him; and so pertinaciously stuck to\rthe boat; and so continually bit at the plying oars, that the blades\rbecame jagged and crunched, and left small splinters in the sea, at\ralmost every dip.\r\r“Heed them not! those teeth but give new rowlocks to your oars. Pull\ron! ’tis the better rest, the shark’s jaw than the yielding water.”\r\r“But at every bite, sir, the thin blades grow smaller and smaller!”\r\r“They will last long enough! pull on!—But who can tell”—he\rmuttered—“whether these sharks swim to feast on the whale or on\rAhab?—But pull on! Aye, all alive, now—we near him. The helm! take the\rhelm! let me pass,”—and so saying two of the oarsmen helped him forward\rto the bows of the still flying boat.\r\rAt length as the craft was cast to one side, and ran ranging along with\rthe White Whale’s flank, he seemed strangely oblivious of its\radvance—as the whale sometimes will—and Ahab was fairly within the\rsmoky mountain mist, which, thrown off from the whale’s spout, curled\rround his great, Monadnock hump; he was even thus close to him; when,\rwith body arched back, and both arms lengthwise high-lifted to the\rpoise, he darted his fierce iron, and his far fiercer curse into the\rhated whale. As both steel and curse sank to the socket, as if sucked\rinto a morass, Moby Dick sideways writhed; spasmodically rolled his\rnigh flank against the bow, and, without staving a hole in it, so\rsuddenly canted the boat over, that had it not been for the elevated\rpart of the gunwale to which he then clung, Ahab would once more have\rbeen tossed into the sea. As it was, three of the oarsmen—who foreknew\rnot the precise instant of the dart, and were therefore unprepared for\rits effects—these were flung out; but so fell, that, in an instant two\rof them clutched the gunwale again, and rising to its level on a\rcombing wave, hurled themselves bodily inboard again; the third man\rhelplessly dropping astern, but still afloat and swimming.\r\rAlmost simultaneously, with a mighty volition of ungraduated,\rinstantaneous swiftness, the White Whale darted through the weltering\rsea. But when Ahab cried out to the steersman to take new turns with\rthe line, and hold it so; and commanded the crew to turn round on their\rseats, and tow the boat up to the mark; the moment the treacherous line\rfelt that double strain and tug, it snapped in the empty air!\r\r“What breaks in me? Some sinew cracks!—’tis whole again; oars! oars!\rBurst in upon him!”\r\rHearing the tremendous rush of the sea-crashing boat, the whale wheeled\rround to present his blank forehead at bay; but in that evolution,\rcatching sight of the nearing black hull of the ship; seemingly seeing\rin it the source of all his persecutions; bethinking it—it may be—a\rlarger and nobler foe; of a sudden, he bore down upon its advancing\rprow, smiting his jaws amid fiery showers of foam.\r\rAhab staggered; his hand smote his forehead. “I grow blind; hands!\rstretch out before me that I may yet grope my way. Is’t night?”\r\r“The whale! The ship!” cried the cringing oarsmen.\r\r“Oars! oars! Slope downwards to thy depths, O sea, that ere it be for\rever too late, Ahab may slide this last, last time upon his mark! I\rsee: the ship! the ship! Dash on, my men! Will ye not save my ship?”\r\rBut as the oarsmen violently forced their boat through the\rsledge-hammering seas, the before whale-smitten bow-ends of two planks\rburst through, and in an instant almost, the temporarily disabled boat\rlay nearly level with the waves; its half-wading, splashing crew,\rtrying hard to stop the gap and bale out the pouring water.\r\rMeantime, for that one beholding instant, Tashtego’s mast-head hammer\rremained suspended in his hand; and the red flag, half-wrapping him as\rwith a plaid, then streamed itself straight out from him, as his own\rforward-flowing heart; while Starbuck and Stubb, standing upon the\rbowsprit beneath, caught sight of the down-coming monster just as soon\ras he.\r\r“The whale, the whale! Up helm, up helm! Oh, all ye sweet powers of\rair, now hug me close! Let not Starbuck die, if die he must, in a\rwoman’s fainting fit. Up helm, I say—ye fools, the jaw! the jaw! Is\rthis the end of all my bursting prayers? all my life-long fidelities?\rOh, Ahab, Ahab, lo, thy work. Steady! helmsman, steady. Nay, nay! Up\rhelm again! He turns to meet us! Oh, his unappeasable brow drives on\rtowards one, whose duty tells him he cannot depart. My God, stand by me\rnow!”\r\r“Stand not by me, but stand under me, whoever you are that will now\rhelp Stubb; for Stubb, too, sticks here. I grin at thee, thou grinning\rwhale! Who ever helped Stubb, or kept Stubb awake, but Stubb’s own\runwinking eye? And now poor Stubb goes to bed upon a mattrass that is\rall too soft; would it were stuffed with brushwood! I grin at thee,\rthou grinning whale! Look ye, sun, moon, and stars! I call ye assassins\rof as good a fellow as ever spouted up his ghost. For all that, I would\ryet ring glasses with ye, would ye but hand the cup! Oh, oh! oh, oh!\rthou grinning whale, but there’ll be plenty of gulping soon! Why fly ye\rnot, O Ahab! For me, off shoes and jacket to it; let Stubb die in his\rdrawers! A most mouldy and over salted death, though;—cherries!\rcherries! cherries! Oh, Flask, for one red cherry ere we die!”\r\r“Cherries? I only wish that we were where they grow. Oh, Stubb, I hope\rmy poor mother’s drawn my part-pay ere this; if not, few coppers will\rnow come to her, for the voyage is up.”\r\rFrom the ship’s bows, nearly all the seamen now hung inactive; hammers,\rbits of plank, lances, and harpoons, mechanically retained in their\rhands, just as they had darted from their various employments; all\rtheir enchanted eyes intent upon the whale, which from side to side\rstrangely vibrating his predestinating head, sent a broad band of\roverspreading semicircular foam before him as he rushed. Retribution,\rswift vengeance, eternal malice were in his whole aspect, and spite of\rall that mortal man could do, the solid white buttress of his forehead\rsmote the ship’s starboard bow, till men and timbers reeled. Some fell\rflat upon their faces. Like dislodged trucks, the heads of the\rharpooneers aloft shook on their bull-like necks. Through the breach,\rthey heard the waters pour, as mountain torrents down a flume.\r\r“The ship! The hearse!—the second hearse!” cried Ahab from the boat;\r“its wood could only be American!”\r\rDiving beneath the settling ship, the whale ran quivering along its\rkeel; but turning under water, swiftly shot to the surface again, far\roff the other bow, but within a few yards of Ahab’s boat, where, for a\rtime, he lay quiescent.\r\r“I turn my body from the sun. What ho, Tashtego! let me hear thy\rhammer. Oh! ye three unsurrendered spires of mine; thou uncracked keel;\rand only god-bullied hull; thou firm deck, and haughty helm, and\rPole-pointed prow,—death-glorious ship! must ye then perish, and\rwithout me? Am I cut off from the last fond pride of meanest\rshipwrecked captains? Oh, lonely death on lonely life! Oh, now I feel\rmy topmost greatness lies in my topmost grief. Ho, ho! from all your\rfurthest bounds, pour ye now in, ye bold billows of my whole foregone\rlife, and top this one piled comber of my death! Towards thee I roll,\rthou all-destroying but unconquering whale; to the last I grapple with\rthee; from hell’s heart I stab at thee; for hate’s sake I spit my last\rbreath at thee. Sink all coffins and all hearses to one common pool!\rand since neither can be mine, let me then tow to pieces, while still\rchasing thee, though tied to thee, thou damned whale! _Thus_, I give up\rthe spear!”\r\rThe harpoon was darted; the stricken whale flew forward; with igniting\rvelocity the line ran through the grooves;—ran foul. Ahab stooped to\rclear it; he did clear it; but the flying turn caught him round the\rneck, and voicelessly as Turkish mutes bowstring their victim, he was\rshot out of the boat, ere the crew knew he was gone. Next instant, the\rheavy eye-splice in the rope’s final end flew out of the stark-empty\rtub, knocked down an oarsman, and smiting the sea, disappeared in its\rdepths.\r\rFor an instant, the tranced boat’s crew stood still; then turned. “The\rship? Great God, where is the ship?” Soon they through dim, bewildering\rmediums saw her sidelong fading phantom, as in the gaseous Fata\rMorgana; only the uppermost masts out of water; while fixed by\rinfatuation, or fidelity, or fate, to their once lofty perches, the\rpagan harpooneers still maintained their sinking lookouts on the sea.\rAnd now, concentric circles seized the lone boat itself, and all its\rcrew, and each floating oar, and every lance-pole, and spinning,\ranimate and inanimate, all round and round in one vortex, carried the\rsmallest chip of the Pequod out of sight.\r\rBut as the last whelmings intermixingly poured themselves over the\rsunken head of the Indian at the mainmast, leaving a few inches of the\rerect spar yet visible, together with long streaming yards of the flag,\rwhich calmly undulated, with ironical coincidings, over the destroying\rbillows they almost touched;—at that instant, a red arm and a hammer\rhovered backwardly uplifted in the open air, in the act of nailing the\rflag faster and yet faster to the subsiding spar. A sky-hawk that\rtauntingly had followed the main-truck downwards from its natural home\ramong the stars, pecking at the flag, and incommoding Tashtego there;\rthis bird now chanced to intercept its broad fluttering wing between\rthe hammer and the wood; and simultaneously feeling that etherial\rthrill, the submerged savage beneath, in his death-gasp, kept his\rhammer frozen there; and so the bird of heaven, with archangelic\rshrieks, and his imperial beak thrust upwards, and his whole captive\rform folded in the flag of Ahab, went down with his ship, which, like\rSatan, would not sink to hell till she had dragged a living part of\rheaven along with her, and helmeted herself with it.\r\rNow small fowls flew screaming over the yet yawning gulf; a sullen\rwhite surf beat against its steep sides; then all collapsed, and the\rgreat shroud of the sea rolled on as it rolled five thousand years ago.\r\r\rEpilogue\r\r“AND I ONLY AM ESCAPED ALONE TO TELL THEE” Job.\r\rThe drama’s done. Why then here does any one step forth?—Because one\rdid survive the wreck.\r\rIt so chanced, that after the Parsee’s disappearance, I was he whom the\rFates ordained to take the place of Ahab’s bowsman, when that bowsman\rassumed the vacant post; the same, who, when on the last day the three\rmen were tossed from out of the rocking boat, was dropped astern. So,\rfloating on the margin of the ensuing scene, and in full sight of it,\rwhen the halfspent suction of the sunk ship reached me, I was then, but\rslowly, drawn towards the closing vortex. When I reached it, it had\rsubsided to a creamy pool. Round and round, then, and ever contracting\rtowards the button-like black bubble at the axis of that slowly\rwheeling circle, like another Ixion I did revolve. Till, gaining that\rvital centre, the black bubble upward burst; and now, liberated by\rreason of its cunning spring, and, owing to its great buoyancy, rising\rwith great force, the coffin life-buoy shot lengthwise from the sea,\rfell over, and floated by my side. Buoyed up by that coffin, for almost\rone whole day and night, I floated on a soft and dirgelike main. The\runharming sharks, they glided by as if with padlocks on their mouths;\rthe savage sea-hawks sailed with sheathed beaks. On the second day, a\rsail drew near, nearer, and picked me up at last. It was the\rdevious-cruising Rachel, that in her retracing search after her missing\rchildren, only found another orphan.\r\r\r\r\r*** END OF THE PROJECT GUTENBERG EBOOK MOBY DICK; OR, THE WHALE ***\r\r\r    \r\rUpdated editions will replace the previous one—the old editions will\rbe renamed.\r\rCreating the works from print editions not protected by U.S. copyright\rlaw means that no one owns a United States copyright in these works,\rso the Foundation (and you!) can copy and distribute it in the United\rStates without permission and without paying copyright\rroyalties. Special rules, set forth in the General Terms of Use part\rof this license, apply to copying and distributing Project\rGutenberg™ electronic works to protect the PROJECT GUTENBERG™\rconcept and trademark. Project Gutenberg is a registered trademark,\rand may not be used if you charge for an eBook, except by following\rthe terms of the trademark license, including paying royalties for use\rof the Project Gutenberg trademark. If you do not charge anything for\rcopies of this eBook, complying with the trademark license is very\reasy. You may use this eBook for nearly any purpose such as creation\rof derivative works, reports, performances and r