        It  was  late  in  the  evening  when  K.  arrived.  The  village 

        was  deep  in  snow.  The  Castle  hill  was  hidden,  veiled  in  mist 

        and  darkness,  nor  was  there  even  a  glimmer  of  light  to  show 

        that  a  castle  was  there.  On  the  wooden  bridge  leading  from  the 

        main  road  to  the  village  K.  stood  for  a  long  time  gazing  into 

        the  illusory  emptiness  above  him. 


        Then  he  went  on  to  find  quarters  for  the  night.  The  inn  was 

        still  awake,  and  although  the  landlord  could  not  provide  a 

        room  and  was  upset  by  such  a  late  and  unexpected  arrival,  he 

        was  willing  to  let  K.  sleep  on  a  bag  of  straw  in  the  parlour. 

        K.  accepted  the  offer.  Some  peasants  were  still  sitting  over  their 

        beer,  but  he  did  not  want  to  talk,  and  after  himself  fetching 

        the  bag  of  straw  from  the  attic,  lay  down  beside  the  stove.  It 

        was  a  warm  corner,  the  peasants  were  quiet,  and  letting  his 

        weary  eyes  stray  over  them  he  soon  fell  asleep. 


        But  very  shortly  he  was  awakened.  A  young  man  dressed 

        like  a  townsman,  with  the  face  of  an  actor,  his  eyes  narrow  and 

        his  eyebrows  strongly  marked,  was  standing  beside  him  along 

        with  the  landlord.  The  peasants  were  still  in  the  room,  and  a 

        few  had  turned  their  chairs  round  so  as  to  see  and  hear  better. 

        The  young  man  apologised  very  courteously  for  having  awak¬ 

        ened  K.,  introduced  himself  as  the  son  of  the  Castellan,  and 


        then  said:  “This  village  belongs  to  the  Castle,  and  whoever 

        lives  here  or  passes  the  night  here  does  so  in  a  manner  of 

        speaking  in  the  Castle  itself.  Nobody  may  do  that  without  the 

        Count’s  permission.  But  you  have  no  such  permit,  or  at  least 

        you  have  produced  none.” 


        K.  had  half  raised  himself  and  now,  smoothing  down  his 

        hair  and  looking  up  at  the  two  men,  he  said:  “What  village  is 

        this  I  have  wandered  into?  Is  there  a  castle  here?” 


        “Most  certainly,”  replied  the  young  man  slowly,  while  here 

        and  there  a  head  was  shaken  over  K.’s  remark,  “the  castle  of  my 

        lord  the  Count  West- west.” 


        “And  must  one  have  a  permit  to  sleep  here?”  asked  K.,  as  if 

        he  wished  to  assure  himself  that  what  he  had  heard  was  not 

        a  dream. 


        “One  must  have  a  permit,”  was  the  reply,  and  there  was 

        an  ironical  contempt  for  K.  in  the  young  man’s  gesture  as  he 

        stretched  out  his  arm  and  appealed  to  the  others,  “Or  must  one 

        not  have  a  permit?” 


        “Well,  then,  I’ll  have  to  go  and  get  one,”  said  K.  yawning  and 

        pushing  his  blanket  away  as  if  to  rise  up. 


        “And  from  whom,  pray?”  asked  the  young  man. 


        “From  the  Count,”  said  K.,  “that’s  the  only  thing  to  be  done.” 


        “A  permit  from  the  Count  in  the  middle  of  the  night!” 

        cried  the  young  man,  stepping  back  a  pace. 


        “Is  that  impossible?”  enquired  K.  coolly.  “Then  why  did  you 

        waken  me?” 


        At  this  the  young  man  flew  into  a  passion.  “None  of  your 

        guttersnipe  manners!”  he  cried.  “I  insist  on  respect  for  the 

        Count’s  authority!  I  woke  you  up  to  inform  you  that  you  must 

        quit  the  Count’s  territory  at  once.” 


        “Enough  of  this  fooling,”  said  K.  in  a  markedly  quiet  voice, 

        laying  himself  down  again  and  pulling  up  the  blanket.  “You’re 

        going  a  little  too  far,  my  good  fellow,  and  I’ll  have  something 

        to  say  to-morrow  about  your  conduct.  The  landlord  here  and 

        those  other  gentlemen  will  bear  me  out  if  necessary.  Let  me 

        tell  you  that  I  am  the  Land  Surveyor  whom  the  Count  is  ex¬ 

        pecting.  My  assistants  are  coming  on  to-morrow  in  a  carriage 

        with  the  apparatus.  I  did  not  want  to  miss  the  chance  of  a  walk 

        through  the  snow,  but  unfortunately  lost  my  way  several 

        times  and  so  arrived  very  late.  That  it  was  too  late  to  present 

        myself  at  the  Castle  I  knew  very  well  before  you  saw  fit  to 

        inform  me.  That  is  why  I  have  made  shift  with  this  bed  for 

        the  night,  where,  to  put  it  mildly,  you  have  had  the  discourtesy 

        to  disturb  me.  That  is  all  I  have  to  say.  Good  night,  gentle¬ 

        men.”  And  K.  turned  over  on  his  side  towards  the  stove. 


        “Land  Surveyor?”  he  heard  the  hesitating  question  behind 

        his  back,  and  then  there  was  a  general  silence.  But  the  young 

        man  soon  recovered  his  assurance,  and  lowering  his  voice,  suf¬ 

        ficiently  to  appear  considerate  of  K.’s  sleep  while  yet  speaking 

        loud  enough  to  be  clearly  heard,  said  to  the  landlord:  “I’ll  ring 

        up  and  enquire.”  So  there  was  a  telephone  in  this  village  inn? 

        They  had  everything  up  to  the  mark.  The  particular  instance 

        surprised  K.,  but  on  the  whole  he  had  really  expected  it.  It 

        appeared  that  the  telephone  was  placed  almost  over  his  head 

        and  in  his  drowsy  condition  he  had  overlooked  it.  If  the  young 

        man  must  needs  telephone  he  could  not,  even  with  the  best  in- 



        5 



        <-THE  C  A  STLE> 


        tentions,  avoid  disturbing  K.,  the  only  question  was  whether 

        K.  would  let  him  do  so;  he  decided  to  allow  it.  In  that  case, 

        however,  there  was  no  sense  in  pretending  to  sleep,  and  so  he 

        turned  on  his  back  again.  He  could  see  the  peasants  putting 

        their  heads  together;  the  arrival  of  a  Land  Surveyor  was  no 

        small  event.  The  door  into  the  kitchen  had  been  opened,  and 

        blocking  the  whole  doorway  stood  the  imposing  figure  of  the 

        landlady,  to  whom  the  landlord  was  advancing  on  tiptoe  in 

        order  to  tell  her  what  was  happening.  And  now  the  conversa¬ 

        tion  began  on  the  telephone.  The  Castellan  was  asleep,  but  an 

        under-castellan,  one  of  the  under-castellans,  a  certain  Herr 

        Fritz,  was  available.  The  young  man,  announcing  himself  as 

        Schwarzer,  reported  that  he  had  found  K.,  a  disreputable¬ 

        looking  man  in  the  thirties,  sleeping  calmly  on  a  bag  of  straw 

        with  a  minute  rucksack  for  pillow  and  a  knotty  stick  within 

        reach.  He  had  naturally  suspected  the  fellow,  and  as  the  land¬ 

        lord  had  obviously  neglected  his  duty  he,  Schwarzer,  had  felt 

        bound  to  investigate  the  matter.  He  had  roused  the  man,  ques¬ 

        tioned  him,  and  duly  warned  him  off  the  Count’s  territory,  all 

        of  which  K.  had  taken  with  an  ill  grace,  perhaps  with  some 

        justification,  as  it  eventually  turned  out,  for  he  claimed  to  be  a 

        Land  Surveyor  engaged  by  the  Count.  Of  course,  to  say  the  least 

        of  it,  that  was  a  statement  which  required  official  confirmation, 

        and  so  Schwarzer  begged  Herr  Fritz  to  enquire  in  the  Central 

        Bureau  if  a  Land  Surveyor  were  really  expected,  and  to  tele¬ 

        phone  the  answer  at  once. 


        Then  there  was  silence  while  Fritz  was  making  enquiries 

        up  there  and  the  young  man  was  waiting  for  the  answer.  K. 


        6 



        ■^THE  C  A  S  T  L  E  -> 


        did  not  change  his  position,  did  not  even  once  turn  round, 

        seemed  quite  indifferent  and  stared  into  space.  Schwarzer’s  re¬ 

        port,  in  its  combination  of  malice  and  prudence,  gave  him  an 

        idea  of  the  measure  of  diplomacy  in  which  even  underlings 

        in  the  Castle  like  Schwarzer  were  versed.  Nor  were  they  re¬ 

        miss  in  industry,  the  Central  Office  had  a  night  service.  And 

        apparently  answered  questions  quickly,  too,  for  Fritz  was  al¬ 

        ready  ringing.  His  reply  seemed  brief  enough,  for  Schwarzer 

        hung  up  the  receiver  immediately,  crying  angrily:  “Just  what 

        I  said!  Not  a  trace  of  a  Land  Surveyor.  A  common,  lying 

        tramp,  and  probably  worse.”  For  a  moment  K.  thought  that 

        all  of  them,  Schwarzer,  the  peasants,  the  landlord  and  the 

        landlady,  were  going  to  fall  upon  him  in  a  body,  and  to  escape 

        at  least  the  first  shock  of  their  assault  he  crawled  right  under¬ 

        neath  the  blanket.  But  the  telephone  rang  again,  and  with  a 

        special  insistence,  it  seemed  to  K.  Slowly  he  put  out  his  head. 

        Although  it  was  improbable  that  this  message  also  concerned 

        K.  they  all  stopped  short  and  Schwarzer  took  up  the  receiver 

        once  more.  He  listened  to  a  fairly  long  statement,  and  then 

        said  in  a  low  voice:  “A  mistake,  is  it?  I’m  sorry  to  hear  that. 

        The  head  of  the  department  himself  said  so?  Very  queer,  very 

        queer.  How  am  I  to  explain  it  all  to  the  Land  Surveyor?” 


        K.  pricked  up  his  ears.  So  the  Castle  had  recognised  him  as 

        the  Land  Surveyor.  That  was  unpropitious  for  him,  on  the  one 

        hand,  for  it  meant  that  the  Castle  was  well  informed  about 

        him,  had  estimated  all  the  probable  chances,  and  was  taking 

        up  the  challenge  with  a  smile.  On  the  other  hand,  however, 

        it  was  quite  propitious,  for  if  his  interpretation  were  right  they 



        7 



        4THE  CASTLE> 


        had  underestimated  his  strength,  and  he  would  have  more 

        freedom  of  action  than  he  had  dared  to  hope.  And  if  they  ex¬ 

        pected  to  cow  him  by  their  lofty  superiority  in  recognising  him 

        as  Land  Surveyor,  they  were  mistaken;  it  made  his  skin  prickle 

        a  little,  that  was  all. 


        He  waved  off  Schwarzer  who  was  timidly  approaching 

        him,  and  refused  an  urgent  invitation  to  transfer  himself  into 

        the  landlord’s  own  room;  he  only  accepted  a  warm  drink  from 

        the  landlord  and  from  the  landlady  a  basin  to  wash  in,  a  piece 

        of  soap  and  a  towel.  He  did  not  even  have  to  ask  that  the  room 

        should  be  cleared,  for  all  the  men  flocked  out  with  averted 

        faces  lest  he  should  recognise  them  again  next  day.  The  lamp 

        was  blown  out,  and  he  was  left  in  peace  at  last.  He  slept  deeply 

        until  morning,  scarcely  disturbed  by  rats  scuttling  past  once  or 

        twice. 


        After  breakfast,  which,  according  to  his  host,  was  to  be  paid 

        for  by  the  Castle,  together  with  all  the  other  expenses  of  his 

        board  and  lodging,  he  prepared  to  go  out  immediately  into  the 

        village.  But  since  the  landlord,  to  whom  he  had  been  very 

        curt  because  of  his  behaviour  the  preceding  night,  kept  cir¬ 

        cling  around  him  in  dumb  entreaty,  he  took  pity  on  the  man 

        and  asked  him  to  sit  down  for  a  while. 


        “I  haven’t  met  the  Count  yet,”  said  K.,  “but  he  pays  well  for 

        good  work,  doesn’t  he?  When  a  man  like  me  travels  so  far 

        from  home  he  wants  to  go  back  with  something  in  his  pockets.” 


        “There’s  no  need  for  the  gentleman  to  worry  about  that 

        kind  of  thing;  nobody  complains  of  being  badly  paid.” 


        “Well,”  said  K.,  “I’m  not  one  of  your  timid  people,  and  can 


        8 



        ■4THE  CASTLE-V 


        give  a  piece  of  my  mind  even  to  a  Count,  but  of  course  it’s  much 

        better  to  have  everything  settled  up  without  any  trouble.” 


        The  landlord  sat  opposite  K.  on  the  rim  of  the  window-ledge, 

        not  daring  to  take  a  more  comfortable  seat,  and  kept  on  gazing 

        at  K.  with  an  anxious  look  in  his  large  brown  eyes.  He  had 

        thrust  his  company  on  K.  at  first,  but  now  it  seemed  that  he 

        was  eager  to  escape.  Was  he  afraid  of  being  cross-questioned 

        about  the  Count?  Was  he  afraid  of  some  indiscretion  on  the 

        part  of  the  “gentleman”  whom  he  took  K.  to  be?  K.  must 

        divert  his  attention.  He  looked  at  the  clock,  and  said:  “My 

        assistants  should  be  arriving  soon.  Will  you  be  able  to  put  them 

        up  here?” 


        “Certainly,  sir,”  he  said,  “but  won’t  they  be  staying  with  you 

        up  at  the  Castle?” 


        Was  the  landlord  so  willing,  then,  to  give  up  prospective 

        customers,  and  K.  in  particular,  whom  he  so  unconditionally 

        transferred  to  the  Castle? 


        “That’s  not  at  all  certain  yet,”  said  K.,  “I  must  first  find  out 

        what  work  I  am  expected  to  do.  If  I  have  to  work  down  here, 

        for  instance,  it  would  be  more  sensible  to  lodge  down  here. 

        I’m  afraid,  too,  that  the  life  in  the  Castle  wouldn’t  suit  me.  I 

        like  to  be  my  own  master.” 


        “You  don’t  know  the  Castle,”  said  the  landlord  quietly. 


        “Of  course,”  replied  K.,  “one  shouldn’t  judge  prematurely. 

        All  that  I  know  at  present  about  the  Castle  is  that  the  people 

        there  know  how  to  choose  a  good  Land  Surveyor.  Perhaps  it 

        has  other  attractions  as  well.”  And  he  stood  up  in  order  to  rid 

        the  landlord  of  his  presence,  since  the  man  was  biting  his 



        9 



        •fTHE  CASTLES 


        lip  uneasily.  His  confidence  was  not  to  be  lightly  won. 

        As  K.  was  going  out  he  noticed  a  dark  portrait  in  a  dim 

        frame  on  the  wall.  He  had  already  observed  it  from  his  couch 

        by  the  stove,  but  from  that  distance  he  had  not  been  able  to 

        distinguish  any  details  and  had  thought  that  it  was  only  a  plain 

        back  to  the  frame.  But  it  was  a  picture  after  all,  as  now  ap¬ 

        peared,  the  bust  portrait  of  a  man  about  fifty.  His  head  was 

        sunk  so  low  upon  his  breast  that  his  eyes  were  scarcely  visible, 

        and  the  weight  of  the  high,  heavy  forehead  and  the  strong 

        hooked  nose  seemed  to  have  borne  the  head  down.  Because  of 

        this  pose  the  man’s  full  beard  was  pressed  in  at  the  chin  and 

        spread  out  further  down.  His  left  hand  was  buried  in  his  lux¬ 

        uriant  hair,  but  seemed  incapable  of  supporting  the  head.  “Who 

        is  that?”  asked  K.,  “the  Count?”  He  was  standing  before  the 

        portrait  and  did  not  look  round  at  the  landlord.  “No,”  said  the 

        latter,  “the  Castellan.”  “A  handsome  castellan,  indeed,”  said 

        K.,  “a  pity  that  he  has  such  an  ill-bred  son.”  “No,  no,”  said 

        the  landlord,  drawing  K.  a  little  towards  him  and  whispering 

        in  his  ear,  “Schwarzer  exaggerated  yesterday,  his  father  is  only 

        an  under-castellan,  and  one  of  the  lowest,  too.”  At  that  moment 

        the  landlord  struck  K.  as  a  very  child.  “The  villain!”  said  K. 

        with  a  laugh,  but  the  landlord  instead  of  laughing  said,  “Even 

        his  father  is  powerful.”  “Get  along  with  you,”  said  K.,  “you 

        think  everyone  powerful.  Me  too,  perhaps?”  “No,”  he  replied, 

        timidly  yet  seriously,  “I  don’t  think  you  powerful.”  “You’re 

        a  keen  observer,”  said  K.,  “for  between  you  and  me  I’m  not 

        really  powerful.  And  consequently  I  suppose  I  have  no  less  re¬ 

        spect  for  the  powerful  than  you  have,  only  I’m  not  so  honest  as 



        10 



        <THE  CASTLE>- 


        you  and  am  not  always  willing  to  acknowledge  it.”  And  K. 

        gave  the  landlord  a  tap  on  the  cheek  to  hearten  him  and  awaken 

        his  friendliness.  It  made  him  smile  a  little.  He  was  actually 

        young,  with  that  soft  and  almost  beardless  face  of  his;  how  had 

        he  come  to  have  that  massive,  elderly  wife,  who  could  be  seen 

        through  a  small  window  bustling  about  the  kitchen  with  her 

        elbows  sticking  out?  K.  did  not  want  to  force  his  confidence 

        any  further,  however,  nor  to  scare  away  the  smile  he  had  at  last 

        evoked.  So  he  only  signed  to  him  to  open  the  door,  and  went 

        out  into  the  brilliant  winter  morning. 


        Now  he  could  see  the  Castle  above  him,  clearly  defined  in 

        the  glittering  air,  its  outline  made  still  more  definite  by  the 

        moulding  of  snow  covering  it  in  a  thin  layer.  There  seemed 

        to  be  much  less  snow  up  there  on  the  hill  than  down  in  the 

        village,  where  K.  found  progress  as  laborious  as  on  the  main 

        road  the  previous  day.  Here  the  heavy  snowdrifts  reached  right 

        up  to  the  cottage  windows  and  began  again  on  the  low  roofs, 

        but  up  on  the  hill  everything  soared  light  and  free  into  the 

        air,  or  at  least  so  it  appeared  from  down  below. 


        On  the  whole  this  distant  prospect  of  the  Castle  satisfied  K.’s 

        expectations.  It  was  neither  an  old  stronghold  nor  a  new  man¬ 

        sion,  but  a  rambling  pile  consisting  of  innumerable  small  build¬ 

        ings  closely  packed  together  and  of  one  or  two  storeys;  if 

        K.  had  not  known  that  it  was  a  Castle  he  might  have  taken  it 

        for  a  little  town.  There  was  only  one  tower  as  far  as  he  could 

        see,  whether  it  belonged  to  a  dwelling-house  or  a  church  he 

        could  not  determine.  Swarms  of  crows  were  circling  round  it. 


        With  his  eyes  fixed  on  the  Castle,  K.  went  on  further,  think- 



        II 



        ■^THE  CASTLES 


        ing  of  nothing  else  at  all.  But  on  approaching  it  he  was  disap¬ 

        pointed  in  the  Castle;  it  was  after  all  only  a  wretched-looking 

        town,  a  huddle  of  village  houses,  whose  sole  merit,  if  any,  lay 

        in  being  built  of  stone,  but  the  plaster  had  long  since  flaked 

        off  and  the  stone  seemed  to  be  crumbling  away.  K.  had  a  fleet¬ 

        ing  recollection  of  his  native  town.  It  was  hardly  inferior  to 

        this  so-called  Castle,  and  if  it  were  merely  a  question  of  en¬ 

        joying  the  view  it  was  a  pity  to  have  come  so  far,  K.  would 

        have  done  better  to  visit  his  native  town  again,  which  he  had 

        not  seen  for  such  a  long  time.  And  in  his  mind  he  compared 

        the  church  tower  at  home  with  the  tower  above  him.  The 

        church  tower,  firm  in  line,  soaring  unfalteringly  to  its  tapering 

        point,  topped  with  red  tiles  and  broad  in  the  roof,  an  earthly 

        building — what  else  can  men  build? — but  with  a  loftier  goal 

        than  the  humble  dwelling-houses,  and  a  clearer  meaning  than 

        the  muddle  of  every  day  life.  The  tower  above  him  here — the 

        only  one  visible — the  tower  of  a  house,  as  was  now  apparent,  per¬ 

        haps  of  the  main  building,  was  uniformly  round,  part  of  it  gra¬ 

        ciously  mantled  with  ivy,  pierced  by  small  windows  that  glit¬ 

        tered  in  the  sun,  a  somewhat  maniacal  glitter,  and  topped  by 

        what  looked  like  an  attic,  with  battlements  that  were  irregular, 

        broken,  fumbling,  as  if  designed  by  the  trembling  or  careless 

        hand  of  a  child,  clearly  outlined  against  the  blue.  It  was  as  if  a 

        melancholy-mad  tenant  who  ought  to  have  been  kept  locked 

        in  the  topmost  chamber  of  his  house  had  burst  through  the 

        roof  and  lifted  himself  up  to  the  gaze  of  the  world. 


        Again  K.  came  to  a  stop,  as  if  in  standing  still  he  had  more 

        power  of  judgment.  But  he  was  disturbed.  Behind  the  village 



        12 



        T  H  E  CASTLE  ^ 


        church  where  he  had  stopped — it  was  really  only  a  chapel 

        widened  with  barn-like  additions  so  as  to  accommodate  the 

        parishioners — was  the  school.  A  long,  low  building,  combin¬ 

        ing  remarkably  a  look  of  great  age  with  a  provisional  appear¬ 

        ance,  it  lay  behind  a  fenced-in  garden  which  was  now  a  field  of 

        snow.  The  children  were  just  coming  out  with  their  teacher. 

        They  thronged  round  him,  all  gazing  up  at  him  and  chattering 

        without  a  break  so  rapidly  that  K.  could  not  follow  what  they 

        said.  The  teacher,  a  small  young  man  with  narrow  shoulders 

        and  a  very  upright  carriage  which  yet  did  not  make  him  ridic¬ 

        ulous,  had  already  fixed  K.  with  his  eyes  from  the  distance, 

        naturally  enough,  for  apart  from  the  school-children  there  was 

        not  another  human  being  in  sight.  Being  the  stranger,  K. 

        made  the  first  advance,  especially  as  the  other  was  such  an 

        authoritative-looking  little  man,  and  said,  “Good  morning, 

        sir.”  As  if  by  one  accord  the  children  fell  silent,  perhaps  the 

        master  liked  to  have  a  sudden  stillness  as  a  preparation  for  his 

        words.  “You  are  looking  at  the  Castle?”  he  asked  more  gently 

        than  K.  had  expected,  but  with  an  inflection  that  denoted  dis¬ 

        approval  of  K.’s  occupation.  “Yes,”  said  K.  “I  am  a  stranger 

        here,  I  came  to  the  village  only  last  night.”  “You  don’t  like 

        the  Castle?”  returned  the  teacher  quickly.  “What?”  countered 

        K.,  a  little  taken  aback,  and  repeated  the  question  in  a  modified 

        form.  “Do  I  like  the  Castle?  Why  do  you  assume  that  I  don’t 

        like  it?”  “Strangers  never  do,”  said  the  teacher.  To  avoid  say¬ 

        ing  the  wrong  thing  K.  changed  the  subject  and  asked,  “I  sup¬ 

        pose  you  know  the  Count?”  “No,”  said  the  teacher  turning 

        away.  But  K.  would  not  be  put  off  and  asked  again,  “What, 



        r 3 



        -<THE  CASTLE> 


        you  don’t  know  the  Count?”  “Why  should  I?”  replied  the 

        teacher  in  a  low  tone,  and  added  aloud  in  French:  “Please  re¬ 

        member  that  there  are  innocent  children  present.”  K.  took  this 

        as  a  justification  for  asking:  “Might  I  come  to  pay  you  a  visit 

        one  day,  sir  ?  I  am  to  be  staying  here  for  some  time  and  already 

        feel  a  little  lonely.  I  don’t  fit  in  with  the  peasants  nor,  I  imagine, 

        with  the  Castle.”  “There  is  no  difference  between  the  peasantry 

        and  the  Castle,”  said  the  teacher.  “Maybe,”  said  K.,  “that 

        doesn’t  alter  my  position.  Can  I  pay  you  a  visit  one  day?”  “I 

        live  in  Swan  Street  at  the  butcher’s.”  That  was  assuredly  more 

        of  a  statement  than  an  invitation,  but  K.  said:  “Right,  I’ll 

        come.”  The  teacher  nodded  and  moved  on  with  his  batch  of 

        children,  who  began  to  scream  again  immediately.  They  soon 

        vanished  in  a  steeply  descending  by-street. 


        But  K.  was  disconcerted,  irritated  by  the  conversation.  For 

        the  first  time  since  his  arrival  he  felt  really  tired.  The  long  jour¬ 

        ney  he  had  made  seemed  at  first  to  have  imposed  no  strain 

        upon  him — how  quietly  he  had  sauntered  through  the  days, 

        step  by  step! — but  now  the  consequences  of  his  exertion  were 

        o  making  themselves  felt,  and  at  the  wrong  time,  too.  He  felt 

        irresistibly  drawn  to  seek  out  new  acquaintances,  but  each  new 

        acquaintance  only  seemed  to  increase  his  weariness.  If  he  forced 

        himself  in  his  present  condition  to  go  on  at  least  as  far  as  the 

        Castle  entrance,  he  would  have  done  more  than  enough. 


        So  he  resumed  his  walk,  but  the  way  proved  long.  For  the 

        street  he  was  in,  the  main  street  of  the  village,  did  not  lead  up 

        to  the  Castle  hill,  it  only  made  towards  it  and  then,  as  if  de¬ 

        liberately,  turned  aside,  and  though  it  did  not  lead  away  from 



        14 



        -*THE  C  A  S  T  L  E  > 


        the  Castle  it  got  no  nearer  to  it  either.  At  every  turn  K.  ex¬ 

        pected  the  road  to  double  back  to  the  Castle,  and  only  because 

        of  this  expectation  did  he  go  on;  he  was  flatly  unwilling,  tired 

        as  he  was,  to  leave  the  street,  and  he  was  also  amazed  at  the 

        length  of  the  village,  which  seemed  to  have  no  end,  again  and 

        again  the  same  little  houses,  and  frost-bound  window-panes 

        and  snow  and  the  entire  absence  of  human  beings — but  at  last 

        he  tore  himself  away  from  the  obsession  of  the  street  and  es¬ 

        caped  into  a  small  side-lane,  where  the  snow  was  still  deeper 

        and  the  exertion  of  lifting  one’s  feet  clear  was  fatiguing;  he 

        broke  into  a  sweat,  suddenly  came  to  a  stop,  and  could  not 

        go  on. 


        Well,  he  was  not  on  a  desert  island,  there  were  cottages  to 

        right  and  left  of  him.  He  made  a  snowball  and  threw  it  at  a 

        window.  The  door  opened  immediately — the  first  door  that 

        had  opened  during  the  whole  length  of  the  village — and  there 

        appeared  an  old  peasant  in  a  brown  fur  jacket,  with  his  head 

        cocked  to  one  side,  a  frail  and  kindly  figure.  “May  I  come  into 

        your  house  for  a  little?”  asked  K.,  “I’m  very  tired.”  He  did  not 

        hear  the  old  man’s  reply,  but  thankfully  observed  that  a  plank 

        was  pushed  out  towards  him  to  rescue  him  from  the  snow,  and 

        in  a  few  steps  he  was  in  the  kitchen. 


        A  large  kitchen,  dimly  lit.  Anyone  coming  in  from  outside 

        could  make  out  nothing  at  first.  K.  stumbled  over  a  washing- 

        tub,  a  woman’s  hand  steadied  him.  The  crying  of  children 

        came  loudly  from  one  corner.  From  another  steam  was  welling 

        out  and  turning  the  dim  light  into  darkness.  K.  stood  as  if  in 

        the  clouds.  “He  must  be  drunk,”  said  somebody.  “Who  are 



        15 



        <THE  CASTLE> 


        you?”  cried  a  hectoring  voice,  and  then  obviously  to  the  old 

        man;  “Why  did  you  let  him  in?  Are  we  to  let  in  everybody 

        that  wanders  about  in  the  street?”  “I  am  the  Count’s  Land 

        Surveyor,”  said  K,,  trying  to  justify  himself  before  this  still  in¬ 

        visible  personage.  “Oh,  it’s  the  Land  Surveyor,”  said  a  woman’s 

        voice,  and  then  came  a  complete  silence.  “You  know  me,  then?” 

        asked  K.  “Of  course,”  said  the  same  voice  curtly.  The  fact  that 

        he  was  known  did  not  seem  to  be  a  recommendation. 


        At  last  the  steam  thinned  a  little,  and  K.  was  able  gradually 

        to  make  things  out.  It  seemed  to  be  a  general  washing-day. 

        Near  the  door  clothes  were  being  washed.  But  the  steam  was 

        coming  from  another  corner,  where  in  a  wooden  tub  larger 

        than  any  K.  had  ever  seen,  as  wide  as  two  beds,  two  men  were 

        bathing  in  steaming  water.  But  still  more  astonishing,  although 

        one  could  not  say  what  was  so  astonishing  about  it,  was  the 

        scene  in  the  right-hand  corner.  From  a  large  opening,  the  only 

        one  in  the  back  wall,  a  pale  snowy  light  came  in,  apparently 

        from  the  courtyard,  and  gave  a  gleam  as  of  silk  to  the  dress 

        of  a  woman  who  was  almost  reclining  in  a  high  arm-chair. 

        She  was  suckling  an  infant  at  her  breast.  Several  children  were 

        playing  around  her,  peasant  children,  as  was  obvious,  but  she 

        seemed  to  be  of  another  class,  although  of  course  illness  and 

        weariness  give  even  peasants  a  look  of  refinement. 


        “Sit  down!”  said  one  of  the  men,  who  had  a  full  beard  and 

        breathed  heavily  through  his  mouth  which  always  hung  open, 

        pointing — it  was  a  funny  sight — with  his  wet  hand  over  the 

        edge  of  the  tub  towards  a  settle,  and  showering  drops  of  warm 

        water  all  over  K.’s  face  as  he  did  so.  On  the  settle  the  old  man 


        16 



        •<  T  H  E  C  A  S  T  L  E  > 


        who  had  admitted  K.  was  already  sitting,  sunk  in  vacancy. 

        K.  was  thankful  to  find  a  seat  at  last.  Nobody  paid  any  further 

        attention  to  him.  The  woman  at  the  washing-tub,  young, 

        plump  and  fair,  sang  in  a  low  voice  as  she  worked,  the  men 

        stamped  and  rolled  about  in  the  bath,  the  children  tried  to  get 

        closer  to  them  but  were  constantly  driven  back  by  mighty 

        splashes  of  water  which  fell  on  K.,  too,  and  the  woman  in  the 

        arm-chair  lay  as  if  lifeless  staring  at  the  roof  without  even  a 

        glance  towards  the  child  at  her  bosom. 


        She  made  a  beautiful,  sad,  fixed  picture,  and  K.  looked  at  her 

        for  what  must  have  been  a  long  time;  then  he  must  have  fallen 

        asleep,  for  when  a  loud  voice  roused  him  he  found  that  his  head 

        was  lying  on  the  old  man’s  shoulder.  The  men  had  finished 

        with  the  tub — in  which  the  children  were  now  wallowing  in 

        charge  of  the  fair-haired  woman — and  were  standing  fully 

        dressed  before  K.  It  appeared  that  the  hectoring  one  with  the 

        full  beard  was  the  less  important  of  the  two.  The  other,  a  still 

        slow-thinking  man  who  kept  his  head  bent,  was  not  taller  than 

        his  companion  and  had  a  much  smaller  beard,  but  he  was 

        broader  in  the  shoulders  and  had  a  broad  face  as  well,  and  he  it 

        was  who  said,  “You  can’t  stay  here,  sir.  Excuse  the  discourtesy.” 

        “I  don’t  want  to  stay,”  said  K.,  “I  only  wanted  to  rest  a  little.  I 

        have  rested,  and  now  I  shall  go.”  “You’re  probably  surprised 

        at  our  lack  of  hospitality,”  said  the  man,  “but  hospitality  is  not 

        our  custom  here,  we  have  no  use  for  visitors.”  Somewhat  re¬ 

        freshed  by  his  sleep,  his  perceptions  somewhat  quickened,  K. 

        was  pleased  by  the  man’s  frankness.  He  felt  less  constrained, 

        poked  with  his  stick  here  and  there,  approached  the  woman  in 



        17 



        -*THE  CASTLE> 


        the  arm-chair,  and  noted  that  he  was  physically  the  biggest 

        man  in  the  room. 


        “To  be  sure,”  said  K.,  “what  use  would  you  have  for  visitors? 

        But  still  you  need  one  now  and  then,  me,  for  example,  the  Land 

        Surveyor.”  “I  don’t  know  about  that,”  replied  the  man  slowly, 

        “if  you’ve  been  asked  to  come  you’re  probably  needed,  that’s 

        an  exceptional  case,  but  we  small  people  stick  to  our  tradition, 

        and  you  can’t  blame  us  for  that.”  “No,  no,”  said  K.,  “I  am  only 

        grateful  to  you,  to  you,  and  everybody  here.”  And  taking  them 

        all  by  surprise  he  made  an  adroit  turn  and  stood  before  the  re¬ 

        clining  woman.  Out  of  weary  blue  eyes  she  looked  at  him,  a 

        transparent  silk  kerchief  hung  down  to  the  middle  of  her  fore¬ 

        head,  the  infant  was  asleep  on  her  bosom.  “Who  are  you?” 

        asked  K.,  and  disdainfully — whether  contemptuous  of  K.  or  of 

        her  own  answer  was  not  clear — she  replied:  “A  girl  from  the 

        Castle.” 


        It  had  only  taken  a  second  or  so,  but  already  the  two  men 

        were  at  either  side  of  K.  and  were  pushing  him  towards  the 

        door,  as  if  there  were  no  other  means  of  persuasion,  silently, 

        but  putting  out  all  their  strength.  Something  in  this  procedure 

        delighted  the  old  man,  and  he  clapped  his  hands.  The  woman 

        at  the  bath-tub  laughed  too,  and  the  children  suddenly  shouted 

        like  mad. 


        K.  was  soon  out  in  the  street,  and  from  the  threshold  the  two 

        men  surveyed  him.  Snow  was  again  falling,  yet  the  sky  seemed 

        a  little  brighter.  The  bearded  man  cried  impatiently;  “Where 

        do  you  want  to  go  ?  This  is  the  way  to  the  Castle,  and  that  to 

        the  village.”  K.  made  no  reply  to  him,  but  turned  to  the  other, 


        18 



        <THE  C  A  S  T  L  E  > 


        who  in  spite  of  his  shyness  seemed  to  him  the  more  amiable 

        of  the  two,  and  said:  “Who  are  you?  Whom  have  I  to  thank 

        for  sheltering  me?”  “I  am  the  tanner  Lasemann,”  was  the  an¬ 

        swer,  “but  you  owe  thanks  to  nobody.”  “All  right,”  said  K., 

        “perhaps  we’ll  meet  again.”  “I  don’t  suppose  so,”  said  the  man. 

        At  that  moment  the  other  cried,  with  wave  of  his  hand: 

        “Good  morning,  Arthur;  good  morning,  Jeremiah!”  K.  turned 

        round;  so  there  were  really  people  to  be  seen  in  the  village 

        streets!  From  the  direction  of  the  Castle  came  two  young  men 

        of  medium  height,  both  very  slim,  in  tight-fitting  clothes,  and 

        like  each  other  in  their  features.  Although  their  skin  was  a 

        dusky  brown  the  blackness  of  their  little  pointed  beards  was 

        actually  striking  by  contrast.  Considering  the  state  of  the  road, 

        they  were  walking  at  a  great  pace,  their  slim  legs  keeping  time. 

        “Where  are  you  off  to?”  shouted  the  bearded  man.  One  had  to 

        shout  to  them,  they  were  going  so  fast  and  they  would  not  stop. 

        “On  business,”  they  shouted  back,  laughing.  “Where?”  “At 

        the  inn.”  “I’m  going  there  too,”  yelled  K.  suddenly,  louder  than 

        all  the  rest;  he  felt  a  strong  desire  to  accompany  them,  not  that 

        he  expected  much  from  their  acquaintance,  but  they  were  ob¬ 

        viously  good  and  jolly  companions.  They  heard  him,  but  only 

        nodded,  and  were  already  out  of  sight. 


        K.  was  still  standing  in  the  snow,  and  was  little  inclined  to 

        extricate  his  feet  only  for  the  sake  of  plunging  them  in  again; 

        the  tanner  and  his  comrade,  satisfied  with  having  finally  got 

        rid  of  him,  edged  slowly  into  the  house  through  the  door  which 

        was  now  barely  ajar,  casting  backward  glances  at  K.,  and  he 

        was  left  alone  in  the  falling  snow.  “A  fine  setting  for  a  fit  of 



        19 



        •<  T  H  E  CASTLE*- 


        despair,”  it  occurred  to  him,  “if  I  were  only  standing  here  by 

        accident  instead  of  design.” 


        Just  then  in  the  hut  on  his  left  hand  a  tiny  window  was 

        opened,  which  had  seemed  quite  blue  when  shut,  perhaps  from 

        the  reflection  of  the  snow,  and  was  so  tiny  that  when  opened 

        it  did  not  permit  the  whole  face  of  the  person  behind  it  to  be 

        seen,  but  only  the  eyes,  old  brown  eyes.  “There  he  is,”  K. 

        heard  a  woman’s  trembling  voice  say.  “It’s  the  Land  Surveyor,” 

        answered  a  man’s  voice.  Then  the  man  came  to  the  window 

        and  asked,  not  unamiably,  but  still  as  if  he  were  anxious  to 

        have  no  complications  in  front  of  his  house:  “Are  you  waiting 

        for  somebody?”  “For  a  sledge,  to  pick  me  up,”  said  K.  “No 

        sledges  will  pass  here,”  said  the  man,  “there’s  no  traffic  here.” 

        “But  it’s  the  road  leading  to  the  Castle,”  objected  K.  “All  the 

        same,  all  the  same,”  said  the  man  with  a  certain  finality,  “there’s 

        no  traffic  here.”  Then  they  were  both  silent.  But  the  man  was 

        obviously  thinking  of  something,  for  he  kept  the  window  open. 

        “It’s  a  bad  road,”  said  K.,  to  help  him  out.  The  only  answer 

        he  got,  however,  was:  “Oh,  yes.”  But  after  a  little  the  man  vol¬ 

        unteered:  “If  you  like,  I’ll  take  you  in  my  sledge.”  “Please  do,” 

