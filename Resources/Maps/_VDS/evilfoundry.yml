        [bold]#1 - 6 May 25XX[/bold]

        [bold]Description:[/bold] Ice crystal. Shoots high-velocity ice shards at regular intervals and cools the surrounding environment.

        [bold]Outcome:[/bold] Terminated following multiple injuries as a result of shard impacts.


        [bold]#2 - 14 July 25XX[/bold]

        [bold]Description:[/bold] Localized gravity well. Radioactive.

        [bold]Outcome:[/bold] Terminated. Radiation hazard deemed unacceptable.


        [bold]#3 - 4 August 25XX[/bold]

        [bold]Description:[/bold] Electrically charged point. Regularly discharges into surrounding environment and causes spasms in nearby organisms.

        [bold]Outcome:[/bold] Staff attempted to mitigate and utilise discharges via tesla coils. Entered critical state and underwent supercritical expansion, resulting in electromagnetic interference and detonations across facility.


        [bold]#4 - 23 Oct 25XX[/bold]

        [bold]Description:[/bold] Spectre of indeterminate appearance. Minor metamorphic capabilities - shifts to resemble deceased members of staff. Appears to be comprised entirely of unknown dust-like substance. Activity seems to focus around staff with regret or remorse regarding the deceased.

        [bold]Outcome:[/bold] Nanotrasen scientific equipment ineffective in dispersal. Phenomenon ceased naturally after four days.
