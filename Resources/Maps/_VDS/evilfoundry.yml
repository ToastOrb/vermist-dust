        [bold]Summary of Claim[/bold]

        In October 25XX, a cessation of operations order was issued to the defendant via Vermist Sector Central command. The plaintiff alleges that the defendant refused on multiple occasions to acknowledge the order and continued operations without authorization.

        The defendant claims that no such orders were received and requests the dismissal of the charges, as well as a guarantee of continued operations until a date to be agreed by both parties.


        [bold]Background Facts[/bold]

        Caldwell Foundry began operations in June of 25XX and has operated for 32 years, 3 months and 11 days. On September 18 25XX, a viability survey concluded that continued operations were not feasible and the plaintiff began the process of closing the facility. 

