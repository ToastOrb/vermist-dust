# HUMAN OVERLAYS
## Note: I chose not to put these in the "overlay" category so you can layer them
## above/under other markings in the same part category

## Head
- type: marking
  id: OverlayHumanoidHeadM
  bodyPart: Head
  markingCategory: Head
  speciesRestriction: [Human, Dwarf]
  sprites:
  - sprite: Mobs/Species/Human/parts.rsi
    state: head_m

- type: marking
  id: OverlayHumanoidHeadF
  bodyPart: Head
  markingCategory: Head
  speciesRestriction: [Human, Dwarf]
  sprites:
  - sprite: Mobs/Species/Human/parts.rsi
    state: head_f

